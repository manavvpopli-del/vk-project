<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SualCavab - Məni nə qədər tanıyırsan? | Multiplayer</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 850px;
            width: 100%;
            background: rgba(255,255,240,0.1);
            backdrop-filter: blur(2px);
            border-radius: 64px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .card {
            background: #fffef7;
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin: 0 0 8px 0;
            font-size: 2rem;
            background: linear-gradient(135deg, #ffb347, #ff6b4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            color: #4a627a;
            font-weight: 500;
            margin-bottom: 28px;
        }
        .room-panel {
            background: #f1f5f9;
            border-radius: 44px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
        }
        .input-group {
            flex: 2;
            min-width: 160px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e3a5f;
            display: block;
            margin-bottom: 5px;
        }
        input, button {
            border: none;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
        }
        input {
            background: white;
            border: 2px solid #e2e8f0;
            width: 100%;
        }
        input:focus {
            border-color: #ff9966;
        }
        button {
            background: #2c3e66;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #ff6b4a;
            transform: scale(1.02);
        }
        button:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            background: #e9ecef;
            border-radius: 40px;
            padding: 12px 20px;
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
        }
        .question-area, .answer-area, .questioner-panel {
            margin-top: 20px;
        }
        .question-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .question-btn {
            background: #ffecd6;
            color: #a5410f;
            text-align: left;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: 600;
        }
        .option-btn {
            background: #e2e3e8;
            color: #1f3a4b;
            margin: 8px;
            padding: 10px 18px;
        }
        .score {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff6b4a;
            text-align: center;
        }
        .waiting {
            text-align: center;
            color: #ff8c42;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        hr {
            margin: 20px 0;
        }
        .role-badge {
            background: #2c3e66;
            color: white;
            border-radius: 50px;
            padding: 6px 16px;
            display: inline-block;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="card">
        <h1>💘 SualCavab</h1>
        <div style="text-align:center" class="sub">Məni nə qədər tanıyırsan?</div>

        <div id="app">
            <!-- Otaq paneli -->
            <div class="room-panel">
                <div class="flex-row">
                    <div class="input-group">
                        <label>🏠 Otaq kodu (4-6 rəqəm/hərf)</label>
                        <input type="text" id="roomCode" placeholder="Məs: LOVE1" maxlength="10">
                    </div>
                    <div class="input-group">
                        <label>👤 Adın / Ləqəb</label>
                        <input type="text" id="playerName" placeholder="Adınız" maxlength="20">
                    </div>
                    <button id="joinRoomBtn">🔗 Otağa qoşul</button>
                </div>
                <div style="margin-top: 15px;">
                    <button id="createRoomBtn">✨ Yeni otaq yarat (kod al)</button>
                </div>
            </div>

            <div id="gameStatus" class="status">🔌 Otağa qoşulun...</div>
            <div id="gameContent"></div>
        </div>
    </div>
</div>

<script>
    // Firebase konfiqurasiya
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c",
        measurementId: "G-44P21XCZ7G"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 100 sual + 5 variant + düzgün cavab indeksi (0-4 arası)
    const questionsDB = [];
    for (let i = 1; i <= 100; i++) {
        const correctIdx = Math.floor(Math.random() * 5); // təsadüfi düzgün
        let variants = [];
        for (let v = 0; v < 5; v++) {
            if (v === correctIdx) variants.push("✅ Hə, məni tanıyır");
            else variants.push("❌ Yox, səhvdir");
        }
        questionsDB.push({
            id: i,
            text: `Sual ${i}: Mənim sevimli rəngim hansıdır? (Bu sual test üçün nümunədir)`,
            variants: variants,
            correct: correctIdx
        });
    }
    // Daha real suallar (ilk 10-u maraqlı, qalanlar template)
    const realQuestions = [
        "Mənim ən sevdiyim yemək nədir?",
        "Mənim doğum günüm hansı aydadır?",
        "Mənim ən sevdiyim film hansıdır?",
        "Mənim ən böyük qorxum nədir?",
        "Mənim ən sevdiyim musiqi janrı?",
        "Mənim ideal tətil yerim hara?",
        "Mən kofe yoxsa çay sevirəm?",
        "Mən gecə quşu yoxsa səhər adamı?",
        "Mənim ən yaxşı xüsusiyyətim nədir?",
        "Mənim ən sevdiyim heyvan?",
        "Mən yayı qışdan çox sevirəm?",
        "Mən kitab oxumağı sevirəm?",
        "Mən asanlıqla əsəbləşirəm?",
        "Mən sadiq dostam?",
        "Mən macəra axtarıram?",
        "Mən romantik biriyəm?",
        "Mən təmizlik düşkünüyəm?",
        "Mən səyahət etməyi sevirəm?",
        "Mən oyun oynamağı sevirəm?",
        "Mən yumor hissim güclüdür?"
    ];
    for (let i = 0; i < realQuestions.length && i < 100; i++) {
        const correctIdx = Math.floor(Math.random() * 5);
        let opts = [];
        for (let v = 0; v < 5; v++) {
            if (v === correctIdx) opts.push("✅ Düzdür, məni tanıyır");
            else opts.push("❌ Səhv, məni yaxşı tanımırsan");
        }
        questionsDB[i] = {
            id: i+1,
            text: realQuestions[i],
            variants: opts,
            correct: correctIdx
        };
    }
    // Qalanlar generic
    for (let i = realQuestions.length; i < 100; i++) {
        questionsDB[i] = {
            id: i+1,
            text: `Sual ${i+1}: Mənim haqqımda bilirsinizmi? (Sevgili tanıma testi)`,
            variants: ["✔️ Tamamilə", "❌ Yox", "🤔 Bəlkə", "💯 Əminəm", "⭐ Yaxşı tanıyıram"],
            correct: Math.floor(Math.random() * 5)
        };
    }

    let currentRoom = null;
    let myPlayerId = null;
    let myName = "";
    let myRole = null; // "questioner" və ya "answerer"
    let gameDataRef = null;
    let currentQuestionObj = null;
    let waitingForAnswer = false;

    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function showMessage(msg, isError = false) {
        const statusDiv = document.getElementById("gameStatus");
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? "#ffe0e0" : "#e6f4ea";
        setTimeout(() => {
            if (document.getElementById("gameStatus") === statusDiv) {
                statusDiv.style.background = "#e9ecef";
            }
        }, 2000);
    }

    async function joinRoom(roomCode, playerName, createIfNotExist = false) {
        if (!roomCode || !playerName) {
            showMessage("Otaq kodu və adınızı daxil edin!", true);
            return false;
        }
        const roomRef = database.ref(`rooms/${roomCode}`);
        const snapshot = await roomRef.once('value');
        let roomData = snapshot.val();
        
        if (!roomData) {
            if (createIfNotExist) {
                // yeni otaq yarat
                await roomRef.set({
                    players: {},
                    gameState: "waiting",
                    questionerId: null,
                    answererId: null,
                    currentQuestion: null,
                    currentVariants: null,
                    currentCorrect: null,
                    pendingFor: null,
                    lastUpdate: Date.now()
                });
                roomData = { players: {} };
            } else {
                showMessage("Otaq tapılmadı!", true);
                return false;
            }
        }
        
        let players = roomData.players || {};
        const playerCount = Object.keys(players).length;
        if (playerCount >= 2 && !players[playerName]) {
            showMessage("Otaq doludur (2 nəfərlik)!", true);
            return false;
        }
        
        myPlayerId = playerName;
        myName = playerName;
        
        // oyunçu əlavə et
        const newPlayer = {
            name: playerName,
            score: 0,
            role: null,
            joinedAt: Date.now()
        };
        await roomRef.child(`players/${playerName}`).update(newPlayer);
        
        currentRoom = roomCode;
        localStorage.setItem("lastRoom", roomCode);
        localStorage.setItem("lastName", playerName);
        
        // rolları təyin et: birinci questioner, ikinci answerer
        const updatedSnapshot = await roomRef.once('value');
        const updatedData = updatedSnapshot.val();
        const updatedPlayers = updatedData.players || {};
        const playerNames = Object.keys(updatedPlayers);
        if (playerNames.length === 1) {
            myRole = "questioner";
            await roomRef.child(`players/${playerName}/role`).set("questioner");
            await roomRef.child("questionerId").set(playerName);
            await roomRef.child("gameState").set("waiting_answerer");
        } else if (playerNames.length === 2) {
            if (updatedData.questionerId) {
                myRole = updatedData.questionerId === playerName ? "questioner" : "answerer";
            } else {
                myRole = playerNames[0] === playerName ? "questioner" : "answerer";
                await roomRef.child("questionerId").set(playerNames[0]);
            }
            await roomRef.child(`players/${playerName}/role`).set(myRole);
            if (myRole === "answerer") {
                await roomRef.child("answererId").set(playerName);
                await roomRef.child("gameState").set("question_select");
            }
        }
        
        startListening(roomCode);
        showMessage(`✅ Otağa qoşuldun: ${roomCode} | Rol: ${myRole === "questioner" ? "Sual verən" : "Cavab verən"}`);
        return true;
    }

    function startListening(roomCode) {
        if (gameDataRef) gameDataRef.off();
        const roomRef = database.ref(`rooms/${roomCode}`);
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            renderGameUI(data);
            // cavab göndərilmə gözləməsi
            if (data.gameState === "answering" && data.pendingFor === myName && myRole === "answerer") {
                if (data.currentQuestion && !waitingForAnswer) {
                    waitingForAnswer = true;
                    currentQuestionObj = {
                        text: data.currentQuestion,
                        variants: data.currentVariants || [],
                        correct: data.currentCorrect
                    };
                    showAnswerInterface(data.currentQuestion, data.currentVariants, data.currentCorrect);
                }
            } else {
                waitingForAnswer = false;
            }
        });
    }

    function renderGameUI(roomData) {
        const contentDiv = document.getElementById("gameContent");
        const players = roomData.players || {};
        const gameState = roomData.gameState;
        const questionerId = roomData.questionerId;
        const answererId = roomData.answererId;
        const myScore = players[myName]?.score || 0;
        
        if (!myRole) {
            contentDiv.innerHTML = `<div class="waiting">Rol təyin edilir...</div>`;
            return;
        }
        
        if (gameState === "waiting_answerer" && myRole === "questioner") {
            contentDiv.innerHTML = `
                <div class="waiting">⏳ İkinci oyunçu gözlənilir... Cavab verən qoşulsun!</div>
                <div class="score">⭐ Sizin xal: ${myScore}</div>
            `;
            return;
        }
        
        if (myRole === "questioner" && gameState === "question_select") {
            // 3 sual seçimi göstər (random 3 sual)
            const randomQuestions = [];
            const shuffled = [...questionsDB];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            for (let i = 0; i < 3; i++) randomQuestions.push(shuffled[i]);
            
            let html = `<div class="question-area"><h3>📢 Sual verən (siz): Cavab verənə hansı sualı vermək istəyirsiniz?</h3>`;
            randomQuestions.forEach((q, idx) => {
                html += `<button class="question-btn" onclick="selectQuestion(${q.id})">❓ ${q.text}</button>`;
            });
            html += `<div class="score">🏆 Sizin xal: ${myScore}</div></div>`;
            contentDiv.innerHTML = html;
            window.selectQuestion = async (qId) => {
                const question = questionsDB.find(q => q.id === qId);
                if (!question) return;
                const roomRef = database.ref(`rooms/${currentRoom}`);
                await roomRef.update({
                    currentQuestion: question.text,
                    currentVariants: question.variants,
                    currentCorrect: question.correct,
                    gameState: "answering",
                    pendingFor: answererId
                });
                showMessage("Sual cavab verənə göndərildi!");
            };
            return;
        }
        
        if (myRole === "answerer" && gameState === "question_select") {
            contentDiv.innerHTML = `<div class="waiting">🤔 Sual verən sual seçir... Gözləyin ⏳</div><div class="score">⭐ Xalınız: ${myScore}</div>`;
            return;
        }
        
        if (gameState === "answering" && myRole === "questioner") {
            contentDiv.innerHTML = `<div class="waiting">Cavab verən cavablandırır... ⏳</div><div class="score">⭐ Xalınız: ${myScore}</div>`;
        }
        
        if (gameState === "result_show") {
            contentDiv.innerHTML = `<div class="waiting">⚡ Nəticə göndərildi, yeni sual üçün hazırlıq...</div><div class="score">Xal: ${myScore}</div>`;
        }
    }
    
    async function showAnswerInterface(questionText, variants, correctIdx) {
        const contentDiv = document.getElementById("gameContent");
        contentDiv.innerHTML = `
            <div class="answer-area">
                <h3>❓ Sual: ${questionText}</h3>
                <p>Cavab verən sənsən! Düzgün variantı seç.</p>
                <div id="variantsList"></div>
            </div>
        `;
        const container = document.getElementById("variantsList");
        variants.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "option-btn";
            btn.style.display = "block";
            btn.style.width = "100%";
            btn.style.margin = "8px 0";
            btn.onclick = async () => {
                const isCorrect = (idx === correctIdx);
                const roomRef = database.ref(`rooms/${currentRoom}`);
                const playerRef = roomRef.child(`players/${myName}`);
                const snapshot = await playerRef.once('value');
                let currentScore = snapshot.val()?.score || 0;
                let newScore = isCorrect ? currentScore + 5 : currentScore - 5;
                await playerRef.update({ score: newScore });
                showMessage(isCorrect ? "🎉 Düzgün cavab! +5 xal" : "❌ Səhv cavab! -5 xal", !isCorrect);
                // növbəti sual seçiminə qayıt
                await roomRef.update({
                    gameState: "question_select",
                    currentQuestion: null,
                    pendingFor: null
                });
                waitingForAnswer = false;
                renderGameUI((await roomRef.once('value')).val());
            };
            container.appendChild(btn);
        });
    }

    document.getElementById("joinRoomBtn").onclick = async () => {
        const roomCode = document.getElementById("roomCode").value.trim();
        const playerName = document.getElementById("playerName").value.trim();
        if (!roomCode || !playerName) {
            showMessage("Otaq kodu və ad daxil edin!", true);
            return;
        }
        await joinRoom(roomCode, playerName, false);
    };
    
    document.getElementById("createRoomBtn").onclick = async () => {
        const newRoom = generateRoomId();
        const playerName = document.getElementById("playerName").value.trim();
        if (!playerName) {
            showMessage("Adınızı daxil edin!", true);
            return;
        }
        document.getElementById("roomCode").value = newRoom;
        await joinRoom(newRoom, playerName, true);
    };
    
    // avtomatik yükləmə
    (function init() {
        const lastRoom = localStorage.getItem("lastRoom");
        const lastName = localStorage.getItem("lastName");
        if (lastRoom && lastName) {
            document.getElementById("roomCode").value = lastRoom;
            document.getElementById("playerName").value = lastName;
        }
    })();
</script>
</body>
</html>
