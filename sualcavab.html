        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 15px; border: none; font-size: 1rem; transition: 0.3s; }
        input { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(233,30,140,0.2); outline: none; }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(233,30,140,0.3); }
        button { background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; font-weight: 700; cursor: pointer; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }
        .hidden { display: none; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: 500; }
        .option-btn:hover { background: var(--pink); border-color: var(--pink); }
        .score-board { font-size: 1.5rem; font-weight: 800; color: var(--pink-light); margin-bottom: 1rem; text-shadow: 0 0 10px rgba(233,30,140,0.5); }
        .role-badge { display: inline-block; padding: 6px 16px; border-radius: 50px; background: rgba(124,58,237,0.2); border: 1px solid var(--purple); font-size: 0.85rem; margin-bottom: 15px; color: #d8b4fe; }
        .question-text { font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.4; color: #f0f0f0; }
        #statusMsg { color: var(--text-muted); font-style: italic; font-size: 0.9rem; }
    </style>
</head>

</div>

    <button onclick="chooseRole('answerer')">Mən Cavab Verəcəyəm 🙋‍♀️</button>
</div>

<div class="container hidden" id="gameArea">

    <div id="roleDisplay" class="role-badge"></div>

        </div>

        </div>
    </div>

    <div id="answererSide" class="hidden">
        <div id="waitMsg">
            <p class="question-text">Sevgilinin sual seçməsini gözləyirsən...</p>
            <div id="statusMsg">O hələ qərar verir... 🤔</div>
        </div>
        <div id="answerArea" class="hidden">

            <div id="displayOptions"></div>
        </div>
    </div>
</div>

        { q: "Mən səni nə qədər çox sevirəm?", a: ["Dünyalar qədər", "Sonsuzluğa qədər", "Hər şeydən çox", "Sözlərlə deyilməz", "Hamısı!"] }
    ];

    window.joinRoom = function() {
        roomCode = document.getElementById('roomInput').value.trim().toLowerCase();
        if(!roomCode) return alert("Otaq kodunu daxil et!");
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('roleSelection').classList.remove('hidden');
    };

    window.chooseRole = function(role) {
        myRole = role;
        document.getElementById('roleSelection').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        document.getElementById('roleDisplay').textContent = role === 'asker' ? "Rolunuz: Sual Verən 🙋‍♂️" : "Rolunuz: Cavab Verən 🙋‍♀️";
        
        const roomRef = ref(db, 'rooms/' + roomCode);
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentScore = data.score || 0;
                document.getElementById('score').textContent = currentScore;
                syncInterface(data);
            } else {
                set(roomRef, { score: 0, state: 'waiting' });
            }
        });

        if(role === 'asker') {
            generateThreeQuestions();
            document.getElementById('askerSide').classList.remove('hidden');
        } else {
            document.getElementById('answererSide').classList.remove('hidden');
        }
    };

    function generateThreeQuestions() {
        const triadDiv = document.getElementById('triadQuestions');
        triadDiv.innerHTML = "";
        const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);
        
        selected.forEach(s => {
            const btn = document.createElement('button');
            btn.textContent = s.q;
            btn.onclick = () => prepareQuestion(s);
            triadDiv.appendChild(btn);
        });
    }

    function prepareQuestion(s) {
        document.getElementById('questionList').classList.add('hidden');
        document.getElementById('correctAnswerSelection').classList.remove('hidden');
        const optionsDiv = document.getElementById('myOptions');
        optionsDiv.innerHTML = "";

        s.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.textContent = opt;
            btn.onclick = () => {
                update(ref(db, 'rooms/' + roomCode), {
                    state: 'answering',
                    currentQ: s.q,
                    options: s.a,
                    correctIdx: idx,
                    askerId: Math.random() // trigger update
                });
                document.getElementById('correctAnswerSelection').innerHTML = "<h4 class='question-text'>Sual göndərildi! Sevgilin cavab verəndə yeni suallar gələcək.</h4>";
            };
            optionsDiv.appendChild(btn);
        });
    }

    function syncInterface(data) {
        if(myRole === 'answerer') {
            if(data.state === 'answering') {
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('answerArea').classList.remove('hidden');
                document.getElementById('displayQuestion').textContent = data.currentQ;
                
                const optDiv = document.getElementById('displayOptions');
                optDiv.innerHTML = "";
                data.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn";
                    btn.textContent = opt;
                    btn.onclick = () => submitAnswer(idx, data.correctIdx);
                    optDiv.appendChild(btn);
                });
            } else {
                document.getElementById('waitMsg').classList.remove('hidden');
                document.getElementById('answerArea').classList.add('hidden');
            }
        } else if (myRole === 'asker' && data.state === 'waiting') {
            // Sevgilisi cavab veribse yeni sual siyahisini goster
            document.getElementById('correctAnswerSelection').classList.add('hidden');
            document.getElementById('questionList').classList.remove('hidden');
            generateThreeQuestions();
        }
    }

    function submitAnswer(selected, correct) {
        let newScore = currentScore;
        if(selected === correct) {
            alert("Mükəmməl! Doğru tapdın 😍 +5 xal");
            newScore += 5;
        } else {
            alert("Heyf... Səhv cavab 💔 -5 xal");
            newScore -= 5;
        }
        
        update(ref(db, 'rooms/' + roomCode), {
            state: 'waiting',
            score: newScore
        });
    }
</script>

</body>
</html>
