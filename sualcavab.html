        { text: "Mən ən çox hansı növ işdə işləmək istəyirəm?", variants: ["Ofis işi", "Yaradıcı iş", "Səyyar iş", "Evdən iş", "Öz işim"] },
        { text: "Mən pulumu nəyə xərcləyirəm?", variants: ["Yeməyə", "Geyimə", "Səyahətə", "Texnikaya", "Əyləncəyə"] },
        { text: "Mən ən çox hansı mövzuda danışmağı sevirəm?", variants: ["Həyat", "Texnologiya", "İncəsənət", "İdman", "Münasibətlər"] },
        { text: "Mən tənqidə necə reaksiya verirəm?", variants: ["Qəbul edirəm", "Müdafiə olunuram", "Düşünürəm", "Əsəbləşirəm", "Dəyişirəm"] },
        { text: "Mən ən çox hansı növ komplimenti sevirəm?", variants: ["Görünüşə", "Ağıla", "Xasiyyətə", "Uğura", "Yumor hissinə"] },
        { text: "Mən axşamlar nə edirəm?", variants: ["Filim izləyirəm", "Dostlarla", "Oxuyuram", "Yatıram", "İşləyirəm"] },
        { text: "Mən ən çox hansı növ səsi sevirəm?", variants: ["Piano", "Gitar", "Violin", "Baraban", "Vokal"] },
        { text: "Mən üzgüçülük bilirəmmi?", variants: ["Bəli, çox yaxşı", "Bəli, az da olsa", "Xeyr", "Öyrənmək istəyirəm", "Su qorxum var"] },
        { text: "Mən maşın sürürəmmi?", variants: ["Bəli, var", "Bəli, yoxdu", "Sürücülük öyrənirəm", "Yox, bilmirəm", "Lazım deyil"] }
    ];
    
    // Tam olaraq 100 sual təmin et
    while(questionsData.length < 100) {
        questionsData.push({ 
            text: `Sual ${questionsData.length+1}: Mənim haqqımda nə bilirsən?`, 
            variants: ["Variant A", "Variant B", "Variant C", "Variant D", "Variant E"] 
        });
    }
    const FULL_QUESTIONS = questionsData.slice(0, 100);
    
    let currentRoom = null;
    let myPlayerId = null;
    let myName = "";
    let myRole = null;
    let roomRef = null;
    let waitingForAnswer = false;
    
    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
    
    function showMessage(msg, isError = false) {
        const statusDiv = document.getElementById("gameStatus");
        statusDiv.innerHTML = msg;
        statusDiv.style.background = isError ? "#ffe0e0" : "#e6f4ea";
        setTimeout(() => {
            if (document.getElementById("gameStatus") === statusDiv) {
                statusDiv.style.background = "#e9ecef";
            }
        }, 2500);
    }
    
    async function joinRoom(roomCode, playerName, createIfNotExist = false) {
        if (!roomCode || !playerName) {
            showMessage("Otaq kodu və adınızı daxil edin!", true);
            return false;
        }
        const roomDatabaseRef = database.ref(`rooms/${roomCode}`);
        const snapshot = await roomDatabaseRef.once('value');
        let roomData = snapshot.val();
        
        if (!roomData) {
            if (createIfNotExist) {
                await roomDatabaseRef.set({
                    players: {},
                    gameState: "waiting",
                    questionerId: null,
                    answererId: null,
                    currentQuestion: null,
                    currentVariants: null,
                    selectedAnswer: null,
                    pendingFor: null,
                    lastUpdate: Date.now()
                });
                roomData = { players: {} };
            } else {
                showMessage("Otaq tapılmadı!", true);
                return false;
            }
        }
        
        let players = roomData.players || {};
        const playerCount = Object.keys(players).length;
        if (playerCount >= 2 && !players[playerName]) {
            showMessage("Otaq doludur (2 nəfərlik)!", true);
            return false;
        }
        
        myPlayerId = playerName;
        myName = playerName;
        
        await roomDatabaseRef.child(`players/${playerName}`).set({
            name: playerName,
            score: 0,
            role: null,
            joinedAt: Date.now()
        });
        
        currentRoom = roomCode;
        localStorage.setItem("lastRoom", roomCode);
        localStorage.setItem("lastName", playerName);
        
        const updatedSnapshot = await roomDatabaseRef.once('value');
        const updatedData = updatedSnapshot.val();
        const updatedPlayers = updatedData.players || {};
        const playerNames = Object.keys(updatedPlayers);
        
        if (playerNames.length === 1) {
            myRole = "questioner";
            await roomDatabaseRef.child(`players/${playerName}/role`).set("questioner");
            await roomDatabaseRef.child("questionerId").set(playerName);
            await roomDatabaseRef.child("gameState").set("waiting_answerer");
        } else if (playerNames.length === 2) {
            if (updatedData.questionerId) {
                myRole = updatedData.questionerId === playerName ? "questioner" : "answerer";
            } else {
                myRole = playerNames[0] === playerName ? "questioner" : "answerer";
                await roomDatabaseRef.child("questionerId").set(playerNames[0]);
            }
            await roomDatabaseRef.child(`players/${playerName}/role`).set(myRole);
            if (myRole === "answerer") {
                await roomDatabaseRef.child("answererId").set(playerName);
                await roomDatabaseRef.child("gameState").set("question_select");
            } else {
                await roomDatabaseRef.child("gameState").set("question_select");
            }
        }
        
        startListening(roomCode);
        showMessage(`✅ Otağa qoşuldun: ${roomCode} | Rol: ${myRole === "questioner" ? "Sual verən" : "Cavab verən"}`);
        return true;
    }
    
    function startListening(roomCode) {
        if (roomRef) roomRef.off();
        roomRef = database.ref(`rooms/${roomCode}`);
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            renderGameUI(data);
            
            // Cavab verənə sual gəldikdə
            if (data.gameState === "answering" && data.pendingFor === myName && myRole === "answerer" && data.currentQuestion && data.currentVariants && !waitingForAnswer) {
                waitingForAnswer = true;
                showAnswerInterface(data.currentQuestion, data.currentVariants, data.selectedAnswer);
            }
        });
    }
    
    async function renderGameUI(roomData) {
        const contentDiv = document.getElementById("gameContent");
        const players = roomData.players || {};
        const gameState = roomData.gameState;
        const answererId = roomData.answererId;
        const myScore = players[myName]?.score || 0;
        
        if (!myRole) {
            contentDiv.innerHTML = `<div class="waiting">Rol təyin edilir...</div>`;
            return;
        }
        
        if (gameState === "waiting_answerer" && myRole === "questioner") {
            contentDiv.innerHTML = `
                <div class="waiting">⏳ İkinci oyunçu gözlənilir... Cavab verən qoşulsun!</div>
                <div class="score">⭐ Sizin xal: ${myScore}</div>
            `;
            return;
        }
        
        if (myRole === "questioner" && (gameState === "question_select" || gameState === "waiting_answerer")) {
            // 3 təsadüfi sual göstər
            const shuffled = [...FULL_QUESTIONS];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const randomQuestions = shuffled.slice(0, 3);
            
            let html = `<div class="question-area"><h3>📢 Sual verən (siz): Hansı sualı vermək istəyirsiniz?</h3>
            <p style="color:#666">Sualı seçin, sonra ÖZÜNÜZƏ uyğun cavabı seçin. Cavab verən sizi tanımağa çalışacaq!</p>`;
            randomQuestions.forEach((q, idx) => {
                html += `<button class="question-btn" onclick="window.selectQuestionForAsk(${FULL_QUESTIONS.indexOf(q)})">❓ ${q.text}</button>`;
            });
            html += `<div class="score">🏆 Xalınız: ${myScore}</div></div>`;
            contentDiv.innerHTML = html;
            return;
        }
        
        if (myRole === "answerer" && gameState === "question_select") {
            contentDiv.innerHTML = `<div class="waiting">🤔 Sual verən sual seçir... Gözləyin ⏳</div><div class="score">⭐ Xalınız: ${myScore}</div>`;
            return;
        }
        
        if (gameState === "answering" && myRole === "questioner") {
            contentDiv.innerHTML = `<div class="waiting">⏳ Cavab verən cavablandırır... Gözləyin</div><div class="score">⭐ Xalınız: ${myScore}</div>`;
        }
    }
    
    // Sual verən: sualı seçir, sonra öz cavabını seçir
    window.selectQuestionForAsk = async (questionIndex) => {
        const question = FULL_QUESTIONS[questionIndex];
        if (!question) return;
        
        // Variantları göstər ki, sual verən öz həyatına uyğun cavabı seçsin
        const contentDiv = document.getElementById("gameContent");
        let variantsHtml = `<h3>📝 Sual: ${question.text}</h3>
        <p>Özünüz üçün düzgün cavabı seçin (cavab verən sonra bunu tapmalıdır):</p>`;
        question.variants.forEach((variant, idx) => {
            variantsHtml += `<button class="option-btn" onclick="window.submitSelectedAnswer(${questionIndex}, ${idx})">${String.fromCharCode(65+idx)}. ${variant}</button>`;
        });
        contentDiv.innerHTML = variantsHtml;
    };
    
    window.submitSelectedAnswer = async (questionIndex, selectedVariantIdx) => {
        const question = FULL_QUESTIONS[questionIndex];
        if (!question) return;
        
        const roomDatabaseRef = database.ref(`rooms/${currentRoom}`);
        const answererIdSnapshot = await roomDatabaseRef.child("answererId").once('value');
        const answererId = answererIdSnapshot.val();
        
        if (!answererId) {
            showMessage("Cavab verən hələ qoşulmayıb!", true);
            return;
        }
        
        await roomDatabaseRef.update({
            currentQuestion: question.text,
            currentVariants: question.variants,
            selectedAnswer: selectedVariantIdx,
            gameState: "answering",
            pendingFor: answererId
        });
        
        showMessage("✅ Sual və sizin cavabınız cavab verənə göndərildi! O, sizi tanımağa çalışsın.");
    };
    
    async function showAnswerInterface(questionText, variants, correctAnswerIdx) {
        const contentDiv = document.getElementById("gameContent");
        contentDiv.innerHTML = `
            <div class="answer-area">
                <h3>❓ Sual: ${questionText}</h3>
                <p><strong>Sual verənin seçdiyi cavab hansıdır? Sizi nə qədər tanıyır?</strong></p>
                <div id="variantsList"></div>
            </div>
        `;
        const container = document.getElementById("variantsList");
        
        variants.forEach((variant, idx) => {
            const btn = document.createElement("button");
            btn.innerText = `${String.fromCharCode(65+idx)}. ${variant}`;
            btn.className = "option-btn";
            btn.onclick = async () => {
                const isCorrect = (idx === correctAnswerIdx);
                const roomDatabaseRef = database.ref(`rooms/${currentRoom}`);
                const playerRef = roomDatabaseRef.child(`players/${myName}`);
                const snapshot = await playerRef.once('value');
                let currentScore = snapshot.val()?.score || 0;
                let newScore = isCorrect ? currentScore + 5 : currentScore - 5;
                await playerRef.update({ score: newScore });
                
                showMessage(isCorrect ? "🎉 Düzgün tapdın! +5 xal" : "❌ Səhv tapdın! -5 xal", !isCorrect);
                
                // Növbəti sual üçün sıfırla
                await roomDatabaseRef.update({
                    gameState: "question_select",
                    currentQuestion: null,
                    currentVariants: null,
                    selectedAnswer: null,
                    pendingFor: null
                });
                
                waitingForAnswer = false;
                const updated = (await roomDatabaseRef.once('value')).val();
                renderGameUI(updated);
            };
            container.appendChild(btn);
        });
    }
    
    document.getElementById("joinRoomBtn").onclick = async () => {
        const roomCode = document.getElementById("roomCode").value.trim();
        const playerName = document.getElementById("playerName").value.trim();
        if (!roomCode || !playerName) {
            showMessage("Otaq kodu və ad daxil edin!", true);
            return;
        }
        await joinRoom(roomCode, playerName, false);
    };
    
    document.getElementById("createRoomBtn").onclick = async () => {
        const newRoom = generateRoomId();
        const playerName = document.getElementById("playerName").value.trim();
        if (!playerName) {
            showMessage("Adınızı daxil edin!", true);
            return;
        }
        document.getElementById("roomCode").value = newRoom;
        await joinRoom(newRoom, playerName, true);
    };
    
    (function init() {
        const lastRoom = localStorage.getItem("lastRoom");
        const lastName = localStorage.getItem("lastName");
        if (lastRoom && lastName) {
            document.getElementById("roomCode").value = lastRoom;
            document.getElementById("playerName").value = lastName;
        }
    })();
</script>
</body>
</html>
