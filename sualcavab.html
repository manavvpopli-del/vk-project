<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Məni Tanı — PlayWithLove</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#e91e8c;--pkl:#ff6bb5;--pur:#7c3aed;--purl:#a855f7;--bg:#0d0d1a;--card:#1a1a2e;--text:#f0f0f0;--muted:#8888aa;--bdr:rgba(233,30,140,0.2);--grn:#10b981;--red:#ef4444;--amb:#f59e0b}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 15% 15%,rgba(124,58,237,.1) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 85%,rgba(233,30,140,.08) 0%,transparent 60%)}
.screen{position:relative;z-index:1;display:none;min-height:100vh}
.screen.on{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.box{background:var(--card);border:1px solid var(--bdr);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:480px;box-shadow:0 0 60px rgba(233,30,140,.1)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo h1{font-size:1.7rem;font-weight:800;margin-top:.5rem;background:linear-gradient(135deg,var(--pkl),var(--purl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:var(--muted);font-size:.88rem;margin-top:.3rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem}
.field input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:12px;color:var(--text);font-size:1rem;padding:.8rem 1rem;outline:none;transition:border-color .2s}
.btn{width:100%;padding:.9rem;border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--pink),var(--pur));margin-top:.5rem}
.err{color:#ff6b6b;font-size:.83rem;text-align:center;margin-top:.5rem}
.rcode{font-size:3.5rem;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--pkl),var(--purl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:1rem 0}
.pslots{display:flex;justify-content:center;gap:1.5rem;margin:1.5rem 0}
.psl{width:110px;background:rgba(255,255,255,.04);border-radius:14px;padding:1rem .8rem;text-align:center}
.psl .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pur));display:flex;align-items:center;justify-content:center;margin:0 auto .5rem}
.rcards{display:flex;gap:1rem;margin-top:1.5rem;justify-content:center}
.rcard{flex:1;background:rgba(255,255,255,.04);border:2px solid var(--bdr);border-radius:18px;padding:1.5rem 1rem;text-align:center;cursor:pointer}
.rcard.sel{border-color:var(--pink);background:rgba(233,30,140,.12)}
.sboard{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:1rem;margin-bottom:1.5rem}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:1.5rem;margin-bottom:1rem}
.qi{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:12px;padding:1rem;margin-bottom:.7rem;cursor:pointer}
.qi.sel{border-color:var(--pink);background:rgba(233,30,140,.12)}
.ch{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:12px;padding:.9rem;cursor:pointer;margin-bottom:.65rem}
.ch.picked{border-color:var(--amb);background:rgba(245,158,11,.1)}
.ch.correct{border-color:var(--grn)!important;background:rgba(16,185,129,.12)!important}
.ch.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--bdr);border-top-color:var(--pink);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.rover{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200}
.rpop{background:var(--card);border-radius:24px;padding:2.5rem;text-align:center;width:90%;max-width:360px}
</style>
</head>
<body>

<div class="screen on" id="sJoin">
  <div class="box">
    <div class="logo"><h1>Məni Tanı</h1><p>Sevgilini nə qədər tanıyırsan?</p></div>
    <div class="field"><label>Adın</label><input type="text" id="iName" placeholder="Adını daxil et" maxlength="16"/></div>
    <div class="field"><label>Otaq kodu</label><input type="text" id="iRoom" style="text-align:center" placeholder="_ _ _ _" maxlength="4"/></div>
    <button class="btn" onclick="joinRoom()">💕 Qoşul</button>
    <button class="btn" style="background:transparent;border:1px solid var(--bdr)" onclick="createRoom()">✨ Otaq Yarat</button>
    <div class="err" id="joinErr"></div>
  </div>
</div>

<div class="screen" id="sWait">
  <div class="box" style="text-align:center">
    <h2>Otaq Kodu</h2>
    <div class="rcode" id="dispCode">----</div>
    <div class="pslots" id="pslots"></div>
    <p><span class="spin"></span> Gözlənilir...</p>
  </div>
</div>

<div class="screen" id="sRole">
  <div class="box">
    <div class="logo"><h1>Rol Seç</h1></div>
    <div class="rcards">
      <div class="rcard" id="rcA" onclick="selRole('asker')">🙋<br>Sual Verən</div>
      <div class="rcard" id="rcB" onclick="selRole('answerer')">💭<br>Cavab Verən</div>
    </div>
    <button class="btn" id="roleBtn" style="display:none" onclick="confirmRole()">✅ Təsdiqlə</button>
    <div class="stmsg" id="roleSt" style="display:none; text-align:center; margin-top:1rem"></div>
  </div>
</div>

<div class="screen" id="sGame">
  <div class="gwrap" style="width:100%; max-width:600px">
    <div class="sboard">
      <div><small id="sn1"></small><br><b id="sv1">0</b></div>
      <div style="text-align:center">TUR<br><b id="svRound">1/10</b></div>
      <div style="text-align:right"><small id="sn2"></small><br><b id="sv2">0</b></div>
    </div>
    <div id="vPickQ" style="display:none" class="panel"><div class="qlist" id="qList"></div><button class="btn" id="sendQBtn" onclick="doSendQ()">Göndər</button></div>
    <div id="vPickAns" style="display:none" class="panel"><div id="askQShow" style="margin-bottom:1rem"></div><div class="choices" id="askChoices"></div><button class="btn" id="setAnsBtn" onclick="doSetCorrect()">Təsdiqlə</button></div>
    <div id="vAskWait" style="display:none" class="stmsg"><span class="spin"></span> Cavab gözlənilir...</div>
    <div id="vAnsWait" style="display:none" class="stmsg"><span class="spin"></span> Sual gözlənilir...</div>
    <div id="vAnsQ" style="display:none" class="panel"><div id="ansQText" style="font-weight:bold;margin-bottom:1rem"></div><div class="choices" id="ansChoices"></div></div>
  </div>
</div>

<div class="screen" id="sFinal">
  <div class="box" style="text-align:center">
    <h2 id="finTitle">Oyun Bitdi!</h2>
    <div id="finScores" style="margin:1rem 0"></div>
    <button class="btn" onclick="location.reload()">🔄 Yenidən</button>
  </div>
</div>

<div class="rover" id="resOv" style="display:none">
  <div class="rpop"><h2 id="resT"></h2><p id="resM"></p><button class="btn" id="resBtn" onclick="nextRound()">Davam et</button></div>
</div>

const ROUNDS=10;
const $=id=>document.getElementById(id);
let myName='',roomCode='',myRole='',usedQs=[],resShown=false,myPhase='',localSelQ=null,localSelA=null,currentQI=null,currentSelQ=null,rRef=null,unsub=null;

function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
function toast(m){alert(m);}
function rnd(){return String(Math.floor(1000+Math.random()*9000));}

function pick3(){
  let av=QS.map((_,i)=>i).filter(i=>!usedQs.includes(i));
  if(av.length<3){usedQs=[]; av=QS.map((_,i)=>i);}
  let p=[];while(p.length<3){let i=av[Math.floor(Math.random()*av.length)];if(!p.includes(i))p.push(i);}
  return p;
}

window.createRoom=async function(){
  const n=$('iName').value.trim(); if(!n){alert('Ad daxil et!'); return;}
  roomCode=rnd(); myName=n; rRef=ref(db,`rooms/${roomCode}`);
  await set(rRef,{player1:{name:n,score:0},player2:null,status:'waiting',round:1,roles:{},currentQ:null});
  $('dispCode').textContent=roomCode; showScr('sWait'); listen();
};

window.joinRoom=async function(){
  const n=$('iName').value.trim(), c=$('iRoom').value.trim();
  if(!n||!c){alert('Ad və Kod daxil et!'); return;}
  rRef=ref(db,`rooms/${c}`); const snap=await get(rRef);
  if(!snap.exists()){alert('Otaq yoxdur!'); return;}
  myName=n; roomCode=c;
  await set(ref(db,`rooms/${c}/player2`),{name:n,score:0});
  await set(ref(db,`rooms/${c}/status`),'role');
  $('dispCode').textContent=c; showScr('sWait'); listen();
};

function listen(){
  if(unsub)off(rRef,'value',unsub);
  unsub=onValue(rRef,snap=>{ if(snap.exists()) handle(snap.val()); });
}

function handle(d){
  const curScr=[...document.querySelectorAll('.screen.on')][0]?.id;
  if(d.status==='role' && (curScr==='sWait' || curScr==='sJoin')){ showScr('sRole'); return; }
  if(curScr==='sRole'){ handleRole(d); return; }
  if(d.status==='playing'){
    if(curScr!=='sGame'){
      const isP1=d.player1.name===myName;
      myRole=d.roles[isP1?'player1':'player2'];
      $('sn1').textContent=d.player1.name; $('sn2').textContent=d.player2.name;
      showScr('sGame');
      syncView(d);
    } else { syncView(d); }
  }
  if(d.status==='finished') showFinal(d);
}

async function handleRole(d){
  if(!d.roles || !d.roles.player1 || !d.roles.player2) return;
  if(d.roles.player1 === d.roles.player2){
    if(d.player1.name===myName){ alert('Eyni rollar! Yenidən seçin.'); set(ref(db,`rooms/${roomCode}/roles`),{}); }
    $('roleBtn').style.display='none'; $('roleSt').style.display='none'; return;
  }
  if(d.player1.name===myName && d.status!=='playing'){
    const qi=pick3();
    await set(ref(db,`rooms/${roomCode}/currentQ`),{qi,phase:'asker_pick'});
    await set(ref(db,`rooms/${roomCode}/status`),'playing');
  }
}

function syncView(d){
  const cq=d.currentQ; if(!cq) return;
  const isP1=d.player1.name===myName;
  myRole=d.roles[isP1?'player1':'player2'];
  $('svRound').textContent=`${d.round}/${ROUNDS}`;
  $('sv1').textContent=d.player1.score; $('sv2').textContent=d.player2.score;

  ['vPickQ','vPickAns','vAskWait','vAnsWait','vAnsQ'].forEach(id=>$(id).style.display='none');

  if(myRole==='asker'){
    if(cq.phase==='asker_pick') { showPickQ(cq); }
    else if(cq.phase==='asker_answer') { showPickAns(cq); }
    else { $('vAskWait').style.display='block'; }
  } else {
    if(cq.phase==='answerer_pick') { showAnsQ(cq); }
    else { $('vAnsWait').style.display='block'; }
  }
  if(cq.phase==='show_result' && !resShown){ resShown=true; showResult(d); }
}

function showPickQ(cq){
  $('vPickQ').style.display='block'; currentQI=cq.qi;
  $('qList').innerHTML=cq.qi.map((idx,i)=>`<div class="qi" id="qi${i}" onclick="localSelQ=${i}; document.querySelectorAll('.qi').forEach(e=>e.classList.remove('sel')); $('qi${i}').classList.add('sel')">${QS[idx].q}</div>`).join('');
}

window.doSendQ=async function(){
  if(localSelQ===null) return;
  await set(ref(db,`rooms/${roomCode}/currentQ/selQ`),localSelQ);
  await set(ref(db,`rooms/${roomCode}/currentQ/phase`),'asker_answer');
};

function showPickAns(cq){
  $('vPickAns').style.display='block'; const qo=QS[cq.qi[cq.selQ]];
  $('askQShow').textContent=qo.q;
  $('askChoices').innerHTML=qo.o.map((o,i)=>`<div class="ch" id="ac${i}" onclick="localSelA=${i}; document.querySelectorAll('#askChoices .ch').forEach(e=>e.classList.remove('picked')); $('ac${i}').classList.add('picked')">${o}</div>`).join('');
}

window.doSetCorrect=async function(){
  if(localSelA===null) return;
  await set(ref(db,`rooms/${roomCode}/currentQ/ca`),localSelA);
  await set(ref(db,`rooms/${roomCode}/currentQ/phase`),'answerer_pick');
};

function showAnsQ(cq){
  $('vAnsQ').style.display='block'; const qo=QS[cq.qi[cq.selQ]];
  $('ansQText').textContent=qo.q;
  $('ansChoices').innerHTML=qo.o.map((o,i)=>`<div class="ch" onclick="submitAns(${i})">${o}</div>`).join('');
}

window.submitAns=async function(i){
  const snap=await get(ref(db,`rooms/${roomCode}`)); const d=snap.val();
  const ok = i === d.currentQ.ca;
  const isP1 = d.player1.name===myName;
  const newScore = (isP1?d.player1.score:d.player2.score) + (ok?5:-5);
  await set(ref(db,`rooms/${roomCode}/${isP1?'player1':'player2'}/score`),newScore);
  await set(ref(db,`rooms/${roomCode}/currentQ/aok`),ok);
  await set(ref(db,`rooms/${roomCode}/currentQ/ca_text`),QS[d.currentQ.qi[d.currentQ.selQ]].o[d.currentQ.ca]);
  await set(ref(db,`rooms/${roomCode}/currentQ/phase`),'show_result');
};

function showResult(d){
  $('resOv').style.display='flex'; resShown=true;
  $('resT').textContent=d.currentQ.aok?'Düzdür! 🎉':'Səhvdir! 💔';
  $('resM').textContent=`Düzgün cavab: ${d.currentQ.ca_text}`;
  $('resBtn').style.display = myRole==='answerer'?'block':'none';
}

window.nextRound=async function(){
  resShown=false; $('resOv').style.display='none';
  const d=(await get(rRef)).val();
  if(d.round >= ROUNDS){ await set(ref(db,`rooms/${roomCode}/status`),'finished'); return; }
  const qi=pick3();
  await set(ref(db,`rooms/${roomCode}/round`), d.round+1);
  await set(ref(db,`rooms/${roomCode}/currentQ`), {qi,phase:'asker_pick'});
};

function showFinal(d){
  showScr('sFinal');
  const s1=d.player1.score, s2=d.player2.score;
  $('finScores').innerHTML=`${d.player1.name}: ${s1} xal<br>${d.player2.name}: ${s2} xal`;
}

window.selRole=function(r){ myRole=r; $('rcA').className=r==='asker'?'rcard sel':'rcard'; $('rcB').className=r==='answerer'?'rcard sel':'rcard'; $('roleBtn').style.display='block'; };
window.confirmRole=async function(){
  const isP1=(await get(rRef)).val().player1.name===myName;
  await set(ref(db,`rooms/${roomCode}/roles/${isP1?'player1':'player2'}`),myRole);
  $('roleBtn').style.display='none'; $('roleSt').style.display='block'; $('roleSt').textContent='Sevgilini gözləyirəm...';
};
</script>
</body>
</html>
