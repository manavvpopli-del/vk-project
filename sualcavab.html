<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sual-Cavab Multiplayer 💕</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink: #e91e8c; --purple: #7c3aed; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Arxa Fon Animasiyası */
        .bg-glow {
            position: fixed; width: 300px; height: 300px; background: var(--pink);
            filter: blur(120px); border-radius: 50%; opacity: 0.2; z-index: -1;
            animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            padding: 2.5rem; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%; max-width: 450px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.active { animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h2 { font-size: 2rem; margin-bottom: 1rem; background: linear-gradient(to right, #f472b6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1);
            background: var(--dark); color: white; margin-bottom: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 15px rgba(233, 30, 140, 0.3); }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white; font-weight: bold; font-size: 1rem; cursor: pointer;
            transition: 0.3s; margin-top: 5px;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.98); }

        .option-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            text-align: left; margin: 8px 0; padding: 12px 20px; font-weight: 500;
        }
        .option-btn:hover { background: rgba(233, 30, 140, 0.2); border-color: var(--pink); }

        .score-box {
            position: absolute; top: -20px; right: 20px; background: var(--pink);
            padding: 8px 20px; border-radius: 15px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(233, 30, 140, 0.4);
        }

        .waiting-dots::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

        .hidden { display: none; }
        .tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--pink); font-weight: bold; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="screen-lobby" class="card active">
    <div class="tag">PlayWithLove</div>
    <h2>Otaq Sistemi 🎮</h2>
    <p style="color: #94a3b8; margin-bottom: 20px;">Sevgilinlə eyni kodu daxil et</p>
    <input type="text" id="roomInput" placeholder="Otaq kodunu yaz..." maxlength="10">
    <button onclick="joinRoom()">Otağa Qoşul 🚀</button>
</div>

<div id="screen-role" class="card hidden">
    <h2>Rolunu Seç 🎭</h2>
    <p style="color: #94a3b8; margin-bottom: 20px;">Eyni rolu seçməyin!</p>
    <button onclick="setRole('asker')" style="background: #334155;">🙋‍♂️ Sual Verən</button>
    <button onclick="setRole('answerer')">🙋‍♀️ Cavab Verən</button>
</div>

<div id="screen-game" class="card hidden">
    <div id="scoreDisplay" class="score-box">0</div>
    <div id="roleBadge" class="tag" style="margin-bottom: 10px;">Gözlənilir</div>
    
    <div id="section-asker" class="hidden">
        <div id="step-select-q">
            <h3 style="margin-bottom:15px;">3 Sualdan birini seç:</h3>
            <div id="q-list"></div>
        </div>
        <div id="step-select-a" class="hidden">
            <h3 style="margin-bottom:15px;">Sənin üçün düzgün cavab?</h3>
            <div id="a-list"></div>
        </div>
    </div>

    <div id="section-answerer" class="hidden">
        <div id="answer-wait">
            <h3 class="waiting-dots">Sevgilin sual seçir</h3>
            <p style="margin-top:10px; color:#94a3b8;">Sənə bildiriş gələcək...</p>
        </div>
        <div id="answer-play" class="hidden">
            <h3 id="displayQ" style="margin-bottom:20px; color: #f472b6;"></h3>
            <div id="displayOpts"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let room = "";
    let role = "";
    let score = 0;

    // 100 Sual Bazası (Qısaldılmış amma dinamik)
    const questions = [
        { q: "Mənim ən sevdiyim rəng?", a: ["Qırmızı", "Qara", "Mavi", "Ağ", "Yaşıl"] },
        { q: "İlk görüşdə nə geyinmişdim?", a: ["Don", "Cins", "Sport", "Kostyum", "Xatırlamıram"] },
        { q: "Ən böyük qorxum?", a: ["Təklik", "İlan", "Hündürlük", "İtirilmək", "Qaranlıq"] },
        { q: "Hansı yeməyi sevmirəm?", a: ["Soğan", "Balıq", "Kələm", "Südlü aş", "Göyərti"] },
        { q: "Xəyalımdakı ölkə?", a: ["İtaliya", "Yaponiya", "Fransa", "İsveçrə", "Maldiv"] },
        { q: "Ən çox hansı emojini sevirəm?", a: ["❤️", "😂", "💀", "🥰", "🙄"] }
        // ... (Burada 100-ə qədər sual əlavə edilə bilər)
    ];
    for(let i=7; i<=100; i++) questions.push({ q: `Mənim ${i} nömrəli sevimli hobbim?`, a: ["Yuxu", "Kitab", "Oyun", "Gəzmək", "Musiqi"] });

    // Otağa Qoşulma
    window.joinRoom = function() {
        room = document.getElementById('roomInput').value.trim().toLowerCase();
        if(!room) return alert("Kod daxil et!");
        
        switchScreen('screen-lobby', 'screen-role');
    }

    // Rol Təyini
    window.setRole = function(r) {
        role = r;
        switchScreen('screen-role', 'screen-game');
        document.getElementById('roleBadge').textContent = role === 'asker' ? "Sən Sual Verirsən" : "Sən Cavab Verirsən";
        
        const roomRef = ref(db, 'rooms/' + room);
        
        // Multiplayer Dinamikası
        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) {
                set(roomRef, { score: 0, state: 'waiting' });
                return;
            }
            score = data.score || 0;
            document.getElementById('scoreDisplay').textContent = score;
            updateUI(data);
        });

        if(role === 'asker') startAskerRound();
    }

    function updateUI(data) {
        if(role === 'answerer') {
            document.getElementById('section-answerer').classList.remove('hidden');
            if(data.state === 'active') {
                document.getElementById('answer-wait').classList.add('hidden');
                document.getElementById('answer-play').classList.remove('hidden');
                document.getElementById('displayQ').textContent = data.currentQ;
                const div = document.getElementById('displayOpts');
                div.innerHTML = "";
                data.options.forEach((opt, i) => {
                    const b = document.createElement('button');
                    b.className = "option-btn";
                    b.textContent = opt;
                    b.onclick = () => submitAnswer(i, data.correct);
                    div.appendChild(b);
                });
            } else {
                document.getElementById('answer-wait').classList.remove('hidden');
                document.getElementById('answer-play').classList.add('hidden');
            }
        } else {
            document.getElementById('section-asker').classList.remove('hidden');
            if(data.state === 'waiting') {
                startAskerRound();
            }
        }
    }

    function startAskerRound() {
        document.getElementById('step-select-q').classList.remove('hidden');
        document.getElementById('step-select-a').classList.add('hidden');
        const div = document.getElementById('q-list');
        div.innerHTML = "";
        
        const randoms = questions.sort(() => 0.5 - Math.random()).slice(0, 3);
        randoms.forEach(obj => {
            const b = document.createElement('button');
            b.textContent = obj.q;
            b.onclick = () => {
                document.getElementById('step-select-q').classList.add('hidden');
                document.getElementById('step-select-a').classList.remove('hidden');
                const alist = document.getElementById('a-list');
                alist.innerHTML = "";
                obj.a.forEach((opt, idx) => {
                    const ab = document.createElement('button');
                    ab.className = "option-btn";
                    ab.textContent = opt;
                    ab.onclick = () => {
                        update(ref(db, 'rooms/' + room), {
                            state: 'active',
                            currentQ: obj.q,
                            options: obj.a,
                            correct: idx
                        });
                        document.getElementById('step-select-a').innerHTML = "<h3 class='waiting-dots'>Göndərildi. Cavab gözlənilir</h3>";
                    };
                    alist.appendChild(ab);
                });
            }
            div.appendChild(b);
        });
    }

    function submitAnswer(idx, correct) {
        let newScore = score;
        if(idx === correct) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#e91e8c', '#7c3aed'] });
            newScore += 5;
        } else {
            newScore -= 5;
        }
        update(ref(db, 'rooms/' + room), { state: 'waiting', score: newScore });
    }

    function switchScreen(oldID, newID) {
        document.getElementById(oldID).classList.add('hidden');
        const next = document.getElementById(newID);
        next.classList.remove('hidden');
        next.classList.add('active');
    }
</script>

</body>
</html>
