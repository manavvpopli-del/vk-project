<div id="gift-module" style="color: #2c3e50; font-family: 'Outfit', sans-serif; text-align: center; width: 100%; min-height: 100vh; background: #fafafa; padding: 20px 0;">
    
    <div style="max-width: 500px; margin: auto; padding: 0 20px;">
        <audio id="tick-sound"><source src="https://www.soundjay.com/misc/sounds/mechanical-clonk-1.mp3" type="audio/mpeg"></audio>
        <audio id="win-sound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg"></audio>

        <h2 style="font-weight: 300; letter-spacing: 6px; color: #b8860b; margin-bottom: 5px; text-transform: uppercase;">The Wishlist</h2>
        <div style="width: 40px; height: 1px; background: #b8860b; margin: 10px auto 20px;"></div>

        <div id="setup-area" style="background: #fff; border: 1px solid #eee; padding: 40px 20px; border-radius: 2px; margin-top: 30px;">
            <p style="font-size: 0.9rem; color: #555; margin-bottom: 25px;">Bəxtində olanı kəşf etməyə hazırsan?</p>
            <button onclick="prepareWheel()" style="padding: 15px 40px; border: 1px solid #b8860b; background: transparent; color: #b8860b; font-weight: 600; cursor: pointer; letter-spacing: 2px;">BAŞLA</button>
        </div>

        <div id="wheel-display" style="display: none; position: relative; width: 100%; max-width: 380px; margin: 40px auto; aspect-ratio: 1/1;">
            <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #b8860b; z-index: 100;"></div>
            
            <canvas id="wheel-canvas" width="400" height="400" style="width: 100%; height: 100%; border-radius: 50%; border: 1px solid #f1f1f1;"></canvas>
            
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: #fff; z-index: 101; border: 1px solid #eee; display: flex; align-items: center; justify-content: center;">
                <button id="spin-btn" onclick="spinNow()" style="width: 65px; height: 65px; border-radius: 50%; border: 1px solid #b8860b; background: #fff; color: #b8860b; font-weight: 900; font-size: 0.8rem; cursor: pointer;">SPIN</button>
                <div id="spun-msg" style="display: none; color: #b8860b; font-weight: 700; font-size: 0.7rem;">OK</div>
            </div>
        </div>

        <div id="result-card" style="display: none; margin-top: 40px; padding: 30px; background: #fff; border: 1px solid #eee; animation: fadeIn 1s;">
            <p style="color: #b8860b; font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; margin-bottom: 10px;">NƏTİCƏ</p>
            <h3 id="win-text" style="color: #2c3e50; font-size: 1.4rem; font-weight: 400; margin-bottom: 30px;"></h3>
            <button onclick="shareWhatsApp()" style="background: #25D366; color: white; border: none; padding: 18px; width: 100%; font-weight: 600; cursor: pointer;">WHATSAPP SHARE</button>
        </div>
    </div>
</div>

<script>
    const femaleGifts = ["GÜMÜŞ", "QIZIL", "GÜL BUKETİ", "STITCH", "AYICIQ", "İKİMİZ ÜÇÜN", "ROMANTİK", "AKSESUAR", "SAAT", "HƏDİYYƏ", "MAKIYAJ", "ŞİRNİYYAT", "MARKET", "KİTAB", "SƏN 😀", "PALTAR", "PARFÜM"];

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    let startAngle = 0;
    const segments = femaleGifts.length;
    const arc = Math.PI / (segments / 2);
    let spinTimeout = null;

    function drawWheel() {
        const size = canvas.width;
        const center = size / 2;
        ctx.clearRect(0,0,size,size);
        const colors = ["#ffffff", "#f9f9f9", "#f5f5f5"];
        
        for(let i = 0; i < segments; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, center - 2, angle, angle + arc, false);
            ctx.lineTo(center, center);
            ctx.fill();
            ctx.strokeStyle = "#eee";
            ctx.stroke();

            ctx.save();
            ctx.fillStyle = "#555";
            ctx.translate(center + Math.cos(angle + arc/2) * (center * 0.65), center + Math.sin(angle + arc/2) * (center * 0.65));
            ctx.rotate(angle + arc/2 + Math.PI / 2);
            ctx.font = "bold 12px Outfit";
            ctx.fillText(femaleGifts[i], -ctx.measureText(femaleGifts[i]).width / 2, 0);
            ctx.restore();
        }
    }

    function prepareWheel() {
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('wheel-display').style.display = 'block';
        drawWheel();
    }

    function spinNow() {
        // Əgər düyməyə basılanda fırlanmırsa, deməli burada ilişir
        if(localStorage.getItem('elite_wheel_spun') === 'true') {
            alert("Sən artıq şansını yoxlamısan!");
            return;
        }
        
        document.getElementById('spin-btn').style.display = 'none';
        document.getElementById('spun-msg').style.display = 'block';
        
        let spinAngleStart = Math.random() * 10 + 10;
        let spinTime = 0;
        let spinTimeTotal = 8000 + Math.random() * 3000;

        function rotate() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                const degrees = startAngle * 180 / Math.PI + 90;
                const arcd = arc * 180 / Math.PI;
                const index = Math.floor((360 - degrees % 360) / arcd);
                const result = femaleGifts[(index + segments) % segments];
                
                localStorage.setItem('elite_wheel_spun', 'true');
                localStorage.setItem('elite_wheel_result', result);
                
                document.getElementById('win-text').innerText = result;
                document.getElementById('result-card').style.display = 'block';
                document.getElementById('win-sound').play();
                return;
            }
            
            let spinAngle = spinAngleStart * (1 - spinTime / spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            
            // Səs effekti
            if(Math.floor(startAngle * 10) % 2 === 0) document.getElementById('tick-sound').play();
            
            requestAnimationFrame(rotate);
        }
        
        rotate();
    }

    // Əgər əvvəl fırladıbsa nəticəni birbaşa göstər
    window.onload = () => {
        if(localStorage.getItem('elite_wheel_spun') === 'true') {
            prepareWheel();
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('spun-msg').style.display = 'block';
            document.getElementById('win-text').innerText = localStorage.getItem('elite_wheel_result');
            document.getElementById('result-card').style.display = 'block';
        }
    };
</script>
