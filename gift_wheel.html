<div id="gift-module" style="color: #333; font-family: 'Outfit', sans-serif; text-align: center; padding: 20px; background: white; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
    <audio id="tick-sound"><source src="https://www.soundjay.com/misc/sounds/mechanical-clonk-1.mp3" type="audio/mpeg"></audio>
    <audio id="win-sound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg"></audio>

    <h2 style="font-family: 'Outfit'; color: #ff477e; font-weight: 900; margin-bottom: 5px;">HƏDİYYƏ ÇARXI</h2>
    <p style="color: #888; font-size: 0.8rem; margin-bottom: 25px;">Sevgilin üçün ən gözəl sürprizi bəlirlə!</p>

    <div id="setup-area" style="margin-bottom: 20px; animation: fadeIn 0.5s;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <select id="gender-select" style="padding:15px; border:2px solid #ffecf2; border-radius:15px; outline:none; font-family:'Outfit'; font-weight:600; color:#555;">
                <option value="female">Onun üçün (Xanım) 🌸</option>
                <option value="male">Onun üçün (Bəy) 👔</option>
            </select>
            <select id="event-select" style="padding:15px; border:2px solid #ffecf2; border-radius:15px; outline:none; font-family:'Outfit'; font-weight:600; color:#555;">
                <option value="birthday">Ad Günü 🎉</option>
                <option value="14feb">14 Fevral ❤️</option>
                <option value="8march">8 Mart 💐</option>
                <option value="anniversary">İl Dönümü ✨</option>
            </select>
            <button onclick="prepareWheel()" style="padding:18px; border-radius:15px; border:none; background: linear-gradient(135deg, #ff477e, #ff8fa3); color:white; font-weight:900; cursor:pointer; font-size: 1rem;">DAVAM ET</button>
        </div>
    </div>

    <div id="wheel-display" style="display: none; position: relative; margin: 20px auto; width: 320px; height: 320px;">
        <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff477e; z-index: 100;"></div>
        <canvas id="wheel-canvas" width="320" height="320" style="border-radius: 50%; border: 10px solid #fff; box-shadow: 0 15px 50px rgba(255, 71, 126, 0.2);"></canvas>
        <button id="spin-btn" onclick="spinNow()" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border-radius: 50%; border: none; background: #fff; color: #ff477e; font-weight: 900; cursor: pointer; z-index: 101; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">ÇEVİR</button>
    </div>

    <div id="result-card" style="display: none; margin-top: 20px; padding: 25px; background: #fff9fb; border-radius: 25px; border: 2px solid #ffecf2; animation: bounceIn 0.8s;">
        <h4 style="color: #ff477e; margin-bottom: 10px;">Günün Şanslı Hədiyyəsi:</h4>
        <h3 id="win-text" style="color: #333; font-size: 1.5rem; margin-bottom: 20px;"></h3>
        
        <input type="text" id="custom-gift" placeholder="Öz hədiyyəni bura yaz..." style="width: 100%; padding: 15px; border: 2px solid #ffecf2; border-radius: 12px; text-align: center; margin-bottom: 15px; outline: none; color: #555;">
        
        <button onclick="shareWhatsApp()" style="background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <i class="fab fa-whatsapp"></i> WhatsApp-da Paylaş
        </button>
    </div>
</div>

<script>
    const giftPool = {
        female: {
            "birthday": ["Smart Saat", "Qızıl Qolbaq", "Parfüm Seti", "Dəri Çanta", "SPA Seansı", "Portret Tablo", "Zərif Üzük", "Foto Albom", "Kosmetika", "Sürpriz Səyahət"],
            "14feb": ["101 Qızılgül", "Şam Yeməyi", "Gümüş Boyunbağı", "Şokolad Qutusu", "Yumşaq Ayı", "Xatirə Qutusu", "Cütlük Qolbağı", "Ətir", "Ürək Tablo", "Pendant"],
            "8march": ["Böyük Buket", "Brend Çanta", "Dyson Fen", "Qızıl Sırğa", "Makiyaj Seti", "Hədiyyə Kartı", "Zərgərlik", "İpək Şarf", "Mətbəx Aksesuarı", "İstirahət Turu"],
            "anniversary": ["Qızıl Üzük", "Romantik Tur", "Şam Yeməyi", "Video Çarx", "Canvas Tablo", "Cütlük Saatı", "Brilliant", "Özəl Hədiyyə", "SPA", "Otel Gecəsi"]
        },
        male: {
            "birthday": ["Dəri Cüzdan", "Qol Saatı", "PlayStation 5", "AirPods", "Klassik Kəmər", "İdman Forması", "Gaming Kreslo", "Parfüm", "Powerbank", "Kitab Seti"]
        }
    };

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    let currentGifts = [];
    let startAngle = 0;
    const arc = Math.PI / 5;
    let spinTimeout = null;
    let spinAngleStart = 0;
    let spinTime = 0;
    let spinTimeTotal = 0;
    let wheelResult = "";

    function prepareWheel() {
        const gen = document.getElementById('gender-select').value;
        const ev = document.getElementById('event-select').value;
        currentGifts = giftPool[gen][ev] || giftPool[gen]["birthday"];
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('wheel-display').style.display = 'block';
        drawWheel();
    }

    function drawWheel() {
        ctx.clearRect(0,0,320,320);
        const colors = ["#ff4d6d", "#ff758f", "#ff8fa3", "#ffb3c1", "#ffccd5", "#fff0f3", "#ff4d6d", "#ff758f", "#ff8fa3", "#ffb3c1"];
        for(let i = 0; i < 10; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = colors[i];
            ctx.beginPath();
            ctx.moveTo(160, 160);
            ctx.arc(160, 160, 150, angle, angle + arc, false);
            ctx.lineTo(160, 160);
            ctx.fill();
            ctx.save();
            ctx.fillStyle = (i > 4) ? "#ff477e" : "white";
            ctx.translate(160 + Math.cos(angle + arc/2) * 100, 160 + Math.sin(angle + arc/2) * 100);
            ctx.rotate(angle + arc/2 + Math.PI/2);
            ctx.font = "bold 10px Outfit";
            const text = currentGifts[i];
            ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
            ctx.restore();
        }
    }

    function spinNow() {
        document.getElementById('spin-btn').disabled = true;
        spinAngleStart = Math.random() * 10 + 10;
        spinTime = 0;
        spinTimeTotal = 7000 + Math.random() * 3000; // 7-10 saniyə
        rotateWheel();
    }

    function rotateWheel() {
        spinTime += 30;
        if(spinTime >= spinTimeTotal) {
            stopRotateWheel();
            return;
        }
        const spinAngle = spinAngleStart - (spinTime / spinTimeTotal * spinAngleStart);
        startAngle += (spinAngle * Math.PI / 180);
        drawWheel();
        if(Math.floor(startAngle * 10) % 2 === 0) document.getElementById('tick-sound').play();
        spinTimeout = setTimeout(rotateWheel, 30);
    }

    function stopRotateWheel() {
        clearTimeout(spinTimeout);
        const degrees = startAngle * 180 / Math.PI + 90;
        const arcd = arc * 180 / Math.PI;
        const index = Math.floor((360 - degrees % 360) / arcd);
        wheelResult = currentGifts[(index + 10) % 10];
        document.getElementById('win-sound').play();
        document.getElementById('win-text').innerText = wheelResult;
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('spin-btn').disabled = false;
    }

    function shareWhatsApp() {
        const custom = document.getElementById('custom-gift').value.trim();
        const gift = custom !== "" ? custom : wheelResult;
        const msg = `Mənim Hədiyyə Çarxımda sənin üçün bu çıxdı: ${gift}! 🎁❤️`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
    }
</script>
