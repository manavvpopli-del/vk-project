<div id="gift-module" style="color: #2c3e50; font-family: 'Outfit', sans-serif; text-align: center; width: 100%; min-height: 100vh; background: #fafafa; padding: 20px 0; position: relative; overflow-x: hidden;">
    
    <div style="max-width: 500px; margin: auto; padding: 0 20px;">
        <audio id="tick-sound"><source src="https://www.soundjay.com/misc/sounds/mechanical-clonk-1.mp3" type="audio/mpeg"></audio>
        <audio id="win-sound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg"></audio>

        <h2 style="font-weight: 300; letter-spacing: 6px; color: #b8860b; margin-bottom: 5px; text-transform: uppercase;">The Wishlist</h2>
        <div style="width: 40px; height: 1px; background: #b8860b; margin: 10px auto 20px;"></div>
        <p style="color: #888; font-size: 0.8rem; letter-spacing: 1px;">Sənin üçün özəl seçilmiş şans çarxı</p>

        <div id="setup-area" style="background: #fff; border: 1px solid #eee; padding: 40px 20px; border-radius: 2px; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);">
            <p style="font-size: 0.9rem; color: #555; line-height: 1.6; margin-bottom: 25px;">17 fərqli istək bir çarxda birləşdi.<br>Bəxtində olanı kəşf etməyə hazırsan?</p>
            <button onclick="prepareWheel()" style="padding: 15px 40px; border: 1px solid #b8860b; background: transparent; color: #b8860b; font-weight: 600; cursor: pointer; letter-spacing: 2px; transition: 0.4s;">BAŞLA</button>
        </div>

        <div id="wheel-display" style="display: none; position: relative; width: 100%; max-width: 380px; margin: 40px auto;">
            <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #b8860b; z-index: 100;"></div>
            
            <canvas id="wheel-canvas" style="width: 100%; height: 100%; border-radius: 50%; border: 1px solid #f1f1f1;"></canvas>
            
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: #fff; z-index: 101; border: 1px solid #eee; display: flex; align-items: center; justify-content: center;">
                <button id="spin-btn" onclick="spinNow()" style="width: 60px; height: 60px; border-radius: 50%; border: 1px solid #b8860b; background: #fff; color: #b8860b; font-weight: 900; font-size: 0.7rem; cursor: pointer; letter-spacing: 1px;">SPIN</button>
                <div id="spun-msg" style="display: none; color: #b8860b; font-weight: 700; font-size: 0.65rem; letter-spacing: 1px;">SEÇİLDİ</div>
            </div>
        </div>

        <div id="result-card" style="display: none; margin-top: 40px; padding: 30px; background: #fff; border: 1px solid #eee; animation: fadeIn 1s;">
            <p style="color: #b8860b; font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; margin-bottom: 10px;">NƏTİCƏ</p>
            <h3 id="win-text" style="color: #2c3e50; font-size: 1.4rem; font-weight: 400; margin-bottom: 30px;"></h3>
            
            <input type="text" id="custom-gift" placeholder="Arzunu bura qeyd et..." style="width: 100%; padding: 15px; background: #fafafa; border: 1px solid #eee; color: #333; margin-bottom: 20px; text-align: center; outline: none; font-family: 'Outfit';">
            
            <button onclick="shareWhatsApp()" style="background: #25D366; color: white; border: none; padding: 18px; width: 100%; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; letter-spacing: 1px;">
                <i class="fab fa-whatsapp"></i> SEVGİLİNƏ GÖNDƏR
            </button>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    canvas { transition: transform 0.1s ease; }
</style>

<script>
    const femaleGifts = [
        "GÜMÜŞ", "QIZIL", "GÜL BUKETİ", "STITCH", "AYICIQ", "İKİMİZ ÜÇÜN", 
        "ROMANTİK", "AKSESUAR", "SAAT", "HƏDİYYƏ", "MAKIYAJ", "ŞİRNİYYAT", 
        "MARKET", "KİTAB", "SƏN 😀", "PALTAR", "PARFÜM"
    ];

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    let startAngle = 0;
    const segments = femaleGifts.length;
    const arc = Math.PI / (segments / 2);
    let spinTimeout = null;
    let spinAngleStart = 0;
    let spinTime = 0;
    let spinTimeTotal = 0;
    let wheelResult = "";

    function setupCanvas() {
        const size = 800; // Yüksək keyfiyyət üçün böyük ölçü
        canvas.width = size;
        canvas.height = size;
        drawWheel();
    }

    function drawWheel() {
        const size = canvas.width;
        const center = size / 2;
        ctx.clearRect(0,0,size,size);
        
        const colors = ["#ffffff", "#fcfcfc", "#f9f9f9"]; // Çox zərif keçidlər
        
        for(let i = 0; i < segments; i++) {
            const angle = startAngle + i * arc;
            
            // Sektorun fonu
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, center - 2, angle, angle + arc, false);
            ctx.lineTo(center, center);
            ctx.fill();
            
            // Sektor xətləri (Qızılı və incə)
            ctx.strokeStyle = "#eee";
            ctx.lineWidth = 1;
            ctx.stroke();

            // Yazılar
            ctx.save();
            ctx.fillStyle = "#555";
            ctx.translate(center + Math.cos(angle + arc/2) * (center * 0.65), center + Math.sin(angle + arc/2) * (center * 0.65));
            ctx.rotate(angle + arc/2 + Math.PI / 2);
            
            // Yazını dik və oxunaqlı etmək
            ctx.font = "300 16px Outfit";
            const text = femaleGifts[i];
            ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
            ctx.restore();
        }
    }

    function prepareWheel() {
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('wheel-display').style.display = 'block';
        setupCanvas();
    }

    function spinNow() {
        if(localStorage.getItem('elite_wheel_spun') === 'true') return;
        
        document.getElementById('spin-btn').style.display = 'none';
        document.getElementById('spun-msg').style.display = 'block';
        localStorage.setItem('elite_wheel_spun', 'true');

        spinAngleStart = Math.random() * 10 + 25;
        spinTime = 0;
        spinTimeTotal = 11000 + Math.random() * 2000; // 11-13 saniyə
        rotateWheel();
    }

    function rotateWheel() {
        spinTime += 30;
        if(spinTime >= spinTimeTotal) {
            stopRotateWheel();
            return;
        }
        const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
        startAngle += (spinAngle * Math.PI / 180);
        drawWheel();
        
        if(Math.floor(startAngle * 12) % 2 === 0) {
            const tick = document.getElementById('tick-sound');
            tick.currentTime = 0;
            tick.play().catch(()=>{});
        }
        spinTimeout = setTimeout(rotateWheel, 30);
    }

    function stopRotateWheel() {
        const degrees = startAngle * 180 / Math.PI + 90;
        const arcd = arc * 180 / Math.PI;
        const index = Math.floor((360 - degrees % 360) / arcd);
        wheelResult = femaleGifts[(index + segments) % segments];
        
        localStorage.setItem('elite_wheel_result', wheelResult);
        document.getElementById('win-sound').play().catch(()=>{});
        document.getElementById('win-text').innerText = wheelResult;
        document.getElementById('result-card').style.display = 'block';
    }

    function easeOut(t, b, c, d) {
        const ts = (t /= d) * t;
        const tc = ts * t;
        return b + c * (tc + -3 * ts + 3 * t);
    }

    function shareWhatsApp() {
        const custom = document.getElementById('custom-gift').value.trim();
        const gift = custom !== "" ? custom : wheelResult;
        const msg = `Bax, şans çarxını fırlatdım və bəxtimə bu çıxdı: ${gift}! Mənə bunu alarsan? 🥺👉👈`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
    }

    // Yaddaşı yoxla
    if(localStorage.getItem('elite_wheel_spun') === 'true') {
        window.onload = () => {
            prepareWheel();
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('spun-msg').style.display = 'block';
            const res = localStorage.getItem('elite_wheel_result');
            if(res) {
                document.getElementById('win-text').innerText = res;
                document.getElementById('result-card').style.display = 'block';
                wheelResult = res;
            }
        };
    }
</script>
