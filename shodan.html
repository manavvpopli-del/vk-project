<div id="shodan-module" style="color: #00dfff; font-family: 'Courier New', monospace; padding: 20px; background: #050505; border: 1px solid #00dfff; border-radius: 15px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-satellite-dish" style="font-size: 3rem; color: #00dfff;"></i>
        <h3 style="font-family: 'Syncopate'; margin-top: 15px; font-size: 0.8rem;">GLOBAL IoT DISCOVERY</h3>
    </div>
    
    <input type="text" id="shodan-query" placeholder="Məs: country:AZ port:80" 
        style="width: 100%; padding: 15px; background: #000; border: 1px solid #00dfff; color: #fff; border-radius: 8px; outline: none; margin-bottom: 15px;">
    
    <button onclick="searchIoT()" id="shodan-btn" 
        style="width: 100%; padding: 18px; background: #00dfff; color: #000; font-weight: 900; border: none; border-radius: 10px; cursor: pointer;">
        EXECUTE SEARCH
    </button>

    <div id="shodan-results" style="margin-top: 20px; height: 350px; overflow-y: auto; font-size: 0.7rem; border-top: 1px solid #003355; padding-top: 10px;">
        <div id="inner-logs" style="color: #555; margin-bottom: 10px;">[SYSTEM]: Awaiting signal...</div>
        <div id="data-container"></div>
    </div>
</div>

<script>
    async function searchIoT() {
        const query = document.getElementById('shodan-query').value.trim();
        if(!query) return alert("Sorgu daxil edin!");

        const btn = document.getElementById('shodan-btn');
        const logs = document.getElementById('inner-logs');
        const container = document.getElementById('data-container');
        
        btn.disabled = true;
        btn.innerText = "BYPASSING CORS...";
        logs.innerHTML = "[INFO]: Proxy zənciri qurulur...";
        container.innerHTML = "";

        // CORS xətasını aşmaq üçün Proxy servisi
        const proxy = "https://api.allorigins.win/get?url=";
        const target = encodeURIComponent(`https://api.shodan.io/shodan/host/search?key=LVwrK76ElskFhsqi3QQ5gCGZvOO6ohth&query=${query}`);

        try {
            const response = await fetch(proxy + target);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents); // AllOrigins datanı "contents" daxilində qaytarır

            if(data.matches && data.matches.length > 0) {
                logs.innerHTML = `[SUCCESS]: ${data.matches.length} cihaz tapıldı.`;
                data.matches.forEach(item => {
                    container.innerHTML += `
                        <div style="background:#0a0a0f; padding:12px; border:1px solid #111; border-left:3px solid #00dfff; border-radius:8px; margin-bottom:10px;">
                            <b style="color:#fff;">IP: ${item.ip_str}:${item.port}</b><br>
                            <span style="color:#00ff00;">${item.location.country_name} / ${item.location.city || 'N/A'}</span><br>
                            <small style="color:#666;">ISP: ${item.isp}</small>
                            <button onclick="window.open('http://${item.ip_str}:${item.port}')" 
                                style="margin-top:8px; width:100%; padding:5px; background:transparent; border:1px solid #444; color:#aaa; font-size:10px; cursor:pointer;">
                                GO TO PANEL
                            </button>
                        </div>`;
                });
            } else {
                logs.innerHTML = "[X] Heç bir nəticə tapılmadı.";
            }
        } catch (e) {
            logs.innerHTML = "[!] XƏTA: API limiti dolub və ya Shodan cavab vermir.";
            console.error(e);
        }
        
        btn.disabled = false;
        btn.innerText = "EXECUTE SEARCH";
    }
</script>
