<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerowallet - Ödəniş Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .pay-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 20px; border: 1px solid #4f46e5; max-width: 400px; margin: auto; }
        .info { margin-bottom: 20px; padding: 15px; background: #1e293b; border-radius: 10px; }
        input[type="file"] { margin: 20px 0; display: block; width: 100%; }
        .btn { background: #4f46e5; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn:disabled { background: #334155; cursor: not-allowed; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="pay-card">
        <h2>Ödəniş Təsdiqi</h2>
        <div class="info">
            <p>Seçilən Paket: <b id="pkg-name" style="color:#10b981">...</b></p>
            <p>Məbləğ: <b id="pkg-price" style="color:#10b981">...</b> AZN</p>
        </div>

        <p style="font-size: 0.8rem; color: #94a3b8;">M10/Kart ilə ödəniş etdikdən sonra çekin şəklini (screenshot) bura yükləyin:</p>
        
        <input type="file" id="receipt-input" accept="image/*" onchange="previewImg(this)">
        <img id="preview" alt="Önizləmə">

        <button id="send-btn" class="btn" onclick="uploadReceipt()">ÇEKİ GÖNDƏR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        // URL-dən məlumatları alırıq
        const params = new URLSearchParams(window.location.search);
        const pkg = params.get('package');
        const price = params.get('amount');

        document.getElementById('pkg-name').innerText = pkg + " Pack";
        document.getElementById('pkg-price').innerText = price;

        function previewImg(input) {
            const preview = document.getElementById('preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadReceipt() {
            const fileInput = document.getElementById('receipt-input');
            const btn = document.getElementById('send-btn');

            if (!fileInput.files[0]) return alert("Zəhmət olmasa çeki seçin!");

            btn.disabled = true;
            btn.innerText = "GÖNDƏRİLİR...";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                const base64Image = e.target.result; // Şəkli string olaraq bazaya atırıq (Storage ehtiyac qalmır)
                
                const receiptData = {
                    username: user,
                    rocket_type: pkg,
                    receipt_url: base64Image,
                    timestamp: Date.now()
                };

                try {
                    await db.ref('admin_receipts').push(receiptData);
                    alert("Çek uğurla göndərildi! Admin təsdiqindən sonra paket aktivləşəcək.");
                    location.href = "main.html";
                } catch (error) {
                    alert("Xəta baş verdi, yenidən yoxlayın.");
                    btn.disabled = false;
                    btn.innerText = "ÇEKİ GÖNDƏR";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
