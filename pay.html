<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet | Təhlükəsiz Ödəniş</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4f46e5; --bg: #0f172a; --pasha: #8d1b1b; }
        body { background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .pay-container { background: #1e293b; width: 100%; max-width: 400px; padding: 25px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .card-box { 
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); 
            padding: 25px; border-radius: 20px; margin: 20px 0; 
            border: 1px solid rgba(255,255,255,0.1); position: relative;
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .card-box::before {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 200px; height: 200px; background: rgba(79, 70, 229, 0.1);
            border-radius: 50%; z-index: 0;
        }

        .bank-logo { width: 100px; margin-bottom: 15px; position: relative; z-index: 1; }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #fcd34d, #b45309); border-radius: 6px; margin-bottom: 20px; position: relative; z-index: 1; }
        
        .card-num { 
            font-family: 'Courier New', monospace; font-size: 1.4rem; 
            letter-spacing: 2px; font-weight: bold; color: #fff;
            position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between;
        }

        .upload-area { 
            border: 2px dashed rgba(255,255,255,0.1); padding: 30px 20px; 
            border-radius: 20px; margin-top: 25px; cursor: pointer; 
            transition: 0.3s; text-align: center; background: rgba(0,0,0,0.2);
        }
        .upload-area:hover { border-color: var(--accent); background: rgba(79, 70, 229, 0.05); }
        
        .btn-send { 
            width: 100%; background: #10b981; color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 1rem;
            margin-top: 25px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-send:active { transform: scale(0.98); }
        
        #preview { width: 100%; height: auto; max-height: 200px; object-fit: contain; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid rgba(255,255,255,0.1); }
        
        .status-badge { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="pay-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin:0">Ödəniş Təsdiqi</h3>
        <div class="status-badge">TƏHLÜKƏSİZ</div>
    </div>
    
    <p style="color:#94a3b8; font-size:0.9rem; margin-bottom: 20px;">
        <span id="p-name">Paket</span> seçildi. Zəhmət olmasa <b id="p-price" style="color:#10b981">0</b> <b>AZN</b> ödənişi aşağıdakı karta göndərib çeki yükləyin.
    </p>
    
    <div class="card-box">
        <img src="pasha.png" class="bank-logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/PASHA_Bank_logo.svg/2560px-PASHA_Bank_logo.svg.png'">
        <div class="chip"></div>
        <div class="card-num">
            <span id="copy-card">4449 9451 0421 0296</span>
            <i class="fas fa-copy" style="cursor:pointer; font-size: 1.1rem; color: #94a3b8;" onclick="copyCard()"></i>
        </div>
    </div>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('f-input').click()">
        <i class="fas fa-file-invoice-dollar" style="font-size:2.5rem; color:var(--accent); margin-bottom: 10px;"></i>
        <p style="margin:5px 0; font-weight: 700;">Çeki Yükləyin</p>
        <p style="margin:0; font-size:0.75rem; color:#64748b">Şəkli buraya toxunaraq seçin</p>
        <input type="file" id="f-input" hidden accept="image/*" onchange="handleImg(this)">
        <img id="preview">
    </div>

    <button id="send-btn" class="btn-send" onclick="sendToAdmin()">
        <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> TƏSDİQ ÜÇÜN GÖNDƏR
    </button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    const params = new URLSearchParams(window.location.search);
    const packageName = params.get('package') || "Standart";
    const amount = params.get('amount') || "0.00";
    
    document.getElementById('p-name').innerText = packageName + " Pack";
    document.getElementById('p-price').innerText = amount;

    function copyCard() {
        const num = "4449945104210296";
        const el = document.createElement('textarea');
        el.value = num;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Kart nömrəsi kopyalandı!");
    }

    function handleImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.querySelector('.fa-file-invoice-dollar').style.display = 'none';
                document.querySelectorAll('.upload-area p').forEach(p => p.style.display = 'none');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function sendToAdmin() {
        const file = document.getElementById('f-input').files[0];
        if(!file) return alert("Zəhmət olmasa çeki yükləyin!");
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GÖNDƏRİLİR...';

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                await db.ref('admin_receipts').push({
                    username: user,
                    rocket_type: packageName,
                    amount: amount,
                    receipt_url: e.target.result,
                    timestamp: Date.now()
                });
                alert("Ödəniş məlumatları uğurla göndərildi! Paketiniz qısa zamanda aktiv ediləcək.");
                location.href = "main.html";
            } catch (error) {
                alert("Xəta baş verdi, yenidən yoxlayın.");
                btn.disabled = false;
                btn.innerText = "TƏSDİQ ÜÇÜN GÖNDƏR";
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
