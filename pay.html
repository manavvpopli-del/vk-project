<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet Payment</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-box {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 1.2rem;
            position: relative;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .btn-upload {
            border: 2px dashed #6366f1;
            color: #94a3b8;
            background-color: transparent;
            padding: 30px 20px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        /* ƏSAS HƏLL: Görünməz real input düymənin tam üstündə olur */
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
            width: 100%;
        }
        #preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border: 2px solid #6366f1;
        }
        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-submit:disabled { background: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">Ödəniş Paneli</h2>
    
    <div class="card-box" id="card-div">
        <span id="card-no">4127 0000 0000 0000</span>
        <div onclick="copyText()" style="font-size: 0.7rem; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; margin-top: 10px; cursor: pointer;">KOPYALA</div>
    </div>

    <div class="upload-btn-wrapper">
        <button class="btn-upload" id="upload-label">
            <i class="fas fa-camera"></i><br>
            ÇEKİ SEÇ VƏ YA ŞƏKİL ÇƏK
        </button>
        <input type="file" name="myfile" id="file-input" accept="image/*" onchange="showPreview(event)">
    </div>

    <img id="preview">

    <button class="btn-submit" id="submit-btn" onclick="uploadToFirebase()">TƏSDİQLƏ</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    const KART_NOMRESI = "4127 1234 5678 9012";
    document.getElementById('card-no').innerText = KART_NOMRESI;

    function copyText() {
        navigator.clipboard.writeText(KART_NOMRESI.replace(/\s/g, ''));
        alert("Kopyalandı!");
    }

    function showPreview(event) {
        const file = event.target.files[0];
        if(file) {
            document.getElementById('upload-label').innerText = "Fayl: " + file.name;
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'inline-block';
            }
            reader.readAsDataURL(file);
        }
    }

    function uploadToFirebase() {
        const fileInput = document.getElementById('file-input');
        if(fileInput.files.length === 0) {
            alert("Çeki yükləmədiniz!");
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "YÜKLƏNİR...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            const data = {
                username: user,
                check: base64Image,
                date: new Date().toLocaleString(),
                status: 'pending'
            };

            db.ref('admin_withdrawals').push(data).then(() => {
                alert("Uğurla göndərildi!");
                window.location.href = "main.html";
            }).catch(err => {
                alert("Xəta baş verdi!");
                btn.disabled = false;
                btn.innerText = "TƏSDİQLƏ";
            });
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>

</body>
</html>
