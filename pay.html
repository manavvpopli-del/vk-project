<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet | Premium Checkout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --neon: #00f2ff;
            --grad: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .pay-container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        /* PREMIUM CARD DESIGN */
        .premium-card {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            transform: rotate(30deg);
        }

        .chip {
            width: 50px; height: 38px;
            background: linear-gradient(135deg, #d4af37, #f9e076);
            border-radius: 8px;
            margin-bottom: 30px;
            position: relative;
        }

        .card-number {
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: block;
            margin-bottom: 20px;
        }

        .card-holder {
            display: flex; justify-content: space-between;
            align-items: flex-end;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .copy-badge {
            background: var(--neon);
            color: black;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        /* UPLOAD SECTION */
        .upload-section {
            background: var(--glass);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 180px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .upload-section i { font-size: 3rem; color: #475569; margin-bottom: 10px; }
        
        #file-input {
            position: absolute; top:0; left:0; width:100%; height:100%;
            opacity:0; z-index: 100; cursor: pointer;
        }

        #preview-img {
            position: absolute; top:0; left:0; width:100%; height:100%;
            object-fit: cover; border-radius: 18px; display: none; z-index: 10;
        }

        /* BUTTONS */
        .btn-pay {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-pay:active { transform: scale(0.95); }
        .btn-pay:disabled { background: #475569; cursor: not-allowed; }

        #error-box {
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="pay-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="margin:0; font-size: 1.5rem;">ÖDƏNİŞ</h1>
        <p style="color: #64748b; font-size: 0.9rem;">Köçürməni edin və çeki yükləyin</p>
    </div>

    <div class="premium-card">
        <div class="chip"></div>
        <span class="card-number" id="card-text">4127 0000 0000 0000</span>
        <div class="card-holder">
            <div>
                <div style="font-size: 0.6rem; margin-bottom: 4px;">KART SAHİBİ</div>
                <div style="color: white;">ZEROWALLET LTD</div>
            </div>
            <div class="copy-badge" onclick="copyCard()">KOPYALA</div>
        </div>
    </div>

    <div class="upload-section" id="upload-box">
        <input type="file" id="file-input" accept="image/*" onchange="preview(this)">
        <i class="fas fa-receipt" id="icon-ui"></i>
        <span id="text-ui">Çeki bura əlavə et</span>
        <img id="preview-img">
    </div>
    
    <div id="error-box"><i class="fas fa-times-circle"></i> XƏTA: ÇEK YÜKLƏNMƏYİB!</div>

    <button class="btn-pay" id="send-btn" onclick="processPayment()">
        TƏSDİQLƏ
    </button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    const MY_CARD = "4127 9999 8888 7777"; // Bura öz kartını yaz
    document.getElementById('card-text').innerText = MY_CARD;

    function copyCard() {
        navigator.clipboard.writeText(MY_CARD.replace(/\s/g, ''));
        alert("Kart nömrəsi kopyalandı!");
    }

    function preview(input) {
        const file = input.files[0];
        const errorBox = document.getElementById('error-box');
        if (file) {
            errorBox.style.display = 'none';
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('icon-ui').style.display = 'none';
                document.getElementById('text-ui').innerText = "Dəyişmək üçün toxun";
            }
            reader.readAsDataURL(file);
        }
    }

    async function processPayment() {
        const fileInput = document.getElementById('file-input');
        const errorBox = document.getElementById('error-box');
        const btn = document.getElementById('send-btn');

        // Şəkil yüklənməyibsə dayandır
        if (!fileInput.files[0]) {
            errorBox.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerText = "GÖNDƏRİLİR...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            
            // Firebase-ə göndərmə
            const newRef = db.ref('admin_withdrawals').push();
            newRef.set({
                username: user || "Qonaq",
                check: base64Data,
                date: new Date().toLocaleString(),
                status: 'pending',
                id: newRef.key
            }).then(() => {
                alert("Ödəniş çeki uğurla göndərildi!");
                window.location.href = "main.html";
            }).catch((err) => {
                alert("Firebase Xətası: " + err.message);
                btn.disabled = false;
                btn.innerText = "TƏSDİQLƏ";
            });
        };

        // Faylı oxumağa başla
        try {
            reader.readAsDataURL(fileInput.files[0]);
        } catch (e) {
            alert("Fayl oxunarkən xəta: " + e.message);
            btn.disabled = false;
            btn.innerText = "TƏSDİQLƏ";
        }
    }
</script>
</body>
</html>
