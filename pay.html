<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Payment</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .card-info {
            width: 100%; max-width: 350px; background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center;
        }

        /* FAYL YÜKLƏMƏ SAHƏSİ - KONKRET HƏLL */
        .upload-box {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 150px;
            border: 3px dashed #475569;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e293b;
            overflow: hidden;
        }

        /* Bu input bütün upload-box-un üstünü örtür və görünməzdir */
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; /* Görünməz amma oradadır */
            z-index: 999; /* Hər şeyin ən üstündə */
            cursor: pointer;
        }

        .upload-content i { font-size: 40px; color: #6366f1; }
        
        #preview-img {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0; display: none; background: #1e293b;
        }

        .btn-send {
            width: 100%; max-width: 350px; padding: 15px; margin-top: 20px;
            border-radius: 15px; border: none; background: white; color: black;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card-info">
        <small>KÖÇÜRMƏ EDİLƏCƏK KART:</small>
        <h3 id="card-no" style="letter-spacing: 2px;">4127 0000 0000 0000</h3>
        <button onclick="copyCard()" style="background: rgba(0,0,0,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px;">Kopyala</button>
    </div>

    <div class="upload-box" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
        
        <div class="upload-content" id="upload-ui">
            <i class="fas fa-camera"></i>
            <p id="status-text">ÇEKİ SEÇİN</p>
        </div>
        
        <img id="preview-img">
    </div>

    <button class="btn-send" id="submit-btn" onclick="sendData()">ÖDƏNİŞİ TƏSDİQLƏ</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    function copyCard() {
        const num = "4127123456789012"; // Kart nömrənizi bura yazın
        navigator.clipboard.writeText(num);
        alert("Kopyalandı!");
    }

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('upload-ui').style.opacity = '0';
                document.getElementById('status-text').innerText = "Fayl seçildi";
            }
            reader.readAsDataURL(file);
        }
    }

    function sendData() {
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files[0]) {
            alert("Lütfən şəkil seçin!");
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "GÖNDƏRİLİR...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const paymentData = {
                username: user,
                check: e.target.result,
                date: new Date().toLocaleString(),
                status: 'pending'
            };

            db.ref('admin_withdrawals').push(paymentData).then(() => {
                alert("Uğurla göndərildi!");
                window.location.href = "main.html";
            }).catch(() => {
                alert("Xəta!");
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>
</body>
</html>
