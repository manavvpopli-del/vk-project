<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet | Təhlükəsiz Ödəniş</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4f46e5; --bg: #0f172a; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px; overflow: hidden;
        }
        
        .pay-container { 
            background: #1e293b; width: 100%; max-width: 400px; padding: 25px; 
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative;
        }
        
        /* Kart Dizaynı */
        .card-box { 
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); 
            padding: 25px; border-radius: 20px; margin: 20px 0; 
            border: 1px solid rgba(255,255,255,0.1); position: relative;
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .bank-logo { width: 110px; margin-bottom: 15px; position: relative; z-index: 1; filter: brightness(1.2); }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #fcd34d, #b45309); border-radius: 6px; margin-bottom: 20px; position: relative; z-index: 1; }
        
        .card-num { 
            font-family: 'Courier New', monospace; font-size: 1.4rem; 
            letter-spacing: 2px; font-weight: bold; color: #fff;
            display: flex; align-items: center; justify-content: space-between;
            position: relative; z-index: 1;
        }

        /* Yükləmə Sahəsi */
        .upload-area { 
            border: 2px dashed rgba(255,255,255,0.1); padding: 30px 20px; 
            border-radius: 20px; margin-top: 25px; cursor: pointer; 
            transition: 0.3s; text-align: center; background: rgba(0,0,0,0.2);
        }
        
        .error-shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        
        .btn-send { 
            width: 100%; background: #10b981; color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 1rem;
            margin-top: 25px; cursor: pointer; transition: 0.3s; 
        }

        #preview { width: 100%; height: auto; max-height: 150px; object-fit: contain; border-radius: 12px; margin-top: 10px; display: none; }

        /* Toast Bildirişi */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="pay-container">
    <h3 style="margin-top:0">Ödəniş Təsdiqi</h3>
    <p style="color:#94a3b8; font-size:0.9rem;">
        <span id="p-name" style="color:white; font-weight:bold;">Paket</span> seçildi. <b id="p-price" style="color:#10b981">0</b> <b>AZN</b> ödənişi karta göndərin:
    </p>
    
    <div class="card-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/PASHA_Bank_logo.svg/2560px-PASHA_Bank_logo.svg.png" class="bank-logo">
        <div class="chip"></div>
        <div class="card-num">
            <span>4449 9451 0421 0296</span>
            <i class="fas fa-copy" style="cursor:pointer; color:#94a3b8;" onclick="copyCard()"></i>
        </div>
    </div>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('f-input').click()">
        <i class="fas fa-file-invoice-dollar" style="font-size:2rem; color:var(--accent); margin-bottom:10px;"></i>
        <p id="up-text" style="margin:0; font-weight:700;">Çeki Yükləyin</p>
        <input type="file" id="f-input" hidden accept="image/*" onchange="handleImg(this)">
        <img id="preview">
    </div>

    <button id="send-btn" class="btn-send" onclick="sendToAdmin()">TƏSDİQ ÜÇÜN GÖNDƏR</button>
</div>

<div id="toast"><i class="fas fa-info-circle"></i> <span id="toast-msg"></span></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    const params = new URLSearchParams(window.location.search);
    document.getElementById('p-name').innerText = (params.get('package') || "Standart") + " Paket";
    document.getElementById('p-price').innerText = params.get('amount') || "0.00";

    function showToast(msg, color = "#ef4444") {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        toast.style.background = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyCard() {
        navigator.clipboard.writeText("4449945104210296");
        showToast("Kart nömrəsi kopyalandı!", "#4f46e5");
    }

    function handleImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('up-text').style.display = 'none';
                document.querySelector('.fa-file-invoice-dollar').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function sendToAdmin() {
        const file = document.getElementById('f-input').files[0];
        if(!file) {
            document.getElementById('drop-zone').classList.add('error-shake');
            showToast("Zəhmət olmasa əvvəlcə çeki yükləyin!");
            setTimeout(() => document.getElementById('drop-zone').classList.remove('error-shake'), 400);
            return;
        }
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = "GÖNDƏRİLİR...";

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                await db.ref('admin_receipts').push({
                    username: user || "Naməlum",
                    rocket_type: params.get('package'),
                    amount: params.get('amount'),
                    receipt_url: e.target.result,
                    timestamp: Date.now()
                });
                showToast("Çek göndərildi! Aktivasiya gözlənilir.", "#10b981");
                setTimeout(() => location.href = "main.html", 2000);
            } catch (err) {
                showToast("Xəta baş verdi!");
                btn.disabled = false;
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
