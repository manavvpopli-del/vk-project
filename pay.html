<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Payment Gateway | Zerowallet</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bank-blue: #1a237e;
            --bank-gold: #c5a059;
            --success: #2e7d32;
            --error: #d32f2f;
            --text: #333;
        }

        body {
            background-color: #f4f7f6;
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            margin: 15px;
        }

        /* Üst Header */
        .gateway-header {
            background: var(--bank-blue);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .gateway-header img { width: 40px; margin-bottom: 5px; }
        .gateway-header h2 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .secure-tag {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }

        .main-content { padding: 25px; }

        /* Kart Sahəsi */
        .payment-details {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .label { color: #757575; }
        .value { font-weight: 700; color: #1a237e; }

        .card-display {
            background: #222;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            position: relative;
            background: linear-gradient(135deg, #333 0%, #000 100%);
        }

        .copy-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--bank-gold);
        }

        /* Yükləmə Sahəsi */
        .upload-zone {
            position: relative;
            border: 2px dashed #b0bec5;
            border-radius: 10px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-zone:hover { border-color: var(--bank-blue); background: #f0f4f8; }

        #file-input {
            position: absolute; top:0; left:0; width:100%; height:100%;
            opacity:0; z-index: 5; cursor: pointer;
        }

        #preview-img {
            position: absolute; width: 100%; height: 100%;
            object-fit: contain; background: white; display: none; z-index: 4;
        }

        /* Düymə və Xəta */
        .btn-pay {
            width: 100%;
            background: var(--bank-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-pay:hover { background: #0d1440; }
        .btn-pay:disabled { background: #9e9e9e; cursor: not-allowed; }

        .error-msg {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            opacity: 0.5;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="checkout-wrapper">
    <div class="gateway-header">
        <i class="fas fa-university" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
        <h2>Zerowallet Payment System</h2>
        <div class="secure-tag"><i class="fas fa-lock"></i> 256-bit SSL Təhlükəsizlik</div>
    </div>

    <div class="main-content">
        <div class="payment-details">
            <div class="info-row">
                <span class="label">Məbləğ:</span>
                <span class="value" style="font-size: 1.1rem; color: var(--success);">3.00 AZN</span>
            </div>
            <div class="info-row">
                <span class="label">Mağaza:</span>
                <span class="value">ZEROWALLET_TOPUP</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
            <span class="label" style="font-size: 0.75rem;">QƏBULEDİCİ KART NÖMRƏSİ:</span>
            <div class="card-display">
                <span id="card-num" style="letter-spacing: 2px;">4127 0000 0000 0000</span>
                <i class="fas fa-copy copy-icon" onclick="copyCard()"></i>
            </div>
        </div>

        <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Ödəniş qəbzini (çekini) buraya yükləyin:</p>
        
        <div class="upload-zone" id="drop-area">
            <input type="file" id="file-input" accept="image/*" onchange="previewFile(this)">
            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #b0bec5;"></i>
            <span id="upload-status" style="font-size: 0.85rem; color: #78909c; margin-top: 5px;">Fayl seçin</span>
            <img id="preview-img">
        </div>

        <div id="err-text" class="error-msg">Zəhmət olmasa, çeki əlavə edin!</div>

        <button class="btn-pay" id="confirm-btn" onclick="submitPayment()">ÖDƏNİŞİ TAMAMLA</button>

        <div class="footer-logos">
            <i class="fab fa-cc-visa"></i>
            <i class="fab fa-cc-mastercard"></i>
            <i class="fas fa-shield-alt"></i>
        </div>
        <p style="text-align:center; font-size: 0.65rem; color: #999; margin-top: 15px;">© 2026 Zerowallet Security. Bütün hüquqlar qorunur.</p>
    </div>
</div>

<script>
    // Firebase Başlatma
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    // Kart məlumatı
    const CARD_ID = "4127 1234 5678 9012";
    document.getElementById('card-num').innerText = CARD_ID;

    function copyCard() {
        navigator.clipboard.writeText(CARD_ID.replace(/\s/g, ''));
        alert("Kart nömrəsi kopyalandı!");
    }

    function previewFile(input) {
        const file = input.files[0];
        const err = document.getElementById('err-text');
        if (file) {
            err.style.display = 'none';
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('upload-status').innerText = "Dəyişmək üçün toxun";
            }
            reader.readAsDataURL(file);
        }
    }

    async function submitPayment() {
        const fileInput = document.getElementById('file-input');
        const err = document.getElementById('err-text');
        const btn = document.getElementById('confirm-btn');

        // Şəkil yüklənməyibsə xəta ver
        if (!fileInput.files[0]) {
            err.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerText = "SİSTEMƏ GÖNDƏRİLİR...";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Data = e.target.result;
            
            try {
                const newRef = db.ref('admin_withdrawals').push();
                await newRef.set({
                    username: user || "Qonaq",
                    check: base64Data,
                    date: new Date().toLocaleString(),
                    status: 'pending',
                    type: 'deposit'
                });
                
                alert("Məlumatlar uğurla sistemə daxil edildi. Admin təsdiqi gözlənilir.");
                window.location.href = "main.html";
            } catch (error) {
                alert("Bağlantı xətası: " + error.message);
                btn.disabled = false;
                btn.innerText = "ÖDƏNİŞİ TAMAMLA";
            }
        };

        reader.readAsDataURL(fileInput.files[0]);
    }
</script>

</body>
</html>
