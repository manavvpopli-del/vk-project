<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <!-- Font Awesome ikonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Ümumi Sazlamalar */
        :root {
            --bg-color: #fafafa;
            --white: #ffffff;
            --border-color: #dbdbdb;
            --link-blue: #0095f6;
            --text-color: #262626;
            --secondary-text: #8e8e8e;
            --facebook-blue: #385185;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 30px;
        }

        .container {
            width: 100%;
            max-width: 350px;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* 1. Login Qutusu */
        .login-box {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Instagram Logosu */
        .app-title {
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            height: 51px; /* Orijinal Instagram logosunun hündürlüyü */
        }

        .app-title img {
            width: 175px;
            max-width: 100%;
            object-fit: contain;
        }

        /* Form Elementləri */
        input {
            width: 100%;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 9px 8px 7px;
            font-size: 12px;
            line-height: 18px;
            color: var(--text-color);
            outline: none;
            margin-bottom: 6px;
        }

        input:focus {
            border: 1px solid var(--text-color);
        }

        .password-container {
            position: relative;
        }

        .show-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            display: none;
        }

        /* Log In Düyməsi */
        .btn-login {
            width: 100%;
            background-color: var(--link-blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0;
            transition: background-color 0.2s;
        }

        .btn-login:disabled {
            background-color: #b2dffc;
            cursor: default;
        }

        .btn-login:hover:not(:disabled) {
            background-color: #1877f2;
        }

        /* Ayırıcı (OR) */
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--secondary-text);
            font-size: 13px;
            font-weight: 600;
        }

        .line {
            flex-grow: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .or-text {
            margin: 0 15px;
            text-transform: uppercase;
        }

        /* Facebook Linki */
        .fb-login {
            color: var(--facebook-blue);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .fb-login i {
            font-size: 16px;
        }

        .forgot-password {
            font-size: 12px;
            color: var(--facebook-blue);
            text-decoration: none;
            margin-top: 12px;
            display: inline-block;
        }

        /* 2. Qeydiyyat Qutusu */
        .signup-box {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            padding: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        /* Tətbiq Endirmə hissəsi */
        .get-app {
            margin-top: 20px;
            text-align: center;
            display: none; /* Mobildə gizli */
        }

        @media (min-width: 450px) and (min-height: 700px) {
            .get-app {
                display: block;
            }
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .store-images {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .store-images img {
            height: 40px;
            cursor: pointer;
        }

        /* Toast Bildirişi */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #262626;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="login-box">
            <!-- Instagram Logosu (Şəkil kimi) -->
            <h1 class="app-title">
                <img src="https://i.postimg.cc/d0JbSVLG/Instagram-2018-Logo-Vector-svg.png" alt="𝐈𝐍𝐒𝐓𝐀𝐆𝐑𝐀𝐌">
            </h1>
            
            <form id="loginForm">
                <input type="text" id="username" placeholder="Telefon nömrəsi, istifadəçi adı və ya e-poçt" required autocomplete="username">
                
                <div class="password-container">
                    <input type="password" id="password" placeholder="Şifrə" required autocomplete="current-password">
                    <i class="fa-regular fa-eye show-password" id="togglePassword"></i>
                </div>

                <button type="submit" class="btn-login" id="loginBtn" disabled>Daxil ol</button>

                <div class="separator">
                    <div class="line"></div>
                    <div class="or-text">və ya</div>
                    <div class="line"></div>
                </div>

                <div class="fb-login">
                    <i class="fab fa-facebook-square"></i>
                    Facebook ilə daxil ol
                </div>

                <a href="#" class="forgot-password" onclick="showToast('Şifrə bərpa funksiyası demo rejimindədir.')">Giriş məlumatlarınızı unutdunuzmu? Kömək alın.</a>
            </form>
        </main>

        <section class="signup-box">
            Hesabınız yoxdur? <a href="#">Qeydiyyatdan keçin</a>
        </section>

        <div class="get-app">
            <p>Tətbiqi endirin.</p>
            <div class="store-images">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yt/r/Yfc020c87j0.png" alt="App Store">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Google Play">
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Bildiriş</div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const togglePassword = document.getElementById('togglePassword');
        const toast = document.getElementById('toast');

        function checkInputs() {
            if (usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
                loginBtn.removeAttribute('disabled');
            } else {
                loginBtn.setAttribute('disabled', 'true');
            }
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        passwordInput.addEventListener('input', function() {
            togglePassword.style.display = this.value.length > 0 ? 'block' : 'none';
        });

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            loginBtn.innerText = 'Daxil olunur...';
            loginBtn.style.opacity = '0.7';
            setTimeout(() => {
                showToast('Demo: Giriş uğurlu!');
                loginBtn.innerText = 'Daxil ol';
                loginBtn.style.opacity = '1';
            }, 1500);
        });

        document.querySelector('.fb-login').addEventListener('click', function() {
            showToast('Demo: Facebook pəncərəsi açılardı.');
        });

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
