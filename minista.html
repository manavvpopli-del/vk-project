<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instagram Giriş</title>
<!-- Google Fonts ilə Roboto şriftini əlavə edirik -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
<style>
  body {
    background-color: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Roboto', Arial, sans-serif;
  }
  .login-container {
    width: 350px;
    background-color: #fff;
    border: 1px solid #dbdbdb;
    padding: 40px 40px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border-radius: 4px;
  }
  .logo {
    display: block;
    margin: 0 auto 20px auto;
    width: 175px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 8px 0;
    margin: 8px 0;
    border: 1px solid #dbdbdb;
    background: #fafafa;
    border-radius: 3px;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 14px;
    outline: none;
  }
  button {
    width: 100%;
    padding: 8px 0;
    margin: 8px 0;
    background-color: #3897f0;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: 'Roboto', Arial, sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover {
    background-color: #3182f6;
  }
  .divider {
    text-align: center;
    margin: 12px 0;
    color: #999;
    font-size: 13px;
  }
  .signup {
    background-color: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 4px;
    padding: 10px 0;
    font-weight: 600;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
  }
  .signup:hover {
    background-color: #fafafa;
  }
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="logo" alt="Instagram Logo" />
  <input type="text" placeholder="Telefon nömrəsi, istifadəçi adı və ya email" id="username" />
  <input type="password" placeholder="Şifrə" id="password" />
  <button onclick="login()">Daxil ol</button>
  <div class="divider">və ya</div>
  <div class="signup" onclick="alert('Qeydiyyat səhifəsinə yönləndirilir')">Qeydiyyatdan keç</div>
  <div class="footer">
    <p>Instagram-in istifadə şərtləri və gizlilik siyasəti</p>
  </div>
</div>
<script>
  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    if (username && password) {
      alert('Uğurla daxil oldunuz!');
    } else {
      alert('Zəhmət olmasa bütün məlumatları doldurun.');
    }
  }
</script>
</body>
</html>
