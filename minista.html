<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Giriş</title>
    <!-- Font yükləmək üçün Google Fonts istifadə olunur (Instagram-stil) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- İkonlar üçün FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Ümumi stil və sıfırlama */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica", "Arial", sans-serif;
            background-color: #fafafa; /* Instagram arxa plan rəngi */
            color: #262626;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        /* Əsas konteyner */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px; /* Mobil görünüş ölçüsü */
            padding: 20px;
        }

        /* Telefon hissəsi (Kompüterdə görünən şəkil) */
        .phones-image {
            display: none; /* Kiçik ekranlarda gizlət */
            margin-right: 32px;
            margin-bottom: 12px;
        }
        
        .phones-image img {
            max-width: 380px;
            height: auto;
        }

        /* Giriş qutusu (Card) */
        .login-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        /* Instagram Logosu */
        .logo {
            margin-bottom: 30px;
            margin-top: 10px;
            font-family: 'Grand Hotel', cursive; /* Alternativ: şəkil kimi istifadə olunur */
            font-size: 3rem;
            display: block;
        }
        
        .logo img {
            max-width: 175px;
            display: block;
            margin: 0 auto;
        }

        /* Form elementləri */
        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            position: relative;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px 7px;
            font-size: 12px;
            line-height: 18px;
            color: #262626;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        /* Giriş düyməsi */
        .btn-login {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
            opacity: 0.7; /* Aktiv olmayan vəziyyət */
            transition: opacity 0.2s;
        }

        .btn-login.active {
            opacity: 1;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        /* Və ya ayırıcısı */
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .line {
            flex-grow: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .or-text {
            margin: 0 15px;
            text-transform: uppercase;
        }

        /* Facebook ilə giriş */
        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .fb-login i {
            margin-right: 8px;
            font-size: 16px;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-bottom: 15px;
            display: block;
        }

        /* Qeydiyyat qutusu */
        .signup-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        /* Tətbiqləri yüklə */
        .get-app {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .stores {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .stores img {
            height: 40px;
            cursor: pointer;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 0 20px;
            text-align: center;
            font-size: 12px;
            color: #8e8e8e;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            max-width: 800px;
        }

        .footer-links span {
            cursor: pointer;
        }

        .copyright {
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Kənarlardakı fontlar (Daxil olduğu mətn) */
        .input-placeholder {
            position: absolute;
            left: 8px;
            top: 9px;
            font-size: 12px;
            color: #8e8e8e;
            pointer-events: none;
            transition: all 0.1s ease;
        }

        input:focus ~ .input-placeholder,
        input:not(:placeholder-shown) ~ .input-placeholder {
            display: none; /* Instagramda yazıldıqda yoxa çıxır */
        }

        /* Responsive dizayn */
        @media (min-width: 870px) {
            body {
                flex-direction: row;
                align-items: flex-start;
                padding-top: 32px;
            }
            
            .phones-image {
                display: block;
                /* Instagramın daxili ekran görüntüsü */
                background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yt/r/Yfc020c87j0.png'); 
                background-position: -46px 0;
                background-size: 468.32px 634.96px;
                width: 380px;
                height: 580px;
                margin-left: -100px; /* Səhifənin kənarına biraz yer */
            }

            .container {
                margin-top: 32px;
                margin-left: 32px;
                flex-grow: 1;
            }
        }
    </style>
</head>
<body>

    <!-- Sol tərəf: Telefon şəkilləri (Böyük ekranda görünür) -->
    <div class="phones-image"></div>

    <!-- Sağ tərəf: Giriş hissəsi -->
    <main class="container">
        
        <!-- Giriş kartı -->
        <div class="login-box">
            <div class="logo">
                <!-- Instagram Logosu (SVG şəkli kimi) -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/800px-Instagram_logo.svg.png" alt="Instagram">
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " required aria-label="Telefon nömrəsi, istifadəçi adı və ya e-poçt">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required aria-label="Şifrə">
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Daxil ol</button>
            </form>

            <div class="separator">
                <div class="line"></div>
                <span class="or-text">VƏ YA</span>
                <div class="line"></div>
            </div>

            <a href="#" class="fb-login">
                <i class="fab fa-facebook-square"></i>
                Facebook ilə daxil ol
            </a>

            <a href="#" class="forgot-password">Şifrəni unutdun?</a>
        </div>

        <!-- Qeydiyyat kartı -->
        <div class="signup-box">
            Hesabın yoxdur? <a href="#">Qeydiyyatdan keç</a>
        </div>

        <!-- Tətbiq hissəsi -->
        <div class="get-app">
            Tətbiqi endir.
            <div class="stores">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yt/r/Yfc020c87j0.png" alt="App Store" style="background-position: 0 0; width: 134px; height: 40px; object-fit: cover; display:none;"> <!-- Burada şəkilləri dəqiq linklə əvəz etmək çətin oldu, sadə placeholder -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/200px-Google_Play_Store_badge_EN.svg.png" alt="Google Play">
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <span>Haqqımızda</span>
            <span>Blog</span>
            <span>İşlər</span>
            <span>Kömək</span>
            <span>API</span>
            <span>Məxfilik</span>
            <span>Şərtlər</span>
            <span>Hesablar</span>
            <span>Məkanlar</span>
        </div>
        <div class="copyright">
            © 2023 Instagram from Meta
        </div>
    </footer>

    <script>
        // Sadə interaktivlik: Düyməni aktiv etmək
        const inputs = document.querySelectorAll('input');
        const loginBtn = document.getElementById('loginBtn');

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                // İstifadəçi bir şey yazsa düyməni parlaq et
                let hasValue = false;
                inputs.forEach(i => {
                    if (i.value.length > 0) hasValue = true;
                });
                
                if (hasValue) {
                    loginBtn.style.opacity = '1';
                } else {
                    loginBtn.style.opacity = '0.7';
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Sadə göstəriş
            alert('Bu sadəcə Instagramın görünüşünün klounudur. Daxil olmaq mümkün deyil.');
        });
    </script>
</body>
</html>
```
