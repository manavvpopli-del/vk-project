<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil - Zerowallet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
            --text: #f8fafc;
            /* Rütbə Rəngləri */
            --bronz-clr: #cd7f32;
            --gumus-clr: #cbd5e1;
            --qizil-clr: #fbbf24;
            --almaz-clr: #22d3ee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 100%);
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 450px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8; padding: 12px 18px; border-radius: 16px; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; font-weight: 600; margin-bottom: 20px;
            transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.07); }

        .profile-card {
            background: var(--card); border-radius: 35px; padding: 40px 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Avatar & Rank Style */
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        
        .avatar-glow {
            position: absolute; inset: -5px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--primary), transparent);
            animation: rotate 4s linear infinite; opacity: 0.5;
        }

        .avatar {
            position: relative; width: 100%; height: 100%; 
            background: #0f172a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 800; border: 3px solid rgba(255,255,255,0.1);
            z-index: 2; color: #fff; font-family: 'Space Grotesk';
        }

        .rank-badge-img {
            position: absolute; bottom: 0; right: 0;
            width: 42px; height: 42px; z-index: 5;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .username { font-family: 'Space Grotesk'; font-size: 1.8rem; margin: 10px 0 5px; letter-spacing: -0.5px; }
        
        .rank-label {
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
        }

        /* Stats Design */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        
        .stat-box {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 18px 10px; border-radius: 24px; transition: 0.3s ease;
        }
        .stat-box:active { background: rgba(255,255,255,0.05); }

        .stat-box i { font-size: 1.1rem; margin-bottom: 8px; opacity: 0.8; }
        .stat-box span { display: block; font-size: 1.3rem; font-weight: 800; font-family: 'Space Grotesk'; color: #fff; }
        .stat-box label { font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; }

        .joined-info { color: #475569; font-size: 0.75rem; margin-top: 25px; font-weight: 600; }

        .logout-btn {
            margin-top: 30px; width: 100%; padding: 18px; border-radius: 20px;
            background: linear-gradient(to right, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2);
            font-weight: 800; cursor: pointer; transition: 0.3s;
            font-family: 'Space Grotesk'; letter-spacing: 1px;
        }
        .logout-btn:active { transform: scale(0.98); background: rgba(239, 68, 68, 0.15); }

        /* Dinamik Rütbe Stilləri */
        .bronz { color: var(--bronz-clr); box-shadow: 0 0 15px rgba(205, 127, 50, 0.2); }
        .gumus { color: var(--gumus-clr); box-shadow: 0 0 15px rgba(203, 213, 225, 0.2); }
        .qizil { color: var(--qizil-clr); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .almaz { color: var(--almaz-clr); box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-chevron-left"></i> GERİ QAYIT
        </a>

        <div class="profile-card">
            <div class="avatar-container">
                <div class="avatar-glow" id="glow"></div>
                <div class="avatar" id="avatar">?</div>
                <img id="rank-icon" class="rank-badge-img" src="bronz.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/625/625393.png'">
            </div>
            
            <h2 class="username" id="username">...</h2>
            <div id="rank-label" class="rank-label bronz">BÜRÜNC RÜTBƏSİ</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <i class="fas fa-fingerprint" style="color: #6366f1;"></i>
                    <span id="clicks">0</span>
                    <label>Toplam Klik</label>
                </div>
                <div class="stat-box">
                    <i class="fas fa-share-nodes" style="color: #22c55e;"></i>
                    <span id="refs">0</span>
                    <label>Referallar</label>
                </div>
                <div class="stat-box" style="grid-column: span 2;">
                    <i class="fas fa-bolt" style="color: #fbbf24;"></i>
                    <span id="rocket-type" style="text-transform: uppercase; font-size: 1.1rem;">---</span>
                    <label>Aktiv Mədən Paketi</label>
                </div>
            </div>

            <div class="joined-info" id="joined">QOŞULMA: --.--.----</div>

            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-power-off"></i> SİSTEMDƏN ÇIX
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        if(!user) location.href="index.html";

        db.ref('zerowallet_users/' + user).on('value', snap => {
            const data = snap.val() || {};
            const clicks = data.totalClicks || 0;
            
            document.getElementById('username').innerText = user;
            document.getElementById('avatar').innerText = user.charAt(0).toUpperCase();
            document.getElementById('clicks').innerText = clicks.toLocaleString();
            document.getElementById('rocket-type').innerText = data.rocket || "Default";
            
            // Təkmilləşdirilmiş Rütbe Sistemi
            let rName = "BÜRÜNC";
            let rClass = "bronz";
            let rImg = "bronz.png";
            let glowClr = "#cd7f32";

            if(clicks >= 50000) {
                rName = "ALMAZ";
                rClass = "almaz";
                rImg = "almaz.png";
                glowClr = "#22d3ee";
            } else if(clicks >= 15000) {
                rName = "QIZIL";
                rClass = "qizil";
                rImg = "qizil.png";
                glowClr = "#fbbf24";
            } else if(clicks >= 5000) {
                rName = "GÜMÜŞ";
                rClass = "gumus";
                rImg = "gumus.png";
                glowClr = "#cbd5e1";
            }

            const label = document.getElementById('rank-label');
            label.innerText = rName + " RÜTBƏSİ";
            label.className = "rank-label " + rClass;
            document.getElementById('rank-icon').src = rImg;
            document.getElementById('glow').style.background = `conic-gradient(from 0deg, transparent, ${glowClr}, transparent)`;
            
            // Referallar
            const refCount = data.usedCodes ? Object.keys(data.usedCodes).length : 0;
            document.getElementById('refs').innerText = refCount;

            // Tarix
            if(data.createdAt) {
                const date = new Date(data.createdAt);
                document.getElementById('joined').innerText = "SİSTEMƏ QOŞULMA: " + date.toLocaleDateString('az-AZ');
            } else {
                db.ref('zerowallet_users/' + user + '/createdAt').set(Date.now());
            }
        });

        function logout() {
            localStorage.removeItem('zerowallet_session');
            location.href="index.html";
        }
    </script>
</body>
</html>
