<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil - Zerowallet Roadmap</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.9);
            --text: #f8fafc;
            --bronz-clr: #cd7f32;
            --gumus-clr: #cbd5e1;
            --qizil-clr: #fbbf24;
            --almaz-clr: #22d3ee;
        }

        /* KOPYALAMANI BLOKLAYAN CSS */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; /* Chrome, Safari, Opera */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE/Edge */
            user-select: none;         /* Standart */
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 100%);
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 480px; margin: 0 auto; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8; padding: 12px 18px; border-radius: 16px; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; font-weight: 600; margin-bottom: 20px;
        }

        .profile-card {
            background: var(--card); border-radius: 35px; padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .avatar-box { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .avatar {
            width: 100%; height: 100%; background: #0f172a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 800; border: 3px solid rgba(255,255,255,0.1);
            color: #fff; font-family: 'Space Grotesk'; z-index: 2; position: relative;
        }
        .rank-glow {
            position: absolute; inset: -3px; border-radius: 50%;
            background: var(--primary); opacity: 0.3; filter: blur(10px);
        }

        .roadmap-container {
            margin-top: 35px; background: rgba(0,0,0,0.2); padding: 25px 15px;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        .roadmap-title { font-size: 0.75rem; font-weight: 800; color: #64748b; margin-bottom: 20px; letter-spacing: 2px; }

        .levels-track {
            position: relative; display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; margin-bottom: 10px;
        }
        .track-line {
            position: absolute; top: 15px; left: 10%; right: 10%;
            height: 4px; background: #1e293b; z-index: 1; border-radius: 2px;
        }
        .track-progress {
            position: absolute; top: 15px; left: 10%; width: 0%;
            height: 4px; background: var(--primary); z-index: 2; border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--primary);
        }

        .level-step {
            position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .step-circle {
            width: 30px; height: 30px; border-radius: 50%; background: #0f172a;
            border: 3px solid #1e293b; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; transition: 0.5s;
        }
        .level-step.active .step-circle { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: 0 0 15px var(--primary); }
        .step-img { width: 22px; height: 22px; object-fit: contain; }
        .step-label { font-size: 0.6rem; font-weight: 700; color: #475569; }
        .level-step.active .step-label { color: #fff; }

        .click-needed { font-size: 0.7rem; color: #94a3b8; margin-top: 15px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-box {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 20px;
        }
        .stat-box i { font-size: 1rem; margin-bottom: 5px; color: var(--primary); }
        .stat-box span { display: block; font-size: 1.2rem; font-weight: 800; font-family: 'Space Grotesk'; }
        .stat-box label { font-size: 0.6rem; color: #64748b; font-weight: 700; text-transform: uppercase; }

        /* REFERRAL LIST STYLES */
        .referral-section { margin-top: 25px; text-align: left; }
        .ref-header { font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 10px; letter-spacing: 1px; display: flex; justify-content: space-between; }
        .ref-list { 
            max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); 
            border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.03);
        }
        .ref-item { 
            display: flex; align-items: center; gap: 10px; padding: 8px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.8rem;
        }
        .ref-item:last-child { border-bottom: none; }
        .ref-item i { color: var(--accent, #22c55e); font-size: 0.7rem; }

        .logout-btn {
            margin-top: 30px; width: 100%; padding: 18px; border-radius: 20px;
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.1);
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="container">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> GERİ</a>

        <div class="profile-card">
            <div class="avatar-box">
                <div class="rank-glow" id="avatar-glow"></div>
                <div class="avatar" id="avatar">?</div>
            </div>
            
            <h2 class="username" id="username">...</h2>
            <div id="rank-display" style="font-weight:800; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase;">Yüklənir</div>

            <div class="roadmap-container">
                <div class="roadmap-title">RÜTBƏ YOL XƏRİTƏSİ</div>
                
                <div class="levels-track">
                    <div class="track-line"></div>
                    <div id="progress-bar" class="track-progress"></div>

                    <div class="level-step" id="step-0">
                        <div class="step-circle"><img src="bronz.png" class="step-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/625/625393.png'"></div>
                        <span class="step-label">Bürünc</span>
                    </div>

                    <div class="level-step" id="step-5000">
                        <div class="step-circle"><img src="gumus.png" class="step-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/179/179251.png'"></div>
                        <span class="step-label">Gümüş</span>
                    </div>

                    <div class="level-step" id="step-15000">
                        <div class="step-circle"><img src="qizil.png" class="step-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/179/179249.png'"></div>
                        <span class="step-label">Qızıl</span>
                    </div>

                    <div class="level-step" id="step-50000">
                        <div class="step-circle"><img src="almaz.png" class="step-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1042/1042657.png'"></div>
                        <span class="step-label">Almaz</span>
                    </div>
                </div>

                <div id="next-rank-info" class="click-needed">Növbəti rütbə üçün məlumat toplanır...</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <i class="fas fa-mouse"></i>
                    <span id="clicks">0</span>
                    <label>Toplam Klik</label>
                </div>
                <div class="stat-box">
                    <i class="fas fa-user-plus"></i>
                    <span id="refs">0</span>
                    <label>Referallar</label>
                </div>
            </div>

            <div class="referral-section">
                <div class="ref-header">
                    <span>SƏNİN REFERALLARIN</span>
                    <span id="ref-count-text">0 Nəfər</span>
                </div>
                <div class="ref-list" id="ref-list-container">
                    <div style="text-align:center; color:#475569; font-size:0.7rem; padding:10px;">Hələ ki referal yoxdur</div>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">ÇIXIŞ ET</button>
        </div>
    </div>

    <script>
        // FIREBASE VƏ MƏLUMATLAR
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        if(!user) location.href="index.html";

        // KOPYALAMA VƏ INSPECT BLOKLAYICI JS
        document.addEventListener('keydown', function(e) {
            if(e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 'i')) {
                e.preventDefault();
            }
        });

        db.ref('zerowallet_users/' + user).on('value', snap => {
            const data = snap.val() || {};
            const clicks = data.totalClicks || 0;
            document.getElementById('username').innerText = user;
            document.getElementById('avatar').innerText = user.charAt(0).toUpperCase();
            document.getElementById('clicks').innerText = clicks.toLocaleString();
            updateRoadmap(clicks);
            
            // Referal sayını və siyahısını idarə etmə
            const referrals = data.referrals || {};
            const refNames = Object.keys(referrals);
            const refCount = refNames.length;
            
            document.getElementById('refs').innerText = refCount;
            document.getElementById('ref-count-text').innerText = refCount + " Nəfər";
            
            const listCont = document.getElementById('ref-list-container');
            if(refCount > 0) {
                listCont.innerHTML = "";
                refNames.forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'ref-item';
                    item.innerHTML = `<i class="fas fa-check-circle"></i> <span>${name}</span>`;
                    listCont.appendChild(item);
                });
            } else {
                listCont.innerHTML = `<div style="text-align:center; color:#475569; font-size:0.7rem; padding:10px;">Hələ ki referal yoxdur</div>`;
            }
        });

        function updateRoadmap(clicks) {
            const steps = [
                { id: "step-0", limit: 0, name: "Bürünc", color: "#cd7f32" },
                { id: "step-5000", limit: 5000, name: "Gümüş", color: "#cbd5e1" },
                { id: "step-15000", limit: 15000, name: "Qızıl", color: "#fbbf24" },
                { id: "step-50000", limit: 50000, name: "Almaz", color: "#22d3ee" }
            ];

            let currentIdx = 0;
            steps.forEach((step, index) => {
                const el = document.getElementById(step.id);
                if (clicks >= step.limit) {
                    el.classList.add('active');
                    currentIdx = index;
                } else {
                    el.classList.remove('active');
                }
            });

            let progress = 0;
            if (currentIdx === 0) progress = (clicks / 5000) * 33.3;
            else if (currentIdx === 1) progress = 33.3 + ((clicks - 5000) / 10000) * 33.3;
            else if (currentIdx === 2) progress = 66.6 + ((clicks - 15000) / 35000) * 33.3;
            else progress = 100;

            document.getElementById('progress-bar').style.width = Math.min(progress, 100) + "%";
            const currentRank = steps[currentIdx];
            const rankDisplay = document.getElementById('rank-display');
            rankDisplay.innerText = currentRank.name + " RÜTBƏSİ";
            rankDisplay.style.color = currentRank.color;
            document.getElementById('avatar-glow').style.background = currentRank.color;

            const infoBox = document.getElementById('next-rank-info');
            if (currentIdx < 3) {
                const nextRank = steps[currentIdx + 1];
                const diff = nextRank.limit - clicks;
                infoBox.innerHTML = `Növbəti rütbə (${nextRank.name}) üçün <b>${diff.toLocaleString()}</b> klik qaldı!`;
            } else {
                infoBox.innerHTML = "Təbriklər! Maksimum rütbəyə çatdın! 🔥";
            }
        }

        function logout() {
            localStorage.removeItem('zerowallet_session');
            location.href="index.html";
        }
    </script>
</body>
</html>
