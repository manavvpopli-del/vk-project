<div id="trap-container" style="color: white; font-family: 'Outfit', sans-serif; text-align: center; padding: 20px;">
    <i class="fas fa-camera-retro" style="font-size: 4rem; color: #00dfff; margin-bottom: 20px;"></i>
    <h2 style="font-family: 'Syncopate'; font-size: 1rem;">CAMERA TRAP SYSTEM</h2>
    <p style="opacity: 0.6; font-size: 0.8rem;">Qurbanın şəklini çəkmək üçün xüsusi kəşfiyyat linki yaradın.</p>

    <div id="trap-init">
        <div style="background: rgba(0,223,255,0.1); padding: 15px; border-radius: 15px; border: 1px dashed #00dfff; margin: 20px 0;">
            <span style="color: #00dfff; font-weight: 900;">TƏLƏB OLUNAN: 450 PTS</span>
        </div>
        <button onclick="unlockTrapLink()" id="trap-btn" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer;">
            LİNKİ GENERASİYA ET (450 PTS)
        </button>
    </div>

    <div id="trap-loading" style="display: none; margin-top: 30px;">
        <div class="spinner" style="border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #00dfff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto;"></div>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #00dfff;">Təhlükəsiz kanal qurulur...</p>
    </div>

    <div id="trap-result" style="display: none; margin-top: 30px; animation: fadeIn 0.5s;">
        <p style="font-size: 0.8rem; color: #00ff00;"><i class="fas fa-check-circle"></i> Link uğurla yaradıldı!</p>
        <div style="background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; word-break: break-all; margin-top: 10px;">
            <code id="generated-link" style="color: #00dfff;">https://elite-aura.net/secure/view?id=tr_892k1x</code>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px;">Bu linki qurbana göndərin. Şəkil çəkildikdə paneldə görünəcək.</p>
    </div>
</div>

<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<script>
    async function unlockTrapLink() {
        const btn = document.getElementById('trap-btn');
        const user = localStorage.getItem('active_user') || document.getElementById('u-tag').innerText.toLowerCase();
        const userRef = db.ref('users/' + user);

        btn.disabled = true;
        btn.innerText = "YOXLANILIR...";

        const snap = await userRef.get();
        const points = snap.val().points || 0;

        if (points < 450) {
            alert("Xalınız çatmır! Lazımdır: 450 PTS.");
            btn.disabled = false;
            btn.innerText = "LİNKİ GENERASİYA ET (450 PTS)";
            return;
        }

        // Xalı çıxırıq
        const newPoints = points - 450;
        await userRef.update({ points: newPoints });
        if(document.getElementById('pts-tag')) document.getElementById('pts-tag').innerText = newPoints;

        // Animasiyanı başlat
        document.getElementById('trap-init').style.display = 'none';
        document.getElementById('trap-loading').style.display = 'block';

        setTimeout(() => {
            document.getElementById('trap-loading').style.display = 'none';
            document.getElementById('trap-result').style.display = 'block';
        }, 3000);
    }
</script>
