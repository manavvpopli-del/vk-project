<div id="spy-container" style="color: white; font-family: 'Outfit', sans-serif; max-width: 500px; margin: auto; padding: 15px;">
    
    <div id="search-view" style="text-align: center; padding-top: 20px;">
        <div style="background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            <i class="fab fa-instagram" style="font-size: 5rem;"></i>
        </div>
        <h2 style="font-family: 'Syncopate'; margin-top: 20px; font-size: 1rem; letter-spacing: 2px;">IG GİZLİ PROFİL İZLEYİCİ</h2>
        
        <input type="text" id="target-id" placeholder="İstifadəçi adı (məs: ismail_v1)" 
            style="width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #333; background: #000; color: white; text-align: center; margin-top: 30px; outline: none; font-size: 1.1rem; font-weight: bold;">
        
        <button id="search-btn" onclick="startSearchProcess()" 
            style="width: 100%; margin-top: 15px; padding: 18px; border-radius: 20px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase;">
            PROFİLİ ANALİZ ET
        </button>
    </div>

    <div id="loading-view" style="display: none; text-align: center; margin-top: 50px;">
        <div class="scanner-line"></div>
        <h3 id="status-text" style="color: #bc1888; font-family: monospace; font-size: 0.9rem; margin-top: 25px;">Sistemə qoşulur...</h3>
        <p style="opacity: 0.4; font-size: 0.7rem;">Proxy zənciri qurulur...</p>
    </div>

    <div id="pay-view" style="display: none; animation: fadeIn 0.4s; text-align: center;">
        <div style="background: rgba(255,255,255,0.03); padding: 35px; border-radius: 30px; border: 1px solid #333;">
            <div style="position: relative; display: inline-block;">
                <img id="real-avatar" src="" style="width: 130px; height: 130px; border-radius: 50%; border: 3px solid #bc1888; object-fit: cover;">
                <div style="position: absolute; bottom: 5px; right: 5px; background: #0095f6; color: white; border-radius: 50%; padding: 5px; font-size: 10px;">
                    <i class="fas fa-check"></i>
                </div>
            </div>
            <h2 id="real-name" style="margin: 15px 0; font-size: 1.2rem;"></h2>
            
            <div style="background: rgba(188, 24, 136, 0.1); padding: 20px; border-radius: 20px; border: 1px solid #bc1888; margin-bottom: 20px;">
                <span style="display: block; font-size: 0.8rem; font-weight: bold; color: #bc1888; text-transform: uppercase;">Access Status: ELITE KEY GRANTED</span>
            </div>

            <button onclick="startExtractionProcess()" id="pay-btn"
                style="width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(45deg, #f09433, #bc1888); color: white; font-weight: 900; cursor: pointer;">
                GİZLİ POSTLARI AÇ
            </button>
        </div>
    </div>

    <div id="data-extraction-view" style="display: none; text-align: center; margin-top: 50px;">
        <i class="fas fa-unlock-alt" style="font-size: 3rem; color: #00ff00; animation: pulse 1s infinite;"></i>
        <h3 id="extract-text" style="color: #00ff00; font-family: monospace; margin-top: 20px;">Payload injecting...</h3>
        <div style="width: 100%; height: 4px; background: #111; margin-top: 20px; border-radius: 2px; overflow: hidden;">
            <div id="extract-bar" style="width: 0%; height: 100%; background: #00ff00; transition: 0.1s;"></div>
        </div>
    </div>

    <div id="final-view" style="display: none;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #222;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="final-avatar" src="" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #bc1888;">
                <b id="final-username" style="font-size: 0.9rem;"></b>
            </div>
            <i class="fas fa-ellipsis-h" style="opacity: 0.5;"></i>
        </div>
        <div id="post-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px;"></div>
    </div>

</div>

<style>
    .scanner-line { width: 60px; height: 60px; border: 4px solid #bc1888; border-top-color: transparent; border-radius: 50%; margin: auto; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
    function startSearchProcess() {
        const username = document.getElementById('target-id').value.trim();
        if(!username) return alert("Hədəf istifadəçi adını daxil edin!");

        document.getElementById('search-view').style.display = 'none';
        document.getElementById('loading-view').style.display = 'block';

        const logs = ["Serverlər taranır...", "API bypass edilir...", "İstifadəçi tapıldı!", "Önbəllik yüklənir..."];
        let i = 0;
        
        const logInterval = setInterval(() => {
            if(i < logs.length) {
                document.getElementById('status-text').innerText = logs[i];
                i++;
            }
        }, 1200);

        setTimeout(() => {
            clearInterval(logInterval);
            showPayView(username);
        }, 5000);
    }

    function showPayView(username) {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('pay-view').style.display = 'block';
        document.getElementById('real-name').innerText = "@" + username;
        // Profil şəklini dinamik gətirmək üçün placeholder (Median üçün idealdır)
        document.getElementById('real-avatar').src = `https://unavatar.io/instagram/${username}?fallback=https://ui-avatars.com/api/?name=${username}&background=random&color=fff`;
    }

    function startExtractionProcess() {
        document.getElementById('pay-view').style.display = 'none';
        document.getElementById('data-extraction-view').style.display = 'block';

        const extractLogs = ["Firewall keçilir...", "Media linkləri oxunur...", "Decryption prosesi...", "Fayllar render edilir..."];
        let progress = 0;
        let logIdx = 0;

        const extInterval = setInterval(() => {
            progress += 2;
            document.getElementById('extract-bar').style.width = progress + "%";
            
            if(progress % 25 === 0 && logIdx < extractLogs.length) {
                document.getElementById('extract-text').innerText = extractLogs[logIdx];
                logIdx++;
            }

            if(progress >= 100) {
                clearInterval(extInterval);
                showFinalResults();
            }
        }, 80); 
    }

    function showFinalResults() {
        document.getElementById('data-extraction-view').style.display = 'none';
        document.getElementById('final-view').style.display = 'block';
        
        document.getElementById('final-avatar').src = document.getElementById('real-avatar').src;
        document.getElementById('final-username').innerText = document.getElementById('real-name').innerText;

        const grid = document.getElementById('post-grid');
        grid.innerHTML = "";
        
        // Simulyasiya: Gizli profilin postları kimi random şəkillər
        for(let i=0; i<18; i++) {
            grid.innerHTML += `
                <div style="aspect-ratio: 1/1; background: #111; border: 0.5px solid #000; overflow: hidden; position: relative;">
                    <img src="https://picsum.photos/500/500?random=${i+50}" style="width: 100%; height: 100%; object-fit: cover;">
                </div>`;
        }
    }
</script>
