<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Satellite Locator v5.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        :root {
            --neon: #00d9ff;
            --danger: #ff3e3e;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #matrixBg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .tracker-box {
            width: 95%; max-width: 900px; background: var(--glass);
            border: 1px solid var(--neon); border-radius: 15px; padding: 25px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.2); backdrop-filter: blur(10px);
            margin: 20px 0;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--neon); padding-bottom: 15px; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 5px; text-transform: uppercase; }

        input, select {
            width: 100%; background: #000; border: 1px solid #333; padding: 12px;
            color: var(--neon); border-radius: 5px; outline: none; font-family: inherit; box-sizing: border-box;
        }

        .btn {
            width: 100%; background: var(--neon); color: #000; border: none; padding: 15px;
            font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 10px;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        #terminal {
            background: #000; border-radius: 5px; padding: 15px; height: 100px;
            font-size: 11px; overflow-y: hidden; margin: 20px 0;
            border: 1px solid #222; color: #0f0;
        }

        #mapArea {
            height: 400px; width: 100%; background: #111; border-radius: 10px;
            position: relative; overflow: hidden; display: none;
            border: 1px solid var(--neon);
        }

        .radar-line {
            position: absolute; width: 100%; height: 2px; background: var(--neon);
            box-shadow: 0 0 15px var(--neon); top: 0; z-index: 10; animation: scan 3s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .target-marker {
            position: absolute; color: var(--danger); font-size: 35px;
            transform: translate(-50%, -50%); animation: blink 0.6s infinite; z-index: 11;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .info-panel {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.85);
            padding: 12px; font-size: 10px; border: 1px solid var(--neon); width: 220px; z-index: 12;
        }

        @media (max-width: 600px) { .grid-inputs { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="matrixBg"></canvas>

<div class="tracker-box">
    <div class="header">
        <h1>V.K PROJECT - GLOBAL LOCATER</h1>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Hədəf Ad Soyad</label>
            <input type="text" id="targetName" placeholder="Məs: Əli Məmmədov">
        </div>
        <div class="input-group">
            <label>Telefon Nömrəsi</label>
            <input type="text" id="phoneInput" placeholder="+994 (__) ___ __ __">
        </div>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Hədəf Cihaz Modeli</label>
            <input type="text" id="deviceModel" placeholder="Məs: iPhone 14 Pro">
        </div>
        <div class="input-group">
            <label>Axtarış Səbəbi</label>
            <select id="searchReason">
                <option value="Şəxsi səbəblər">Şəxsi səbəblər</option>
                <option value="İtmiş cihaz">İtmiş cihaz</option>
                <option value="İzləmək">İzləmək (Monitoring)</option>
            </select>
        </div>
    </div>

    <button class="btn" onclick="startTracking()">Skanerə Başla</button>

    <div id="terminal">
        <div id="lines">> Sistem gözləmədədir. Verilənləri daxil edin...</div>
    </div>

    <div id="mapArea">
        <div class="radar-line"></div>
        <div id="marker" class="target-marker">⌖</div>
        <iframe id="gMap" width="100%" height="100%" frameborder="0" style="filter: grayscale(1) invert(1) contrast(1.2) brightness(0.7);"></iframe>
        
        <div class="info-panel" id="deviceDisplay">
            STATUS: ANALİZ EDİLİR...
        </div>
    </div>
</div>

<script>
    function log(txt, col = "#0f0") {
        const l = document.getElementById("lines");
        const d = document.createElement("div");
        d.style.color = col;
        d.innerText = `> ${txt}`;
        l.appendChild(d);
        document.getElementById("terminal").scrollTop = document.getElementById("terminal").scrollHeight;
    }

    async function startTracking() {
        const name = document.getElementById("targetName").value;
        const phone = document.getElementById("phoneInput").value;
        const model = document.getElementById("deviceModel").value;
        const reason = document.getElementById("searchReason").value;

        if(!name || !phone) {
            alert("Zəhmət olmasa Ad və Nömrəni daxil edin!");
            return;
        }

        document.getElementById("lines").innerHTML = "";
        document.getElementById("mapArea").style.display = "none";

        log(`Protokol başladıldı: ${reason.toUpperCase()}`, "#00d9ff");
        await new Promise(r => setTimeout(r, 800));
        log(`Hədəf: ${name} qeydiyyat bazasında axtarılır...`);
        await new Promise(r => setTimeout(r, 1000));
        log(`Cihaz (${model || "Naməlum"}) peykə qoşulur...`);
        await new Promise(r => setTimeout(r, 1500));
        log("SİQNALLAR TƏSDİQLƏNDİ. KORDİNATLAR ALINIR...", "yellow");
        await new Promise(r => setTimeout(r, 1000));

        const locs = [
            { lat: 40.4093, lng: 49.8671, n: "Bakı, AZ" },
            { lat: 40.4520, lng: 49.7330, n: "Xırdalan, AZ" },
            { lat: 40.5897, lng: 49.6689, n: "Sumqayıt, AZ" }
        ];
        const lc = locs[Math.floor(Math.random() * locs.length)];

        document.getElementById("mapArea").style.display = "block";
        document.getElementById("gMap").src = `https://maps.google.com/maps?q=${lc.lat},${lc.lng}&z=15&output=embed`;
        
        document.getElementById("marker").style.top = "50%";
        document.getElementById("marker").style.left = "50%";

        document.getElementById("deviceDisplay").innerHTML = `
            <b style="color:var(--neon)">HƏDƏF TAPILDI</b><br>
            <b>AD:</b> ${name}<br>
            <b>CİHAZ:</b> ${model || "Auto-Detected"}<br>
            <b>MƏKAN:</b> ${lc.n}<br>
            <b>SƏBƏB:</b> ${reason}<br>
            <b>STATUS:</b> <span style="color:lime">ONLINE</span>
        `;
        log(`BAĞLANTI QURULDU! ${name} izlənilir.`, "lime");
    }

    // Matrix Arka Fon
    const canvas = document.getElementById('matrixBg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "01VKPROJECTLOCATER994";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00d9ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);
</script>
</body>
</html>
