<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Global Locator Pro v7.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');

        :root {
            --neon: #00d9ff;
            --neon-bg: rgba(0, 217, 255, 0.1);
            --danger: #ff3e3e;
            --danger-bg: rgba(255, 62, 62, 0.15);
            --bg: #030305;
            --card: #080a0f;
            --glass: rgba(10, 12, 18, 0.7);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #matrixBg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        .locator-container {
            width: 95%; max-width: 950px; background: var(--card);
            border: 1px solid #1a1e2a; border-radius: 20px; padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            margin: 20px 0; position: relative; overflow: hidden;
        }

        /* Futuristik Şüşə Effekti */
        .locator-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.01) 100%);
            transform: rotate(30deg); z-index: 1; pointer-events: none;
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #1a1e2a; padding-bottom: 15px; position: relative; z-index: 2; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; text-transform: uppercase; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; position: relative; z-index: 2; }
        
        .field-group { position: relative; }
        label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        
        input, select {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid #2a2f3f; padding: 14px 18px;
            color: var(--neon); border-radius: 8px; outline: none; font-family: inherit; font-size: 13px;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon-bg); background: #000; }

        .action-btn {
            width: 100%; background: var(--neon); color: #000; border: none; padding: 18px;
            font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 3px; margin-top: 15px; font-size: 14px;
            position: relative; z-index: 2; overflow: hidden;
        }

        .action-btn:hover { background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-2px); }

        /* LOADING TERMINAL */
        .console-box { margin-top: 30px; position: relative; z-index: 2; }
        
        .process-bar { height: 6px; background: #111; border-radius: 3px; overflow: hidden; display: none; margin-bottom: 15px; }
        #fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 10px var(--neon); transition: 0.5s; }

        #terminal {
            background: #000; border-radius: 8px; padding: 18px; height: 130px;
            font-size: 12px; overflow-y: hidden; border: 1px solid #1a1e2a; color: #0f0;
            line-height: 1.6; display: none;
        }

        /* PEKY XƏRİTƏ VƏ EFFEKTLƏR */
        #mapArea {
            height: 450px; width: 100%; background: #000; border-radius: 12px;
            position: relative; overflow: hidden; display: none; margin-top: 25px;
            border: 1px solid var(--neon); box-shadow: 0 0 20px var(--neon-bg);
            z-index: 2;
        }

        /* Profesional Skaner Xətti */
        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(180deg, rgba(0,217,255,0) 0%, rgba(0,217,255,0.05) 50%, rgba(0,217,255,0) 100%);
            border-bottom: 1px solid var(--neon); box-shadow: 0 5px 15px var(--neon-bg);
            animation: moveScan 4s ease-in-out infinite; z-index: 10;
        }

        @keyframes moveScan { 0% { top: 0%; } 100% { top: 50%; } }

        /* Yüksək Keyfiyyətli Peyk Xəritəsi */
        #satMap {
            width: 100%; height: 100%; border: none;
            filter: grayscale(0.2) contrast(1.1) brightness(0.9);
        }

        /* Profesional Target Nişangahı */
        .target-group { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        
        .circle-out {
            width: 80px; height: 80px; border: 1px solid var(--danger); border-radius: 50%;
            animation: rotate 10s linear infinite;
        }
        .circle-out::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: var(--danger); }
        .circle-out::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--danger); }

        .target-dot {
            width: 12px; height: 12px; background: var(--danger); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: blinkTarget 0.8s infinite; box-shadow: 0 0 15px var(--danger);
        }

        @keyframes blinkTarget { 50% { opacity: 0; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Məlumat Paneli (İnandırıcı) */
        .hud-panel {
            position: absolute; bottom: 20px; left: 20px; background: var(--glass);
            padding: 15px; font-size: 11px; border: 1px solid var(--neon); width: 240px;
            z-index: 20; backdrop-filter: blur(5px); border-radius: 5px;
        }
        .hud-header { color: var(--neon); font-weight: 700; margin-bottom: 8px; font-size: 12px; }
        .hud-row { margin-bottom: 4px; color: #aaa; }
        .hud-row b { color: #fff; }

        @media (max-width: 700px) { .input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrixBg"></canvas>

<div class="locator-container">
    <div class="header">
        <h1>V.K PROJECT - GLOBAL LOCATOR</h1>
    </div>

    <div class="input-grid">
        <div class="field-group">
            <label>Hədəf Ad Soyad (VK-OSINT)</label>
            <input type="text" id="targetName" placeholder="Məs: Kənan Vəliyev">
        </div>
        <div class="field-group">
            <label>Telefon Nömrəsi (Global)</label>
            <input type="text" id="phoneInput" placeholder="+994 (__) ___ __ __">
        </div>
    </div>

    <div class="input-grid">
        <div class="field-group">
            <label>Cihaz Modeli (Məlumdursa)</label>
            <input type="text" id="deviceModel" placeholder="iPhone 15, S24 və s.">
        </div>
        <div class="field-group">
            <label>Axtarış Səbəbi</label>
            <select id="searchReason">
                <option value="Təcili Axtarış">Təcili Axtarış</option>
                <option value="İtmiş Cihaz">İtmiş Cihaz</option>
                <option value="Hədəfi İzləmək">Hədəfi İzləmək</option>
            </select>
        </div>
    </div>

    <button id="mainBtn" class="action-btn" onclick="startTracking()">GPS Skanerini Başlat</button>

    <div class="console-box">
        <div class="process-bar" id="pBar"><div id="fill"></div></div>
        <div id="terminal">
            <div id="lines">> Sistem gözləmədədir. Verilənləri daxil edib skanerə başlayın...</div>
        </div>
    </div>

    <div id="mapArea">
        <div class="scanner-line"></div>
        <div class="target-group">
            <div class="circle-out"></div>
            <div class="target-dot"></div>
        </div>
        <iframe id="satMap" src="" frameborder="0" scrolling="no"></iframe>
        
        <div class="hud-panel" id="deviceDisplay">
            <div class="hud-header">> HƏDƏF ANALİZİ</div>
            STATUS: ANALİZ EDİLİR...
        </div>
    </div>
</div>

<script>
    const VK_AQTARIS_VAXTI = 240000; // Tam 4 dəqiqə (millifitdə)
    let pInterval;

    function log(txt, col = "#0f0") {
        const l = document.getElementById("lines");
        const d = document.createElement("div");
        d.style.color = col;
        d.innerText = `[${new Date().toLocaleTimeString()}] > ${txt}`;
        l.appendChild(d);
        document.getElementById("terminal").scrollTop = document.getElementById("terminal").scrollHeight;
    }

    async function startTracking() {
        const name = document.getElementById("targetName").value;
        const phone = document.getElementById("phoneInput").value;
        const reason = document.getElementById("searchReason").value;

        if(!name || !phone) {
            alert("Kəşfiyyat üçün Ad və Nömrə mütləqdir!");
            return;
        }

        // İlkin Hazırlıq
        document.getElementById("mainBtn").style.display = "none";
        document.getElementById("terminal").style.display = "block";
        document.getElementById("pBar").style.display = "block";
        document.getElementById("mapArea").style.display = "none";
        document.getElementById("lines").innerHTML = "";

        // Terminal Mərhələləri (Realistik OSINT)
        log(`Protokol Started: ${reason.toUpperCase()}`, "#00d9ff");
        await sleep(2000);
        log(`Hədəf: "${name}" üzrə VK-OSINT skaneri başladılır...`);
        await sleep(3000);
        log(`Qlobal Peyk Bazasına (VK-SAT) bağlantı qurulur...`, "yellow");
        await sleep(4000);
        log(`Peykə qoşuldu. GSM Siqnal trianqulyasiyası aparılır (v8.1)...`);
        await sleep(3000);
        log(`Gözlənilir. Bu proses tam 4 dəqiqə çəkə bilər. Səhifəni bağlamayın.`, "red");
        
        // 4 Dəqiqəlik Tərəqqi Barı (Mükəmməl Animasiya)
        const startTime = Date.now();
        const fill = document.getElementById("fill");
        
        pInterval = setInterval(() => {
            const timePassed = Date.now() - startTime;
            const progress = (timePassed / VK_AQTARIS_VAXTI) * 100;
            fill.style.width = progress + "%";

            // Aralıq Terminal Mesajları
            if(progress > 15 && progress < 16) log(`Siqnal gücləndirilir: Absheron Sector...`);
            if(progress > 35 && progress < 36) log(`GSM koordinatları deşifrə edilir: AES-256...`);
            if(progress > 60 && progress < 61) log(`Yüksək Keyfiyyətli Peyk Xəritəsi yüklənir...`);
            if(progress > 85 && progress < 86) log(`Hədəf yeri vizuallaşdırılır...`);

            if(timePassed >= VK_AQTARIS_VAXTI) {
                clearInterval(pInterval);
                finishAqtaris(name, phone, reason);
            }
        }, 500); // Hər yarım saniyədə bir yoxla
    }

    // Axtarış Bitdikdən Sonra (Xəritə Mərhələsi)
    function finishAqtaris(name, phone, reason) {
        document.getElementById("pBar").style.display = "none";
        document.getElementById("mapArea").style.display = "block";
        
        log("HƏDƏF TƏSBİT EDİLDİ! Xəritə üzərində göstərilir.", "lime");

        // Keyfiyyətli Peyk Kordinatları (Azərbaycan)
        const coords = [
            { lat: 40.3772, lng: 49.8474, n: "Bakı (Mərkəz), AZ" },
            { lat: 40.4497, lng: 50.1123, n: "Absheron, AZ" },
            { lat: 40.5901, lng: 49.6631, n: "Sumqayıt, AZ" }
        ];
        const c = coords[Math.floor(Math.random() * coords.length)];

        // REAL, KEYFİYYƏTLİ PEYK XƏRİTƏSİ
        // Bu link Google Maps-in real peyk görüntüsünü (Satellite view) yükləyir
        document.getElementById("satMap").src = `https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d1521.1491740941913!2d${c.lng}!3d${c.lat}!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDIyJzM4LjAiTiA0OcKwNTAnNTAuNiJF!5e1!3m2!1sen!2saz!4v1700000000000!5m2!1sen!2saz&t=k`;

        // HUD Panel Məlumatları
        const model = document.getElementById("deviceModel").value || "Naməlum Device";
        document.getElementById("deviceDisplay").innerHTML = `
            <div class="hud-header">> TAPILAN MƏLUMAT</div>
            <div class="hud-row"><b>HƏDƏF:</b> ${name}</div>
            <div class="hud-row"><b>COORD:</b> ${c.lat}, ${c.lng}</div>
            <div class="hud-row"><b>MƏKAN:</b> ${c.n}</div>
            <div class="hud-row"><b>CİHAZ:</b> ${model}</div>
            <div class="hud-row"><b>STATUS:</b> <span style="color:lime">MÜKƏMMƏL</span></div>
        `;
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    // Matrix Background Logic (010101 VKPROJECT)
    const canvas = document.getElementById('matrixBg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "01010101VKPROJECT";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00d9ff"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);
</script>
</body>
</html>
