<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Global Locator v8.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');

        :root {
            --neon: #00d9ff;
            --danger: #ff3e3e;
            --bg: #020204;
            --card: #0a0c12;
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Fira Code', monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #matrixBg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .locator-card {
            width: 90%; max-width: 800px; background: var(--card);
            border: 1px solid #1a1e2a; border-radius: 15px; padding: 35px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); position: relative; z-index: 2;
        }

        .header h1 { 
            text-align: center; color: var(--neon); letter-spacing: 6px; 
            font-size: 22px; text-transform: uppercase; margin-bottom: 30px;
            text-shadow: 0 0 15px var(--neon);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 5px; text-transform: uppercase; }

        input, select {
            width: 100%; background: #000; border: 1px solid #222; padding: 12px;
            color: #fff; border-radius: 6px; outline: none; font-family: inherit;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 8px rgba(0, 217, 255, 0.2); }

        /* LOADING BAR */
        .loading-container { display: none; margin-top: 25px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: var(--neon); }
        .progress-bar { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid #222; }
        #fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.4s linear; }

        .action-btn {
            width: 100%; background: var(--neon); color: #000; border: none; padding: 16px;
            font-weight: 700; border-radius: 6px; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        .action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #terminal {
            background: #000; border: 1px solid #1a1e2a; padding: 15px; height: 100px;
            font-size: 11px; color: #0f0; margin-top: 20px; border-radius: 5px;
            overflow-y: hidden; display: none;
        }

        /* LIMIT MESSAGE */
        #limitMsg {
            display: none; color: var(--danger); text-align: center;
            font-size: 12px; margin-top: 20px; padding: 10px;
            border: 1px solid var(--danger-bg); background: rgba(255, 62, 62, 0.05);
        }

        /* MAP AREA */
        #mapArea {
            height: 400px; width: 100%; border-radius: 10px; margin-top: 25px;
            border: 1px solid var(--neon); display: none; position: relative; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; filter: brightness(0.8) contrast(1.2) saturate(0.5); }

        .target-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 2px solid var(--danger); border-radius: 50%;
            z-index: 10; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="matrixBg"></canvas>

<div class="locator-card">
    <div class="header"><h1>V.K LOCATOR PRO</h1></div>

    <div id="formArea">
        <div class="input-grid">
            <div class="field">
                <label>Hədəf Ad Soyad</label>
                <input type="text" id="targetName" placeholder="Mütləq daxil edin">
            </div>
            <div class="field">
                <label>Telefon Nömrəsi</label>
                <input type="text" id="phoneInput" placeholder="+994 __ ___ __ __">
            </div>
        </div>
        <div class="input-grid">
            <div class="field">
                <label>Cihaz Modeli</label>
                <input type="text" id="deviceModel" placeholder="Məs: iPhone 15 Pro">
            </div>
            <div class="field">
                <label>Axtarış Səbəbi</label>
                <select id="reason">
                    <option value="">Səbəb seçin...</option>
                    <option value="Şəxsi">Şəxsi səbəblər</option>
                    <option value="İtmiş">İtmiş cihaz</option>
                    <option value="İzləmə">İzləmək</option>
                </select>
            </div>
        </div>
        <button class="action-btn" id="startBtn" onclick="initSearch()">Skaneri Başlat</button>
    </div>

    <div id="limitMsg">Sutkalıq axtarış limitiniz dolub. 24 saat sonra yenidən cəhd edin.</div>

    <div class="loading-container" id="loader">
        <div class="progress-label">
            <span id="statusTxt">Peykə bağlanılır...</span>
            <span id="percent">0%</span>
        </div>
        <div class="progress-bar"><div id="fill"></div></div>
    </div>

    <div id="terminal"></div>

    <div id="mapArea">
        <div class="target-crosshair"></div>
        <iframe id="satMap" frameborder="0"></iframe>
    </div>
</div>

<script>
    const SEARCH_TIME = 240000; // 4 dəqiqə

    // 1. LIMIT YOXLANILMASI
    function checkLimit() {
        const lastSearch = localStorage.getItem('vk_last_search');
        if (lastSearch) {
            const now = Date.now();
            const diff = now - parseInt(lastSearch);
            if (diff < 24 * 60 * 60 * 1000) { // 24 saat keçməyibsə
                document.getElementById('formArea').style.display = 'none';
                document.getElementById('limitMsg').style.display = 'block';
                return false;
            }
        }
        return true;
    }

    function log(msg) {
        const term = document.getElementById('terminal');
        term.style.display = 'block';
        const div = document.createElement('div');
        div.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function initSearch() {
        // MƏLUMATLARIN YOXLUNILMASI (Mütləq doldurulmalıdır)
        const name = document.getElementById('targetName').value;
        const phone = document.getElementById('phoneInput').value;
        const model = document.getElementById('deviceModel').value;
        const reason = document.getElementById('reason').value;

        if(!name || !phone || !model || !reason) {
            alert("Bütün xanaları doldurmaq mütləqdir!");
            return;
        }

        if(!checkLimit()) return;

        // Limiti yadda saxla
        localStorage.setItem('vk_last_search', Date.now().toString());

        document.getElementById('formArea').style.opacity = '0.3';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';

        log("Sistem başladıldı...");
        log(`Hədəf: ${name} (${phone})`);
        
        const fill = document.getElementById('fill');
        const percent = document.getElementById('percent');
        const statusTxt = document.getElementById('statusTxt');
        
        let start = Date.now();
        let timer = setInterval(() => {
            let passed = Date.now() - start;
            let p = Math.floor((passed / SEARCH_TIME) * 100);
            
            if (p <= 100) {
                fill.style.width = p + "%";
                percent.innerText = p + "%";
                
                if(p == 20) statusTxt.innerText = "GSM siqnalları deşifrə edilir...";
                if(p == 45) statusTxt.innerText = "Peyk trianqulyasiyası aparılır...";
                if(p == 70) statusTxt.innerText = "Yüksək keyfiyyətli xəritə yüklənir...";
                if(p == 90) statusTxt.innerText = "Koordinatlar dəqiqləşdirilir...";
            } else {
                clearInterval(timer);
                showResult(name, model);
            }
        }, 500);
    }

    function showResult(name, model) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('mapArea').style.display = 'block';
        
        log("HƏDƏF TAPILDI!");
        
        // Google Maps Satellite View
        const lat = 40.4093; const lng = 49.8671; // Təsadüfi mərkəz Bakı
        document.getElementById('satMap').src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1519.8!2d${lng}!3d${lat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2saz!4v1700000000000!5m2!1sen!2saz&t=k`;
    }

    // Matrix Background
    const canvas = document.getElementById('matrixBg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 15)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00d9ff"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const txt = String.fromCharCode(65 + Math.random() * 33);
            ctx.fillText(txt, i * 15, y * 15);
            if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);

    // İlk yüklənəndə limiti yoxla
    window.onload = checkLimit;
</script>

</body>
</html>
