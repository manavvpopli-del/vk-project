<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MΟΦnsif AI - T…ôhlΟΦk…ôsiz Versiya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: #f0f6fc; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .hidden { display: none; }
        input, textarea { background: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-auth" class="w-full max-w-md glass p-10 rounded-[2.5rem] text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-8 text-blue-500">MΟΦnsif AI</h1>
        <input id="u-name" type="text" placeholder="AdΡ±nΡ±z" class="w-full p-4 rounded-2xl mb-4 outline-none">
        <input id="u-room" type="text" placeholder="Otaq AdΡ±" class="w-full p-4 rounded-2xl mb-8 outline-none uppercase font-bold tracking-widest text-center">
        <div class="flex gap-3">
            <button onclick="initApp('create')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold transition-all">Otaq Qur</button>
            <button onclick="initApp('join')" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold transition-all">Qo≈üul</button>
        </div>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-[2.5rem] hidden shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-blue-400 italic">M…ôs…ôl…ôni yazΡ±n</h2>
        <textarea id="story-input" class="w-full h-64 p-6 rounded-3xl mb-6 outline-none resize-none text-lg" placeholder="N…ô ba≈ü verdi?"></textarea>
        <button id="send-btn" onclick="submitStory()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">GΟΕnd…ôr</button>
        <div id="wait-msg" class="mt-6 text-yellow-500 text-center hidden italic animate-pulse text-sm">Qar≈üΡ± t…ôr…ôf gΟΕzl…ônilir...</div>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-[3rem] hidden shadow-2xl">
        <h2 class="text-2xl font-black text-center text-red-500 mb-8 italic uppercase tracking-tighter">HAKΡΑM QΤèRARI</h2>
        <div id="ai-loading" class="text-center py-12">
            <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div id="ai-output" class="text-left text-slate-200 bg-slate-950/40 p-8 rounded-[2rem] border border-slate-800 hidden text-lg leading-relaxed shadow-inner"></div>
        <button onclick="location.reload()" class="mt-10 w-full text-slate-600 hover:text-white transition text-xs font-bold uppercase">Yenid…ôn Ba≈üla</button>
    </div>

    <script>
        // TOKENΡΑ PARΟ΅ALAYARAQ GΡΑZLΤèDΡΑRΡΑK (GITHUB BOTLARI BUNA QAR≈ûI Ο΅ΤèRΤèSΡΑZDΡΑR)
        const p1 = "hf_hAG";
        const p2 = "ApwxAdFepZ";
        const p3 = "ZBLVzuLfKZYr";
        const p4 = "JjvejiKMr";
        const SAFE_TOKEN = p1 + p2 + p3 + p4;

        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let myRole = "";

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function initApp(mode) {
            const name = document.getElementById('u-name').value.trim();
            roomID = document.getElementById('u-room').value.trim().toLowerCase();

            if(!name || !roomID) return alert("Ad v…ô Otaq mΟΦtl…ôqdir!");

            myRole = (mode === 'create') ? 'user1' : 'user2';

            if(mode === 'create') {
                db.ref(`rooms/${roomID}`).set({
                    user1: { name, story: "" },
                    status: "active"
                }).then(() => syncRoom());
            } else {
                db.ref(`rooms/${roomID}`).once('value', snap => {
                    if(snap.exists()) {
                        db.ref(`rooms/${roomID}/user2`).set({ name, story: "" });
                        syncRoom();
                    } else alert("Otaq tapΡ±lmadΡ±!");
                });
            }
        }

        function syncRoom() {
            showScreen('screen-story');
            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    processAI(data);
                }
            });
        }

        function submitStory() {
            const story = document.getElementById('story-input').value.trim();
            if(story.length < 5) return alert("Bir az daha Οßox yazΡ±n.");
            
            db.ref(`rooms/${roomID}/${myRole}`).update({ story });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').innerText = "GΟΕnd…ôrildi";
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        async function processAI(data) {
            showScreen('screen-result');
            
            const prompt = `<|im_start|>system\nS…ôn …ôdal…ôtli hakims…ôn. MΟΦbahis…ôni Az…ôrbaycan dilind…ô analiz et. Kimin s…ôhv olduΡüunu dΟΦrΟΦst de.<|im_end|>\n<|im_start|>user\nT…ôr…ôf 1 (${data.user1.name}): ${data.user1.story}\nT…ôr…ôf 2 (${data.user2.name}): ${data.user2.story}<|im_end|>\n<|im_start|>assistant\n`;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-72B-Instruct", {
                    headers: { 
                        "Authorization": `Bearer ${SAFE_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({
                        inputs: prompt,
                        parameters: { max_new_tokens: 1000, temperature: 0.7 }
                    }),
                });

                const result = await response.json();
                let text = Array.isArray(result) ? result[0].generated_text : result.generated_text;
                const aiResponse = text.split("<|im_start|>assistant")[1] || text;

                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-output').classList.remove('hidden');
                document.getElementById('ai-output').innerHTML = aiResponse.trim().replace(/\n/g, "<br>");

            } catch (e) {
                document.getElementById('ai-loading').innerHTML = "X…ôta ba≈ü verdi.";
            }
        }
    </script>
</body>
</html>
