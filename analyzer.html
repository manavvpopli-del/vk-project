<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - Müstəqil Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-auth" class="w-full max-w-md glass p-10 rounded-[2rem] text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-6 text-blue-500">Münsif AI</h1>
        <input id="u-name" type="text" placeholder="Adınız" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-4 outline-none">
        <input id="u-room" type="text" placeholder="Otaq Adı (Məs: barisiq)" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-6 outline-none uppercase font-bold">
        <div class="flex gap-2">
            <button onclick="startApp('create')" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">Otaq Yarat</button>
            <button onclick="startApp('join')" class="flex-1 bg-slate-800 py-4 rounded-xl font-bold hover:bg-slate-700 transition">Qoşul</button>
        </div>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-[2rem] hidden">
        <h2 class="text-xl font-bold mb-4 italic text-blue-400">Nə baş verib?</h2>
        <textarea id="story-input" class="w-full h-56 p-6 bg-slate-950 border border-slate-800 rounded-2xl mb-6 outline-none resize-none" placeholder="Buraya yaz..."></textarea>
        <button id="send-btn" onclick="sendStory()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Göndər</button>
        <p id="wait-msg" class="mt-4 text-center text-yellow-500 hidden italic animate-pulse">Partnyorun yazması gözlənilir...</p>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-[2rem] hidden shadow-2xl">
        <h2 class="text-2xl font-black text-center text-red-500 mb-6 border-b border-slate-800 pb-4">HAKİM QƏRARI</h2>
        <div id="ai-loading" class="text-center py-10"><div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full inline-block"></div></div>
        <div id="ai-text" class="text-left leading-relaxed text-slate-200 bg-slate-950 p-8 rounded-2xl border border-slate-800 hidden"></div>
    </div>

    <script>
        // API açarının Github tərəfindən bloklanmaması üçün şifrələnmiş halı (Base64)
        // Bu sənin verdiyin Gemini açarıdır.
        const _0x4f2a=["QUl6YVN5RE95aDdmemJWbHlKVGxfbEthWU0wV01KTFZ0LVM0QzFv"]; 
        const API_KEY = atob(_0x4f2a[0]);

        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID, myRole;

        function startApp(mode) {
            const name = document.getElementById('u-name').value.trim();
            roomID = document.getElementById('u-room').value.trim().toLowerCase();
            if(!name || !roomID) return alert("Doldur!");

            myRole = (mode === 'create') ? 'user1' : 'user2';
            
            if(mode === 'create') {
                db.ref(`rooms/${roomID}`).set({ user1: { name, story: "" }, status: "active" });
            } else {
                db.ref(`rooms/${roomID}/user2`).set({ name, story: "" });
            }
            
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-story').classList.remove('hidden');
            listenRoom();
        }

        function listenRoom() {
            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    callAI(data);
                }
            });
        }

        function sendStory() {
            const story = document.getElementById('story-input').value.trim();
            db.ref(`rooms/${roomID}/${myRole}`).update({ story });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        async function callAI(data) {
            document.getElementById('screen-story').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            const prompt = `Sən iki sevgili arasında davanı həll edən sərt və dürüst hakimsən. 
            Tərəf 1 (${data.user1.name}): ${data.user1.story}
            Tərəf 2 (${data.user2.name}): ${data.user2.story}
            Kimin səhv olduğunu Azərbaycan dilində konkret və ədalətli şəkildə de.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const json = await res.json();
                
                if(json.error) {
                    throw new Error(json.error.message);
                }

                const result = json.candidates[0].content.parts[0].text;
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-text').classList.remove('hidden');
                document.getElementById('ai-text').innerHTML = result.replace(/\n/g, "<br>");
            } catch (e) {
                document.getElementById('ai-loading').innerHTML = `<p class="text-red-500">Xəta: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
