<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - İntellekt Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: #f0f6fc; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .hidden { display: none; }
        input, textarea { background: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        input:focus { border-color: #58a6ff !important; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md mb-6 p-4 glass rounded-2xl flex items-center justify-between border-dashed border-blue-500/50">
        <div class="overflow-hidden mr-2">
            <p class="text-[10px] text-slate-500 uppercase font-bold">İntellekt Kodu:</p>
            <p id="api-text" class="text-xs text-blue-400 truncate font-mono">AIzaSyDOyh7fzbVlyJTl_lKaYM0WMJLVt-S4C1o</p>
        </div>
        <button onclick="copyApi()" id="copy-btn" class="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition whitespace-nowrap">
            Kodu Kopyala
        </button>
    </div>

    <div id="screen-main" class="w-full max-w-md glass p-10 rounded-3xl text-center shadow-2xl">
        <h1 class="text-3xl font-extrabold mb-8 tracking-tight text-blue-400">Münsif AI</h1>
        <button onclick="showScreen('screen-create')" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4">Otaq Yarat</button>
        <button onclick="showScreen('screen-join')" class="w-full bg-slate-800 py-4 rounded-2xl font-bold">Otağa Qoşul</button>
    </div>

    <div id="screen-create" class="w-full max-w-md glass p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-6">Yeni Otaq</h2>
        <input id="c-name" type="text" placeholder="Adınız" class="w-full p-4 rounded-xl mb-4">
        <input id="c-room-pass" type="text" placeholder="Otaq üçün bir AD qoyun" class="w-full p-4 rounded-xl mb-4">
        <input id="c-api" type="password" placeholder="İntellekt Kodunu Bura Yapışdırın" class="w-full p-4 rounded-xl mb-8 border-blue-500/50">
        <button onclick="createRoom()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Otağı Başlat</button>
    </div>

    <div id="screen-join" class="w-full max-w-md glass p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400">Daxil Ol</h2>
        <input id="j-name" type="text" placeholder="Adınız" class="w-full p-4 rounded-xl mb-4">
        <input id="j-room-pass" type="text" placeholder="Otağın Adını Yazın" class="w-full p-4 rounded-xl mb-8">
        <button onclick="joinRoom()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold">Qoşul</button>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-3xl hidden">
        <textarea id="story-input" class="w-full h-60 p-6 rounded-2xl mb-6 outline-none resize-none" placeholder="Nə baş verib?"></textarea>
        <button id="send-btn" onclick="saveStory()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Göndər</button>
        <p id="wait-msg" class="mt-4 text-center text-yellow-500 hidden italic">Partnyorun yazması gözlənilir...</p>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-3xl hidden">
        <div id="ai-loading" class="text-center py-10"><div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full inline-block"></div></div>
        <div id="ai-text" class="leading-relaxed text-slate-200 hidden"></div>
        <button onclick="location.reload()" class="mt-8 text-slate-500 underline text-xs">Yeni Otaq</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let myRole = "";

        function copyApi() {
            const api = "AIzaSyDOyh7fzbVlyJTl_lKaYM0WMJLVt-S4C1o";
            navigator.clipboard.writeText(api);
            const btn = document.getElementById('copy-btn');
            btn.innerText = "KOPYALANDI! ✅";
            btn.classList.replace('bg-blue-600/20', 'bg-green-600');
            btn.classList.replace('text-blue-400', 'text-white');
            setTimeout(() => {
                btn.innerText = "Kodu Kopyala";
                btn.classList.replace('bg-green-600', 'bg-blue-600/20');
                btn.classList.replace('text-white', 'text-blue-400');
            }, 2000);
        }

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function createRoom() {
            const name = document.getElementById('c-name').value.trim();
            const pass = document.getElementById('c-room-pass').value.trim().toLowerCase();
            const api = document.getElementById('c-api').value.trim();

            if(!name || !pass || !api) return alert("Bütün xanaları doldurun!");
            
            roomID = pass;
            myRole = "user1";
            db.ref(`rooms/${roomID}`).set({
                user1: { name, story: "" },
                intellectKey: api,
                status: "waiting"
            }).then(() => startSync());
        }

        function joinRoom() {
            const name = document.getElementById('j-name').value.trim();
            const pass = document.getElementById('j-room-pass').value.trim().toLowerCase();

            if(!name || !pass) return alert("Doldur!");

            db.ref(`rooms/${pass}`).once('value', snap => {
                if(snap.exists()) {
                    roomID = pass;
                    myRole = "user2";
                    db.ref(`rooms/${roomID}/user2`).set({ name, story: "" });
                    startSync();
                } else alert("Otaq tapılmadı!");
            });
        }

        function startSync() {
            showScreen('screen-story');
            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    runAI(data);
                }
            });
        }

        function saveStory() {
            const s = document.getElementById('story-input').value.trim();
            db.ref(`rooms/${roomID}/${myRole}`).update({ story: s });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        async function runAI(data) {
            showScreen('screen-result');
            const prompt = `İki şəxs dalaşıb. Tərəf 1: ${data.user1.story}. Tərəf 2: ${data.user2.story}. Azərbaycan dilində kimin səhv olduğunu dürüst de.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${data.intellectKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-text').classList.remove('hidden');
                document.getElementById('ai-text').innerHTML = json.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
            } catch (e) {
                document.getElementById('ai-text').innerText = "İntellekt kodu xətası!";
                document.getElementById('ai-text').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
