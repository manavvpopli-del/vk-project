<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - Sadə Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: #f0f6fc; }
        .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .hidden { display: none; }
        input { background: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        input:focus { border-color: #58a6ff !important; outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-main" class="w-full max-w-md glass p-10 rounded-3xl text-center shadow-2xl">
        <div class="text-5xl mb-6">⚖️</div>
        <h1 class="text-3xl font-extrabold mb-8 tracking-tight text-blue-400">Münsif AI</h1>
        <button onclick="showScreen('screen-setup')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold mb-4 transition">Otaq Qur</button>
        <button onclick="showScreen('screen-join')" class="w-full bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition">Otağa Qoşul</button>
    </div>

    <div id="screen-setup" class="w-full max-w-md glass p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-6">Yeni Otaq</h2>
        <input id="c-user-name" type="text" placeholder="Adınız" class="w-full p-4 rounded-xl mb-4">
        <input id="c-room-name" type="text" placeholder="Otağa bir ad qoyun" class="w-full p-4 rounded-xl mb-8 border-blue-500/50">
        <button onclick="createRoom()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Otağı Aç</button>
    </div>

    <div id="screen-join" class="w-full max-w-md glass p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400">Daxil Ol</h2>
        <input id="j-user-name" type="text" placeholder="Adınız" class="w-full p-4 rounded-xl mb-4">
        <input id="j-room-name" type="text" placeholder="Otağın adını yazın" class="w-full p-4 rounded-xl mb-8">
        <button onclick="joinRoom()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold">Qoşul</button>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-3xl hidden">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h2 id="welcome-msg" class="text-xl font-bold text-blue-400 italic"></h2>
            <span id="room-id-display" class="text-[10px] bg-blue-500/10 px-3 py-1 rounded-full text-blue-400 font-black"></span>
        </div>
        <textarea id="story-input" class="w-full h-60 p-6 bg-slate-900 border border-slate-800 rounded-2xl mb-6 outline-none focus:border-blue-500 transition resize-none" placeholder="Buraya ətraflı yazın..."></textarea>
        <button id="send-btn" onclick="saveStory()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Göndər</button>
        <div id="wait-msg" class="mt-6 text-center text-yellow-500 hidden italic animate-pulse">Partnyorun yazması gözlənilir...</div>
    </div>

    <div id="screen-verify" class="w-full max-w-5xl glass p-10 rounded-3xl hidden text-center">
        <h2 class="text-2xl font-bold mb-8">Hekayələr Hazırdır</h2>
        <div class="grid md:grid-cols-2 gap-6 mb-10 text-left">
            <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800 shadow-xl"><p id="v-u1" class="text-slate-300"></p></div>
            <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800 shadow-xl"><p id="v-u2" class="text-slate-300"></p></div>
        </div>
        <button id="conf-btn" onclick="confirmStory()" class="w-full max-w-sm mx-auto bg-white text-black py-4 rounded-xl font-black hover:bg-slate-200 transition">ANALİZ ET</button>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-black text-center text-red-500 mb-6 italic">HAKİM QƏRARI</h2>
        <div id="ai-loading" class="text-center py-10">
            <div class="inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div id="ai-text" class="leading-relaxed text-slate-200 bg-black/40 p-6 rounded-2xl border border-slate-800 hidden text-lg"></div>
        <button onclick="location.reload()" class="mt-8 w-full text-slate-500 hover:text-white text-xs underline">Yeni Otaq</button>
    </div>

    <script>
        // Sənin API açarın burada gizli saxlanılır
        const MASTER_API = "AIzaSyDOyh7fzbVlyJTl_lKaYM0WMJLVt-S4C1o";

        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = "";
        let myRole = "";

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function createRoom() {
            const name = document.getElementById('c-user-name').value.trim();
            const room = document.getElementById('c-room-name').value.trim().toLowerCase().replace(/\s+/g, '-');

            if(!name || !room) return alert("Adları boş buraxmayın!");

            currentRoom = room;
            myRole = "user1";
            db.ref(`rooms/${currentRoom}`).set({
                user1: { name, story: "", confirmed: false },
                status: "active"
            }).then(() => startSync());
        }

        function joinRoom() {
            const name = document.getElementById('j-user-name').value.trim();
            const room = document.getElementById('j-room-name').value.trim().toLowerCase().replace(/\s+/g, '-');

            if(!name || !room) return alert("Məlumatları doldurun!");

            db.ref(`rooms/${room}`).once('value', snap => {
                if(snap.exists()) {
                    currentRoom = room;
                    myRole = "user2";
                    db.ref(`rooms/${currentRoom}/user2`).set({ name, story: "", confirmed: false });
                    startSync();
                } else {
                    alert("Belə bir otaq adı tapılmadı! Düzgün yazdığınızdan əmin olun.");
                }
            });
        }

        function startSync() {
            showScreen('screen-story');
            document.getElementById('room-id-display').innerText = currentRoom;
            db.ref(`rooms/${currentRoom}`).on('value', snap => {
                const data = snap.val();
                if(data) {
                    const me = data[myRole];
                    document.getElementById('welcome-msg').innerText = "Salam, " + me.name;
                    
                    if(data.user1.story && data.user2 && data.user2.story) {
                        showScreen('screen-verify');
                        document.getElementById('v-u1').innerHTML = `<b>${data.user1.name}:</b><br>${data.user1.story}`;
                        document.getElementById('v-u2').innerHTML = `<b>${data.user2.name}:</b><br>${data.user2.story}`;
                        if(data.user1.confirmed && data.user2.confirmed) runAI(data);
                    }
                }
            });
        }

        function saveStory() {
            const val = document.getElementById('story-input').value.trim();
            if(val.length < 5) return alert("Bir az daha ətraflı yazın.");
            db.ref(`rooms/${currentRoom}/${myRole}`).update({ story: val });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').innerText = "Məlumat Göndərildi";
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        function confirmStory() {
            db.ref(`rooms/${currentRoom}/${myRole}`).update({ confirmed: true });
            document.getElementById('conf-btn').disabled = true;
            document.getElementById('conf-btn').innerText = "Digər tərəf gözlənilir...";
        }

        async function runAI(data) {
            showScreen('screen-result');
            const prompt = `Sən iki şəxs arasındakı mübahisəni analiz edən Münsifsən. Sərt, ədalətli və dürüst ol.
            Tərəf 1 (${data.user1.name}): ${data.user1.story}
            Tərəf 2 (${data.user2.name}): ${data.user2.story}
            Analiz et və Azərbaycan dilində kimin səhv etdiyini konkret de.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MASTER_API}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                const aiResponse = json.candidates[0].content.parts[0].text;
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-text').classList.remove('hidden');
                document.getElementById('ai-text').innerHTML = aiResponse.replace(/\n/g, "<br>");
            } catch (e) {
                document.getElementById('ai-text').innerText = "Süni İntellektlə əlaqə kəsildi. API kodunu yoxlayın.";
                document.getElementById('ai-text').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
