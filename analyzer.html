<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - Mistral Hakimlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #09090b; color: #fafafa; }
        .glass { background: #18181b; border: 1px solid #27272a; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .hidden { display: none; }
        .input-style { background: #09090b !important; border: 1px solid #27272a !important; color: white !important; transition: all 0.3s; }
        .input-style:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="screen-auth" class="w-full max-w-md glass p-10 text-center animate-in fade-in zoom-in duration-500">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-4xl shadow-lg shadow-blue-500/20">⚖️</div>
        <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Münsif AI</h1>
        <p class="text-zinc-500 mb-10 text-sm font-medium uppercase tracking-widest">Mistral Large İntellekti</p>
        
        <div class="space-y-4">
            <input id="u-name" type="text" placeholder="Adınız" class="w-full p-4 input-style rounded-2xl">
            <input id="u-room" type="text" placeholder="Otaq Kodu" class="w-full p-4 input-style rounded-2xl text-center font-bold uppercase tracking-widest text-blue-400">
        </div>

        <div class="flex gap-4 mt-10">
            <button onclick="initApp('create')" class="flex-1 bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/10">Otaq Qur</button>
            <button onclick="initApp('join')" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-bold transition-all active:scale-95">Qoşul</button>
        </div>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 hidden animate-in slide-in-from-bottom duration-500">
        <h2 class="text-2xl font-bold mb-6 italic text-blue-400">Hekayənizi yazın...</h2>
        <textarea id="story-input" class="w-full h-64 p-6 input-style rounded-3xl mb-8 resize-none text-lg leading-relaxed" placeholder="Hadisəni bütün detalları ilə, dürüst şəkildə qeyd edin..."></textarea>
        <button id="send-btn" onclick="submitStory()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold text-xl transition-all shadow-xl shadow-blue-600/10">Hakimə Göndər</button>
        <div id="wait-msg" class="mt-6 text-yellow-500/80 text-center hidden italic animate-pulse font-medium">
            Tərəfdaşınızın hekayəsi gözlənilir...
        </div>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 hidden border-t-4 border-red-600/50 animate-in fade-in duration-700">
        <h2 class="text-3xl font-black text-center text-red-500 mb-10 italic uppercase tracking-tighter">HAKİMİN HÖKMÜ</h2>
        
        <div id="ai-loading" class="text-center py-12">
            <div class="inline-block w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
            <p class="text-zinc-500 italic">Mistral arqumentləri tərəziyə qoyur...</p>
        </div>

        <div id="ai-output" class="text-left text-zinc-200 bg-zinc-900/50 p-8 rounded-[2rem] border border-zinc-800 hidden text-lg leading-relaxed shadow-inner"></div>
        
        <button onclick="location.reload()" class="mt-10 w-full text-zinc-600 hover:text-white transition text-[10px] font-black uppercase tracking-[0.3em]">Yeni Bir Məhkəmə Başlat</button>
    </div>

    <script>
        // Sənin Mistral API Açarın
        const MISTRAL_KEY = "ZSQ2F8PEEHxwj9wDExOIpMW00wQu4NzZ";

        // Firebase Konfiqurasiyası
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let myRole = "";

        function initApp(mode) {
            const name = document.getElementById('u-name').value.trim();
            roomID = document.getElementById('u-room').value.trim().toLowerCase();

            if(!name || !roomID) return alert("Ad və Otaq Kodu mütləqdir!");

            myRole = (mode === 'create') ? 'user1' : 'user2';

            if(mode === 'create') {
                db.ref(`rooms/${roomID}`).set({
                    user1: { name, story: "" },
                    status: "active",
                    createdAt: Date.now()
                }).then(() => listen());
            } else {
                db.ref(`rooms/${roomID}`).once('value', snap => {
                    if(snap.exists()) {
                        db.ref(`rooms/${roomID}/user2`).set({ name, story: "" });
                        listen();
                    } else alert("Bu kodla otaq tapılmadı!");
                });
            }
        }

        function listen() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-story').classList.remove('hidden');

            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    processAnaliz(data);
                }
            });
        }

        function submitStory() {
            const story = document.getElementById('story-input').value.trim();
            if(story.length < 5) return alert("Hekayəniz çox qısadır...");
            
            db.ref(`rooms/${roomID}/${myRole}`).update({ story });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').classList.replace('bg-blue-600', 'bg-zinc-800');
            document.getElementById('send-btn').innerText = "Hekayə Göndərildi";
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        async function processAnaliz(data) {
            document.getElementById('screen-story').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            const prompt = `Sən Azərbaycan dilində danışan, çox təcrübəli və dürüst bir münsifsən. Sənə iki tərəfin mübahisəsi göndərilib.
            Vəzifən: Hər iki hekayəni obyektiv analiz etmək, kimin səhv olduğunu dürüst və sərt şəkildə bildirmək. Diplomatik dildən qaç, konkret ol.
            
            Tərəf 1 (${data.user1.name}): ${data.user1.story}
            Tərəf 2 (${data.user2.name}): ${data.user2.story}`;

            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${MISTRAL_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "mistral-large-latest",
                        messages: [
                            { role: "system", content: "Sən Azərbaycan dilində danışan dürüst bir hakimsən." },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7
                    })
                });

                const json = await response.json();
                const aiResponse = json.choices[0].message.content;

                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-output').classList.remove('hidden');
                document.getElementById('ai-output').innerHTML = aiResponse.trim().replace(/\n/g, "<br>");

            } catch (e) {
                document.getElementById('ai-loading').innerHTML = `<p class="text-red-500">Analiz zamanı xəta baş verdi. API açarını və ya interneti yoxlayın.</p>`;
            }
        }
    </script>
</body>
</html>
