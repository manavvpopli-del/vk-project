<div id="wifi-module" style="color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; background: #000; border: 1px solid #004400; border-radius: 15px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-wifi" style="font-size: 3rem; animation: wifi-pulse 1.5s infinite;"></i>
        <h3 style="font-family: 'Syncopate'; margin-top: 15px;">WIFI VULN SCANNER</h3>
    </div>

    <button onclick="scanWiFi()" id="wifi-btn" style="width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer;">SCAN NEARBY NETWORKS</button>

    <div id="wifi-list" style="margin-top: 20px; height: 250px; overflow-y: auto; font-size: 0.75rem;">
        <div style="opacity: 0.5;">[IDLE]: Scanner ready...</div>
    </div>
</div>

<style>
    @keyframes wifi-pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    .wifi-item { background: rgba(0,255,0,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #002200; }
</style>

<script>
    function scanWiFi() {
        const btn = document.getElementById('wifi-btn');
        const list = document.getElementById('wifi-list');
        btn.disabled = true;
        btn.innerText = "SCANNING...";
        list.innerHTML = "<div>[SYSTEM]: Initializing wireless interface...</div>";

        const nets = [
            {s: "Aztelekom_5G", q: "WPA2-PSK", v: "Medium"},
            {s: "Baku_Public_WiFi", q: "OPEN", v: "CRITICAL"},
            {s: "Home_Network_77", q: "WPA2/AES", v: "Low"},
            {s: "TP-LINK_Private", q: "WPA-TKIP", v: "High"}
        ];

        let i = 0;
        const interval = setInterval(() => {
            if(i < nets.length) {
                const item = nets[i];
                list.innerHTML += `
                    <div class="wifi-item">
                        <b>SSID: ${item.s}</b><br>
                        Auth: ${item.q} | Vuln: <span style="color:${item.v==='CRITICAL'?'red':'yellow'}">${item.v}</span><br>
                        <small style="opacity:0.6;">BSSID: ${Math.random().toString(16).substring(2,14).match(/.{1,2}/g).join(':')}</small>
                    </div>
                `;
                list.scrollTop = list.scrollHeight;
                i++;
            } else {
                clearInterval(interval);
                btn.disabled = false;
                btn.innerText = "RESCAN";
            }
        }, 1500);
    }
</script>
