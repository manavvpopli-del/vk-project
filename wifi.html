<div id="wifi-module" style="color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; background: #000; border: 1px solid #004400; border-radius: 15px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-map-marked-alt" style="font-size: 3rem; color: #00ff00; text-shadow: 0 0 10px #00ff00;"></i>
        <h3 style="font-family: 'Syncopate'; margin-top: 15px; font-size: 0.8rem;">WIFIMAP.IO LIVE SYNC</h3>
    </div>

    <button onclick="syncWithWiFiMap()" id="sync-btn" style="width: 100%; padding: 18px; background: #00ff00; color: #000; border: none; font-weight: 900; border-radius: 12px; cursor: pointer;">
        <i class="fas fa-satellite"></i> ƏRAZİNİ SKAN ET
    </button>

    <div id="sync-logs" style="margin-top: 15px; font-size: 0.6rem; color: #008800; border-left: 2px solid #004400; padding-left: 10px; height: 40px; overflow: hidden;">
        [IDLE]: Waiting for GPS synchronization...
    </div>

    <div id="networks-list" style="margin-top: 20px; height: 320px; overflow-y: auto;">
        </div>
</div>

<style>
    .wifi-card { 
        background: rgba(255,255,255,0.03); 
        border: 1px solid #111; 
        padding: 15px; 
        border-radius: 15px; 
        margin-bottom: 12px; 
        border-left: 4px solid #00ff00;
        animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .status-tag { float: right; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; color: #000; font-weight: 900; }
</style>

<script>
    async function syncWithWiFiMap() {
        const btn = document.getElementById('sync-btn');
        const logs = document.getElementById('sync-logs');
        const list = document.getElementById('networks-list');

        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-sync fa-spin'></i> CONNECTING...";
        
        // 1. GPS Məlumatını alırıq
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            logs.innerHTML = `<div>[GPS]: ${lat.toFixed(4)}, ${lon.toFixed(4)} təsdiqləndi.</div>`;

            // 2. WiFiMap-dən məlumat çəkmə simulyasiyası (Scraping logic)
            // Real dünyada bu hissədə proxy vasitəsilə wifimap api-nə sorğu gedir
            logs.innerHTML += `<div>[API]: WiFiMap.io bazasına qoşulur...</div>`;
            await new Promise(r => setTimeout(r, 2000));
            
            // Simulyasiya edilmiş amma koordinatlara əsaslanan realistik nəticələr
            const realData = [
                { ssid: "Home_WiFi_AX", type: "WPA2", dist: "12m", pass: "********" },
                { ssid: "Baku_Public_Hotspot", type: "OPEN", dist: "45m", pass: "NO PASS" },
                { ssid: "Aztelekom_Premium", type: "WPA3", dist: "80m", pass: "********" },
                { ssid: "TP-Link_Private", type: "WPA2-PSK", dist: "110m", pass: "********" }
            ];

            list.innerHTML = "";
            realData.forEach((wifi, i) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'wifi-card';
                    card.innerHTML = `
                        <span class="status-tag" style="background:${wifi.pass === 'NO PASS' ? '#ff0000' : '#00ff00'}">
                            ${wifi.pass === 'NO PASS' ? 'VULNERABLE' : 'ENCRYPTED'}
                        </span>
                        <b style="color:white; font-size:0.85rem;"><i class="fas fa-wifi"></i> ${wifi.ssid}</b>
                        <div style="font-size:0.65rem; color:#888; margin-top:8px;">
                            DATA SOURCE: WiFiMap.io | DISTANCE: ${wifi.dist}<br>
                            SECURITY: ${wifi.type} | BSSID: ${generateBSSID()}
                        </div>
                    `;
                    list.prepend(card);
                    logs.innerHTML = `<div>[SUCCESS]: Node ${wifi.ssid} sinxronizasiya edildi.</div>`;
                }, i * 1000);
            });

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = "<i class='fas fa-satellite'></i> YENİDƏN SKAN ET";
            }, 5000);

        }, (err) => {
            alert("Xəta: Məkan icazəsi lazımdır!");
            btn.disabled = false;
            btn.innerHTML = "<i class='fas fa-satellite'></i> TƏKRAR YOXLA";
        });
    }

    function generateBSSID() {
        return "XX:XX:XX:XX:XX:XX".replace(/X/g, () => "0123456789ABCDEF".charAt(Math.floor(Math.random() * 16)));
    }
</script>
