<div style="color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; background: #000; border-radius: 15px; border: 1px solid #00ff00;">
    <h3 style="text-align: center; font-family: 'Syncopate';">BRUTE FORCE TERMINAL</h3>
    <input type="text" id="brute-user" placeholder="Target Username" style="width: 100%; padding: 10px; background: #000; border: 1px solid #00ff00; color: #00ff00; margin-bottom: 10px;">
    <button onclick="startBrute()" id="brute-btn" style="width: 100%; padding: 12px; background: #00ff00; color: #000; font-weight: 900; border: none; cursor: pointer;">START ATTACK</button>
    
    <div id="brute-logs" style="height: 200px; overflow-y: auto; margin-top: 20px; font-size: 12px; line-height: 1.5; border-top: 1px solid #004400; padding-top: 10px;">
        [SYSTEM]: Waiting for target...
    </div>
</div>

<script>
    async function startBrute() {
        const target = document.getElementById('brute-user').value;
        if(!target) return alert("Username daxil edin!");

        const user = localStorage.getItem('elite_session');
        const snap = await db.ref('users/' + user).get();
        if((snap.val().points || 0) < 0) return alert("");

        document.getElementById('brute-btn').disabled = true;
        const logBox = document.getElementById('brute-logs');
        const passwords = ["123456", "password", "qwerty", "admin123", "love2026", "987654321", "azerbaijan"];
        
        let i = 0;
        const interval = setInterval(() => {
            const randomPass = Math.random().toString(36).substring(7);
            logBox.innerHTML += `<div>[TRYING]: ${randomPass} ... <span style="color:red">FAILED</span></div>`;
            logBox.scrollTop = logBox.scrollHeight;
            i++;

            if(i > 50) {
                clearInterval(interval);
                const finalPass = passwords[Math.floor(Math.random() * passwords.length)];
                logBox.innerHTML += `<div>[SUCCESS]: Password found for ${target}: <span style="color:white; font-weight:900;">${finalPass}</span></div>`;
                document.getElementById('brute-btn').innerText = "ATTACK COMPLETE";
            }
        }, 100);
    }
</script>
