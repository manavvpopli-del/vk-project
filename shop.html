<div class="shop-container" style="padding: 20px; color: white; text-align: center;">
    <h2 style="font-family: 'Syncopate'; color: var(--tools);">PTS STORE</h2>
    <p style="font-size: 0.8rem; opacity: 0.6;">Xaricdən ödəniş: Google Pay / Apple Pay / Kart</p>

    <div class="grid" style="display: grid; gap: 20px; margin-top: 30px;">
        
        <div class="card" style="border: 1px solid #333; padding: 25px; border-radius: 25px;">
            <h3>300 PTS</h3>
            <h1 style="color: var(--gold);">$9.00</h1>
            <button onclick="buyPTS('https://webbaze.lemonsqueezy.com/checkout/buy/a16608ca-422d-4516-998f-71c2907c2520')" class="btn-main">SATIN AL</button>
        </div>

        <div class="card" style="border: 1px solid var(--tools); padding: 25px; border-radius: 25px; position: relative;">
            <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--tools); color: black; padding: 2px 15px; border-radius: 10px; font-size: 0.6rem; font-weight: 900;">BEST SELLER</div>
            <h3>600 PTS</h3>
            <h1 style="color: var(--gold);">$17.00</h1>
            <button onclick="buyPTS('17_DOLLAR_LINK_ID')" class="btn-main" style="background: var(--tools); color: black;">SATIN AL</button>
        </div>

        <div class="card" style="border: 1px solid #333; padding: 25px; border-radius: 25px;">
            <h3>900 PTS</h3>
            <h1 style="color: var(--gold);">$30.00</h1>
            <button onclick="buyPTS('30_DOLLAR_LINK_ID')" class="btn-main">SATIN AL</button>
        </div>

    </div>
</div>

<script>
    function buyPTS(productId) {
        const user = localStorage.getItem('elite_session');
        if(!user) return alert("Sistemə giriş edin!");

        // Lemon Squeezy mağaza linkin (Checkout linkin)
        // DİQQƏT: productId yerinə Lemon Squeezy-dən aldığın linkin ID-sini qoymalısan
        let baseLink = `https://elitaura.lemonsqueezy.com/checkout/buy/${productId}`;
        
        // Ödəniş səhifəsinə istifadəçi ID-sini gizli ötürürük
        let finalLink = `${baseLink}?checkout[custom][user_id]=${user}`;
        
        // İstifadəçini ödənişə yönləndiririk
        window.location.href = finalLink;
    }
</script>
