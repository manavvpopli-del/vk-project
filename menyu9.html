<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #05070a;
            --surface: #0f1218;
            --accent: #00f2ff;
            --text: #e0e6ed;
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains+Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 95%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            color: var(--accent);
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            margin-bottom: 40px;
            font-size: 28px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .menu-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .menu-card:hover::before {
            transform: translateX(100%);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .card-title {
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-top: 10px;
            box-shadow: 0 0 10px #00ff88;
        }

        /* Boş olanlar üçün stil (Disabled görünüş) */
        .locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>V.K PROJECT - MAIGRAT</h1>
        </div>

        <div class="menu-grid">
            
            <a href="osint1.html" class="menu-card">
                <div class="icon">🔍</div>
                <div class="card-title">User Osint</div>
                <div class="status-dot"></div>
            </a>

            <a href="#" class="menu-card locked">
                <div class="icon">📡</div>
                <div class="card-title">IP Tracker</div>
                <p style="font-size: 10px; margin-top: 5px;">Tezliklə...</p>
            </a>

            <a href="#" class="menu-card locked">
                <div class="icon">🕵️</div>
                <div class="card-title">Phone Lookup</div>
                <p style="font-size: 10px; margin-top: 5px;">Tezliklə...</p>
            </a>

            <a href="#" class="menu-card locked">
                <div class="icon">🛠️</div>
                <div class="card-title">Settings</div>
                <p style="font-size: 10px; margin-top: 5px;">V 1.0.0</p>
            </a>

        </div>
    </div>

</body>
</html>
