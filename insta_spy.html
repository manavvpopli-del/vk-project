<div id="insta-spy-container" style="color: white; font-family: 'Outfit', sans-serif; max-width: 600px; margin: auto; padding: 20px;">
    
    <div id="step-search" style="text-align: center;">
        <div style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            <i class="fab fa-instagram" style="font-size: 5rem; margin-bottom: 20px;"></i>
        </div>
        <h2 style="font-family: 'Syncopate'; font-size: 1.1rem; letter-spacing: 2px;">INSTA-SPY PROTOCOL</h2>
        <p style="opacity: 0.6; font-size: 0.8rem;">Hədəf profilin adını daxil edin (Private/Gizli profillər daxil).</p>
        
        <div style="position: relative; margin-top: 30px;">
            <input type="text" id="target-username" placeholder="məs: ismail_v1" 
                style="width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: #111; color: white; text-align: center; font-size: 1.1rem; outline: none;">
        </div>
        <button onclick="fetchInstagramProfile()" 
            style="width: 100%; margin-top: 20px; padding: 18px; border-radius: 20px; border: none; background: #fff; color: #000; font-weight: 900; cursor: pointer; letter-spacing: 1px;">
            ANALİZİ BAŞLAT
        </button>
    </div>

    <div id="step-loading" style="display: none; text-align: center; margin-top: 50px;">
        <div class="radar"></div>
        <h3 id="loading-msg" style="margin-top: 30px; font-size: 0.9rem; color: #00dfff;">Sistemə sızılır...</h3>
        <div style="width: 100%; height: 4px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden;">
            <div id="load-bar" style="width: 0%; height: 100%; background: #00dfff; transition: 0.2s;"></div>
        </div>
    </div>

    <div id="step-pay" style="display: none; text-align: center; animation: fadeIn 0.5s;">
        <div class="profile-preview-card" style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);">
            <img id="target-pic" src="" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff007a; padding: 5px; object-fit: cover;">
            <h2 id="target-display-name" style="margin: 15px 0 5px 0;"></h2>
            <p style="color: #ff007a; font-weight: 800; font-size: 0.9rem;"><i class="fas fa-lock"></i> GİZLİ PROFİL</p>
            
            <div style="display: flex; justify-content: space-around; margin: 25px 0; border-top: 1px solid #333; padding-top: 20px;">
                <div><b>???</b><br><small>Post</small></div>
                <div><b>???</b><br><small>Follower</small></div>
                <div><b>???</b><br><small>Following</small></div>
            </div>

            <div style="background: rgba(255,215,0,0.1); padding: 15px; border-radius: 15px; border: 1px solid gold; margin-bottom: 20px;">
                <span style="color: gold; font-weight: 900;">GİRİŞ ÜÇÜN: 900 PTS</span>
            </div>
            <button onclick="confirmUnlock()" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: #ff007a; color: white; font-weight: 900; cursor: pointer;">PROFİLİ AÇ</button>
        </div>
    </div>

    <div id="step-final" style="display: none; animation: slideUp 0.6s;">
        <div class="insta-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <img id="final-pic" src="" style="width: 50px; height: 50px; border-radius: 50%;">
            <div id="final-name" style="font-weight: 900;"></div>
        </div>
        <div class="insta-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            </div>
        <p style="text-align: center; opacity: 0.5; margin-top: 20px; font-size: 0.8rem;">Server xətası: Digər postlar yüklənə bilmədi.</p>
    </div>

</div>

<style>
    .radar {
        width: 80px; height: 80px; border: 3px solid #00dfff; border-radius: 50%;
        margin: auto; position: relative; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

<script>
    async function fetchInstagramProfile() {
        const user = document.getElementById('target-username').value.trim();
        if(!user) return alert("İstifadəçi adı yazın!");

        document.getElementById('step-search').style.display = 'none';
        document.getElementById('step-loading').style.display = 'block';

        // Real profil şəklini çəkmək üçün açıq API (müvəqqəti simulyasiya üçün)
        // Qeyd: Bu link bəzən İnstagram blokuna düşə bilər, amma simulyasiya üçün ən yaxşısıdır
        const profilePicUrl = `https://www.instagram.com/${user}/?__a=1&__d=dis`; 
        
        // Animasiya imitasiyası
        let p = 0;
        const interval = setInterval(() => {
            p += Math.random() * 5;
            document.getElementById('load-bar').style.width = p + "%";
            if(p >= 100) {
                clearInterval(interval);
                showPayScreen(user);
            }
        }, 100);
    }

    function showPayScreen(user) {
        document.getElementById('step-loading').style.display = 'none';
        document.getElementById('step-pay').style.display = 'block';
        document.getElementById('target-display-name').innerText = "@" + user;
        // Həqiqi şəkil çəkmək çətin olanda default müasir avatar qoyur
        document.getElementById('target-pic').src = `https://unavatar.io/instagram/${user}`;
    }

    async function confirmUnlock() {
        const currentUser = window.loginUser || localStorage.getItem('active_user');
        if(!currentUser) return alert("Sistemə daxil olmamısınız!");

        const userRef = db.ref('users/' + currentUser);
        const snap = await userRef.get();
        const points = snap.val().points || 0;

        if(points < 900) {
            alert(`Xalınız çatmır! Lazımdır: 900 PTS. Balans: ${points} PTS`);
            return;
        }

        if(confirm("900 PTS balansınızdan çıxılacaq. Razısınız?")) {
            await userRef.update({ points: points - 900 });
            showFinalProfile();
        }
    }

    function showFinalProfile() {
        document.getElementById('step-pay').style.display = 'none';
        document.getElementById('step-final').style.display = 'block';
        
        document.getElementById('final-pic').src = document.getElementById('target-pic').src;
        document.getElementById('final-name').innerText = document.getElementById('target-display-name').innerText;

        const grid = document.querySelector('.insta-grid');
        grid.innerHTML = "";
        // Random 9 post şəkli yaradırıq (Simulyasiya üçün yüksək keyfiyyətli random şəkillər)
        for(let i=1; i<=9; i++) {
            grid.innerHTML += `<div style="aspect-ratio: 1/1; background: url(https://picsum.photos/300/300?random=${i+10}); background-size: cover;"></div>`;
        }
    }
</script>
