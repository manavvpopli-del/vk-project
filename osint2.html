<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Real Email OSINT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #05070a;
            --primary: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #10b981;
            --error: #f43f5e;
            --text: #e2e8f0;
        }

        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; outline: none; }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .app-container {
            width: 90%; max-width: 450px; height: 90vh;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            display: flex; flex-direction: column; padding: 30px;
        }

        .header h1 { font-size: 20px; text-align: center; color: var(--primary); letter-spacing: 1px; }

        input {
            width: 100%; padding: 18px; background: #000;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: var(--primary); font-weight: 600; margin-bottom: 15px;
        }

        button {
            width: 100%; padding: 16px; background: var(--primary);
            color: white; border: none; border-radius: 18px;
            font-weight: 800; cursor: pointer;
        }

        .results-list { flex: 1; margin-top: 20px; overflow-y: auto; scrollbar-width: none; }

        .res-card {
            background: rgba(255, 255, 255, 0.02); padding: 15px;
            border-radius: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between;
            border-left: 4px solid transparent;
        }

        .res-card.found { border-left-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .res-card.not-found { border-left-color: var(--error); opacity: 0.5; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container">
        <div class="header"><h1>V.K EMAIL ANALYZER</h1></div>
        <input type="email" id="emailInput" placeholder="Email daxil edin..." spellcheck="false">
        <button id="startBtn">REAL ANALİZİ BAŞLAT</button>
        <div class="results-list" id="results"></div>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const results = document.getElementById('results');
        const emailInput = document.getElementById('emailInput');

        // Brauzer bloklamasını aşmaq üçün ən stabil proxy
        const PROXY = "https://corsproxy.io/?";

        async function checkAdobe(email) {
            try {
                const res = await fetch(PROXY + "https://auth.services.adobe.com/signin/v2/users/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, client_id: "AdobeID" })
                });
                const data = await res.json();
                return data.userStatus === "EXISTS";
            } catch (e) { return false; }
        }

        async function checkGravatar(email) {
            const hash = CryptoJS.MD5(email.toLowerCase().trim()).toString();
            try {
                const res = await fetch(`https://en.gravatar.com/${hash}.json`);
                return res.status === 200;
            } catch (e) { return false; }
        }

        async function checkImgur(email) {
            try {
                const res = await fetch(PROXY + `https://imgur.com/signin/password_found/${email}`);
                const data = await res.json();
                return data.exists === true;
            } catch (e) { return false; }
        }

        btn.onclick = async () => {
            const email = emailInput.value.trim();
            if (!email.includes('@')) return;

            btn.disabled = true;
            btn.innerText = "SORĞU GÖNDƏRİLİR...";
            results.innerHTML = "";

            // 1. Gravatar (Real Yoxlanış)
            const grav = await checkGravatar(email);
            render("Gravatar", grav);

            // 2. Adobe (Real API Yoxlanış)
            const adobe = await checkAdobe(email);
            render("Adobe Creative Cloud", adobe);

            // 3. Imgur (Real API Yoxlanış)
            const imgur = await checkImgur(email);
            render("Imgur", imgur);

            btn.disabled = false;
            btn.innerText = "REAL ANALİZİ BAŞLAT";
        };

        function render(name, found) {
            const card = document.createElement('div');
            card.className = `res-card ${found ? 'found' : 'not-found'}`;
            card.innerHTML = `<b>${name}</b> <span>${found ? 'TAPILDI' : 'YOXDUR'}</span>`;
            results.prepend(card);
        }
    </script>
</body>
</html>
