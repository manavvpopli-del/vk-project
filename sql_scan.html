<div id="sql-container" style="color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center;">
    <div style="margin-bottom: 25px;">
        <i class="fas fa-database" style="font-size: 3.5rem; animation: pulse 1.5s infinite;"></i>
    </div>
    
    <h3 style="font-family: 'Syncopate'; letter-spacing: 2px;">SQLi VULN SCANNER</h3>
    
    <input type="text" id="sql-target" placeholder="https://example.com/item.php?id=5" 
        style="width: 100%; padding: 15px; background: #000; border: 1px solid #00ff00; color: #00ff00; text-align: center; border-radius: 5px; outline: none;">

    <button onclick="scanSQL()" id="scan-btn"
        style="width: 100%; margin-top: 15px; padding: 18px; background: #00ff00; color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px rgba(0,255,0,0.3);">
        INITIATE SCAN
    </button>

    <div id="scan-results" style="margin-top: 30px; text-align: left; background: rgba(0,255,0,0.02); padding: 15px; border-radius: 10px; border: 1px solid #020;">
        <div id="scan-status" style="font-size: 0.8rem; border-bottom: 1px solid #030; padding-bottom: 10px; margin-bottom: 10px;">
            > WAITING FOR PARAMETER...
        </div>
        <div id="scan-details" style="font-size: 0.7rem; color: #008800; line-height: 1.6;"></div>
    </div>
</div>

<style>
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    .scan-line { animation: typeLine 0.1s ease; }
    @keyframes typeLine { from { opacity: 0; } to { opacity: 1; } }
</style>

<script>
async function scanSQL() {
    const url = document.getElementById('sql-target').value;
    if(!url.includes('?')) return alert("Skan etmək üçün parametrli URL daxil edin (məs: ?id=1)");

    const user = localStorage.getItem('elite_session');
    const snap = await db.ref('users/' + user).get();
    if((snap.val().points || 0) < 0) return alert("");

    db.ref('users/' + user).update({ points: snap.val().points - 500 });

    const btn = document.getElementById('scan-btn');
    const status = document.getElementById('scan-status');
    const details = document.getElementById('scan-details');
    
    btn.disabled = true;
    btn.innerText = "SCANNING...";
    status.innerHTML = "> ANALYZING REQUEST... <span class='fa-spin fas fa-spinner'></span>";
    details.innerHTML = "";

    const payloads = ["Injecting single quote...", "Testing boolean-based blind...", "Checking UNION-based...", "Analyzing error response..."];
    let i = 0;

    const interval = setInterval(async () => {
        if(i < payloads.length) {
            details.innerHTML += `<div class="scan-line">[INFO]: ${payloads[i]}</div>`;
            i++;
        } else {
            clearInterval(interval);
            try {
                // Real zamanlı yoxlanış
                const testUrl = url + "'";
                await fetch(testUrl, { mode: 'no-cors' });
                
                status.innerHTML = "> <span style='color:white; background:red; padding: 2px 5px;'>VULNERABILITY DETECTED!</span>";
                details.innerHTML += `<div style="color:#0f0; margin-top:10px; font-weight:bold;">[RESULT]: Target is vulnerable to SQL Injection. Error: 'near syntax' detected.</div>`;
            } catch(e) {
                status.innerHTML = "> SCAN COMPLETE. NO VULN FOUND.";
                details.innerHTML += `<div style="color:white; margin-top:10px;">[RESULT]: WAF Detected or Target is Secured.</div>`;
            }
            btn.disabled = false;
            btn.innerText = "NEW SCAN (500 PTS)";
        }
    }, 1500);
}
</script>
