<div id="music-module" style="color: white; font-family: 'Outfit', sans-serif; padding: 15px; background: #020205; border: 1px solid #00ffcc; border-radius: 25px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-music" style="font-size: 2.5rem; color: #00ffcc; text-shadow: 0 0 10px #00ffcc;"></i>
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px;">MUSIC FINDER PRO</h2>
    </div>

    <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid #111;">
        <input type="text" id="music-name" placeholder="Mahnı və ya İfaçı adı..." 
            style="width: 100%; padding: 15px; background: #000; border: 1px solid #00ffcc; color: white; border-radius: 12px; text-align: center; font-weight: 900; outline: none; margin-bottom: 12px;">
        
        <button onclick="searchMusic()" id="music-btn" 
            style="width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%;">
            MAHNINI TAP
        </button>
    </div>

    <div id="music-result" style="margin-top: 20px; display: none; animation: slideIn 0.5s ease;">
        </div>

    <div id="lyrics-result" style="margin-top: 15px; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #111; font-size: 0.8rem; line-height: 1.6; max-height: 250px; overflow-y: auto; display: none; white-space: pre-line; color: #ccc;">
    </div>
</div>

<style>
    @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    #lyrics-result::-webkit-scrollbar { width: 4px; }
    #lyrics-result::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }
</style>

<script>
    async function searchMusic() {
        const query = document.getElementById('music-name').value.trim();
        if(!query) return;

        const btn = document.getElementById('music-btn');
        const res = document.getElementById('music-result');
        const lyr = document.getElementById('lyrics-result');

        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-compact-disc fa-spin'></i> ARAŞDIRILIR...";
        res.style.display = "none";
        lyr.style.display = "none";

        try {
            // 1. Mahnı və İfaçı Məlumatlarını tapırıq (Deezer API - Pulsuz və Açarsız)
            const searchRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.deezer.com/search?q=' + query)}`);
            const searchData = JSON.parse((await searchRes.json()).contents);

            if(searchData.data.length > 0) {
                const track = searchData.data[0];
                const artist = track.artist.name;
                const title = track.title;

                res.style.display = "block";
                res.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px; background:rgba(0,255,204,0.05); padding:15px; border-radius:15px; border:1px solid #00ffcc33;">
                        <img src="${track.album.cover_medium}" style="width:80px; border-radius:10px; box-shadow: 0 0 10px #00ffcc55;">
                        <div style="flex:1;">
                            <h3 style="margin:0; font-size:1rem; color:#00ffcc;">${title}</h3>
                            <p style="margin:5px 0; font-size:0.75rem; color:#fff;">${artist}</p>
                            <p style="margin:0; font-size:0.6rem; color:#888;">Albom: ${track.album.title}</p>
                            <a href="${track.link}" target="_blank" style="display:inline-block; margin-top:8px; color:#00ffcc; text-decoration:none; font-size:0.6rem; border:1px solid #00ffcc; padding:3px 8px; border-radius:5px;">LISTEN ON DEEZER</a>
                        </div>
                    </div>
                `;

                // 2. Mahnı Sözlərini gətiririk (Lyrics.ovh API)
                const lyricsRes = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`);
                const lyricsData = await lyricsRes.json();

                if(lyricsData.lyrics) {
                    lyr.style.display = "block";
                    lyr.innerText = lyricsData.lyrics;
                } else {
                    lyr.style.display = "block";
                    lyr.innerText = "Mahnı sözləri bazada tapılmadı, lakin mahnı məlumatları yuxarıdadır.";
                }

                if(navigator.vibrate) navigator.vibrate(50);
            } else {
                alert("Mahnı tapılmadı!");
            }
        } catch (e) {
            alert("Sistem xətası! Yenidən yoxlayın.");
        }

        btn.disabled = false;
        btn.innerHTML = "MAHNINI TAP";
    }
</script>
