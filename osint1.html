<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Maigrat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --success: #10b981;
            --error: #f43f5e;
        }

        /* Kopyalamanın bloklanması */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
        }

        .app-card {
            width: 90%;
            max-width: 450px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header span {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-section {
            padding: 0 30px 25px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        #startBtn {
            background: #fff;
            color: #4338ca;
        }

        #stopBtn {
            background: var(--error);
            color: white;
            display: none;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:active { transform: translateY(0); }

        .results-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 25px 25px;
            scrollbar-width: none;
        }

        .results-area::-webkit-scrollbar { display: none; }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            text-decoration: none;
            color: inherit;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-card.found {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success);
        }

        .result-card.not-found {
            opacity: 0.5;
            border-color: var(--glass-border);
        }

        .site-info { font-weight: 600; font-size: 15px; }
        .status-pill {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .pill-found { background: var(--success); color: white; }
        .pill-none { background: rgba(255,255,255,0.1); color: #fff; }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 63, 94, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 600;
            color: white;
            display: none;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 40px; opacity: 1; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast">Bağlantı xətası: Məlumat tapılmadı</div>

    <div class="app-card">
        <div class="header">
            <span>OSINT Engine</span>
            <h1>V.K PROJECT - MAIGRAT</h1>
        </div>

        <div class="search-section">
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="İstifadəçi adı..." spellcheck="false" autocomplete="off">
            </div>
            <div class="btn-container">
                <button id="startBtn">ANALİZİ BAŞLAT</button>
                <button id="stopBtn">DAYANDIR</button>
            </div>
        </div>

        <div class="results-area" id="results">
            </div>
    </div>

    <script>
        let isRunning = false;
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultsDiv = document.getElementById('results');
        const input = document.getElementById('username');
        const toast = document.getElementById('toast');

        function triggerToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        async function startAnalysis() {
            const user = input.value.trim();
            if(!user) return;

            isRunning = true;
            resultsDiv.innerHTML = '';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("Offline");
                
                const data = await response.json();
                const sites = Object.entries(data);

                for (const [site, info] of sites) {
                    if(!isRunning) break;

                    const card = document.createElement('a');
                    card.className = 'result-card';
                    
                    // Simulyasiya
                    const isFound = Math.random() > 0.8; 
                    const targetUrl = info.urlMain.replace('{}', user) || (info.urlMain + user);

                    if(isFound) {
                        card.classList.add('found');
                        card.href = targetUrl;
                        card.target = "_blank";
                        card.innerHTML = `
                            <span class="site-info">${site}</span>
                            <span class="status-pill pill-found">TAPILDI</span>
                        `;
                    } else {
                        card.classList.add('not-found');
                        card.innerHTML = `
                            <span class="site-info">${site}</span>
                            <span class="status-pill pill-none">YOXDUR</span>
                        `;
                    }

                    resultsDiv.prepend(card);
                    await new Promise(r => setTimeout(r, 250));
                }
            } catch (e) {
                triggerToast("XƏTA: Məlumat bazası ilə əlaqə kəsildi!");
            }
            stopProc();
        }

        function stopProc() {
            isRunning = false;
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        }

        startBtn.onclick = startAnalysis;
        stopBtn.onclick = stopProc;

        // Təhlükəsizlik
        document.onkeydown = (e) => {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) return false;
        };
    </script>
</body>
</html>
