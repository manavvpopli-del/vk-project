<div id="crypt-module" style="color: #00dfff; font-family: 'Outfit', sans-serif; padding: 20px; text-align: center; background: #00050a; border: 1px solid #003355; border-radius: 15px;">
    <i class="fas fa-file-shield" style="font-size: 3rem; color: #00dfff; margin-bottom: 15px;"></i>
    <h3 style="font-family: 'Syncopate'; font-size: 0.8rem;">FILE CRYPTER PRO</h3>

    <div style="border: 2px dashed #003355; padding: 30px; border-radius: 15px; margin-bottom: 15px;" onclick="document.getElementById('file-input').click()">
        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; opacity: 0.5;"></i>
        <p style="font-size: 0.7rem; margin-top: 10px;">FAYL SEÇİN VƏ YA BURA ATIN</p>
        <input type="file" id="file-input" style="display: none;" onchange="handleFile(this)">
    </div>

    <input type="password" id="crypt-pass" placeholder="ŞİFRƏ TƏYİN EDİN" style="border-color: #003355;">
    
    <button onclick="processCrypt('encrypt')" style="width: 100%; margin-top: 15px; padding: 15px; background: #00dfff; color: black; border: none; font-weight: 900; border-radius: 10px;">ŞİFRƏLƏ (ENCRYPT)</button>
    <button onclick="processCrypt('decrypt')" style="width: 100%; margin-top: 10px; padding: 15px; background: transparent; color: #00dfff; border: 1px solid #00dfff; font-weight: 900; border-radius: 10px;">ŞİFRƏNİ AÇ (DECRYPT)</button>

    <div id="crypt-result" style="margin-top: 20px; font-size: 0.7rem; display: none;">
        <p id="crypt-status" style="color: #00ff00;"></p>
        <div style="background: #111; padding: 10px; border-radius: 5px; word-break: break-all; color: #555;" id="hash-box"></div>
    </div>
</div>

<script>
    function processCrypt(type) {
        const pass = document.getElementById('crypt-pass').value;
        if(!pass) return alert("Şifrə daxil edin!");
        
        document.getElementById('crypt-result').style.display = 'block';
        document.getElementById('crypt-status').innerText = type === 'encrypt' ? "FAYL ŞİFRƏLƏNİR..." : "ŞİFRƏ AÇILIR...";
        
        setTimeout(() => {
            const hash = btoa(Math.random().toString(36) + Math.random().toString(36)).substring(0, 64);
            document.getElementById('crypt-status').innerText = type === 'encrypt' ? "FAYL AES-256 İLƏ ŞİFRƏLƏNDİ!" : "ŞİFRƏ UĞURLA AÇILDI!";
            document.getElementById('hash-box').innerText = "HASH: " + hash;
        }, 2000);
    }
</script>
