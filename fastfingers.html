<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Fingers Multiplayer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
        }
        input {
            padding: 10px;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #e94560;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        .word-display {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: #0f3460;
            background: #00d2ff;
            padding: 10px;
            border-radius: 5px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 14px;
        }
        #game-area { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby">
        <h2>Fast Fingers</h2>
        <input type="text" id="username" placeholder="Adın">
        <br>
        <button onclick="createRoom()">Otaq Yarat</button>
        <p>və ya</p>
        <input type="text" id="room-id-input" placeholder="Otaq Kodu">
        <button onclick="joinRoom()">Qoşul</button>
    </div>

    <div id="game-area">
        <h3 id="room-display">Otaq: </h3>
        <div class="word-display" id="target-word">Gözlənilir...</div>
        <input type="text" id="word-input" placeholder="Sözü bura yaz..." autocomplete="off">
        <br>
        <button id="submit-btn" onclick="checkWord()" disabled>GÖNDƏR (+5)</button>
        
        <div class="stats">
            <div>Sən: <span id="my-score">0</span></div>
            <div>Rəqib: <span id="opp-score">0</span></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const words = [
        "texnologiya", "proqramlaşdırma", "kibertehlükəsizlik", "süniintellekt", 
        "məlumatbazası", "alqoritmik", "interaktivlik", "multiplayer", 
        "konfiqurasiya", "müasirləşdirmə", "optimallaşdırma", "translyasiya",
        "identifikasiya", "funksionallıq", "vallaşdırma", "reallaşdırmaq",
        "universitet", "istiqamətləndirmə", "prosedurallaşdırma", "kompüterləşmə",
        "elektromaqnit", "avtomatlaşdırma", "məsuliyyətlilik", "mükəmməlləşdirmə",
        "müstəqilləşmə", "kodlaşdırma", "əməliyyatçı", "təkmilləşdirmə", 
        "professional", "strateji"
    ];

    let currentRoomId = "";
    let myId = "";
    let currentWord = "";

    window.createRoom = function() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Ad yazın!");
        currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        myId = "p1";
        
        set(ref(db, 'rooms/' + currentRoomId), {
            p1: { name: name, score: 0 },
            currentWord: words[Math.floor(Math.random() * words.length)],
            status: "waiting"
        });
        setupGame();
    }

    window.joinRoom = function() {
        const name = document.getElementById('username').value;
        const rid = document.getElementById('room-id-input').value.toUpperCase();
        if(!name || !rid) return alert("Məlumatları doldurun!");
        
        myId = "p2";
        currentRoomId = rid;
        update(ref(db, 'rooms/' + currentRoomId + '/p2'), { name: name, score: 0 });
        setupGame();
    }

    function setupGame() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('room-display').innerText = "Otaq: " + currentRoomId;

        onValue(ref(db, 'rooms/' + currentRoomId), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            currentWord = data.currentWord;
            document.getElementById('target-word').innerText = currentWord;
            
            document.getElementById('my-score').innerText = data[myId] ? data[myId].score : 0;
            const oppId = myId === "p1" ? "p2" : "p1";
            document.getElementById('opp-score').innerText = data[oppId] ? data[oppId].score : 0;
        });
    }

    // Yazı yoxlanışı və düymə bloklanması
    document.getElementById('word-input').addEventListener('input', (e) => {
        const btn = document.getElementById('submit-btn');
        if(e.target.value === currentWord) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    });

    window.checkWord = async function() {
        const input = document.getElementById('word-input');
        const btn = document.getElementById('submit-btn');
        
        if(input.value === currentWord) {
            // Xal artır (+5) və yeni söz təyin et
            const nextWord = words[Math.floor(Math.random() * words.length)];
            const scoreSpan = document.getElementById('my-score');
            let newScore = parseInt(scoreSpan.innerText) + 5;

            // Database-i yeniləyirik
            const updates = {};
            updates[`rooms/${currentRoomId}/${myId}/score`] = newScore;
            updates[`rooms/${currentRoomId}/currentWord`] = nextWord;
            
            // Rəqibdən xal çıxılması (-2)
            const oppId = myId === "p1" ? "p2" : "p1";
            onValue(ref(db, `rooms/${currentRoomId}/${oppId}/score`), (snapshot) => {
                let oppScore = snapshot.val() || 0;
                if(oppScore > 0) {
                    updates[`rooms/${currentRoomId}/${oppId}/score`] = oppScore - 2;
                }
            }, { onlyOnce: true });

            update(ref(db), updates);
            input.value = "";
            btn.disabled = true;
        }
    }
</script>

</body>
</html>
