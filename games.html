<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Oyunlar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid var(--card-border); margin-bottom: 25px;
        }
        .back-btn { font-size: 1.4rem; color: #fff; cursor: pointer; }
        .page-title { font-family: 'Space Grotesk'; font-size: 1.5rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section-label { font-size: 0.8rem; font-weight: 800; color: #64748b; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }

        /* OYUN KARTI DİZAYNI */
        .game-card { 
            background: var(--card-bg); border-radius: 24px; padding: 18px; 
            border: 1px solid var(--card-border); margin-bottom: 16px;
            display: flex; align-items: center; gap: 15px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .game-card:active { transform: scale(0.97); border-color: var(--primary); }

        .game-thumb { 
            width: 70px; height: 70px; border-radius: 18px; 
            background: var(--grad); display: flex; align-items: center; 
            justify-content: center; font-size: 1.8rem; color: white;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }

        .game-info { flex: 1; }
        .game-info h3 { margin: 0; font-size: 1.1rem; font-family: 'Space Grotesk'; }
        .game-info p { margin: 4px 0 0; font-size: 0.8rem; color: #94a3b8; line-height: 1.3; }

        .play-icon { color: var(--accent); font-size: 1.2rem; margin-right: 10px; }

        .status-badge {
            background: rgba(34, 197, 94, 0.1); color: var(--accent);
            padding: 4px 8px; border-radius: 8px; font-size: 0.65rem; font-weight: 800;
            display: inline-block; margin-top: 8px;
        }

        .locked-card { opacity: 0.6; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fas fa-arrow-left back-btn" onclick="location.href='main.html'"></i>
            <div class="page-title">MİNİ OYUNLAR</div>
            <div style="width: 24px;"></div>
        </div>

        <div class="section-label">Mövcud Oyunlar</div>

        <div class="game-card" onclick="location.href='penalty.html'">
            <div class="game-thumb">
                <i class="fas fa-futbol"></i>
            </div>
            <div class="game-info">
                <h3>Vur Qazan!</h3>
                <p>Qapıya dəqiq zərbələr endir və hər qol üçün 1-9 AZN arası qazan.</p>
                <div class="status-badge">AKTİVDİR</div>
            </div>
            <i class="fas fa-chevron-right play-icon"></i>
        </div>

        <div class="section-label" style="margin-top: 30px;">Tezliklə</div>

        <div class="game-card locked-card">
            <div class="game-thumb" style="background: #1e293b;">
                <i class="fas fa-dice"></i>
            </div>
            <div class="game-info">
                <h3>Şans Çarxı</h3>
                <p>Çarxı fırlat və böyük mükafatları qazanmaq şansı əldə et.</p>
                <div class="status-badge" style="background: rgba(148, 163, 184, 0.1); color: #94a3b8;">TEZLİKLƏ</div>
            </div>
            <i class="fas fa-lock" style="color: #475569;"></i>
        </div>

        <div class="game-card locked-card">
            <div class="game-thumb" style="background: #1e293b;">
                <i class="fas fa-coins"></i>
            </div>
            <div class="game-info">
                <h3>Yazı-Poşu</h3>
                <p>Qəpiyin hansı üzünün düşəcəyini tap və məbləği ikiqat artır.</p>
                <div class="status-badge" style="background: rgba(148, 163, 184, 0.1); color: #94a3b8;">TEZLİKLƏ</div>
            </div>
            <i class="fas fa-lock" style="color: #475569;"></i>
        </div>

    </div>

</body>
</html>
