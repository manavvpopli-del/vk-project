<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackatron | Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap');
        body { 
            background: #020205; color: white; font-family: 'Outfit', sans-serif; 
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }
        .box {
            text-align: center; background: rgba(255,255,255,0.03); 
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 300px; width: 90%;
        }
        .btn {
            display: block; background: #24A1DE; color: white; text-decoration: none; 
            padding: 15px; border-radius: 12px; font-weight: 900; margin-top: 20px;
            box-shadow: 0 5px 15px rgba(36, 161, 222, 0.3);
        }
        .copy-info { font-size: 0.7rem; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="font-size: 1rem; color: #00dfff;">TELEGRAM ACCESS</h2>
    <p style="font-size: 0.8rem; opacity: 0.7;">Access Key əldə etmək üçün rəsmi kanala keçid edin.</p>
    
    <a href="https://t.me/+xzQqLQaA_SFjNmUy" target="_system" class="btn" onclick="copyAndGo(this.href)">KANALA QOŞUL</a>
    
    <div class="copy-info">Link avtomatik kopyalandı.</div>
    <button onclick="window.history.back()" style="background:none; border:none; color:gray; margin-top:20px; cursor:pointer;">← GERİ QAYIT</button>
</div>

<script>
    function copyAndGo(url) {
        // Linki kopyala (Hər ehtimala qarşı)
        const el = document.createElement('textarea');
        el.value = url;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        // Kodular üçün xarici açılış əmri
        window.open(url, '_system');
    }
</script>

</body>
</html>
