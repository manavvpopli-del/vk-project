<div id="osint-analyzer" style="background: #0a0a0f; color: #00ff88; padding: 20px; font-family: 'Courier New', monospace; border-radius: 20px; border: 1px solid #1a1a2e; max-width: 500px; margin: auto;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="font-size: 1rem; letter-spacing: 3px; color: #fff;">FACE RECOGNITION AI</h2>
        <p style="font-size: 0.6rem; opacity: 0.6;">PYTHON BACKEND CONNECTED</p>
    </div>

    <div id="drop-zone" style="width: 100%; height: 250px; border: 2px dashed #00ff88; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: rgba(0,255,136,0.02);">
        <input type="file" id="file-input" accept="image/*" style="position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10;">
        
        <div id="upload-icon" style="text-align: center;">
            <i class="fas fa-camera" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
            <p style="font-size: 0.7rem;">ŞƏKİL SEÇ VƏ YA ÇƏK</p>
        </div>

        <img id="image-preview" style="display: none; width: 100%; height: 100%; object-fit: contain; z-index: 5;">
        
        <div id="scanner-bar" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #00ff88; box-shadow: 0 0 20px #00ff88; z-index: 8; animation: moveBar 2s infinite ease-in-out;"></div>
    </div>

    <div id="result-box" style="display: none; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border-left: 4px solid #00ff88;">
        <div id="status-text" style="font-size: 0.7rem; font-weight: bold; margin-bottom: 10px;">ANALİZ EDİLİR...</div>
        <div id="data-output" style="font-size: 0.65rem; color: #888; line-height: 1.4;"></div>
        
        <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="externalSearch('google')" style="padding: 10px; border-radius: 5px; border: none; background: #4285F4; color: white; font-size: 0.6rem; cursor: pointer;">GOOGLE LENS</button>
            <button onclick="externalSearch('yandex')" style="padding: 10px; border-radius: 5px; border: none; background: #ff0000; color: white; font-size: 0.6rem; cursor: pointer;">YANDEX IMAGES</button>
        </div>
    </div>
</div>

<style>
    @keyframes moveBar { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
</style>

<script>
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    const scannerBar = document.getElementById('scanner-bar');
    const resultBox = document.getElementById('result-box');
    const statusText = document.getElementById('status-text');
    const dataOutput = document.getElementById('data-output');
    
    // BURANI ÖZ RENDER URL-İN İLƏ DƏYİŞ!
    const PYTHON_SERVER_URL = "https://senin-projen.onrender.com/analyze-face";

    fileInput.addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Önizləmə
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            imagePreview.style.display = 'block';
            document.getElementById('upload-icon').style.display = 'none';
        };
        reader.readAsDataURL(file);

        // Analizi başlat
        startProcess(file);
    });

    async function startProcess(file) {
        scannerBar.style.display = 'block';
        resultBox.style.display = 'block';
        statusText.innerText = "SİSTEM: Python Serverinə qoşulur...";
        dataOutput.innerText = "Şəkil biometrik verilənlərə çevrilir...";

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch(PYTHON_SERVER_URL, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.status === "success") {
                statusText.innerHTML = "<span style='color: #00ff88;'>UGURLU: Üz Tanındı</span>";
                dataOutput.innerHTML = `
                    Vector ID: ${Math.random().toString(16).slice(2, 10)}<br>
                    Üz Kodu: [${result.face_vector.slice(0, 5).join(', ')}...]<br>
                    Server Cavabı: 200 OK
                `;
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else {
                statusText.innerHTML = "<span style='color: #ff3344;'>XƏTA: Üz tapılmadı</span>";
            }
        } catch (error) {
            statusText.innerHTML = "<span style='color: #ff3344;'>SERVER XƏTASI</span>";
            dataOutput.innerText = "Bağlantı qurula bilmədi. Serverin oyanmasını gözləyin (Render-də 30-50 saniyə çəkə bilər).";
        } finally {
            scannerBar.style.display = 'none';
        }
    }

    function externalSearch(engine) {
        // Şəkli birbaşa axtarış motorlarına göndərmək üçün
        // Not: Professional versiyada şəkli birbaşa axtarış linkinə bağlayırıq
        alert(engine.toUpperCase() + " üzrə dərindən axtarış başladılır...");
    }
</script>
