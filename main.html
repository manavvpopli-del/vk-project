<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerowallet - Quantum Earning</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }
        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: -1px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card { background: #fff; padding: 8px 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1); display: flex; align-items: center; gap: 10px; }
        .balance-card img { width: 35px; height: 35px; object-fit: contain; }
        .balance-info { text-align: right; }
        .balance-card span { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 450px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; }
        .nav-item { color: #64748b; font-size: 1.3rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: #fff; transform: translateY(-5px); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }
        .section { display: none; height: calc(100vh - 180px); padding: 0 20px; overflow-y: auto; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mining-container { background: var(--card); border-radius: 40px; padding: 30px 20px; border: 1px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; margin-top: 10px; position: relative; }
        .coin-trigger { width: 200px; height: 200px; margin: 0 auto; cursor: pointer; transition: 0.1s; }
        .coin-trigger:active { transform: scale(0.92); }
        .coin-trigger img { width: 100%; filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.3)); pointer-events: none; }
        .ref-card { background: #fff; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        .ref-input { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 15px; font-weight: 700; outline: none; text-align: center; margin: 15px 0; font-family: 'Space Grotesk'; font-size: 1.1rem; }
        .ref-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .my-code-display { background: #f8fafc; padding: 15px; border-radius: 15px; border: 2px dashed var(--primary); font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-top: 10px; letter-spacing: 2px; }
        .rocket-card { background: #fff; border-radius: 25px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .rocket-img { width: 50px; height: 50px; object-fit: contain; }
        .buy-btn { background: var(--text); color: #fff; border: none; padding: 12px 20px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
        .withdraw-box { background: #fff; padding: 30px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .w-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--grad); color: #fff; font-weight: 800; font-size: 1rem; cursor: pointer; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: 80px; opacity: 0; } to { bottom: 100px; opacity: 1; } }
        .click-val-text { position: absolute; font-weight: 800; color: var(--primary); pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 1000; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="logo">ZERO.WALLET</div>
        <div class="balance-card">
            <img src="wallet.png" alt="Wallet">
            <div class="balance-info">
                <small style="color:#64748b; font-weight:700">BALANS</small><br>
                <span id="bal">0.0000</span> AZN
            </div>
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="mining-container">
            <div id="coin-area">
                <div class="coin-trigger" onclick="mine(event)">
                    <img src="coin.png" id="main-coin">
                </div>
            </div>
            
            <div class="ref-card" style="margin-top:20px; background:#fffbeb; border:1px solid #f59e0b; padding:15px;">
                <h4 style="margin:0; color:#d97706; font-size:0.9rem;">🎁 REKLAM BONUSU</h4>
                <p style="font-size:0.75rem; color:#92400e; margin:5px 0 12px 0;">Hər reklamda 15 saniyə gözləyin!</p>
                <button class="ref-btn" id="bonusBtn" onclick="watchBonusAd()" style="background:#f59e0b; padding:10px; font-size:0.8rem;">REKLAMA BAX (+1.00 AZN)</button>
            </div>

            <div style="margin-top:20px; font-size:0.9rem; font-weight:700; color:#64748b;">
                Sürət: <span id="active-speed-txt" style="color:var(--primary)">0.0001</span> AZN / Klik
            </div>
            
            <div style="margin-top:20px; border-radius:15px; overflow:hidden;">
                <script async="async" data-cfasync="false" src="https://pl29218826.profitablecpmratenetwork.com/fed47239501b78c24a02682c538a18a6/invoke.js"></script>
                <div id="container-fed47239501b78c24a02682c538a18a6"></div>
            </div>
        </div>
    </div>

    <div id="market-sec" class="section">
        <h2 style="margin-bottom:20px;">Dəvət Sistemi</h2>
        <div class="ref-card">
            <i class="fas fa-gift" style="font-size: 2.5rem; color: #10b981;"></i>
            <h4 style="margin: 15px 0 5px 0;">Kupon Daxil Et</h4>
            <input type="text" id="coupon-input" class="ref-input" placeholder="INV-0000">
            <button class="ref-btn" onclick="useCoupon()">TƏSDİQLƏ</button>
        </div>
        <div class="ref-card">
            <h4 style="margin: 0 0 5px 0;">Sənin Dəvət Kodun</h4>
            <div class="my-code-display" id="my-invite-code">YÜKLƏNİR...</div>
        </div>
    </div>

    <div id="upgrade-sec" class="section">
        <h2 style="margin-bottom:20px;">Qazanc Paketləri</h2>
        <div class="rocket-card">
            <img src="elite.png" class="rocket-img">
            <div class="rocket-info"><h4>Elite Rocket</h4><p>+0.005 AZN</p></div>
            <button class="buy-btn" onclick="buyRocket('elite', 10)">10 DƏVƏT</button>
        </div>
        <div class="rocket-card">
            <img src="pro.png" class="rocket-img">
            <div class="rocket-info"><h4>Pro Rocket</h4><p>+0.010 AZN</p></div>
            <button class="buy-btn" onclick="buyRocket('pro', 25)">25 DƏVƏT</button>
        </div>
    </div>

    <div id="withdraw-sec" class="section">
        <h2 style="margin-bottom:20px;">Vəsait Çıxarışı</h2>
        <div class="withdraw-box">
            <i class="fas fa-university" style="font-size:3rem; color:var(--primary);"></i>
            <p>Minimum 150 AZN tələb olunur.</p>
            <button class="w-btn" onclick="requestWithdraw()">TRANSFERİ BAŞLAT</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-user-plus"></i></div>
        <div class="nav-item" onclick="showSec('upgrade-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');
        if(!user) location.href="index.html";

        const VALUES = { 'standart': 0.0001, 'elite': 0.005, 'pro': 0.010, 'super': 0.040 };
        let userData = { balance: 0, rocket: 'standart' };

        db.ref('zerowallet_users/' + user).on('value', snap => {
            userData = snap.val() || { balance: 0, rocket: 'standart' };
            document.getElementById('bal').innerText = (userData.balance || 0).toFixed(4);
            document.getElementById('active-speed-txt').innerText = VALUES[userData.rocket || 'standart'];
            if(userData.inviteCode) document.getElementById('my-invite-code').innerText = userData.inviteCode;
        });

        // REKLAM FUNKSIYALARI (Ehtiyata görə hər ikisi)
        let adStarted = false;
        let startTime = 0;

        function watchBonusAd() {
            const ads = [
                "https://omg10.com/4/10909600",
                "https://www.profitablecpmratenetwork.com/r6w2jtq0n?key=62ea4c652382983e5bb5135c0b56aa25"
            ];
            const randomAd = ads[Math.floor(Math.random() * ads.length)];
            adStarted = true;
            startTime = new Date().getTime();
            showToast("Reklam açılır... 15 saniyə izləyin.");
            window.open(randomAd, '_blank');
        }

        window.onfocus = function() {
            if (adStarted) {
                const duration = (new Date().getTime() - startTime) / 1000;
                if (duration >= 15) {
                    db.ref('zerowallet_users/' + user).transaction(c => {
                        if(c) c.balance = (c.balance || 0) + 1.0;
                        return c;
                    }).then(() => {
                        showToast("+1.00 AZN əlavə edildi!");
                        adStarted = false;
                    });
                } else {
                    showToast("Reklamı tez bağladınız!");
                    adStarted = false;
                }
            }
        };

        function mine(e) {
            const val = VALUES[userData.rocket || 'standart'];
            showClickEffect(e, val);
            db.ref('zerowallet_users/' + user).update({ balance: (userData.balance || 0) + val });
        }

        function showClickEffect(e, val) {
            const t = document.createElement('div'); t.className = 'click-val-text';
            t.innerText = "+" + val; t.style.left = e.clientX + "px"; t.style.top = e.clientY + "px";
            document.body.appendChild(t); setTimeout(() => t.remove(), 600);
        }

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function showToast(msg) {
            let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log(e));
        }
    </script>
</body>
</html>
