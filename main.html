<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerowallet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        .header { 
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid var(--card-border);
        }
        
        .logo-container { display: flex; flex-direction: column; }
        .logo { font-family: 'Space Grotesk'; font-size: 1.3rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stats-sub { display: flex; gap: 8px; margin-top: 2px; }
        .stat-badge { font-size: 0.65rem; color: #94a3b8; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 5px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .balance-box { 
            background: var(--card-bg); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--card-border);
            display: flex; align-items: center; gap: 8px;
        }
        .balance-box span { font-weight: 800; font-size: 1.1rem; color: #fff; font-family: 'Space Grotesk'; }

        .nav-bar { 
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 400px; background: rgba(15, 23, 42, 0.95); 
            display: flex; justify-content: space-around; padding: 12px; border-radius: 20px; 
            border: 1px solid var(--card-border); z-index: 1000; 
        }
        .nav-item { color: #475569; font-size: 1.2rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }

        .section { display: none; height: calc(100vh - 150px); padding: 20px; overflow-y: auto; scrollbar-width: none; }
        .section.active { display: block; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid var(--card-border); margin-bottom: 20px; }

        .coin-btn { width: 180px; height: 180px; margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .coin-btn img { width: 90%; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); transition: 0.1s; }
        .coin-btn:active img { transform: scale(0.9); }

        .energy-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .energy-fill { height: 100%; background: var(--grad); width: 100%; transition: 0.3s; }

        .btn { width: 100%; background: var(--grad); color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 0.85rem; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:disabled { opacity: 0.5; }

        .input-field { width: 100%; padding: 15px; background: #0f172a; border: 1px solid var(--card-border); border-radius: 14px; color: #fff; text-align: center; margin-bottom: 12px; outline: none; font-size: 1rem; }

        .item-row { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-info img { width: 40px; height: 40px; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 12px; z-index: 10000; border: 1px solid var(--card-border); }
        
        #ad-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: none; flex-direction: column; }
        #ad-header { height: 60px; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; border-bottom: 1px solid var(--card-border); }

        @keyframes float { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

    <!-- əvvəlki bütün kodların olduğu kimi qalır... -->

    <!-- 🔥 YENİ GAMES SECTION -->
    <div id="games-sec" class="section">
        <h3 style="text-align:center;">Oyunlar</h3>
        <div class="card">
            <div class="item-row" onclick="openGame('penalty.html')" style="cursor:pointer;">
                <div class="item-info">
                    <div style="width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:24px;">
                        ⚽
                    </div>
                    <div>
                        <h4 style="margin:0">Vur Qazan !</h4>
                        <small style="color:#94a3b8">Penaltı oyunu ilə qazanc əldə et</small>
                    </div>
                </div>
                <i class="fas fa-play" style="color:var(--primary)"></i>
            </div>
        </div>
    </div>

    <!-- NAV BAR (sadəcə 1 ikon əlavə olundu) -->
    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-hammer"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-users"></i></div>
        <div class="nav-item" onclick="showSec('upgrade-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>

        <!-- 🎮 ƏLAVƏ OLUNDU -->
        <div class="nav-item" onclick="showSec('games-sec', this)">
            <i class="fas fa-gamepad"></i>
        </div>

        <div class="nav-item" onclick="location.href='profile.html'"><i class="fas fa-user-circle"></i></div>
    </nav>

    <script>
        // əvvəlki bütün script qalır...

        // 🔥 SADƏ FUNKSİYA ƏLAVƏ
        function openGame(url){
            window.location.href = url;
        }
    </script>

</body>
</html>
