<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zerowallet</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

<style>
/* SƏNİN STYLE TAM QALDI */
:root {
    --primary: #6366f1; 
    --bg: #020617; 
    --card-bg: rgba(15, 23, 42, 0.8);
    --card-border: rgba(255, 255, 255, 0.08);
    --text: #f1f5f9;
    --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    --accent: #22c55e;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
body { margin:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans';height:100vh;overflow:hidden; }
.section{display:none;height:calc(100vh - 150px);padding:20px;overflow-y:auto;}
.section.active{display:block;}
.nav-bar{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);width:92%;max-width:400px;background:#0f172af2;display:flex;justify-content:space-around;padding:12px;border-radius:20px;}
.nav-item{color:#475569;font-size:1.2rem;}
.nav-item.active{color:var(--primary);}
.card{background:rgba(15,23,42,0.8);border-radius:24px;padding:20px;margin-bottom:20px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:15px;border-radius:18px;background:rgba(255,255,255,0.03);}
.item-info{display:flex;gap:15px;align-items:center;}
</style>
</head>

<body>

<!-- SƏNİN BÜTÜN SECTIONS QALIR -->

<div id="mining-sec" class="section active">MINING</div>
<div id="market-sec" class="section">MARKET</div>
<div id="upgrade-sec" class="section">UPGRADE</div>
<div id="withdraw-sec" class="section">WITHDRAW</div>

<!-- 🔥 YENİ GAMES -->
<div id="games-sec" class="section">
    <h3 style="text-align:center;">Oyunlar</h3>

    <div class="card">
        <div class="item-row" onclick="openGame('penalty.html')" style="cursor:pointer;">
            <div class="item-info">
                <div style="width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:24px;">
                    ⚽
                </div>
                <div>
                    <h4 style="margin:0">Vur Qazan !</h4>
                    <small style="color:#94a3b8">Penaltı oyunu</small>
                </div>
            </div>
            <i class="fas fa-play"></i>
        </div>
    </div>
</div>

<!-- NAV -->
<nav class="nav-bar">
    <div class="nav-item active" onclick="showSec('mining-sec',this)">⚒</div>
    <div class="nav-item" onclick="showSec('market-sec',this)">👥</div>
    <div class="nav-item" onclick="showSec('upgrade-sec',this)">🚀</div>
    <div class="nav-item" onclick="showSec('withdraw-sec',this)">💰</div>

    <!-- ƏLAVƏ -->
    <div class="nav-item" onclick="showSec('games-sec',this)">🎮</div>

    <div class="nav-item" onclick="location.href='profile.html'">👤</div>
</nav>

<script>
function showSec(id,el){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function openGame(url){
    window.location.href=url;
}
</script>

</body>
</html>
