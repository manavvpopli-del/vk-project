<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerowallet - Quantum Earning</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --nav-bg: rgba(15, 23, 42, 0.9);
        }

        body.dark-mode {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f8fafc;
            --nav-bg: rgba(2, 6, 23, 0.95);
        }
        
        body.dark-mode .balance-card, body.dark-mode .ref-card, body.dark-mode .rocket-card, body.dark-mode .withdraw-box {
            background: #1e293b; color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            transition: background 0.3s, color 0.3s;
        }
        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: -1px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card { background: #fff; padding: 8px 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1); display: flex; align-items: center; gap: 10px; }
        .balance-card img { width: 35px; height: 35px; object-fit: contain; }
        .balance-info { text-align: right; }
        .balance-card span { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        
        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; }
        .nav-item { color: #64748b; font-size: 1.2rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: #fff; transform: translateY(-5px); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }

        .section { display: none; height: calc(100vh - 180px); padding: 0 20px; overflow-y: auto; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .mining-container { background: var(--card); border-radius: 40px; padding: 30px 20px; border: 1px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; margin-top: 10px; position: relative; }
        .coin-trigger { width: 180px; height: 180px; margin: 0 auto; cursor: pointer; transition: 0.1s; position: relative; z-index: 10; }
        .coin-trigger:active { transform: scale(0.92); }
        .coin-trigger img { width: 100%; filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.3)); pointer-events: none; }
        
        .energy-container { width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px; margin-top: 15px; position: relative; overflow: hidden; }
        .energy-bar { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); width: 100%; transition: 0.3s; }
        .energy-text { font-size: 0.75rem; font-weight: 800; margin-top: 5px; color: #64748b; }

        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; border: 10px solid var(--text); border-radius: 50%; overflow: hidden; box-shadow: 0 0 30px rgba(99, 102, 241, 0.4); }
        #wheel { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .wheel-pointer { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 35px; height: 35px; background: #ef4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 40; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.3)); }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: #fff; border-radius: 50%; z-index: 50; border: 5px solid var(--text); font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #000; font-size: 0.8rem; }

        .ref-card { background: #fff; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        .ref-input { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 15px; font-weight: 700; outline: none; text-align: center; margin: 15px 0; font-family: 'Space Grotesk'; font-size: 1.1rem; }
        .ref-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .my-code-display { background: #f8fafc; padding: 15px; border-radius: 15px; border: 2px dashed var(--primary); font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-top: 10px; letter-spacing: 2px; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        #ad-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999999; display: none; flex-direction: column; }
        #ad-header { height: 75px; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-size: 1.2rem; gap: 10px; border-bottom: 3px solid var(--primary); }
        #ad-iframe { flex: 1; border: none; width: 100%; }
        .click-val-text { position: absolute; font-weight: 800; color: var(--primary); pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 1000; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="ad-viewer">
        <div id="ad-header">
            <i class="fas fa-stopwatch" style="color:var(--primary)"></i>
            Gözlə: <span id="ad-sec">15</span> s
        </div>
        <iframe id="ad-iframe" src=""></iframe>
    </div>

    <div class="header">
        <div class="logo">ZERO.WALLET</div>
        <div class="balance-card">
            <img src="wallet.png">
            <div class="balance-info">
                <small style="color:#64748b; font-weight:700">BALANS</small><br>
                <span id="bal">0.0000</span> AZN
            </div>
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="mining-container">
            <div class="energy-container"><div id="energy-bar" class="energy-bar"></div></div>
            <div class="energy-text"><i class="fas fa-bolt"></i> Enerji: <span id="energy-val">30</span> / 30</div>

            <div id="coin-area" style="margin-top: 15px;">
                <div class="coin-trigger" id="coin-btn" onclick="mine(event)">
                    <img src="coin.png" id="main-coin">
                </div>
                
                <div id="session-info" style="margin-top:10px; font-weight:800; color:var(--primary); display:none;">
                    Bu sessiya: <span id="session-amt">0.000</span> AZN
                </div>

                <button id="claim-session-btn" class="ref-btn" onclick="claimToBalance()" style="background:#10b981; margin-top:20px; display:none;">
                    <i class="fas fa-wallet"></i> BALANSA KÖÇÜR (REKLAM İZLƏ)
                </button>
            </div>
        </div>
    </div>

    <div id="bonus-sec" class="section">...</div>
    <div id="market-sec" class="section">...</div>
    <div id="upgrade-sec" class="section">...</div>
    <div id="withdraw-sec" class="section">...</div>
    <div id="settings-sec" class="section">...</div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showSec('bonus-sec', this)"><i class="fas fa-star"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-user-plus"></i></div>
        <div class="nav-item" onclick="showSec('upgrade-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
        <div class="nav-item" onclick="showSec('settings-sec', this)"><i class="fas fa-cog"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');
        if(!user) location.href="index.html";

        const ADSTERRA_URL = "https://www.profitablecpmratenetwork.com/r6w2jtq0n?key=62ea4c652382983e5bb5135c0b56aa25";
        
        let userData = { balance: 0 };
        let sessionBalance = 0;
        let clicks = 30; // Başlanğıc enerji

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        db.ref('zerowallet_users/' + user).on('value', snap => {
            let d = snap.val(); if(!d) return;
            userData = d;
            document.getElementById('bal').innerText = (d.balance || 0).toFixed(4);
        });

        function mine(e) {
            if(clicks <= 0) return;

            // 0.005 və 0.040 arası random məbləğ
            let randomAmt = (Math.random() * (0.040 - 0.005) + 0.005);
            sessionBalance += randomAmt;
            clicks--;

            updateMiningUI();
            showClickEffect(e, randomAmt);

            if(clicks <= 0) {
                document.getElementById('coin-btn').style.opacity = "0.3";
                document.getElementById('coin-btn').style.pointerEvents = "none";
                document.getElementById('claim-session-btn').style.display = "block";
            }
        }

        function updateMiningUI() {
            let perc = (clicks / 30) * 100;
            document.getElementById('energy-bar').style.width = perc + "%";
            document.getElementById('energy-val').innerText = clicks;
            document.getElementById('session-info').style.display = "block";
            document.getElementById('session-amt').innerText = sessionBalance.toFixed(3);
        }

        function claimToBalance() {
            startAdTask(15, () => {
                db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + sessionBalance);
                
                // Sıfırlama
                sessionBalance = 0;
                clicks = 30;
                document.getElementById('coin-btn').style.opacity = "1";
                document.getElementById('coin-btn').style.pointerEvents = "auto";
                document.getElementById('claim-session-btn').style.display = "none";
                document.getElementById('session-info').style.display = "none";
                updateMiningUI();
                showToast("Məbləğ balansa köçürüldü!");
            });
        }

        function startAdTask(seconds, callback) {
            const viewer = document.getElementById('ad-viewer');
            const timerSpan = document.getElementById('ad-sec');
            let t = seconds;
            timerSpan.innerText = t;
            document.getElementById('ad-iframe').src = ADSTERRA_URL;
            viewer.style.display = 'flex';
            const inv = setInterval(() => {
                t--;
                timerSpan.innerText = t;
                if(t <= 0) {
                    clearInterval(inv);
                    viewer.style.display = 'none';
                    document.getElementById('ad-iframe').src = "";
                    callback();
                }
            }, 1000);
        }

        function showClickEffect(e, val) {
            const t = document.createElement('div');
            t.className = 'click-val-text';
            t.innerText = "+" + val.toFixed(3);
            t.style.left = e.clientX + "px"; t.style.top = e.clientY + "px";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        function showToast(m) {
            let t = document.createElement('div');
            t.className = 'toast';
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
