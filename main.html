<div class="header">
    <div class="logo">ZERO.WALLET</div>
    <div class="balance-card">
        <img src="wallet.png">
        <div class="balance-info">
            <small>BALANS</small><br>
            <span id="bal">0.0000</span> AZN
        </div>
    </div>
</div>

<div id="mining-sec" class="section active">
    <div class="mining-container">
        <div class="energy-container">
            <div id="energy-bar" class="energy-bar"></div>
        </div>
        <div class="energy-text"><i class="fas fa-bolt"></i> <span id="energy-val">100</span>%</div>

        <div id="coin-area" style="margin-top: 20px;">
            <div class="coin-trigger" id="coin-btn" onclick="mine(event)">
                <img src="coin.png" id="main-coin">
            </div>
        </div>

        <button class="ref-btn" onclick="earnByAd()" style="background:#10b981; margin-top:20px;">
            <i class="fas fa-video"></i> REKLAM İZLƏ (0.005 AZN)
        </button>
    </div>
</div>

<nav class="nav-bar">
    <a href="main.html" class="nav-item active"><i class="fas fa-home"></i></a>
    <a href="wheel.html" class="nav-item"><i class="fas fa-star"></i></a>
    <a href="referal.html" class="nav-item"><i class="fas fa-user-plus"></i></a>
    <a href="rocket.html" class="nav-item"><i class="fas fa-rocket"></i></a>
    <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
</nav>

<script>
    // Firebase və mining loqikası bura gəlir (əvvəlki kodundakı mine funksiyası)
    function earnByAd() {
        startAdTask(15, () => {
            db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + 0.0050);
            showToast("+0.0050 AZN qazanıldı!");
        });
    }
</script>
