<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - Gizli İntellekt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
        .input-style { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; transition: all 0.3s; }
        .input-style:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-main" class="w-full max-w-md glass p-10 rounded-[2.5rem] text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-4xl">⚖️</div>
        <h1 class="text-3xl font-black mb-2 tracking-tight">Münsif AI</h1>
        <p class="text-slate-400 mb-10 text-sm">Obyektiv analiz və ədalətli qərar</p>
        <button onclick="showScreen('screen-create')" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4 hover:bg-blue-700 transition">Otaq Yarat</button>
        <button onclick="showScreen('screen-join')" class="w-full bg-slate-800 py-4 rounded-2xl font-bold hover:bg-slate-700 transition">Otağa Qoşul</button>
    </div>

    <div id="screen-create" class="w-full max-w-md glass p-10 rounded-[2.5rem] hidden">
        <h2 class="text-2xl font-bold mb-6 italic">Otaq Ayarları</h2>
        <input id="c-name" type="text" placeholder="Sizin Adınız" class="w-full p-4 input-style rounded-2xl mb-4 outline-none">
        <input id="c-room-id" type="text" placeholder="Otaq Kodu (məs: 777)" class="w-full p-4 input-style rounded-2xl mb-4 outline-none">
        <input id="c-room-pass" type="text" placeholder="Otağa Xüsusi Ad Verin" class="w-full p-4 input-style rounded-2xl mb-8 outline-none border-dashed border-blue-500/50">
        <button onclick="createRoom()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold">Otağı Başlat</button>
    </div>

    <div id="screen-join" class="w-full max-w-md glass p-10 rounded-[2.5rem] hidden">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400 italic text-center">Giriş</h2>
        <input id="j-name" type="text" placeholder="Sizin Adınız" class="w-full p-4 input-style rounded-2xl mb-4 outline-none">
        <input id="j-room-id" type="text" placeholder="Otaq Kodu" class="w-full p-4 input-style rounded-2xl mb-4 outline-none">
        <input id="j-room-pass" type="text" placeholder="Otağın Adını Yazın" class="w-full p-4 input-style rounded-2xl mb-8 outline-none">
        <button onclick="joinRoom()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">Daxil Ol</button>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-[2.5rem] hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold italic text-blue-400">Hekayəniz</h2>
            <span id="display-room" class="text-[10px] bg-blue-500/10 px-3 py-1 rounded-full text-blue-400 uppercase font-black tracking-widest"></span>
        </div>
        <textarea id="story-input" class="w-full h-64 p-6 bg-slate-900/50 border border-slate-800 rounded-3xl mb-6 outline-none focus:border-blue-500 transition resize-none leading-relaxed" placeholder="Nə baş verib? Ətraflı yaz..."></textarea>
        <button id="send-btn" onclick="saveStory()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Məlumatı Göndər</button>
        <div id="wait-msg" class="mt-6 p-4 bg-blue-900/10 border border-blue-500/10 rounded-2xl text-blue-400 text-center hidden italic animate-pulse">
            Qarşı tərəfin hekayəsini bitirməsi gözlənilir...
        </div>
    </div>

    <div id="screen-verify" class="w-full max-w-5xl glass p-10 rounded-[2.5rem] hidden text-center">
        <h2 class="text-2xl font-bold mb-8">Son Baxış</h2>
        <div class="grid md:grid-cols-2 gap-8 mb-10 text-left">
            <div class="p-8 bg-slate-900/50 rounded-3xl border border-slate-800 shadow-inner"><p id="v-u1" class="text-slate-300"></p></div>
            <div class="p-8 bg-slate-900/50 rounded-3xl border border-slate-800 shadow-inner"><p id="v-u2" class="text-slate-300"></p></div>
        </div>
        <button id="conf-btn" onclick="confirmFinal()" class="w-full max-w-md mx-auto bg-white text-black py-4 rounded-2xl font-black text-lg hover:bg-slate-200 transition">ANALİZİ BAŞLAT</button>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-[2.5rem] hidden shadow-2xl">
        <h2 class="text-3xl font-black text-center text-red-500 mb-8 border-b border-slate-800 pb-4 italic tracking-tighter">HAKİM QƏRARI</h2>
        <div id="ai-loading" class="text-center py-10">
            <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-500 text-sm">Süni İntellekt arqumentləri ölçüb-biçir...</p>
        </div>
        <div id="ai-output" class="text-left text-slate-200 leading-relaxed text-lg bg-slate-950/50 p-8 rounded-3xl border border-slate-800 hidden"></div>
        <button onclick="location.reload()" class="mt-10 w-full text-slate-600 hover:text-white transition underline text-sm">Yeni Analiz</button>
    </div>

    <script>
        // Sənin API kodun gizli olaraq buradadır
        const GIZLI_INTELLEKT_KODU = "AIzaSyDOyh7fzbVlyJTl_lKaYM0WMJLVt-S4C1o";

        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let myRole = "";

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function createRoom() {
            const name = document.getElementById('c-name').value.trim();
            roomID = document.getElementById('c-room-id').value.trim().toUpperCase();
            const pass = document.getElementById('c-room-pass').value.trim();

            if(!name || !roomID || !pass) return alert("Bütün sahələri doldurun!");

            myRole = "user1";
            db.ref(`rooms/${roomID}`).set({
                user1: { name, story: "", confirmed: false },
                roomSecretName: pass, // Otağın adı (parol)
                status: "waiting"
            }).then(() => syncRoom());
        }

        function joinRoom() {
            const name = document.getElementById('j-name').value.trim();
            roomID = document.getElementById('j-room-id').value.trim().toUpperCase();
            const passInput = document.getElementById('j-room-pass').value.trim();

            if(!name || !roomID || !passInput) return alert("Bütün xanaları doldurun!");

            db.ref(`rooms/${roomID}`).once('value', snap => {
                if(snap.exists()) {
                    const roomData = snap.val();
                    if(roomData.roomSecretName === passInput) {
                        myRole = "user2";
                        db.ref(`rooms/${roomID}/user2`).set({ name, story: "", confirmed: false });
                        syncRoom();
                    } else {
                        alert("Otaq adı yanlışdır! Qoşula bilməzsiniz.");
                    }
                } else {
                    alert("Bu kodda otaq tapılmadı!");
                }
            });
        }

        function syncRoom() {
            showScreen('screen-story');
            document.getElementById('display-room').innerText = "Kod: " + roomID;
            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    showScreen('screen-verify');
                    document.getElementById('v-u1').innerHTML = `<b class="text-blue-400">${data.user1.name}:</b><br>${data.user1.story}`;
                    document.getElementById('v-u2').innerHTML = `<b class="text-emerald-400">${data.user2.name}:</b><br>${data.user2.story}`;
                    if(data.user1.confirmed && data.user2.confirmed) runGemini();
                }
            });
        }

        function saveStory() {
            const story = document.getElementById('story-input').value.trim();
            if(story.length < 5) return alert("Hekayənizi bir az daha geniş yazın.");
            db.ref(`rooms/${roomID}/${myRole}`).update({ story });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').innerText = "Göndərildi";
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        function confirmFinal() {
            db.ref(`rooms/${roomID}/${myRole}`).update({ confirmed: true });
            document.getElementById('conf-btn').innerText = "Gözlənilir...";
            document.getElementById('conf-btn').disabled = true;
        }

        async function runGemini() {
            showScreen('screen-result');
            db.ref(`rooms/${roomID}`).once('value', async snap => {
                const data = snap.val();
                const prompt = `Sən iki şəxs arasında mübahisəni həll edən bir münsifsən. 
                Sərt, dürüst və ədalətli olmalısan. Diplomatik olma, kimin səhv etdiyini konkret de. 
                Tərəf 1 (${data.user1.name}): ${data.user1.story}
                Tərəf 2 (${data.user2.name}): ${data.user2.story}
                Azərbaycan dilində qərar ver.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GIZLI_INTELLEKT_KODU}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const json = await res.json();
                    const result = json.candidates[0].content.parts[0].text;
                    document.getElementById('ai-loading').classList.add('hidden');
                    document.getElementById('ai-output').classList.remove('hidden');
                    document.getElementById('ai-output').innerHTML = result.replace(/\n/g, "<br>");
                } catch (e) {
                    document.getElementById('ai-output').innerText = "Xəta: İntellekt xidməti cavab vermir.";
                    document.getElementById('ai-output').classList.remove('hidden');
                }
            });
        }
    </script>
</body>
</html>
