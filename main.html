<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - Gemini İnteqrasiyalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070a13; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hidden { display: none; }
        input, select, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .btn-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-api" class="w-full max-w-md glass-card p-10 rounded-3xl text-center">
        <h2 class="text-2xl font-bold mb-4">Sistemə Giriş</h2>
        <p class="text-slate-400 mb-6 text-sm">Github təhlükəsizliyi üçün API açarını bura daxil etməlisən (Kodda saxlanılmır):</p>
        <input id="api-key-input" type="password" placeholder="Gemini API Key" class="w-full p-4 rounded-xl mb-4 outline-none">
        <button onclick="saveApiKey()" class="w-full btn-gradient py-4 rounded-2xl font-bold">Sistemi Başlat</button>
    </div>

    <div id="screen-start" class="w-full max-w-md glass-card p-10 rounded-3xl text-center hidden">
        <h1 class="text-3xl font-extrabold mb-8 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Münsif AI</h1>
        <button onclick="openForm('create')" class="w-full btn-gradient py-4 rounded-2xl font-bold mb-4">Otaq Yarat</button>
        <button onclick="openForm('join')" class="w-full bg-slate-800 py-4 rounded-2xl font-bold hover:bg-slate-700 transition">Otağa Qoşul</button>
    </div>

    <div id="screen-form" class="w-full max-w-md glass-card p-10 rounded-3xl hidden">
        <h2 id="form-title" class="text-2xl font-bold mb-6 italic">Məlumatlar</h2>
        <input id="user-name" type="text" placeholder="Adınız" class="w-full p-4 rounded-xl mb-4 outline-none">
        <div class="flex gap-2 mb-4">
            <select id="user-gender" class="flex-1 p-4 rounded-xl outline-none">
                <option value="Kişi">Kişi</option>
                <option value="Qadın">Qadın</option>
            </select>
            <select id="user-age" class="flex-1 p-4 rounded-xl outline-none">
                <option value="18-24">18-24 yaş</option>
                <option value="25-35">25-35 yaş</option>
            </select>
        </div>
        <input id="room-code" type="text" placeholder="Otaq Kodu" class="w-full p-4 rounded-xl mb-6 outline-none">
        <button onclick="submitForm()" class="w-full btn-gradient py-4 rounded-2xl font-bold">Davam et</button>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass-card p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-6 text-indigo-400 italic">Məsələ nədir?</h2>
        <textarea id="story-input" class="w-full h-56 p-5 rounded-2xl mb-6 focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="Dürüstcə yaz..."></textarea>
        <button id="btn-save" onclick="sendStory()" class="w-full btn-gradient py-4 rounded-2xl font-bold">Hekayəni Göndər</button>
        <p id="story-wait" class="mt-4 text-center text-amber-500 hidden italic">Partnyorun yazması gözlənilir...</p>
    </div>

    <div id="screen-verify" class="w-full max-w-4xl glass-card p-10 rounded-3xl hidden">
        <h2 class="text-2xl font-bold mb-8 text-center">Hekayələri Təsdiqləyin</h2>
        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <div class="p-6 bg-slate-800/50 rounded-2xl border border-slate-700">
                <p id="text-u1" class="text-slate-300"></p>
            </div>
            <div class="p-6 bg-slate-800/50 rounded-2xl border border-slate-700">
                <p id="text-u2" class="text-slate-300"></p>
            </div>
        </div>
        <button id="btn-confirm" onclick="confirmData()" class="w-full bg-white text-black py-4 rounded-2xl font-black">HƏR ŞEY DÜZDÜR, ANALİZ ET</button>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass-card p-10 rounded-3xl hidden text-center">
        <h2 class="text-3xl font-black text-red-500 mb-8 border-b border-slate-800 pb-4">HAKİM QƏRARI</h2>
        <div id="ai-loading" class="py-10">
            <div class="inline-block w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div id="ai-response" class="text-left text-slate-200 leading-relaxed bg-slate-900/50 p-6 rounded-2xl hidden"></div>
        <button onclick="location.reload()" class="mt-6 text-sm text-slate-500 underline">Yeni Mübahisə</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let GEMINI_KEY = "";
        let roomID = "";
        let myRole = "";
        let mode = "";

        function saveApiKey() {
            GEMINI_KEY = document.getElementById('api-key-input').value.trim();
            if(!GEMINI_KEY) return alert("API açarı daxil edin!");
            showScreen('screen-start');
        }

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function openForm(m) { mode = m; showScreen('screen-form'); }

        function submitForm() {
            const name = document.getElementById('user-name').value.trim();
            roomID = document.getElementById('room-code').value.trim();
            if(!name || !roomID) return alert("Boş buraxmayın!");

            if(mode === 'create') {
                myRole = "user1";
                db.ref('rooms/' + roomID).set({
                    user1: { name, story: "", confirmed: false },
                    status: "waiting"
                }).then(() => listen());
            } else {
                myRole = "user2";
                db.ref('rooms/' + roomID + '/user2').set({ 
                    name, story: "", confirmed: false 
                }).then(() => listen());
            }
        }

        function listen() {
            showScreen('screen-story');
            db.ref('rooms/' + roomID).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    showScreen('screen-verify');
                    document.getElementById('text-u1').innerText = data.user1.name + ": " + data.user1.story;
                    document.getElementById('text-u2').innerText = data.user2.name + ": " + data.user2.story;
                    if(data.user1.confirmed && data.user2.confirmed) runGemini(data);
                }
            });
        }

        function sendStory() {
            const s = document.getElementById('story-input').value.trim();
            db.ref('rooms/' + roomID + '/' + myRole).update({ story: s });
            document.getElementById('btn-save').disabled = true;
            document.getElementById('story-wait').classList.remove('hidden');
        }

        function confirmData() {
            db.ref('rooms/' + roomID + '/' + myRole).update({ confirmed: true });
            document.getElementById('btn-confirm').innerText = "Gözləyin...";
        }

        async function runGemini(data) {
            showScreen('screen-result');
            const prompt = `İki sevgili dalaşıb. Hekayələr: 
            1: ${data.user1.story}
            2: ${data.user2.story}
            Sən sərt hakimsən. Kim günahkardır? Reallığı de, Azərbaycan dilində yaz.`;

            try {
                // Google Gemini API URL (v1beta)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const resData = await response.json();
                const text = resData.candidates[0].content.parts[0].text;
                
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-response').classList.remove('hidden');
                document.getElementById('ai-response').innerHTML = text.replace(/\n/g, "<br>");
            } catch (e) {
                alert("Xəta! API açarı səhv ola bilər.");
            }
        }
    </script>
</body>
</html>
