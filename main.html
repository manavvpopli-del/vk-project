<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent: #22c55e;
            --vip-grad: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            --vip-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        .header { 
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid var(--card-border);
        }
        
        .logo { font-family: 'Space Grotesk'; font-size: 1.3rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .online-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 5px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .balance-box { 
            background: var(--card-bg); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--card-border);
            display: flex; align-items: center; gap: 8px;
        }
        .balance-box span { font-weight: 800; font-size: 1.1rem; color: #fff; font-family: 'Space Grotesk'; }

        .nav-bar { 
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 400px; background: rgba(15, 23, 42, 0.95); 
            display: flex; justify-content: space-around; padding: 12px; border-radius: 20px; 
            border: 1px solid var(--card-border); z-index: 1000; 
        }
        .nav-item { color: #475569; font-size: 1.2rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }

        .section { display: none; height: calc(100vh - 150px); padding: 20px; overflow-y: auto; scrollbar-width: none; }
        .section.active { display: block; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid var(--card-border); margin-bottom: 20px; }

        /* VIP KARTININ MÜKƏMMƏLLƏŞDİRİLMİŞ STİLİ */
        .vip-card-premium {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 2px solid transparent;
            background-image: linear-gradient(#0f172a, #0f172a), var(--vip-gold);
            background-origin: border-box;
            background-clip: content-box, border-box;
            position: relative;
            overflow: hidden;
        }
        .vip-card-premium::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        .coin-btn { width: 180px; height: 180px; margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .coin-btn img { width: 90%; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); transition: 0.1s; }
        .coin-btn:active img { transform: scale(0.9); }

        .energy-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .energy-fill { height: 100%; background: var(--grad); width: 100%; transition: 0.3s; }

        .btn { width: 100%; background: var(--grad); color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 0.85rem; cursor: pointer; font-family: 'Space Grotesk'; text-transform: uppercase; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 12px; z-index: 10000; border: 1px solid var(--card-border); }
        
        .vip-badge { background: var(--vip-gold); padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; color: #000; margin-left: 5px; vertical-align: middle; box-shadow: 0 0 10px rgba(191, 149, 63, 0.5); }

        @keyframes float { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="logo">ZEROWALLET <span id="vip-status-header"></span></div>
            <div style="display:flex; gap:8px; margin-top:2px;">
                <div style="font-size:0.65rem; color:#94a3b8;"><i class="fas fa-users"></i> 1350+</div>
                <div style="font-size:0.65rem; color:#94a3b8;"><span class="online-dot"></span> <span id="online-counter">--</span> Onlayn</div>
            </div>
        </div>
        <div class="balance-box">
            <img src="https://cdn-icons-png.flaticon.com/512/625/625599.png" style="width:20px;">
            <span id="bal">0.00</span> <span>AZN</span>
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="card" style="text-align: center;">
            <div id="boost-tag" style="display:none; font-size:0.7rem; color:#f59e0b; font-weight:800; margin-bottom:5px;"><i class="fas fa-bolt"></i> VİP 2X BOOST AKTİVDİR</div>
            <div style="font-size: 0.8rem; font-weight: 700; color: #94a3b8; display: flex; justify-content: space-between;">
                <span>ENERJİ</span>
                <span id="energy-val">100 / 100</span>
            </div>
            <div class="energy-bg"><div id="energy-bar" class="energy-fill"></div></div>

            <div class="coin-btn" id="coin-btn" onclick="mine(event)">
                <img src="https://cdn-icons-png.flaticon.com/512/1490/1490900.png">
            </div>
            
            <div id="limit-info" style="display:none; color:#ef4444; font-weight:800; margin-top:15px;">
                <i class="fas fa-clock"></i> LİMİT DOLDU! <br> 
                <span id="timer-display" style="font-size:1.5rem">08:00:00</span>
            </div>
            <button id="vip-skip-btn" class="btn" style="display:none; margin-top:10px; background:var(--vip-gold); color:#000;" onclick="showSec('market-sec', document.querySelector('.fa-crown').parentElement)">VİP OL VƏ LİMİTİ QIR</button>
        </div>
    </div>

    <div id="market-sec" class="section">
        <div id="vip-buy-card" class="card vip-card-premium">
            <div style="text-align:center; margin-bottom:15px;">
                <i class="fas fa-gem" style="color:#fcf6ba; font-size:2.5rem; filter: drop-shadow(0 0 10px #bf953f);"></i>
                <h2 style="margin:10px 0 5px 0; font-family:'Space Grotesk'; letter-spacing:1px; color:#fcf6ba;">PREMIUM VİP</h2>
                <div style="font-size:0.8rem; color:#94a3b8;">Sərhədsiz Qazancın Qapısını Aç!</div>
            </div>
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem;">
                    <div><i class="fas fa-check" style="color:var(--accent)"></i> <b>70 AZN</b> Çıxarış</div>
                    <div><i class="fas fa-check" style="color:var(--accent)"></i> <b>3 Dost</b> Şərti</div>
                    <div><i class="fas fa-check" style="color:var(--accent)"></i> <b>Gümüş</b> Rütbə</div>
                    <div><i class="fas fa-check" style="color:var(--accent)"></i> <b>Limitsiz</b> Klik</div>
                    <div style="grid-column: span 2; color:#f59e0b;"><i class="fas fa-star"></i> <b>2X Qazanc Boostu (Yeni!)</b></div>
                </div>
            </div>
            <button class="btn" style="background:var(--vip-gold); color:#000; font-weight:900;" onclick="location.href='pay.html?package=VIP&amount=9.00'">9 AZN - İNDİ AL</button>
        </div>

        <div class="card">
            <h4 style="margin-top:0">Dost Dəvəti</h4>
            <input type="text" id="coupon-input" class="input-field" placeholder="Dostunun Kodu">
            <button class="btn" onclick="processCode()">Təsdiqlə (+1 AZN)</button>
        </div>
    </div>

    <div id="upgrade-sec" class="section">
        <h3 style="text-align:center;">Paketlər</h3>
        <div id="packages-list"></div> </div>

    <div id="withdraw-sec" class="section">
        <h3 style="text-align:center;">Çıxarış</h3>
        <div class="card" id="withdraw-requirements">
            </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-hammer"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-crown"></i></div>
        <div class="nav-item" onclick="showSec('upgrade-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
        <div class="nav-item" onclick="location.href='profile.html'"><i class="fas fa-user-circle"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');
        if(!user) location.href="index.html";

        let userData = { balance: 0, totalClicks: 0, isVip: false, batchClicks: 0, lastBatchTime: 0 };
        let clicksRemaining = 100;

        db.ref('zerowallet_users/' + user).on('value', snap => {
            userData = snap.val() || {};
            document.getElementById('bal').innerText = (userData.balance || 0).toFixed(2);
            
            if(userData.isVip) {
                document.getElementById('vip-status-header').innerHTML = '<span class="vip-badge">PREMIUM</span>';
                document.getElementById('vip-buy-card').style.display = 'none';
                document.getElementById('boost-tag').style.display = 'block';
            }

            checkLimit();
            renderWithdrawUI();
            renderUpgradeUI();
        });

        function mine(e) {
            if(!userData.isVip && userData.batchClicks >= 250) return checkLimit();
            
            if(clicksRemaining <= 0) { clicksRemaining = 100; return updateMiningUI(); }
            
            let base = 0.0001;
            if(userData.rocket === "elite") base = 0.0005;
            if(userData.rocket === "pro") base = 0.0008;
            if(userData.rocket === "super") base = 0.0010;
            
            // VIP BOOST: 2 qat qazanc
            let bonus = userData.isVip ? (base * 2) : base;
            
            clicksRemaining--;
            
            const updates = {
                balance: (userData.balance || 0) + bonus,
                totalClicks: (userData.totalClicks || 0) + 1,
                batchClicks: (userData.batchClicks || 0) + 1
            };

            if(updates.batchClicks >= 250 && !userData.isVip) {
                updates.lastBatchTime = Date.now();
            }

            db.ref('zerowallet_users/' + user).update(updates);
            if(e) showClickEffect(e, bonus);
            updateMiningUI();
        }

        function checkLimit() {
            if(userData.isVip) return false;
            const now = Date.now();
            const diff = now - (userData.lastBatchTime || 0);
            const eightHours = 8 * 60 * 60 * 1000;

            if(userData.batchClicks >= 250 && diff < eightHours) {
                document.getElementById('coin-btn').style.opacity = "0.1";
                document.getElementById('coin-btn').style.pointerEvents = "none";
                document.getElementById('limit-info').style.display = "block";
                document.getElementById('vip-skip-btn').style.display = "block";
                
                let remaining = eightHours - diff;
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
                return true;
            }
            
            if(userData.batchClicks >= 250 && diff >= eightHours) {
                db.ref('zerowallet_users/' + user).update({ batchClicks: 0, lastBatchTime: 0 });
            }
            
            document.getElementById('coin-btn').style.opacity = "1";
            document.getElementById('coin-btn').style.pointerEvents = "auto";
            document.getElementById('limit-info').style.display = "none";
            document.getElementById('vip-skip-btn').style.display = "none";
            return false;
        }

        function updateMiningUI() {
            document.getElementById('energy-bar').style.width = clicksRemaining + "%";
            document.getElementById('energy-val').innerText = clicksRemaining + " / 100";
        }

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function showClickEffect(e, val) {
            const t = document.createElement('div');
            t.innerText = "+" + val.toFixed(4);
            t.style.left = e.clientX + "px"; t.style.top = e.clientY + "px";
            t.style.position = 'fixed'; t.style.color = userData.isVip ? '#f59e0b' : '#22c55e';
            t.style.fontWeight = '800'; t.style.animation = 'float 0.6s forwards';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        // Digər funksiyalar (WithdrawUI, UpgradeUI və s. əvvəlki kodunla eyni qalır)
        function renderUpgradeUI() {
            const list = document.getElementById('packages-list');
            const packs = [
                { id: 'elite', name: 'Elit', bonus: '0.0005', price: 4 },
                { id: 'pro', name: 'Pro', bonus: '0.0008', price: 8 },
                { id: 'super', name: 'Super', bonus: '0.0010', price: 11 }
            ];
            list.innerHTML = packs.map(p => `
                <div class="item-row">
                    <div class="item-info">
                        <img src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png" style="width:40px">
                        <div><h4 style="margin:0">${p.name}</h4><small>+${p.bonus} AZN</small></div>
                    </div>
                    <button class="btn" style="width:auto; padding:10px" onclick="location.href='pay.html?package=${p.id}&amount=${p.price}'">${p.price} AZN</button>
                </div>
            `).join('');
        }

        function renderWithdrawUI() {
            const container = document.getElementById('withdraw-requirements');
            const targetB = userData.isVip ? 70 : 150;
            const b = userData.balance || 0;
            container.innerHTML = `
                <div class="item-row"><span>Balans ${targetB} AZN</span> <span>${b.toFixed(2)} / ${targetB}</span></div>
                <button class="btn" ${b < targetB ? 'disabled' : ''} onclick="location.href='withdraw.html'">Pulu Çıxar</button>
            `;
        }
    </script>
</body>
</html>
