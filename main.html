<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münsif AI - İntellekt Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: #f9fafb; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="screen-main" class="w-full max-w-md glass p-10 rounded-[2rem] text-center shadow-2xl">
        <h1 class="text-4xl font-extrabold mb-8 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">Münsif AI</h1>
        <button onclick="showScreen('screen-create')" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4 hover:scale-[1.02] transition">Otaq Yarat</button>
        <button onclick="showScreen('screen-join')" class="w-full bg-slate-800 py-4 rounded-2xl font-bold hover:scale-[1.02] transition">Otağa Qoşul</button>
    </div>

    <div id="screen-create" class="w-full max-w-md glass p-10 rounded-[2rem] hidden">
        <h2 class="text-2xl font-bold mb-6">Yeni Otaq</h2>
        <input id="c-name" type="text" placeholder="Adınız" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-4 outline-none">
        <input id="c-room" type="text" placeholder="Otaq Kodu (məs: dava1)" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-4 outline-none text-blue-400 font-bold uppercase">
        <input id="c-api" type="password" placeholder="İntellekt Kodu (API)" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-6 outline-none border-dashed border-blue-500/50">
        <button onclick="createRoom()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold transition">Otağı Başlat</button>
    </div>

    <div id="screen-join" class="w-full max-w-md glass p-10 rounded-[2rem] hidden">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400">Otağa Daxil Ol</h2>
        <input id="j-name" type="text" placeholder="Adınız" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-4 outline-none">
        <input id="j-room" type="text" placeholder="Otaq Kodu" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl mb-6 outline-none text-blue-400 font-bold uppercase">
        <button onclick="joinRoom()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold transition text-white">Qoşul</button>
    </div>

    <div id="screen-story" class="w-full max-w-2xl glass p-10 rounded-[2rem] hidden">
        <div id="room-badge" class="mb-4 text-xs font-bold text-indigo-400 uppercase tracking-widest bg-indigo-500/10 px-4 py-1 rounded-full inline-block"></div>
        <h2 class="text-2xl font-bold mb-4 italic">Sənin tərəfin...</h2>
        <textarea id="story-input" class="w-full h-56 p-6 bg-slate-950 border border-slate-800 rounded-2xl mb-6 outline-none focus:border-indigo-500 transition resize-none leading-relaxed" placeholder="Nə baş verdi?"></textarea>
        <button id="send-btn" onclick="saveStory()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">Göndər</button>
        <p id="wait-msg" class="mt-6 text-center text-yellow-500 hidden italic animate-pulse">Partnyorun hekayəsi gözlənilir...</p>
    </div>

    <div id="screen-verify" class="w-full max-w-5xl glass p-10 rounded-[2rem] hidden">
        <h2 class="text-2xl font-bold mb-8 text-center border-b border-slate-800 pb-4">Məlumatların Təsdiqi</h2>
        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <div class="p-6 bg-slate-900/50 rounded-2xl border border-slate-800"><p id="v-u1" class="text-slate-300"></p></div>
            <div class="p-6 bg-slate-900/50 rounded-2xl border border-slate-800"><p id="v-u2" class="text-slate-300"></p></div>
        </div>
        <button id="conf-btn" onclick="confirmRoom()" class="w-full bg-white text-black py-4 rounded-xl font-black shadow-xl hover:bg-slate-200 transition">HƏR ŞEY DÜZDÜR, ANALİZ ET</button>
        <p id="conf-wait" class="mt-4 text-center text-indigo-400 hidden italic">Qarşı tərəf təsdiqləyir...</p>
    </div>

    <div id="screen-result" class="w-full max-w-2xl glass p-10 rounded-[2rem] hidden text-center shadow-2xl">
        <h2 class="text-3xl font-black text-red-500 mb-8 border-b border-slate-800 pb-4 tracking-tighter italic">HAKİMİN HÖKMÜ</h2>
        <div id="ai-loading" class="py-10"><div class="animate-spin h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full inline-block"></div></div>
        <div id="ai-text" class="text-left leading-relaxed text-slate-200 bg-slate-950 p-8 rounded-2xl border border-slate-800 hidden"></div>
        <button onclick="location.reload()" class="mt-10 text-slate-500 hover:text-white underline text-sm transition">Başa qayıt</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let myRole = "";

        function showScreen(id) {
            document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function createRoom() {
            const name = document.getElementById('c-name').value.trim();
            roomID = document.getElementById('c-room').value.trim().toUpperCase();
            const api = document.getElementById('c-api').value.trim();

            if(!name || !roomID || !api) return alert("Bütün sahələri doldurun!");
            
            myRole = "user1";
            db.ref(`rooms/${roomID}`).set({
                user1: { name, story: "", confirmed: false },
                intellectCode: api,
                status: "waiting"
            }).then(() => startRoomSync());
        }

        function joinRoom() {
            const name = document.getElementById('j-name').value.trim();
            roomID = document.getElementById('j-room').value.trim().toUpperCase();

            if(!name || !roomID) return alert("Boş buraxmayın!");

            db.ref(`rooms/${roomID}`).once('value', snap => {
                if(snap.exists()) {
                    myRole = "user2";
                    db.ref(`rooms/${roomID}/user2`).set({ name, story: "", confirmed: false });
                    startRoomSync();
                } else alert("Otaq tapılmadı!");
            });
        }

        function startRoomSync() {
            showScreen('screen-story');
            document.getElementById('room-badge').innerText = "Otaq: " + roomID;
            db.ref(`rooms/${roomID}`).on('value', snap => {
                const data = snap.val();
                if(data && data.user1.story && data.user2 && data.user2.story) {
                    showScreen('screen-verify');
                    document.getElementById('v-u1').innerHTML = `<b>${data.user1.name}:</b><br>${data.user1.story}`;
                    document.getElementById('v-u2').innerHTML = `<b>${data.user2.name}:</b><br>${data.user2.story}`;
                    if(data.user1.confirmed && data.user2.confirmed) runAI(data);
                }
            });
        }

        function saveStory() {
            const story = document.getElementById('story-input').value.trim();
            db.ref(`rooms/${roomID}/${myRole}`).update({ story });
            document.getElementById('send-btn').disabled = true;
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        function confirmRoom() {
            db.ref(`rooms/${roomID}/${myRole}`).update({ confirmed: true });
            document.getElementById('conf-btn').classList.add('hidden');
            document.getElementById('conf-wait').classList.remove('hidden');
        }

        async function runAI(data) {
            showScreen('screen-result');
            const apiKey = data.intellectCode;
            const prompt = `Sən iki sevgili arasında münsifsən. Sərt, ədalətli və dürüst ol.
            Tərəf 1 (${data.user1.name}): ${data.user1.story}
            Tərəf 2 (${data.user2.name}): ${data.user2.story}
            Analiz et və Azərbaycan dilində kimin haqlı, kimin səhv olduğunu əsaslandır. Konkret qərar ver.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                const aiResponse = json.candidates[0].content.parts[0].text;
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-text').classList.remove('hidden');
                document.getElementById('ai-text').innerHTML = aiResponse.replace(/\n/g, "<br>");
            } catch (e) {
                document.getElementById('ai-text').innerHTML = "Xəta: İntellekt kodu səhvdir və ya bloklanıb.";
                document.getElementById('ai-text').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
