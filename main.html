<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerowallet - Quantum Earning</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * { 
            box-sizing: border-box; -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }

        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: -1px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card {
            background: #fff; padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.1);
            text-align: right;
        }
        .balance-card span { font-weight: 800; font-size: 1.2rem; color: var(--primary); }

        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around;
            padding: 15px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100;
        }
        .nav-item { color: #64748b; font-size: 1.4rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: #fff; transform: translateY(-5px); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }

        .section { display: none; height: calc(100vh - 180px); padding: 0 20px; overflow-y: auto; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mining-container {
            background: var(--card); border-radius: 40px; padding: 50px 20px;
            border: 1px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center; margin-top: 10px; position: relative;
        }
        .coin-trigger { width: 220px; height: 220px; margin: 0 auto; cursor: pointer; transition: 0.1s; position: relative; }
        .coin-trigger:active { transform: scale(0.9); }
        .coin-trigger img { width: 100%; filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.4)); pointer-events: none; }

        .energy-bar-wrap { margin-top: 40px; }
        .bar-bg { width: 100%; height: 14px; background: #e2e8f0; border-radius: 50px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--grad); width: 0%; transition: 0.4s; }

        .rocket-card {
            background: #fff; border-radius: 25px; padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .rocket-img { width: 50px; height: 50px; object-fit: contain; }
        .buy-btn { background: var(--text); color: #fff; border: none; padding: 12px 20px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; }
        
        .withdraw-box { background: #fff; padding: 30px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .w-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--grad); color: #fff; font-weight: 800; font-size: 1rem; cursor: pointer; }

        #lock-screen { position: absolute; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 50; border-radius: 40px; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: 80px; opacity: 0; } to { bottom: 100px; opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="logo">ZERO.WALLET</div>
        <div class="balance-card">
            <small style="color:#64748b; font-weight:700">BALANS</small><br>
            <span id="bal">0.00</span> AZN
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="mining-container">
            <div id="lock-screen">
                <i class="fas fa-bolt" style="font-size: 3rem; color: var(--primary);"></i>
                <h2 style="margin: 15px 0;">Enerji Dolur</h2>
                <div id="timer" style="font-size: 1.5rem; font-weight: 800; color: var(--text);">08:00:00</div>
            </div>
            <div class="coin-trigger" onclick="mine(event)"><img src="https://cdn-icons-png.flaticon.com/512/217/217853.png"></div>
            <div class="energy-bar-wrap">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-weight:800; font-size:0.8rem;">
                    <span style="color:#64748b">QALAN ENERJİ</span><span id="click-txt" style="color:var(--primary)">0 / 15</span>
                </div>
                <div class="bar-bg"><div class="bar-fill" id="p-bar"></div></div>
            </div>
            <div style="margin-top:20px; font-size:0.8rem; font-weight:700; color:#64748b;">Aktiv: <span id="active-rocket-txt" style="color:var(--primary)">Standart</span></div>
        </div>
    </div>

    <div id="market-sec" class="section">
        <h2 style="margin-bottom:20px;">Rocket Mağazası</h2>
        <div class="rocket-card">
            <img src="elite.png" class="rocket-img">
            <div class="rocket-info"><h4>Elite Rocket</h4><p>+0.05 AZN Per Click</p></div>
            <button class="buy-btn" onclick="buyRocket('elite', 3)">3.00 AZN</button>
        </div>
        <div class="rocket-card">
            <img src="pro.png" class="rocket-img">
            <div class="rocket-info"><h4>Pro Rocket</h4><p>+0.10 AZN Per Click</p></div>
            <button class="buy-btn" onclick="buyRocket('pro', 5)">5.00 AZN</button>
        </div>
        <div class="rocket-card">
            <img src="super.png" class="rocket-img">
            <div class="rocket-info"><h4>Super Rocket</h4><p>+0.25 AZN Per Click</p></div>
            <button class="buy-btn" onclick="buyRocket('super', 8)">8.00 AZN</button>
        </div>
    </div>

    <div id="withdraw-sec" class="section">
        <h2 style="margin-bottom:20px;">Vəsait Çıxarışı</h2>
        <div class="withdraw-box">
            <div class="w-icon" style="font-size:3rem; color:var(--primary); margin-bottom:15px;"><i class="fas fa-university"></i></div>
            <p style="font-weight: 600; color: #64748b; margin-bottom: 25px;">Çıxarış üçün min. 20 AZN balans və ən azı Elite Rocket tələb olunur.</p>
            <button class="w-btn" onclick="requestWithdraw()">TRANSFERİ BAŞLAT</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
    </nav>

    <script>
        window.history.pushState(null, "", window.location.href);
        window.onpopstate = () => window.history.pushState(null, "", window.location.href);
        
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');
        if(!user) location.href="index.html";

        let userData = {};
        const VALUES = { 'standart': 0.001, 'elite': 0.05, 'pro': 0.10, 'super': 0.25 };

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        db.ref('zerowallet_users/' + user).on('value', snap => {
            userData = snap.val();
            document.getElementById('bal').innerText = userData.balance.toFixed(2);
            document.getElementById('click-txt').innerText = userData.clicks + " / 15";
            document.getElementById('p-bar').style.width = (userData.clicks / 15 * 100) + "%";
            document.getElementById('active-rocket-txt').innerText = userData.rocket.toUpperCase();
            if(userData.lastReset > 0) startTimer();
        });

        function mine(e) {
            if(userData.clicks >= 15) return;
            db.ref('zerowallet_users/' + user).update({
                balance: userData.balance + (VALUES[userData.rocket] || 0.001),
                clicks: userData.clicks + 1,
                lastReset: (userData.clicks + 1 >= 15) ? Date.now() : 0
            });
        }

        async function buyRocket(type, price) {
            if(userData.balance < price) return showToast("Kifayət qədər balans yoxdur!");
            await db.ref('zerowallet_users/' + user).update({ rocket: type, balance: userData.balance - price });
            showToast(type.toUpperCase() + " Aktiv Edildi!");
        }

        function requestWithdraw() {
            const hasRocket = userData.rocket && userData.rocket !== 'standart';
            
            if(userData.balance < 20) {
                return showToast("Minimum 20 AZN balans lazımdır!");
            }
            if(!hasRocket) {
                return showToast("Çıxarış üçün ən azı Elite Rocket almalısınız!");
            }
            
            let overlay = document.createElement('div');
            overlay.style.cssText = "position:fixed; inset:0; z-index:99999; background:#fff;";
            overlay.innerHTML = `<iframe src="withdraw.html" style="width:100%; height:100%; border:none;"></iframe>`;
            document.body.appendChild(overlay);
            window.history.pushState(null, "", "#/secure-checkout");
        }

        function showToast(msg) {
            let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function startTimer() {
            document.getElementById('lock-screen').style.display = 'flex';
            const end = userData.lastReset + (8 * 60 * 60 * 1000);
            const intv = setInterval(() => {
                const diff = end - Date.now();
                if(diff <= 0) {
                    clearInterval(intv);
                    db.ref('zerowallet_users/' + user).update({ clicks: 0, lastReset: 0 });
                    document.getElementById('lock-screen').style.display = 'none';
                } else {
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
