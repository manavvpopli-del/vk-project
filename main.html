<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zerowallet - Quantum Earning</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5; 
            --secondary: #8b5cf6; 
            --bg: #0f172a; 
            --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc;
            --grad: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --nav-bg: rgba(15, 23, 42, 0.95);
            --accent: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.2) 0%, transparent 40%);
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        
        .balance-card { 
            background: rgba(255, 255, 255, 0.05); padding: 10px 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .balance-card img { width: 28px; height: 28px; filter: drop-shadow(0 0 5px var(--primary)); }
        .balance-info small { font-size: 0.65rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .balance-card span { font-weight: 800; font-size: 1.2rem; color: #fff; font-family: 'Space Grotesk'; }

        .nav-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 450px; background: var(--nav-bg); 
            backdrop-filter: blur(20px); display: flex; justify-content: space-around; 
            padding: 15px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 100; 
        }
        .nav-item { color: #64748b; font-size: 1.3rem; cursor: pointer; transition: 0.4s; }
        .nav-item.active { color: var(--primary); transform: translateY(-8px) scale(1.2); }

        .section { display: none; height: calc(100vh - 170px); padding: 15px 20px; overflow-y: auto; }
        .section.active { display: block; animation: sectionFade 0.5s ease; }
        
        .mining-container { 
            background: var(--card); border-radius: 32px; padding: 30px 20px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: 10px;
        }

        .coin-trigger { width: 210px; height: 210px; margin: 30px auto; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .coin-trigger img { width: 90%; z-index: 2; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5)); }
        .coin-trigger:active { transform: scale(0.92); }

        .energy-container { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin-top: 20px; }
        .energy-bar { height: 100%; background: var(--grad); width: 100%; transition: 0.4s; }
        .energy-text { font-size: 0.8rem; font-weight: 700; margin-top: 10px; color: #94a3b8; text-align: center; }

        .ref-card { background: rgba(255, 255, 255, 0.03); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .ref-btn { width: 100%; background: var(--grad); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 800; cursor: pointer; font-family: 'Space Grotesk'; transition: 0.3s; }
        .ref-input { width: 100%; padding: 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; text-align: center; margin-bottom: 15px; outline: none; }

        .rocket-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .rocket-info { display: flex; align-items: center; gap: 15px; }
        .rocket-info img { width: 45px; height: 45px; object-fit: contain; }

        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--grad); color: #fff; padding: 14px 28px; border-radius: 16px; font-weight: 700; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ad-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: none; flex-direction: column; }
        #ad-header { height: 70px; background: #1e293b; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="ad-viewer">
        <div id="ad-header">
            <i class="fas fa-video" style="margin-right:10px; color:var(--accent)"></i>
            REKLAM İZLƏNİLİR: <span id="ad-sec">15</span>s
        </div>
        <iframe id="ad-iframe" src=""></iframe>
    </div>

    <div class="header">
        <div class="logo">ZERO<span style="color:#fff">WALLET</span></div>
        <div class="balance-card">
            <img src="wallet.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/272/272525.png'">
            <div class="balance-info">
                <small>Balans</small><br>
                <span id="bal">0.0000</span>
            </div>
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="mining-container">
            <div class="energy-text"><i class="fas fa-bolt" style="color:#fbbf24"></i> ENERJİ: <span id="energy-val">30</span>/30</div>
            <div class="energy-container"><div id="energy-bar" class="energy-bar"></div></div>

            <div class="coin-trigger" id="coin-btn" onclick="mine(event)">
                <img src="coin.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1490/1490900.png'">
            </div>
            
            <div id="session-box" style="display:none; margin-bottom:15px;">
                <div style="font-size:1.8rem; font-weight:800; color:var(--accent); font-family:'Space Grotesk'"><span id="session-amt">0.000</span> AZN</div>
            </div>

            <button id="claim-btn" class="ref-btn" onclick="claimSession()" style="display:none; background: var(--accent);">
                <i class="fas fa-play"></i> REKLAM İZLƏ VƏ KÖÇÜR
            </button>
        </div>
    </div>

    <div id="upgrade-sec" class="section">
        <h2 style="text-align:center; font-family:'Space Grotesk'">Qazanc Paketləri</h2>
        
        <div class="rocket-card">
            <div class="rocket-info">
                <img src="elite.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1356/1356479.png'">
                <div><h4 style="margin:0">Elite</h4><small style="color:var(--accent)">+0.005 / Klik</small></div>
            </div>
            <button class="ref-btn" style="width:auto; padding:10px 20px;" onclick="location.href='pay.html?amount=3.00'">3 AZN</button>
        </div>

        <div class="rocket-card">
            <div class="rocket-info">
                <img src="pro.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1356/1356479.png'">
                <div><h4 style="margin:0">Pro</h4><small style="color:var(--accent)">+0.010 / Klik</small></div>
            </div>
            <button class="ref-btn" style="width:auto; padding:10px 20px;" onclick="location.href='pay.html?amount=5.00'">5 AZN</button>
        </div>

        <div class="rocket-card">
            <div class="rocket-info">
                <img src="super.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1356/1356479.png'">
                <div><h4 style="margin:0">Super</h4><small style="color:var(--accent)">+0.040 / Klik</small></div>
            </div>
            <button class="ref-btn" style="width:auto; padding:10px 20px;" onclick="location.href='pay.html?amount=8.00'">8 AZN</button>
        </div>
    </div>

    <div id="market-sec" class="section">
        <h2 style="text-align:center; font-family:'Space Grotesk'">Dostunu Dəvət Et</h2>
        <div class="ref-card">
            <input type="text" id="coupon-input" class="ref-input" placeholder="DƏVƏT KODUNU YAZ">
            <button class="ref-btn" onclick="processCode()">BONUSU AKTİVLƏŞDİR</button>
        </div>
        <div class="ref-card" style="text-align:center;">
            <small style="color:#64748b">SƏNİN KODUN</small>
            <div id="my-invite-code" style="margin-top:10px; font-size:1.5rem; color:var(--primary); font-family:'Space Grotesk'; font-weight:900">...</div>
        </div>
    </div>

    <div id="withdraw-sec" class="section">
        <h2 style="text-align:center; font-family:'Space Grotesk'">Çıxarış</h2>
        <div class="ref-card" style="text-align:center;">
            <p>Minimal limit: <b style="color:#fff">150 AZN</b></p>
            <button class="ref-btn" onclick="checkWithdrawal()">YOXLA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-hammer"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-users"></i></div>
        <div class="nav-item" onclick="showSec('upgrade-sec', this)"><i class="fas fa-rocket"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');
        if(!user) location.href="index.html";

        const ADSTERRA_URL = "https://www.profitablecpmratenetwork.com/r6w2jtq0n?key=62ea4c652382983e5bb5135c0b56aa25";
        
        let userData = { balance: 0, inviteCode: "", usedCodes: {} };
        let sessionBalance = 0;
        let clicksRemaining = 30;

        db.ref('zerowallet_users/' + user).on('value', snap => {
            userData = snap.val() || {};
            document.getElementById('bal').innerText = (userData.balance || 0).toFixed(4);
            document.getElementById('my-invite-code').innerText = userData.inviteCode || "---";
        });

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function mine(e) {
            if(clicksRemaining <= 0) return;
            let randVal = (Math.random() * (0.040 - 0.005) + 0.005);
            sessionBalance += randVal;
            clicksRemaining--;
            updateMiningUI();
            showClickEffect(e, randVal);
            if(clicksRemaining === 0) {
                document.getElementById('coin-btn').style.opacity = "0.3";
                document.getElementById('claim-btn').style.display = "block";
            }
        }

        function updateMiningUI() {
            document.getElementById('energy-bar').style.width = (clicksRemaining / 30 * 100) + "%";
            document.getElementById('energy-val').innerText = clicksRemaining;
            document.getElementById('session-box').style.display = "block";
            document.getElementById('session-amt').innerText = sessionBalance.toFixed(3);
        }

        function claimSession() {
            startAdTask(15, () => {
                db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + sessionBalance);
                sessionBalance = 0; clicksRemaining = 30;
                document.getElementById('coin-btn').style.opacity = "1";
                document.getElementById('claim-btn').style.display = "none";
                document.getElementById('session-box').style.display = "none";
                updateMiningUI();
                showToast("Balans köçürüldü!");
            });
        }

        async function processCode() {
            const input = document.getElementById('coupon-input').value.trim();
            if(!input) return showToast("Kodu daxil edin!", true);
            if(input === userData.inviteCode) return showToast("Öz kodunuz olmaz!", true);
            if(userData.usedCodes && userData.usedCodes[input]) return showToast("Bu koddan artıq istifadə olunub!", true);

            const snap = await db.ref('zerowallet_users').orderByChild('inviteCode').equalTo(input).once('value');
            if(!snap.exists()) return showToast("Səhv kod!", true);

            await db.ref('zerowallet_users/' + user + '/usedCodes/' + input).set(true);
            db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + 0.50);
            showToast("Bonus verildi!");
            document.getElementById('coupon-input').value = "";
        }

        function startAdTask(seconds, callback) {
            const viewer = document.getElementById('ad-viewer');
            const timerSpan = document.getElementById('ad-sec');
            let t = seconds;
            timerSpan.innerText = t;
            document.getElementById('ad-iframe').src = ADSTERRA_URL;
            viewer.style.display = 'flex';
            const inv = setInterval(() => {
                t--; timerSpan.innerText = t;
                if(t <= 0) {
                    clearInterval(inv); viewer.style.display = 'none';
                    document.getElementById('ad-iframe').src = ""; callback();
                }
            }, 1000);
        }

        function showToast(m, isError = false) {
            let t = document.createElement('div');
            t.className = 'toast';
            if(isError) t.style.background = "#ef4444";
            t.innerText = m; document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function showClickEffect(e, val) {
            const t = document.createElement('div');
            t.innerText = "+" + val.toFixed(3);
            t.style.left = e.clientX + "px"; t.style.top = e.clientY + "px";
            t.style.position = 'fixed'; t.style.color = 'var(--accent)'; t.style.fontWeight = '800';
            t.style.animation = 'floatUp 0.6s forwards'; document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        function checkWithdrawal() {
            if(userData.balance < 150) showToast("Limit 150 AZN!", true);
            else showToast("Müraciət göndərildi");
        }
    </script>
</body>
</html>
