<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet | Secure Checkout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #00f2ff;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 0;
            background: #0b0e14;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arxa fon effektləri */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.2;
            z-index: -1;
            top: 10%;
            left: -100px;
        }

        .checkout-card {
            width: 90%;
            max-width: 420px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 60px; margin-bottom: 10px; }
        
        .price-tag {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 15px 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bank-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .card-chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .card-number {
            font-size: 1.3rem;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            display: block;
        }

        .copy-badge {
            position: absolute;
            right: 15px;
            bottom: 15px;
            background: var(--primary);
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Fayl seçmə sahəsi */
        .upload-container {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
        }

        .upload-container:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }
        
        #file-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .preview-img {
            max-width: 100px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        .btn-pay {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

        .steps {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="checkout-card">
    <div class="header">
        <i class="fas fa-lock" style="color: var(--accent);"></i>
        <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; margin-top: 5px;">Secure Checkout</p>
    </div>

    <div class="price-tag" id="price">3.00 AZN</div>

    <div class="bank-card">
        <div class="card-chip"></div>
        <span class="card-number" id="card-num">4127 0000 0000 0000</span>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <small style="color: #64748b;">M10 / KART</small>
            <div class="copy-badge" onclick="copyCard()">KOPYALA</div>
        </div>
    </div>

    <div class="upload-container" id="drop-zone">
        <i class="fas fa-camera" style="font-size: 1.5rem; color: var(--primary);"></i>
        <p id="file-status" style="margin: 10px 0 0; font-size: 0.8rem;">ÇEKİ YÜKLƏ VƏ YA ŞƏKİL ÇƏK</p>
        <img id="img-preview" class="preview-img">
        <input type="file" id="file-input" accept="image/*">
    </div>

    <button class="btn-pay" id="pay-btn" onclick="processPayment()">
        <i class="fas fa-check-circle"></i> TƏSDİQLƏ
    </button>

    <div class="steps">
        Köçürmə etdikdən sonra çeki bura daxil edin.<br>
        Təsdiq 1-15 dəqiqə ərzində tamamlanır.
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const user = localStorage.getItem('zerowallet_session');

    const CARD_NO = "4127 1234 5678 9012"; // Bura öz kartını yaz
    document.getElementById('card-num').innerText = CARD_NO;

    // Web App (PWA) üçün fayl seçmənin aktiv edilməsi
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('img-preview');
    const statusText = document.getElementById('file-status');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            statusText.innerText = "Fayl seçildi: " + file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
                preview.style.display = 'inline-block';
            }
            reader.readAsDataURL(file);
        }
    });

    function copyCard() {
        navigator.clipboard.writeText(CARD_NO.replace(/\s/g, ''));
        alert("Kart kopyalandı!");
    }

    function processPayment() {
        if(!fileInput.files[0]) {
            alert("Zəhmət olmasa çeki yükləyin!");
            return;
        }

        const btn = document.getElementById('pay-btn');
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> GÖZLƏYİN...`;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = {
                username: user,
                check: e.target.result,
                date: new Date().toLocaleString(),
                status: 'pending'
            };

            db.ref('admin_withdrawals').push(data).then(() => {
                alert("Ödəniş qəbul edildi. Admin tərəfindən yoxlanılır.");
                window.location.href = "main.html";
            });
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>
</body>
</html>
