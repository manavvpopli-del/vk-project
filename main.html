<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Quantum Earning</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --nav-bg: rgba(15, 23, 42, 0.9);
        }

        body.dark-mode {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f8fafc;
            --nav-bg: rgba(2, 6, 23, 0.95);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; 
            transition: background 0.3s;
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk'; font-size: 1.4rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card { background: #fff; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .balance-card span { font-weight: 800; color: var(--primary); }

        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; z-index: 100; }
        .nav-item { color: #64748b; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #fff; transform: translateY(-5px); }

        .section { display: none; height: calc(100vh - 160px); padding: 0 20px; overflow-y: auto; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .mining-container { background: var(--card); border-radius: 35px; padding: 25px; text-align: center; margin-top: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .coin-trigger { width: 160px; height: 160px; margin: 20px auto; cursor: pointer; transition: 0.1s; }
        .coin-trigger:active { transform: scale(0.9); }
        .coin-trigger img { width: 100%; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); }
        
        .energy-container { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .energy-bar { height: 100%; background: var(--grad); width: 100%; transition: 0.3s; }

        /* WHEEL STYLES */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1); filter: drop-shadow(0 0 15px rgba(0,0,0,0.1)); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: #ef4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 40; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65px; height: 65px; background: #fff; border-radius: 50%; z-index: 50; border: 4px solid var(--text); font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .ref-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .ref-btn:active { transform: scale(0.98); }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 50px; font-size: 13px; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #ad-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999999; display: none; flex-direction: column; }
        #ad-header { height: 70px; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-size: 1.2rem; gap: 10px; }
        #ad-iframe { flex: 1; border: none; }

        /* Native Banner Container */
        .native-ad-container { margin: 20px 0; border-radius: 15px; overflow: hidden; min-height: 100px; }
    </style>
</head>
<body>

    <div id="ad-viewer">
        <div id="ad-header"><i class="fas fa-clock"></i> Gözlə: <span id="ad-sec">15</span>s</div>
        <iframe id="ad-iframe" src=""></iframe>
    </div>

    <div class="header">
        <div class="logo">ZERO.WALLET</div>
        <div class="balance-card">
            <span id="bal">0.0000</span> <small style="margin-left:5px">AZN</small>
        </div>
    </div>

    <div id="mining-sec" class="section active">
        <div class="mining-container">
            <div class="energy-container"><div id="energy-bar" class="energy-bar"></div></div>
            <div style="font-size: 0.8rem; font-weight: 800; margin-bottom: 20px;"><i class="fas fa-bolt"></i> <span id="energy-val">100</span>%</div>

            <div class="coin-trigger" onclick="mine(event)">
                <img src="coin.png">
            </div>
            
            <button class="ref-btn" onclick="earnOneAznAd()" style="background:#10b981;">
                <i class="fas fa-gem"></i> 1.00 AZN QAZAN (REKLAM)
            </button>

            <button id="extra-refill-btn" class="ref-btn" onclick="refillEnergyAd()" style="background:#f59e0b; display:none;">
                <i class="fas fa-battery-full"></i> ENERJİ DOLDUR (REKLAM)
            </button>

            <div class="native-ad-container">
                <script async="async" data-cfasync="false" src="https://pl29218826.profitablecpmratenetwork.com/fed47239501b78c24a02682c538a18a6/invoke.js"></script>
                <div id="container-fed47239501b78c24a02682c538a18a6"></div>
            </div>
        </div>
    </div>

    <div id="bonus-sec" class="section">
        <h2 style="text-align:center">Şans Çarxı</h2>
        <div class="mining-container">
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <div class="spin-btn" onclick="spinWheel()">SPIN</div>
                <canvas id="wheel"></canvas>
            </div>
            <div id="wheel-win-area" style="display:none;">
                <h3 id="win-text" style="color:var(--primary)">0.00 AZN</h3>
                <button class="ref-btn" id="claim-wheel-btn">BALANSA ƏLAVƏ ET (REKLAM)</button>
            </div>
        </div>
    </div>

    <div id="market-sec" class="section"><h2 style="text-align:center">Dəvət Sistemi</h2><div class="mining-container"><p>Sənin Kodun: <b id="my-invite-code">...</b></p></div></div>
    <div id="withdraw-sec" class="section"><h2 style="text-align:center">Çıxarış</h2><div class="mining-container"><p>Min. 50 AZN</p></div></div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSec('mining-sec', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showSec('bonus-sec', this)"><i class="fas fa-dharmachakra"></i></div>
        <div class="nav-item" onclick="showSec('market-sec', this)"><i class="fas fa-users"></i></div>
        <div class="nav-item" onclick="showSec('withdraw-sec', this)"><i class="fas fa-wallet"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        // REKLAM LINKI (Direct Link)
        const MY_AD_LINK = "https://www.profitablecpmratenetwork.com/r6w2jtq0n?key=62ea4c652382983e5bb5135c0b56aa25";

        let userData = { balance: 0, energy: 100 };

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'bonus-sec') drawWheel();
        }

        function showToast(m, err = false) {
            let t = document.createElement('div'); t.className = 'toast';
            if(err) t.style.background = "#ef4444";
            t.innerText = m; document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // DATABASE LISTEN
        db.ref('zerowallet_users/' + user).on('value', snap => {
            userData = snap.val() || userData;
            document.getElementById('bal').innerText = (userData.balance || 0).toFixed(4);
            document.getElementById('energy-val').innerText = Math.floor(userData.energy);
            document.getElementById('energy-bar').style.width = userData.energy + "%";
            document.getElementById('extra-refill-btn').style.display = userData.energy <= 50 ? 'block' : 'none';
        });

        function mine(e) {
            if(userData.energy < 2) { showToast("Enerji bitib!", true); return; }
            userData.energy -= 1.5;
            userData.balance += 0.0001;
            db.ref('zerowallet_users/' + user).update({ balance: userData.balance, energy: userData.energy });
        }

        // AD TIMER ENGINE
        function startAdTask(seconds, callback) {
            const viewer = document.getElementById('ad-viewer');
            const timerSpan = document.getElementById('ad-sec');
            let t = seconds;
            timerSpan.innerText = t;
            document.getElementById('ad-iframe').src = MY_AD_LINK;
            viewer.style.display = 'flex';
            
            const inv = setInterval(() => {
                t--; timerSpan.innerText = t;
                if(t <= 0) {
                    clearInterval(inv);
                    viewer.style.display = 'none';
                    document.getElementById('ad-iframe').src = "";
                    callback();
                }
            }, 1000);
        }

        function earnOneAznAd() {
            startAdTask(15, () => {
                db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + 1.00);
                showToast("1.00 AZN qazandın!");
            });
        }

        function refillEnergyAd() {
            startAdTask(10, () => {
                db.ref('zerowallet_users/' + user).update({ energy: 100 });
                showToast("Enerji fulllandı!");
            });
        }

        // IMPROVED WHEEL LOGIC
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const sectors = [0.10, 2.00, 0.50, 5.00, 0.20, 10.00, 1.00, 0.05];
        const colors = ['#6366f1', '#a855f7', '#4f46e5', '#9333ea', '#312e81', '#7e22ce', '#4338ca', '#6b21a8'];
        let currentRotation = 0;

        function drawWheel() {
            canvas.width = 300; canvas.height = 300;
            const arc = Math.PI * 2 / sectors.length;
            sectors.forEach((val, i) => {
                ctx.beginPath(); ctx.fillStyle = colors[i];
                ctx.moveTo(150, 150); ctx.arc(150, 150, 145, i * arc, (i + 1) * arc);
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.fillStyle = "#fff"; ctx.translate(150, 150);
                ctx.rotate(i * arc + arc / 2);
                ctx.font = "bold 16px Arial"; ctx.fillText(val.toFixed(2), 80, 5);
                ctx.restore();
            });
        }

        function spinWheel() {
            if(this.spinning) return;
            this.spinning = true;
            document.getElementById('wheel-win-area').style.display = 'none';
            
            const extraDeg = Math.floor(Math.random() * 360) + 1440; // En az 4 tam tur
            currentRotation += extraDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                this.spinning = false;
                const actualDeg = currentRotation % 360;
                // Hesablama düzəlişi: Ox yuxarıdadır (270 dərəcə), çarx saat əqrəbi istiqamətində dönür
                const sectorIdx = Math.floor(((360 - actualDeg + 270) % 360) / (360 / sectors.length));
                const win = sectors[sectorIdx];

                document.getElementById('win-text').innerText = win.toFixed(2) + " AZN";
                document.getElementById('wheel-win-area').style.display = 'block';
                document.getElementById('claim-wheel-btn').onclick = () => {
                    startAdTask(12, () => {
                        db.ref('zerowallet_users/' + user + '/balance').transaction(b => (b || 0) + win);
                        document.getElementById('wheel-win-area').style.display = 'none';
                        showToast("Uduş balansa köçürüldü!");
                    });
                };
            }, 5000);
        }
    </script>
</body>
</html>
