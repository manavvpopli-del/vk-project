<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secrets - Sinyal Dekoder v4.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        body {
            margin: 0;
            background: #000;
            color: #ff00ff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .scanner-container {
            width: 250px;
            height: 250px;
            border: 2px solid #ff00ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
            margin-bottom: 50px;
        }

        .scanner-container i {
            font-size: 5rem;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #freq-display {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 0 10px #ff00ff;
            margin-top: 20px;
        }

        .status-msg {
            font-size: 0.7rem;
            opacity: 0.6;
            max-width: 280px;
            letter-spacing: 1px;
            margin: 20px 0;
        }

        .waves {
            display: flex;
            gap: 6px;
            height: 50px;
            align-items: flex-end;
        }

        .bar {
            width: 5px;
            background: #ff00ff;
            height: 10px;
            animation: bounce 0.4s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { height: 5px; }
            to { height: 45px; }
        }

        .back-btn {
            margin-top: 50px;
            background: none;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 12px 30px;
            border-radius: 10px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:active {
            background: #ff00ff;
            color: black;
        }
    </style>
</head>
<body>

    <div class="scanner-container">
        <i class="fas fa-satellite-dish"></i>
    </div>

    <div id="freq-display">94.3 MHz</div>
    <p class="status-msg">BÖLGƏDƏKİ GİZLİ HƏRBİ SİNYALLAR SKAN EDİLİR...</p>

    <div class="waves">
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.5s"></div>
        <div class="bar" style="animation-delay: 0.4s"></div>
        <div class="bar" style="animation-delay: 0.6s"></div>
    </div>

    <audio id="static-audio" loop autoplay>
        <source src="https://www.soundjay.com/mechanical/tv-static-05.mp3" type="audio/mpeg">
    </audio>

    <button class="back-btn" onclick="window.history.back()">BAĞLANTINI KƏS</button>

    <script>
        const freqDisplay = document.getElementById('freq-display');
        
        // Rəqəmlərin hərəkəti
        setInterval(() => {
            let mhz = (Math.random() * (108.0 - 88.0) + 88.0).toFixed(1);
            freqDisplay.innerText = mhz + " MHz";
            
            if(Math.random() > 0.9) {
                freqDisplay.style.color = "#00ff00";
                if(navigator.vibrate) navigator.vibrate(50);
                setTimeout(() => { freqDisplay.style.color = "white"; }, 300);
            }
        }, 150);

        // İstifadəçi ekrana toxunanda səsin başlaması (Brauzer bloklamasın deyə)
        document.body.onclick = () => {
            document.getElementById('static-audio').play();
        };
    </script>
</body>
</html>
