<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarqovi 3D Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #joystick-zone {
            position: absolute; bottom: 50px; left: 50px;
            width: 150px; height: 150px; z-index: 100;
        }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: gold; font-family: 'Segoe UI', sans-serif; pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>
    <div id="ui"><h1>NIZAMI STREET 3D</h1><p>Ekranda sürüşdürərək bax, Joystick ilə gəz</p></div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- SƏHNƏ AYARLARI ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- İŞIQLANDIRMA (Gecə Bakısı Effekti) ---
        const hemiLight = new THREE.HemisphereLight(0x443333, 0x111122, 0.5);
        scene.add(hemiLight);

        // --- YOL (Tarqovi Daşları) ---
        const floorGeo = new THREE.PlaneGeometry(30, 500);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222, 
            roughness: 0.1, 
            metalness: 0.5 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- BİNALAR (Detallı Arxiv) ---
        function createNizamiBuilding(x, z, h) {
            const group = new THREE.Group();
            
            // Ana Bina
            const geo = new THREE.BoxGeometry(10, h, 20);
            const mat = new THREE.MeshStandardMaterial({ color: 0xd4c4a8 });
            const b = new THREE.Mesh(geo, mat);
            group.add(b);

            // Eyvanlar (Şəkildəki kimi qara metal)
            for(let j = 4; j < h; j += 4) {
                const balconyGeo = new THREE.BoxGeometry(2, 0.5, 15);
                const balconyMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const balcony = new THREE.Mesh(balconyGeo, balconyMat);
                balcony.position.set(x > 0 ? -5 : 5, j - (h/2), 0);
                group.add(balcony);
            }

            group.position.set(x, h/2, z);
            scene.add(group);
        }

        for(let i = -200; i < 200; i += 25) {
            createNizamiBuilding(18, i, 20 + Math.random() * 10);
            createNizamiBuilding(-18, i, 20 + Math.random() * 10);
        }

        // --- ASMA ÇİLÇIRAQLAR (Məşhur effekt) ---
        function addLamps(z) {
            const curve = new THREE.CubicBezierCurve3(
                new THREE.Vector3(-12, 15, z),
                new THREE.Vector3(-5, 10, z),
                new THREE.Vector3(5, 10, z),
                new THREE.Vector3(12, 15, z)
            );
            const points = curve.getPoints(20);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);

            // Mərkəzi çilçıraq işığı
            const lampGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const lampMat = new THREE.MeshBasicMaterial({ color: 0xfff0aa });
            const lamp = new THREE.Mesh(lampGeo, lampMat);
            lamp.position.set(0, 10, z);
            
            const light = new THREE.PointLight(0xffaa00, 5, 20);
            light.position.set(0, 10, z);
            
            scene.add(lamp, light);
        }

        for(let z = -180; z < 180; z += 30) addLamps(z);

        // --- MOBİL İDARƏETMƏ SİSTEMİ ---
        let moveForward = 0;
        let moveSide = 0;
        let lookAlpha = 0;
        let lookBeta = 1.7;

        // Joystick
        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '75px', bottom: '75px' },
            color: 'white'
        });

        joystick.on('move', (evt, data) => {
            const forward = data.vector.y;
            const side = data.vector.x;
            moveForward = forward;
            moveSide = side;
        });

        joystick.on('end', () => {
            moveForward = 0;
            moveSide = 0;
        });

        // Touch ilə ətrafa baxmaq
        let startX, startY;
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
        });

        document.addEventListener('touchmove', e => {
            const dx = e.touches[0].pageX - startX;
            const dy = e.touches[0].pageY - startY;
            lookAlpha -= dx * 0.005;
            lookBeta = Math.max(1.2, Math.min(2.0, lookBeta + dy * 0.005));
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
        });

        camera.position.set(0, 1.7, 50);

        // --- RENDER DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // Hərəkət hesablama
            const speed = 0.2;
            camera.position.z -= Math.cos(lookAlpha) * moveForward * speed;
            camera.position.x -= Math.sin(lookAlpha) * moveForward * speed;
            camera.position.x += Math.cos(lookAlpha) * moveSide * speed;
            camera.position.z -= Math.sin(lookAlpha) * moveSide * speed;

            // Baxış istiqaməti
            const target = new THREE.Vector3(
                camera.position.x + Math.sin(lookAlpha),
                camera.position.y + (1.7 - lookBeta),
                camera.position.z + Math.cos(lookAlpha)
            );
            camera.lookAt(target);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
