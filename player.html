<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Pro - Single File Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 2px solid #333; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 480,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    // --- TEKSTURALARIN KODLA YARADILMASI (Donmanı önləyir) ---
    
    // 1. Mario (Oyunçu)
    this.textures.addCanvas('player', createRect(32, 40, '#e74c3c', true));
    
    // 2. Torpaq/Platforma
    this.textures.addCanvas('tiles', createRect(32, 32, '#8b4513', false, '#5d2906'));
    
    // 3. Bulud
    this.textures.addCanvas('cloud', createCloud(96, 48));
    
    // 4. Düşmən
    this.textures.addCanvas('enemy', createRect(30, 30, '#2ecc71', true));
    
    // 5. Arxa Plan (Səma)
    this.textures.addCanvas('sky', createSky(800, 480));
}

function create() {
    // Dünyanın ümumi ölçüsü (Çox uzun xəritə)
    const worldWidth = 6400;
    this.physics.world.setBounds(0, 0, worldWidth, 480);

    // ARXA PLAN (Parallax Effekti)
    this.add.tileSprite(0, 0, worldWidth, 480, 'sky').setOrigin(0, 0).setScrollFactor(0);
    
    // Buludları təsadüfi yerlərə düzürük (Parallax 0.3)
    for (let i = 0; i < 20; i++) {
        this.add.image(Phaser.Math.Between(0, worldWidth), Phaser.Math.Between(50, 200), 'cloud').setScrollFactor(0.3);
    }

    // PLATFORMALAR (Statik Qrup - Performans üçün)
    platforms = this.physics.add.staticGroup();

    // Yeri döşəyirik
    for (let i = 0; i < worldWidth; i += 32) {
        platforms.create(i, 464, 'tiles');
    }

    // Səviyyə Dizaynı (Bloklar və Maneələr)
    [400, 700, 1200, 1500, 1800, 2200, 2500].forEach(x => {
        platforms.create(x, 320, 'tiles');
        platforms.create(x + 32, 320, 'tiles');
        platforms.create(x + 64, 320, 'tiles');
    });

    // OYUNÇU (MARIO)
    this.player = this.physics.add.sprite(100, 350, 'player');
    this.player.setCollideWorldBounds(true);
    this.player.setDamping(true);
    this.player.setDrag(0.1);

    // DÜŞMƏNLƏR
    this.enemies = this.physics.add.group();
    [800, 1300, 2000, 2800].forEach(x => {
        let en = this.enemies.create(x, 400, 'enemy');
        en.setCollideWorldBounds(true);
        en.setVelocityX(-100);
    });

    // KAMERA
    this.cameras.main.setBounds(0, 0, worldWidth, 480);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

    // FİZİKA TOQQUŞMALARI
    this.physics.add.collider(this.player, platforms);
    this.physics.add.collider(this.enemies, platforms);

    // Düşmənlə qarşılaşma məntiqi
    this.physics.add.overlap(this.player, this.enemies, (p, e) => {
        if (p.body.velocity.y > 0 && p.y < e.y) {
            e.destroy(); // Üstünə tullansa ölür
            p.setVelocityY(-400);
        } else {
            // Öləndə restart
            this.scene.restart();
        }
    });

    this.cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    // Hərəkət İdarəetməsi
    if (this.cursors.left.isDown) {
        this.player.setVelocityX(-300);
    } else if (this.cursors.right.isDown) {
        this.player.setVelocityX(300);
    } else {
        this.player.setVelocityX(0);
    }

    // Tullanma
    if (this.cursors.up.isDown && this.player.body.touching.down) {
        this.player.setVelocityY(-650);
    }

    // Düşmənlərin platforma kənarından dönməsi (Sadə AI)
    this.enemies.children.iterate(en => {
        if (en && en.body.blocked.left) en.setVelocityX(100);
        if (en && en.body.blocked.right) en.setVelocityX(-100);
    });
}

// --- KÖMƏKÇİ VİZUAL FUNKSİYALAR (Asset Generator) ---

function createRect(w, h, color, isPlayer, stroke = '#000') {
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, w, h);
    if(isPlayer) { // Göz əlavə edək ki, hara baxdığı bilinsin
        ctx.fillStyle = "white";
        ctx.fillRect(20, 10, 8, 8);
    }
    return canvas;
}

function createSky(w, h) {
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    let grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, "#5c94fc");
    grd.addColorStop(1, "#94bdfc");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);
    return canvas;
}

function createCloud(w, h) {
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(24, 30, 18, 0, Math.PI * 2);
    ctx.arc(48, 20, 24, 0, Math.PI * 2);
    ctx.arc(72, 30, 18, 0, Math.PI * 2);
    ctx.fill();
    return canvas;
}
</script>
</body>
</html>
