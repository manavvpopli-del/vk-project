<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tank Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        touch-action: none;
    }

    canvas {
        display: block;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
        box-sizing: border-box;
        z-index: 10;
    }

    .left-controls {
        display: flex;
        gap: 10px;
    }

    .btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        border: 2px solid white;
        color: white;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
    }
</style>
</head>
<body>

<div class="controls">
    <div class="left-controls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <div class="btn" id="gasBtn">▲</div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

//////////////////////////
// LIGHT
//////////////////////////

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 10, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

//////////////////////////
// ROAD
//////////////////////////

const roadGeometry = new THREE.PlaneGeometry(12, 500);
const roadMaterial = new THREE.MeshStandardMaterial({
    color: 0x444444
});

const road = new THREE.Mesh(roadGeometry, roadMaterial);

road.rotation.x = -Math.PI / 2;
scene.add(road);

//////////////////////////
// ROAD LINES
//////////////////////////

for(let i = -240; i < 240; i += 15){

    const lineGeo = new THREE.BoxGeometry(0.3,0.02,8);

    const lineMat = new THREE.MeshStandardMaterial({
        color: 0xffffff
    });

    const line = new THREE.Mesh(lineGeo,lineMat);

    line.position.z = i;
    line.position.y = 0.01;

    scene.add(line);
}

//////////////////////////
// TANK
//////////////////////////

let tank;

const loader = new GLTFLoader();

loader.load(
    './tank.glb',
    (gltf) => {

        tank = gltf.scene;

        tank.scale.set(1.5,1.5,1.5);

        tank.position.set(0,0,-10);

        scene.add(tank);
    }
);

//////////////////////////
// CONTROLS
//////////////////////////

let moveForward = false;
let turnLeft = false;
let turnRight = false;

const gasBtn = document.getElementById('gasBtn');
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

function hold(btn, variableName){

    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        window[variableName] = true;
    });

    btn.addEventListener('touchend', e => {
        e.preventDefault();
        window[variableName] = false;
    });
}

hold(gasBtn, 'moveForward');
hold(leftBtn, 'turnLeft');
hold(rightBtn, 'turnRight');

//////////////////////////
// GAME LOOP
//////////////////////////

function animate(){

    requestAnimationFrame(animate);

    if(tank){

        if(moveForward){

            tank.translateZ(0.25);
        }

        if(turnLeft){

            tank.rotation.y += 0.03;
        }

        if(turnRight){

            tank.rotation.y -= 0.03;
        }

        //////////////////////////
        // ROAD LIMIT
        //////////////////////////

        if(tank.position.x > 5){
            tank.position.x = 5;
        }

        if(tank.position.x < -5){
            tank.position.x = -5;
        }

        //////////////////////////
        // THIRD PERSON CAMERA
        //////////////////////////

        const cameraOffset = new THREE.Vector3(
            0,
            5,
            -10
        );

        cameraOffset.applyMatrix4(tank.matrixWorld);

        camera.position.lerp(cameraOffset, 0.1);

        camera.lookAt(tank.position);
    }

    renderer.render(scene, camera);
}

animate();

//////////////////////////
// RESIZE
//////////////////////////

window.addEventListener('resize', () => {

    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>
</body>
</html>
