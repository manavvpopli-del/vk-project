<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nizami Street 3D Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instructions {
            position: absolute; top: 10px; left: 10px; color: white;
            font-family: Arial, sans-serif; background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>
    <div id="instructions">W,A,S,D ilə hərəkət et | Siçanla ətrafa bax</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Səhnə və Kamera Ayarları
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000814, 0.02); // Gecə atmosferi üçün duman

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. İşıqlandırma
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // Zəif ümumi işıq
        scene.add(ambientLight);

        // 3. Yol (Floor) - Şəkildəki naxışlı döşəmə
        const floorGeometry = new THREE.PlaneGeometry(20, 200);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            roughness: 0.8 
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. Binaların Yaradılması (Funksiya ilə)
        function createBuilding(x, z, width, height, depth) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshStandardMaterial({ color: 0xe3dac9 }); // Bej rəngli daş binalar
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, height / 2, z);
            scene.add(building);

            // Pəncərə işıqları simulyasiyası
            for(let i = 0; i < 5; i++) {
                const windowLight = new THREE.PointLight(0xffaa00, 0.5, 5);
                windowLight.position.set(x > 0 ? x-2 : x+2, Math.random() * height, z + (Math.random()-0.5)*5);
                scene.add(windowLight);
            }
        }

        // Küçə boyunca binaları düzək
        for (let i = -100; i < 100; i += 15) {
            createBuilding(-8, i, 5, 15 + Math.random() * 10, 10); // Sol tərəf
            createBuilding(8, i, 5, 15 + Math.random() * 10, 10);  // Sağ tərəf
        }

        // 5. Məşhur Çilçıraqlar (Street Chandeliers)
        function createChandelier(z) {
            const group = new THREE.Group();
            const light = new THREE.PointLight(0xfff3b0, 2, 15);
            const geo = new THREE.SphereGeometry(0.5, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color: 0xfff3b0 });
            const mesh = new THREE.Mesh(geo, mat);
            
            light.position.set(0, 8, z);
            mesh.position.set(0, 8, z);
            
            scene.add(light);
            scene.add(mesh);
        }

        for (let i = -80; i < 80; i += 20) {
            createChandelier(i);
        }

        // 6. İdarəetmə (Controls)
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveKeys = { forward: false, backward: false, left: false, right: false };

        const onKeyDown = (event) => {
            switch (event.code) {
                case 'KeyW': moveKeys.forward = true; break;
                case 'KeyS': moveKeys.backward = true; break;
                case 'KeyA': moveKeys.left = true; break;
                case 'KeyD': moveKeys.right = true; break;
            }
        };

        const onKeyUp = (event) => {
            switch (event.code) {
                case 'KeyW': moveKeys.forward = false; break;
                case 'KeyS': moveKeys.backward = false; break;
                case 'KeyA': moveKeys.left = false; break;
                case 'KeyD': moveKeys.right = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        camera.position.y = 1.7; // İnsan boyu hündürlüyü

        // 7. Animasyon Döngüsü
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = 0.15;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveKeys.forward) - Number(moveKeys.backward);
                direction.x = Number(moveKeys.right) - Number(moveKeys.left);
                direction.normalize();

                if (moveKeys.forward || moveKeys.backward) velocity.z -= direction.z * 400.0 * delta;
                if (moveKeys.left || moveKeys.right) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Pəncərə ölçüsü dəyişəndə uyğunlaşma
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
