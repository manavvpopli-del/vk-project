<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Tank Simulator - Drone View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; touch-action: none; font-family: sans-serif; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
            pointer-events: auto;
        }
        .joystick {
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border: 2px solid #fff; border-radius: 50%; position: relative;
        }
        .knob {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            position: absolute; left: 30px; top: 30px;
        }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="info">Sol: Sükan və Qaz | Sağ Ekran: Kameranı 360° Döndər</div>
    <div class="controls">
        <div id="move-joy" class="joystick"><div id="move-knob" class="knob"></div></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "cannon": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as CANNON from 'cannon';

let scene, camera, renderer, world, tankModel, tankBody;
let moveX = 0, moveY = 0;
let camAngleX = Math.PI, camAngleY = 1.0; 
let camDistance = 12;

// --- FİZİKA ---
world = new CANNON.World();
world.gravity.set(0, -9.82, 0);

// --- SCENE ---
scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 30, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// --- DÜZ YOL YARAT (KODLA) ---
function createRoad() {
    const roadGeo = new THREE.PlaneGeometry(15, 1000);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    scene.add(road);

    // Yol xətləri
    const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.y = 0.01;
    scene.add(line);

    const groundBody = new CANNON.Body({ mass: 0 });
    groundBody.addShape(new CANNON.Plane());
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);
}
createRoad();

// --- TANK YÜKLƏ ---
const loader = new GLTFLoader();
loader.load('tank.glb', (gltf) => {
    tankModel = gltf.scene;
    scene.add(tankModel);

    const shape = new CANNON.Box(new CANNON.Vec3(1.2, 0.5, 2));
    tankBody = new CANNON.Body({ mass: 1000 });
    tankBody.addShape(shape);
    tankBody.position.set(0, 2, 0);
    // Tankın sağa-sola aşmaması üçün rotasiya limitləri (X və Z oxunu dondururuq)
    tankBody.angularDamping = 0.9;
    world.addBody(tankBody);
});

// --- İDARƏETMƏ ---
const moveKnob = document.getElementById('move-knob');
let lastTX = 0, lastTY = 0;

window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    lastTX = t.clientX; lastTY = t.clientY;
});

window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const rect = document.getElementById('move-joy').getBoundingClientRect();
    
    // Əgər toxunuş joystick sahəsindədirsə (Sol tərəf)
    if (t.clientX < window.innerWidth / 2) {
        moveX = (t.clientX - (rect.left + 50)) / 50;
        moveY = (t.clientY - (rect.top + 50)) / 50;
        const dist = Math.min(Math.sqrt(moveX**2 + moveY**2), 1);
        const ang = Math.atan2(moveY, moveX);
        moveKnob.style.transform = `translate(${Math.cos(ang)*dist*30}px, ${Math.sin(ang)*dist*30}px)`;
    } else {
        // Sağ tərəf kameranı 360 dərəcə döndərir
        camAngleX -= (t.clientX - lastTX) * 0.01;
        camAngleY = Math.max(0.3, Math.min(1.5, camAngleY + (t.clientY - lastTY) * 0.01));
    }
    lastTX = t.clientX; lastTY = t.clientY;
});

window.addEventListener('touchend', () => {
    moveX = 0; moveY = 0;
    moveKnob.style.transform = `translate(0px, 0px)`;
});

// --- UPDATE ---
function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);

    if (tankBody && tankModel) {
        // Tankın yalnız Y oxunda dönməsinə icazə veririk (Aşmaması üçün)
        tankModel.position.copy(tankBody.position);
        tankModel.quaternion.copy(tankBody.quaternion);
        
        // Hərəkət
        const speed = 18;
        if (Math.abs(moveY) > 0.1) {
            const dir = new THREE.Vector3(0, 0, -moveY).applyQuaternion(tankModel.quaternion);
            tankBody.velocity.x = dir.x * speed;
            tankBody.velocity.z = dir.z * speed;
        }
        // Sükan (Rol) dönməsi
        tankBody.angularVelocity.y = -moveX * 3.0;

        // DRON KAMERA TAKİBİ (360 dərəcə fırlanan)
        const x = tankModel.position.x + camDistance * Math.sin(camAngleX) * Math.cos(camAngleY);
        const y = tankModel.position.y + camDistance * Math.sin(camAngleY);
        const z = tankModel.position.z + camDistance * Math.cos(camAngleX) * Math.cos(camAngleY);

        camera.position.set(x, y, z);
        camera.lookAt(tankModel.position);
    }
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
