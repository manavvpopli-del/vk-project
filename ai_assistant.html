<div id="ai-module" style="color: var(--accent); font-family: 'Outfit', sans-serif;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <div class="ai-brain">
            <i class="fas fa-brain" style="font-size: 3rem; color: var(--accent); text-shadow: 0 0 20px var(--accent);"></i>
        </div>
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 15px; letter-spacing: 3px;">GEMINI EXPLOIT AI</h2>
        <div id="ai-status" style="font-size: 0.55rem; color: var(--cyber); letter-spacing: 1px;">SYSTEM: ONLINE</div>
    </div>

    <div id="ai-chat-box" style="height: 350px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 20px; padding: 15px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;">
        <div class="ai-msg">
            <span style="color: var(--accent); font-weight: 900;">[GEMINI]:</span> Bağlantı quruldu. İsmail, mən hazırda kainatın ən böyük məlumat bazasına bağlıyam. Nəyi hack edirik?
        </div>
    </div>

    <div style="display: flex; gap: 10px; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 15px; border: 1px solid var(--border);">
        <input type="text" id="ai-input" placeholder="Sualını soruş..." style="flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 0.85rem;">
        <button onclick="askGemini()" id="send-btn" style="width: 50px; height: 45px; background: var(--accent); border: none; border-radius: 12px; color: #000; cursor: pointer;">
            <i class="fas fa-bolt"></i>
        </button>
    </div>
</div>

<style>
    .ai-brain { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { opacity: 0.6; filter: drop-shadow(0 0 5px var(--accent)); } to { opacity: 1; filter: drop-shadow(0 0 20px var(--accent)); } }
    .ai-msg { font-size: 0.8rem; line-height: 1.5; background: rgba(0, 223, 255, 0.05); padding: 12px; border-radius: 15px; border-left: 3px solid var(--accent); color: #e0e0e0; }
    .user-msg { font-size: 0.8rem; line-height: 1.5; align-self: flex-end; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 15px; border-right: 3px solid var(--premium); text-align: right; color: #fff; max-width: 85%; }
</style>

<script>
    // 🔑 GEMINI API KEY - BURAYA ÖZ AÇARINI QOY
    const API_KEY = "AIzaSyArXWyCj9zD7J8UZQRBY1TAdqvxOB3LI5g"; 
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

    async function askGemini() {
        const input = document.getElementById('ai-input');
        const box = document.getElementById('ai-chat-box');
        const btn = document.getElementById('send-btn');
        const status = document.getElementById('ai-status');
        const userText = input.value.trim();

        if (!userText || API_KEY === "AIzaSyArXWyCj9zD7J8UZQRBY1TAdqvxOB3LI5g") {
            if(API_KEY.includes("BURA")) alert("Xəta: API Key daxil edilməyib!");
            return;
        }

        // İstifadəçi mesajını ekrana vur
        box.innerHTML += `<div class="user-msg">${userText}</div>`;
        input.value = "";
        btn.disabled = true;
        status.innerText = "SYSTEM: THINKING...";
        status.style.color = "var(--premium)";
        box.scrollTop = box.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Sən bir kiber təhlükəsizlik mütəxəssisisən. Adın Hackatron AI-dır. İsmail adlı hakerə kömək edirsən. Cavablarını qısa, texniki və haker stilində ver. Sual: " + userText }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            // AI mesajını yazılma effekti ilə göstər
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.innerHTML = `<span style="color: var(--accent); font-weight: 900;">[GEMINI]:</span> `;
            box.appendChild(aiDiv);
            
            let i = 0;
            const typeEffect = setInterval(() => {
                aiDiv.innerHTML += aiResponse.charAt(i);
                i++;
                box.scrollTop = box.scrollHeight;
                if (i >= aiResponse.length) {
                    clearInterval(typeEffect);
                    btn.disabled = false;
                    status.innerText = "SYSTEM: ONLINE";
                    status.style.color = "var(--cyber)";
                }
            }, 20);

            if (navigator.vibrate) navigator.vibrate(100);

        } catch (error) {
            console.error(error);
            box.innerHTML += `<div class="ai-msg" style="border-color:var(--danger);">[ERROR]: API bağlantısı kəsildi. Key-i yoxlayın.</div>`;
            btn.disabled = false;
        }
    }

    // Enter düyməsi ilə göndərmə
    document.getElementById('ai-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') askGemini();
    });
</script>
