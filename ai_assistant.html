<div id="ai-module" style="color: var(--accent); font-family: 'Outfit', sans-serif;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <div class="ai-brain">
            <i class="fas fa-microchip" style="font-size: 3rem; color: var(--accent); text-shadow: 0 0 20px var(--accent);"></i>
        </div>
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 15px; letter-spacing: 3px;">DƏSTƏK AI (STABLE SDK)</h2>
        <div id="ai-status" style="font-size: 0.55rem; color: var(--cyber); letter-spacing: 1px;">SİSTEM: HAZIRDIR</div>
    </div>

    <div id="ai-chat-box" style="height: 380px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 15px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;">
        <div class="ai-msg">
            <span style="color: var(--accent); font-weight: 900;">[DƏSTƏK AI]:</span> Bağlantı protokolları yeniləndi. İsmail, indi Google-un rəsmi mühərriki ilə birbaşa əlaqədəyəm. Sualını verə bilərsən.
        </div>
    </div>

    <div style="display: flex; gap: 10px; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 15px; border: 1px solid var(--border);">
        <input type="text" id="ai-input" placeholder="Kiber sualını bura yaz..." style="flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 0.85rem;">
        <button onclick="askSupportAI()" id="send-btn" style="width: 55px; height: 50px; background: var(--accent); border: none; border-radius: 12px; color: #000; cursor: pointer;">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<style>
    .ai-brain { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 0 20px var(--accent); } }
    .ai-msg { font-size: 0.8rem; line-height: 1.5; background: rgba(0, 223, 255, 0.05); padding: 12px; border-radius: 15px; border-left: 3px solid var(--accent); color: #e0e0e0; }
    .user-msg { font-size: 0.8rem; line-height: 1.5; align-self: flex-end; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 15px; border-right: 3px solid var(--premium); text-align: right; color: #fff; max-width: 85%; }
</style>

<script type="module">
    // Google AI SDK-nı birbaşa yükləyirik
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyArXWyCj9zD7J8UZQRBY1TAdqvxOB3LI5g";
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.askSupportAI = async function() {
        const input = document.getElementById('ai-input');
        const box = document.getElementById('ai-chat-box');
        const btn = document.getElementById('send-btn');
        const status = document.getElementById('ai-status');
        const val = input.value.trim();

        if (!val) return;

        box.innerHTML += `<div class="user-msg">${val}</div>`;
        input.value = "";
        btn.disabled = true;
        status.innerText = "SİSTEM: ANALİZ EDİR...";
        status.style.color = "var(--premium)";
        box.scrollTop = box.scrollHeight;

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const prompt = "Sən Hackatron v10.0 sisteminin Dəstək AI-san. İstifadəçin İsmail-dir. Qısa və texniki haker dilində cavab ver. Gemini adını çəkmə. Sual: " + val;
            
            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();

            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.innerHTML = `<span style="color: var(--accent); font-weight: 900;">[DƏSTƏK AI]:</span> `;
            box.appendChild(aiDiv);
            
            let i = 0;
            const typeEffect = setInterval(() => {
                aiDiv.innerHTML += text.charAt(i);
                i++;
                box.scrollTop = box.scrollHeight;
                if (i >= text.length) {
                    clearInterval(typeEffect);
                    btn.disabled = false;
                    status.innerText = "SİSTEM: ONLAYN";
                    status.style.color = "var(--cyber)";
                }
            }, 20);

        } catch (error) {
            console.error(error);
            box.innerHTML += `<div class="ai-msg" style="color:var(--danger);">[XƏTA]: SDK bağlantısı qurulmadı. İnterneti və ya API açarını yoxla.</div>`;
            btn.disabled = false;
            status.innerText = "SİSTEM: XƏTA";
        }
    }
</script>
