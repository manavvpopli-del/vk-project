<div id="ai-module" style="color: var(--accent); font-family: 'Outfit', sans-serif;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <div class="ai-brain">
            <i class="fas fa-microchip" style="font-size: 3rem; color: var(--accent); text-shadow: 0 0 20px var(--accent);"></i>
        </div>
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 15px; letter-spacing: 3px;">DƏSTƏK AI (STABLE)</h2>
        <div id="ai-status" style="font-size: 0.55rem; color: var(--cyber); letter-spacing: 1px;">SİSTEM: GLOBAL CLOUD ACTIVE</div>
    </div>

    <div id="ai-chat-box" style="height: 380px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 15px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;">
        <div class="ai-msg">
            <span style="color: var(--accent); font-weight: 900;">[DƏSTƏK AI]:</span> Bağlantı quruldu. İsmail, sistem stabil vəziyyətdədir. Mənə kiber-təhlükəsizlik və ya kodlaşdırma haqqında istədiyin sualı verə bilərsən.
        </div>
    </div>

    <div style="display: flex; gap: 10px; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 15px; border: 1px solid var(--border);">
        <input type="text" id="ai-input" placeholder="Sualını bura yaz..." style="flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 0.85rem;">
        <button onclick="askSupportAI()" id="send-btn" style="width: 55px; height: 50px; background: var(--accent); border: none; border-radius: 12px; color: #000; cursor: pointer;">
            <i class="fas fa-bolt"></i>
        </button>
    </div>
</div>

<style>
    .ai-brain { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 0 20px var(--accent); } 100% { opacity: 0.7; } }
    .ai-msg { font-size: 0.8rem; line-height: 1.5; background: rgba(0, 223, 255, 0.05); padding: 12px; border-radius: 15px; border-left: 3px solid var(--accent); color: #e0e0e0; }
    .user-msg { font-size: 0.8rem; line-height: 1.5; align-self: flex-end; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 15px; border-right: 3px solid var(--premium); text-align: right; color: #fff; max-width: 85%; }
    #send-btn:disabled { opacity: 0.3; background: #333; cursor: not-allowed; }
</style>

<script>
    async function askSupportAI() {
        const input = document.getElementById('ai-input');
        const box = document.getElementById('ai-chat-box');
        const btn = document.getElementById('send-btn');
        const status = document.getElementById('ai-status');
        const val = input.value.trim();

        if (!val) return;

        // Mesajı ekrana vur
        box.innerHTML += `<div class="user-msg">${val}</div>`;
        input.value = "";
        btn.disabled = true;
        status.innerText = "SİSTEM: ANALİZ EDİLİR...";
        status.style.color = "var(--premium)";
        box.scrollTop = box.scrollHeight;

        try {
            // Tamamilə limitsiz və açıq API endpoint (Xəta verməyən versiya)
            const response = await fetch(`https://api.simsimi.vn/v2/simsimi?text=${encodeURIComponent(val)}&lc=az`);
            const data = await response.json();
            
            let aiText = data.result || "Sistem hazırda bu sorğunu emal edə bilmir. Yenidən yoxla.";

            // AI Mesajını Yazılma Effekti İlə Göstər
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.innerHTML = `<span style="color: var(--accent); font-weight: 900;">[DƏSTƏK AI]:</span> `;
            box.appendChild(aiDiv);
            
            let i = 0;
            const typeEffect = setInterval(() => {
                aiDiv.innerHTML += aiText.charAt(i);
                i++;
                box.scrollTop = box.scrollHeight;
                if (i >= aiText.length) {
                    clearInterval(typeEffect);
                    btn.disabled = false;
                    status.innerText = "SİSTEM: ONLAYN";
                    status.style.color = "var(--cyber)";
                }
            }, 20);

            if (navigator.vibrate) navigator.vibrate(50);

        } catch (error) {
            console.error(error);
            box.innerHTML += `<div class="ai-msg" style="color:var(--danger);">[XƏTA]: Şəbəkə bağlantısı kəsildi.</div>`;
            btn.disabled = false;
            status.innerText = "SİSTEM: XƏTA";
        }
    }

    document.getElementById('ai-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !document.getElementById('send-btn').disabled) askSupportAI();
    });
</script>
