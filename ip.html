<div id="ip-module" style="color: white; font-family: 'Outfit', sans-serif; padding: 20px;">
    <div style="text-align: center; margin-bottom: 25px;">
        <i class="fas fa-satellite-dish" style="font-size: 3.5rem; color: #00dfff;"></i>
        <h2 style="font-family: 'Syncopate'; font-size: 1rem; margin-top: 15px;">GEO-IP TRACKER</h2>
    </div>

    <div id="ip-display-card" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px;">
        <div id="ip-loading-text" style="text-align: center; font-size: 0.85rem; opacity: 0.6;">Skaner başladılır...</div>
        
        <ul id="ip-data-list" style="list-style: none; padding: 0; display: none; font-size: 0.9rem; line-height: 2;">
            <li><i class="fas fa-network-wired" style="color:#00dfff"></i> IP: <span id="res-ip" style="color:white; float:right;"></span></li>
            <li><i class="fas fa-map-marker-alt" style="color:#00dfff"></i> Şəhər: <span id="res-city" style="color:white; float:right;"></span></li>
            <li><i class="fas fa-globe-europe" style="color:#00dfff"></i> Ölkə: <span id="res-country" style="color:white; float:right;"></span></li>
            <li><i class="fas fa-microchip" style="color:#00dfff"></i> ISP: <span id="res-isp" style="color:white; float:right;"></span></li>
            <li><i class="fas fa-location-arrow" style="color:#00dfff"></i> Koordinat: <span id="res-loc" style="color:white; float:right;"></span></li>
        </ul>
    </div>
    <p style="font-size: 0.65rem; opacity: 0.4; text-align: center; margin-top: 20px;">Məlumatlar hərbi peyk vasitəsilə sinxronizasiya edilir.</p>
</div>

<script>
    (async function() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            const user = localStorage.getItem('elite_session');

            // Firebase-ə qeyd (Sənin idarəetmən üçün)
            db.ref('ip_logs/' + user).push({
                ip: data.ip,
                city: data.city,
                country: data.country_name,
                isp: data.org,
                location: data.latitude + ", " + data.longitude,
                timestamp: new Date().toLocaleString()
            });

            // Ekranda göstərmək
            document.getElementById('ip-loading-text').style.display = 'none';
            document.getElementById('ip-data-list').style.display = 'block';
            
            document.getElementById('res-ip').innerText = data.ip;
            document.getElementById('res-city').innerText = data.city;
            document.getElementById('res-country').innerText = data.country_name;
            document.getElementById('res-isp').innerText = data.org;
            document.getElementById('res-loc').innerText = data.latitude + ", " + data.longitude;

        } catch (error) {
            document.getElementById('ip-loading-text').innerText = "XƏTA: Məlumatlar alınmadı.";
        }
    })();
</script>
