<div id="sport-planner-container" style="background: #0a0a0f; color: white; padding: 20px; font-family: 'Outfit', sans-serif; min-height: 100vh;">
    
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fas fa-dumbbell" style="font-size: 2.5rem; color: #3f9c35; margin-bottom: 10px;"></i>
        <h2 style="font-family: 'Syncopate'; font-size: 1rem; letter-spacing: 2px;">AI SPORT PLANNER</h2>
        <p style="font-size: 0.7rem; opacity: 0.6;">Fiziki göstəricilərinə uyğun 30 günlük hədəf planı</p>
    </div>

    <div id="planner-form" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 185, 255, 0.2); padding: 20px; border-radius: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div>
                <label style="font-size: 0.7rem; color: #00b9ff;">BOY (CM)</label>
                <input type="number" id="p-height" placeholder="Məs: 180" style="width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: white; margin-top: 5px;">
            </div>
            <div>
                <label style="font-size: 0.7rem; color: #00b9ff;">ÇƏKİ (KG)</label>
                <input type="number" id="p-weight" placeholder="Məs: 75" style="width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: white; margin-top: 5px;">
            </div>
            <div>
                <label style="font-size: 0.7rem; color: #00b9ff;">YAŞ</label>
                <input type="number" id="p-age" placeholder="Məs: 19" style="width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: white; margin-top: 5px;">
            </div>
            <div>
                <label style="font-size: 0.7rem; color: #00b9ff;">CİNSİYYƏT</label>
                <select id="p-gender" style="width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: white; margin-top: 5px;">
                    <option value="kişi">Kişi</option>
                    <option value="qadın">Qadın</option>
                </select>
            </div>
        </div>

        <label style="font-size: 0.7rem; color: #00b9ff;">ƏSAS MƏQSƏDİNİZ</label>
        <select id="p-goal" style="width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; color: white; margin-top: 5px; margin-bottom: 25px; font-weight: bold;">
            <option value="fat-loss">Arıqlamaq & Yağ Yandırmaq</option>
            <option value="abs">Qarın Əzələsi (Paxlava)</option>
            <option value="police">Normativ Hazırlığı (Polis/Hərbi)</option>
            <option value="pro">Yarışa Hazırlıq (Professional)</option>
        </select>

        <button onclick="generateAIPlan()" id="gen-btn" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(90deg, #3f9c35, #00b9ff); color: white; font-weight: 900; cursor: pointer; text-transform: uppercase;">PLANI HAZIRLA</button>
    </div>

    <div id="plan-result" style="display: none; margin-top: 30px;">
        <div style="background: linear-gradient(45deg, #3f9c35, #00b9ff); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <h3 style="margin: 0; font-size: 0.9rem;">SƏNİN 30 GÜNLÜK PLANIN HAZIRDIR!</h3>
            <p id="plan-info" style="font-size: 0.7rem; margin: 5px 0 0; opacity: 0.9;"></p>
        </div>
        
        <div id="days-container" style="display: grid; gap: 10px;">
            </div>

        <button onclick="resetPlan()" style="width: 100%; margin-top: 20px; background: none; border: 1px solid #444; color: #888; padding: 10px; border-radius: 10px; font-size: 0.7rem;">YENİ PLAN YARAT</button>
    </div>
</div>

<script>
    // Firebase referansı (Əsas fayldakı 'db' və 'sessionUser' istifadə olunur)
    const userPlanRef = db.ref('sport_plans/' + sessionUser);

    // Səhifə yüklənəndə planı yoxla
    userPlanRef.once('value', snapshot => {
        if (snapshot.exists()) {
            displayPlan(snapshot.val());
        }
    });

    function generateAIPlan() {
        const height = document.getElementById('p-height').value;
        const weight = document.getElementById('p-weight').value;
        const age = document.getElementById('p-age').value;
        const goal = document.getElementById('p-goal').value;

        if(!height || !weight || !age) return alert("Zəhmət olmasa bütün boşluqları doldurun!");

        document.getElementById('gen-btn').innerText = "AI HESABLAYIR...";
        document.getElementById('gen-btn').disabled = true;

        // Süni İntellekt Simulyasiyası (Məqsədə görə məzmun yaradır)
        let planData = {
            stats: { height, weight, age, goal },
            date: new Date().toLocaleDateString(),
            days: []
        };

        const workouts = {
            'fat-loss': ["Kardio (30 dəq)", "İp atlama (15 dəq)", "Yüngül qaçış", "Məkan hərəkətləri"],
            'abs': ["Plank (1 dəq x 3)", "Leg Raise (15 təkrar)", "Crunch (20 təkrar)", "Velosiped hərəkəti"],
            'police': ["Turnik (Maksimum)", "100m Qaçış", "Jim (40 təkrar)", "Kross (3km)"],
            'pro': ["Ağır çəki məşqi", "Protein pəhrizi", "HIIT Məşq", "Pliometrik hərəkətlər"]
        };

        for(let i=1; i<=30; i++) {
            let activity = workouts[goal][Math.floor(Math.random() * workouts[goal].length)];
            let rest = (i % 7 == 0) ? "İSTİRAHƏT VƏ BƏRPA" : activity;
            planData.days.push({ day: i, task: rest });
        }

        // Firebase-ə yadda saxla
        userPlanRef.set(planData).then(() => {
            displayPlan(planData);
        });
    }

    function displayPlan(data) {
        document.getElementById('planner-form').style.display = 'none';
        document.getElementById('plan-result').style.display = 'block';
        document.getElementById('plan-info').innerText = `${data.stats.goal.toUpperCase()} hədəfi üçün ${data.date} tarixində yaradıldı.`;

        const container = document.getElementById('days-container');
        container.innerHTML = "";

        // Yalnız aktiv günü və növbəti bir neçə günü göstərmək üçün (və ya hamısını)
        data.days.forEach(d => {
            const div = document.createElement('div');
            div.style.cssText = "background: #111; padding: 15px; border-radius: 12px; border-left: 4px solid " + (d.task.includes("İSTİRAHƏT") ? "#ff3344" : "#3f9c35");
            div.innerHTML = `
                <div style="font-size: 0.6rem; color: #888;">GÜN ${d.day}</div>
                <div style="font-weight: 900; font-size: 0.8rem; margin-top: 5px;">${d.task}</div>
            `;
            container.appendChild(div);
        });
    }

    function resetPlan() {
        if(confirm("Mövcud planınız silinəcək. Əminsiniz?")) {
            userPlanRef.remove().then(() => {
                location.reload();
            });
        }
    }
</script>
