<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --fun: #ff007a; --tools: #00dfff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 30px; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 20px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .pts-count { color: gold; font-weight: 900; background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 10px; border: 1px solid gold; }
        
        .section-title { font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 3px; margin: 50px 0 20px; display: flex; align-items: center; gap: 15px; }
        .line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.07); text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        .card.fun:hover { border-color: var(--fun); }
        .card.tools:hover { border-color: var(--tools); }
        .card i { font-size: 3rem; margin-bottom: 20px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 40px; }
    </style>
</head>
<body>

<audio id="bg-music" loop autoplay><source src="music.mp3" type="audio/mpeg"></audio>

<div class="nav-bar">
    <div style="font-weight: 900; font-size: 0.8rem;">OPERATOR: <span id="u-display" style="color:var(--tools);">...</span></div>
    <div class="pts-count"><i class="fas fa-gem"></i> <span id="pts-display">0</span> PTS</div>
</div>

<div class="section-title" style="color:var(--fun)">FOR FUN <div class="line"></div></div>
<div class="grid">
    <div class="card fun" onclick="openMod('secret_test.html', 400)"><i class="fas fa-user-secret" style="color:var(--fun)"></i><h3>Gizli Həqiqətlər</h3></div>
    <div class="card fun" onclick="openMod('tarot.html', 400)"><i class="fas fa-magic" style="color:var(--fun)"></i><h3>Tarot Analizi</h3></div>
</div>

<div class="section-title" style="color:var(--tools)">TOOLS <div class="line"></div></div>
<div class="grid">
    <div class="card tools" onclick="openMod('insta_spy.html', 900)"><i class="fab fa-instagram" style="color:var(--tools)"></i><h3>Instagram Spy</h3></div>
    <div class="card tools" onclick="openMod('trap.html', 450)"><i class="fas fa-camera" style="color:var(--tools)"></i><h3>Camera Trap</h3></div>
    <div class="card tools" onclick="openMod('ip.html', 0)"><i class="fas fa-map-marker-alt" style="color:var(--tools)"></i><h3>IP Tracker</h3></div>
    <div class="card tools" onclick="openMod('mail.html', 0)"><i class="fas fa-envelope-open-text" style="color:var(--tools)"></i><h3>Anonim Mail</h3></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'" style="position:fixed; top:20px; right:20px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">X</button>
    <div id="m-content"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const currentUser = localStorage.getItem('elite_user');
    if(!currentUser) window.location.href = "index.html";

    document.getElementById('u-display').innerText = currentUser.toUpperCase();
    
    db.ref('users/' + currentUser + '/points').on('value', s => {
        document.getElementById('pts-display').innerText = s.val() || 0;
    });

    async function openMod(file, cost) {
        const snap = await db.ref('users/' + currentUser).get();
        const points = snap.val().points || 0;

        if(cost > 0 && points < cost) return alert("Xalınız kifayət deyil!");

        const res = await fetch(file);
        const html = await res.text();
        document.getElementById('m-content').innerHTML = html;
        document.getElementById('modal').style.display = 'block';

        const scripts = document.getElementById('m-content').getElementsByTagName('script');
        for (let s of scripts) {
            const ns = document.createElement("script");
            ns.text = s.text;
            document.body.appendChild(ns).parentNode.removeChild(ns);
        }
    }
</script>
</body>
</html>
