<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Professional Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        :root { --bg: #020205; --fun: #ff007a; --tools: #00dfff; --gold: #ffd700; --glass: rgba(255,255,255,0.02); }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 40px; overflow-x: hidden; }

        /* CANLI STATİSTİKA */
        .live-stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; }
        .stat-val { color: var(--gold); }
        .dot { width: 7px; height: 7px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #0f0; }

        /* NAVBAR */
        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 25px 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(15px); }
        .pts-badge { background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent); padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(255,215,0,0.2); color: var(--gold); font-weight: 900; }

        /* KATEGORİYA */
        .section-header { font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 5px; margin: 60px 0 30px; display: flex; align-items: center; gap: 20px; }
        .line { flex: 1; height: 1px; background: linear-gradient(90deg, currentColor, transparent); }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { 
            background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-15px) scale(1.03); background: rgba(255,255,255,0.05); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; filter: drop-shadow(0 0 15px currentColor); }
        .card h3 { margin: 0; letter-spacing: 1px; }
        .card p { font-size: 0.7rem; opacity: 0.4; margin-top: 10px; font-weight: 900; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 50px; }
    </style>
</head>
<body>

<audio id="bg-music" loop autoplay><source src="music.mp3" type="audio/mpeg"></audio>

<div class="live-stats">
    <div>TOTAL USERS: <span class="stat-val">3562+</span></div>
    <div><span class="dot"></span> ONLINE: <span id="online-count" class="stat-val">42</span></div>
</div>

<div class="nav">
    <div style="font-weight:900; letter-spacing:1px;">OPERATOR: <span id="u-tag" style="color:var(--tools);">...</span></div>
    <div class="pts-badge"><i class="fas fa-gem"></i> <span id="pts-tag">0</span> PTS</div>
</div>

<div class="section-header" style="color:var(--fun)">FOR FUN <div class="line"></div></div>
<div class="grid">
    <div class="card" onclick="openTool('secret_test.html', 0)" style="border-bottom: 4px solid var(--fun);"><i class="fas fa-user-secret" style="color:var(--fun)"></i><h3>Gizli Həqiqətlər</h3><p>FREE ACCESS</p></div>
    <div class="card" onclick="openTool('tarot.html', 0)" style="border-bottom: 4px solid var(--fun);"><i class="fas fa-wand-sparkles" style="color:var(--fun)"></i><h3>Tarot Analizi</h3><p>FREE ACCESS</p></div>
</div>

<div class="section-header" style="color:var(--tools)">TOOLS <div class="line"></div></div>
<div class="grid">
    <div class="card" onclick="openTool('insta_spy.html', 900)" style="border-bottom: 4px solid var(--tools);"><i class="fab fa-instagram" style="color:var(--tools)"></i><h3>Instagram Spy</h3><p>COST: 900 PTS</p></div>
    <div class="card" onclick="openTool('trap.html', 500)" style="border-bottom: 4px solid var(--tools);"><i class="fas fa-camera" style="color:var(--tools)"></i><h3>Camera Trap</h3><p>COST: 500 PTS</p></div>
    <div class="card" onclick="openTool('ip.html', 0)" style="border-bottom: 4px solid white;"><i class="fas fa-map-pin" style="color:white"></i><h3>IP Tracker</h3><p>FREE ACCESS</p></div>
    <div class="card" onclick="openTool('mail.html', 0)" style="border-bottom: 4px solid white;"><i class="fas fa-envelope-shield" style="color:white"></i><h3>Anonim Mail</h3><p>FREE ACCESS</p></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'" style="position:fixed; top:20px; right:20px; padding:12px 30px; background:red; color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">X</button>
    <div id="m-content"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ONLAYN SAYI
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 101); }, 2500);

    const user = localStorage.getItem('elite_session');
    if(!user) window.location.href = "index.html";

    document.getElementById('u-tag').innerText = user.toUpperCase();
    db.ref('users/' + user + '/points').on('value', s => { document.getElementById('pts-tag').innerText = s.val() || 0; });

    async function openTool(file, cost) {
        const snap = await db.ref('users/' + user).get();
        const pts = snap.val().points || 0;
        if(cost > 0 && pts < cost) return alert("Xalınız kifayət deyil! Lazımdır: " + cost + " PTS");

        const res = await fetch(file);
        const html = await res.text();
        document.getElementById('m-content').innerHTML = html;
        document.getElementById('modal').style.display = 'block';

        const scripts = document.getElementById('m-content').getElementsByTagName('script');
        for (let s of scripts) {
            const ns = document.createElement("script");
            ns.text = s.text;
            document.body.appendChild(ns).parentNode.removeChild(ns);
        }
    }
</script>
</body>
</html>
