<div id="main-app" style="display:none;">
    
    <div id="mining-section" class="section">
        <style>
            .mining-card {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 25px;
                padding: 30px 15px;
                text-align: center;
                backdrop-filter: blur(10px);
            }
            .crypto-icons {
                display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;
            }
            .crypto-icons img {
                width: 45px; height: 45px; border-radius: 50%;
                animation: float-coin 3s ease-in-out infinite;
            }
            @keyframes float-coin { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
            .balance-num { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 10px 0; }
            .btn-collect { background: #fff; color: #000; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; border: none; cursor: pointer; }
            .btn-collect:disabled { background: #222; color: #555; }
        </style>

        <div class="crypto-icons">
            <img src="btc.png" alt="BTC">
            <img src="eth.png" alt="ETH" style="animation-delay: 0.5s">
            <img src="usdt.png" alt="USDT" style="animation-delay: 1s">
        </div>

        <div class="mining-card">
            <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">TOTAL REVENUE</div>
            <div class="balance-num">$<span id="user-bal-display">0.00</span></div>
            <div id="live-inc" style="color: #3f9c35; font-size: 0.8rem; margin-bottom: 20px;">+0.000000 USD/s</div>
            
            <button class="btn-collect" id="claim-btn" onclick="handleClaim()">COLLECT PROFITS</button>
            <div id="claim-timer" style="font-size: 0.7rem; color: #888; margin-top: 10px;"></div>
            
            <button onclick="handleWithdraw()" style="margin-top: 15px; background: transparent; color: #fff; border: 1px solid #333; padding: 15px; width: 100%; border-radius: 15px; cursor: pointer;">
                WITHDRAW (MIN: $15)
            </button>
        </div>
    </div>

    <div id="admin-section" style="display:none; padding: 20px; background: #000; border-radius: 20px; margin-top: 30px;">
        <h2 style="color: #00b9ff; font-family: 'Orbitron'; font-size: 1rem;">WW24 CONTROL</h2>
        <div id="user-list-admin" style="max-height: 300px; overflow-y: auto;">
            </div>
    </div>

</div>

<script>
    // FİREBASE SİNXRONİZASİYA
    function startMiningSync() {
        const u = localStorage.getItem('elite_session');
        
        db.ref('mining/' + u).on('value', snap => {
            const data = snap.val() || { balance: 0, lastClaim: 0, status: 'active' };
            
            // BLOKLAMA YOXLANILMASI
            if(data.status === 'blocked') {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>HESABINIZ BLOKLANIB!</h1>";
                return;
            }

            document.getElementById('user-bal-display').innerText = parseFloat(data.balance).toFixed(2);
            updateTimer(data.lastClaim);
            
            // Admin üçün siyahını yenilə
            if(u === 'admin') loadAdminPanel(); 
        });
    }

    function updateTimer(last) {
        const btn = document.getElementById('claim-btn');
        const timer = document.getElementById('claim-timer');
        const now = Date.now();
        const cooldown = 3600000;

        if(now - last < cooldown) {
            btn.disabled = true;
            const diff = cooldown - (now - last);
            timer.innerText = `Next harvest: ${Math.floor(diff/60000)}m ${Math.floor((diff%60000)/1000)}s`;
            setTimeout(() => updateTimer(last), 1000);
        } else {
            btn.disabled = false;
            timer.innerText = "Mining ready to collect!";
        }
    }

    async function handleClaim() {
        const u = localStorage.getItem('elite_session');
        const snap = await db.ref('mining/' + u).get();
        const current = snap.val()?.balance || 0;
        const reward = (Math.random() * 0.4 + 0.1).toFixed(2);
        
        await db.ref('mining/' + u).update({
            balance: parseFloat(current) + parseFloat(reward),
            lastClaim: Date.now()
        });
    }

    // ADMIN FUNKSİYALARI (WW24)
    async function loadAdminPanel() {
        const snap = await db.ref('mining').get();
        const users = snap.val();
        const container = document.getElementById('user-list-admin');
        container.innerHTML = "";

        for(let user in users) {
            const d = users[user];
            container.innerHTML += `
                <div style="border-bottom: 1px solid #222; padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.8rem;">${user} ($${d.balance})</span>
                    <div>
                        <button onclick="adminChangeBal('${user}')" style="background:#3f9c35; border:none; color:#fff; padding:5px;">Edit</button>
                        <button onclick="adminToggleBlock('${user}', '${d.status}')" style="background:#ff3344; border:none; color:#fff; padding:5px;">
                            ${d.status === 'blocked' ? 'Unblock' : 'Block'}
                        </button>
                    </div>
                </div>
            `;
        }
    }

    window.adminChangeBal = async (user) => {
        const amount = prompt("Yeni balans daxil et:");
        if(amount) await db.ref('mining/' + user).update({ balance: parseFloat(amount) });
    };

    window.adminToggleBlock = async (user, current) => {
        const next = current === 'blocked' ? 'active' : 'blocked';
        await db.ref('mining/' + user).update({ status: next });
    };

    // Canlı rəqəm axını animasiyası
    setInterval(() => {
        const el = document.getElementById('live-inc');
        if(el) el.innerText = "+" + (Math.random() * 0.0001).toFixed(6) + " USD/s";
    }, 2000);
</script>
