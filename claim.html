<div id="mining-page" style="background: #050507; min-height: 100vh; color: white; font-family: 'Inter', sans-serif; padding: 20px; text-align: center;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        .crypto-icons { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .crypto-icons img { width: 55px; height: 55px; border-radius: 50%; box-shadow: 0 0 15px rgba(0,185,255,0.2); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bal-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 20px; margin-bottom: 25px; }
        .bal-main { font-family: 'Orbitron', sans-serif; font-size: 3.2rem; margin: 15px 0; }
        .bal-main span { color: #3f9c35; }
        .btn-claim { background: #fff; color: #000; width: 100%; padding: 20px; border-radius: 18px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-claim:disabled { background: #1a1a1a; color: #444; }
    </style>

    <div class="crypto-icons">
        <img src="btc.png" alt="BTC">
        <img src="eth.png" alt="ETH" style="animation-delay: 0.5s">
        <img src="usdt.png" alt="USDT" style="animation-delay: 1s">
    </div>

    <div class="bal-card">
        <div style="font-size: 0.7rem; letter-spacing: 3px; color: #00b9ff; font-weight: bold;">AVAILABLE REVENUE</div>
        <div class="bal-main"><span>$</span><span id="user-bal">0.00</span></div>
        <div id="live-inc" style="color: #3f9c35; font-weight: bold; font-size: 0.8rem; margin-bottom: 25px;">+0.000000 USD/s</div>
        
        <button class="btn-claim" id="claim-btn" onclick="execUserClaim()">COLLECT PROFITS</button>
        <div id="timer-txt" style="margin-top: 15px; font-size: 0.75rem; color: #666;"></div>
        
        <button onclick="checkAndGoWithdraw()" style="margin-top: 20px; background: transparent; border: 1px solid #222; color: #888; padding: 15px; width: 100%; border-radius: 15px; cursor: pointer;">
            <i class="fas fa-credit-card"></i> KARTA ÇIXARIŞ (MIN: $15)
        </button>
    </div>
</div>

<script>
    (function() {
        const u = localStorage.getItem('elite_session') || 'Guest';
        let currentB = 0;

        db.ref('mining/' + u).on('value', snap => {
            const d = snap.val() || { balance: 0, lastClaim: 0, status: 'active' };
            if(d.status === 'blocked') { document.body.innerHTML = "<h1 style='color:red;text-align:center;'>BLOK!</h1>"; return; }
            currentB = parseFloat(d.balance);
            document.getElementById('user-bal').innerText = currentB.toFixed(2);
            updateTimer(d.lastClaim);
        });

        function updateTimer(last) {
            const btn = document.getElementById('claim-btn');
            const now = Date.now();
            if(now - last < 3600000) {
                btn.disabled = true;
                const rem = 3600000 - (now - last);
                document.getElementById('timer-txt').innerText = `Növbəti: ${Math.floor(rem/60000)}d ${Math.floor((rem%60000)/1000)}s`;
                setTimeout(() => updateTimer(last), 1000);
            } else { btn.disabled = false; document.getElementById('timer-txt').innerText = "Hazırdır!"; }
        }

        window.execUserClaim = async () => {
            const plus = (Math.random() * 0.3 + 0.1).toFixed(2);
            await db.ref('mining/' + u).update({ balance: currentB + parseFloat(plus), lastClaim: Date.now() });
        };

        window.checkAndGoWithdraw = () => {
            if(currentB < 15) return alert("Minimum $15 lazımdır!");
            window.location.href = "withdraw.html";
        };

        setInterval(() => { document.getElementById('live-inc').innerText = "+" + (Math.random() * 0.0001).toFixed(6) + " USD/s"; }, 2000);
    })();
</script>
