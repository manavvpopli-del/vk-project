<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Rewards - Websim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            background: #f4f7f6;
            font-family: 'Poppins', sans-serif;
            color: #2d3436;
            text-align: center;
        }

        .balance-card {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            padding: 30px;
            border-radius: 25px;
            color: white;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            margin-bottom: 30px;
        }

        .balance-amount { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
        .withdraw-info { font-size: 0.8rem; opacity: 0.9; }

        /* ÇARX VİZUALI */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 8px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .wheel-bg {
            width: 100%;
            height: 100%;
            background: conic-gradient(
                #ff7675 0deg 72deg, 
                #fdcb6e 72deg 144deg, 
                #00b894 144deg 216deg, 
                #0984e3 216deg 288deg, 
                #6c5ce7 288deg 360deg
            );
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #2d3436;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            background: #2d3436;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .spin-btn:disabled { background: #b2bec3; cursor: not-allowed; }

        .timer-info {
            margin-top: 20px;
            padding: 15px;
            background: #dfe6e9;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .penalty-notice {
            color: #d63031;
            font-size: 0.7rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="balance-card">
        <p>Cari Balans</p>
        <div class="balance-amount"><span id="user-balance">0.00</span> AZN</div>
        <p class="withdraw-info">Minimum çıxarış: 15.00 AZN</p>
    </div>

    <div style="position: relative;">
        <div class="pointer"></div>
        <div class="wheel-container" id="wheel">
            <div class="wheel-bg"></div>
        </div>
    </div>

    <button id="spin-trigger" class="spin-btn" onclick="spinWheel()">ÇARXI ÇEVİR</button>

    <div class="timer-info">
        <span id="status-text">Çarx hazırdır!</span>
        <div id="countdown" style="font-weight: 900; margin-top: 5px;"></div>
    </div>

    <p class="penalty-notice">
        Diqqət: 5 saatdan sonra 2 saat ərzində çevirmə edilməsə, balansdan 0.50 AZN cərimə çıxılacaq!
    </p>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#6c5ce7">TƏBRİKLƏR!</h2>
            <p id="win-text"></p>
            <button class="spin-btn" onclick="closeModal()">SİSTEMƏ ƏLAVƏ ET</button>
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('ws_balance')) || 0;
        let lastSpin = parseInt(localStorage.getItem('ws_last_spin')) || 0;
        const prices = [0.10, 0.30, 0.50, 0.80, 1.00];

        function updateUI() {
            document.getElementById('user-balance').innerText = balance.toFixed(2);
            checkTiming();
        }

        function checkTiming() {
            const now = Date.now();
            const spinBtn = document.getElementById('spin-trigger');
            const statusText = document.getElementById('status-text');
            const countdown = document.getElementById('countdown');

            if (lastSpin === 0) return;

            const diff = now - lastSpin;
            const waitTime = 5 * 60 * 60 * 1000; // 5 saat
            const penaltyTime = 2 * 60 * 60 * 1000; // 2 saat cərimə pəncərəsi

            if (diff < waitTime) {
                spinBtn.disabled = true;
                statusText.innerText = "Növbəti çevirmə üçün gözləyin:";
                startTimer(waitTime - diff);
            } else if (diff > (waitTime + penaltyTime)) {
                // Cərimə tətbiqi
                balance = Math.max(0, balance - 0.50);
                lastSpin = now; // Cəriməni bir dəfə kəsmək üçün vaxtı yeniləyirik
                saveData();
                alert("Gecikdiyiniz üçün balansdan 0.50 AZN cərimə çıxıldı!");
                updateUI();
            } else {
                spinBtn.disabled = false;
                statusText.innerText = "Sizin qazanmaq vaxtınızdır!";
                countdown.innerText = "MƏBLƏĞİ GÖTÜRÜN!";
                countdown.style.color = "#00b894";
            }
        }

        function startTimer(duration) {
            const timerDisplay = document.getElementById('countdown');
            let timer = duration;
            const interval = setInterval(() => {
                let hours = Math.floor((timer / (1000 * 60 * 60)) % 24);
                let minutes = Math.floor((timer / (1000 * 60)) % 60);
                let seconds = Math.floor((timer / 1000) % 60);

                timerDisplay.innerText = `${hours}s ${minutes}d ${seconds}sn`;
                timer -= 1000;

                if (timer < 0) {
                    clearInterval(interval);
                    checkTiming();
                }
            }, 1000);
        }

        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600; // Ən az 10 dövr
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            document.getElementById('spin-trigger').disabled = true;

            setTimeout(() => {
                const actualDeg = randomDeg % 360;
                const index = Math.floor(actualDeg / 72);
                const winAmount = prices[index];
                
                showWin(winAmount);
            }, 4000);
        }

        function showWin(amount) {
            balance += amount;
            lastSpin = Date.now();
            saveData();
            
            document.getElementById('win-text').innerText = `Siz ${amount.toFixed(2)} AZN qazandınız!`;
            document.getElementById('win-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('win-modal').style.display = 'none';
            location.reload();
        }

        function saveData() {
            localStorage.setItem('ws_balance', balance);
            localStorage.setItem('ws_last_spin', lastSpin);
        }

        updateUI();
    </script>
</body>
</html>
