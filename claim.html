<div id="claim-wrapper" style="font-family: 'Montserrat', sans-serif; color: #333; padding: 10px;">
    
    <style>
        .wallet-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            border-bottom: 4px solid #00b894;
            text-align: center;
        }
        .balance-value { font-size: 2rem; font-weight: 900; color: #2d3436; margin: 5px 0; }
        
        .wheel-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
        }
        #claim-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ff7675 0% 20%, 
                #fdcb6e 20% 40%, 
                #00b894 40% 60%, 
                #0984e3 60% 80%, 
                #6c5ce7 80% 100%
            );
            position: relative;
        }
        .price-tag {
            position: absolute;
            font-weight: 900;
            color: white;
            font-size: 0.8rem;
            width: 40px;
            text-align: center;
        }
        .p1 { top: 30px; left: 140px; transform: rotate(36deg); }
        .p2 { top: 110px; left: 190px; transform: rotate(108deg); }
        .p3 { top: 190px; left: 110px; transform: rotate(180deg); }
        .p4 { top: 130px; left: 30px; transform: rotate(252deg); }
        .p5 { top: 40px; left: 50px; transform: rotate(324deg); }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #2d3436;
            font-size: 2rem;
        }
        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .spin-btn-active { background: linear-gradient(45deg, #00b894, #00cec9); color: white; }
        .spin-btn-active:disabled { background: #eee; color: #ccc; }
        
        .withdraw-btn { background: #f8f9fa; border: 1.5px solid #ddd; color: #666; font-size: 0.75rem; }

        /* Daxili Modal (Qazanc və Çıxarış üçün) */
        .claim-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .claim-modal-box { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            width: 100%; 
            max-width: 320px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
        }

        .card-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.8rem;
            margin: 10px 0;
        }
    </style>

    <div class="wallet-card">
        <div style="font-size: 0.65rem; color: #aaa; font-weight: 800;">HESABINIZ</div>
        <div class="balance-value"><span id="ws-balance-display">0.00</span> AZN</div>
        <div id="ws-timer-display" style="font-size: 0.7rem; font-weight: 700;">Yüklənir...</div>
    </div>

    <div class="wheel-container">
        <div class="wheel-pointer"><i class="fas fa-caret-down"></i></div>
        <div id="claim-wheel">
            <div class="price-tag p1">0.10</div>
            <div class="price-tag p2">0.30</div>
            <div class="price-tag p3">0.50</div>
            <div class="price-tag p4">0.80</div>
            <div class="price-tag p5">1.00</div>
        </div>
    </div>

    <button id="ws-spin-btn" class="action-btn spin-btn-active" onclick="handleSpinStart()">ÇARXI ÇEVİR</button>
    <button class="action-btn withdraw-btn" onclick="openWithdrawPanel()">PUL ÇIXARIŞI</button>

    <div id="ws-win-modal" class="claim-modal-overlay">
        <div class="claim-modal-box">
            <i class="fas fa-gift" style="font-size: 2.5rem; color: #fdcb6e;"></i>
            <h2 style="margin: 10px 0;">TEBRİKLER!</h2>
            <p id="ws-win-amount" style="font-size: 1.5rem; font-weight: 900; color: #00b894;"></p>
            <button class="action-btn spin-btn-active" onclick="closeClaimWin()">BALANSA VUR</button>
        </div>
    </div>

    <div id="ws-withdraw-modal" class="claim-modal-overlay">
        <div class="claim-modal-box">
            <h3 style="margin-top:0; font-size: 1.1rem;">Vəsaitin Çıxarılması</h3>
            <p style="font-size:0.65rem; color:#888;">Ödəniş üçün kart məlumatlarını qeyd edin</p>
            
            <div class="card-icons">
                <i class="fab fa-cc-visa" style="color:#1a1f71"></i>
                <i class="fab fa-cc-mastercard" style="color:#eb001b"></i>
            </div>

            <input type="text" placeholder="**** **** **** ****" class="card-input" id="card-num">
            <input type="text" placeholder="AD SOYAD" class="card-input" id="card-name">
            
            <button class="action-btn spin-btn-active" onclick="finalWithdrawCheck()">TƏSDİQLƏ</button>
            <button onclick="document.getElementById('ws-withdraw-modal').style.display='none'" style="background:none; border:none; margin-top:15px; color:#aaa; font-size:0.7rem;">LƏĞV ET</button>
        </div>
    </div>
</div>

<script>
    (function() {
        let balance = parseFloat(localStorage.getItem('ws_balance')) || 0;
        let lastSpin = parseInt(localStorage.getItem('ws_last_spin')) || 0;
        const rewards = [0.10, 1.00, 0.80, 0.50, 0.30];

        const updateView = () => {
            document.getElementById('ws-balance-display').innerText = balance.toFixed(2);
            checkSystemStatus();
        };

        const checkSystemStatus = () => {
            const now = Date.now();
            const btn = document.getElementById('ws-spin-btn');
            const timer = document.getElementById('ws-timer-display');
            
            if (lastSpin === 0) {
                btn.disabled = false;
                timer.innerText = "ŞANSINI SINAMAĞA HAZIRSAN!";
                timer.style.color = "#00b894";
                return;
            }

            const diff = now - lastSpin;
            const wait = 5 * 60 * 60 * 1000; 
            const penalty = 7 * 60 * 60 * 1000;

            if (diff < wait) {
                btn.disabled = true;
                const rem = wait - diff;
                const h = Math.floor(rem / 3600000);
                const m = Math.floor((rem % 3600000) / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                timer.innerText = `NÖVBƏTİ ŞANS: ${h}s ${m}d ${s}sn`;
                timer.style.color = "#ff3344";
                setTimeout(checkSystemStatus, 1000);
            } else if (diff > penalty) {
                balance = Math.max(0, balance - 0.50);
                lastSpin = now;
                localStorage.setItem('ws_balance', balance.toFixed(2));
                localStorage.setItem('ws_last_spin', lastSpin);
                alert("7 saat keçdiyi üçün balansdan 0.50 AZN cərimə kəsildi!");
                updateView();
            } else {
                btn.disabled = false;
                timer.innerText = "VAXTDIR, ÇEVİR VƏ QAZAN!";
                timer.style.color = "#00b894";
            }
        };

        window.handleSpinStart = function() {
            const wheel = document.getElementById('claim-wheel');
            const btn = document.getElementById('ws-spin-btn');
            btn.disabled = true;
            
            const deg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const win = rewards[Math.floor((deg % 360) / 72)];
                balance += win;
                lastSpin = Date.now();
                localStorage.setItem('ws_balance', balance.toFixed(2));
                localStorage.setItem('ws_last_spin', lastSpin);
                
                document.getElementById('ws-win-amount').innerText = "+" + win.toFixed(2) + " AZN";
                document.getElementById('ws-win-modal').style.display = 'flex';
            }, 5000);
        };

        window.closeClaimWin = function() {
            document.getElementById('ws-win-modal').style.display = 'none';
            updateView();
        };

        // ÇIXARIŞ PANELİNİ AÇMAQ (İstənilən vaxt)
        window.openWithdrawPanel = function() {
            document.getElementById('ws-withdraw-modal').style.display = 'flex';
        };

        // SON YOXLAŞ (Təsdiqlə düyməsinə basanda)
        window.finalWithdrawCheck = function() {
            const card = document.getElementById('card-num').value;
            const name = document.getElementById('card-name').value;

            if(card.length < 16 || name.length < 3) {
                alert("XƏTA: Kart məlumatlarını düzgün daxil edin!");
                return;
            }

            if(balance < 15) {
                alert("⚠ ÇIXARIŞ RƏDD EDİLDİ!\n\nMinimum çıxarış məbləği 15.00 AZN-dir.\nSizin balansınız: " + balance.toFixed(2) + " AZN\nÇatmayan məbləğ: " + (15 - balance).toFixed(2) + " AZN");
            } else {
                alert("MƏLUMAT: Çıxarış sorğunuz qəbul edildi. 24 saat ərzində " + card.slice(-4) + " nömrəli karta köçürüləcək.");
                document.getElementById('ws-withdraw-modal').style.display = 'none';
            }
        };

        updateView();
    })();
</script>
