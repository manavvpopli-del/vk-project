<div id="mining-app" style="background: #000000; min-height: 100vh; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; overflow: hidden;">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; user-select: none; }

        /* ÜST PANEL */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid #3fb950; }

        /* STATİSTİKA BLOKLARI */
        .stats-container { padding: 15px; gap: 10px; display: flex; flex-direction: column; }
        .stat-row { 
            background: #111111; border: 1px solid #222; border-radius: 12px; 
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .level-tag { background: #bdfd00; color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; }
        .speed-text { color: #bdfd00; font-weight: 700; font-size: 0.9rem; }

        /* ANA MİNİNG SAHƏSİ */
        .mining-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .mining-gif { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(189, 253, 0, 0.2)); }
        .live-counter { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .asset-name { font-size: 0.9rem; color: #888; font-weight: 600; }

        /* TƏRƏQQİ PANELİ */
        .progress-section { padding: 20px; width: 100%; box-sizing: border-box; }
        .progress-bar-bg { width: 100%; height: 12px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin-bottom: 8px; border: 1px solid #222; }
        .progress-fill { width: 45%; height: 100%; background: #4a7d00; border-radius: 10px; }
        .timer-text { font-size: 0.8rem; color: #fff; font-weight: 600; text-align: center; }

        /* ALT MENYU */
        .nav-bar { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            background: #0a0a0a; border-top: 1px solid #1a1a1a; padding: 10px 0; 
            position: sticky; bottom: 0;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #666; font-size: 0.65rem; text-decoration: none; }
        .nav-item.active { color: #bdfd00; }
        .nav-item i { font-size: 1.2rem; }

        /* BANK MODALI SİZİN ÜÇÜN */
        #bank-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            padding: 25px; box-sizing: border-box;
        }
    </style>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"></div>
            <span style="font-size: 0.85rem; font-weight: 600;">İstifadəçi</span>
        </div>
        <div style="background: #111; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; border: 1px solid #222;">
            🌐 Azərbaycan
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-row">
            <div class="level-tag">SEVİYYƏ 1</div>
            <div class="speed-text">0.000055 USD/H</div>
        </div>
        <div class="stat-row">
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="usdt.png" width="20"> <span style="font-weight: 700;">USD</span>
            </div>
            <div style="color: #bdfd00; font-weight: 700;">AKTİV</div>
        </div>
    </div>

    <div class="mining-core" id="main-view">
        <img src="https://cdn-icons-png.flaticon.com/512/3012/3012415.png" class="mining-gif" alt="Mining Icon">
        <div class="live-counter" id="live-bal">0.0000</div>
        <div class="asset-name">YIĞILAN MƏBLƏĞ (USD)</div>
    </div>

    <div class="progress-section">
        <div class="progress-bar-bg">
            <div class="progress-fill" id="p-fill"></div>
        </div>
        <div class="timer-text" id="p-timer">23:59:59</div>
        
        <button onclick="collectIncome()" style="width: 100%; margin-top: 20px; background: #bdfd00; border: none; padding: 15px; border-radius: 12px; font-weight: 700; color: #000;">
            GƏLİRİ TOPLA
        </button>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active">
            <i class="fas fa-hammer"></i> <span>Mədən</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-trophy"></i> <span>Liderlər</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-rocket"></i> <span>Yenilə</span>
        </a>
        <a href="#" onclick="openBank()" class="nav-item">
            <i class="fas fa-wallet"></i> <span>Çıxarış</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user"></i> <span>Mən</span>
        </a>
    </div>

</div>

<script src="https://kit.fontawesome.com/a076d05399.js"></script>
<script>
    const user = localStorage.getItem('elite_session') || 'Qonaq';
    let balance = 0;
    const SPEED = 0.0000555; // 5 saata ~1$

    // Firebase və Balans Artımı
    db.ref('mining/' + user).on('value', snap => {
        const d = snap.val() || { balance: 0, lastSync: Date.now() };
        const diff = (Date.now() - (d.lastSync || Date.now())) / 1000;
        balance = d.balance + (diff * SPEED);
    });

    setInterval(() => {
        balance += SPEED;
        document.getElementById('live-bal').innerText = balance.toFixed(4);
        
        // Timer simulyasiyası
        let d = new Date();
        document.getElementById('p-timer').innerText = d.toLocaleTimeString('az-AZ');
    }, 1000);

    async function collectIncome() {
        await db.ref('mining/' + user).update({ balance: balance, lastSync: Date.now() });
        alert("Balans yeniləndi!");
    }

    function openBank() {
        if(balance < 15) return alert("Minimum çıxarış $15.00");
        // Buradan əvvəlki bank modalını çağıra bilərsən
        alert("Bank Paneli Açılır...");
    }
</script>
