<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div id="mining-app" style="background: #000; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; overflow-x: hidden;">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { margin: 0; padding: 0; user-select: none; background: #000; }

        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; border-radius: 12px; background: #111; border: 1px solid #bdfd00; display: flex; align-items: center; justify-content: center; color: #bdfd00; box-shadow: 0 0 10px rgba(189, 253, 0, 0.2); }

        /* BOX SELECTION */
        .box-container { padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .box-item { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 12px 5px; 
            text-align: center; position: relative; transition: 0.4s; cursor: pointer;
        }
        .box-item.active { border-color: #bdfd00; background: #111; box-shadow: 0 0 15px rgba(189, 253, 0, 0.15); transform: translateY(-3px); }
        .box-item.locked { opacity: 0.4; filter: grayscale(1); }
        .box-price { font-size: 0.7rem; font-weight: 800; display: block; margin-top: 5px; color: #fff; }
        .box-ref { font-size: 0.55rem; color: #bdfd00; font-weight: 600; display: block; margin-top: 2px; }
        .lock-tag { position: absolute; top: -5px; right: -5px; background: #ff3e3e; color: #fff; font-size: 0.5rem; padding: 2px 5px; border-radius: 5px; }

        /* MINING CORE */
        .mining-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .scanner-circle { 
            width: 220px; height: 220px; border: 2px solid #1a1a1a; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .glow-ring { 
            position: absolute; width: 100%; height: 100%; border: 2px solid transparent; 
            border-top-color: var(--theme-color, #bdfd00); border-radius: 50%; 
            animation: rotate 2s linear infinite; 
        }
        .inner-content { text-align: center; z-index: 5; }
        .live-val { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; margin: 5px 0; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* REFERRAL SECTION */
        .ref-box { margin: 0 20px 20px 20px; background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; }
        .ref-link-area { display: flex; background: #000; border-radius: 10px; padding: 10px; align-items: center; justify-content: space-between; border: 1px solid #333; margin-top: 10px; }
        .copy-btn { color: #bdfd00; font-size: 0.9rem; cursor: pointer; padding: 5px; }

        /* PROGRESS & BUTTON */
        .action-area { padding: 0 20px 20px 20px; }
        .p-bar-container { height: 6px; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .p-fill { height: 100%; background: #bdfd00; width: 0%; transition: 0.5s; }
        .mine-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #bdfd00; color: #000; font-weight: 900; font-size: 0.9rem; cursor: pointer; }

        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #050505; border-top: 1px solid #1a1a1a; padding: 18px 0; text-align: center; color: #444; }
        .nav-active { color: #bdfd00; }
    </style>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"><i class="fas fa-shield-alt"></i></div>
            <div>
                <div id="u-name" style="font-weight: 800; font-size: 0.9rem; color: #fff;">İstifadəçi</div>
                <div style="font-size: 0.6rem; color: #888;">STATUS: <span id="u-rank" style="color:#bdfd00">BRONZE</span></div>
            </div>
        </div>
        <div style="text-align: right; background: #111; padding: 5px 12px; border-radius: 10px; border: 1px solid #222;">
            <div style="font-size: 0.55rem; color: #666;">REFERALLAR</div>
            <div id="ref-total" style="font-weight: 900; color: #fff; font-size: 0.9rem;">0</div>
        </div>
    </div>

    <div class="box-container">
        <div class="box-item active" id="b1" onclick="changeBox(1)">
            <i class="fas fa-cube" style="color:#cd7f32"></i>
            <span class="box-price">30 AZN</span>
            <span class="box-ref">30 REF</span>
        </div>
        <div class="box-item locked" id="b2" onclick="changeBox(2)">
            <span class="lock-tag">KİLİDLİ</span>
            <i class="fas fa-cube" style="color:#c0c0c0"></i>
            <span class="box-price">60 AZN</span>
            <span class="box-ref">60 REF</span>
        </div>
        <div class="box-item locked" id="b3" onclick="changeBox(3)">
            <span class="lock-tag">KİLİDLİ</span>
            <i class="fas fa-cube" style="color:#ffd700"></i>
            <span class="box-price">90 AZN</span>
            <span class="box-ref">90 REF</span>
        </div>
        <div class="box-item locked" id="b4" onclick="changeBox(4)">
            <span class="lock-tag">KİLİDLİ</span>
            <i class="fas fa-cube" style="color:#e5e4e2"></i>
            <span class="box-price">120 AZN</span>
            <span class="box-ref">120 REF</span>
        </div>
    </div>

    <div class="mining-display">
        <div class="scanner-circle">
            <div class="glow-ring" id="ring-anim"></div>
            <div class="inner-content">
                <i class="fas fa-atom" style="font-size: 1.5rem; color: #bdfd00; margin-bottom: 5px;"></i>
                <div class="live-val" id="main-bal">0.0000</div>
                <div style="font-size: 0.6rem; letter-spacing: 2px; color: #555; font-weight: 800;">CURRENT USDT</div>
            </div>
        </div>
    </div>

    <div class="ref-box">
        <div style="font-size: 0.7rem; font-weight: 700; color: #888;">SƏNİN REFERAL LİNKİN</div>
        <div class="ref-link-area">
            <small id="ref-url" style="font-size: 0.65rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 80%;">Yüklenir...</small>
            <i class="fas fa-copy copy-btn" onclick="copyLink()"></i>
        </div>
    </div>

    <div class="action-area">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.7rem; font-weight:700;">
            <span id="box-goal">HƏDƏF: 17.50 USDT</span>
            <span id="time-left">05:00:00</span>
        </div>
        <div class="p-bar-container"><div class="p-fill" id="p-fill"></div></div>
        <button class="mine-btn" id="m-btn" onclick="startMining()">AKTİVLƏŞDİR</button>
    </div>

    <div class="nav-bar">
        <div class="nav-active"><i class="fas fa-microchip"></i></div>
        <div><i class="fas fa-users"></i></div>
        <div><i class="fas fa-wallet"></i></div>
        <div><i class="fas fa-user"></i></div>
    </div>

</div>

<script>
    const user = localStorage.getItem('username') || 'User';
    document.getElementById('u-name').innerText = user;
    
    // Referal Linki Yaratmaq
    const siteUrl = window.location.origin + window.location.pathname;
    const fullRefLink = siteUrl + "?ref=" + user;
    document.getElementById('ref-url').innerText = fullRefLink;

    const boxData = {
        1: { name: "BRONZE", azn: 30, ref: 30, speed: 0.000055, goal: 17.5, color: "#cd7f32" },
        2: { name: "SILVER", azn: 60, ref: 60, speed: 0.000115, goal: 35.0, color: "#c0c0c0" },
        3: { name: "GOLD", azn: 90, ref: 90, speed: 0.000170, goal: 52.5, color: "#ffd700" },
        4: { name: "PLATINUM", azn: 120, ref: 120, speed: 0.000230, goal: 70.0, color: "#e5e4e2" }
    };

    let activeID = 1;
    let balance = 0;
    let isRunning = false;
    let startTime = 0;
    let userRefs = 0;

    // Firebase Sinxronizasiyası
    db.ref('mining/' + user).on('value', snap => {
        const d = snap.val() || {};
        balance = d.balance || 0;
        isRunning = d.isRunning || false;
        startTime = d.startTime || 0;
        userRefs = d.referals || 0; 
        activeID = d.activeBox || 1;

        document.getElementById('ref-total').innerText = userRefs;
        document.getElementById('main-bal').innerText = balance.toFixed(4);
        
        syncBoxes();
        updateDisplay();
    });

    function syncBoxes() {
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b' + i);
            if(userRefs < boxData[i].ref) {
                btn.classList.add('locked');
            } else {
                btn.classList.remove('locked');
                const tag = btn.querySelector('.lock-tag');
                if(tag) tag.remove();
            }
            
            btn.classList.remove('active');
            if(i == activeID) btn.classList.add('active');
        }
    }

    function changeBox(id) {
        if(userRefs < boxData[id].ref) return alert(`Sizə ${boxData[id].ref} referal lazımdır!`);
        if(isRunning) return alert("Mining davam edərkən dəyişmək olmaz!");
        
        activeID = id;
        db.ref('mining/' + user).update({ activeBox: id });
    }

    function updateDisplay() {
        const box = boxData[activeID];
        document.getElementById('u-rank').innerText = box.name;
        document.getElementById('u-rank').style.color = box.color;
        document.getElementById('box-goal').innerText = `HƏDƏF: ${box.goal.toFixed(2)} USDT`;
        document.getElementById('ring-anim').style.setProperty('--theme-color', box.color);

        const btn = document.getElementById('m-btn');
        if(isRunning) {
            btn.innerText = "SESSİYA AKTİVDİR";
            btn.style.opacity = "0.5";
            btn.disabled = true;
        } else {
            btn.innerText = "AKTİVLƏŞDİR";
            btn.style.opacity = "1";
            btn.disabled = false;
        }
    }

    setInterval(() => {
        if(isRunning) {
            let elapsed = Date.now() - startTime;
            let limit = 5 * 60 * 60 * 1000;

            if(elapsed < limit) {
                balance += boxData[activeID].speed;
                document.getElementById('main-bal').innerText = balance.toFixed(4);
                document.getElementById('p-fill').style.width = (elapsed / limit * 100) + "%";
                
                let rem = limit - elapsed;
                let h = Math.floor(rem / 3600000);
                let m = Math.floor((rem % 3600000) / 60000);
                let s = Math.floor((rem % 60000) / 1000);
                document.getElementById('time-left').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                stopMining();
            }
        }
    }, 1000);

    function startMining() {
        startTime = Date.now();
        isRunning = true;
        db.ref('mining/' + user).update({ isRunning: true, startTime: startTime, balance: balance });
    }

    function stopMining() {
        isRunning = false;
        db.ref('mining/' + user).update({ isRunning: false, balance: balance });
    }

    function copyLink() {
        navigator.clipboard.writeText(fullRefLink);
        alert("Link kopyalandı!");
    }
</script>
