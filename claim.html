<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<div id="mining-terminal" style="background: #050505; min-height: 100vh; color: #00ff41; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; overflow: hidden;">

    <style>
        body { margin: 0; background: #000; }
        .glass-header { background: rgba(10, 10, 10, 0.9); border-bottom: 1px solid #1a1a1a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* HOLOGRAM CORE */
        .hologram-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-visual { width: 180px; height: 180px; border: 3px solid #1a1a1a; border-radius: 35px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; position: relative; transition: 0.5s; }
        .mining-active .core-visual { border-color: #00ff41; box-shadow: 0 0 25px rgba(0,255,65,0.2); animation: core-rotate 8s linear infinite; }
        .core-inner { transform: rotate(-45deg); text-align: center; }
        
        /* AD BUTTON */
        .ad-btn { background: linear-gradient(45deg, #001a00, #003300); border: 1px solid #00ff41; color: #00ff41; padding: 12px; border-radius: 12px; width: calc(100% - 40px); margin: 0 20px 15px 20px; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .ad-btn:active { transform: scale(0.98); background: #00ff41; color: #000; }

        /* BOX SELECTION */
        .box-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px 15px 20px; }
        .box-card { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 8px; text-align: center; opacity: 0.4; }
        .box-card.unlocked { opacity: 1; border-color: #444; }
        .box-card.active { border-color: #00ff41; background: rgba(0,255,65,0.05); }

        .main-btn { width: calc(100% - 40px); padding: 18px; margin: 0 20px 20px 20px; border-radius: 15px; border: none; background: #00ff41; color: #000; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,65,0.3); }
        
        @keyframes core-rotate { 0% { transform: rotate(45deg); } 100% { transform: rotate(405deg); } }
    </style>

    <div class="glass-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 35px; height: 35px; border: 1px solid #00ff41; border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-terminal"></i></div>
            <div>
                <div id="u-name-display" style="font-weight: 700; font-family: 'Orbitron'; color: #fff; font-size: 0.9rem;">LOADING...</div>
                <div style="font-size: 0.6rem; color: #00ff41;"><i class="fas fa-users"></i> <span id="ref-total">0</span> REFS</div>
            </div>
        </div>
        <div id="rank-tag" style="font-size: 0.6rem; border: 1px solid #333; padding: 4px 8px; border-radius: 5px;">UNIT-01</div>
    </div>

    <div class="hologram-container" id="visual-frame">
        <div class="core-visual">
            <div class="core-inner">
                <div id="main-balance" style="font-size: 2rem; font-weight: 900; font-family: 'Orbitron'; color: #fff;">0.0000</div>
                <div style="font-size: 0.5rem; color: #555; letter-spacing: 2px;">USDT ASSETS</div>
            </div>
        </div>
    </div>

    <button class="ad-btn" onclick="triggerAd()">
        <i class="fas fa-play-circle"></i> WATCH AD TO EARN +0.10 USDT
    </button>

    <div class="box-grid">
        <div class="box-card" id="b1"><small>30 AZN</small></div>
        <div class="box-card" id="b2"><small>60 AZN</small></div>
        <div class="box-card" id="b3"><small>90 AZN</small></div>
        <div class="box-card" id="b4"><small>120 AZN</small></div>
    </div>

    <button class="main-btn" id="start-btn" onclick="toggleMining()">START SYSTEM</button>

</div>

<script>
    // 1. İSTİFADƏÇİ MƏLUMATLARI
    const username = localStorage.getItem('username') || "GUEST";
    document.getElementById('u-name-display').innerText = username.toUpperCase();

    let balance = 0, isRunning = false, startTime = 0, userRefs = 0, activeBox = 1;

    // 2. FIREBASE SİNXRONİZASİYA
    db.ref('mining/' + username).on('value', snap => {
        const data = snap.val() || {};
        balance = data.balance || 0;
        isRunning = data.isRunning || false;
        startTime = data.startTime || 0;
        userRefs = data.referals || 0;
        activeBox = data.activeBox || 1;

        updateUI();
    });

    function updateUI() {
        document.getElementById('main-balance').innerText = balance.toFixed(4);
        document.getElementById('ref-total').innerText = userRefs;
        
        const btn = document.getElementById('start-btn');
        const frame = document.getElementById('visual-frame');
        
        if(isRunning) {
            btn.innerText = "SYSTEM ACTIVE";
            btn.disabled = true;
            btn.style.opacity = "0.5";
            frame.classList.add('mining-active');
        } else {
            btn.innerText = "START SYSTEM";
            btn.disabled = false;
            btn.style.opacity = "1";
            frame.classList.remove('mining-active');
        }

        // Box Kilidləri
        const thresholds = [0, 30, 60, 90, 120];
        for(let i=1; i<=4; i++) {
            const el = document.getElementById('b' + i);
            el.className = 'box-card';
            if(userRefs >= thresholds[i]) el.classList.add('unlocked');
            if(activeBox == i) el.classList.add('active');
        }
    }

    // 3. MEDIAN.CO ADMOB REKLAM SİSTEMİ
    function triggerAd() {
        if (typeof window.median !== 'undefined') {
            // REWARDED REKLAMI ÇAĞIR
            window.median.admob.rewarded.show({
                adUnitId: 'ca-app-pub-SƏNİN-REWARDED-ID-N' // ADMOB-DAN ALDIĞIN ID
            });
        } else {
            alert("Reklam funksiyası yalnız mobil tətbiqdə aktivdir!");
        }
    }

    // Median.co Callback: Reklam bitəndə işə düşür
    if (typeof window.median !== 'undefined') {
        window.median.admob.rewarded.onCompleted = function() {
            rewardUser();
        };
    }

    async function rewardUser() {
        balance += 0.10;
        await db.ref('mining/' + username).update({ balance: balance });
        alert("Success: +0.10 USDT credited to your account!");
    }

    // 4. MİNİNG MƏNTİQİ
    setInterval(() => {
        if(isRunning) {
            const speeds = [0, 0.00006, 0.00012, 0.00018, 0.00025];
            balance += speeds[activeBox];
            document.getElementById('main-balance').innerText = balance.toFixed(4);
        }
    }, 1000);

    async function toggleMining() {
        startTime = Date.now();
        isRunning = true;
        await db.ref('mining/' + username).update({ 
            isRunning: true, 
            startTime: startTime, 
            balance: balance 
        });
    }
</script>
