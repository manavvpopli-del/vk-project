<div class="mining-container">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        .mining-container {
            text-align: center;
            color: white;
            font-family: 'Outfit', sans-serif;
            padding-bottom: 30px;
        }

        /* CANLI MİNİNG SİMULYASİYASI */
        .mining-header {
            position: relative;
            padding: 20px;
            margin-bottom: 10px;
        }

        .mining-chip {
            font-size: 3.5rem;
            color: #00b9ff;
            filter: drop-shadow(0 0 15px rgba(0, 185, 255, 0.5));
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }

        /* BALANS KARTI */
        .balance-card {
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(20,20,30,0.8) 100%);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin: 15px 0;
            position: relative;
        }

        .balance-title {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #3f9c35;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .main-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dollar-sign { color: #3f9c35; font-weight: 700; }

        .live-flow {
            font-size: 0.75rem;
            color: #3f9c35;
            font-family: monospace;
            height: 20px;
            margin-top: 10px;
        }

        /* ACTIONS */
        .action-btns {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .claim-btn {
            background: #3f9c35;
            color: white;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(63, 156, 53, 0.2);
        }

        .claim-btn:disabled {
            background: #222;
            color: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        .card-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .withdraw-info {
            font-size: 0.6rem;
            color: #ff3344;
            margin-top: 12px;
            background: rgba(255, 51, 68, 0.1);
            padding: 8px;
            border-radius: 8px;
        }
    </style>

    <div class="mining-header">
        <i class="fas fa-microchip mining-chip"></i>
    </div>

    <div class="balance-card">
        <div class="balance-title">TOTAL MINED REVENUE</div>
        <div class="main-amount">
            <span class="dollar-sign">$</span>
            <span id="live-balance">0.00</span>
        </div>
        <div id="flow-text" class="live-flow">+0.000000</div>
    </div>

    <div class="action-btns">
        <button id="collect-btn" class="claim-btn" onclick="processClaim()">
            <i class="fas fa-hand-holding-dollar"></i> COLLECT EARNINGS
        </button>
        <button class="card-btn" onclick="requestWithdraw()">
            <i class="fas fa-credit-card"></i> KARTA ÇIXARIŞ (CARD)
        </button>
    </div>

    <div id="time-left" style="font-size: 0.65rem; color: #888; margin-top: 10px;"></div>
    <div class="withdraw-info">
        <i class="fas fa-triangle-exclamation"></i> Minimum çəkim miqdarı: 15.00$
    </div>
</div>

<script>
    // QEYD: Bu script modal yüklənəndə işə düşür
    (function() {
        const u = localStorage.getItem('elite_session') || 'User';
        let currentBal = 0;
        let lastTimestamp = 0;

        // CANLI ARTIM EFFEKTİ (Sanki pul yığılır)
        setInterval(() => {
            const flow = document.getElementById('flow-text');
            if(flow) {
                const rand = (Math.random() * 0.00008).toFixed(6);
                flow.innerText = "+" + rand + " $";
                flow.style.opacity = "1";
                setTimeout(() => flow.style.opacity = "0.3", 800);
            }
        }, 1500);

        // Firebase-dən real datanı çək
        db.ref('mining/' + u).on('value', snap => {
            const data = snap.val() || { balance: 0, lastClaim: 0 };
            currentBal = parseFloat(data.balance);
            lastTimestamp = data.lastClaim;
            
            const balEl = document.getElementById('live-balance');
            if(balEl) balEl.innerText = currentBal.toFixed(2);
            
            updateMiningUI();
        });

        window.updateMiningUI = function() {
            const btn = document.getElementById('collect-btn');
            const timer = document.getElementById('time-left');
            if(!btn) return;

            const now = Date.now();
            const cooldown = 3600000; // 1 saat
            const diff = now - lastTimestamp;

            if(diff < cooldown) {
                btn.disabled = true;
                const rem = cooldown - diff;
                const m = Math.floor(rem / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                timer.innerText = `Növbəti toplama: ${m}d ${s}s`;
                setTimeout(updateMiningUI, 1000);
            } else {
                btn.disabled = false;
                timer.innerText = "Yığılan məbləğ hazırdır!";
            }
        };

        window.processClaim = async function() {
            // Təsadüfi qazanc (0.10$ - 0.50$ arası)
            const reward = (Math.random() * (0.50 - 0.10) + 0.10).toFixed(2);
            const newTotal = parseFloat(currentBal) + parseFloat(reward);
            
            await db.ref('mining/' + u).update({
                balance: newTotal,
                lastClaim: Date.now()
            });
            alert(`Təbrik! Hesaba ${reward}$ əlavə edildi.`);
        };

        window.requestWithdraw = function() {
            if(currentBal < 15) {
                alert(`Balans yetərsizdir! Çıxarış üçün minimum 15.00$ lazımdır. Sizin balans: ${currentBal.toFixed(2)}$`);
            } else {
                const card = prompt("Kart nömrəsini daxil edin (16 rəqəm):");
                if(card && card.length >= 16) {
                    db.ref('withdraw_requests/' + u).push({
                        amount: currentBal,
                        cardNumber: card,
                        time: new Date().toLocaleString(),
                        status: "Gözləmədə"
                    });
                    alert("Çıxarış sorğusu göndərildi! 24 saat ərzində təsdiqlənəcək.");
                }
            }
        };

        updateMiningUI();
    })();
</script>
