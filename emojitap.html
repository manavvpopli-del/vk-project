<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎭 Emoji Tap - PlayWithLove</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pink: #e91e8c; --pink-light: #ff6bb5; --pink-dark: #c0156f;
    --purple: #7c3aed; --purple-light: #a855f7;
    --bg-dark: #0d0d1a; --bg-card: #1a1a2e; --text: #f0f0f0;
    --text-muted: #a0a0c0; --border: rgba(233,30,140,0.25);
    --success: #10b981; --error: #ef4444; --warning: #f59e0b;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f23 100%);
    min-height: 100vh; color: var(--text); overflow-x: hidden;
  }
  
  /* Animasiya ürəklər */
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .heart { position: absolute; font-size: 14px; opacity: 0; animation: floatHeart linear infinite; color: var(--pink-light); }
  @keyframes floatHeart {
    0% { opacity: 0; transform: translateY(100vh) scale(0.3); }
    10% { opacity: 0.5; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.2) rotate(20deg); }
  }
  
  .container { max-width: 950px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  
  /* Login Box */
  .login-box {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 48px;
    padding: 2.5rem; text-align: center; max-width: 400px; margin: 80px auto;
    box-shadow: 0 0 60px rgba(233,30,140,0.15);
  }
  .login-box h2 { font-size: 2rem; margin-bottom: 10px; background: linear-gradient(135deg, var(--pink-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-box input {
    width: 100%; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 60px; color: var(--text); font-size: 1rem; margin: 15px 0; outline: none;
  }
  .login-box input:focus { border-color: var(--pink); }
  .login-box button {
    background: linear-gradient(135deg, var(--pink), var(--purple)); border: none;
    padding: 14px 30px; border-radius: 60px; color: white; font-size: 1rem; font-weight: bold;
    cursor: pointer; transition: all 0.3s; width: 100%;
  }
  .login-box button:hover { transform: scale(1.02); opacity: 0.9; box-shadow: 0 5px 20px rgba(233,30,140,0.3); }
  
  /* Room Panel */
  .room-panel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 32px;
    padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px);
  }
  .flex-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
  .room-input { flex: 1; min-width: 160px; }
  .room-input label { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
  .room-input input {
    width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 60px; color: var(--text); font-size: 1rem;
  }
  .room-input button {
    width: 100%; padding: 12px 16px; background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; transition: all 0.2s;
  }
  .room-input button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(233,30,140,0.3); }
  
  /* Game Card */
  .game-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 48px;
    padding: 30px; backdrop-filter: blur(10px); animation: slideIn 0.5s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .role-badge {
    display: inline-block; padding: 10px 25px; border-radius: 60px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    font-size: 1rem; font-weight: bold; margin-bottom: 25px; animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 5px var(--pink); } 50% { box-shadow: 0 0 20px var(--pink); } }
  
  .emojis-area {
    font-size: 4.5rem; text-align: center; padding: 40px; background: rgba(0,0,0,0.3);
    border-radius: 60px; margin: 20px 0; letter-spacing: 20px;
    border: 2px dashed var(--border); animation: bounce 0.5s ease;
  }
  @keyframes bounce { 0% { transform: scale(0.9); } 80% { transform: scale(1.02); } 100% { transform: scale(1); } }
  
  .word-to-guess {
    font-size: 2rem; text-align: center; padding: 20px; background: linear-gradient(135deg, rgba(233,30,140,0.1), rgba(124,58,237,0.1));
    border-radius: 60px; margin: 20px 0; border: 1px solid var(--border);
  }
  .word-to-guess strong { background: linear-gradient(135deg, var(--pink-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .options-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0;
  }
  .option-btn {
    padding: 16px; background: rgba(255,255,255,0.05); border: 2px solid var(--border);
    border-radius: 60px; color: var(--text); font-size: 1rem; cursor: pointer;
    transition: all 0.3s; text-align: center; font-weight: 500;
  }
  .option-btn:hover { background: rgba(233,30,140,0.2); border-color: var(--pink); transform: scale(1.02); }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: var(--success); border-color: var(--success); animation: correctFlash 0.5s; }
  .option-btn.wrong { background: var(--error); border-color: var(--error); animation: wrongFlash 0.5s; }
  @keyframes correctFlash { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px var(--success); } }
  @keyframes wrongFlash { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px var(--error); } }
  
  .score-board {
    display: flex; justify-content: space-between; padding: 20px 0; margin-top: 20px;
    border-top: 2px solid var(--border);
  }
  .score { text-align: center; flex: 1; }
  .score-value { font-size: 2.8rem; font-weight: bold; background: linear-gradient(135deg, var(--pink-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .score-name { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }
  
  .waiting {
    text-align: center; padding: 50px; font-size: 1.2rem;
    animation: pulseText 1.5s infinite;
  }
  @keyframes pulseText { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  
  .next-btn {
    width: 100%; padding: 18px; background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none; border-radius: 60px; color: white; font-size: 1.2rem; font-weight: bold;
    cursor: pointer; margin-top: 20px; transition: all 0.3s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233,30,140,0.3); }
  
  .message {
    text-align: center; padding: 12px; border-radius: 60px; margin: 10px 0;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  .message.success { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid var(--success); }
  .message.error { background: rgba(239,68,68,0.2); color: var(--error); border: 1px solid var(--error); }
  .message.info { background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }
  
  .copy-btn {
    background: rgba(255,255,255,0.1); border: 1px solid var(--border);
    padding: 8px 15px; border-radius: 60px; cursor: pointer; margin-left: 10px;
  }
  .copy-btn:hover { background: var(--pink); }
  
  @media (max-width: 600px) {
    .container { padding: 10px; }
    .emojis-area { font-size: 2.5rem; letter-spacing: 10px; padding: 25px; }
    .options-grid { grid-template-columns: 1fr; }
    .word-to-guess { font-size: 1.3rem; }
    .score-value { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="hearts-bg" id="heartsContainer"></div>
<div class="container" id="app">
  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>🎭 Emoji Tap</h2>
      <p style="color:var(--text-muted); margin:10px 0">Sevgilinlə emoji dünyasında yarış!</p>
      <input type="text" id="playerName" placeholder="Adınız" maxlength="20">
      <button onclick="handleLogin()">💫 OYNAMAĞA BAŞLA</button>
    </div>
  </div>
  
  <!-- Game Panel -->
  <div id="gamePanel" style="display: none;">
    <div class="room-panel">
      <div class="flex-row">
        <div class="room-input">
          <label>🏠 OTAQ KODU</label>
          <input type="text" id="roomCode" placeholder="Məs: LOVE">
        </div>
        <div class="room-input">
          <button onclick="joinRoom()">🔗 OTAĞA QOŞUL</button>
        </div>
        <div class="room-input">
          <button onclick="createRoom()">✨ YENİ OTAQ YARAT</button>
        </div>
      </div>
    </div>
    <div id="gameContent"></div>
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
    authDomain: "sevgili-testi.firebaseapp.com",
    databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
    projectId: "sevgili-testi",
    storageBucket: "sevgili-testi.firebasestorage.app",
    messagingSenderId: "399260477557",
    appId: "1:399260477557:web:584204a698d7bf145bb03c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ==================== SÖZ LÜĞƏTİ ====================
  const wordsDB = [
    { word: "Gülümsəmə", emojis: "😊😄😁🙂" },
    { word: "Ağlamaq", emojis: "😢😭😿💧" },
    { word: "Sevgi", emojis: "💕❤️💗😍" },
    { word: "Ürək", emojis: "❤️💖💓💗" },
    { word: "Qəzəb", emojis: "😠😤🤬👿" },
    { word: "Şaşqınlıq", emojis: "😲😮😯😧" },
    { word: "Yorğun", emojis: "😴🥱😪💤" },
    { word: "Təbrik", emojis: "🎉🎊🥳🙌" },
    { word: "Yemək", emojis: "🍕🍔🍟🌮" },
    { word: "Meyvə", emojis: "🍎🍌🍊🍓" },
    { word: "İdman", emojis: "⚽🏀🏈🎾" },
    { word: "Musiqi", emojis: "🎵🎶🎸🎹" },
    { word: "Film", emojis: "🎬🎥📽️🍿" },
    { word: "Kitab", emojis: "📚📖📘📕" },
    { word: "Komputer", emojis: "💻🖥️⌨️🖱️" },
    { word: "Telefon", emojis: "📱📲☎️📞" },
    { word: "Maşın", emojis: "🚗🚙🚕🚘" },
    { word: "Təyyarə", emojis: "✈️🛩️🚀🛸" },
    { word: "Gəmi", emojis: "🚢⛵🛳️🚤" },
    { word: "Günəş", emojis: "☀️🌞🌅🌄" },
    { word: "Ay", emojis: "🌙🌛🌜🌝" },
    { word: "Ulduz", emojis: "⭐🌟✨" },
    { word: "Yağış", emojis: "🌧️☔💧🌦️" },
    { word: "Qar", emojis: "❄️☃️⛄🌨️" },
    { word: "Çiçək", emojis: "🌹🌸🌺🌻" },
    { word: "Pişik", emojis: "🐱🐈😺🐾" },
    { word: "İt", emojis: "🐶🐕🐩🐾" },
    { word: "Quş", emojis: "🐦🕊️🦜🐤" },
    { word: "Balıq", emojis: "🐟🐠🐡🎣" },
    { word: "Kəpənək", emojis: "🦋🐛🐞🦟" },
    { word: "Şahmat", emojis: "♟️♞♝♜" },
    { word: "Hədiyyə", emojis: "🎁🎀📦🎉" },
    { word: "Partiya", emojis: "🎉🎊🥳🎈" },
    { word: "Dəniz", emojis: "🌊🏖️🏝️🐚" },
    { word: "Dağ", emojis: "⛰️🏔️🗻🌄" },
    { word: "Pizza", emojis: "🍕🍕🍕" },
    { word: "Burger", emojis: "🍔🍔🍔" },
    { word: "Kofe", emojis: "☕🥤☕" },
    { word: "Çay", emojis: "🍵🍵🍵" },
    { word: "Şirniyyat", emojis: "🍰🎂🍪🍫" },
    { word: "Dondurma", emojis: "🍦🍨🍧🍦" },
    { word: "Öpüş", emojis: "💋😘😗😙" },
    { word: "Sarılmak", emojis: "🤗🫂🤗" },
    { word: "Rəqs", emojis: "💃🕺💃" },
    { word: "Mahnı", emojis: "🎤🎶🎵" }
  ];

  let currentRoom = null;
  let myName = null;
  let myRole = null;
  let roomRef = null;
  let canGuess = false;
  let currentRound = 0;

  function getRandomWord() {
    return wordsDB[Math.floor(Math.random() * wordsDB.length)];
  }

  function generateRoomId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < 5; i++) {
      result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
  }

  function showMessage(msg, type = "success") {
    const content = document.getElementById("gameContent");
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${type}`;
    msgDiv.textContent = msg;
    const firstChild = content.firstChild;
    content.insertBefore(msgDiv, firstChild);
    setTimeout(() => msgDiv.remove(), 2500);
  }

  async function createRoom() {
    if (!myName) return;
    const roomCode = generateRoomId();
    document.getElementById("roomCode").value = roomCode;
    
    const roomDatabaseRef = db.ref(`emoji_rooms/${roomCode}`);
    await roomDatabaseRef.set({
      players: {},
      gameState: "waiting",
      currentWord: null,
      currentEmojis: null,
      options: null,
      correctWord: null,
      currentDescriber: null,
      currentGuesser: null,
      roundEnded: false,
      waitingForNext: false,
      createdAt: Date.now()
    });
    
    await joinRoom(roomCode);
    showMessage(`✨ Otaq yaradıldı! Kod: ${roomCode}`, "success");
  }

  async function joinRoom(roomCodeFromParam) {
    const roomCode = roomCodeFromParam || document.getElementById("roomCode").value;
    if (!roomCode || !myName) {
      showMessage("Adınızı və otaq kodunu daxil edin!", "error");
      return;
    }
    
    const roomDatabaseRef = db.ref(`emoji_rooms/${roomCode}`);
    const snapshot = await roomDatabaseRef.once('value');
    const roomData = snapshot.val();
    
    if (!roomData) {
      showMessage("Otaq tapılmadı! Yeni otaq yaradın.", "error");
      return;
    }
    
    const players = roomData.players || {};
    const playerCount = Object.keys(players).length;
    
    if (playerCount >= 2 && !players[myName]) {
      showMessage("Otaq doludur (2 nəfərlik)!", "error");
      return;
    }
    
    await roomDatabaseRef.child(`players/${myName}`).set({
      name: myName,
      score: 0,
      joinedAt: Date.now()
    });
    
    currentRoom = roomCode;
    localStorage.setItem("emoji_lastRoom", roomCode);
    startListening(roomCode);
    showMessage(`✅ Otağa qoşuldun! Kod: ${roomCode}`, "success");
  }

  async function startListening(roomCode) {
    if (roomRef) roomRef.off();
    roomRef = db.ref(`emoji_rooms/${roomCode}`);
    
    roomRef.on('value', async (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      
      const players = data.players || {};
      const playerNames = Object.keys(players);
      const playerCount = playerNames.length;
      
      // Rolları təyin et
      if (playerCount === 1 && !data.currentDescriber) {
        if (players[myName]) {
          myRole = "describer";
          await roomRef.child("currentDescriber").set(myName);
          await roomRef.child("gameState").set("waiting_player2");
        }
      } else if (playerCount === 2 && (!data.currentGuesser || data.gameState === "waiting_player2")) {
        const describer = data.currentDescriber || playerNames[0];
        const guesser = playerNames.find(n => n !== describer);
        myRole = describer === myName ? "describer" : "guesser";
        await roomRef.child("currentDescriber").set(describer);
        await roomRef.child("currentGuesser").set(guesser);
        await roomRef.child("gameState").set("playing");
        
        if (describer === myName) {
          await startNewRound();
        }
      }
      
      renderGame(data);
    });
  }

  async function startNewRound() {
    const wordObj = getRandomWord();
    currentRound++;
    
    // 5 variant yarat (1 düzgün + 4 səhv)
    const otherWords = wordsDB.filter(w => w.word !== wordObj.word).map(w => w.word);
    const shuffled = [...otherWords];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const options = [wordObj.word, ...shuffled.slice(0, 4)];
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    
    await roomRef.update({
      currentWord: wordObj.word,
      currentEmojis: wordObj.emojis,
      options: options,
      correctWord: wordObj.word,
      roundEnded: false,
      waitingForNext: false,
      roundNumber: currentRound
    });
  }

  async function renderGame(data) {
    const contentDiv = document.getElementById("gameContent");
    const players = data.players || {};
    const myScore = players[myName]?.score || 0;
    const opponentName = Object.keys(players).find(n => n !== myName);
    const opponentScore = opponentName ? players[opponentName]?.score || 0 : 0;
    const gameState = data.gameState;
    const currentDescriber = data.currentDescriber;
    const currentGuesser = data.currentGuesser;
    const roundEnded = data.roundEnded;
    const waitingForNext = data.waitingForNext;
    
    if (gameState === "waiting" || gameState === "waiting_player2") {
      const roomCodeDisplay = currentRoom;
      contentDiv.innerHTML = `
        <div class="game-card">
          <div class="waiting">
            ⏳ İkinci oyunçu gözlənilir...<br><br>
            <strong style="font-size: 2rem; letter-spacing: 3px;">${roomCodeDisplay}</strong>
            <button class="copy-btn" onclick="copyRoomCode()">📋 Kodu Kopyala</button>
            <br><br>
            <span style="font-size: 0.9rem;">Bu kodu sevgilinlə paylaş!</span>
          </div>
          <div class="score-board">
            <div class="score"><div class="score-value">${myScore}</div><div class="score-name">${myName}</div></div>
            <div class="score"><div class="score-value">${opponentScore || "?"}</div><div class="score-name">${opponentName || "Gözlənilir..."}</div></div>
          </div>
        </div>`;
      return;
    }
    
    const isMyTurnDescriber = (myRole === "describer" && currentDescriber === myName && !roundEnded);
    const isMyTurnGuesser = (myRole === "guesser" && currentGuesser === myName && !roundEnded);
    
    // Təsvir edən tərəf üçün
    if (isMyTurnDescriber) {
      contentDiv.innerHTML = `
        <div class="game-card">
          <div class="role-badge">🎭 Sən TƏSVİR edirsən!</div>
          <div class="word-to-guess">
            🎯 Təsvir edəcəyin söz: <strong>${data.currentWord || "?"}</strong>
          </div>
          <div class="emojis-area">${data.currentEmojis || "❓"}</div>
          <div style="text-align:center; color:var(--text-muted); padding: 15px;">
            ✨ Yuxarıdakı emojiləri istifadə edərək sözü təxmin etdir!<br>
            Cavab verən tərəf variantları görəcək.
          </div>
          <div class="score-board">
            <div class="score"><div class="score-value">${myScore}</div><div class="score-name">${myName}</div></div>
            <div class="score"><div class="score-value">${opponentScore}</div><div class="score-name">${opponentName}</div></div>
          </div>
          <div class="waiting" style="margin-top:20px; padding:15px;">⏳ ${opponentName} cavab gözlənilir...</div>
        </div>`;
      return;
    }
    
    // Təxmin edən tərəf üçün
    if (isMyTurnGuesser && !canGuess) {
      canGuess = true;
      const options = data.options || [];
      contentDiv.innerHTML = `
        <div class="game-card">
          <div class="role-badge">🤔 Sən TƏXMİN edirsən!</div>
          <div class="emojis-area">${data.currentEmojis || "❓"}</div>
          <div style="text-align:center; margin:15px 0; color:var(--text-muted);">
            Bu emojilər hansı sözü təsvir edir?
          </div>
          <div class="options-grid" id="optionsGrid"></div>
          <div class="score-board">
            <div class="score"><div class="score-value">${myScore}</div><div class="score-name">${myName}</div></div>
            <div class="score"><div class="score-value">${opponentScore}</div><div class="score-name">${opponentName}</div></div>
          </div>
        </div>`;
      
      const grid = document.getElementById("optionsGrid");
      grid.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => makeGuess(opt, data.correctWord);
        grid.appendChild(btn);
      });
      return;
    }
    
    // Raund bitibsə
    if (roundEnded || waitingForNext) {
      contentDiv.innerHTML = `
        <div class="game-card">
          <div class="role-badge">🎉 RAUND TAMAMLANDI!</div>
          <div style="text-align:center; padding: 20px;">
            Düzgün cavab: <strong style="font-size: 1.5rem; color:var(--pink-light)">${data.correctWord || "?"}</strong>
          </div>
          <div class="score-board">
            <div class="score"><div class="score-value">${myScore}</div><div class="score-name">${myName}</div></div>
            <div class="score"><div class="score-value">${opponentScore}</div><div class="score-name">${opponentName}</div></div>
          </div>
          <button class="next-btn" onclick="nextRound()">🔄 NÖVBƏTİ RAUND</button>
        </div>`;
      return;
    }
    
    contentDiv.innerHTML = `
      <div class="game-card">
        <div class="waiting">⏳ Oyun davam edir...</div>
        <div class="score-board">
          <div class="score"><div class="score-value">${myScore}</div><div class="score-name">${myName}</div></div>
          <div class="score"><div class="score-value">${opponentScore}</div><div class="score-name">${opponentName}</div></div>
        </div>
      </div>`;
  }
  
  async function makeGuess(selectedWord, correctWord) {
    if (!canGuess) return;
    canGuess = false;
    
    const isCorrect = (selectedWord === correctWord);
    const roomDatabaseRef = db.ref(`emoji_rooms/${currentRoom}`);
    const playerRef = roomDatabaseRef.child(`players/${myName}`);
    const snapshot = await playerRef.once('value');
    let currentScore = snapshot.val()?.score || 0;
    let newScore = isCorrect ? currentScore + 1 : currentScore - 1;
    await playerRef.update({ score: newScore });
    
    await roomDatabaseRef.update({ 
      roundEnded: true,
      waitingForNext: true
    });
    
    // Animasiya üçün düyməni vurğula
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(btn => {
      if (btn.textContent === correctWord) {
        btn.classList.add('correct');
      } else if (btn.textContent === selectedWord && !isCorrect) {
        btn.classList.add('wrong');
      }
    });
    
    showMessage(isCorrect ? "🎉 DÜZGÜN TAPDIN! +1 xal" : "❌ SƏHV TAPDIN! -1 xal", isCorrect ? "success" : "error");
  }
  
  window.nextRound = async function() {
    const roomDatabaseRef = db.ref(`emoji_rooms/${currentRoom}`);
    const data = (await roomDatabaseRef.once('value')).val();
    
    // Rolları dəyiş
    const newDescriber = data.currentGuesser;
    const newGuesser = data.currentDescriber;
    
    // Yeni söz yarat
    const wordObj = getRandomWord();
    const otherWords = wordsDB.filter(w => w.word !== wordObj.word).map(w => w.word);
    const shuffled = [...otherWords];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const options = [wordObj.word, ...shuffled.slice(0, 4)];
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    
    await roomDatabaseRef.update({
      currentDescriber: newDescriber,
      currentGuesser: newGuesser,
      currentWord: wordObj.word,
      currentEmojis: wordObj.emojis,
      options: options,
      correctWord: wordObj.word,
      roundEnded: false,
      waitingForNext: false,
      roundNumber: (data.roundNumber || 0) + 1
    });
    
    canGuess = false;
    showMessage("🔄 Yeni raund başladı! Rollar dəyişdi.", "info");
  };
  
  window.copyRoomCode = function() {
    const code = currentRoom;
    navigator.clipboard.writeText(code);
    showMessage("📋 Otaq kodu kopyalandı!", "success");
  };
  
  window.handleLogin = function() {
    const name = document.getElementById("playerName").value.trim();
    if (!name || name.length < 2) {
      showMessage("Adınızı daxil edin (min 2 hərf)", "error");
      return;
    }
    if (name.length > 20) {
      showMessage("Ad maksimum 20 hərf ola bilər", "error");
      return;
    }
    myName = name;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("gamePanel").style.display = "block";
    
    const lastRoom = localStorage.getItem("emoji_lastRoom");
    if (lastRoom) document.getElementById("roomCode").value = lastRoom;
  };
  
  // Hearts animation
  (function() {
    const container = document.getElementById("heartsContainer");
    const hearts = ['💕', '💗', '💓', '💞', '❤️', '💖', '💘', '💝'];
    for (let i = 0; i < 35; i++) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 6 + Math.random() * 14 + "s";
      heart.style.animationDelay = Math.random() * 15 + "s";
      heart.style.fontSize = 12 + Math.random() * 20 + "px";
      container.appendChild(heart);
    }
  })();
  
  window.createRoom = createRoom;
  window.joinRoom = joinRoom;
</script>
</body>
</html>
