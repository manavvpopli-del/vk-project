<div id="movie-module" style="color: white; font-family: 'Outfit', sans-serif; padding: 15px; background: #0a0a0f; border: 1px solid #ff00ff; border-radius: 25px; box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-clapperboard" style="font-size: 2.5rem; color: #ff00ff;"></i>
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-top: 10px;">CINESPY ANALYSER</h2>
    </div>

    <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid #111;">
        <input type="text" id="movie-name" placeholder="Film adını daxil edin (məs: Inception)" 
            style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; text-align: center; font-weight: 900; outline: none; margin-bottom: 10px;">
        
        <button onclick="searchMovie()" id="movie-btn" 
            style="width: 100%; padding: 15px; background: #ff00ff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase;">
            MƏLUMATLARI GƏTİR
        </button>
    </div>

    <div id="movie-result" style="margin-top: 20px; display: none; animation: fadeIn 0.5s ease;">
        </div>
</div>

<style>
    .info-tag { background: rgba(255, 255, 255, 0.05); padding: 5px 10px; border-radius: 5px; font-size: 0.65rem; color: #ff00ff; border: 1px solid rgba(255, 0, 255, 0.2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
    async function searchMovie() {
        const title = document.getElementById('movie-name').value.trim();
        if(!title) return alert("Film adını yazın!");

        const btn = document.getElementById('movie-btn');
        const res = document.getElementById('movie-result');

        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> ARAŞDIRILIR...";
        
        try {
            // Real OMDb API istifadəsi (Pulsuz açar daxil edilib)
            const apiKey = "6256f6f2"; 
            const response = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${apiKey}`);
            const data = await response.json();

            if(data.Response === "True") {
                res.style.display = "block";
                res.innerHTML = `
                    <div style="display:flex; gap:15px; margin-bottom:20px;">
                        <img src="${data.Poster !== "N/A" ? data.Poster : 'https://via.placeholder.com/100x150?text=No+Image'}" 
                             style="width:100px; border-radius:10px; border:1px solid #333;">
                        <div>
                            <h3 style="margin:0; font-size:1rem; color:#ff00ff;">${data.Title}</h3>
                            <p style="font-size:0.6rem; color:#888; margin:5px 0;">${data.Year} • ${data.Genre} • ${data.Runtime}</p>
                            <div style="display:flex; gap:5px;">
                                <span class="info-tag"><i class="fas fa-star" style="color:#ffd700;"></i> ${data.imdbRating}</span>
                                <span class="info-tag"><i class="fas fa-award"></i> ${data.Language}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background:#000; padding:15px; border-radius:15px; border:1px solid #111;">
                        <b style="font-size:0.7rem; color:#ff00ff; display:block; margin-bottom:5px;">MÖVZU (PLOT):</b>
                        <p style="font-size:0.65rem; color:#ccc; line-height:1.4; margin:0;">${data.Plot}</p>
                        
                        <b style="font-size:0.7rem; color:#ff00ff; display:block; margin:15px 0 5px 0;">BAŞ ROLLAR:</b>
                        <p style="font-size:0.65rem; color:#ccc; margin:0;">${data.Actors}</p>

                        <b style="font-size:0.7rem; color:#ff00ff; display:block; margin:15px 0 5px 0;">REJİSSOR:</b>
                        <p style="font-size:0.65rem; color:#ccc; margin:0;">${data.Director}</p>
                    </div>
                `;
            } else {
                alert("Film tapılmadı!");
            }
        } catch (e) {
            alert("Xəta baş verdi. İnterneti yoxlayın.");
        }
        
        btn.disabled = false;
        btn.innerText = "MƏLUMATLARI GƏTİR";
    }
</script>
