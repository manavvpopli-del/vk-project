<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Cinematic Tank Warfare</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial;
}

canvas{
display:block;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff003322,transparent 25%),
radial-gradient(circle at bottom right,#0044ff22,transparent 25%),
linear-gradient(to bottom,#050505,#000);
z-index:-2;
}

#menu{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
z-index:999;
color:white;
}

#menu h1{
font-size:52px;
letter-spacing:5px;
margin-bottom:25px;
text-shadow:0 0 30px red;
}

#startBtn{
width:240px;
height:65px;
border:none;
border-radius:24px;
background:linear-gradient(135deg,#ff003c,#ff4d6d);
color:white;
font-size:20px;
font-weight:bold;
box-shadow:0 0 40px rgba(255,0,60,.4);
}

#hud{
position:fixed;
top:15px;
left:15px;
z-index:50;
padding:15px;
border-radius:20px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
color:white;
min-width:170px;
}

#hud h2{
font-size:15px;
margin-bottom:10px;
}

.bar{
width:140px;
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:5px;
margin-bottom:12px;
}

.fill{
width:100%;
height:100%;
background:linear-gradient(90deg,#00ff88,#00ffaa);
}

#crosshair{
position:fixed;
left:50%;
top:38%;
transform:translate(-50%,-50%);
width:38px;
height:38px;
z-index:30;
pointer-events:none;
}

#crosshair::before,
#crosshair::after{
content:"";
position:absolute;
background:white;
box-shadow:0 0 10px red;
}

#crosshair::before{
width:2px;
height:38px;
left:18px;
}

#crosshair::after{
height:2px;
width:38px;
top:18px;
}

#controls{
position:fixed;
bottom:18px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:60;
}

.pad{
width:150px;
height:150px;
border-radius:50%;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
position:relative;
}

.stick{
position:absolute;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(135deg,#ffffff33,#ffffff10);
left:42px;
top:42px;
}

#fireBtn{
width:95px;
height:95px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#ff003c,#ff5c74);
color:white;
font-size:22px;
font-weight:bold;
align-self:flex-end;
margin-bottom:25px;
box-shadow:0 0 50px rgba(255,0,60,.6);
}

</style>
</head>
<body>

<div id="menu">
<h1>TANK WAR</h1>
<button id="startBtn">START GAME</button>
</div>

<div id="hud">

<h2>BATTLE HUD</h2>

ARMOR
<div class="bar">
<div class="fill"></div>
</div>

FUEL
<div class="bar">
<div class="fill"></div>
</div>

</div>

<div id="crosshair"></div>

<div id="controls">

<div class="pad" id="movePad">
<div class="stick" id="stick"></div>
</div>

<button id="fireBtn">FIRE</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x000000,20,220);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.shadowMap.enabled = true;

renderer.outputEncoding = THREE.sRGBEncoding;

document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,.5);

scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,2);

light.position.set(30,60,20);

light.castShadow = true;

scene.add(light);

const ground = new THREE.Mesh(

new THREE.PlaneGeometry(600,600),

new THREE.MeshStandardMaterial({
color:0x101010,
roughness:1
})

);

ground.rotation.x = -Math.PI/2;

ground.receiveShadow = true;

scene.add(ground);

for(let i=0;i<120;i++){

const building = new THREE.Mesh(

new THREE.BoxGeometry(
5,
Math.random()*25+5,
5
),

new THREE.MeshStandardMaterial({
color:0x191919
})

);

building.position.set(
(Math.random()-.5)*500,
building.geometry.parameters.height/2,
(Math.random()-.5)*500
);

building.castShadow = true;

scene.add(building);

}

let tank;

const loader = new THREE.GLTFLoader();

loader.load(

'tank.glb',

function(gltf){

tank = gltf.scene;

tank.scale.set(1.8,1.8,1.8);

tank.position.y = 0;

tank.traverse(obj=>{

if(obj.isMesh){

obj.castShadow = true;

obj.receiveShadow = true;

}

});

scene.add(tank);

},

undefined,

function(error){

console.log(error);

}

);

camera.position.set(0,8,12);

let moveX = 0;
let moveY = 0;

const pad = document.getElementById('movePad');

const stick = document.getElementById('stick');

pad.addEventListener('touchmove',e=>{

const rect = pad.getBoundingClientRect();

const x = e.touches[0].clientX - rect.left - 75;
const y = e.touches[0].clientY - rect.top - 75;

moveX = x/40;
moveY = y/40;

stick.style.left = (42 + x*.4) + 'px';
stick.style.top = (42 + y*.4) + 'px';

});

pad.addEventListener('touchend',()=>{

moveX = 0;
moveY = 0;

stick.style.left = '42px';
stick.style.top = '42px';

});

function explosion(pos){

for(let i=0;i<25;i++){

const particle = new THREE.Mesh(

new THREE.SphereGeometry(.1,8,8),

new THREE.MeshBasicMaterial({
color:0xff6600
})

);

scene.add(particle);

particle.position.copy(pos);

const vx = (Math.random()-.5)*8;
const vy = Math.random()*5;
const vz = (Math.random()-.5)*8;

let t = 0;

function anim(){

particle.position.x += vx*.02;
particle.position.y += vy*.02;
particle.position.z += vz*.02;

particle.scale.multiplyScalar(.97);

t++;

if(t < 40){

requestAnimationFrame(anim);

}else{

scene.remove(particle);

}

}

anim();

}

}

function shoot(){

if(!tank) return;

const bullet = new THREE.Mesh(

new THREE.SphereGeometry(.15,8,8),

new THREE.MeshBasicMaterial({
color:0xff5500
})

);

scene.add(bullet);

bullet.position.copy(tank.position);

bullet.position.y += 1.5;

const dir = new THREE.Vector3(0,0,-1);

dir.applyQuaternion(tank.quaternion);

let speed = 0;

function bulletAnim(){

speed += 1.5;

bullet.position.x += dir.x * speed*.1;
bullet.position.z += dir.z * speed*.1;

if(speed < 90){

requestAnimationFrame(bulletAnim);

}else{

explosion(bullet.position);

scene.remove(bullet);

}

}

bulletAnim();

const flash = new THREE.PointLight(
0xff5500,
8,
20
);

flash.position.copy(bullet.position);

scene.add(flash);

setTimeout(()=>{

scene.remove(flash);

},80);

}

document.getElementById('fireBtn')
.addEventListener('click',()=>{

shoot();

});

function animate(){

requestAnimationFrame(animate);

if(tank){

if(moveY < -.2){

tank.translateZ(-.35);

}

if(moveY > .2){

tank.translateZ(.35);

}

if(moveX < -.2){

tank.rotation.y += .03;

}

if(moveX > .2){

tank.rotation.y -= .03;

}

camera.position.x += (
tank.position.x - camera.position.x
)*.08;

camera.position.z += (
tank.position.z + 12 - camera.position.z
)*.08;

camera.lookAt(
tank.position.x,
tank.position.y + 2,
tank.position.z
);

}

renderer.render(scene,camera);

}

animate();

document.getElementById('startBtn').onclick = ()=>{

document.getElementById('menu').style.display='none';

};

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
