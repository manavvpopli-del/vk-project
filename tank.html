<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Tank Wars - Neon Warfare</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060612;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Segoe UI', sans-serif;
}
canvas { display: block; width: 100%; height: 100%; }
#menu, #gameover {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
}
#menu.hidden, #gameover.hidden { display: none; }
h1 {
  font-size: clamp(2rem, 8vw, 4rem); color: #00ff88; letter-spacing: 0.2em;
  text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00cc6a;
  margin-bottom: 0.2em;
}
h2 {
  font-size: clamp(1.8rem, 6vw, 3rem); color: #ff3366; letter-spacing: 0.15em;
  text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366, 0 0 40px #cc1a4a;
  margin-bottom: 0.5em;
}
.subtitle { color: #00ccff; font-size: 0.8rem; letter-spacing: 0.3em; opacity: 0.7; margin-bottom: 2em; }
.btn {
  padding: 14px 48px; font-size: 1rem; font-weight: bold; letter-spacing: 0.2em;
  background: rgba(0,255,136,0.08); border: 2px solid #00ff88; color: #00ff88;
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
  box-shadow: 0 0 8px #00ff8844, inset 0 0 8px #00ff8811;
}
.btn:active { transform: scale(0.95); background: rgba(0,255,136,0.2); }
.btn-small {
  padding: 10px 32px; font-size: 0.8rem; border-color: #00ccff55; color: #00ccff99;
  background: transparent; margin-top: 12px;
}
.btn-small:active { background: rgba(0,204,255,0.1); }
.info { color: #666; font-size: 0.7rem; margin-top: 2em; text-align: center; line-height: 1.8; }
.stats { text-align: center; margin: 1em 0; padding: 1em; border: 1px solid #ff336633; border-radius: 8px; background: rgba(0,0,0,0.4); }
.stats p { margin: 0.4em 0; }
.score-label { color: #00ccff88; font-size: 0.7rem; letter-spacing: 0.1em; }
.score-val { color: #00ccff; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 8px #00ccff; }
.wave-val { color: #ffcc00; font-size: 1.2rem; font-weight: bold; }
.record { color: #00ff88; font-size: 0.8rem; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.highscore { color: #ffcc00; font-size: 0.85rem; margin-top: 0.8em; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="menu">
  <h1>TANK WARS</h1>
  <div class="subtitle">NEON WARFARE</div>
  <button class="btn" onclick="startGame()">BAŞLA</button>
  <div id="hsDisplay" class="highscore"></div>
  <div class="info">
    📱 Mobil: Sol tərəf hərəkət | Sağ tərəf atış<br>
    ⌨️ Kompüter: WASD hərəkət | Space atış
  </div>
</div>

<div id="gameover" class="hidden">
  <h2>OYUN BİTDİ</h2>
  <div class="stats">
    <p class="score-label">SKOR</p>
    <p class="score-val" id="finalScore">0</p>
    <p class="score-label">DALĞA</p>
    <p class="wave-val" id="finalWave">1</p>
    <p class="record hidden" id="newRecord">YENİ REKORD!</p>
  </div>
  <button class="btn" onclick="startGame()">YENİDƏN BAŞLA</button>
  <button class="btn btn-small" onclick="showMenu()">MENYU</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menuEl = document.getElementById('menu');
const overEl = document.getElementById('gameover');
const hsEl = document.getElementById('hsDisplay');

// === CONSTANTS ===
const MAP_W = 2400, MAP_H = 2400;
const PLAYER_SPEED = 3.2, BULLET_SPEED = 8, ENEMY_SPEED = 1.6;
const PLAYER_FIRE_RATE = 280, ENEMY_FIRE_RATE = 1400;
const PLAYER_HP = 100, ENEMY_HP = 50;
const BULLET_DMG = 22, ENEMY_BULLET_DMG = 8;

// === STATE ===
let state = 'menu'; // menu | playing | gameover
let player, enemies, bullets, particles, obstacles, powerUps;
let score, wave, highScore, frameCount;
let powerTimers = { speed: 0, rapid: 0 };
let camera = { x: 0, y: 0 };
let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, id: null };
let fireBtn = { active: false, id: null };
let moveInput = { x: 0, y: 0 };
let keys = {};
let waveBanner = { show: false, text: '', timer: 0 };

highScore = parseInt(localStorage.getItem('tankWarsHS') || '0');
updateHSDisplay();

// === RESIZE ===
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// === KEYBOARD ===
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// === TOUCH ===
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (let t of e.changedTouches) {
    const x = (t.clientX - rect.left) * (canvas.width / rect.width);
    const y = (t.clientY - rect.top) * (canvas.height / rect.height);
    if (x < canvas.width / 2 && !joystick.active) {
      joystick = { active: true, startX: x, startY: y, curX: x, curY: y, id: t.identifier };
    } else if (x >= canvas.width / 2 && !fireBtn.active) {
      fireBtn = { active: true, id: t.identifier };
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (let t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      const x = (t.clientX - rect.left) * (canvas.width / rect.width);
      const y = (t.clientY - rect.top) * (canvas.height / rect.height);
      joystick.curX = x; joystick.curY = y;
      const dx = x - joystick.startX, dy = y - joystick.startY;
      const dist = Math.hypot(dx, dy);
      if (dist > 8) { moveInput = { x: dx / Math.max(dist, 50), y: dy / Math.max(dist, 50) }; }
      else { moveInput = { x: 0, y: 0 }; }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === joystick.id) { joystick.active = false; joystick.id = null; moveInput = { x: 0, y: 0 }; }
    if (t.identifier === fireBtn.id) { fireBtn = { active: false, id: null }; }
  }
}, { passive: false });

// === GAME FUNCTIONS ===
function startGame() {
  player = { x: MAP_W/2, y: MAP_H/2, angle: 0, speed: PLAYER_SPEED, health: PLAYER_HP, maxHealth: PLAYER_HP, w: 40, h: 50, color: '#00ff88', lastShot: 0, fireRate: PLAYER_FIRE_RATE };
  enemies = []; bullets = []; particles = []; obstacles = []; powerUps = [];
  score = 0; wave = 1; frameCount = 0;
  powerTimers = { speed: 0, rapid: 0 };
  spawnObstacles();
  spawnEnemies(3);
  state = 'playing';
  menuEl.classList.add('hidden');
  overEl.classList.add('hidden');
  waveBanner = { show: true, text: 'DALĞA 1', timer: 90 };
}

function showMenu() {
  state = 'menu';
  menuEl.classList.remove('hidden');
  overEl.classList.add('hidden');
  updateHSDisplay();
}

function gameOver() {
  state = 'gameover';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalWave').textContent = wave;
  const rec = document.getElementById('newRecord');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('tankWarsHS', highScore);
    rec.classList.remove('hidden');
  } else { rec.classList.add('hidden'); }
  overEl.classList.remove('hidden');
}

function updateHSDisplay() {
  hsEl.textContent = highScore > 0 ? 'Rekord: ' + highScore : '';
}

function spawnObstacles() {
  obstacles = [];
  for (let i = 0; i < 15 + wave * 2; i++) {
    const w = 35 + Math.random() * 90, h = 35 + Math.random() * 90;
    obstacles.push({ x: 100 + Math.random() * (MAP_W - 200), y: 100 + Math.random() * (MAP_H - 200), w, h });
  }
}

function spawnEnemies(count) {
  for (let i = 0; i < count; i++) {
    let x, y;
    do { x = 80 + Math.random() * (MAP_W - 160); y = 80 + Math.random() * (MAP_H - 160); }
    while (Math.hypot(x - player.x, y - player.y) < 350);
    const hp = ENEMY_HP + wave * 8;
    enemies.push({
      x, y, angle: Math.random() * Math.PI * 2,
      speed: ENEMY_SPEED + Math.random() * 0.4 + wave * 0.05,
      health: hp, maxHealth: hp, w: 36, h: 46, color: '#ff3366',
      lastShot: 0, fireRate: Math.max(600, ENEMY_FIRE_RATE - wave * 60),
      targetX: Math.random() * MAP_W, targetY: Math.random() * MAP_H,
      moveTimer: 0, shootTimer: Math.random() * 800, state: 'patrol'
    });
  }
}

function shoot(tank, isPlayer) {
  const now = Date.now();
  const rate = isPlayer && powerTimers.rapid > 0 ? tank.fireRate * 0.45 : tank.fireRate;
  if (now - tank.lastShot < rate) return;
  tank.lastShot = now;
  const cos = Math.cos(tank.angle - Math.PI/2), sin = Math.sin(tank.angle - Math.PI/2);
  const tipX = tank.x + cos * (tank.h/2 + 6), tipY = tank.y + sin * (tank.h/2 + 6);
  const spd = isPlayer ? BULLET_SPEED : BULLET_SPEED * 0.6;
  bullets.push({ x: tipX, y: tipY, vx: cos*spd, vy: sin*spd, r: isPlayer?5:4, color: isPlayer?'#00ffcc':'#ff6644', isPlayer, dmg: isPlayer?BULLET_DMG:ENEMY_BULLET_DMG, trail: [] });
}

function explode(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI*2*i)/count + Math.random()*0.5;
    const s = 1.5 + Math.random()*5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 25+Math.random()*25, maxLife: 50, color, size: 2+Math.random()*5 });
  }
}

function spawnPowerUp(x, y) {
  if (Math.random() > 0.35) return;
  const types = ['health','speed','rapid'];
  powerUps.push({ x, y, type: types[Math.floor(Math.random()*types.length)], phase: Math.random()*Math.PI*2 });
}

function rectCol(ax,ay,aw,ah,bx,by,bw,bh) { return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by; }
function circRect(cx,cy,cr,rx,ry,rw,rh) {
  const clx=Math.max(rx,Math.min(cx,rx+rw)), cly=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-clx)**2+(cy-cly)**2<cr*cr;
}

// === UPDATE ===
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Power-up timers
  if (powerTimers.speed > 0) { powerTimers.speed--; player.speed = PLAYER_SPEED * 1.6; } else { player.speed = PLAYER_SPEED; }
  if (powerTimers.rapid > 0) powerTimers.rapid--;

  // Wave banner
  if (waveBanner.show) { waveBanner.timer--; if (waveBanner.timer <= 0) waveBanner.show = false; }

  // Player movement
  let mx = moveInput.x, my = moveInput.y;
  if (keys['ArrowUp']||keys['w']||keys['W']) my = -1;
  if (keys['ArrowDown']||keys['s']||keys['S']) my = 1;
  if (keys['ArrowLeft']||keys['a']||keys['A']) mx = -1;
  if (keys['ArrowRight']||keys['d']||keys['D']) mx = 1;

  if (mx !== 0 || my !== 0) {
    const len = Math.hypot(mx, my); mx /= len; my /= len;
    player.angle = Math.atan2(my, mx) + Math.PI/2;
    const nx = player.x + mx * player.speed, ny = player.y + my * player.speed;
    let canMove = true;
    for (const o of obstacles) {
      if (rectCol(nx-player.w/2, ny-player.h/2, player.w, player.h, o.x-o.w/2, o.y-o.h/2, o.w, o.h)) { canMove = false; break; }
    }
    if (canMove) {
      player.x = Math.max(player.w/2, Math.min(MAP_W-player.w/2, nx));
      player.y = Math.max(player.h/2, Math.min(MAP_H-player.h/2, ny));
    }
  }

  if (fireBtn.active || keys[' ']) shoot(player, true);

  // Enemy AI
  for (const e of enemies) {
    const dist = Math.hypot(e.x-player.x, e.y-player.y);
    if (dist < 450) e.state = 'chase'; else if (dist > 650) e.state = 'patrol';

    if (e.state === 'chase') {
      const a = Math.atan2(player.y-e.y, player.x-e.x);
      e.angle = a + Math.PI/2;
      if (dist > 180) {
        const nx = e.x+Math.cos(a)*e.speed, ny = e.y+Math.sin(a)*e.speed;
        let blocked = false;
        for (const o of obstacles) { if (rectCol(nx-e.w/2,ny-e.h/2,e.w,e.h,o.x-o.w/2,o.y-o.h/2,o.w,o.h)) { blocked=true; break; } }
        if (!blocked) { e.x = nx; e.y = ny; }
      }
      e.shootTimer += 16;
      if (e.shootTimer > e.fireRate) { e.shootTimer = 0; shoot(e, false); }
    } else {
      e.moveTimer += 16;
      if (e.moveTimer > 2500) { e.moveTimer = 0; e.targetX = 100+Math.random()*(MAP_W-200); e.targetY = 100+Math.random()*(MAP_H-200); }
      const a = Math.atan2(e.targetY-e.y, e.targetX-e.x);
      e.angle = a + Math.PI/2;
      e.x += Math.cos(a)*e.speed*0.4; e.y += Math.sin(a)*e.speed*0.4;
    }
    e.x = Math.max(e.w/2, Math.min(MAP_W-e.w/2, e.x));
    e.y = Math.max(e.h/2, Math.min(MAP_H-e.h/2, e.y));
  }

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.push({x:b.x, y:b.y}); if (b.trail.length > 6) b.trail.shift();
    b.x += b.vx; b.y += b.vy;
    if (b.x<-20||b.x>MAP_W+20||b.y<-20||b.y>MAP_H+20) { bullets.splice(i,1); continue; }

    let hitObs = false;
    for (const o of obstacles) { if (circRect(b.x,b.y,b.r,o.x-o.w/2,o.y-o.h/2,o.w,o.h)) { hitObs=true; explode(b.x,b.y,'#ffaa44',4); break; } }
    if (hitObs) { bullets.splice(i,1); continue; }

    if (b.isPlayer) {
      for (let j = enemies.length-1; j >= 0; j--) {
        const e = enemies[j];
        if (Math.hypot(b.x-e.x, b.y-e.y) < 26) {
          e.health -= b.dmg; explode(b.x,b.y,'#ff3366',6); bullets.splice(i,1);
          if (e.health <= 0) {
            explode(e.x,e.y,'#ff6600',20); explode(e.x,e.y,'#ffcc00',12);
            spawnPowerUp(e.x, e.y); enemies.splice(j,1);
            score += 100 + wave*20;
            if (enemies.length === 0) {
              wave++;
              waveBanner = { show: true, text: 'DALĞA ' + wave, timer: 90 };
              setTimeout(() => spawnEnemies(2 + wave*2), 2000);
            }
          }
          break;
        }
      }
    } else {
      if (Math.hypot(b.x-player.x, b.y-player.y) < 23) {
        player.health -= b.dmg; explode(b.x,b.y,'#00ff88',6); bullets.splice(i,1);
        if (player.health <= 0) { player.health = 0; explode(player.x,player.y,'#00ff88',30); gameOver(); }
      }
    }
  }

  // Power-ups
  for (let i = powerUps.length-1; i >= 0; i--) {
    const p = powerUps[i]; p.phase += 0.05;
    if (Math.hypot(p.x-player.x, p.y-player.y) < 30) {
      if (p.type==='health') { player.health = Math.min(player.maxHealth, player.health+30); explode(p.x,p.y,'#00ff88',10); }
      else if (p.type==='speed') { powerTimers.speed = 300; explode(p.x,p.y,'#00ccff',10); }
      else { powerTimers.rapid = 300; explode(p.x,p.y,'#ffcc00',10); }
      score += 50; powerUps.splice(i,1);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  // Camera
  const tx = player.x - canvas.width/2, ty = player.y - canvas.height/2;
  camera.x += (tx - camera.x) * 0.1; camera.y += (ty - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(MAP_W - canvas.width, camera.x));
  camera.y = Math.max(0, Math.min(MAP_H - canvas.height, camera.y));
}

// === RENDER ===
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#060612'; ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  const gs = 80;
  ctx.strokeStyle = '#0f1a2a'; ctx.lineWidth = 1;
  for (let x = -(camera.x%gs); x < canvas.width; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = -(camera.y%gs); y < canvas.height; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  ctx.save(); ctx.translate(-camera.x, -camera.y);

  // Map border
  ctx.strokeStyle = '#00ccff33'; ctx.lineWidth = 3; ctx.strokeRect(0,0,MAP_W,MAP_H);

  // Obstacles
  for (const o of obstacles) {
    const ox = o.x-o.w/2, oy = o.y-o.h/2;
    if (ox+o.w<camera.x-50||ox>camera.x+canvas.width+50||oy+o.h<camera.y-50||oy>camera.y+canvas.height+50) continue;
    ctx.fillStyle = '#0d2030'; ctx.fillRect(ox,oy,o.w,o.h);
    ctx.strokeStyle = '#1a4a5a'; ctx.lineWidth = 1.5; ctx.strokeRect(ox,oy,o.w,o.h);
  }

  // Power-ups
  for (const p of powerUps) {
    const pulse = 1 + Math.sin(p.phase)*0.2, r = 14*pulse;
    let col = '#00ff88', icon = '+';
    if (p.type==='speed') { col='#00ccff'; icon='»'; } else if (p.type==='rapid') { col='#ffcc00'; icon='⚡'; }
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle = col+'33'; ctx.shadowColor = col; ctx.shadowBlur = 12; ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0;
    ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(icon, p.x, p.y);
  }

  // Draw tank function
  function drawTank(t, isP) {
    ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.angle);
    const w = t.w || 40, h = t.h || 50;
    ctx.shadowColor = t.color; ctx.shadowBlur = isP ? 18 : 10;
    // Tracks
    ctx.fillStyle = t.color+'22'; ctx.fillRect(-w/2-5,-h/2+3,7,h-6); ctx.fillRect(w/2-2,-h/2+3,7,h-6);
    ctx.strokeStyle = t.color+'55'; ctx.lineWidth = 1;
    ctx.strokeRect(-w/2-5,-h/2+3,7,h-6); ctx.strokeRect(w/2-2,-h/2+3,7,h-6);
    for (let ty=-h/2+8; ty<h/2-4; ty+=8) { ctx.fillStyle=t.color+'33'; ctx.fillRect(-w/2-4,ty,5,3); ctx.fillRect(w/2-1,ty,5,3); }
    // Body
    ctx.fillStyle = t.color+'18'; ctx.fillRect(-w/2,-h/2,w,h);
    ctx.strokeStyle = t.color; ctx.lineWidth = 2; ctx.strokeRect(-w/2,-h/2,w,h);
    ctx.strokeStyle = t.color+'33'; ctx.lineWidth = 1; ctx.strokeRect(-w/2+5,-h/2+5,w-10,h-10);
    // Turret
    ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fillStyle=t.color+'44'; ctx.fill();
    ctx.strokeStyle=t.color; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.strokeStyle=t.color+'66'; ctx.lineWidth=1; ctx.stroke();
    // Barrel
    ctx.fillStyle = t.color+'cc'; ctx.fillRect(-3.5,-h/2-14,7,h/2+8);
    ctx.strokeStyle = t.color; ctx.lineWidth = 1; ctx.strokeRect(-3.5,-h/2-14,7,h/2+8);
    ctx.fillStyle = t.color; ctx.fillRect(-4.5,-h/2-16,9,4);
    ctx.shadowBlur = 0; ctx.restore();
  }

  // Player
  if (state === 'playing') {
    ctx.beginPath(); ctx.arc(player.x,player.y,35,0,Math.PI*2); ctx.fillStyle='#00ff8808'; ctx.fill();
    drawTank(player, true);
  }

  // Enemies
  for (const e of enemies) {
    if (e.x<camera.x-80||e.x>camera.x+canvas.width+80||e.y<camera.y-80||e.y>camera.y+canvas.height+80) continue;
    drawTank(e, false);
    // HP bar
    const hbW=36, hbH=4, hbX=e.x-hbW/2, hbY=e.y-e.h/2-14;
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(hbX,hbY,hbW,hbH);
    const pct = e.health/e.maxHealth;
    ctx.fillStyle = pct>0.5?'#ff3366':pct>0.25?'#ff6600':'#ff0000';
    ctx.fillRect(hbX,hbY,hbW*pct,hbH);
    ctx.strokeStyle='#ff336666'; ctx.lineWidth=0.5; ctx.strokeRect(hbX,hbY,hbW,hbH);
  }

  // Bullets
  for (const b of bullets) {
    for (let t=0; t<b.trail.length; t++) {
      const alpha = (t/b.trail.length)*0.4, sz = b.r*(t/b.trail.length)*0.8;
      ctx.beginPath(); ctx.arc(b.trail[t].x,b.trail[t].y,sz,0,Math.PI*2);
      ctx.fillStyle = b.color + Math.floor(alpha*255).toString(16).padStart(2,'0'); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=4; ctx.fill(); ctx.shadowBlur=0;
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // === HUD ===
  if (state === 'playing') {
    // Health bar
    const hbW = Math.min(180, canvas.width*0.32), hbH = 14, hbX = 12, hbY = 12;
    const hpPct = player.health / player.maxHealth;
    ctx.fillStyle='#0a0a1a88'; ctx.fillRect(hbX-2,hbY-2,hbW+4,hbH+4);
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(hbX,hbY,hbW,hbH);
    const hpCol = hpPct>0.5?'#00ff88':hpPct>0.25?'#ffaa00':'#ff3333';
    ctx.fillStyle=hpCol; ctx.fillRect(hbX+1,hbY+1,(hbW-2)*hpPct,hbH-2);
    ctx.strokeStyle=hpCol+'88'; ctx.lineWidth=1; ctx.strokeRect(hbX,hbY,hbW,hbH);
    ctx.font='bold 9px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(Math.ceil(player.health)+' / '+player.maxHealth, hbX+hbW/2, hbY+hbH/2+1);

    // Score
    ctx.font='bold 15px sans-serif'; ctx.fillStyle='#00ccff'; ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.shadowColor='#00ccff'; ctx.shadowBlur=4; ctx.fillText(score, canvas.width-14, 12); ctx.shadowBlur=0;
    ctx.font='8px sans-serif'; ctx.fillStyle='#00ccff88'; ctx.fillText('SKOR', canvas.width-14, 30);

    // Wave
    ctx.font='bold 12px sans-serif'; ctx.fillStyle='#ffcc00';
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=3; ctx.fillText('DALĞA '+wave, canvas.width-14, 44); ctx.shadowBlur=0;

    // Enemies
    ctx.font='10px sans-serif'; ctx.fillStyle='#ff336699'; ctx.fillText('Düşmən: '+enemies.length, canvas.width-14, 62);

    // Power-up indicators
    let iy = 34; ctx.textAlign='left';
    if (powerTimers.speed>0) { ctx.font='9px sans-serif'; ctx.fillStyle='#00ccff'; ctx.fillText('⚡ SÜRƏT '+Math.ceil(powerTimers.speed/60)+'s', 14, iy); iy+=14; }
    if (powerTimers.rapid>0) { ctx.font='9px sans-serif'; ctx.fillStyle='#ffcc00'; ctx.fillText('🔥 SÜRƏTLI ATIŞ '+Math.ceil(powerTimers.rapid/60)+'s', 14, iy); }

    // === JOYSTICK ===
    const jx=80, jy=canvas.height-80, jr=50;
    ctx.beginPath(); ctx.arc(jx,jy,jr,0,Math.PI*2); ctx.fillStyle='#ffffff06'; ctx.fill();
    ctx.strokeStyle='#00ff8833'; ctx.lineWidth=2; ctx.stroke();
    for (const d of [0,Math.PI/2,Math.PI,-Math.PI/2]) {
      ctx.beginPath(); ctx.arc(jx+Math.cos(d)*(jr-8),jy+Math.sin(d)*(jr-8),3,0,Math.PI*2); ctx.fillStyle='#00ff8822'; ctx.fill();
    }
    if (joystick.active) {
      const dx=joystick.curX-joystick.startX, dy=joystick.curY-joystick.startY;
      const dist=Math.min(Math.hypot(dx,dy),jr), a=Math.atan2(dy,dx);
      const kx=jx+Math.cos(a)*dist, ky=jy+Math.sin(a)*dist;
      ctx.beginPath(); ctx.moveTo(jx,jy); ctx.lineTo(kx,ky); ctx.strokeStyle='#00ff8833'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(kx,ky,20,0,Math.PI*2); ctx.fillStyle='#00ff8833'; ctx.fill(); ctx.strokeStyle='#00ff88'; ctx.lineWidth=2; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(jx,jy,18,0,Math.PI*2); ctx.fillStyle='#00ff8815'; ctx.fill(); ctx.strokeStyle='#00ff8844'; ctx.lineWidth=1.5; ctx.stroke();
    }

    // === FIRE BUTTON ===
    const fx=canvas.width-70, fy=canvas.height-70, fr=36;
    if (fireBtn.active) { ctx.beginPath(); ctx.arc(fx,fy,fr+6,0,Math.PI*2); ctx.fillStyle='#ff336611'; ctx.fill(); }
    ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2);
    ctx.fillStyle=fireBtn.active?'#ff336644':'#ff336615'; ctx.fill();
    ctx.strokeStyle=fireBtn.active?'#ff3366':'#ff336666'; ctx.lineWidth=2.5; ctx.stroke();
    const chCol=fireBtn.active?'#ffffff':'#ff3366aa';
    ctx.strokeStyle=chCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(fx-10,fy); ctx.lineTo(fx+10,fy); ctx.moveTo(fx,fy-10); ctx.lineTo(fx,fy+10); ctx.stroke();
    ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.stroke();

    // === MINI MAP ===
    const mmW=90, mmH=90, mmX=canvas.width-mmW-10, mmY=canvas.height-mmH-130;
    ctx.fillStyle='#0a0a1a99'; ctx.fillRect(mmX,mmY,mmW,mmH);
    ctx.strokeStyle='#00ccff33'; ctx.lineWidth=1; ctx.strokeRect(mmX,mmY,mmW,mmH);
    ctx.fillStyle='#1a3a4a55';
    for (const o of obstacles) { ctx.fillRect(mmX+(o.x/MAP_W)*mmW-1, mmY+(o.y/MAP_H)*mmH-1, 2, 2); }
    for (const e of enemies) { ctx.fillStyle='#ff3366'; ctx.fillRect(mmX+(e.x/MAP_W)*mmW-2, mmY+(e.y/MAP_H)*mmH-2, 4, 4); }
    for (const p of powerUps) {
      ctx.fillStyle=p.type==='health'?'#00ff88':p.type==='speed'?'#00ccff':'#ffcc00';
      ctx.beginPath(); ctx.arc(mmX+(p.x/MAP_W)*mmW, mmY+(p.y/MAP_H)*mmH, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#00ff88'; ctx.beginPath(); ctx.arc(mmX+(player.x/MAP_W)*mmW, mmY+(player.y/MAP_H)*mmH, 3, 0, Math.PI*2); ctx.fill();
    ctx.font='7px sans-serif'; ctx.fillStyle='#00ccff44'; ctx.textAlign='right'; ctx.fillText('RADAR', mmX+mmW, mmY-3);

    // Wave banner
    if (waveBanner.show) {
      const alpha = Math.min(1, waveBanner.timer/20);
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#00ccff'; ctx.textAlign = 'center';
      ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 15;
      ctx.fillText(waveBanner.text, canvas.width/2, canvas.height/3);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }
}

// === LOOP ===
function loop() { update(); render(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
