<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN STEEL</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:#050816;
  font-family:Arial;
}

canvas {
  display:block;
  background:
    linear-gradient(rgba(0,255,120,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,120,0.05) 1px, transparent 1px),
    #111827;
  background-size:40px 40px;
}

.ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  z-index:10;
}

.hpbar {
  width:260px;
  height:25px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
  border:2px solid #00ff88;
}

.hpfill {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#00ffaa);
}

.score {
  margin-top:10px;
  font-size:24px;
}

.fireBtn {
  position:absolute;
  bottom:40px;
  right:40px;
  width:100px;
  height:100px;
  border:none;
  border-radius:50%;
  background:#ff3b3b;
  color:white;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 0 30px red;
}

.info {
  position:absolute;
  bottom:20px;
  left:20px;
  color:#00ffaa;
  font-size:18px;
}
</style>
</head>
<body>

<div class="ui">
  <div class="hpbar">
    <div class="hpfill" id="hp"></div>
  </div>

  <div class="score" id="score">
    SCORE: 0
  </div>
</div>

<div class="info">
  W A S D = hereket | Mouse Click = ates
</div>

<button class="fireBtn" id="fireBtn">FIRE</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const hpBar = document.getElementById('hp');
const scoreText = document.getElementById('score');

let score = 0;

const shootSound = new Audio('https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3');
const boomSound = new Audio('https://assets.mixkit.co/active_storage/sfx/281/281-preview.mp3');

const keys = {};

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()] = false;
});

class Bullet {
  constructor(x,y,angle,color='yellow') {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.speed = 12;
    this.radius = 5;
    this.active = true;
    this.color = color;
  }

  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    if(
      this.x < 0 ||
      this.x > canvas.width ||
      this.y < 0 ||
      this.y > canvas.height
    ) {
      this.active = false;
    }
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.fill();
  }
}

class Particle {
  constructor(x,y) {
    this.x = x;
    this.y = y;
    this.size = Math.random()*6;
    this.speedX = (Math.random()-0.5)*10;
    this.speedY = (Math.random()-0.5)*10;
    this.life = 100;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
  }

  draw() {
    ctx.fillStyle = `rgba(255,120,0,${this.life/100})`;
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

class Tank {
  constructor(x,y,color='lime') {
    this.x = x;
    this.y = y;
    this.angle = 0;
    this.speed = 0;
    this.hp = 100;
    this.color = color;
    this.bullets = [];
  }

  move() {
    if(keys['w']) this.speed = 4;
    else if(keys['s']) this.speed = -4;
    else this.speed = 0;

    if(keys['a']) this.angle -= 0.05;
    if(keys['d']) this.angle += 0.05;

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
  }

  shoot() {
    shootSound.currentTime = 0;
    shootSound.play();

    this.bullets.push(
      new Bullet(
        this.x + Math.cos(this.angle)*40,
        this.y + Math.sin(this.angle)*40,
        this.angle
      )
    );
  }

  updateBullets() {
    this.bullets.forEach(b=>b.update());
    this.bullets = this.bullets.filter(b=>b.active);
  }

  draw() {
    ctx.save();

    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);

    ctx.fillStyle = this.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;

    ctx.fillRect(-30,-20,60,40);

    ctx.fillStyle = '#222';
    ctx.fillRect(0,-5,40,10);

    ctx.restore();

    this.bullets.forEach(b=>b.draw());
  }
}

class Enemy extends Tank {
  constructor(x,y) {
    super(x,y,'red');
    this.cooldown = 0;
  }

  ai(player) {
    const dx = player.x - this.x;
    const dy = player.y - this.y;

    this.angle = Math.atan2(dy,dx);

    this.x += Math.cos(this.angle) * 1.5;
    this.y += Math.sin(this.angle) * 1.5;

    this.cooldown--;

    if(this.cooldown <= 0) {
      this.cooldown = 90;

      this.bullets.push(
        new Bullet(
          this.x + Math.cos(this.angle)*40,
          this.y + Math.sin(this.angle)*40,
          this.angle,
          'orange'
        )
      );
    }
  }
}

const player = new Tank(400,300);
const enemies = [];
const particles = [];

for(let i=0;i<6;i++) {
  enemies.push(
    new Enemy(
      Math.random()*canvas.width,
      Math.random()*canvas.height
    )
  );
}

function collision(a,b) {
  return Math.hypot(a.x-b.x,a.y-b.y) < 35;
}

function explode(x,y) {
  boomSound.currentTime = 0;
  boomSound.play();

  for(let i=0;i<40;i++) {
    particles.push(new Particle(x,y));
  }
}

function update() {
  player.move();
  player.updateBullets();

  enemies.forEach(enemy=>{
    enemy.ai(player);
    enemy.updateBullets();

    enemy.bullets.forEach(b=>{
      if(collision(b,player)) {
        b.active = false;
        player.hp -= 10;

        hpBar.style.width = player.hp + '%';

        explode(player.x,player.y);

        if(player.hp <= 0) {
          alert('GAME OVER');
          location.reload();
        }
      }
    });
  });

  player.bullets.forEach(b=>{
    enemies.forEach(enemy=>{
      if(collision(b,enemy)) {
        b.active = false;
        enemy.hp -= 50;

        explode(enemy.x,enemy.y);

        if(enemy.hp <= 0) {
          enemy.dead = true;
          score += 100;
          scoreText.innerHTML = 'SCORE: ' + score;
        }
      }
    });
  });

  for(let i=particles.length-1;i>=0;i--) {
    particles[i].update();

    if(particles[i].life <= 0) {
      particles.splice(i,1);
    }
  }
}

function drawMiniMap() {
  ctx.fillStyle = '#000';
  ctx.fillRect(canvas.width-220,20,200,200);

  ctx.fillStyle = 'lime';
  ctx.fillRect(
    canvas.width-220 + player.x/10,
    20 + player.y/10,
    6,
    6
  );

  ctx.fillStyle = 'red';

  enemies.forEach(e=>{
    if(!e.dead) {
      ctx.fillRect(
        canvas.width-220 + e.x/10,
        20 + e.y/10,
        6,
        6
      );
    }
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.draw();

  enemies.forEach(enemy=>{
    if(!enemy.dead) enemy.draw();
  });

  particles.forEach(p=>p.draw());

  drawMiniMap();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener('click',()=>{
  player.shoot();
});

document.getElementById('fireBtn').addEventListener('click',()=>{
  player.shoot();
});

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
