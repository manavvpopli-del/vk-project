<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cinematic Tank Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:#000;
font-family:Arial;
}

canvas{
display:block;
}

#menu{
position:fixed;
inset:0;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at top,#ff003344,transparent 30%),
linear-gradient(to bottom,#050505,#000);
color:white;
}

#menu h1{
font-size:52px;
letter-spacing:5px;
text-shadow:0 0 30px red;
margin-bottom:30px;
}

#startBtn{
width:240px;
height:65px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#ff003c,#ff4d6d);
color:white;
font-size:20px;
font-weight:bold;
box-shadow:0 0 40px rgba(255,0,60,.5);
}

#hud{
position:fixed;
top:15px;
left:15px;
z-index:10;
background:rgba(0,0,0,.35);
padding:15px;
border-radius:20px;
backdrop-filter:blur(20px);
color:white;
border:1px solid rgba(255,255,255,.1);
}

#hud h2{
font-size:15px;
margin-bottom:10px;
}

.bar{
width:150px;
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:5px;
margin-bottom:12px;
}

.fill{
width:100%;
height:100%;
background:linear-gradient(90deg,#00ff88,#00ffaa);
}

#crosshair{
position:fixed;
left:50%;
top:40%;
transform:translate(-50%,-50%);
width:35px;
height:35px;
z-index:20;
pointer-events:none;
}

#crosshair::before,
#crosshair::after{
content:"";
position:absolute;
background:white;
}

#crosshair::before{
width:2px;
height:35px;
left:16px;
}

#crosshair::after{
height:2px;
width:35px;
top:16px;
}

#controls{
position:fixed;
bottom:20px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:30;
}

.pad{
width:150px;
height:150px;
border-radius:50%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
position:relative;
border:1px solid rgba(255,255,255,.08);
}

.stick{
position:absolute;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(135deg,#ffffff33,#ffffff11);
left:42px;
top:42px;
}

#fireBtn{
width:90px;
height:90px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#ff003c,#ff5c74);
color:white;
font-size:22px;
font-weight:bold;
box-shadow:0 0 40px rgba(255,0,60,.6);
align-self:flex-end;
margin-bottom:25px;
}

</style>
</head>
<body>

<div id="menu">
<h1>TANK WAR</h1>
<button id="startBtn">START GAME</button>
</div>

<div id="hud">
<h2>BATTLE HUD</h2>
ARMOR
<div class="bar"><div class="fill"></div></div>
FUEL
<div class="bar"><div class="fill"></div></div>
</div>

<div id="crosshair"></div>

<div id="controls">
<div class="pad" id="movePad">
<div class="stick" id="stick"></div>
</div>

<button id="fireBtn">FIRE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,20,180);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,.45);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1.8);
light.position.set(30,60,20);
light.castShadow = true;
scene.add(light);

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshStandardMaterial({
color:0x101010
})
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

const tank = new THREE.Group();
scene.add(tank);

const body = new THREE.Mesh(
new THREE.BoxGeometry(4,1.5,6),
new THREE.MeshStandardMaterial({
color:0x2b2b2b,
metalness:.8,
roughness:.25
})
);

body.castShadow = true;
tank.add(body);

const topTank = new THREE.Mesh(
new THREE.BoxGeometry(2.5,1.2,2.5),
new THREE.MeshStandardMaterial({
color:0x3a3a3a
})
);

topTank.position.y = 1.2;
topTank.castShadow = true;
tank.add(topTank);

const gun = new THREE.Mesh(
new THREE.CylinderGeometry(.18,.18,5,32),
new THREE.MeshStandardMaterial({
color:0x555555
})
);

gun.rotation.z = Math.PI/2;
gun.position.set(2.5,1.2,0);
gun.castShadow = true;
tank.add(gun);

function wheel(x,z){

const w = new THREE.Mesh(
new THREE.CylinderGeometry(.7,.7,.6,32),
new THREE.MeshStandardMaterial({
color:0x111111
})
);

w.rotation.z = Math.PI/2;
w.position.set(x,-.8,z);

w.castShadow = true;

tank.add(w);

}

wheel(-2,2);
wheel(2,2);
wheel(-2,0);
wheel(2,0);
wheel(-2,-2);
wheel(2,-2);

camera.position.set(0,8,12);

for(let i=0;i<80;i++){

const building = new THREE.Mesh(
new THREE.BoxGeometry(
5,
Math.random()*20+5,
5
),
new THREE.MeshStandardMaterial({
color:0x1a1a1a
})
);

building.position.set(
(Math.random()-.5)*300,
building.geometry.parameters.height/2,
(Math.random()-.5)*300
);

building.castShadow = true;
scene.add(building);

}

let moveX = 0;
let moveY = 0;

const pad = document.getElementById('movePad');
const stick = document.getElementById('stick');

pad.addEventListener('touchmove',e=>{

const rect = pad.getBoundingClientRect();

const x = e.touches[0].clientX - rect.left - 75;
const y = e.touches[0].clientY - rect.top - 75;

moveX = x/40;
moveY = y/40;

stick.style.left = (42 + x*.4) + 'px';
stick.style.top = (42 + y*.4) + 'px';

});

pad.addEventListener('touchend',()=>{
moveX = 0;
moveY = 0;
stick.style.left = '42px';
stick.style.top = '42px';
});

function shoot(){

const bullet = new THREE.Mesh(
new THREE.SphereGeometry(.18,12,12),
new THREE.MeshBasicMaterial({
color:0xff5500
})
);

scene.add(bullet);

bullet.position.copy(tank.position);
bullet.position.y = 1.2;

const dir = new THREE.Vector3(0,0,-1);
dir.applyQuaternion(tank.quaternion);

let speed = 0;

function bulletAnim(){

speed += 1.5;

bullet.position.x += dir.x * speed*.1;
bullet.position.z += dir.z * speed*.1;

if(speed < 80){
requestAnimationFrame(bulletAnim);
}else{
scene.remove(bullet);
explosion(bullet.position);
}

}

bulletAnim();

}

function explosion(pos){

for(let i=0;i<25;i++){

const p = new THREE.Mesh(
new THREE.SphereGeometry(.1,8,8),
new THREE.MeshBasicMaterial({
color:0xff6600
})
);

scene.add(p);

p.position.copy(pos);

const vx = (Math.random()-.5)*8;
const vy = Math.random()*5;
const vz = (Math.random()-.5)*8;

let t = 0;

function anim(){

p.position.x += vx*.02;
p.position.y += vy*.02;
p.position.z += vz*.02;

p.scale.multiplyScalar(.98);

t++;

if(t<40){
requestAnimationFrame(anim);
}else{
scene.remove(p);
}

}

anim();

}

}

document.getElementById('fireBtn').addEventListener('click',()=>{
shoot();
});

function animate(){
requestAnimationFrame(animate);

if(moveY < -.2){

tank.translateZ(-.35);

}

if(moveY > .2){

tank.translateZ(.35);

}

if(moveX < -.2){

tank.rotation.y += .03;

}

if(moveX > .2){

tank.rotation.y -= .03;

}

camera.position.x = tank.position.x;
camera.position.z = tank.position.z + 12;

camera.lookAt(
tank.position.x,
0,
tank.position.z
);

renderer.render(scene,camera);
}

animate();

document.getElementById('startBtn').onclick = ()=>{
document.getElementById('menu').style.display='none';
};

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
