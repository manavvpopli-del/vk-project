<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; --fun: #ff007a; }
        * { box-sizing: border-box; transition: all 0.3s cubic; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-y: auto; min-height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.7; text-align: center; max-width: 650px; min-height: 120px; text-shadow: 0 0 5px var(--cyber); }

        /* UI SECTIONS */
        #view-login, #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin: 20px 0; }
        .stats-top { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }

        #tool-list { display: none; animation: slideUp 0.5s ease; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: inline-block; }

        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 40px; overflow-y: auto; }

        .shop-item { border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; }
        .shop-item:hover { border-color: var(--gold); background: rgba(255,215,0,0.05); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">DAVAM ET</button>
</section>

<section id="view-login">
    <div class="login-card" style="background:var(--glass); padding:50px; border-radius:40px; border:1px solid var(--border); text-align:center; width:340px; margin:auto;">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" onclick="handleLogin()">QOŞUL</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div>ÜMUMİ: <span style="color:var(--gold)">3562+</span></div>
        <div><span style="color:var(--cyber)">●</span> ONLAYN: <span id="online-count">0</span></div>
    </div>
    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS ARTIR</button>
            <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3>KİBER ƏMƏLİYYAT</h3>
        </div>
        <div class="card" onclick="showTools('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3>ALƏTLƏR</h3>
        </div>
        <div class="card" onclick="showTools('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i><h3>ƏYLƏNCƏ</h3>
        </div>
    </div>

    <div id="tool-list">
        <div class="back-btn" onclick="backToCategories()"><i class="fas fa-chevron-left"></i> KATEQORİYALARA QAYIT</div>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const toolGrids = {
        'cyber-grid': [
            {n:'Wordlist Yaradıcı', i:'fa-file-code', c:'var(--cyber)', f:'wordlist.html', p:800},
            {n:'DDoS Stresser', i:'fa-radiation', c:'var(--cyber)', f:'ddos.html', p:600},
            {n:'SQL Skaner', i:'fa-database', c:'var(--cyber)', f:'sql_scan.html', p:500},
            {n:'Brute Force', i:'fa-unlock-alt', c:'var(--cyber)', f:'brute.html', p:500}
        ],
        'tools-grid': [
            {n:'Instagram Spy', i:'fa-instagram', c:'var(--tools)', f:'insta_spy.html', p:900},
            {n:'Kamera Tələsi', i:'fa-camera', c:'var(--tools)', f:'trap.html', p:500},
            {n:'IP İzləyici', i:'fa-location-dot', c:'white', f:'ip.html', p:0},
            {n:'Anonim Mail', i:'fa-envelope-shield', c:'white', f:'mail.html', p:0}
        ],
        'fun-grid': [
            {n:'Hədiyyə Çarxı', i:'fa-gift', c:'var(--fun)', f:'gift.html', p:0},
            {n:'Gizli Test', i:'fa-mask', c:'var(--fun)', f:'secret.html', p:0},
            {n:'Tarot Analizi', i:'fa-wand-sparkles', c:'var(--fun)', f:'tarot_elite.html', p:0}
        ]
    };

    const disText = "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal işlərə təşviq etmir. Davam edərək məsuliyyəti qəbul edirsiniz.";
    let charIdx = 0;

    function typeWriter() {
        if (charIdx < disText.length) {
            document.getElementById('typewriter').innerHTML += disText.charAt(charIdx);
            charIdx++; setTimeout(typeWriter, 20);
        } else { document.getElementById('btn-agree').style.display = 'inline-block'; }
    }

    function acceptDisclaimer() {
        document.getElementById('bg-music').play();
        document.getElementById('view-disclaimer').style.display = 'none';
        const session = localStorage.getItem('elite_session');
        if(session) showMenu(session); else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isOnline) return alert("HESAB AKTİVDİR!");
        await db.ref('users/'+u).update({ isOnline: true });
        localStorage.setItem('elite_session', u);
        showMenu(u);
    }

    function showMenu(u) {
        window.activeUser = u;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
        window.onbeforeunload = () => db.ref('users/'+u).update({ isOnline: false });
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => {
            grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})"><i class="fas ${t.i}" style="color:${t.c}"></i><h3>${t.n}</h3><p>${t.p} PTS</p></div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    // ƏSAS PROBLEM BURADA İDİ: FETCH YOX, İNDİ DAHA ETİBARLI ÜSUL
    async function openTool(file, cost) {
        const user = localStorage.getItem('elite_session');
        const snap = await db.ref('users/' + user).get();
        const currentPoints = snap.val().points || 0;

        if(cost > 0 && currentPoints < cost) return alert("PTS YETƏRSİZ!");

        // Faylı modal daxilinə yükləyirik
        fetch(file)
            .then(response => {
                if (!response.ok) throw new Error("Fayl tapılmadı!");
                return response.text();
            })
            .then(html => {
                document.getElementById('tool-content').innerHTML = html;
                document.getElementById('modal-overlay').style.display = 'block';
                // Faylın içindəki scriptləri işə salırıq
                const scripts = document.getElementById('tool-content').getElementsByTagName('script');
                for (let s of scripts) {
                    const ns = document.createElement("script");
                    ns.text = s.text;
                    document.body.appendChild(ns).parentNode.removeChild(ns);
                }
            })
            .catch(err => alert("Xəta: Fayl yüklənə bilmədi (" + file + ")"));
    }

    // PULPAL SHOP
    function openShop() {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center;">
                <h2 style="color:var(--gold);">PTS BALANS ARTIR</h2>
                <div class="shop-item" onclick="preparePay(300, 10)"><h3>300 PTS</h3><p>10 AZN</p></div>
                <div class="shop-item" onclick="preparePay(600, 18)"><h3>600 PTS</h3><p>18 AZN</p></div>
                <div id="pay-zone" style="display:none; margin-top:20px;">
                    <a id="p-link" href="#" target="_blank" class="btn-main" style="display:block; text-decoration:none; background:var(--cyber); color:black;">PULPAL İLE ÖDE</a>
                    <input type="file" id="p-ss" style="margin-top:20px;">
                    <button class="btn-main" id="p-btn">ÇEKİ GÖNDƏR</button>
                </div>
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function preparePay(pts, amt) {
        document.getElementById('pay-zone').style.display = 'block';
        document.getElementById('p-link').href = `https://pay.pulpal.az/payment?uniqueCode=W-7qRM6ZmR&amount=${amt}`;
        document.getElementById('p-btn').onclick = () => {
            const file = document.getElementById('p-ss').files[0];
            if(!file) return alert("Şəkil seçin!");
            const r = new FileReader();
            r.onload = async (e) => {
                await db.ref('pending_payments').push({ user: localStorage.getItem('elite_session'), pts, screenshot: e.target.result, status: "pending", timestamp: Date.now() });
                alert("Göndərildi!"); closeTool();
            };
            r.readAsDataURL(file);
        };
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = typeWriter;
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random()*15)+3; }, 2000);
</script>
</body>
</html>
