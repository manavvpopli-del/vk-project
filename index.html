<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroWallet | Secure Access</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-gold: #f59e0b; 
            --dark-surface: #0a0a0c;
            --card-inner: #141417;
            --border-glow: rgba(245, 158, 11, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body { 
            margin: 0; background: var(--dark-surface); color: #e2e8f0; 
            font-family: 'Outfit', sans-serif; height: 100vh; display: flex; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0a0a0c 100%);
            z-index: -1;
        }

        .auth-card { 
            width: 90%; max-width: 380px; padding: 40px 25px; background: var(--card-inner); 
            border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.05); 
            text-align: center; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .brand-header { margin-bottom: 30px; }
        .brand-header h1 { 
            font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 0.7rem; color: var(--main-gold); font-weight: 600; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        .auth-input { 
            width: 100%; padding: 16px; background: #000; border: 1px solid #222; 
            border-radius: 12px; color: #fff; font-family: 'Outfit'; text-align: center; margin-bottom: 15px; 
            transition: 0.3s;
        }
        .auth-input:focus { border-color: var(--main-gold); box-shadow: 0 0 15px var(--border-glow); }

        /* Referal sahəsi başlanğıcda gizli olur */
        #referral-container { display: none; margin-top: 5px; }
        .ref-label { font-size: 0.65rem; color: #666; margin-bottom: 5px; display: block; text-align: center; }

        .action-btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: var(--main-gold); color: #000; font-family: 'Outfit'; 
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .toggle-text { margin-top: 20px; font-size: 0.8rem; color: #666; cursor: pointer; }
        .toggle-text b { color: #fff; border-bottom: 1px solid var(--main-gold); }
        #status-msg { margin-top: 15px; font-size: 0.75rem; min-height: 1rem; line-height: 1.4; padding: 0 10px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-gradient"></div>

    <div class="auth-card">
        <div class="brand-header">
            <h1>ZEROWALLET</h1>
            <div id="auth-title" class="subtitle">HESABA GİRİŞ</div>
        </div>

        <input type="text" id="username" class="auth-input" placeholder="USERNAME" maxlength="12">
        <input type="password" id="password" class="auth-input" placeholder="PASSWORD">
        
        <div id="referral-container">
            <span class="ref-label">VARSINIZSA REFERAL KODU DAXİL EDİN</span>
            <input type="text" id="referral-code" class="auth-input" placeholder="REFERRAL CODE (OPSİONAL)">
        </div>
        
        <button class="action-btn" id="main-btn" onclick="handleAuth()">DAXİL OL</button>
        
        <div class="toggle-text" id="toggle-link" onclick="toggleMode()">Hesabınız yoxdur? <b>Qeydiyyatdan keçin</b></div>
        <div id="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeUser = localStorage.getItem('zerowallet_session');
        if (activeUser) {
            window.location.href = "main.html";
        }

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "HESABA GİRİŞ" : "YENİ QEYDİYYAT";
            document.getElementById('main-btn').innerText = isLoginMode ? "DAXİL OL" : "QEYDİYYAT OL";
            document.getElementById('toggle-link').innerHTML = isLoginMode ? "Hesabınız yoxdur? <b>Qeydiyyatdan keçin</b>" : "Artıq hesabınız var? <b>Giriş edin</b>";
            
            // Qeydiyyat modundadırsa referal sahəsini göstər
            document.getElementById('referral-container').style.display = isLoginMode ? "none" : "block";
        }

        async function handleAuth() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const refCode = document.getElementById('referral-code').value.trim();

            if (user.length < 3 || pass.length < 4) return showStatus("Məlumatlar qısadır!", "#ff3e3e");

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const cleanIp = ip.replace(/\./g, '_');

                const blockSnap = await db.ref('blocked_ips/' + cleanIp).once('value');
                if (blockSnap.exists()) {
                    return showStatus("GİRİŞ QADAĞANDIR!<br>Cihazınız bloklanıb.", "#ff3e3e");
                }

                const userRef = await db.ref('zerowallet_users/' + user).once('value');

                if (isLoginMode) {
                    if (!userRef.exists() || userRef.val().password !== pass) throw new Error("Giriş məlumatları səhvdir!");
                    loginSuccess(user);
                } else {
                    if (userRef.exists()) throw new Error("Bu username doludur!");
                    
                    const ipLog = await db.ref('ip_logs/' + cleanIp).once('value');
                    if (ipLog.exists()) throw new Error("Bu cihazdan artıq qeydiyyat var!");

                    // Yeni istifadəçi datası
                    const newUserCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                    let startBalance = 0;

                    // REFERAL YOXLAMA SİSTEMİ
                    if (refCode !== "") {
                        const allUsers = await db.ref('zerowallet_users').once('value');
                        let referrerUid = null;
                        
                        allUsers.forEach(child => {
                            if (child.val().inviteCode === refCode) {
                                referrerUid = child.key;
                            }
                        });

                        if (referrerUid) {
                            // 1. Dəvət edənə 2 AZN ver
                            await db.ref('zerowallet_users/' + referrerUid).transaction(data => {
                                if (data) {
                                    data.balance = (data.balance || 0) + 2.00;
                                    data.referralCount = (data.referralCount || 0) + 1;
                                }
                                return data;
                            });
                            // 2. Yeni gələnə 1 AZN ver
                            startBalance = 1.00;
                        } else {
                            throw new Error("Yanlış referal kodu!");
                        }
                    }

                    // İstifadəçini bazaya yaz
                    await db.ref('zerowallet_users/' + user).set({
                        username: user,
                        password: pass,
                        ip: ip,
                        balance: startBalance,
                        totalClicks: 0,
                        batchClicks: 0,
                        lastBatchTime: 0,
                        rocket: 'default',
                        inviteCode: newUserCode,
                        referralCount: 0,
                        isVip: false
                    });

                    await db.ref('ip_logs/' + cleanIp).set(user);
                    loginSuccess(user);
                }
            } catch (e) { showStatus(e.message, "#ff3e3e"); }
        }

        function loginSuccess(user) {
            localStorage.setItem('zerowallet_session', user);
            window.location.href = "main.html";
        }

        function showStatus(text, color) {
            const m = document.getElementById('status-msg');
            m.innerHTML = text; m.style.color = color;
        }
    </script>
</body>
</html>
