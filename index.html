<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root {
            --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07);
            --fun: #ff007a; --tools: #00dfff; --cyber: #00ff00; --gold: #ffd700;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            overflow-x: hidden; overflow-y: auto; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* TƏLİMAT EKRANI */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.7; text-align: center; max-width: 650px; min-height: 120px; text-shadow: 0 0 5px var(--cyber); }

        /* GİRİŞ SİSTEMİ */
        #view-login { display: none; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 2000; background: var(--bg); }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        /* ANA PANEL */
        #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin: 20px 0; }
        .stats-top { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }
        .card h3 { font-family: 'Syncopate'; font-size: 1rem; margin: 0; }

        /* ALƏTLƏR SİYAHISI */
        #tool-viewer { display: none; animation: slideUp 0.5s ease; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: inline-block; }

        /* MODAL VƏ SHOP */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 40px; overflow-y: auto; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div style="text-align:center;">
        <i class="fas fa-shield-halved" style="color:var(--cyber); font-size:2.5rem; margin-bottom:20px;"></i>
        <div id="typewriter" class="matrix-text"></div>
        <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">DAVAM ET</button>
    </div>
</section>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" onclick="handleLogin()">QOŞUL</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div>ÜMUMİ: <span style="color:var(--gold)">4120+</span></div>
        <div>ONLAYN: <span id="online-count" style="color:var(--gold)">0</span></div>
    </div>

    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS ARTIR</button>
            <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="toggleCategory('cyber-grid')" style="border-left: 6px solid var(--cyber);"><i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3>KİBER ƏMƏLİYYAT</h3></div>
        <div class="card" onclick="toggleCategory('tools-grid')" style="border-left: 6px solid var(--tools);"><i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3>ALƏTLƏR</h3></div>
        <div class="card" onclick="toggleCategory('fun-grid')" style="border-left: 6px solid var(--fun);"><i class="fas fa-heart" style="color:var(--fun)"></i><h3>ƏYLƏNCƏ</h3></div>
    </div>

    <div id="tool-viewer">
        <button class="back-btn" onclick="backToCategories()"><i class="fas fa-chevron-left"></i> KATEQORİYALARA QAYIT</button>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content"></div>
</div>

<script>
    // FİREBASE KONFİQURASİYASI
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // BÜTÜN 11 BÖLMƏ
    const toolGrids = {
        'cyber-grid': [
            {n: 'Wordlist Yaradıcı', f: 'wordlist.html', c: 800, i: 'fa-file-code'},
            {n: 'DDoS Stresser', f: 'ddos.html', c: 600, i: 'fa-radiation'},
            {n: 'SQL Skaner', f: 'sql_scan.html', c: 500, i: 'fa-database'},
            {n: 'Brute Force', f: 'brute.html', c: 500, i: 'fa-unlock-alt'}
        ],
        'tools-grid': [
            {n: 'Instagram Spy', f: 'insta_spy.html', c: 900, i: 'fa-instagram'},
            {n: 'Kamera Tələsi', f: 'trap.html', c: 500, i: 'fa-camera'},
            {n: 'IP İzləyici', f: 'ip.html', c: 0, i: 'fa-map-location-dot'},
            {n: 'Anonim Mail', f: 'mail.html', c: 0, i: 'fa-envelope-shield'}
        ],
        'fun-grid': [
            {n: 'Hədiyyə Çarxı', f: 'gift_wheel.html', c: 0, i: 'fa-gift'},
            {n: 'Gizli Test', f: 'secret_test.html', c: 0, i: 'fa-mask'},
            {n: 'Tarot Analizi', f: 'tarot.html', c: 0, i: 'fa-wand-sparkles'}
        ]
    };

    // MATRIX TƏLİMAT ANIMASİYASI
    const msg = "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu , istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal/legal işlər görməyə və buna bənzər işlərə təşviq etmir. Aşağıdaki ' Davam Et ' düyməsinə basaraq saytdan istifadə etdiyiniz halda etdiklərinizə özünüzün cavabdeh olacağınızı qəbul etmiş olursunuz.";
    let charIdx = 0;
    function typeWriter() {
        if(charIdx < msg.length) {
            document.getElementById('typewriter').innerHTML += msg.charAt(charIdx);
            charIdx++; setTimeout(typeWriter, 25);
        } else { document.getElementById('btn-agree').style.display = 'inline-block'; }
    }

    // TƏLİMATI QƏBUL ETMƏK
    function acceptDisclaimer() {
        document.getElementById('bg-music').play().catch(e => console.log("Musiqi aktivləşmədi"));
        document.getElementById('view-disclaimer').style.display = 'none';
        
        const session = localStorage.getItem('elite_session');
        if(session) showMenu(session);
        else document.getElementById('view-login').style.display = 'flex';
    }

    // GİRİŞ MƏNTİQİ
    async function handleLogin() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return alert("Açar çox qısadır!");

        const snap = await db.ref('users/' + user).get();
        if(snap.exists() && snap.val().isOnline) return alert("XƏTA: Bu hesab hal-hazırda istifadədədir!");

        if(!snap.exists()) {
            await db.ref('users/' + user).set({ points: 250, name: user, isOnline: true });
        } else {
            await db.ref('users/' + user).update({ isOnline: true });
        }

        localStorage.setItem('elite_session', user);
        showMenu(user);
    }

    function showMenu(user) {
        window.activeUser = user;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = user.toUpperCase();
        db.ref('users/' + user + '/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
        
        // Çıxanda onlayn statusu sıfırla
        window.onbeforeunload = () => { db.ref('users/' + user).update({ isOnline: false }); };
    }

    // NAVİQASİYA
    function toggleCategory(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-viewer').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => {
            grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.c})"><i class="fas ${t.i}" style="color:var(--tools)"></i><h3>${t.n}</h3><p>${t.c > 0 ? t.c + ' PTS' : 'PULSUZ'}</p></div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-viewer').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(file, cost) {
        const snap = await db.ref('users/' + window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("KİFAYƏT QƏDƏR PTS YOXDUR!");
        const res = await fetch(file); const html = await res.text();
        document.getElementById('tool-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }

    // DİNAMİK PULPAL SHOP SİSTEMİ
    function openShop() {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center; font-family:'Outfit'; padding:20px;">
                <h2 style="color:var(--gold); font-family:'Syncopate'; font-size:1rem; margin-bottom:20px;">PTS BALANSINI ARTIR</h2>
                <div style="background:rgba(255,255,255,0.02); padding:30px; border-radius:30px; border:1px solid var(--border);">
                    <p style="font-size:0.8rem; opacity:0.6; margin-bottom:15px;">Almaq istədiyiniz PTS miqdarını daxil edin:</p>
                    <input type="number" id="pts-input" placeholder="Məsələn: 500" oninput="updateShopPrice(this.value)"
                           style="width:100%; font-size:1.5rem; font-weight:900; padding:15px; background:#000; border:1px solid #333; color:var(--tools); border-radius:15px; text-align:center;">
                    <div style="margin-top:25px; padding:15px; border-top:1px dashed #222;">
                        <p style="font-size:0.9rem;">ÖDƏNİLƏCƏK MƏBLƏĞ:</p>
                        <h1 id="price-display" style="color:var(--cyber); margin:10px 0;">0.00 AZN</h1>
                    </div>
                    <button id="pay-btn" class="btn-main" onclick="goToPulpal()" style="background:var(--cyber); color:#000; display:none;">ÖDƏNİŞƏ KEÇİD ET</button>
                </div>
                <div id="proof-zone" style="display:none; margin-top:30px; border-top:1px solid #222; padding-top:20px;">
                    <p style="font-size:0.75rem; color:var(--gold); margin-bottom:15px;">ÖDƏNİŞ ÇEKİNİ YÜKLƏYİN:</p>
                    <input type="file" id="pay-ss" accept="image/*" style="width:100%; background:#050505; padding:10px; border:1px solid #222; border-radius:10px;">
                    <button class="btn-main" onclick="submitPayProof()">ADMİNƏ GÖNDƏR</button>
                </div>
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    let currentPrice = 0;
    let currentPts = 0;

    function updateShopPrice(val) {
        const pts = parseInt(val);
        if (pts > 0) {
            currentPts = pts;
            currentPrice = (pts * 0.02).toFixed(2);
            document.getElementById('price-display').innerText = currentPrice + " AZN";
            document.getElementById('pay-btn').style.display = "block";
        } else {
            document.getElementById('price-display').innerText = "0.00 AZN";
            document.getElementById('pay-btn').style.display = "none";
        }
    }

    function goToPulpal() {
        const url = `https://pay.pulpal.az/payment?uniqueCode=W-7qRM6ZmR&amount=${currentPrice}`;
        window.open(url, '_blank');
        document.getElementById('proof-zone').style.display = "block";
    }

    function submitPayProof() {
        const file = document.getElementById('pay-ss').files[0];
        if(!file) return alert("Çeki yükləyin!");
        const r = new FileReader();
        r.onload = async (e) => {
            await db.ref('pending_payments').push({
                user: localStorage.getItem('elite_session'),
                pts: currentPts,
                amount: currentPrice,
                screenshot: e.target.result,
                status: "pending",
                timestamp: Date.now()
            });
            alert("Məlumatlar adminə göndərildi!");
            closeTool();
        };
        r.readAsDataURL(file);
    }

    window.onload = typeWriter;
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 85) + 5; }, 3000);
</script>
</body>
</html>
