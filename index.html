<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackatron | Key Access Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; --fun: #ff007a; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; text-align: center; max-width: 650px; min-height: 120px; text-shadow: 0 0 5px var(--cyber); }

        /* UI SECTIONS */
        #view-login, #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin: 20px 0; backdrop-filter: blur(10px); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }
        .premium-tag { position: absolute; top: 15px; right: -30px; background: var(--gold); color: black; font-size: 0.6rem; font-weight: 900; padding: 5px 40px; transform: rotate(45deg); }

        #tool-list { display: none; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: inline-block; }
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 40px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">QƏBUL EDİRƏM</button>
</section>

<section id="view-login">
    <div class="login-card" style="background:var(--glass); padding:50px; border-radius:40px; border: 1px solid var(--border); text-align:center; width:340px; margin:100px auto;">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; color:var(--tools);">HACKATRON</h1>
        <input type="text" id="u-input" placeholder="NICKNAME">
        <button class="btn-main" onclick="handleLogin()">GİRİŞ</button>
    </div>
</section>

<section id="view-menu">
    <div class="navbar">
        <div style="font-weight:900;">USER: <span id="u-display" style="color:var(--tools);">...</span></div>
        <button onclick="window.open('https://t.me/+HQWNjQ9m6Xc0YjRi')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">KEY AL (TELEGRAM)</button>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')"><i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3>KİBER</h3></div>
        <div class="card" onclick="showTools('tools-grid')"><i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3>ALƏTLƏR</h3></div>
        <div class="card" onclick="showTools('fun-grid')"><i class="fas fa-heart" style="color:var(--fun)"></i><h3>ƏYLƏNCƏ</h3></div>
    </div>

    <div id="tool-list">
        <div class="back-btn" onclick="backToCategories()"><i class="fas fa-arrow-left"></i> GERİ</div>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 11 BÖLMƏ
    const toolGrids = {
        'cyber-grid': [
            {n:'Wordlist', i:'fa-file-code', f:'wordlist.html', p:1},
            {n:'DDoS', i:'fa-radiation', f:'ddos.html', p:1},
            {n:'SQL Skan', i:'fa-database', f:'sql.html', p:1},
            {n:'Brute Force', i:'fa-unlock', f:'brute.html', p:1}
        ],
        'tools-grid': [
            {n:'GPS Tracker', i:'fa-location-dot', f:'gps.html', p:1},
            {n:'Insta Spy', i:'fa-instagram', f:'insta.html', p:1},
            {n:'Camera Trap', i:'fa-camera', f:'trap.html', p:1},
            {n:'IP Tracker', i:'fa-globe', f:'ip.html', p:0},
            {n:'Anon Mail', i:'fa-envelope', f:'mail.html', p:0}
        ],
        'fun-grid': [
            {n:'Hədiyyə Çarxı', i:'fa-gift', f:'gift.html', p:0},
            {n:'Tarot', i:'fa-wand-sparkles', f:'tarot.html', p:0}
        ]
    };

    // LOGİN VƏ BLOK YOXLAMA
    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isBlocked) return alert("HESABINIZ BLOKLANIB!");
        
        localStorage.setItem('elite_session', u);
        await db.ref('users/'+u).update({ isOnline: true, lastLogin: Date.now() });
        showMenu(u);
    }

    // KEY SİSTEMİ İLƏ BÖLMƏ AÇMA
    async function openTool(file, isPremium) {
        if(isPremium === 0) return loadTool(file);

        const key = prompt("Premium Access Key daxil edin:");
        if(!key) return;

        const snap = await db.ref('keys/' + key.toUpperCase()).get();
        if(!snap.exists()) return alert("KEY TAPILMADI!");
        
        const data = snap.val();
        if(data.status !== "active") return alert("BU KEY DONDURULUB VƏ YA İSTİFADƏ EDİLİB!");
        if(data.expiry < Date.now()) return alert("KEYİN VAXTI BİTİB!");

        loadTool(file);
    }

    function loadTool(file) {
        fetch(file).then(r => r.text()).then(h => {
            document.getElementById('tool-content').innerHTML = h;
            document.getElementById('modal-overlay').style.display = 'block';
        }).catch(() => alert("Fayl tapılmadı!"));
    }

    // DİGƏR FUNKSİYALAR (Disclaimer, UI və s.) eynidir...
    const disText = "Məsuliyyəti qəbul edirsinizmi?"; let charIdx = 0;
    function typeWriter() { if (charIdx < disText.length) { document.getElementById('typewriter').innerHTML += disText.charAt(charIdx); charIdx++; setTimeout(typeWriter, 30); } else { document.getElementById('btn-agree').style.display='block'; } }
    function acceptDisclaimer() { document.getElementById('view-disclaimer').style.display='none'; if(localStorage.getItem('elite_session')) showMenu(localStorage.getItem('elite_session')); else document.getElementById('view-login').style.display='flex'; }
    function showMenu(u) { document.getElementById('view-login').style.display='none'; document.getElementById('view-menu').style.display='block'; document.getElementById('u-display').innerText=u.toUpperCase(); }
    function showTools(k) { document.getElementById('category-selector').style.display='none'; document.getElementById('tool-list').style.display='block'; const g=document.getElementById('active-grid'); g.innerHTML=""; toolGrids[k].forEach(t=>{ g.innerHTML+=`<div class="card" onclick="openTool('${t.f}', ${t.p})">${t.p?'<div class="premium-tag">KEY</div>':''}<i class="fas ${t.i}"></i><h3>${t.n}</h3></div>`; }); }
    function backToCategories() { document.getElementById('tool-list').style.display='none'; document.getElementById('category-selector').style.display='grid'; }
    function closeTool() { document.getElementById('modal-overlay').style.display='none'; }
    window.onload = typeWriter;
</script>
</body>
</html>
