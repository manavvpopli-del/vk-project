<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hackatron</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #020205; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* ƏSAS QATLAR - Donmanı önləmək üçün */
        .page-view { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; padding: 20px; transition: opacity 0.5s; background: #020205; }
        
        #view-disclaimer { z-index: 1000; opacity: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #view-login { z-index: 500; opacity: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #view-menu { z-index: 100; opacity: 0; pointer-events: none; }

        /* AKTİV QAT STİLİ */
        .active-view { opacity: 1 !important; pointer-events: auto !important; z-index: 800 !important; }

        .matrix-text { color: var(--cyber); font-family: monospace; text-align: center; margin-bottom: 20px; font-size: 0.9rem; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; text-align: center; margin-top: 10px; }
        
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<div id="view-disclaimer" class="page-view">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:200px; background:var(--cyber);" onclick="acceptDisclaimer()">DAVAM ET</button>
</div>

<div id="view-login" class="page-view">
    <h2 style="font-family:'Syncopate'; color:var(--tools);">HACKATRON</h2>
    <input type="text" id="u-input" placeholder="NICKNAME">
    <button class="btn-main" onclick="handleLogin()">QOŞUL</button>
</div>

<div id="view-menu" class="page-view">
    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px;">
        <div style="font-size:0.8rem;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <button onclick="window.open('https://t.me/+HQWNjQ9m6Xc0YjRi')" style="background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-size:0.6rem; font-weight:bold;">KEY AL</button>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')"><i class="fas fa-user-ninja"></i><br>KİBER</div>
        <div class="card" onclick="showTools('tools-grid')"><i class="fas fa-tools"></i><br>ALƏTLƏR</div>
        <div class="card" onclick="showTools('fun-grid')"><i class="fas fa-gamepad"></i><br>ƏYLƏNCƏ</div>
    </div>

    <div id="tool-list" style="display:none; margin-top:20px;">
        <button onclick="backToCategories()" style="background:none; border:1px solid #333; color:white; padding:10px; border-radius:10px; width:100%;">← GERİ</button>
        <div id="active-grid" class="grid"></div>
    </div>
</div>

<div id="modal-overlay">
    <button onclick="closeTool()" style="float:right; color:red; background:none; border:none; font-size:1.5rem;">X</button>
    <div id="tool-content" style="margin-top:50px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // BÖLMƏLƏR
    const toolGrids = {
        'cyber-grid': [{n:'Wordlist', f:'wordlist.html', p:1}, {n:'DDoS', f:'ddos.html', p:1}, {n:'SQL Scan', f:'sql.html', p:1}, {n:'Brute', f:'brute.html', p:1}],
        'tools-grid': [{n:'GPS Tracker', f:'gps.html', p:1}, {n:'WA Spy', f:'wa.html', p:1}, {n:'Insta Spy', f:'insta.html', p:1}, {n:'Camera', f:'trap.html', p:1}, {n:'IP', f:'ip.html', p:0}, {n:'Mail', f:'mail.html', p:0}],
        'fun-grid': [{n:'Çarx', f:'gift.html', p:0}, {n:'Test', f:'secret.html', p:0}, {n:'Tarot', f:'tarot.html', p:0}]
    };

    const disText = "Məsuliyyəti qəbul edərək Hackatrona daxil olursunuz. Xoş gəldiniz.";
    let charIdx = 0;

    function typeWriter() {
        if (charIdx < disText.length) {
            document.getElementById('typewriter').innerHTML += disText.charAt(charIdx);
            charIdx++; setTimeout(typeWriter, 30);
        } else { document.getElementById('btn-agree').style.display = 'block'; }
    }

    // App Inventor üçün kritik keçid funksiyası
    function switchView(toId) {
        document.querySelectorAll('.page-view').forEach(v => {
            v.classList.remove('active-view');
            v.style.opacity = "0";
        });
        const target = document.getElementById(toId);
        target.classList.add('active-view');
        setTimeout(() => { target.style.opacity = "1"; }, 50);
    }

    function acceptDisclaimer() {
        try { document.getElementById('bg-music').play(); } catch(e){}
        const session = localStorage.getItem('elite_session');
        if(session) {
            document.getElementById('u-display').innerText = session.toUpperCase();
            switchView('view-menu');
        } else {
            switchView('view-login');
        }
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        localStorage.setItem('elite_session', u);
        document.getElementById('u-display').innerText = u.toUpperCase();
        switchView('view-menu');
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const g = document.getElementById('active-grid'); g.innerHTML = "";
        toolGrids[key].forEach(t => {
            g.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})"><h3>${t.n}</h3>${t.p?'<small style="color:var(--gold)">KEY</small>':''}</div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(file, p) {
        if(p) {
            const k = prompt("Key daxil edin:");
            if(!k) return;
            const s = await db.ref('keys/'+k.toUpperCase()).get();
            if(!s.exists() || s.val().status !== 'active') return alert("Səhv key!");
        }
        fetch(file).then(r => r.text()).then(h => {
            document.getElementById('tool-content').innerHTML = h;
            document.getElementById('modal-overlay').style.display = 'block';
        });
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = typeWriter;
</script>
</body>
</html>
