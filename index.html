<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syncopate:wght@700&display=swap');
        body { margin: 0; background: #030303; color: white; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .login-box { background: rgba(255,255,255,0.02); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); text-align: center; width: 320px; box-shadow: 0 0 50px rgba(0,223,255,0.1); }
        h1 { font-family: 'Syncopate'; font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: white; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-connect { width: 100%; padding: 15px; border-radius: 12px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-connect:hover { background: #00dfff; transform: scale(1.02); }
        .fingerprint { margin-top: 30px; color: #00dfff; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .fingerprint:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="login-box">
    <h1>ELITE AURA</h1>
    <input type="text" id="username" placeholder="ACCESS ID">
    <button class="btn-connect" onclick="validateAccess()">CONNECT</button>
    
    <div class="fingerprint" onclick="bioAuth()">
        <i class="fas fa-fingerprint" style="font-size: 3rem;"></i>
        <p style="font-size: 0.6rem; margin-top: 10px; font-weight: 900;">BIOMETRIC LOGIN</p>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const getUID = () => navigator.userAgent.replace(/\D+/g, '') + window.screen.width;

    async function validateAccess() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        if(user.length < 3) return alert("ID çox qısadır!");

        const deviceID = getUID();
        const snap = await db.ref('users/' + user).get();

        if(!snap.exists()) {
            await db.ref('users/' + user).set({ points: 250, name: user, device: deviceID });
        } else {
            if(snap.val().device && snap.val().device !== deviceID) {
                return alert("XƏTA: BU HESAB BAŞQA CİHAZA BAĞLIDIR!");
            }
        }

        localStorage.setItem('elite_user', user);
        window.location.href = "menu.html"; // Giriş uğurludursa menyuya atır
    }

    function bioAuth() {
        const saved = localStorage.getItem('elite_user');
        if(!saved) return alert("Əvvəlcə bir dəfə manual giriş edin.");
        alert("Biometrik skan edilir...");
        window.location.href = "menu.html";
    }
</script>
</body>
</html>
