<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Access</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --secondary: #a855f7;
            --bg-dark: #0f172a; 
            --accent: #22d3ee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.2) 0px, transparent 50%);
        }

        .auth-container { 
            width: 92%; 
            max-width: 400px; 
            padding: 50px 30px; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(20px);
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-area { 
            font-family: 'Space Grotesk'; 
            font-size: 2.2rem; 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .subtitle { 
            font-size: 0.85rem; 
            color: #94a3b8; 
            margin-bottom: 35px; 
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group { position: relative; margin-bottom: 20px; }

        .auth-input { 
            width: 100%; 
            padding: 18px 25px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 2px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
            color: #fff; 
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: left;
        }

        .auth-input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .auth-input::placeholder { color: #475569; }

        .action-btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            border: none; 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: #fff; 
            font-size: 1.1rem;
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .action-btn:active { transform: scale(0.96); }

        .toggle-text { 
            margin-top: 25px; 
            font-size: 0.9rem; 
            color: #94a3b8; 
            cursor: pointer; 
        }

        .toggle-text b { color: var(--accent); }

        #status-msg { 
            margin-top: 20px; 
            font-size: 0.85rem; 
            font-weight: 700;
            min-height: 1.2rem;
            transition: 0.3s;
        }

        /* Arxa fon animasiyası */
        .glow-ball {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }
    </style>
</head>
<body>
    <div class="glow-ball"></div>

    <div class="auth-container">
        <div class="logo-area">ZERO.WALLET</div>
        <div id="auth-title" class="subtitle">SİSTEMƏ GİRİŞ</div>
        
        <div class="input-group">
            <input type="text" id="username" class="auth-input" placeholder="İstifadəçi adı" maxlength="12">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" class="auth-input" placeholder="Şifrə">
        </div>

        <button class="action-btn" id="main-btn" onclick="handleAuth()">DAXİL OL</button>
        
        <div class="toggle-text" id="toggle-link" onclick="toggleMode()">Hesabınız yoxdur? <b>Qeydiyyatdan keçin</b></div>
        
        <div id="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "SİSTEMƏ GİRİŞ" : "YENİ QEYDİYYAT";
            document.getElementById('main-btn').innerText = isLoginMode ? "DAXİL OL" : "QEYDİYYAT OL";
            document.getElementById('toggle-link').innerHTML = isLoginMode ? "Hesabınız yoxdur? <b>Qeydiyyatdan keçin</b>" : "Artıq hesabınız var? <b>Giriş edin</b>";
            document.getElementById('status-msg').innerText = "";
        }

        async function handleAuth() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3 || pass.length < 4) return showStatus("Məlumatlar çox qısadır!", "#ff4757");

            showStatus("Yoxlanılır...", var(--accent));

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const cleanIp = ip.replace(/\./g, '_');

                const blockSnap = await db.ref('blocked_ips/' + cleanIp).once('value');
                if (blockSnap.exists()) {
                    return showStatus("GİRİŞ QADAĞANDIR!<br>Cihaz bloklanıb.", "#ff4757");
                }

                const userRef = await db.ref('zerowallet_users/' + user).once('value');
                if (isLoginMode) {
                    if (!userRef.exists() || userRef.val().password !== pass) throw new Error("Məlumatlar səhvdir!");
                    loginSuccess(user);
                } else {
                    if (userRef.exists()) throw new Error("Bu istifadəçi adı artıq var!");
                    const ipLog = await db.ref('ip_logs/' + cleanIp).once('value');
                    if (ipLog.exists()) throw new Error("Bir cihazdan tək qeydiyyat mümkündür!");

                    await db.ref('zerowallet_users/' + user).set({
                        username: user, password: pass, ip: ip, balance: 0, clicks: 0, rocket: 'standart', invites: 0
                    });
                    await db.ref('ip_logs/' + cleanIp).set(user);
                    loginSuccess(user);
                }
            } catch (e) { showStatus(e.message, "#ff4757"); }
        }

        function loginSuccess(user) {
            localStorage.setItem('zerowallet_session', user);
            showStatus("Uğurlu! Yönləndirilir...", "#2ed573");
            setTimeout(() => { window.location.href = "main.html"; }, 1000);
        }

        function showStatus(text, color) {
            const m = document.getElementById('status-msg');
            m.innerHTML = text; m.style.color = color;
        }
    </script>
</body>
</html>
