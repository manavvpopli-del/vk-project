<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root {
            --bg: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
            --fun: #ff007a;
            --tools: #00dfff;
            --cyber: #00ff00;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            overflow-x: hidden; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* DİL PANELİ */
        .lang-bar { position: fixed; top: 20px; left: 20px; z-index: 10001; display: flex; gap: 8px; }
        .lang-node { background: var(--glass); border: 1px solid var(--border); color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 900; backdrop-filter: blur(10px); }
        .lang-node.active { background: white; color: black; border-color: white; }

        /* GİRİŞ EKRANI */
        #view-login { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 100; background: var(--bg); }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        /* ANA MENYU */
        #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 40px; backdrop-filter: blur(15px); }
        .stats-top { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }

        /* KATEGORİYA KARTLARI */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }
        .card h2, .card h3 { font-family: 'Syncopate'; font-size: 1rem; margin: 0; }
        .card p { font-size: 0.75rem; opacity: 0.5; margin-top: 15px; font-weight: 600; }

        /* ALƏTLƏR GÖRÜNÜŞÜ (TOOL VIEWER) */
        #tool-viewer { display: none; animation: slideUp 0.5s ease; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 900; }
        .back-btn:hover { background: white; color: black; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 40px; overflow-y: auto; }

        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; font-family: 'Outfit'; }
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* SHOP ÖZƏL STİLLƏR */
        .shop-card { border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; }
        .shop-card:hover { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>

<div class="lang-bar">
    <div class="lang-node active" id="btn-az" onclick="changeLang('az')">AZ</div>
    <div class="lang-node" id="btn-tr" onclick="changeLang('tr')">TR</div>
</div>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px;">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" id="txt-login-btn" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div><span id="txt-total">TOTAL USERS</span>: <span style="color:var(--gold)">3562+</span></div>
        <div><span style="color:#0f0">●</span> <span id="txt-online">ONLINE</span>: <span id="online-count" style="color:var(--gold)">0</span></div>
    </div>

    <div class="navbar">
        <div style="font-weight:900; letter-spacing:1px;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS SATIN AL</button>
            <div style="color:var(--gold); font-weight:900; background:rgba(255,215,0,0.1); padding:8px 20px; border-radius:15px; border:1px solid rgba(255,215,0,0.2);">
                <i class="fas fa-gem"></i> <span id="pts-display">0</span> PTS
            </div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="toggleCategory('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i>
            <h2 id="head-cyber">CYBER OPS</h2>
            <p id="desc-cyber">Advanced Offensive Tools</p>
        </div>
        <div class="card" onclick="toggleCategory('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i>
            <h2 id="head-tools">TOOLS</h2>
            <p id="desc-tools">Recon & Intelligence</p>
        </div>
        <div class="card" onclick="toggleCategory('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i>
            <h2 id="head-fun">FOR FUN</h2>
            <p id="desc-fun">Social & Entertainment</p>
        </div>
    </div>

    <div id="tool-viewer">
        <button class="back-btn" onclick="backToCategories()"><i class="fas fa-chevron-left"></i> <span id="txt-back">BACK</span></button>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" id="txt-close" style="position:fixed; top:25px; right:25px; padding:12px 30px; background:red; color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer; z-index:10001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DİL SİSTEMİ
    const langData = {
        az: {
            loginBtn: "SİSTEMƏ QOŞUL", input: "GİRİŞ AÇARI", total: "ÜMUMİ İSTİFADƏÇİ", online: "ONLAYN",
            back: "GERİ", close: "BAĞLA", cyber: "KİBER ƏMƏLİYYAT", tools: "ALƏTLƏR", fun: "ƏYLƏNCƏ",
            descCyber: "Hücum və Sızma Alətləri", descTools: "Kəşfiyyat və Analiz", descFun: "Sosial və Maraqlı Testlər",
            tWord: "Wordlist Yaradıcı", tDdos: "DDoS Stresser", tSql: "SQL Skaner", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tələsi", tIp: "IP İzləyici", tMail: "Anonim Mail",
            tGift: "Hədiyyə Çarxı", tSecret: "Gizli Həqiqətlər", tTarot: "Tarot Analizi"
        },
        tr: {
            loginBtn: "SİSTEME BAĞLAN", input: "ERİŞİM ANAHTARI", total: "TOPLAM KULLANICI", online: "ÇEVRİMİÇİ",
            back: "GERİ", close: "KAPAT", cyber: "SİBER OPERASYON", tools: "ARAÇLAR", fun: "EĞLENCE",
            descCyber: "Saldırı ve Sızma Araçları", descTools: "İstihbarat ve Analiz", descFun: "Sosyal ve İlginç Testler",
            tWord: "Wordlist Oluşturucu", tDdos: "DDoS Stresser", tSql: "SQL Tarayıcı", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tuzağı", tIp: "IP Takipçisi", tMail: "Anonim Mail",
            tGift: "Hediye Çarkı", tSecret: "Gizli Gerçekler", tTarot: "Tarot Analizi"
        }
    };

    const toolGrids = {
        'cyber-grid': [
            {id: 'tWord', icon: 'fa-file-code', color: 'var(--cyber)', file: 'wordlist.html', cost: 800},
            {id: 'tDdos', icon: 'fa-radiation', color: 'var(--cyber)', file: 'ddos.html', cost: 600},
            {id: 'tSql', icon: 'fa-database', color: 'var(--cyber)', file: 'sql_scan.html', cost: 500},
            {id: 'tBrute', icon: 'fa-unlock-alt', color: 'var(--cyber)', file: 'brute.html', cost: 500}
        ],
        'tools-grid': [
            {id: 'tInsta', icon: 'fa-instagram', color: 'var(--tools)', file: 'insta_spy.html', cost: 900},
            {id: 'tTrap', icon: 'fa-camera-retro', color: 'var(--tools)', file: 'trap.html', cost: 500},
            {id: 'tIp', icon: 'fa-map-location-dot', color: 'white', file: 'ip.html', cost: 0},
            {id: 'tMail', icon: 'fa-envelope-shield', color: 'white', file: 'mail.html', cost: 0}
        ],
        'fun-grid': [
            {id: 'tGift', icon: 'fa-gift', color: 'var(--fun)', file: 'gift_wheel.html', cost: 0},
            {id: 'tSecret', icon: 'fa-mask', color: 'var(--fun)', file: 'secret_test.html', cost: 0},
            {id: 'tTarot', icon: 'fa-wand-sparkles', color: 'var(--fun)', file: 'tarot.html', cost: 0}
        ]
    };

    function changeLang(lang) {
        localStorage.setItem('elite_lang', lang);
        document.querySelectorAll('.lang-node').forEach(n => n.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        const d = langData[lang];
        document.getElementById('txt-login-btn').innerText = d.loginBtn;
        document.getElementById('u-input').placeholder = d.input;
        document.getElementById('txt-total').innerText = d.total;
        document.getElementById('txt-online').innerText = d.online;
        document.getElementById('txt-back').innerText = d.back;
        document.getElementById('txt-close').innerText = d.close;
        document.getElementById('head-cyber').innerText = d.cyber;
        document.getElementById('head-tools').innerText = d.tools;
        document.getElementById('head-fun').innerText = d.fun;
        document.getElementById('desc-cyber').innerText = d.descCyber;
        document.getElementById('desc-tools').innerText = d.descTools;
        document.getElementById('desc-fun').innerText = d.descFun;
        window.dispatchEvent(new Event('langChanged'));
    }

    function toggleCategory(gridKey) {
        const lang = localStorage.getItem('elite_lang') || 'az';
        const d = langData[lang];
        const activeGrid = document.getElementById('active-grid');
        activeGrid.innerHTML = "";
        toolGrids[gridKey].forEach(tool => {
            activeGrid.innerHTML += `
                <div class="card" onclick="openTool('${tool.file}', ${tool.cost})" style="border-bottom: 4px solid ${tool.color};">
                    <i class="fas ${tool.icon}" style="color:${tool.color}"></i>
                    <h3>${d[tool.id]}</h3>
                    <p>${tool.cost > 0 ? tool.cost + ' PTS' : d.free || 'FREE'}</p>
                </div>
            `;
        });
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-viewer').style.display = 'block';
    }

    function backToCategories() {
        document.getElementById('category-selector').style.display = 'grid';
        document.getElementById('tool-viewer').style.display = 'none';
    }

    window.onload = () => { changeLang(localStorage.getItem('elite_lang') || 'az'); if(localStorage.getItem('elite_session')) showMenu(localStorage.getItem('elite_session')); };
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 101); }, 2000);

    async function handleLogin() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return;
        const dID = navigator.userAgent.replace(/\D+/g, '') + window.screen.width;
        const snap = await db.ref('users/' + user).get();
        if(snap.exists() && snap.val().device && snap.val().device !== dID) return alert("SECURE LOCK: ANOTHER DEVICE DETECTED!");
        if(!snap.exists()) await db.ref('users/' + user).set({ points: 250, name: user, device: dID });
        localStorage.setItem('elite_session', user);
        showMenu(user);
    }

    function showMenu(user) {
        window.activeUser = user;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = user.toUpperCase();
        document.getElementById('bg-music').play().catch(e => {});
        db.ref('users/' + user + '/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
    }

    async function openTool(file, cost) {
        const snap = await db.ref('users/' + window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("INSUFFICIENT PTS!");
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById('tool-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'block';
        const scripts = document.getElementById('tool-content').getElementsByTagName('script');
        for (let s of scripts) {
            const ns = document.createElement("script");
            ns.text = s.text;
            document.body.appendChild(ns).parentNode.removeChild(ns);
        }
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- YENİ PTS SATIN ALMA (SHOP) SİSTEMİ ---
    function openShop() {
        let content = `
            <div style="text-align:center; font-family:'Outfit'; animation: slideUp 0.5s ease;">
                <h2 style="font-family:'Syncopate'; color:var(--gold); font-size:1.1rem; margin-bottom:25px;">PTS STORE</h2>
                <div class="shop-card" onclick="buyer767(300, 9)">
                    <h3 style="margin:0;">300 PTS</h3>
                    <p style="color:var(--gold); font-weight:900; margin:5px 0;">9.00 USD</p>
                </div>
                <div class="shop-card" onclick="buyer767(600, 17)">
                    <h3 style="margin:0;">600 PTS</h3>
                    <p style="color:var(--gold); font-weight:900; margin:5px 0;">17.00 USD</p>
                </div>
                <div class="shop-card" onclick="buyer767(900, 30)">
                    <h3 style="margin:0;">900 PTS</h3>
                    <p style="color:var(--gold); font-weight:900; margin:5px 0;">30.00 USD</p>
                </div>
            </div>
        `;
        document.getElementById('tool-content').innerHTML = content;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function buyer767(pts, price) {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center; animation: fadeIn 0.5s ease;">
                <h3 style="color:var(--tools); font-family:'Syncopate'; font-size:0.8rem;">buyer767.html</h3>
                <p style="font-size:0.8rem; opacity:0.7;">Paket: <b>${pts} PTS</b> | Qiymət: <b>$${price}</b></p>
                <p style="font-size:0.7rem;">Davam etmək üçün istifadəçi adınızı daxil edin:</p>
                <input type="text" id="verify-user" placeholder="USERNAME" style="width:100%; border:1px solid var(--border);">
                <button class="btn-main" onclick="buyer555('${pts}', '${price}')">DAVAM ET</button>
            </div>
        `;
    }

    function buyer555(pts, price) {
        const inputName = document.getElementById('verify-user').value.trim().toLowerCase();
        const activeUser = localStorage.getItem('elite_session');

        if (inputName !== activeUser) {
            alert("XƏTA: İstifadəçi adı mövcud sessiya ilə uyğun deyil!");
            return;
        }

        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center; animation: fadeIn 0.5s ease;">
                <h3 style="color:var(--gold); font-family:'Syncopate'; font-size:0.8rem;">buyer555.html</h3>
                <iframe src="https://webbaze.lemonsqueezy.com/checkout/buy/a16608ca-422d-4516-998f-71c2907c2520?embed=1" 
                        style="width:100%; height:450px; border:none; border-radius:15px; background:white;"></iframe>
                <button class="btn-main" style="background:var(--tools);" onclick="buyer767_screenshot('${pts}')">ÖDƏNİŞ ETDİM / GERİ</button>
            </div>
        `;
    }

    function buyer767_screenshot(pts) {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center; animation: fadeIn 0.5s ease;">
                <h3 style="color:var(--cyber); font-family:'Syncopate'; font-size:0.8rem;">buyer767.html (Təsdiq)</h3>
                <p style="font-size:0.7rem; opacity:0.6;">Zəhmət olmasa ödəniş çekini (screenshot) yükləyin:</p>
                <input type="file" id="pay-screenshot" accept="image/*" style="border:1px dashed var(--cyber); padding:20px; font-size:0.7rem;">
                <button class="btn-main" onclick="submitToAdmin('${pts}')">ADMİNƏ GÖNDƏR</button>
            </div>
        `;
    }

    async function submitToAdmin(pts) {
        const fileInput = document.getElementById('pay-screenshot');
        if (!fileInput.files[0]) {
            alert("Zəhmət olmasa şəkil daxil edin!");
            return;
        }

        const user = localStorage.getItem('elite_session');
        const payRef = db.ref('pending_payments').push();
        await payRef.set({
            user: user,
            pts: pts,
            status: "pending",
            timestamp: new Date().getTime(),
            note: "Screenshot yükləndi, təsdiq gözləyir."
        });

        alert("Məlumatlar Admin Panelə göndərildi! Təsdiq edildikdən sonra PTS balansınıza oturacaq.");
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>
</body>
</html>
