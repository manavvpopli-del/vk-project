<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --fun-accent: #ff007a;
            --tools-accent: #00dfff;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            background: linear-gradient(135deg, #050505 0%, #0a0a1a 100%);
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-box {
            background: var(--glass); padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); backdrop-filter: blur(25px); text-align: center;
        }

        /* DASHBOARD */
        #app-dashboard { display: none; padding: 40px; max-width: 1200px; margin: auto; }

        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: var(--glass); border-radius: 20px;
            border: 1px solid var(--border); margin-bottom: 50px;
        }

        /* KATEQORİYA STİLLƏRİ */
        .category-label {
            font-family: 'Syncopate', sans-serif; font-size: 0.8rem;
            letter-spacing: 4px; margin: 40px 0 20px 0; display: flex; align-items: center; gap: 15px;
        }
        .fun-label { color: var(--fun-accent); }
        .tools-label { color: var(--tools-accent); }
        .line { flex-grow: 1; height: 1px; background: rgba(255,255,255,0.05); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        .card {
            background: var(--glass); padding: 30px; border-radius: 25px;
            border: 1px solid var(--border); cursor: pointer; transition: 0.4s;
            text-align: center;
        }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); }
        .fun-card:hover { border-color: var(--fun-accent); }
        .tools-card:hover { border-color: var(--tools-accent); }

        .card i { font-size: 2.2rem; margin-bottom: 15px; }
        .fun-card i { color: var(--fun-accent); }
        .tools-card i { color: var(--tools-accent); }

        /* MODAL */
        #modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 10000; overflow-y: auto; padding: 30px;
        }
        .close-btn {
            position: fixed; top: 20px; right: 20px; background: white; color: black;
            border: none; padding: 10px 25px; border-radius: 10px; font-weight: 900; cursor: pointer;
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            background: #111; color: white; text-align: center; margin-top: 15px;
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="login-screen">
    <div class="login-box">
        <h1 style="font-family:'Syncopate'; margin:0;">ELITE AURA</h1>
        <p style="opacity:0.4; font-size:0.7rem; letter-spacing:3px;">SYSTEM ACCESS KEY</p>
        <input type="text" id="u-input" placeholder="USERNAME">
        <button onclick="access()" style="width:100%; margin-top:20px; padding:15px; border-radius:12px; border:none; background:white; color:black; font-weight:900; cursor:pointer;">CONNECT</button>
    </div>
</div>

<div id="app-dashboard">
    <div class="top-nav">
        <div style="font-weight:900;">ID: <span id="u-tag" style="color:var(--tools-accent);">...</span></div>
        <div style="font-weight:900;"><i class="fas fa-gem" style="color:gold;"></i> <span id="pts-tag">0</span></div>
    </div>

    <div class="category-label fun-label"><i class="fas fa-ghost"></i> FOR FUN <div class="line"></div></div>
    <div class="grid">
        <div class="card fun-card" onclick="loadModule('secret_test.html')">
            <i class="fas fa-mask"></i>
            <h3>Gizli Həqiqətlər</h3>
            <p style="font-size:0.7rem; opacity:0.5;">Davranış Analizi (30 Sual)</p>
        </div>
        <div class="card fun-card" onclick="loadModule('tarot_elite.html')">
            <i class="fas fa-wand-sparkles"></i>
            <h3>Tarot Analizi</h3>
            <p style="font-size:0.7rem; opacity:0.5;">Mistik Proqnozlar</p>
        </div>
    </div>

    <div class="category-label tools-label"><i class="fas fa-terminal"></i> TOOLS <div class="line"></div></div>
    <div class="grid">
        <div class="card tools-card" onclick="loadModule('ip.html')">
            <i class="fas fa-map-pin"></i>
            <h3>IP Tracker</h3>
        </div>
        <div class="card tools-card" onclick="loadModule('trap.html')">
            <i class="fas fa-camera-retro"></i>
            <h3>Kamera Trap</h3>
        </div>
        <div class="card tools-card" onclick="loadModule('mail.html')">
            <i class="fas fa-envelope-open-text"></i>
            <h3>Anonim Mail</h3>
        </div>
        <div class="card tools-card" onclick="loadModule('ddos.html')">
            <i class="fas fa-microchip"></i>
            <h3>DDoS Simulator</h3>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <button class="close-btn" onclick="closeModule()">GERİ</button>
    <div id="module-content" style="margin-top:60px;"></div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", 
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function access() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return;

        const snap = await db.ref('users/' + user).get();
        if(!snap.exists()) {
            await db.ref('users/' + user).set({ points: 250, name: user });
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-dashboard').style.display = 'block';
        document.getElementById('u-tag').innerText = user.toUpperCase();
        
        // Musiqini başlat
        const audio = document.getElementById('bg-music');
        audio.play().catch(e => console.log("Musiqi avtomatik başlamadı, istifadəçi hərəkəti lazımdır."));

        db.ref('users/' + user + '/points').on('value', s => {
            document.getElementById('pts-tag').innerText = s.val() || 0;
        });
    }

    async function loadModule(file) {
        const overlay = document.getElementById('modal-overlay');
        const content = document.getElementById('module-content');
        
        try {
            const res = await fetch(file);
            if(!res.ok) throw new Error();
            const html = await res.text();
            content.innerHTML = html;
            
            // Script-ləri işə salmaq
            const scripts = content.getElementsByTagName('script');
            for (let s of scripts) {
                const newScript = document.createElement("script");
                newScript.text = s.text;
                document.body.appendChild(newScript).parentNode.removeChild(newScript);
            }
            
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        } catch(e) {
            alert(file + " faylı tapılmadı! Zəhmət olmasa faylı qovluğa əlavə edin.");
        }
    }

    function closeModule() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('module-content').innerHTML = "";
    }
</script>

</body>
</html>
