<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --fun: #ff007a;
            --tools: #00dfff;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; height: 100%; }

        /* --- 1. GİRİŞ EKRANI (LOGIN VIEW) --- */
        #view-login {
            display: flex; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #030303 100%);
        }
        .login-card {
            background: var(--glass); padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); backdrop-filter: blur(25px); text-align: center; width: 320px;
        }
        .login-card h1 { font-family: 'Syncopate'; font-size: 1.1rem; letter-spacing: 5px; margin-bottom: 30px; }
        
        /* --- 2. MENYU EKRANI (MAIN VIEW) --- */
        #view-main { display: none; padding: 40px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s; }
        
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); padding: 20px 30px; border-radius: 20px; border: 1px solid var(--border);
        }
        .pts-box { color: #ffd700; font-weight: 900; background: rgba(255,215,0,0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid #ffd700; }

        /* GRID VƏ KARTLAR */
        .section-title { font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 3px; margin: 50px 0 20px; display: flex; align-items: center; gap: 15px; }
        .line { flex: 1; height: 1px; background: var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        .fun-card:hover { border-color: var(--fun); }
        .tools-card:hover { border-color: var(--tools); }
        .card i { font-size: 3rem; margin-bottom: 20px; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 40px; overflow-y: auto; }
        
        /* COMMON STYLES */
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 15px; outline: none; }
        .btn-main { width: 100%; margin-top: 25px; padding: 15px; border-radius: 12px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-login">
    <div class="login-card">
        <h1>ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS ID">
        <button class="btn-main" onclick="systemAccess()">CONNECT</button>
        <div onclick="bioAccess()" style="margin-top:25px; cursor:pointer; color:var(--tools); opacity:0.7;">
            <i class="fas fa-fingerprint" style="font-size: 3rem;"></i>
            <p style="font-size:0.6rem; margin-top:10px; font-weight:900;">BIOMETRIC ACCESS</p>
        </div>
    </div>
</section>

<section id="view-main">
    <div class="top-nav">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div class="pts-box"><i class="fas fa-gem"></i> <span id="pts-display">0</span> PTS</div>
    </div>

    <div class="section-title" style="color:var(--fun)">FOR FUN <div class="line"></div></div>
    <div class="grid">
        <div class="card fun-card" onclick="openModule('secret_test.html', 400)"><i class="fas fa-mask" style="color:var(--fun)"></i><h3>Gizli Həqiqətlər</h3></div>
        <div class="card fun-card" onclick="openModule('tarot.html', 400)"><i class="fas fa-magic" style="color:var(--fun)"></i><h3>Tarot Analizi</h3></div>
    </div>

    <div class="section-title" style="color:var(--tools)">TOOLS <div class="line"></div></div>
    <div class="grid">
        <div class="card tools-card" onclick="openModule('insta_spy.html', 900)"><i class="fab fa-instagram" style="color:var(--tools)"></i><h3>Instagram Spy</h3></div>
        <div class="card tools-card" onclick="openModule('trap.html', 450)"><i class="fas fa-camera" style="color:var(--tools)"></i><h3>Camera Trap</h3></div>
        <div class="card tools-card" onclick="openModule('ip.html', 0)"><i class="fas fa-globe" style="color:var(--tools)"></i><h3>IP Tracker</h3></div>
        <div class="card tools-card" onclick="openModule('mail.html', 0)"><i class="fas fa-shield-halved" style="color:var(--tools)"></i><h3>Anonim Mail</h3></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeModule()" style="position:fixed; top:25px; right:25px; padding:12px 25px; background:red; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:900;">GERİ</button>
    <div id="module-content"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const getDeviceID = () => navigator.userAgent.replace(/\D+/g, '') + window.screen.width;

    async function systemAccess() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return alert("ID çox qısadır!");

        const dID = getDeviceID();
        const userRef = db.ref('users/' + user);
        const snap = await userRef.get();

        if(!snap.exists()) {
            await userRef.set({ points: 250, name: user, device: dID });
        } else {
            if(snap.val().device && snap.val().device !== dID) {
                return alert("XƏTA: BU HESAB BAŞQA CİHAZA KİLİDLƏNİB!");
            }
        }

        switchToMain(user);
    }

    function switchToMain(user) {
        window.activeUser = user;
        localStorage.setItem('elite_session', user);
        
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-main').style.display = 'block';
        document.getElementById('u-display').innerText = user.toUpperCase();
        document.getElementById('bg-music').play();

        db.ref('users/' + user + '/points').on('value', s => {
            document.getElementById('pts-display').innerText = s.val() || 0;
        });
    }

    async function bioAccess() {
        const saved = localStorage.getItem('elite_session');
        if(!saved) return alert("Əvvəlcə adınızla daxil olun.");
        alert("Barmaq izi doğrulanır...");
        switchToMain(saved);
    }

    async function openModule(file, cost) {
        const snap = await db.ref('users/' + window.activeUser).get();
        const pts = snap.val().points || 0;

        if(cost > 0 && pts < cost) return alert("Kifayət qədər xalınız yoxdur!");

        const res = await fetch(file);
        const html = await res.text();
        document.getElementById('module-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'block';

        const scripts = document.getElementById('module-content').getElementsByTagName('script');
        for (let s of scripts) {
            const ns = document.createElement("script");
            ns.text = s.text;
            document.body.appendChild(ns).parentNode.removeChild(ns);
        }
    }

    function closeModule() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('module-content').innerHTML = "";
    }
</script>

</body>
</html>
