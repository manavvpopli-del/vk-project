<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --fun: #ff007a; --tools: #00dfff; --cyber: #00ff00; --gold: #ffd700; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            overflow-y: auto; overflow-x: hidden; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); 
        }

        /* STICKY DİL PANELİ */
        .sticky-lang {
            position: sticky; top: 0; z-index: 11000; background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: center; gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .dis-lang { background: #111; border: 1px solid #333; color: #555; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 900; }
        .dis-lang.active { color: var(--tools); border-color: var(--tools); }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.7; text-align: center; max-width: 650px; min-height: 150px; text-shadow: 0 0 5px var(--cyber); }

        /* UI ELEMENTS */
        #view-login, #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); margin: 100px auto; }

        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin: 20px 0; }
        .stats-top { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }

        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 40px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div class="sticky-lang">
    <div class="dis-lang active" onclick="setLanguage('az')">AZ</div>
    <div class="dis-lang" onclick="setLanguage('tr')">TR</div>
    <div class="dis-lang" onclick="setLanguage('ru')">RU</div>
    <div class="dis-lang" onclick="setLanguage('en')">EN</div>
</div>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">ACCEPT</button>
</section>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" id="btn-connect" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div><span id="txt-total">TOTAL USERS</span>: <span style="color:var(--gold)">3562+</span></div>
        <div><span style="color:#0f0">●</span> <span id="txt-online">ONLINE</span>: <span id="online-count" style="color:var(--gold)">0</span></div>
    </div>

    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" id="btn-shop" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS SHOP</button>
            <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3 class="trans" data-key="cat_cyber">CYBER OPS</h3>
        </div>
        <div class="card" onclick="showTools('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3 class="trans" data-key="cat_tools">TOOLS</h3>
        </div>
        <div class="card" onclick="showTools('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i><h3 class="trans" data-key="cat_fun">FOR FUN</h3>
        </div>
    </div>

    <div id="tool-list" style="display:none;">
        <button class="btn-main" style="width:auto; padding:10px 25px; margin-bottom:20px;" onclick="backToCategories()" id="btn-back">BACK</button>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // TAM TƏRCÜMƏ BAZASI
    const lang = {
        az: {
            dis: "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal işlərə təşviq etmir. Davam edərək məsuliyyəti qəbul edirsiniz.",
            cat_cyber: "KİBER ƏMƏLİYYAT", cat_tools: "ALƏTLƏR", cat_fun: "ƏYLƏNCƏ",
            tWord: "Wordlist Yaradıcı", tDdos: "DDoS Stresser", tSql: "SQL Skaner", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tələsi", tIp: "IP İzləyici", tMail: "Anonim Mail",
            tGift: "Hədiyyə Çarxı", tSecret: "Gizli Həqiqətlər", tTarot: "Tarot Analizi",
            total: "ÜMUMİ İSTİFADƏÇİ", online: "ONLAYN", back: "GERİ", shop: "PTS AL"
        },
        tr: {
            dis: "Bu site aracılığıyla yapacağınız işlemlerden kurucu veya moderatör sorumlu değildir. Site yasa dışı işleri teşvik etmez. Sorumluluğu kabul ediyorsunuz.",
            cat_cyber: "SİBER OPERASYON", cat_tools: "ARAÇLAR", cat_fun: "EĞLENCE",
            tWord: "Wordlist Oluşturucu", tDdos: "DDoS Stresser", tSql: "SQL Tarayıcı", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tuzağı", tIp: "IP Takipçisi", tMail: "Anonim Mail",
            tGift: "Hediye Çarkı", tSecret: "Gizli Gerçekler", tTarot: "Tarot Analizi",
            total: "TOPLAM KULLANICI", online: "ÇEVRİMİÇİ", back: "GERİ", shop: "PTS AL"
        },
        ru: {
            dis: "Основатель или модератор не несут ответственности за действия через этот сайт. Сайт не поощряет незаконную деятельность. Вы принимаете ответственность.",
            cat_cyber: "КИБЕР ОПЕРАЦИИ", cat_tools: "ИНСТРУМЕНТЫ", cat_fun: "РАЗВЛЕЧЕНИЯ",
            tWord: "Генератор Wordlist", tDdos: "DDoS Stresser", tSql: "SQL Сканер", tBrute: "Brute Force",
            tInsta: "Инста Шпион", tTrap: "Ловушка Камеры", tIp: "IP Трекер", tMail: "Анонимная Почта",
            tGift: "Колесо Подарков", tSecret: "Тайные Истины", tTarot: "Таро Анализ",
            total: "ВСЕГО ПОЛЬЗОВАТЕЛЕЙ", online: "ОНЛАЙН", back: "НАЗАД", shop: "КУПИТЬ PTS"
        },
        en: {
            dis: "The founder or moderator is not responsible for any activation through this site. The site does not encourage illegal activities. You accept responsibility.",
            cat_cyber: "CYBER OPS", cat_tools: "TOOLS", cat_fun: "FOR FUN",
            tWord: "Wordlist Creator", tDdos: "DDoS Stresser", tSql: "SQL Scanner", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Camera Trap", tIp: "IP Tracker", tMail: "Anon Mail",
            tGift: "Gift Wheel", tSecret: "Secret Truths", tTarot: "Tarot Analysis",
            total: "TOTAL USERS", online: "ONLINE", back: "BACK", shop: "BUY PTS"
        }
    };

    // BÜTÜN 11 BÖLMƏ (SİLMƏDƏN)
    const toolGrids = {
        'cyber-grid': [
            {id: 'tWord', i: 'fa-file-code', c: 'var(--cyber)', f: 'wordlist.html', p: 800},
            {id: 'tDdos', i: 'fa-radiation', c: 'var(--cyber)', f: 'ddos.html', p: 600},
            {id: 'tSql', i: 'fa-database', c: 'var(--cyber)', f: 'sql_scan.html', p: 500},
            {id: 'tBrute', i: 'fa-unlock-alt', c: 'var(--cyber)', f: 'brute.html', p: 500}
        ],
        'tools-grid': [
            {id: 'tInsta', i: 'fa-instagram', c: 'var(--tools)', f: 'insta_spy.html', p: 900},
            {id: 'tTrap', i: 'fa-camera-retro', c: 'var(--tools)', f: 'trap.html', p: 500},
            {id: 'tIp', i: 'fa-map-location-dot', c: 'white', f: 'ip.html', p: 0},
            {id: 'tMail', i: 'fa-envelope-shield', c: 'white', f: 'mail.html', p: 0}
        ],
        'fun-grid': [
            {id: 'tGift', i: 'fa-gift', c: 'var(--fun)', f: 'gift_wheel.html', p: 0},
            {id: 'tSecret', i: 'fa-mask', c: 'var(--fun)', f: 'secret_test.html', p: 0},
            {id: 'tTarot', i: 'fa-wand-sparkles', c: 'var(--fun)', f: 'tarot.html', p: 0}
        ]
    };

    let curL = localStorage.getItem('elite_lang') || 'az';
    let charI = 0;

    function setLanguage(l) {
        curL = l; localStorage.setItem('elite_lang', l);
        document.querySelectorAll('.dis-lang').forEach(e => e.classList.remove('active'));
        event.target.classList.add('active');
        if(document.getElementById('view-disclaimer').style.display !== 'none') {
            document.getElementById('typewriter').innerHTML = ""; charI = 0; typeW();
        }
        updateUI();
    }

    function updateUI() {
        const d = lang[curL];
        document.getElementById('txt-total').innerText = d.total;
        document.getElementById('txt-online').innerText = d.online;
        document.getElementById('btn-back').innerText = d.back;
        document.getElementById('btn-shop').innerText = d.shop;
        document.querySelectorAll('.trans').forEach(e => e.innerText = d[e.getAttribute('data-key')]);
    }

    function typeW() {
        const t = lang[curL].dis;
        if (charI < t.length) {
            document.getElementById('typewriter').innerHTML += t.charAt(charI);
            charI++; setTimeout(typeW, 20);
        } else { document.getElementById('btn-agree').style.display = 'inline-block'; }
    }

    function acceptDisclaimer() {
        document.getElementById('bg-music').play();
        document.getElementById('view-disclaimer').style.display = 'none';
        const s = localStorage.getItem('elite_session');
        if(s) showMenu(s); else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isOnline) return alert("ACCOUNT BUSY!");
        await db.ref('users/'+u).update({ isOnline: true });
        localStorage.setItem('elite_session', u); showMenu(u);
    }

    function showMenu(u) {
        window.activeUser = u;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/points').on('value', s => document.getElementById('pts-display').innerText = s.val() || 0);
        updateUI();
        window.onbeforeunload = () => db.ref('users/'+u).update({ isOnline: false });
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const g = document.getElementById('active-grid'); g.innerHTML = "";
        toolGrids[key].forEach(t => {
            const name = lang[curL][t.id];
            g.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})">
                <i class="fas ${t.i}" style="color:${t.c}"></i><h3>${name}</h3><p>${t.p} PTS</p></div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(f, cost) {
        const snap = await db.ref('users/'+window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("PTS LOW!");
        const res = await fetch(f); const h = await res.text();
        document.getElementById('tool-content').innerHTML = h;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = () => { typeW(); updateUI(); setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 50) + 10; }, 2000); };
</script>
</body>
</html>
