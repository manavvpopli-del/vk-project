<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKATRON ELITE V1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00ff00; --premium: #ffd700; --media: #ff00ff; --game: #00ffff; --bg: #020205;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
        }

        /* --- TOP HEADER (İstifadəçi & Onlayn) --- */
        #top-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #111; background: rgba(0,0,0,0.5);
        }

        .online-status { display: flex; align-items: center; gap: 8px; font-size: 0.6rem; color: var(--accent); letter-spacing: 1px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- HAMBURGER MENU --- */
        #menu-trigger { cursor: pointer; z-index: 1001; }
        .line { width: 20px; height: 2px; background: var(--game); margin: 4px 0; transition: 0.3s; }

        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #050505; border-right: 1px solid var(--game); z-index: 1000;
            transition: 0.4s; padding-top: 60px;
        }
        .sidebar-item {
            padding: 18px 25px; border-bottom: 1px solid #111; cursor: pointer;
            display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 0.8rem;
        }

        /* --- DASHBOARD GRID --- */
        .container { padding: 20px; }
        .section-title { font-family: 'Syncopate'; font-size: 0.55rem; color: #444; margin: 25px 0 15px 5px; letter-spacing: 2px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .app-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .app-card i { font-size: 1.8rem; margin-bottom: 10px; }
        .app-card h3 { font-size: 0.75rem; margin: 0; font-weight: 900; }

        /* --- MODAL --- */
        #tool-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        #modal-body { flex: 1; overflow-y: auto; padding: 15px; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="top-header">
        <div id="menu-trigger" onclick="toggleSidebar()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <div style="text-align: center;">
            <div style="font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 2px;">İSMAİL</div>
        </div>
        <div class="online-status">
            <span id="user-count">1400</span> <div class="dot"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align: center; padding: 20px; border-bottom: 1px solid #111;">
            <i class="fas fa-user-shield" style="font-size: 2.5rem; color: var(--game);"></i>
            <p style="font-size: 0.6rem; color: #555; margin-top: 10px;">BSU SPECIAL NODE</p>
        </div>
        <div class="sidebar-item" onclick="openTool('multiplayer_games.html')">
            <i class="fas fa-gamepad" style="color: var(--game);"></i>
            <span>MULTIPLAYER OYUNLAR</span>
        </div>
        <div class="sidebar-item" onclick="toggleSidebar()" style="color: #444;">
            <i class="fas fa-arrow-left"></i> <span>GERİ QAYIT</span>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <div class="section-title">KİBER KƏŞFİYYAT</div>
        <div class="menu-grid">
            <div class="app-card" onclick="openTool('osint_user.html')">
                <i class="fas fa-fingerprint" style="color: var(--accent);"></i>
                <h3>User Tracker</h3>
            </div>
            <div class="app-card" onclick="openTool('mail.html')">
                <i class="fas fa-envelope-open-text" style="color: var(--premium);"></i>
                <h3>Ghost Mail</h3>
            </div>
        </div>

        <div class="section-title">SİSTEM ALƏTLƏRİ</div>
        <div class="menu-grid">
            <div class="app-card" onclick="openTool('movie_spy.html')">
                <i class="fas fa-film" style="color: var(--media);"></i>
                <h3>CineSpy</h3>
            </div>
            <div class="app-card" onclick="openTool('music_spy.html')">
                <i class="fas fa-compact-disc" style="color: var(--game);"></i>
                <h3>Music Intel</h3>
            </div>
        </div>
    </div>

    <div id="tool-modal">
        <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111;">
            <span style="font-size: 0.6rem; color: #555;">SYSTEM EXECUTING...</span>
            <i class="fas fa-times" onclick="closeModal()" style="cursor: pointer;"></i>
        </div>
        <div id="modal-body"></div>
    </div>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.style.left = sb.style.left === '0px' ? '-280px' : '0px';
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function updateOnline() {
            document.getElementById('user-count').innerText = Math.floor(Math.random() * (1460 - 1410) + 1410);
        }
        setInterval(updateOnline, 4000);

        function openTool(file) {
            if(document.getElementById('sidebar').style.left === '0px') toggleSidebar();
            const modal = document.getElementById('tool-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'flex';
            fetch(file).then(r => r.text()).then(h => {
                body.innerHTML = h;
                const scripts = body.querySelectorAll('script');
                scripts.forEach(s => { const ns = document.createElement('script'); ns.text = s.innerHTML; document.body.appendChild(ns); });
            });
        }

        function closeModal() { document.getElementById('tool-modal').style.display = 'none'; }
    </script>
</body>
</html>
