<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Global Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-y: auto; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* TRANSLATE FLOATING BUTTON */
        .auto-translate-btn {
            position: fixed; top: 20px; right: 20px; z-index: 20000;
            background: var(--cyber); color: black; border: none; padding: 12px 25px;
            border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); display: flex; align-items: center; gap: 10px;
        }

        /* MATRIX LOADING OVERLAY */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 30000; background: #000;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; text-align: center; max-width: 650px; text-shadow: 0 0 5px var(--cyber); }

        /* UI */
        #view-login, #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--cyber); }
        
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20001; padding: 40px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin" style="color:var(--cyber); font-size:3rem;"></i>
    <p style="color:var(--cyber); margin-top:20px; font-family:monospace; letter-spacing:3px;">DETECTING REGION...</p>
</div>

<button class="auto-translate-btn" onclick="autoDetectLanguage()">
    <i class="fas fa-language"></i> <span id="btn-detect-text">AUTO TRANSLATE</span>
</button>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">ACCEPT</button>
</section>

<section id="view-login">
    <div style="text-align:center; margin-top:100px;">
        <div class="login-card" style="background:var(--glass); padding:50px; border-radius:40px; border:1px solid var(--border); display:inline-block; width:340px;">
            <h1 style="font-family:'Syncopate'; font-size:1.1rem; color:var(--tools);">ELITE AURA</h1>
            <input type="text" id="u-input" placeholder="ACCESS KEY">
            <button class="btn-main" onclick="handleLogin()">CONNECT</button>
        </div>
    </div>
</section>

<section id="view-menu">
    <div style="display:flex; justify-content:center; gap:30px; margin-bottom:20px; opacity:0.6; font-size:0.7rem;">
        <div><span id="txt-total">TOTAL</span>: <span style="color:var(--gold)">4120</span></div>
        <div><span id="txt-online">ONLINE</span>: <span id="online-count" style="color:var(--cyber)">0</span></div>
    </div>
    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3 class="t-node" data-key="cat_cyber">CYBER OPS</h3>
        </div>
        <div class="card" onclick="showTools('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3 class="t-node" data-key="cat_tools">TOOLS</h3>
        </div>
        <div class="card" onclick="showTools('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i><h3 class="t-node" data-key="cat_fun">FOR FUN</h3>
        </div>
    </div>

    <div id="tool-list" style="display:none;">
        <button class="btn-main" style="width:auto; padding:10px 25px; margin-bottom:20px;" onclick="location.reload()" id="btn-back">BACK</button>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:40000;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DİLLƏR BAZASI
    const translations = {
        az: {
            dis: "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal işlərə təşviq etmir. Davam edərək məsuliyyəti qəbul edirsiniz.",
            cat_cyber: "KİBER ƏMƏLİYYAT", cat_tools: "ALƏTLƏR", cat_fun: "ƏYLƏNCƏ",
            tWord: "Wordlist Yaradıcı", tDdos: "DDoS Stresser", tSql: "SQL Skaner", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tələsi", tIp: "IP İzləyici", tMail: "Anonim Mail",
            tGift: "Hədiyyə Çarxı", tSecret: "Gizli Həqiqətlər", tTarot: "Tarot Analizi",
            total: "ÜMUMİ", online: "ONLAYN", back: "GERİ", detect: "DİLİ ALGILA"
        },
        tr: {
            dis: "Bu site aracılığıyla yapacağınız işlemlerden kurucu veya moderatör sorumlu değildir. Site yasa dışı işleri teşvik etmez. Sorumluluğu kabul ediyorsunuz.",
            cat_cyber: "SİBER OPERASYON", cat_tools: "ARAÇLAR", cat_fun: "EĞLENCE",
            tWord: "Wordlist Oluşturucu", tDdos: "DDoS Saldırısı", tSql: "SQL Tarayıcı", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Kamera Tuzağı", tIp: "IP Takipçisi", tMail: "Anonim Posta",
            tGift: "Hediye Çarkı", tSecret: "Gizli Gerçekler", tTarot: "Tarot Analizi",
            total: "TOPLAM", online: "ÇEVRİMİÇİ", back: "GERİ", detect: "DİLİ ALGILA"
        },
        ru: {
            dis: "Основатель или модератор не несут ответственности за действия через этот сайт. Сайт не поощряет незаконную деятельность. Вы принимаете ответственность.",
            cat_cyber: "КИБЕР ОПЕРАЦИИ", cat_tools: "ИНСТРУМЕНТЫ", cat_fun: "РАЗВЛЕЧЕНИЯ",
            tWord: "Генератор Wordlist", tDdos: "DDoS Атака", tSql: "SQL Сканер", tBrute: "Brute Force",
            tInsta: "Инста Шпион", tTrap: "Ловушка Камеры", tIp: "IP Трекер", tMail: "Анонимная Почта",
            tGift: "Колесо Подарков", tSecret: "Тайные Истины", tTarot: "Таро Анализ",
            total: "ВСЕГО", online: "ОНЛАЙН", back: "НАЗАД", detect: "ЯЗЫК"
        },
        en: {
            dis: "Founder or moderator is not responsible for any activation through this site. Site does not encourage illegal activities. You accept responsibility.",
            cat_cyber: "CYBER OPS", cat_tools: "TOOLS", cat_fun: "FOR FUN",
            tWord: "Wordlist Creator", tDdos: "DDoS Stresser", tSql: "SQL Scanner", tBrute: "Brute Force",
            tInsta: "Instagram Spy", tTrap: "Camera Trap", tIp: "IP Tracker", tMail: "Anon Mail",
            tGift: "Gift Wheel", tSecret: "Secret Truths", tTarot: "Tarot Analysis",
            total: "TOTAL", online: "ONLINE", back: "BACK", detect: "AUTO DETECT"
        }
    };

    const toolGrids = {
        'cyber-grid': [{id:'tWord', f:'wordlist.html', c:800, i:'fa-file-code', cl:'var(--cyber)'},{id:'tDdos', f:'ddos.html', c:600, i:'fa-radiation', cl:'var(--cyber)'},{id:'tSql', f:'sql_scan.html', c:500, i:'fa-database', cl:'var(--cyber)'},{id:'tBrute', f:'brute.html', c:500, i:'fa-unlock-alt', cl:'var(--cyber)'}],
        'tools-grid': [{id:'tInsta', f:'insta.html', c:900, i:'fa-instagram', cl:'var(--tools)'},{id:'tTrap', f:'trap.html', c:500, i:'fa-camera', cl:'var(--tools)'},{id:'tIp', f:'ip.html', c:0, i:'fa-location-dot', cl:'white'},{id:'tMail', f:'mail.html', c:0, i:'fa-envelope-shield', cl:'white'}],
        'fun-grid': [{id:'tGift', f:'gift.html', c:0, i:'fa-gift', cl:'var(--fun)'},{id:'tSecret', f:'secret.html', c:0, i:'fa-mask', cl:'var(--fun)'},{id:'tTarot', f:'tarot.html', c:0, i:'fa-wand-sparkles', cl:'var(--fun)'}]
    };

    let curL = localStorage.getItem('elite_lang') || 'az';
    let charI = 0;

    // REGİON ALGILAYICI (AUTO DETECT)
    async function autoDetectLanguage() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const country = data.country_code; // AZ, TR, RU, US və s.

            if(country === 'AZ') curL = 'az';
            else if(country === 'TR') curL = 'tr';
            else if(['RU', 'BY', 'KZ', 'UA'].includes(country)) curL = 'ru';
            else curL = 'en';

            localStorage.setItem('elite_lang', curL);
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                location.reload(); // Bütün strukturu yenidən yükləyir
            }, 1500);
        } catch (e) {
            curL = 'en';
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function updateUI() {
        const d = translations[curL];
        document.getElementById('txt-total').innerText = d.total;
        document.getElementById('txt-online').innerText = d.online;
        document.getElementById('btn-detect-text').innerText = d.detect;
        document.querySelectorAll('.t-node').forEach(e => e.innerText = d[e.getAttribute('data-key')]);
    }

    function typeW() {
        const t = translations[curL].dis;
        if (charI < t.length) {
            document.getElementById('typewriter').innerHTML += t.charAt(charI);
            charI++; setTimeout(typeW, 20);
        } else { document.getElementById('btn-agree').style.display = 'inline-block'; }
    }

    function acceptDisclaimer() {
        document.getElementById('bg-music').play();
        document.getElementById('view-disclaimer').style.display = 'none';
        const s = localStorage.getItem('elite_session');
        if(s) showMenu(s); else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        localStorage.setItem('elite_session', u);
        const snap = await db.ref('users/'+u).get();
        if(!snap.exists()) await db.ref('users/'+u).set({ points: 250, name: u, isOnline: true });
        else await db.ref('users/'+u).update({ isOnline: true });
        showMenu(u);
    }

    function showMenu(u) {
        window.activeUser = u;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/points').on('value', s => document.getElementById('pts-display').innerText = s.val() || 0);
        window.onbeforeunload = () => db.ref('users/'+u).update({ isOnline: false });
        updateUI();
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const g = document.getElementById('active-grid'); g.innerHTML = "";
        toolGrids[key].forEach(t => {
            g.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.c})">
                <i class="fas ${t.i}" style="color:${t.cl}"></i><h3>${translations[curL][t.id]}</h3><p>${t.c} PTS</p></div>`;
        });
    }

    async function openTool(f, cost) {
        const snap = await db.ref('users/'+window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("PTS LOW!");
        const res = await fetch(f); const h = await res.text();
        document.getElementById('tool-content').innerHTML = h;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = () => { typeW(); updateUI(); setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random()*40)+5; }, 2000); };
</script>
</body>
</html>
