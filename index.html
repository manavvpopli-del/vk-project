<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Intelligence & Global Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root {
            --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.08);
            --cyber: #00ff00; --tools: #00dfff; --fun: #ff007a; --gold: #ffd700;
        }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* GİRİŞ */
        #view-login { display: flex; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 2000; background: var(--bg); }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--border); margin: 20px; backdrop-filter: blur(15px); }
        .profile-btn { cursor: pointer; padding: 5px 12px; border-radius: 12px; border: 1px solid transparent; }
        .profile-btn:hover { background: rgba(0,223,255,0.1); border-color: var(--tools); }

        /* MENU */
        #view-menu { display: none; padding: 10px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--glass); padding: 40px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        .card i { font-size: 2.5rem; margin-bottom: 20px; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 20px; overflow-y: auto; backdrop-filter: blur(20px); }
        .modal-content { max-width: 500px; margin: 40px auto; background: #000; border-radius: 35px; border: 1px solid var(--border); padding: 30px; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; background: #ff0000; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: 900; cursor: pointer; }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #080808; color: white; margin-top: 15px; text-align: center; outline: none; }
        .btn { width: 100%; margin-top: 20px; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; background: white; color: black; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; color:var(--tools); letter-spacing:3px;">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="navbar">
        <div class="profile-btn" onclick="openGarage()">
            <div style="font-size: 0.6rem; opacity: 0.5;">ID PORTAL</div>
            <div id="u-display" style="font-weight:900; color:var(--tools);">USER</div>
        </div>
        <div style="font-weight:900; color:var(--gold); border-left: 1px solid #333; padding-left: 20px;">
            <span id="pts-display">0</span> PTS
        </div>
    </div>

    <div id="cat-grid" class="grid">
        <div class="card" onclick="openCat('cyber')" style="border-bottom: 4px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i>
            <h3>CYBER OPS</h3>
            <p style="font-size:0.7rem; opacity:0.5;">Advanced Security Tools</p>
        </div>
        <div class="card" onclick="openCat('tools')" style="border-bottom: 4px solid var(--tools);">
            <i class="fas fa-cart-shopping" style="color:var(--tools)"></i>
            <h3>PTS STORE</h3>
            <p style="font-size:0.7rem; opacity:0.5;">Google Pay / Global Payment</p>
        </div>
        <div class="card" onclick="openCat('fun')" style="border-bottom: 4px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i>
            <h3>FOR FUN</h3>
            <p style="font-size:0.7rem; opacity:0.5;">Social & Entertainment</p>
        </div>
    </div>

    <div id="tool-list" style="display:none; animation: fadeIn 0.5s;">
        <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer; padding:20px; font-weight:900;"><i class="fas fa-chevron-left"></i> GERİ</button>
        <div id="tool-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <div class="modal-content">
        <button class="close-x" onclick="closeModal()">X</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tools = {
        cyber: [
            { id: "wordlist", name: "Wordlist Creator", icon: "fa-terminal", cost: 500 },
            { id: "miner", name: "Neural Miner", icon: "fa-microchip", cost: 0 },
            { id: "ddos", name: "DDoS Stresser", icon: "fa-bolt", cost: 1000 }
        ],
        tools: [
            { id: "buy_300", name: "300 PTS ($9)", icon: "fa-gem", cost: 0 },
            { id: "buy_600", name: "600 PTS ($17)", icon: "fa-gem", cost: 0, best: true },
            { id: "buy_900", name: "900 PTS ($30)", icon: "fa-gem", cost: 0 },
            { id: "ip", name: "IP Tracker", icon: "fa-location-dot", cost: 0 }
        ],
        fun: [
            { id: "wheel", name: "Gift Wheel", icon: "fa-gift", cost: 0 },
            { id: "secret", name: "Secret Truths", icon: "fa-mask", cost: 0 }
        ]
    };

    async function handleLogin() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return;
        localStorage.setItem('elite_session', user);
        const snap = await db.ref('users/' + user).get();
        if(!snap.exists()) await db.ref('users/' + user).set({ points: 250, usd: 0, name: user });
        showMenu(user);
    }

    function showMenu(user) {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = user.toUpperCase();
        db.ref('users/' + user + '/points').on('value', s => document.getElementById('pts-display').innerText = s.val() || 0);
    }

    function openCat(cat) {
        const grid = document.getElementById('tool-grid');
        grid.innerHTML = "";
        tools[cat].forEach(t => {
            grid.innerHTML += `
                <div class="card" onclick="runTool('${t.id}')">
                    <i class="fas ${t.icon}" style="color:var(--${cat})"></i>
                    <h3>${t.name}</h3>
                    <p>${t.cost > 0 ? t.cost + ' PTS' : 'FREE / BUY'}</p>
                </div>`;
        });
        document.getElementById('cat-grid').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
    }

    function runTool(id) {
        const user = localStorage.getItem('elite_session');
        let body = "";

        // ÖDƏNİŞ SİSTEMİ (Lemon Squeezy + Google Pay)
        if(id.startsWith('buy_')) {
            let productId = "";
            if(id === 'buy_300') productId = "9_DOLLAR_PRODUCT_ID"; // Lemon Squeezy-dən gələn ID
            if(id === 'buy_600') productId = "17_DOLLAR_PRODUCT_ID";
            if(id === 'buy_900') productId = "30_DOLLAR_PRODUCT_ID";
            
            let checkoutUrl = `https://elitaura.lemonsqueezy.com/checkout/buy/${productId}?checkout[custom][user_id]=${user}`;
            window.location.href = checkoutUrl;
            return;
        }

        // DİGƏR BÖLMƏLƏR
        if(id === 'wordlist') {
            body = `<h3>WORDLIST</h3><input id="w-n" placeholder="Hədəf adı"><button class="btn" onclick="alert('Yaradıldı!')">YARAT</button>`;
        } else if(id === 'ip') {
            body = `<h3>IP TRACKER</h3><h1 id="ip-res">...</h1><button class="btn" onclick="fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>document.getElementById('ip-res').innerText=d.ip)">IP TAP</button>`;
        } else if(id === 'miner') {
            body = `<h3>NEURAL MINER</h3><p>PTS qazanmaq üçün sistemi aktiv saxla.</p><button class="btn" onclick="this.innerText='MINING...'">BAŞLAT</button>`;
        }

        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    async function openGarage() {
        const user = localStorage.getItem('elite_session');
        const usdSnap = await db.ref('users/' + user + '/usd').get();
        const usd = usdSnap.val() || 0;
        document.getElementById('modal-body').innerHTML = `
            <div style="text-align:center; background:linear-gradient(45deg, #1e522e, #000); padding:25px; border-radius:25px;">
                <p style="font-size:0.6rem; opacity:0.6;">INVESTMENT BALANCE</p>
                <h1 style="color:#2ecc71; font-size:2.5rem;">$${usd.toFixed(2)}</h1>
            </div>
            <h3 style="margin-top:20px; color:var(--gold);">FLEET MARKET</h3>
            <div style="background:#111; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span>Priora Miner ($5)</span><button class="btn" style="width:auto; margin:0; padding:8px 20px;" onclick="alert('Balans yetərsiz')">BUY</button>
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = () => { if(localStorage.getItem('elite_session')) showMenu(localStorage.getItem('elite_session')); }
</script>
</body>
</html>
