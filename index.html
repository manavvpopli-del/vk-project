<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --fun: #ff007a; --tools: #00dfff; --cyber: #00ff00; --gold: #ffd700; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; min-height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* DISCLAIMER / TƏLİMAT */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .dis-nav { position: absolute; top: 30px; display: flex; gap: 10px; }
        .dis-lang { background: #111; border: 1px solid #333; color: #555; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 900; }
        .dis-lang.active { color: var(--cyber); border-color: var(--cyber); }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.7; text-align: center; max-width: 650px; min-height: 120px; text-shadow: 0 0 5px var(--cyber); }

        /* LOGIN */
        #view-login { display: none; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 2000; background: var(--bg); }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        /* MENU */
        #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 40px; backdrop-filter: blur(15px); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }

        #tool-list { display: none; animation: slideUp 0.5s ease; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: inline-block; }

        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 40px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div class="dis-nav">
        <div class="dis-lang active" onclick="switchDisclaimer('az')">AZ</div>
        <div class="dis-lang" onclick="switchDisclaimer('tr')">TR</div>
        <div class="dis-lang" onclick="switchDisclaimer('ru')">RU</div>
        <div class="dis-lang" onclick="switchDisclaimer('en')">EN</div>
    </div>
    <div style="text-align:center;">
        <div id="typewriter" class="matrix-text"></div>
        <button id="btn-agree" class="btn-main" style="display:none; width:200px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">DAVAM ET</button>
    </div>
</section>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS SHOP</button>
            <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3>CYBER OPS</h3>
        </div>
        <div class="card" onclick="showTools('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3>TOOLS</h3>
        </div>
        <div class="card" onclick="showTools('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i><h3>FOR FUN</h3>
        </div>
    </div>

    <div id="tool-list">
        <div class="back-btn" onclick="backToCategories()"><i class="fas fa-chevron-left"></i> BACK TO CATEGORIES</div>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:10001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DİLLƏR VƏ ALƏTLƏR
    const discTexts = {
        az: "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal işlərə təşviq etmir. Davam etdiyiniz halda məsuliyyəti öz üzərinizə götürürsünüz.",
        tr: "Bu site aracılığıyla yapacağınız herhangi bir aktivasyondan kurucu veya moderatör sorumlu değildir. Site yasa dışı işleri teşvik etmez. Devam ederek sorumluluğu kabul etmiş sayılırsınız.",
        ru: "Основатель или модератор не несут ответственности за любые действия, совершенные через этот сайт. Сайт не поощряет незаконную деятельность. Продолжая, вы принимаете на себя полную ответственность.",
        en: "The founder or moderator is not responsible for any activation made through this site. The site does not encourage illegal activities. By proceeding, you accept full responsibility."
    };

    const toolGrids = {
        'cyber-grid': [
            {id: 'Wordlist', i: 'fa-file-code', c: 'var(--cyber)', f: 'wordlist.html', p: 800},
            {id: 'DDoS', i: 'fa-radiation', c: 'var(--cyber)', f: 'ddos.html', p: 600},
            {id: 'SQL Scan', i: 'fa-database', c: 'var(--cyber)', f: 'sql_scan.html', p: 500},
            {id: 'Brute Force', i: 'fa-unlock-alt', c: 'var(--cyber)', f: 'brute.html', p: 500}
        ],
        'tools-grid': [
            {id: 'Insta Spy', i: 'fa-instagram', c: 'var(--tools)', f: 'insta.html', p: 900},
            {id: 'Camera Trap', i: 'fa-camera', c: 'var(--tools)', f: 'trap.html', p: 500},
            {id: 'IP Track', i: 'fa-location-dot', c: 'white', f: 'ip.html', p: 0}
        ],
        'fun-grid': [
            {id: 'Gift Wheel', i: 'fa-gift', c: 'var(--fun)', f: 'gift.html', p: 0},
            {id: 'Secret Test', i: 'fa-mask', c: 'var(--fun)', f: 'secret.html', p: 0},
            {id: 'Tarot', i: 'fa-wand-sparkles', c: 'var(--fun)', f: 'tarot.html', p: 0}
        ]
    };

    // TƏLİMAT SİSTEMİ
    let currentLang = 'az';
    let charIdx = 0;
    let isTyping = true;

    function typeWriter() {
        const text = discTexts[currentLang];
        if (charIdx < text.length && isTyping) {
            document.getElementById('typewriter').innerHTML += text.charAt(charIdx);
            charIdx++;
            setTimeout(typeWriter, 20);
        } else {
            document.getElementById('btn-agree').style.display = 'inline-block';
            isTyping = false;
        }
    }

    function switchDisclaimer(lang) {
        currentLang = lang;
        charIdx = 0;
        isTyping = true;
        document.getElementById('typewriter').innerHTML = "";
        document.getElementById('btn-agree').style.display = 'none';
        document.querySelectorAll('.dis-lang').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        typeWriter();
    }

    function acceptDisclaimer() {
        document.getElementById('bg-music').play();
        document.getElementById('view-disclaimer').style.display = 'none';
        const session = localStorage.getItem('elite_session');
        if(session) showMenu(session);
        else document.getElementById('view-login').style.display = 'flex';
    }

    // LOGİN VƏ NAVİQASİYA
    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isOnline) return alert("HESAB AKTİVDİR!");
        await db.ref('users/'+u).update({ isOnline: true });
        localStorage.setItem('elite_session', u);
        showMenu(u);
    }

    function showMenu(u) {
        window.activeUser = u;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
        window.onbeforeunload = () => db.ref('users/'+u).update({ isOnline: false });
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => {
            grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})">
                <i class="fas ${t.i}" style="color:${t.c}"></i><h3>${t.id}</h3><p>${t.p} PTS</p></div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(f, cost) {
        const snap = await db.ref('users/'+window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("PTS YETƏRSİZ!");
        const res = await fetch(f); const h = await res.text();
        document.getElementById('tool-content').innerHTML = h;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function openShop() {
        document.getElementById('tool-content').innerHTML = `<div style="text-align:center;"><h2>SHOP</h2><button class="btn-main" onclick="alert('Proceed to LemonSqueezy')">300 PTS - $9</button></div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = typeWriter;
</script>
</body>
</html>
