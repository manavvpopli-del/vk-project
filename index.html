<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKATRON ELITE V1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00ff00; /* Kəşfiyyat Yaşılı */
            --premium: #ffd700; /* Elite Qızılı */
            --media: #ff00ff; /* Media Çəhrayı */
            --game: #00ffff; /* Oyun Firuzəyi */
            --bg: #020205;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* --- SIDEBAR & MENU --- */
        #menu-icon {
            position: fixed; top: 25px; left: 25px; z-index: 1001; cursor: pointer;
        }
        .bar {
            width: 25px; height: 3px; background: var(--game); margin: 5px 0;
            transition: 0.4s; box-shadow: 0 0 10px var(--game);
        }

        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #050505; border-right: 1px solid var(--game);
            z-index: 1000; transition: 0.5s; padding-top: 80px;
        }

        .sidebar-item {
            padding: 15px 25px; border-bottom: 1px solid #111; cursor: pointer;
            display: flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .sidebar-item:hover {
            background: rgba(0, 255, 255, 0.1);
            border-left: 4px solid var(--game);
            padding-left: 35px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 999;
        }

        /* --- DASHBOARD --- */
        .container { padding: 80px 20px 20px 20px; }

        .section-title {
            font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 3px;
            color: #444; margin: 30px 0 15px 5px; text-transform: uppercase;
        }

        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 25px 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .app-card:active { transform: scale(0.95); }
        .app-card i { font-size: 1.8rem; margin-bottom: 10px; }
        .app-card h3 { font-size: 0.75rem; margin: 0; font-weight: 900; letter-spacing: 1px; }

        .key-badge {
            position: absolute; top: 10px; right: 10px; font-size: 0.5rem;
            padding: 2px 6px; border-radius: 4px; font-weight: 900;
        }

        /* --- MODAL --- */
        #tool-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        .modal-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #111;
        }
        #modal-body { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- RADAR ANIMATION --- */
        .radar {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--accent);
            position: fixed; top: 25px; right: 25px; opacity: 0.5;
        }
        .radar::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            border-top: 1px solid var(--accent); border-radius: 50%;
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="radar"></div>

    <div id="menu-icon" onclick="toggleSidebar()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="sidebar">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-ghost" style="font-size: 2rem; color: var(--game);"></i>
            <p style="font-family: 'Syncopate'; font-size: 0.6rem; margin-top: 10px;">ELITE SYSTEM</p>
        </div>

        <div class="sidebar-item" onclick="openTool('multiplayer_games.html', false)">
            <i class="fas fa-gamepad" style="color: var(--game);"></i>
            <span>MULTIPLAYER OYUNLAR</span>
        </div>
        
        <div class="sidebar-item" onclick="openTool('mail.html', false)">
            <i class="fas fa-user-secret" style="color: var(--premium);"></i>
            <span>GECİCİ MAİL (GHOST)</span>
        </div>

        <div class="sidebar-item" onclick="toggleSidebar()" style="opacity: 0.5;">
            <i class="fas fa-times"></i>
            <span>MENYUNU BAĞLA</span>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        
        <div class="section-title">OSINT & INTELLIGENCE</div>
        <div class="menu-grid">
            <div class="app-card" onclick="openTool('osint_user.html', true)">
                <div class="key-badge" style="background: var(--accent); color: #000;">OSINT</div>
                <i class="fas fa-fingerprint" style="color: var(--accent);"></i>
                <h3>User Tracker</h3>
            </div>
            <div class="app-card" onclick="openTool('mail.html', true)">
                <div class="key-badge" style="background: var(--premium); color: #000;">ELITE</div>
                <i class="fas fa-envelope-open-text" style="color: var(--premium);"></i>
                <h3>Ghost Mail</h3>
            </div>
        </div>

        <div class="section-title">ENTERTAINMENT NODE</div>
        <div class="menu-grid">
            <div class="app-card" onclick="openTool('movie_spy.html', false)">
                <i class="fas fa-film" style="color: var(--media);"></i>
                <h3>CineSpy</h3>
            </div>
            <div class="app-card" onclick="openTool('music_spy.html', false)">
                <i class="fas fa-compact-disc" style="color: var(--game);"></i>
                <h3>Music Intel</h3>
            </div>
        </div>

    </div>

    <div id="tool-modal">
        <div class="modal-header">
            <span id="modal-title" style="font-family: 'Syncopate'; font-size: 0.7rem; color: #888;">INTERNAL MODULE</span>
            <i class="fas fa-times" onclick="closeModal()" style="cursor: pointer; font-size: 1.2rem;"></i>
        </div>
        <div id="modal-body"></div>
    </div>

    <script>
        // SIDEBAR TOGGLE
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const bars = document.getElementsByClassName('bar');
            
            if (sb.style.left === '0px') {
                sb.style.left = '-280px';
                ov.style.display = 'none';
                bars[0].style.transform = 'none';
                bars[1].style.opacity = '1';
                bars[2].style.transform = 'none';
            } else {
                sb.style.left = '0px';
                ov.style.display = 'block';
                bars[0].style.transform = 'translateY(8px) rotate(45deg)';
                bars[1].style.opacity = '0';
                bars[2].style.transform = 'translateY(-8px) rotate(-45deg)';
            }
        }

        // TOOL LOADING SYSTEM
        function openTool(file, isElite) {
            if(document.getElementById('sidebar').style.left === '0px') toggleSidebar();
            
            const modal = document.getElementById('tool-modal');
            const body = document.getElementById('modal-body');
            
            modal.style.display = 'flex';
            body.innerHTML = '<div style="text-align:center; margin-top:100px; color:#444;"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>';

            fetch(file)
                .then(r => r.text())
                .then(html => {
                    body.innerHTML = html;
                    // Skriptləri yenidən aktivləşdir
                    const scripts = body.querySelectorAll('script');
                    scripts.forEach(s => {
                        const newS = document.createElement('script');
                        newS.text = s.innerHTML;
                        document.body.appendChild(newS);
                    });
                })
                .catch(e => body.innerHTML = "Module Error: " + e);
        }

        function closeModal() {
            document.getElementById('tool-modal').style.display = 'none';
            document.getElementById('modal-body').innerHTML = '';
        }
    </script>
</body>
</html>
