<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zerowallet - Giriş</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-cyan: #00f2ff; --bg-dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 90%;
            max-width: 380px;
            padding: 40px 25px;
            background: #0d0d0d;
            border-radius: 25px;
            border: 1px solid #1a1a1a;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo-area {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            color: var(--main-cyan);
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .subtitle {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .auth-input {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #222;
            border-radius: 15px;
            color: var(--main-cyan);
            font-family: 'Orbitron';
            text-align: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        .auth-input:focus {
            border-color: var(--main-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: var(--main-cyan);
            color: #000;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        .login-btn:active {
            transform: scale(0.96);
        }

        .login-btn:disabled {
            background: #1a1a1a;
            color: #444;
            box-shadow: none;
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.8rem;
            min-height: 1.2rem;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #000;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">ZEROWALLET</div>
        <div class="subtitle">Secure Mining Systems</div>

        <div class="input-group">
            <input type="text" id="username-input" class="auth-input" placeholder="USERNAME" maxlength="12" spellcheck="false">
        </div>

        <button class="login-btn" id="login-btn" onclick="handleAuth()">
            <span id="btn-text">SİSTEMƏ DAXİL OL</span>
            <div class="loader" id="btn-loader"></div>
        </button>

        <div id="status-msg"></div>
    </div>

    <script>
        // FIREBASE KONFİQURASİYASI
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // AVTOMATİK GİRİŞ YOXLANIŞI
        if (localStorage.getItem('zerowallet_session')) {
            window.location.href = "main.html";
        }

        async function handleAuth() {
            const userField = document.getElementById('username-input');
            const username = userField.value.trim().toLowerCase();
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('btn-loader');
            const status = document.getElementById('status-msg');

            if (username.length < 3) {
                showStatus("Username ən az 3 hərf olmalıdır!", "#ff3e3e");
                return;
            }

            // UI Yüklənir vəziyyətinə gətirilir
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            showStatus("IP yoxlanılır və sistemə qoşulur...", "#888");

            try {
                // IP ÜNVANININ ALINMASI
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const cleanIp = ip.replace(/\./g, '_'); // Firebase '.' işarəsini qəbul etmir

                // 1. IP YOXLANIŞI
                const ipRef = await db.ref('ip_logs/' + cleanIp).once('value');
                const ipOwner = ipRef.val();

                if (ipOwner && ipOwner !== username) {
                    throw new Error("Bu cihazdan artıq '" + ipOwner + "' adına giriş edilib!");
                }

                // 2. USERNAME YOXLANIŞI
                const userRef = await db.ref('zerowallet_users/' + username).once('value');
                
                if (userRef.exists()) {
                    // İstifadəçi artıq var, sadəcə giriş edir
                    showStatus("Giriş təsdiqləndi! Yönləndirilir...", var(--main-cyan));
                } else {
                    // Yeni istifadəçi yaradılır
                    await db.ref('zerowallet_users/' + username).set({
                        username: username,
                        ip: ip,
                        balance: 0,
                        clicks: 0,
                        lastReset: 0,
                        rocket: 'standart',
                        joinedAt: Date.now()
                    });
                    // IP-ni bu username-ə bağla
                    await db.ref('ip_logs/' + cleanIp).set(username);
                    showStatus("Hesab yaradıldı! Xoş gəldiniz.", "#00ff41");
                }

                // Sessiyanı yadda saxla və yönləndir
                localStorage.setItem('zerowallet_session', username);
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1000);

            } catch (error) {
                showStatus(error.message || "Bağlantı xətası!", "#ff3e3e");
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function showStatus(text, color) {
            const msg = document.getElementById('status-msg');
            msg.innerText = text;
            msg.style.color = color;
        }
    </script>
</body>
</html>
