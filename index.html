<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
            --fun: #ff007a;
            --tools: #00dfff;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            overflow-x: hidden; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* DİL SEÇİMİ PANELİ */
        .lang-switcher {
            position: fixed; top: 20px; left: 20px; z-index: 10001;
            display: flex; gap: 10px;
        }
        .lang-btn {
            background: var(--glass); border: 1px solid var(--border);
            color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.7rem; font-weight: 900;
        }
        .lang-btn:hover, .lang-btn.active { background: white; color: black; }

        /* --- GİRİŞ EKRANI --- */
        #view-login {
            display: flex; align-items: center; justify-content: center; height: 100vh;
            position: fixed; inset: 0; z-index: 100; background: var(--bg);
        }
        .login-card {
            background: var(--glass); padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); backdrop-filter: blur(30px); text-align: center; width: 340px;
        }

        /* --- MENYU EKRANI --- */
        #view-menu { 
            display: none; padding: 30px; max-width: 1200px; margin: auto; 
            animation: menuFade 0.8s ease;
        }

        @keyframes menuFade {
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .stats-header {
            display: flex; justify-content: center; gap: 30px; margin-bottom: 25px;
            font-family: 'Syncopate'; font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6;
        }
        .online-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #0f0; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); padding: 20px 40px; border-radius: 25px;
            border: 1px solid var(--border); backdrop-filter: blur(15px); margin-bottom: 40px;
        }

        .pts-badge { color: var(--gold); font-weight: 900; background: rgba(255,215,0,0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.2); }

        .section-header {
            font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 5px;
            margin: 50px 0 25px; display: flex; align-items: center; gap: 20px;
        }
        .line { flex: 1; height: 1px; background: linear-gradient(90deg, currentColor, transparent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: var(--glass); padding: 45px; border-radius: 40px;
            border: 1px solid var(--border); text-align: center; cursor: pointer;
        }
        .card:hover { transform: translateY(-12px) scale(1.03); border-color: rgba(255,255,255,0.2); }
        .card i { font-size: 3.2rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px currentColor); }
        .card p { font-size: 0.7rem; opacity: 0.4; margin-top: 10px; font-weight: 900; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 40px; overflow-y: auto; }
        
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        .btn-action { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="lang-btn active" onclick="setLanguage('az')">AZ</button>
    <button class="lang-btn" onclick="setLanguage('tr')">TR</button>
</div>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1rem; letter-spacing:5px;">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-action" id="btn-login" onclick="handleLogin()">CONNECT</button>
        <div onclick="bioLogin()" style="margin-top:35px; cursor:pointer; opacity:0.6;">
            <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--tools);"></i>
            <p id="bio-text" style="font-size:0.6rem; font-weight:900; margin-top:10px;">BIOMETRIC LOGIN</p>
        </div>
    </div>
</section>

<section id="view-menu">
    <div class="stats-header">
        <div><span id="txt-total">TOTAL USERS</span>: <span style="color:var(--gold)">3562+</span></div>
        <div><span class="online-dot"></span> <span id="txt-online">ONLINE</span>: <span id="online-count" style="color:var(--gold)">0</span></div>
    </div>

    <div class="navbar">
        <div style="font-weight:900; letter-spacing:1px;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div class="pts-badge"><i class="fas fa-gem"></i> <span id="pts-display">0</span> PTS</div>
    </div>

    <div class="section-header" style="color:var(--fun)"><span id="head-fun">FOR FUN</span> <div class="line"></div></div>
    <div class="grid">
        <div class="card" onclick="openTool('secret_test.html', 0)" style="border-bottom: 4px solid var(--fun);">
            <i class="fas fa-mask" style="color:var(--fun)"></i>
            <h3 id="tool-secret">Gizli Həqiqətlər</h3>
            <p id="free-1" style="color:#0f0">FREE</p>
        </div>
        <div class="card" onclick="openTool('tarot.html', 0)" style="border-bottom: 4px solid var(--fun);">
            <i class="fas fa-wand-sparkles" style="color:var(--fun)"></i>
            <h3 id="tool-tarot">Tarot Analizi</h3>
            <p id="free-2" style="color:#0f0">FREE</p>
        </div>
    </div>

    <div class="section-header" style="color:var(--tools)"><span id="head-tools">TOOLS</span> <div class="line"></div></div>
    <div class="grid">
        <div class="card" onclick="openTool('insta_spy.html', 900)" style="border-bottom: 4px solid var(--tools);">
            <i class="fab fa-instagram" style="color:var(--tools)"></i>
            <h3 id="tool-insta">Instagram Spy</h3>
            <p>900 PTS</p>
        </div>
        <div class="card" onclick="openTool('trap.html', 500)" style="border-bottom: 4px solid var(--tools);">
            <i class="fas fa-camera-retro" style="color:var(--tools)"></i>
            <h3 id="tool-trap">Camera Trap</h3>
            <p>500 PTS</p>
        </div>
        <div class="card" onclick="openTool('ip.html', 0)" style="border-bottom: 4px solid white;">
            <i class="fas fa-map-pin" style="color:white"></i>
            <h3 id="tool-ip">IP Tracker</h3>
            <p id="free-3" style="color:#0f0">FREE</p>
        </div>
        <div class="card" onclick="openTool('mail.html', 0)" style="border-bottom: 4px solid white;">
            <i class="fas fa-envelope-shield" style="color:white"></i>
            <h3 id="tool-mail">Anonim Mail</h3>
            <p id="free-4" style="color:#0f0">FREE</p>
        </div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" id="btn-close" style="position:fixed; top:25px; right:25px; padding:10px 25px; background:red; color:white; border:none; border-radius:10px; cursor:pointer;">X</button>
    <div id="tool-content" style="margin-top:50px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DİL DATA
    const languages = {
        az: {
            loginBtn: "SİSTEMƏ QOŞUL",
            bioText: "BARMAQ İZİ İLE GİRİŞ",
            userInput: "GİRİŞ AÇARI",
            total: "ÜMUMİ İSTİFADƏÇİ",
            online: "ONLAYN",
            headFun: "ƏYLƏNCƏ",
            headTools: "ALƏTLƏR",
            toolSecret: "Gizli Həqiqətlər",
            toolTarot: "Tarot Analizi",
            toolInsta: "Instagram Spy",
            toolTrap: "Kamera Tələsi",
            toolIp: "IP İzləyici",
            toolMail: "Anonim Mail",
            free: "PULSUZ",
            noPoints: "Xalınız kifayət deyil!",
            deviceError: "HESAB BAŞQA CİHAZDADIR!",
            close: "BAĞLA"
        },
        tr: {
            loginBtn: "SİSTEME BAĞLAN",
            bioText: "PARMAK İZİ İLE GİRİŞ",
            userInput: "ERİŞİM ANAHTARI",
            total: "TOPLAM KULLANICI",
            online: "ÇEVRİMİÇİ",
            headFun: "EĞLENCE",
            headTools: "ARAÇLAR",
            toolSecret: "Gizli Gerçekler",
            toolTarot: "Tarot Analizi",
            toolInsta: "Instagram Spy",
            toolTrap: "Kamera Tuzağı",
            toolIp: "IP Takipçisi",
            toolMail: "Anonim Mail",
            free: "ÜCRETSİZ",
            noPoints: "Puanınız yetersiz!",
            deviceError: "HESAP BAŞKA CİHAZDA!",
            close: "KAPAT"
        }
    };

    let currentLang = 'az';

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        const l = languages[lang];
        document.getElementById('btn-login').innerText = l.loginBtn;
        document.getElementById('bio-text').innerText = l.bioText;
        document.getElementById('u-input').placeholder = l.userInput;
        document.getElementById('txt-total').innerText = l.total;
        document.getElementById('txt-online').innerText = l.online;
        document.getElementById('head-fun').innerText = l.headFun;
        document.getElementById('head-tools').innerText = l.headTools;
        document.getElementById('tool-secret').innerText = l.toolSecret;
        document.getElementById('tool-tarot').innerText = l.toolTarot;
        document.getElementById('tool-insta').innerText = l.toolInsta;
        document.getElementById('tool-trap').innerText = l.toolTrap;
        document.getElementById('tool-ip').innerText = l.toolIp;
        document.getElementById('tool-mail').innerText = l.toolMail;
        document.getElementById('btn-close').innerText = l.close;
        document.querySelectorAll('[id^="free-"]').forEach(el => el.innerText = l.free);
    }

    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 101); }, 2000);

    const getUID = () => navigator.userAgent.replace(/\D+/g, '') + window.screen.width;

    async function handleLogin() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return;
        const dID = getUID();
        const snap = await db.ref('users/' + user).get();
        if(snap.exists() && snap.val().device && snap.val().device !== dID) return alert(languages[currentLang].deviceError);
        if(!snap.exists()) await db.ref('users/' + user).set({ points: 250, name: user, device: dID });
        localStorage.setItem('elite_session', user);
        showMenu(user);
    }

    function showMenu(user) {
        window.activeUser = user;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = user.toUpperCase();
        document.getElementById('bg-music').play().catch(e => {});
        db.ref('users/' + user + '/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
    }

    function bioLogin() {
        const saved = localStorage.getItem('elite_session');
        if(saved) showMenu(saved);
        else alert(currentLang === 'az' ? "Əvvəlcə giriş edin." : "Önce giriş yapın.");
    }

    async function openTool(file, cost) {
        const snap = await db.ref('users/' + window.activeUser).get();
        const pts = snap.val().points || 0;
        if(cost > 0 && pts < cost) return alert(languages[currentLang].noPoints);
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById('tool-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'block';
        const scripts = document.getElementById('tool-content').getElementsByTagName('script');
        for (let s of scripts) {
            const ns = document.createElement("script");
            ns.text = s.text;
            document.body.appendChild(ns).parentNode.removeChild(ns);
        }
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>

</body>
</html>
