<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07); --fun: #ff007a; --tools: #00dfff; --cyber: #00ff00; --gold: #ffd700; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* SCROLL PROBLEMİNİN HƏLLİ */
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; overflow-y: auto; /* Donmanı həll edən hissə */
            min-height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%); 
        }

        /* STICKY DİL PANELİ */
        .sticky-lang {
            position: sticky; top: 0; z-index: 11000; background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: center; gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .dis-lang { background: #111; border: 1px solid #333; color: #555; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 900; }
        .dis-lang.active { color: var(--tools); border-color: var(--tools); box-shadow: 0 0 10px rgba(0, 223, 255, 0.2); }

        /* DISCLAIMER */
        #view-disclaimer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .matrix-text { color: var(--cyber); font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.7; text-align: center; max-width: 650px; min-height: 150px; text-shadow: 0 0 5px var(--cyber); margin-top: 20px; }

        /* UI ELEMENTS */
        #view-login, #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        #view-login { align-items: center; justify-content: center; height: 80vh; }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin: 20px 0 40px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--tools); }
        .card i { font-size: 3.5rem; margin-bottom: 25px; }

        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 40px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div class="sticky-lang">
    <div class="dis-lang active" onclick="setLanguage('az')">AZ</div>
    <div class="dis-lang" onclick="setLanguage('tr')">TR</div>
    <div class="dis-lang" onclick="setLanguage('ru')">RU</div>
    <div class="dis-lang" onclick="setLanguage('en')">EN</div>
</div>

<section id="view-disclaimer">
    <div style="text-align:center;">
        <i class="fas fa-shield-halved" style="color:var(--cyber); font-size:2.5rem; margin-bottom:20px;"></i>
        <div id="typewriter" class="matrix-text"></div>
        <button id="btn-agree" class="btn-main" style="display:none; width:220px; background:transparent; border:1px solid var(--cyber); color:var(--cyber);" onclick="acceptDisclaimer()">ACCEPT & CONTINUE</button>
    </div>
</section>

<section id="view-login">
    <div class="login-card">
        <h1 id="txt-title" style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" id="btn-connect" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openShop()" id="btn-shop" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS SHOP</button>
            <div style="color:var(--gold); font-weight:900;"><span id="pts-display">0</span> PTS</div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="showTools('cyber-grid')" style="border-left: 6px solid var(--cyber);">
            <i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h3 class="cat-title" data-key="cat_cyber">CYBER OPS</h3>
        </div>
        <div class="card" onclick="showTools('tools-grid')" style="border-left: 6px solid var(--tools);">
            <i class="fas fa-shield-alt" style="color:var(--tools)"></i><h3 class="cat-title" data-key="cat_tools">TOOLS</h3>
        </div>
        <div class="card" onclick="showTools('fun-grid')" style="border-left: 6px solid var(--fun);">
            <i class="fas fa-heart" style="color:var(--fun)"></i><h3 class="cat-title" data-key="cat_fun">FOR FUN</h3>
        </div>
    </div>

    <div id="tool-list" style="display:none;">
        <button class="btn-main" style="width:auto; padding:10px 25px; margin-bottom:20px;" onclick="backToCategories()" id="btn-back">BACK</button>
        <div id="active-grid" class="grid"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:20001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // TƏRCÜMƏ MƏLUMATLARI
    const translations = {
        az: {
            dis: "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal işlərə təşviq etmir. Davam edərək məsuliyyəti qəbul edirsiniz.",
            btn_agree: "DAVAM ET", btn_connect: "QOŞUL", btn_back: "GERİ", cat_cyber: "KİBER ƏMƏLİYYAT", cat_tools: "ALƏTLƏR", cat_fun: "ƏYLƏNCƏ",
            t_word: "Wordlist Yaradıcı", t_ddos: "DDoS Hücumu", t_insta: "İnsta Casus", t_trap: "Kamera Tələsi", t_ip: "IP İzləyici"
        },
        tr: {
            dis: "Bu site aracılığıyla yapacağınız işlemlerden kurucu veya moderatör sorumlu değildir. Site yasa dışı işleri teşvik etmez. Devam ederek sorumluluğu kabul edersiniz.",
            btn_agree: "DEVAM ET", btn_connect: "BAĞLAN", btn_back: "GERİ", cat_cyber: "SİBER OPERASYON", cat_tools: "ARAÇLAR", cat_fun: "EĞLENCE",
            t_word: "Wordlist Oluşturucu", t_ddos: "DDoS Saldırısı", t_insta: "İnsta Casus", t_trap: "Kamera Tuzağı", t_ip: "IP Takipçisi"
        },
        ru: {
            dis: "Основатель или модератор не несут ответственности за действия через этот сайт. Сайт не поощряет незаконную деятельность. Продолжая, вы берете на себя ответственность.",
            btn_agree: "ПРОДОЛЖИТЬ", btn_connect: "ПОДКЛЮЧИТЬСЯ", btn_back: "НАЗАД", cat_cyber: "КИБЕР ОПЕРАЦИИ", cat_tools: "ИНСТРУМЕНТЫ", cat_fun: "РАЗВЛЕЧЕНИЯ",
            t_word: "Генератор Wordlist", t_ddos: "DDoS Атака", t_insta: "Инста Шпион", t_trap: "Ловушка Камеры", t_ip: "IP Трекер"
        },
        en: {
            dis: "The founder or moderator is not responsible for any activation made through this site. The site does not encourage illegal activities. By proceeding, you accept responsibility.",
            btn_agree: "PROCEED", btn_connect: "CONNECT", btn_back: "BACK", cat_cyber: "CYBER OPS", cat_tools: "TOOLS", cat_fun: "FOR FUN",
            t_word: "Wordlist Creator", t_ddos: "DDoS Stresser", t_insta: "Insta Spy", t_trap: "Camera Trap", t_ip: "IP Tracker"
        }
    };

    let curLang = 'az';
    let charIdx = 0;
    let isTyping = true;

    // DİLİ DƏYİŞMƏK
    function setLanguage(lang) {
        curLang = lang;
        localStorage.setItem('elite_lang', lang);
        document.querySelectorAll('.dis-lang').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        
        // Təlimat animasiyasını sıfırla
        if(document.getElementById('view-disclaimer').style.display !== 'none') {
            document.getElementById('typewriter').innerHTML = "";
            charIdx = 0; isTyping = true;
            typeWriter();
        }
        updateUI();
    }

    function updateUI() {
        const d = translations[curLang];
        document.getElementById('btn-agree').innerText = d.btn_agree;
        document.getElementById('btn-connect').innerText = d.btn_connect;
        if(document.getElementById('btn-back')) document.getElementById('btn-back').innerText = d.btn_back;
        
        document.querySelectorAll('.cat-title').forEach(el => {
            el.innerText = d[el.getAttribute('data-key')];
        });
    }

    function typeWriter() {
        const text = translations[curLang].dis;
        if (charIdx < text.length && isTyping) {
            document.getElementById('typewriter').innerHTML += text.charAt(charIdx);
            charIdx++;
            setTimeout(typeWriter, 20);
        } else {
            document.getElementById('btn-agree').style.display = 'inline-block';
        }
    }

    function acceptDisclaimer() {
        document.getElementById('bg-music').play();
        document.getElementById('view-disclaimer').style.display = 'none';
        const session = localStorage.getItem('elite_session');
        if(session) showMenu(session);
        else document.getElementById('view-login').style.display = 'flex';
    }

    async function handleLogin() {
        const u = document.getElementById('u-input').value.trim().toLowerCase();
        if(u.length < 3) return;
        const snap = await db.ref('users/'+u).get();
        if(snap.exists() && snap.val().isOnline) return alert("ACCOUNT BUSY!");
        await db.ref('users/'+u).update({ isOnline: true });
        localStorage.setItem('elite_session', u);
        showMenu(u);
    }

    function showMenu(u) {
        window.activeUser = u;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.getElementById('u-display').innerText = u.toUpperCase();
        db.ref('users/'+u+'/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
        window.onbeforeunload = () => db.ref('users/'+u).update({ isOnline: false });
        updateUI();
    }

    const toolGrids = {
        'cyber-grid': [{n:'t_word', i:'fa-file-code', c:'var(--cyber)', f:'wordlist.html', p:800},{n:'t_ddos', i:'fa-radiation', c:'var(--cyber)', f:'ddos.html', p:600}],
        'tools-grid': [{n:'t_insta', i:'fa-instagram', c:'var(--tools)', f:'insta.html', p:900},{n:'t_trap', i:'fa-camera', c:'var(--tools)', f:'trap.html', p:500},{n:'t_ip', i:'fa-location-dot', c:'white', f:'ip.html', p:0}],
        'fun-grid': [{n:'Gift Wheel', i:'fa-gift', c:'var(--fun)', f:'gift.html', p:0}]
    };

    function showTools(key) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-list').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        toolGrids[key].forEach(t => {
            const name = translations[curLang][t.n] || t.n;
            grid.innerHTML += `<div class="card" onclick="openTool('${t.f}', ${t.p})">
                <i class="fas ${t.i}" style="color:${t.c}"></i><h3>${name}</h3><p>${t.p} PTS</p></div>`;
        });
    }

    function backToCategories() {
        document.getElementById('tool-list').style.display = 'none';
        document.getElementById('category-selector').style.display = 'grid';
    }

    async function openTool(f, cost) {
        const snap = await db.ref('users/'+window.activeUser).get();
        if(cost > 0 && (snap.val().points || 0) < cost) return alert("PTS LOW!");
        const res = await fetch(f); const h = await res.text();
        document.getElementById('tool-content').innerHTML = h;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onload = typeWriter;
</script>
</body>
</html>
