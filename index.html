<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Fun & Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --fun-accent: #ff007a; /* Neon Çəhrayı */
            --tools-accent: #00dfff; /* Kiber Mavi */
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-box {
            background: var(--glass); padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); backdrop-filter: blur(20px); text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* DASHBOARD */
        #app-dashboard { display: none; padding: 40px; max-width: 1200px; margin: auto; }

        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: var(--glass); border-radius: 20px;
            border: 1px solid var(--border); margin-bottom: 50px;
        }

        /* KATEQORİYA BAŞLIQLARI */
        .category-label {
            font-family: 'Syncopate', sans-serif; font-size: 0.8rem;
            letter-spacing: 4px; margin: 50px 0 25px 0; display: flex; align-items: center; gap: 15px;
        }
        .fun-label { color: var(--fun-accent); }
        .tools-label { color: var(--tools-accent); }
        
        .line { flex-grow: 1; height: 1px; background: rgba(255,255,255,0.1); }

        /* GRID */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--glass); padding: 35px; border-radius: 30px;
            border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
            text-align: center; position: relative; overflow: hidden;
        }
        
        .item-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.07); }

        /* RƏNGLƏR */
        .fun-card:hover { border-color: var(--fun-accent); box-shadow: 0 10px 30px rgba(255, 0, 122, 0.1); }
        .tools-card:hover { border-color: var(--tools-accent); box-shadow: 0 10px 30px rgba(0, 223, 255, 0.1); }

        .fun-card i { color: var(--fun-accent); font-size: 2.5rem; margin-bottom: 15px; }
        .tools-card i { color: var(--tools-accent); font-size: 2.5rem; margin-bottom: 15px; }

        /* MODAL */
        #modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; padding: 40px;
        }

        .btn-close {
            position: absolute; top: 20px; right: 20px; background: red;
            color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            background: #111; color: white; text-align: center; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="font-family:'Syncopate'; margin-bottom: 5px;">ELITE AURA</h1>
        <p style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.4;">VIRTUAL ACCESS POINT</p>
        <input type="text" id="u-input" placeholder="ACCESS KEY (USERNAME)">
        <button onclick="accessSystem()" style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 12px; border: none; background: white; color: black; font-weight: 900; cursor: pointer;">CONNECT</button>
    </div>
</div>

<div id="app-dashboard">
    <div class="top-nav">
        <div style="font-weight: 900; letter-spacing: 1px;">ID: <span id="u-tag" style="color: var(--tools-accent);">...</span></div>
        <div style="font-weight: 900;"><i class="fas fa-gem" style="color: gold;"></i> <span id="pts-tag">0</span></div>
    </div>

    <div class="category-label fun-label">
        <i class="fas fa-star"></i> FOR FUN <div class="line"></div>
    </div>
    <div class="grid">
        <div class="item-card fun-card" onclick="openModule('Gizli Həqiqətlər')">
            <i class="fas fa-user-secret"></i>
            <h3>Gizli Həqiqətlər</h3>
            <p style="font-size: 0.75rem; opacity: 0.5;">Sevgilinin gizli tərəflərini üzə çıxar</p>
        </div>
        <div class="item-card fun-card" onclick="openModule('Tarot Analizi')">
            <i class="fas fa-wand-sparkles"></i>
            <h3>Tarot Analizi</h3>
            <p style="font-size: 0.75rem; opacity: 0.5;">Gələcəyin simvollarını kəşf et</p>
        </div>
        <div class="item-card fun-card" onclick="openModule('Liderlər Cədvəli')">
            <i class="fas fa-trophy"></i>
            <h3>Liderlər</h3>
            <p style="font-size: 0.75rem; opacity: 0.5;">Ən yüksək PTS sahibləri</p>
        </div>
    </div>

    <div class="category-label tools-label">
        <i class="fas fa-code"></i> TOOLS <div class="line"></div>
    </div>
    <div class="grid">
        <div class="item-card tools-card" onclick="openModule('IP Tracker')">
            <i class="fas fa-map-location-dot"></i>
            <h3>IP Tracker</h3>
        </div>
        <div class="item-card tools-card" onclick="openModule('Kamera Trap')">
            <i class="fas fa-camera"></i>
            <h3>Kamera Trap</h3>
        </div>
        <div class="item-card tools-card" onclick="openModule('Anonim Mail')">
            <i class="fas fa-envelope-circle-check"></i>
            <h3>Anonim Mail</h3>
        </div>
        <div class="item-card tools-card" onclick="openModule('DDoS Simulator')">
            <i class="fas fa-wind"></i>
            <h3>DDoS Simulyator</h3>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <button class="btn-close" onclick="closeModule()">BAĞLA</button>
    <div id="module-container" style="margin-top: 60px; text-align: center;"></div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", 
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function accessSystem() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return;

        const snap = await db.ref('users/' + user).get();
        if(!snap.exists()) {
            await db.ref('users/' + user).set({ points: 250, name: user });
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-dashboard').style.display = 'block';
        document.getElementById('u-tag').innerText = user.toUpperCase();

        db.ref('users/' + user + '/points').on('value', s => {
            document.getElementById('pts-tag').innerText = s.val() || 0;
        });
    }

    function openModule(name) {
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('module-container').innerHTML = `<h2>${name} Yüklənir...</h2><p>Bu modul üçün daxili skriptlər hazırlanır.</p>`;
    }

    function closeModule() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>

</body>
</html>
