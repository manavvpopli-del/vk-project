<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Aura | Digital Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root {
            --bg: #020205; --glass: rgba(255, 255, 255, 0.02); --border: rgba(255, 255, 255, 0.07);
            --fun: #ff007a; --tools: #00dfff; --cyber: #00ff00; --gold: #ffd700;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            overflow: hidden; min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* 1. TƏLİMAT EKRANI (DISCLAIMER) */
        #view-disclaimer {
            position: fixed; inset: 0; z-index: 5000; background: #000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .disclaimer-card {
            max-width: 600px; text-align: center; border: 1px solid #111; padding: 40px; border-radius: 30px;
            background: rgba(255,255,255,0.01); backdrop-filter: blur(10px);
        }
        .matrix-text {
            color: var(--cyber); font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; min-height: 100px;
        }

        /* 2. GİRİŞ EKRANI */
        #view-login { display: none; align-items: center; justify-content: center; height: 100vh; position: fixed; inset: 0; z-index: 2000; background: var(--bg); }
        .login-card { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 340px; backdrop-filter: blur(20px); }

        /* 3. ANA MENYU */
        #view-menu { display: none; padding: 30px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 20px 35px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); padding: 45px; border-radius: 40px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.05); }

        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: white; text-align: center; margin-top: 20px; outline: none; }
        .btn-main { width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 900; cursor: pointer; }
        .btn-cyber { background: transparent; border: 1px solid var(--cyber); color: var(--cyber); }
        .btn-cyber:hover { background: var(--cyber); color: black; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 40px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<section id="view-disclaimer">
    <div class="disclaimer-card">
        <i class="fas fa-exclamation-triangle" style="color:red; font-size:2rem; margin-bottom:20px;"></i>
        <div id="typewriter" class="matrix-text"></div>
        <button id="btn-agree" class="btn-main btn-cyber" style="display:none;" onclick="acceptDisclaimer()">DAVAM ET</button>
    </div>
</section>

<section id="view-login">
    <div class="login-card">
        <h1 style="font-family:'Syncopate'; font-size:1.1rem; letter-spacing:5px; margin-bottom:30px; color:var(--tools);">ELITE AURA</h1>
        <input type="text" id="u-input" placeholder="ACCESS KEY">
        <button class="btn-main" onclick="handleLogin()">CONNECT</button>
    </div>
</section>

<section id="view-menu">
    <div class="navbar">
        <div style="font-weight:900;">ID: <span id="u-display" style="color:var(--tools);">...</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="openPtsShop()" style="background:var(--gold); color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer; font-size:0.7rem;">PTS SATIN AL</button>
            <div style="color:var(--gold); font-weight:900; background:rgba(255,215,0,0.1); padding:8px 20px; border-radius:15px; border:1px solid rgba(255,215,0,0.2);">
                <i class="fas fa-gem"></i> <span id="pts-display">0</span> PTS
            </div>
        </div>
    </div>

    <div id="category-selector" class="grid">
        <div class="card" onclick="toggleCategory('cyber-grid')" style="border-left: 6px solid var(--cyber);"><i class="fas fa-user-ninja" style="color:var(--cyber)"></i><h2>CYBER OPS</h2></div>
        <div class="card" onclick="toggleCategory('tools-grid')" style="border-left: 6px solid var(--tools);"><i class="fas fa-shield-alt" style="color:var(--tools)"></i><h2>TOOLS</h2></div>
        <div class="card" onclick="toggleCategory('fun-grid')" style="border-left: 6px solid var(--fun);"><i class="fas fa-heart" style="color:var(--fun)"></i><h2>FOR FUN</h2></div>
    </div>

    <div id="tool-viewer" style="display:none;">
        <button class="btn-main" style="width:auto; padding:10px 20px;" onclick="location.reload()">GERİ</button>
        <div id="active-grid" class="grid" style="margin-top:20px;"></div>
    </div>
</section>

<div id="modal-overlay">
    <button onclick="closeTool()" style="position:fixed; top:25px; right:25px; background:red; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; z-index:10001;">X</button>
    <div id="tool-content" style="margin-top:40px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. TYPEWRITER (ANIMASIYA) MƏNTİQİ
    const disclaimerText = "Bu sayt vasitəsiylə edəcəyiniz hər hansı bir aktivasiyaya istər qurucu, istərsədə moderator cavabdehlik daşımır. Sayt sizi illegal/legal işlər görməyə və buna bənzər işlərə təşviq etmir. Aşağıdaki 'Davam Et' düyməsinə basaraq saytdan istifadə etdiyiniz halda etdiklərinizə özünüzün cavabdeh olacağınızı qəbul etmiş olursunuz.";
    let i = 0;

    function typeWriter() {
        if (i < disclaimerText.length) {
            document.getElementById("typewriter").innerHTML += disclaimerText.charAt(i);
            i++;
            setTimeout(typeWriter, 30; // Yazı sürəti
        } else {
            document.getElementById("btn-agree").style.display = "inline-block";
        }
    }

    function acceptDisclaimer() {
        document.getElementById('view-disclaimer').style.display = 'none';
        document.getElementById('view-login').style.display = 'flex';
        // Musiqini bura qoya bilərik ki, ilk klikdə başlasın
        document.getElementById('bg-music').play().catch(e => {});
    }

    window.onload = () => {
        typeWriter();
    };

    // 2. LOGİN VƏ MENYU MƏNTİQİ
    async function handleLogin() {
        const user = document.getElementById('u-input').value.trim().toLowerCase();
        if(user.length < 3) return alert("Access Key qısadır!");
        const dID = navigator.userAgent.replace(/\D+/g, '') + window.screen.width;
        const snap = await db.ref('users/' + user).get();
        if(snap.exists() && snap.val().device && snap.val().device !== dID) return alert("LOCK: Başqa cihaz!");
        if(!snap.exists()) await db.ref('users/' + user).set({ points: 250, name: user, device: dID });
        localStorage.setItem('elite_session', user);
        showMenu(user);
    }

    function showMenu(user) {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-menu').style.display = 'block';
        document.body.style.overflow = "auto";
        document.getElementById('u-display').innerText = user.toUpperCase();
        db.ref('users/' + user + '/points').on('value', s => { document.getElementById('pts-display').innerText = s.val() || 0; });
    }

    // --- PTS SHOP ---
    function openPtsShop() {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center;">
                <h2 style="color:var(--gold);">PTS MAĞAZA</h2>
                <button class="btn-main" onclick="buyer767(300)">300 PTS - $9</button>
                <button class="btn-main" onclick="buyer767(600)">600 PTS - $17</button>
                <button class="btn-main" onclick="buyer767(900)">900 PTS - $30</button>
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function buyer767(pts) {
        document.getElementById('tool-content').innerHTML = `
            <div style="text-align:center;">
                <h3>buyer767.html</h3>
                <input type="text" id="v-user" placeholder="Sənin ID-ni təsdiqlə">
                <button class="btn-main" onclick="buyer555('${pts}')">DAVAM ET</button>
            </div>`;
    }

    function buyer555(pts) {
        if(document.getElementById('v-user').value.toLowerCase() !== localStorage.getItem('elite_session')) return alert("Səhv ID!");
        document.getElementById('tool-content').innerHTML = `
            <iframe src="https://webbaze.lemonsqueezy.com/checkout/buy/a16608ca-422d-4516-998f-71c2907c2520?embed=1" style="width:100%; height:450px; border:none; background:white;"></iframe>
            <button class="btn-main" onclick="finalS('${pts}')">ÖDƏNİŞ ETDİM / SCREENSHOT</button>`;
    }

    function finalS(pts) {
        document.getElementById('tool-content').innerHTML = `
            <h3>SCREENSHOT YÜKLƏ</h3>
            <input type="file" id="pay-img" accept="image/*">
            <button class="btn-main" onclick="toAdmin('${pts}')">ADMİNƏ GÖNDƏR</button>`;
    }

    function toAdmin(pts) {
        const file = document.getElementById('pay-img').files[0];
        const r = new FileReader();
        r.onload = async (e) => {
            await db.ref('pending_payments').push({ user: localStorage.getItem('elite_session'), pts: pts, screenshot: e.target.result, status: "pending", timestamp: Date.now() });
            alert("Göndərildi!");
            closeTool();
        };
        r.readAsDataURL(file);
    }

    // DİGƏR FUNKSİYALAR
    function toggleCategory(k) {
        document.getElementById('category-selector').style.display = 'none';
        document.getElementById('tool-viewer').style.display = 'block';
        const grid = document.getElementById('active-grid'); grid.innerHTML = "";
        // Burada sənin əvvəlki toolGrids məntiqin olmalıdır
    }
    function closeTool() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
