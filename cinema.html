<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live - Ultimate Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00adb5; --bg: #050505; --card: #121212; --border: #252525; --text: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; }

        #animation-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; width: 100%; height: 100%; background: #050505; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 12px 24px; border-radius: 4px; font-size: 13px; font-weight: 600; z-index: 10001; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        /* AUTH DESIGN */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 6px; width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); position: relative; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--blue); font-size: 3.5rem; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 173, 181, 0.3); }
        
        .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 25px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #666; font-weight: 700; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
        
        .tab-content { display: none; flex-direction: column; }
        .tab-content.active { display: flex; }

        .avatar-upload { width: 85px; height: 85px; margin: 0 auto 20px; position: relative; cursor: pointer; border-radius: 50%; overflow: hidden; border: 2px solid var(--blue); transition: 0.3s; box-shadow: 0 0 15px rgba(0, 173, 181, 0.2); }
        #avatar-preview, #avatar-preview-join { width: 100%; height: 100%; object-fit: cover; }

        input { width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 4px; border: 1px solid var(--border); background: #151515; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); background: #1a1a1a; }
        input:disabled { background: #0c0c0c; color: var(--blue); font-weight: bold; font-size: 16px; letter-spacing: 2px; text-align: center; border-color: #333; }
        
        /* MODE SELECTOR */
        .mode-selector { display: flex; gap: 10px; margin-bottom: 14px; }
        .mode-btn { flex: 1; padding: 12px; background: #151515; border: 1px solid var(--border); color: #888; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .mode-btn.selected { background: rgba(0, 173, 181, 0.1); border-color: var(--blue); color: var(--blue); }

        .code-generator-wrapper { display: flex; gap: 8px; margin-bottom: 14px; width: 100%; }
        .code-generator-wrapper input { margin-bottom: 0; }
        .copy-btn { background: #1a1a1a; border: 1px solid var(--border); color: #fff; border-radius: 4px; padding: 0 15px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .copy-btn:hover { background: #252525; }

        .btn { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.2s; letter-spacing: 1px; }
        .btn:hover { opacity: 0.9; box-shadow: 0 5px 15px rgba(0, 173, 181, 0.4); }

        #app { display: none; height: 100%; width: 100%; flex-direction: column; position: relative; z-index: 1; }
        
        .theme-btn { position: absolute; top: 10px; right: 10px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 50%; border: 1px solid var(--border); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .theme-panel { position: absolute; top: 50px; right: 10px; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: none; z-index: 1000; width: 220px; }
        .anim-opt-btn { width: 100%; background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-align: left; cursor: pointer; transition: 0.2s; }
        .speed-panel { display: flex; gap: 5px; margin-top: 5px; }
        .speed-btn { flex: 1; background: #222; border: 1px solid var(--border); color: #fff; padding: 5px; font-size: 10px; border-radius: 4px; cursor: pointer; }
        .speed-btn.active { background: var(--blue); }

        .video-section { width: 100%; background: rgba(0,0,0,0.85); flex-shrink: 0; z-index: 10; border-bottom: 1px solid var(--border); position: relative; backdrop-filter: blur(5px); }
        #player-container { width: 100%; height: 211px; position: relative; background: #000; }
        #player { width: 100%; height: 100%; }
        
        /* SCREEN SHARE VIDEO ELEMENT */
        #screen-video { width: 100%; height: 100%; object-fit: contain; display: none; position: absolute; top: 0; left: 0; z-index: 5; background: #000; }

        .v-bar-cont { height: 25px; background: rgba(10,10,10,0.9); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 1px solid var(--border); }
        #v-time { font-size: 10px; font-weight: 700; color: #888; white-space: nowrap; }
        .v-progress { flex: 1; height: 4px; background: #333; position: relative; border-radius: 2px; }
        #v-fill { height: 100%; background: var(--blue); width: 0%; border-radius: 2px; }
        .admin-seek { cursor: pointer; }

        .controls-bar { background: rgba(10,10,10,0.9); padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .main-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .main-btns button { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        
        .voice-active { background: #2e7d32 !important; border-color: #4caf50 !important; font-weight: bold; }
        .voice-muted { background: #c62828 !important; border-color: #ef5350 !important; }
        .screen-active { background: #ff8f00 !important; border-color: #ffb300 !important; font-weight: bold; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .admin-tools { display: flex; flex-direction: column; gap: 10px; padding-top: 5px; }
        .search-box { display: flex; gap: 5px; }
        .search-box input { margin: 0; padding: 10px; font-size: 12px; }
        .search-box button { width: 70px; background: var(--blue); border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .queue-container { background: #111; padding: 8px; border-radius: 4px; border: 1px solid var(--border); max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 6px; font-size: 11px; border-radius: 4px; }
        .queue-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .queue-item button { background: none; border: none; color: #ff3333; cursor: pointer; font-weight: bold; }

        .users-panel { position: absolute; top: 60px; right: 10px; width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; display: none; z-index: 1000; max-height: 250px; overflow-y: auto; }
        .panel-header { padding: 10px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }
        #users-list-content { padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .u-item { display: flex; align-items: center; justify-content: space-between; padding: 6px; font-size: 12px; cursor: pointer; border-radius: 4px; }
        .u-item:hover { background: rgba(255,255,255,0.05); }
        .u-info { display: flex; align-items: center; gap: 8px; }
        .u-item img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
        .kick-btn { background: none; border: none; color: #c62828; cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 6px; }

        .chat-wrap { flex-grow: 1; display: flex; flex-direction: column; background: transparent; position: relative; overflow: hidden; z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        
        .m-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; position: relative; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
        .m-bubble-wrap { display: flex; flex-direction: column; gap: 2px; position: relative; cursor: pointer; }
        .m-bubble { background: rgba(26,26,26,0.85); padding: 10px; border-radius: 8px 8px 8px 2px; font-size: 13px; color: #eee; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .m-row.me .m-bubble { background: rgba(0, 173, 181, 0.9); border-radius: 8px 8px 2px 8px; color: #fff; border: none; }
        .system-msg { align-self: center; background: rgba(255,255,255,0.05); color: #aaa; font-size: 11px; padding: 4px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02); text-align: center; max-width: 90%; font-style: italic; }
        
        .reactions-container { display: flex; gap: 3px; position: absolute; bottom: -10px; left: 5px; z-index: 10; }
        .m-row.me .reactions-container { left: auto; right: 5px; }
        .react-badge { background: #222; border: 1px solid #333; border-radius: 8px; padding: 1px 5px; font-size: 10px; display: flex; align-items: center; }

        .react-popup { position: absolute; top: -35px; left: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 4px 8px; display: none; gap: 6px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .react-popup span { cursor: pointer; transition: 0.2s; font-size: 16px; }
        .react-popup span:hover { transform: scale(1.3); }

        #typing-status { position: absolute; bottom: 65px; left: 15px; font-size: 11px; font-style: italic; color: #ccc; display: none; text-shadow: 1px 1px 2px #000; }
        .input-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(17,17,17,0.9); padding: 10px; display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; backdrop-filter: blur(5px); }
        .input-bar input { margin: 0; background: #000; border: 1px solid #333; height: 40px; }
        .chat-icon { width: 30px; height: 30px; cursor: pointer; object-fit: contain; }
        .search-results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; max-height: 120px; overflow-y: auto; margin-bottom: 5px; }
        .res-card { position: relative; cursor: pointer; }
        .res-card img { width: 100%; border-radius: 4px; display: block; }
        .add-q-btn { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.8); border: 1px solid #555; color: #fff; font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 20000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 25px; width: 260px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); margin-bottom: 15px; }
        .profile-card h3 { font-size: 18px; margin-bottom: 5px; color: #fff; }
        .profile-card p { font-size: 12px; color: var(--blue); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        
        #remote-audios { display: none; }
    </style>
</head>
<body>
    <canvas id="animation-canvas"></canvas>
    <div id="toast"></div>
    <div id="remote-audios"></div>

    <!-- PROFILE MODAL -->
    <div id="profile-modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="profile-card" onclick="event.stopPropagation()">
            <img id="p-modal-img" src="">
            <h3 id="p-modal-name"></h3>
            <p id="p-modal-role"></p>
            <button class="btn" style="padding: 8px; font-size: 11px; margin-top: 15px;" onclick="document.getElementById('profile-modal').style.display='none'">BAĞLA</button>
        </div>
    </div>

    <!-- PREMIUM AUTH OVERLAY -->
    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">WATCH LIVE</div>
            
            <div class="auth-tabs">
                <button id="tab-create-btn" class="tab-btn active" onclick="switchTab('create')">Otaq Yarat</button>
                <button id="tab-join-btn" class="tab-btn" onclick="switchTab('join')">Otağa Qoşul</button>
            </div>

            <!-- CREATE ROOM TAB -->
            <div id="tab-create" class="tab-content active">
                <div class="avatar-upload" onclick="document.getElementById('file-input-create').click()">
                    <img id="avatar-preview" src="https://www.w3schools.com/howto/img_avatar.png">
                    <input type="file" id="file-input-create" hidden accept="image/*" onchange="previewImage(this, 'avatar-preview')">
                </div>
                <input type="text" id="nick-create" placeholder="LƏQƏBİNİZ (NICKNAME)">
                
                <!-- NEW ROOM MODE SELECTOR -->
                <div class="mode-selector">
                    <button id="mode-yt" class="mode-btn selected" onclick="selectRoomMode('youtube')">🍿 YouTube</button>
                    <button id="mode-screen" class="mode-btn" onclick="selectRoomMode('screen')">🖥️ Screen Share</button>
                </div>
                
                <div class="code-generator-wrapper">
                    <input type="text" id="room-create" placeholder="KOD GENERASİYA OLUNACAQ" disabled>
                    <button id="copy-code-btn" class="copy-btn" style="display: none;" onclick="copyCreatedCode()">Kopyala</button>
                </div>
                
                <button id="gen-btn" class="btn" onclick="generate6DigitCode()">KOD GENERASİYA ET</button>
                <button id="start-btn" class="btn" style="display: none; background: #2e7d32;" onclick="start('admin')">OTAĞI BAŞLAT</button>
            </div>

            <!-- JOIN ROOM TAB -->
            <div id="tab-join" class="tab-content">
                <div class="avatar-upload" onclick="document.getElementById('file-input-join').click()">
                    <img id="avatar-preview-join" src="https://www.w3schools.com/howto/img_avatar.png">
                    <input type="file" id="file-input-join" hidden accept="image/*" onchange="previewImage(this, 'avatar-preview-join')">
                </div>
                <input type="text" id="nick-join" placeholder="LƏQƏBİNİZ (NICKNAME)">
                <input type="text" id="room-join" placeholder="6 RƏQƏMLİ OTAQ KODU" maxlength="6">
                <button class="btn" onclick="start('member')">OTAĞA QOŞUL</button>
            </div>

        </div>
    </div>

    <div id="app">
        <div class="theme-btn" onclick="toggleThemePanel()">✨</div>
        <div id="theme-panel" class="theme-panel">
            <div style="font-size: 11px; margin-bottom: 8px; color: #888; font-weight: bold; text-transform: uppercase;">Animasiya Tərzi</div>
            <button class="anim-opt-btn" onclick="setAnimation('stars')">🌌 Parıldayan Ulduzlar</button>
            <button class="anim-opt-btn" onclick="setAnimation('waves')">🔮 Neon Dalğalar</button>
            <button class="anim-opt-btn" onclick="setAnimation('matrix')">🟢 Matris Yağışı</button>
            <div style="font-size: 10px; margin: 5px 0; color: #888; font-weight: bold; text-transform: uppercase;">Sürət Parametri</div>
            <div class="speed-panel">
                <button class="speed-btn" id="sp-slow" onclick="setSpeed(0.5)">Yavaş</button>
                <button class="speed-btn" id="sp-med" onclick="setSpeed(1)">Orta</button>
                <button class="speed-btn" id="sp-fast" onclick="setSpeed(2.5)">Sürətli</button>
            </div>
        </div>

        <div class="video-section">
            <div id="player-container">
                <div id="player"></div>
                <!-- SCREEN SHARE LAYER -->
                <video id="screen-video" autoplay playsinline></video>
            </div>
            <div class="v-bar-cont" id="progress-bar-wrapper">
                <span id="v-time">00:00 / 00:00</span>
                <div class="v-progress" id="v-seek-bar" onclick="handleSeek(event)">
                    <div id="v-fill"></div>
                </div>
            </div>
            <div class="controls-bar">
                <div class="main-btns">
                    <button id="voice-call-btn" onclick="toggleVoiceRoom()">🔊 SƏSLİ ZƏNGƏ QOŞUL</button>
                    <!-- SCREEN SHARE BUTTON FOR ADMIN -->
                    <button id="screen-share-btn" style="display:none;" onclick="toggleScreenShare()">🖥️ EKRANI PAYLAŞ</button>
                    <button onclick="toggleFS()">TAM EKRAN</button>
                    <button id="sync-fix-btn" style="display:none; color:var(--blue);" onclick="forceSync()">🔄 SİNXRON ET</button>
                    <button onclick="toggleUsers()">ÜZVLƏR (<span id="user-count">0</span>)</button>
                    <button id="admin-toggle-btn" onclick="toggleAdminPanel()" style="display:none; background:var(--blue); grid-column: span 2;">VİDEO PANEL</button>
                </div>
                <div id="admin-panel" class="admin-tools" style="display:none;">
                    <div style="display:flex; gap:5px;">
                        <button class="btn" style="background:#222; padding:8px; flex:1" onclick="seek(-10)">-10s</button>
                        <button class="btn" style="background:#2e7d32; padding:8px; flex:1" onclick="sc('play')">BAŞLAT</button>
                        <button class="btn" style="background:#c62828; padding:8px; flex:1" onclick="sc('pause')">DAYANDIR</button>
                        <button class="btn" style="background:#222; padding:8px; flex:1" onclick="seek(10)">+10s</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="sq" placeholder="Video axtar və ya link yapışdır...">
                        <button onclick="yt()">TAP</button>
                    </div>
                    <div id="results" class="search-results"></div>
                    <div style="font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase;">Növbədəki Videolar</div>
                    <div id="queue-box" class="queue-container"></div>
                </div>
            </div>
        </div>
        
        <div id="users-box" class="users-panel"><div class="panel-header">Qoşulanlar</div><div id="users-list-content"></div></div>
        
        <div class="chat-wrap">
            <div id="messages"></div>
            <div id="typing-status"></div>
            <div class="input-bar">
                <img src="galery.png" class="chat-icon" onclick="document.getElementById('chat-img').click()" alt="Galereya">
                <input type="file" id="chat-img" hidden accept="image/*" onchange="sendImg(this)">
                <input type="text" id="mi" placeholder="Mesaj yazın..." oninput="handleTyping()">
                <img src="send.png" class="chat-icon" onclick="sm()" alt="Göndər">
            </div>
        </div>
    </div>

    <script>
        const CF = { 
            apiKey: "AIzaSyAGLab7iSmhRAIZGuwQLa7HeE_Kg_4PVqM", 
            authDomain: "vkproject-63da1.firebaseapp.com",
            databaseURL: "https://vkproject-63da1-default-rtdb.firebaseio.com/", 
            projectId: "vkproject-63da1",
            storageBucket: "vkproject-63da1.firebasestorage.app",
            messagingSenderId: "510055616550",
            appId: "1:510055616550:web:4ae0f0c28798669ccad6e7",
            measurementId: "G-FJ5Q9YM3ST"
        };
        
        const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";
        firebase.initializeApp(CF);
        const db = firebase.database();
        
        let ytP, myN, myR, myL, myPic = "https://www.w3schools.com/howto/img_avatar.png", ok = false, myId = Math.random().toString(36).substr(2, 9);
        let typingTimeout, lastAdminTime = 0, currentVideoId = "";
        let playlistQueue = [];
        let selectedRoomMode = "youtube"; // Default rejim

        // WEBRTC SIGNALING SYSTEM (AUDIO & VIDEO MESH)
        let localVoiceStream = null;
        let localScreenStream = null;
        let peerConnections = {};
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let isInVoiceRoom = false;
        let isSharingScreen = false;

        // ANIMATION SYSTEM
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');
        let currentAnim = 'stars', animId = null, animData = [], globalSpeedModifier = 1;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initAnimationData(); }
        window.addEventListener('resize', resizeCanvas);

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function previewImage(input, previewId) { if (input.files && input.files[0]) { let r = new FileReader(); r.onload = e => { myPic = e.target.result; document.getElementById(previewId).src = myPic; }; r.readAsDataURL(input.files[0]); } }
        
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if(type === 'create') {
                document.getElementById('tab-create-btn').classList.add('active');
                document.getElementById('tab-create').classList.add('active');
            } else {
                document.getElementById('tab-join-btn').classList.add('active');
                document.getElementById('tab-join').classList.add('active');
            }
        }

        // REJİM SEÇİMİ FUNKSİYASI
        function selectRoomMode(mode) {
            selectedRoomMode = mode;
            document.getElementById('mode-yt').classList.remove('selected');
            document.getElementById('mode-screen').classList.remove('selected');
            if(mode === 'youtube') {
                document.getElementById('mode-yt').classList.add('selected');
            } else {
                document.getElementById('mode-screen').classList.add('selected');
            }
        }

        function generate6DigitCode() {
            const nick = document.getElementById('nick-create').value.trim();
            if(!nick) return showToast("Zəhmət olmasa ləqəb daxil edin!");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('room-create').value = code;
            document.getElementById('gen-btn').style.display = 'none';
            document.getElementById('copy-code-btn').style.display = 'block';
            document.getElementById('start-btn').style.display = 'block';
            showToast("Otaq kodu yaradıldı!");
        }

        function copyCreatedCode() {
            const codeInput = document.getElementById('room-create');
            navigator.clipboard.writeText(codeInput.value);
            showToast("Kod kopyalandı: " + codeInput.value);
        }

        function toggleThemePanel() { const p = document.getElementById('theme-panel'); p.style.display = (p.style.display === 'none') ? 'block' : 'none'; }
        function setAnimation(type) { db.ref(`rooms/${myR}/theme`).update({ type }); toggleThemePanel(); }
        function setSpeed(mult) { db.ref(`rooms/${myR}/theme`).update({ speed: mult }); toggleThemePanel(); }

        function updateSpeedUI(speed) {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            if(speed <= 0.6) document.getElementById('sp-slow').classList.add('active');
            else if(speed > 2) document.getElementById('sp-fast').classList.add('active');
            else document.getElementById('sp-med').classList.add('active');
        }

        function initAnimationData() {
            animData = [];
            if (currentAnim === 'stars') {
                for (let i = 0; i < 120; i++) {
                    animData.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1, alpha: Math.random(), phase: Math.random() * Math.PI });
                }
            } else if (currentAnim === 'matrix') {
                const columns = Math.floor(canvas.width / 16) + 1;
                for (let i = 0; i < columns; i++) { animData.push({ x: i * 16, y: Math.random() * -100 - 50, speed: Math.random() * 3 + 2 }); }
            } else if (currentAnim === 'waves') { animData = { hue: 0, time: 0 }; }
        }

        function runAnimationLoop() {
            if (animId) cancelAnimationFrame(animId);
            function draw() {
                if (currentAnim === 'stars') {
                    ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#ffffff';
                    animData.forEach(p => {
                        p.phase += 0.02 * globalSpeedModifier;
                        let curAlpha = p.alpha + Math.sin(p.phase) * 0.4;
                        ctx.globalAlpha = Math.max(0, Math.min(1, curAlpha));
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                        p.y -= p.speed * globalSpeedModifier;
                        if (p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                    });
                    ctx.globalAlpha = 1.0;
                } else if (currentAnim === 'matrix') {
                    ctx.fillStyle = 'rgba(5, 5, 5, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#0f0'; ctx.font = '14px monospace';
                    animData.forEach(drop => {
                        ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), drop.x, drop.y);
                        drop.y += drop.speed * globalSpeedModifier;
                        if (drop.y > canvas.height && Math.random() > 0.975) drop.y = Math.random() * -50;
                    });
                } else if (currentAnim === 'waves') {
                    animData.time += 0.003 * globalSpeedModifier; animData.hue = (animData.hue + 0.1 * globalSpeedModifier) % 360;
                    let grad = ctx.createRadialGradient(canvas.width/2 + Math.sin(animData.time) * (canvas.width/4), canvas.height/2 + Math.cos(animData.time * 1.5) * (canvas.height/4), 10, canvas.width/2, canvas.height/2, canvas.width);
                    grad.addColorStop(0, `hsla(${animData.hue}, 70%, 15%, 1)`); grad.addColorStop(0.5, `hsla(${(animData.hue + 60) % 360}, 60%, 5%, 1)`); grad.addColorStop(1, '#050505');
                    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
        }

        function toggleAdminPanel() { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'none') ? 'flex' : 'none'; }
        function toggleUsers() { const b = document.getElementById('users-box'); b.style.display = (b.style.display === 'block') ? 'none' : 'block'; }
        function toggleFS() { const v = document.getElementById('app'); if (!document.fullscreenElement) v.requestFullscreen(); else document.exitFullscreen(); }

        function showProfile(name, pic, role) {
            document.getElementById('p-modal-img').src = pic;
            document.getElementById('p-modal-name').innerText = name;
            document.getElementById('p-modal-role').innerText = role === 'admin' ? 'Qurucu / Admin' : 'İzləyici';
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function start(l) {
            if(l === 'admin') {
                myN = document.getElementById('nick-create').value.trim();
                myR = document.getElementById('room-create').value.trim();
            } else {
                myN = document.getElementById('nick-join').value.trim();
                myR = document.getElementById('room-join').value.trim();
            }

            if(!myN || !myR) return showToast("Məlumatları tam doldurun!");
            if(myR.length !== 6) return showToast("Otaq kodu 6 rəqəmli olmalıdır!");
            
            myL = l;
            document.getElementById('auth-box').style.display = 'none'; document.getElementById('app').style.display = 'flex';
            
            resizeCanvas();
            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic, role: l, voice: false });
            db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();
            
            db.ref(`rooms/${myR}/chat`).push({ type: 'system', t: `${myN} otağa qoşuldu.` });
            db.ref(`rooms/${myR}/kicked/${myId}`).on('value', s => { if(s.val()) { alert("Otaqdan qovuldunuz!"); window.location.reload(); } });
            
            if(l === 'admin') {
                // Seçilmiş əsas rejimi verilənlər bazasına yazırıq
                db.ref(`rooms/${myR}/base_mode`).set(selectedRoomMode);
                setupInterfaceForMode(selectedRoomMode);
            } else {
                // Üzvlər otağın rejiminə verilənlər bazasından baxır
                db.ref(`rooms/${myR}/base_mode`).once('value', s => {
                    const mode = s.val() || 'youtube';
                    setupInterfaceForMode(mode);
                });
            }

            init();
        }

        // REJİMƏ UYGUN OLARAQ İNTERFEYSİ AYARLAMAQ
        function setupInterfaceForMode(mode) {
            if(myL === 'admin') {
                document.getElementById('voice-call-btn').style.display = 'block';
                if(mode === 'screen') {
                    document.getElementById('screen-share-btn').style.display = 'block';
                    document.getElementById('admin-toggle-btn').style.display = 'none'; // YouTube panelini gizlət
                    document.getElementById('progress-bar-wrapper').style.display = 'none'; // YouTube saniyə panelini gizlət
                } else {
                    document.getElementById('screen-share-btn').style.display = 'none';
                    document.getElementById('admin-toggle-btn').style.display = 'block';
                    document.getElementById('progress-bar-wrapper').style.display = 'flex';
                    document.getElementById('v-seek-bar').classList.add('admin-seek');
                }
            } else {
                document.getElementById('sync-fix-btn').style.display = (mode === 'youtube') ? 'block' : 'none';
                if(mode === 'screen') {
                    document.getElementById('progress-bar-wrapper').style.display = 'none';
                }
            }
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 }, events: { 'onReady': () => { ok = true; tick(); }, 'onStateChange': onPlayerStateChange } });
        }

        function onPlayerStateChange(e) {
            if(myL === 'admin' && e.data === YT.PlayerState.ENDED) { playNextInQueue(); }
        }

        function forceSync() { if(ok && lastAdminTime) { ytP.seekTo(lastAdminTime); showToast("Sinxronlaşdırıldı"); } }

        function tick() {
            setInterval(() => {
                if(ok && ytP && ytP.getCurrentTime && !isSharingScreen) {
                    const curr = ytP.getCurrentTime(); const dur = ytP.getDuration();
                    if(dur > 0) {
                        document.getElementById('v-fill').style.width = (curr/dur*100) + '%';
                        document.getElementById('v-time').innerText = `${fmt(curr)} / ${fmt(dur)}`;
                    }
                    if(myL === 'admin') db.ref('rooms/'+myR+'/sync').update({ t: curr });
                }
            }, 1000);
        }

        function fmt(s) { let m = Math.floor(s / 60); s = Math.floor(s % 60); return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s); }
        function handleSeek(e) { if(myL !== 'admin' || !ok || isSharingScreen) return; const bar = document.getElementById('v-seek-bar'); const pct = (e.pageX - bar.offsetLeft) / bar.offsetWidth; ytP.seekTo(pct * ytP.getDuration()); sc('play'); }
        function handleTyping() { db.ref(`rooms/${myR}/typing/${myId}`).set(myN); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => db.ref(`rooms/${myR}/typing/${myId}`).remove(), 2000); }

        async function yt() {
            const q = document.getElementById('sq').value; if(!q) return;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${q}&type=video&key=${YK}`);
            const d = await r.json(); const b = document.getElementById('results'); b.innerHTML = "";
            d.items.forEach(i => {
                const c = document.createElement('div'); c.className = "res-card";
                c.innerHTML = `<img src="${i.snippet.thumbnails.medium.url}"><button class="add-q-btn" onclick="addToQueue('${i.id.videoId}', '${i.snippet.title.replace(/'/g, "\\'")}', event)">+ NÖVBƏ</button>`;
                c.onclick = () => {
                    db.ref('rooms/'+myR+'/sync').set({ v: i.id.videoId, a: 'play', t: 0 });
                };
                b.appendChild(c);
            });
        }

        function addToQueue(id, title, e) {
            e.stopPropagation();
            db.ref(`rooms/${myR}/queue`).push({ id, title });
            showToast("Növbəyə əlavə edildi");
        }

        function playNextInQueue() {
            if(playlistQueue.length > 0) {
                const nextVid = playlistQueue[0];
                db.ref(`rooms/${myR}/queue/${nextVid.key}`).remove();
                db.ref('rooms/'+myR+'/sync').set({ v: nextVid.id, a: 'play', t: 0 });
            }
        }

        function removeFromQueue(key) { db.ref(`rooms/${myR}/queue/${key}`).remove(); }
        function seek(s) { if(myL === 'admin' && !isSharingScreen) { ytP.seekTo(ytP.getCurrentTime() + s); sc('play'); } }
        function sc(a) { if(myL === 'admin' && !isSharingScreen) db.ref('rooms/'+myR+'/sync').update({ a: a, t: ytP.getCurrentTime() }); }
        function kickUser(uid, name) { if(confirm(`${name} qovulsun?`)) db.ref(`rooms/${myR}/kicked/${uid}`).set(true); }

        function openReactMenu(msgId, e) {
            e.stopPropagation();
            document.querySelectorAll('.react-popup').forEach(p => p.style.display = 'none');
            const p = document.getElementById(`pop-${msgId}`); if(p) p.style.display = 'flex';
        }

        function addReaction(msgId, emo) {
            db.ref(`rooms/${myR}/chat/${msgId}/reacts/${myId}`).set(emo);
            document.getElementById(`pop-${msgId}`).style.display = 'none';
        }

        // ==========================================
        //  ADVANCED WEBRTC MULTI-USER VOICE SYSTEM
        // ==========================================
        async function toggleVoiceRoom() {
            const btn = document.getElementById('voice-call-btn');
            if (!isInVoiceRoom) {
                try {
                    localVoiceStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                    });
                    isInVoiceRoom = true;
                    btn.innerText = "🎙️ MİKRAFONU SÖNDÜR";
                    btn.className = "voice-active";
                    db.ref(`rooms/${myR}/users/${myId}/voice`).set(true);
                    
                    Object.keys(peerConnections).forEach(uid => {
                        localVoiceStream.getTracks().forEach(track => peerConnections[uid].addTrack(track, localVoiceStream));
                    });
                    showToast("Səsli kanala qoşuldunuz!");
                } catch (e) {
                    showToast("Mikrofon icazəsi verilmədi!");
                }
            } else {
                const audioTrack = localVoiceStream.getAudioTracks()[0];
                if(audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    if(audioTrack.enabled) {
                        btn.innerText = "🎙️ MİKRAFONU SÖNDÜR";
                        btn.className = "voice-active";
                        db.ref(`rooms/${myR}/users/${myId}/voice`).set(true);
                    } else {
                        btn.innerText = "🔇 MİKRAFONU AÇ";
                        btn.className = "voice-muted";
                        db.ref(`rooms/${myR}/users/${myId}/voice`).set(false);
                    }
                }
            }
        }

        // ==========================================
        //         SCREEN SHARING FUNCTION
        // ==========================================
        async function toggleScreenShare() {
            const btn = document.getElementById('screen-share-btn');
            const scrVideo = document.getElementById('screen-video');
            
            if (!isSharingScreen) {
                try {
                    localScreenStream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { cursor: "always" },
                        audio: true 
                    });
                    
                    isSharingScreen = true;
                    btn.innerText = "⏹️ PAYLAŞIMI DAYANDIR";
                    btn.className = "screen-active";
                    
                    scrVideo.srcObject = localScreenStream;
                    scrVideo.style.display = 'block';
                    if(ytP && ytP.pauseVideo) ytP.pauseVideo();
                    
                    db.ref(`rooms/${myR}/screen_state`).set({ sharerId: myId, active: true });

                    Object.keys(peerConnections).forEach(uid => {
                        localScreenStream.getVideoTracks().forEach(track => peerConnections[uid].addTrack(track, localScreenStream));
                    });

                    localScreenStream.getVideoTracks()[0].onended = () => {
                        stopLocalScreenShare();
                    };
                    
                } catch (e) {
                    showToast("Ekran paylaşımı ləğv edildi.");
                }
            } else {
                stopLocalScreenShare();
            }
        }

        function stopLocalScreenShare() {
            const btn = document.getElementById('screen-share-btn');
            const scrVideo = document.getElementById('screen-video');
            
            isSharingScreen = false;
            btn.innerText = "🖥️ EKRANI PAYLAŞ";
            btn.className = "";
            scrVideo.style.display = 'none';
            scrVideo.srcObject = null;
            
            if (localScreenStream) {
                localScreenStream.getTracks().forEach(track => track.stop());
                localScreenStream = null;
            }
            
            db.ref(`rooms/${myR}/screen_state`).set({ active: false });
            if(ytP && ytP.playVideo) ytP.playVideo();
        }

        function initVoiceSignaling() {
            db.ref(`rooms/${myR}/voice_signals/${myId}`).on('child_added', async snapshot => {
                const signal = snapshot.val();
                const fromId = signal.from;
                if (!peerConnections[fromId]) setupPeerConnection(fromId, false);
                
                const pc = peerConnections[fromId];
                if (signal.sdp) {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                    if (signal.sdp.type === 'offer') {
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        db.ref(`rooms/${myR}/voice_signals/${fromId}`).push({ from: myId, sdp: answer });
                    }
                } else if (signal.ice) {
                    try { await pc.addIceCandidate(new RTCIceCandidate(signal.ice)); } catch(e){}
                }
            });
        }

        function setupPeerConnection(targetId, isOffer) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[targetId] = pc;

            if (localVoiceStream) {
                localVoiceStream.getTracks().forEach(track => pc.addTrack(track, localVoiceStream));
            }
            if (localScreenStream && isSharingScreen) {
                localScreenStream.getTracks().forEach(track => pc.addTrack(track, localScreenStream));
            }

            pc.onicecandidate = e => {
                if (e.candidate) db.ref(`rooms/${myR}/voice_signals/${targetId}`).push({ from: myId, ice: e.candidate });
            };

            pc.ontrack = e => {
                if (e.track.kind === 'video') {
                    const scrVideo = document.getElementById('screen-video');
                    scrVideo.srcObject = e.streams[0];
                    scrVideo.style.display = 'block';
                    if(ytP && ytP.pauseVideo) ytP.pauseVideo();
                } else {
                    let audioEl = document.getElementById(`audio-${targetId}`);
                    if (!audioEl) {
                        audioEl = document.createElement('audio');
                        audioEl.id = `audio-${targetId}`;
                        audioEl.autoplay = true;
                        document.getElementById('remote-audios').appendChild(audioEl);
                    }
                    audioEl.srcObject = e.streams[0];
                }
            };

            if (isOffer) {
                pc.onnegotiationneeded = async () => {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    db.ref(`rooms/${myR}/voice_signals/${targetId}`).push({ from: myId, sdp: offer });
                };
            }
        }

        function clearPeerConnection(targetId) {
            if (peerConnections[targetId]) {
                peerConnections[targetId].close();
                delete peerConnections[targetId];
            }
            const audioEl = document.getElementById(`audio-${targetId}`);
            if (audioEl) audioEl.remove();
        }

        // ==========================================
        //         MAIN INITIALIZATION CODE
        // ==========================================
        function init() {
            window.onclick = () => document.querySelectorAll('.react-popup').forEach(p => p.style.display = 'none');
            initVoiceSignaling();

            db.ref(`rooms/${myR}/theme`).on('value', s => {
                const t = s.val();
                if(t) { currentAnim = t.type || 'stars'; globalSpeedModifier = t.speed || 1; }
                updateSpeedUI(globalSpeedModifier); initAnimationData(); runAnimationLoop();
            });

            db.ref('rooms/'+myR+'/sync').on('value', s => {
                const d = s.val(); if(d && ok) {
                    if(d.v && d.v !== currentVideoId) { currentVideoId = d.v; ytP.loadVideoById(d.v); }
                    if(!isSharingScreen) {
                        d.a === 'play' ? ytP.playVideo() : ytP.pauseVideo();
                    }
                    lastAdminTime = d.t;
                    if(myL !== 'admin' && Math.abs(ytP.getCurrentTime() - d.t) > 5 && !isSharingScreen) ytP.seekTo(d.t);
                }
            });

            db.ref(`rooms/${myR}/screen_state`).on('value', s => {
                const data = s.val();
                const scrVideo = document.getElementById('screen-video');
                if (data && data.active) {
                    if (data.sharerId !== myId) {
                        showToast("Admin ekran paylaşımını başlatdı!");
                        if(ytP && ytP.pauseVideo) ytP.pauseVideo();
                    }
                } else {
                    scrVideo.style.display = 'none';
                    scrVideo.srcObject = null;
                    if(ytP && ytP.playVideo && ok) ytP.playVideo();
                }
            });

            db.ref(`rooms/${myR}/queue`).on('value', s => {
                const qBox = document.getElementById('queue-box'); qBox.innerHTML = ''; playlistQueue = [];
                s.forEach(child => {
                    const item = child.val(); playlistQueue.push({key: child.key, ...item});
                    const div = document.createElement('div'); div.className = 'queue-item';
                    div.innerHTML = `<span>${item.title}</span> ${myL==='admin' ? `<button onclick="removeFromQueue('${child.key}')">❌</button>` : ''}`;
                    qBox.appendChild(div);
                });
            });

            db.ref('rooms/'+myR+'/chat').on('child_added', s => {
                const m = s.val(); const b = document.getElementById('messages');
                if(m.type === 'system') {
                    const sysDiv = document.createElement('div'); sysDiv.className = 'system-msg';
                    sysDiv.innerText = m.t; b.appendChild(sysDiv);
                } else {
                    const d = document.createElement('div'); d.className = `m-row ${m.n === myN ? 'me' : ''}`; d.id = `msg-${s.key}`;
                    d.innerHTML = `
                        <img src="${m.p}" class="m-avatar" onclick="showProfile('${m.n}','${m.p}','')">
                        <div class="m-bubble-wrap" onclick="openReactMenu('${s.key}', event)">
                            <div class="react-popup" id="pop-${s.key}">
                                <span onclick="addReaction('${s.key}', '👍')">👍</span><span onclick="addReaction('${s.key}', '❤️')">❤️</span>
                                <span onclick="addReaction('${s.key}', '😂')">😂</span><span onclick="addReaction('${s.key}', '😮')">😮</span>
                            </div>
                            <div class="m-bubble"><b>${m.n}</b><div>${m.img ? `<img src="${m.img}" style="max-width:150px; border-radius:4px;">` : m.t}</div></div>
                            <div class="reactions-container" id="reacts-${s.key}"></div>
                        </div>`;
                    b.appendChild(d);
                    
                    db.ref(`rooms/${myR}/chat/${s.key}/reacts`).on('value', rSnap => {
                        const rBox = document.getElementById(`reacts-${s.key}`); if(!rBox) return; rBox.innerHTML = '';
                        const counts = {}; const vals = rSnap.val() || {};
                        Object.values(vals).forEach(v => counts[v] = (counts[v] || 0) + 1);
                        Object.keys(counts).forEach(emo => {
                            const bge = document.createElement('div'); bge.className = 'react-badge'; bge.innerText = `${emo} ${counts[emo]}`;
                            rBox.appendChild(bge);
                        });
                    });
                }
                b.scrollTop = b.scrollHeight;
            });

            db.ref(`rooms/${myR}/typing`).on('value', s => {
                const data = s.val(); const ts = document.getElementById('typing-status');
                if(!data) { ts.style.display = 'none'; return; }
                const users = Object.values(data).filter(n => n !== myN);
                if(users.length > 0) { ts.innerText = users.join(', ') + " yazır..."; ts.style.display = 'block'; } else { ts.style.display = 'none'; }
            });

            db.ref(`rooms/${myR}/users`).on('value', s => {
                const data = s.val() || {}; document.getElementById('user-count').innerText = s.numChildren();
                const listCont = document.getElementById('users-list-content'); listCont.innerHTML = '';
                
                Object.keys(peerConnections).forEach(id => {
                    if (!data[id]) clearPeerConnection(id);
                });

                Object.entries(data).forEach(([uid, u]) => {
                    const uRow = document.createElement('div'); uRow.className = 'u-item';
                    uRow.onclick = () => showProfile(u.n, u.p, u.role);
                    
                    const voiceIndicator = u.voice ? "🟢 Səsdə" : "⚪ Səsdə deyil";
                    
                    uRow.innerHTML = `
                        <div class="u-info">
                            <img src="${u.p}">
                            <span>${u.n} (${u.role === 'admin' ? 'Q' : 'İ'}) <small style="color:${u.voice?'#4caf50':'#888'}">${voiceIndicator}</small></span>
                        </div>
                        ${myL === 'admin' && uid !== myId ? `<button class="kick-btn" onclick="event.stopPropagation(); kickUser('${uid}','${u.n}')">❌</button>` : ''}`;
                    listCont.appendChild(uRow);

                    if (uid !== myId && !peerConnections[uid]) {
                        if (myId < uid) setupPeerConnection(uid, true);
                    }
                });
            });
        }

        function sm() { 
            const i = document.getElementById('mi'); if(!i.value) return; 
            db.ref('rooms/'+myR+'/chat').push({ n: myN, t: i.value, p: myPic, ts: Date.now() }); i.value = '';
            db.ref(`rooms/${myR}/typing/${myId}`).remove();
        }

        function sendImg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => db.ref('rooms/'+myR+'/chat').push({ n: myN, img: e.target.result, p: myPic, ts: Date.now() }); r.readAsDataURL(input.files[0]); } }
        document.getElementById('mi').onkeyup = e => { if(e.key === "Enter") sm(); };
        
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        resizeCanvas();
    </script>
