<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KN LIVE | TOTAL FIX</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --bg: #000; --card: #181818; --border: #333; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg); color: #fff; position: fixed; 
        }

        /* GİRİŞ */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--red); font-size: 3.5rem; letter-spacing: 3px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--red); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* ANA EKRAN */
        #app { display: none; height: 100%; width: 100%; flex-direction: column; }

        /* VİDEO SAHƏSİ (SABİT) */
        .video-box { 
            width: 100%; 
            height: 211px; /* Mobil üçün sabit hündürlük (16:9 nisbəti) */
            background: #000; 
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            border-bottom: 2px solid var(--border);
        }
        #player { width: 100%; height: 100%; }

        /* ÇAT SAHƏSİ (DINAMIK) */
        .chat-wrap { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            background: #080808; 
            position: relative;
            overflow: hidden;
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            padding-bottom: 80px; /* Yazma yerinin altında qalmaması üçün */
        }

        .m-row { display: flex; gap: 8px; max-width: 85%; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-bubble { background: #222; padding: 10px 14px; border-radius: 12px; font-size: 14px; color: #eee; }
        .m-row.me .m-bubble { background: var(--red); color: #fff; }
        .m-bubble b { display: block; font-size: 10px; opacity: 0.6; margin-bottom: 2px; }

        /* MESAJ YAZMA YERİ (SABİT) */
        .input-bar { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: var(--card); 
            padding: 12px; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid var(--border);
            z-index: 20;
        }
        .input-bar input { margin: 0; flex: 1; }

        /* ADMIN PANEL - VİDEO ÜSTÜNDƏ POPUP KİMİ */
        .admin-pnl { 
            position: absolute; 
            top: 211px; 
            left: 0; 
            width: 100%; 
            background: rgba(20,20,20,0.95); 
            z-index: 15; 
            padding: 15px; 
            display: none; 
            flex-direction: column; 
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            border-bottom: 2px solid var(--red);
        }

        .search-results { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .res-card { background: #111; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .res-card img { width: 100%; display: block; }
        .res-card p { font-size: 10px; padding: 5px; height: 30px; overflow: hidden; }

        #toggle-admin { position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">KN LIVE</div>
            <input type="text" id="nick" placeholder="Adınız">
            <input type="text" id="room" placeholder="Otaq Kodu">
            <button class="btn" onclick="start('admin')">BAŞLAT (ADMIN)</button>
            <button class="btn" style="background:#222; margin-top:10px" onclick="start('member')">QOŞUL</button>
        </div>
    </div>

    <div id="app">
        <div class="video-box">
            <button id="toggle-admin" onclick="toggleAdmin()">ADMIN PANEL</button>
            <div id="player"></div>
        </div>

        <div class="admin-pnl" id="adm-pnl">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#2e7d32; flex:1" onclick="sc('play')">PLAY</button>
                <button class="btn" style="flex:1" onclick="sc('pause')">PAUSE</button>
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="sq" placeholder="Video axtar..." style="margin:0">
                <button class="btn" style="width:70px" onclick="yt()">TAP</button>
            </div>
            <div id="results" class="search-results"></div>
        </div>

        <div class="chat-wrap">
            <div id="messages"></div>
            <div class="input-bar">
                <input type="text" id="mi" placeholder="Mesaj yazın...">
                <button class="btn" style="width:50px; padding:0;" onclick="sm()">🚀</button>
            </div>
        </div>
    </div>

    <script>
        const CF = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi"
        };
        const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";

        firebase.initializeApp(CF);
        const db = firebase.database();
        let ytP, myN, myR, myL, ok = false;

        function start(l) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR) return alert("Boş qoyma!");
            myL = l;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            if(l !== 'admin') document.getElementById('toggle-admin').style.display = 'none';
            init();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', {
                height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'playsinline': 1 },
                events: { 'onReady': () => { ok = true; } }
            });
        }

        function toggleAdmin() {
            const p = document.getElementById('adm-pnl');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        }

        async function yt() {
            const q = document.getElementById('sq').value;
            if(!q) return;
            if(q.includes('v=')) { uv(q.split('v=')[1].split('&')[0]); return; }
            const b = document.getElementById('results');
            b.innerHTML = "Axtarılır...";
            try {
                const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${q}&type=video&key=${YK}`);
                const d = await r.json();
                b.innerHTML = "";
                d.items.forEach(i => {
                    const c = document.createElement('div');
                    c.className = "res-card";
                    c.innerHTML = `<img src="${i.snippet.thumbnails.medium.url}"><p>${i.snippet.title}</p>`;
                    c.onclick = () => uv(i.id.videoId);
                    b.appendChild(c);
                });
            } catch(e) { b.innerHTML = "Xəta!"; }
        }

        function uv(id) {
            db.ref('rooms/'+myR+'/sync').set({ v: id, a: 'play', t: 0, f: Date.now() });
            toggleAdmin();
        }

        function init() {
            db.ref('rooms/'+myR+'/sync').on('value', s => {
                const d = s.val();
                if(d && ok) {
                    if(d.v && d.v !== ytP.getVideoData().video_id) {
                        ytP.loadVideoById(d.v);
                        ytP.playVideo();
                    }
                    if(d.a === 'play') ytP.playVideo();
                    if(d.a === 'pause') ytP.pauseVideo();
                    if(Math.abs(ytP.getCurrentTime() - d.t) > 3) ytP.seekTo(d.t);
                }
            });

            db.ref('rooms/'+myR+'/chat').on('child_added', s => {
                const m = s.val();
                const d = document.createElement('div');
                d.className = `m-row ${m.n === myN ? 'me' : ''}`;
                d.innerHTML = `<div class="m-bubble"><b>${m.n}</b>${m.t}</div>`;
                const b = document.getElementById('messages');
                b.appendChild(d);
                b.scrollTop = b.scrollHeight;
            });
        }

        function sc(a) { if(myL === 'admin') db.ref('rooms/'+myR+'/sync').update({ a: a, t: ytP.getCurrentTime() }); }

        function sm() {
            const i = document.getElementById('mi');
            if(!i.value) return;
            db.ref('rooms/'+myR+'/chat').push({ n: myN, t: i.value });
            i.value = '';
        }

        document.getElementById('mi').onkeyup = (e) => { if(e.key === "Enter") sm(); };

        setInterval(() => {
            if(myL === 'admin' && ok && ytP.getPlayerState() === 1) {
                db.ref('rooms/'+myR+'/sync/t').set(ytP.getCurrentTime());
            }
        }, 3000);
    </script>
</body>
</html>
