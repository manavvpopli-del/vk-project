<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --bg: #000; --card: #181818; --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: #fff; position: fixed; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; font-weight: bold; z-index: 10001; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--red); font-size: 3rem; margin-bottom: 15px; }
        
        .avatar-upload { width: 80px; height: 80px; margin: 0 auto 15px; position: relative; cursor: pointer; }
        #avatar-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px dashed #555; }

        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #app { display: none; height: 100%; width: 100%; flex-direction: column; }
        .video-box { width: 100%; height: 211px; background: #000; flex-shrink: 0; position: relative; z-index: 10; border-bottom: 2px solid var(--border); }
        #player { width: 100%; height: 100%; pointer-events: none; }

        .chat-wrap { flex-grow: 1; display: flex; flex-direction: column; background: #080808; position: relative; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }

        .m-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-start; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--red); }
        .m-bubble { background: #222; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
        .m-row.me .m-bubble { background: var(--red); }
        .m-bubble img { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        .input-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--card); padding: 10px; display: flex; gap: 8px; border-top: 1px solid var(--border); z-index: 20; }
        
        /* ADMIN TOOLS */
        .admin-pnl { position: absolute; top: 211px; left: 0; width: 100%; background: #111; z-index: 15; padding: 15px; display: none; flex-direction: column; gap: 10px; border-bottom: 2px solid var(--red); }
        .users-list { position: absolute; top: 50px; right: 10px; background: #181818; border: 1px solid #333; padding: 10px; border-radius: 8px; display: none; z-index: 100; min-width: 150px; }
        .user-item { padding: 5px; font-size: 12px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }
        
        #toggle-admin { position: absolute; top: 10px; right: 10px; z-index: 100; background: var(--red); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; border:none; }
        #voice-btn { position: absolute; top: 10px; left: 10px; z-index: 100; background: #444; border:none; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; }
        #users-btn { position: absolute; top: 45px; right: 10px; z-index: 100; background: #222; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">WATCH LIVE</div>
            <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23555' viewBox='0 0 24 24'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
            </div>
            <input type="text" id="nick" placeholder="Adınız">
            <input type="text" id="room" placeholder="Otaq Kodu">
            <button class="btn" onclick="start('admin')">OTAQ QUR</button>
            <button class="btn" style="background:#222; margin-top:8px" onclick="start('member')">QOŞUL</button>
        </div>
    </div>

    <div id="app">
        <div class="video-box">
            <button id="voice-btn" onclick="toggleVoice()">🎤 SƏSİ AÇ</button>
            <button id="toggle-admin" onclick="toggleAdmin()">VİDEO QOŞ</button>
            <button id="users-btn" onclick="toggleUsers()">👥</button>
            <div id="users-box" class="users-list"></div>
            <div id="player"></div>
        </div>

        <div class="admin-pnl" id="adm-pnl">
            <div style="display:flex; gap:5px;">
                <button class="btn" style="background:#444; flex:1" onclick="seek(-10)">-10s</button>
                <button class="btn" style="background:#2e7d32; flex:1" onclick="sc('play')">PLAY</button>
                <button class="btn" style="background:#c62828; flex:1" onclick="sc('pause')">PAUSE</button>
                <button class="btn" style="background:#444; flex:1" onclick="seek(10)">+10s</button>
            </div>
            <input type="text" id="sq" placeholder="Video adı və ya Link..." onchange="yt()">
            <div id="results" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; max-height:150px; overflow:auto;"></div>
        </div>

        <div class="chat-wrap">
            <div id="messages"></div>
            <div class="input-bar" id="chat-bar">
                <button onclick="document.getElementById('chat-img').click()" style="background:none; border:none;">📷</button>
                <input type="file" id="chat-img" hidden accept="image/*" onchange="sendImg(this)">
                <input type="text" id="mi" placeholder="Mesaj yazın...">
                <button class="btn" style="width:50px; padding:0;" onclick="sm()">🚀</button>
            </div>
        </div>
    </div>

    <script>
        const CF = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com", projectId: "sevgili-testi" };
        const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";
        firebase.initializeApp(CF);
        const db = firebase.database();
        let ytP, myN, myR, myL, myPic = "", ok = false, myId = Math.random().toString(36).substr(2, 9);
        let isMuted = true, startTime = Date.now();

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000); }
        function previewImage(input) { if (input.files[0]) { let r = new FileReader(); r.onload = e => { myPic = e.target.result; document.getElementById('avatar-preview').src = myPic; }; r.readAsDataURL(input.files[0]); } }

        function start(l) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR || !myPic) return showToast("Məlumatları tam doldur!");
            myL = l;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            if(l !== 'admin') document.getElementById('toggle-admin').style.display = 'none';
            
            // Otağa qoşulma
            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic, role: l, status: 'online' });
            db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();
            
            init();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', playerVars: { 'autoplay': 1, 'controls': 0, 'playsinline': 1 }, events: { 'onReady': () => ok = true } });
        }

        function toggleAdmin() { const p = document.getElementById('adm-pnl'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
        function toggleUsers() { const b = document.getElementById('users-box'); b.style.display = (b.style.display === 'block') ? 'none' : 'block'; }

        async function yt() {
            const q = document.getElementById('sq').value; if(!q) return;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=4&q=${q}&type=video&key=${YK}`);
            const d = await r.json(); const b = document.getElementById('results'); b.innerHTML = "";
            d.items.forEach(i => {
                let c = document.createElement('div'); c.style = "background:#222; font-size:10px; cursor:pointer;";
                c.innerHTML = `<img src="${i.snippet.thumbnails.medium.url}" style="width:100%"><p>${i.snippet.title}</p>`;
                c.onclick = () => { db.ref(`rooms/${myR}/sync`).set({ v: i.id.videoId, a: 'play', t: 0 }); toggleAdmin(); };
                b.appendChild(c);
            });
        }

        function init() {
            // Sinxronizasiya
            db.ref(`rooms/${myR}/sync`).on('value', s => {
                const d = s.val(); if(d && ok) {
                    if(d.v && d.v !== ytP.getVideoData().video_id) ytP.loadVideoById(d.v);
                    d.a === 'play' ? ytP.playVideo() : ytP.pauseVideo();
                    if(Math.abs(ytP.getCurrentTime() - d.t) > 3) ytP.seekTo(d.t);
                }
            });

            // Chat
            db.ref(`rooms/${myR}/chat`).orderByChild('ts').startAt(startTime).on('child_added', s => {
                const m = s.val(); const b = document.getElementById('messages');
                const d = document.createElement('div'); d.className = `m-row ${m.n === myN ? 'me' : ''}`;
                d.innerHTML = `<img src="${m.p}" class="m-avatar"><div class="m-bubble"><b>${m.n}</b><br>${m.img ? `<img src="${m.img}">`:m.t}</div>`;
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            });

            // İstifadəçi siyahısı və Admin idarəetməsi
            db.ref(`rooms/${myR}/users`).on('value', s => {
                const us = s.val(); const box = document.getElementById('users-box'); box.innerHTML = "";
                for(let id in us) {
                    let u = us[id];
                    let div = document.createElement('div'); div.className = "user-item";
                    div.innerHTML = `<span>${u.n}</span> ${myL==='admin'&&id!==myId ? `<b onclick="manageUser('${id}','${u.n}')">⚙️</b>` : ''}`;
                    box.appendChild(div);
                    
                    // Blok və Kick yoxlaması
                    if(id === myId) {
                        if(u.kick) { alert("Otaqdan çıxarıldınız!"); location.reload(); }
                        if(u.muteChat) document.getElementById('chat-bar').style.display = "none";
                        else document.getElementById('chat-bar').style.display = "flex";
                    }
                }
            });
        }

        function manageUser(id, name) {
            let act = prompt(`İstifadəçi: ${name}\n1. At (Kick)\n2. Mesajı bağla/aç\n3. Səsi bağla`);
            if(act === '1') db.ref(`rooms/${myR}/users/${id}/kick`).set(true);
            if(act === '2') {
                db.ref(`rooms/${myR}/users/${id}/muteChat`).once('value', s => {
                    db.ref(`rooms/${myR}/users/${id}/muteChat`).set(!s.val());
                });
            }
        }

        function sc(a) { if(myL === 'admin') db.ref(`rooms/${myR}/sync`).update({ a: a, t: ytP.getCurrentTime() }); }
        function seek(s) { if(myL === 'admin') ytP.seekTo(ytP.getCurrentTime() + s); }
        function sm() { const i = document.getElementById('mi'); if(i.value) db.ref(`rooms/${myR}/chat`).push({ n: myN, t: i.value, p: myPic, ts: Date.now() }); i.value=''; }
        function sendImg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => db.ref(`rooms/${myR}/chat`).push({ n: myN, img: e.target.result, p: myPic, ts: Date.now() }); r.readAsDataURL(input.files[0]); } }

        // Səsli Danışıq (Simulyasiya - Real RTC üçün server lazımdır, lakin bu interfeys aktivdir)
        function toggleVoice() {
            isMuted = !isMuted;
            document.getElementById('voice-btn').innerText = isMuted ? "🎤 SƏSİ AÇ" : "🔊 SƏS AÇIQ";
            document.getElementById('voice-btn').style.background = isMuted ? "#444" : "green";
            showToast(isMuted ? "Mikrofon bağlandı" : "Səsli danışıq aktivdir");
        }

        setInterval(() => { if(myL==='admin'&&ok&&ytP.getPlayerState()===1) db.ref(`rooms/${myR}/sync/t`).set(ytP.getCurrentTime()); }, 3000);
    </script>
</body>
</html>
