<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live - 3D Cinema Experience</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0055; --bg: #0a0b10; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: #fff; }

        /* Background Animation */
        body::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle, #1a1c2c 0%, #0a0b10 70%); z-index: -1; animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 10001; display: none; box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4); }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; background: linear-gradient(to right, #ff0055, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(255,0,85,0.5)); }
        
        .avatar-upload { width: 100px; height: 100px; margin: 0 auto 25px; border-radius: 50%; border: 3px solid var(--primary); overflow: hidden; cursor: pointer; position: relative; }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }

        /* App Layout */
        #app { display: none; height: 100vh; flex-direction: column; }
        
        .video-container { width: 100%; background: #000; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #player-wrap { width: 100%; aspect-ratio: 16/9; position: relative; }
        #player { width: 100%; height: 100%; }
        .overlay-shield { position: absolute; inset: 0; z-index: 5; display: none; } /* Admin olmayanda açılır */

        /* Custom Progress Bar */
        .cinema-controls { background: rgba(10, 11, 16, 0.9); padding: 15px; border-bottom: 1px solid var(--border); }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; position: relative; margin-bottom: 15px; cursor: pointer; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; position: relative; }
        #progress-bar::after { content: ''; position: absolute; right: -5px; top: -4px; width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--primary); }

        .control-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .control-btns button { flex: 1; min-width: 80px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-admin { background: var(--primary) !important; border: none !important; }

        /* Chat Section */
        .chat-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4)); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .m-wrap { display: flex; flex-direction: column; max-width: 80%; gap: 4px; cursor: pointer; }
        .m-wrap.me { align-self: flex-end; align-items: flex-end; }
        .m-meta { font-size: 10px; color: #888; margin: 0 5px; }
        .m-bubble { padding: 12px 16px; border-radius: 18px; font-size: 13px; position: relative; background: var(--glass); border: 1px solid var(--border); }
        .me .m-bubble { background: var(--primary); border: none; color: #fff; box-shadow: 0 5px 15px rgba(255,0,85,0.3); }
        
        .reply-box { font-size: 11px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; border-left: 3px solid #ffcc00; margin-bottom: 5px; opacity: 0.8; }

        .input-area { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); }
        #reply-indicator { display: none; padding: 8px 15px; background: #1a1c2c; border-radius: 10px 10px 0 0; font-size: 11px; color: #ffcc00; justify-content: space-between; align-items: center; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-row input { margin: 0; background: var(--glass); }
        .icon-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--glass); border-radius: 12px; cursor: pointer; }

        /* Admin Tools */
        .search-panel { padding: 15px; display: none; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .res-item img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }

        .active-mic { background: #00ff88 !important; color: #000 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">CINEMA LIVE</div>
            <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky">
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
            </div>
            <input type="text" id="nick" placeholder="Adınız">
            <input type="text" id="room" placeholder="Otaq Kodu">
            <button class="btn" onclick="start('admin')">Otaq Yarat</button>
            <button class="btn" style="background:transparent; border: 1px solid var(--border); margin-top:10px" onclick="start('member')">Otağa Qoşul</button>
        </div>
    </div>

    <div id="app">
        <div class="video-container">
            <div id="player-wrap">
                <div id="player"></div>
                <div id="shield" class="overlay-shield"></div>
            </div>
            <div class="cinema-controls">
                <div class="progress-container" onclick="seekVideo(event)">
                    <div id="progress-bar"></div>
                </div>
                <div class="control-btns">
                    <button id="mic-btn" onclick="toggleMic()">SƏS: BAĞLI</button>
                    <button onclick="toggleUsers()">ÜZVLƏR (<span id="u-count">0</span>)</button>
                    <button id="admin-panel-btn" onclick="toggleSearch()" style="display:none;" class="btn-admin">VİDEO SEÇ</button>
                    <button id="play-pause-btn" onclick="togglePlay()" style="display:none;" class="btn-admin">PAUSE</button>
                </div>
                <div id="search-panel" class="search-panel">
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="sq" placeholder="YouTube-da axtar..." style="margin:0">
                        <button class="btn" style="width:80px; padding:0" onclick="searchYT()">TAP</button>
                    </div>
                    <div id="results" class="res-grid"></div>
                </div>
            </div>
        </div>

        <div class="chat-section">
            <div id="messages"></div>
            <div id="reply-indicator">
                <span id="reply-text"></span>
                <span onclick="cancelReply()" style="cursor:pointer">✕</span>
            </div>
            <div class="input-area">
                <div class="input-row">
                    <div class="icon-btn" onclick="document.getElementById('chat-img').click()">🖼️</div>
                    <input type="file" id="chat-img" hidden accept="image/*" onchange="sendImage(this)">
                    <input type="text" id="mi" placeholder="Mesaj yazın...">
                    <div class="icon-btn" onclick="sendMessage()" style="background:var(--primary)">🚀</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com", projectId: "sevgili-testi" };
        const YT_KEY = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";
        firebase.initializeApp(CFG);
        const db = firebase.database();

        let ytP, myN, myR, myL, myPic = "https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky";
        let myId = "u_" + Math.random().toString(36).substr(2, 9);
        let ok = false, replyTo = null, isMicActive = false;

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function previewImage(i) { if(i.files[0]) { let r = new FileReader(); r.onload = e => { myPic = e.target.result; document.getElementById('avatar-preview').src = myPic; }; r.readAsDataURL(i.files[0]); } }
        function toggleSearch() { const p = document.getElementById('search-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        
        function start(role) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR) return showToast("Məlumatları doldurun!");
            myL = role;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            if(role === 'admin') {
                document.getElementById('admin-panel-btn').style.display = 'block';
                document.getElementById('play-pause-btn').style.display = 'block';
            } else {
                document.getElementById('shield').style.display = 'block';
            }

            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic, role: role });
            db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();
            
            initRoom();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0, 'iv_load_policy': 3 },
                events: { 'onReady': () => { ok = true; startSyncLoop(); } }
            });
        }

        function startSyncLoop() {
            setInterval(() => {
                if(ok && myL === 'admin') {
                    db.ref(`rooms/${myR}/sync`).update({
                        t: ytP.getCurrentTime(),
                        s: ytP.getPlayerState(),
                        dur: ytP.getDuration()
                    });
                }
                updateProgressBar();
            }, 1000);
        }

        function updateProgressBar() {
            if(!ok) return;
            const cur = ytP.getCurrentTime();
            const dur = ytP.getDuration();
            if(dur > 0) {
                document.getElementById('progress-bar').style.width = (cur / dur * 100) + "%";
            }
        }

        function seekVideo(e) {
            if(myL !== 'admin' || !ok) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const perc = x / rect.width;
            const time = ytP.getDuration() * perc;
            ytP.seekTo(time);
            db.ref(`rooms/${myR}/sync`).update({ t: time });
        }

        function togglePlay() {
            if(myL !== 'admin') return;
            const state = ytP.getPlayerState();
            if(state === 1) {
                ytP.pauseVideo();
                document.getElementById('play-pause-btn').innerText = "PLAY";
            } else {
                ytP.playVideo();
                document.getElementById('play-pause-btn').innerText = "PAUSE";
            }
        }

        async function searchYT() {
            const q = document.getElementById('sq').value;
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=9&q=${q}&type=video&key=${YT_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('results');
            grid.innerHTML = "";
            data.items.forEach(i => {
                const div = document.createElement('div');
                div.className = "res-item";
                div.innerHTML = `<img src="${i.snippet.thumbnails.medium.url}">`;
                div.onclick = () => {
                    db.ref(`rooms/${myR}/sync`).set({ v: i.id.videoId, t: 0, s: 1 });
                    toggleSearch();
                };
                grid.appendChild(div);
            });
        }

        function initRoom() {
            // Video Sinxronizasiya
            db.ref(`rooms/${myR}/sync`).on('value', s => {
                const d = s.val();
                if(!d || !ok) return;
                if(d.v && d.v !== ytP.getVideoData().video_id) ytP.loadVideoById(d.v, d.t);
                if(myL !== 'admin') {
                    if(Math.abs(ytP.getCurrentTime() - d.t) > 2) ytP.seekTo(d.t);
                    d.s === 1 ? ytP.playVideo() : ytP.pauseVideo();
                }
            });

            // Chat və Yanıt
            db.ref(`rooms/${myR}/chat`).limitToLast(50).on('child_added', s => {
                const m = s.val();
                const wrap = document.createElement('div');
                wrap.className = `m-wrap ${m.uid === myId ? 'me' : ''}`;
                wrap.onclick = () => setReply(m.n, m.t);

                let replyHtml = m.reply ? `<div class="reply-box"><b>${m.reply.n}</b>: ${m.reply.t}</div>` : "";
                let content = m.img ? `<img src="${m.img}" style="max-width:200px; border-radius:10px;">` : m.t;

                wrap.innerHTML = `
                    <span class="m-meta">${m.n}</span>
                    <div class="m-bubble">${replyHtml}${content}</div>
                `;
                document.getElementById('messages').appendChild(wrap);
                const msgBox = document.getElementById('messages');
                msgBox.scrollTop = msgBox.scrollHeight;
                if(m.uid !== myId) showToast(`${m.n}: ${m.img ? "🖼️ Foto" : m.t}`);
            });

            // İştirakçı sayı
            db.ref(`rooms/${myR}/users`).on('value', s => {
                document.getElementById('u-count').innerText = s.numChildren();
            });
        }

        function setReply(n, t) {
            replyTo = { n, t: t.substring(0, 30) + (t.length > 30 ? "..." : "") };
            document.getElementById('reply-text').innerText = `Yanıt verilir: ${n}`;
            document.getElementById('reply-indicator').style.display = 'flex';
            document.getElementById('mi').focus();
        }

        function cancelReply() {
            replyTo = null;
            document.getElementById('reply-indicator').style.display = 'none';
        }

        function sendMessage() {
            const i = document.getElementById('mi');
            if(!i.value.trim()) return;
            db.ref(`rooms/${myR}/chat`).push({
                uid: myId, n: myN, t: i.value, p: myPic,
                reply: replyTo, ts: Date.now()
            });
            i.value = "";
            cancelReply();
        }

        function sendImage(input) {
            if(input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    db.ref(`rooms/${myR}/chat`).push({
                        uid: myId, n: myN, img: e.target.result, p: myPic, ts: Date.now()
                    });
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        // Sadələşdirilmiş Səsli Danışıq (Voice Simulation via Status)
        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(!isMicActive) {
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    isMicActive = true;
                    btn.innerText = "SƏS: AÇIQ";
                    btn.classList.add('active-mic');
                    showToast("Səsiniz digərlərinə ötürülür...");
                } catch(e) { showToast("Mikrofon xətası!"); }
            } else {
                isMicActive = false;
                btn.innerText = "SƏS: BAĞLI";
                btn.classList.remove('active-mic');
            }
        }

        document.getElementById('mi').onkeyup = e => { if(e.key === "Enter") sendMessage(); };
    </script>
</body>
</html>
