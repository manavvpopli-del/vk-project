<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live - Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00adb5; --bg: #050505; --card: #121212; --border: #252525; --text: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; background-size: cover; background-position: center; transition: background 0.5s ease; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 12px 24px; border-radius: 4px; font-size: 13px; font-weight: 600; z-index: 10001; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 4px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--blue); font-size: 3.5rem; letter-spacing: 4px; margin-bottom: 25px; }
        
        .avatar-upload { width: 90px; height: 90px; margin: 0 auto 20px; position: relative; cursor: pointer; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); transition: 0.3s; }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; }

        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 4px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.2s; }

        #app { display: none; height: 100%; width: 100%; flex-direction: column; position: relative; z-index: 1; }
        
        /* THEME SELECTOR */
        .theme-btn { position: absolute; top: 10px; right: 10px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 50%; border: 1px solid var(--border); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .theme-panel { position: absolute; top: 50px; right: 10px; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: none; z-index: 1000; width: 200px; }
        .theme-colors { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-opt { width: 100%; pt: 100%; padding-bottom: 100%; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .video-section { width: 100%; background: rgba(0,0,0,0.8); flex-shrink: 0; z-index: 10; border-bottom: 1px solid var(--border); position: relative; }
        #player-container { width: 100%; height: 211px; pointer-events: none; }
        #player { width: 100%; height: 100%; }

        .v-bar-cont { height: 25px; background: rgba(10,10,10,0.9); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 1px solid var(--border); }
        #v-time { font-size: 10px; font-weight: 700; color: #888; white-space: nowrap; }
        .v-progress { flex: 1; height: 4px; background: #333; position: relative; border-radius: 2px; }
        #v-fill { height: 100%; background: var(--blue); width: 0%; border-radius: 2px; }
        .admin-seek { cursor: pointer; }

        .controls-bar { background: rgba(10,10,10,0.9); padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .main-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .main-btns button { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .active-mic { color: #2e7d32 !important; border-color: #2e7d32 !important; }

        .admin-tools { display: flex; flex-direction: column; gap: 10px; padding-top: 5px; }
        .search-box { display: flex; gap: 5px; }
        .search-box input { margin: 0; padding: 10px; font-size: 12px; }
        .search-box button { width: 70px; background: var(--blue); border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .users-panel { position: absolute; top: 60px; right: 10px; width: 200px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; display: none; z-index: 1000; max-height: 250px; overflow-y: auto; }
        .panel-header { padding: 10px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }
        #users-list-content { padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .u-item { display: flex; align-items: center; gap: 8px; padding: 5px; font-size: 12px; }
        .u-item img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

        .chat-wrap { flex-grow: 1; display: flex; flex-direction: column; background: transparent; position: relative; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        .m-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
        .m-bubble { background: rgba(26,26,26,0.9); padding: 10px; border-radius: 8px 8px 8px 2px; font-size: 13px; color: #eee; backdrop-filter: blur(5px); }
        .m-row.me .m-bubble { background: var(--blue); border-radius: 8px 8px 2px 8px; color: #fff; }

        #typing-status { position: absolute; bottom: 65px; left: 15px; font-size: 11px; font-style: italic; color: #ccc; display: none; text-shadow: 1px 1px 2px #000; }

        .input-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(17,17,17,0.9); padding: 10px; display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; }
        .input-bar input { margin: 0; background: #000; border: 1px solid #333; height: 40px; }
        .chat-icon { width: 30px; height: 30px; cursor: pointer; object-fit: contain; }
        .search-results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; max-height: 120px; overflow-y: auto; }
        .res-card img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">WATCH LIVE</div>
            <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://www.w3schools.com/howto/img_avatar.png">
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
            </div>
            <input type="text" id="nick" placeholder="LƏQƏB (NICKNAME)">
            <input type="text" id="room" placeholder="OTAQ KODUNU DAXİL EDİN">
            <button class="btn" onclick="start('admin')">OTAQ YARAT</button>
            <button class="btn" style="background:#1a1a1a; margin-top:10px" onclick="start('member')">OTAĞA QOŞUL</button>
        </div>
    </div>

    <div id="app">
        <div class="theme-btn" onclick="toggleThemePanel()">🎨</div>
        <div id="theme-panel" class="theme-panel">
            <div style="font-size: 11px; margin-bottom: 10px; color: #888; font-weight: bold;">TEMA SEÇİN</div>
            <div class="theme-colors">
                <div class="color-opt" style="background: #050505;" onclick="setTheme('#050505')"></div>
                <div class="color-opt" style="background: #1a1a2e;" onclick="setTheme('#1a1a2e')"></div>
                <div class="color-opt" style="background: #2d132c;" onclick="setTheme('#2d132c')"></div>
                <div class="color-opt" style="background: #0f3443;" onclick="setTheme('#0f3443')"></div>
            </div>
            <button class="btn" style="padding: 10px; font-size: 11px;" onclick="document.getElementById('bg-input').click()">ŞƏKİL SEÇ</button>
            <input type="file" id="bg-input" hidden accept="image/*" onchange="uploadBg(this)">
        </div>

        <div class="video-section">
            <div id="player-container"><div id="player"></div></div>
            <div class="v-bar-cont">
                <span id="v-time">00:00 / 00:00</span>
                <div class="v-progress" id="v-seek-bar" onclick="handleSeek(event)">
                    <div id="v-fill"></div>
                </div>
            </div>
            <div class="controls-bar">
                <div class="main-btns">
                    <button id="voice-btn" onclick="toggleVoice()">MİK: KAPALI</button>
                    <button onclick="toggleFS()">TAM EKRAN</button>
                    <button onclick="togglePiP()">YAN EKRAN</button>
                    <button onclick="toggleUsers()">ÜZVLƏR (<span id="user-count">0</span>)</button>
                    <button id="admin-toggle-btn" onclick="toggleAdminPanel()" style="display:none; background:var(--blue); grid-column: span 2;">VİDEO PANEL</button>
                </div>
                <div id="admin-panel" class="admin-tools" style="display:none;">
                    <div style="display:flex; gap:5px;">
                        <button class="btn" style="background:#222; padding:8px; flex:1" onclick="seek(-10)">-10s</button>
                        <button class="btn" style="background:#2e7d32; padding:8px; flex:1" onclick="sc('play')">BAŞLAT</button>
                        <button class="btn" style="background:#c62828; padding:8px; flex:1" onclick="sc('pause')">DAYANDIR</button>
                        <button class="btn" style="background:#222; padding:8px; flex:1" onclick="seek(10)">+10s</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="sq" placeholder="Video axtar və ya link yapışdır...">
                        <button onclick="yt()">TAP</button>
                    </div>
                    <div id="results" class="search-results"></div>
                </div>
            </div>
        </div>
        
        <div id="users-box" class="users-panel"><div class="panel-header">Qoşulanlar</div><div id="users-list-content"></div></div>
        
        <div class="chat-wrap">
            <div id="messages"></div>
            <div id="typing-status"></div>
            <div class="input-bar">
                <img src="galery.png" class="chat-icon" onclick="document.getElementById('chat-img').click()" alt="Galereya">
                <input type="file" id="chat-img" hidden accept="image/*" onchange="sendImg(this)">
                <input type="text" id="mi" placeholder="Mesaj yazın..." oninput="handleTyping()">
                <img src="send.png" class="chat-icon" onclick="sm()" alt="Göndər">
            </div>
        </div>
    </div>

    <script>
        const CF = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com", projectId: "sevgili-testi" };
        const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";
        firebase.initializeApp(CF);
        const db = firebase.database();
        
        let ytP, myN, myR, myL, myPic = "https://www.w3schools.com/howto/img_avatar.png", ok = false, startTime = Date.now(), myId = Math.random().toString(36).substr(2, 9);
        let voiceStream = null, typingTimeout;

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function previewImage(input) { if (input.files && input.files[0]) { let r = new FileReader(); r.onload = e => { myPic = e.target.result; document.getElementById('avatar-preview').src = myPic; }; r.readAsDataURL(input.files[0]); } }
        
        // THEME LOGIC
        function toggleThemePanel() { const p = document.getElementById('theme-panel'); p.style.display = (p.style.display === 'none') ? 'block' : 'none'; }
        function setTheme(val, isImg = false) {
            db.ref(`rooms/${myR}/theme`).set({ val, isImg });
            toggleThemePanel();
        }
        function uploadBg(input) {
            if(input.files[0]) {
                let r = new FileReader();
                r.onload = e => setTheme(e.target.result, true);
                r.readAsDataURL(input.files[0]);
            }
        }

        function toggleAdminPanel() { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'none') ? 'flex' : 'none'; }
        function toggleUsers() { const b = document.getElementById('users-box'); b.style.display = (b.style.display === 'block') ? 'none' : 'block'; }
        function toggleFS() { const v = document.getElementById('app'); if (!document.fullscreenElement) v.requestFullscreen(); else document.exitFullscreen(); }

        async function togglePiP() {
            try {
                const video = document.getElementsByTagName('video')[0];
                if (document.pictureInPictureElement) await document.exitPictureInPicture();
                else if (video) await video.requestPictureInPicture();
                else showToast("Video aktiv deyil");
            } catch (e) { showToast("PiP dəstəklənmir"); }
        }

        function start(l) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR) return showToast("Məlumatları doldurun!");
            myL = l;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            if(l === 'admin') {
                document.getElementById('admin-toggle-btn').style.display = 'block';
                document.getElementById('v-seek-bar').classList.add('admin-seek');
            }
            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic, role: l });
            db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();
            init();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 }, events: { 'onReady': () => { ok = true; tick(); } } });
        }

        function fmt(s) { 
            let m = Math.floor(s / 60); s = Math.floor(s % 60); 
            return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s); 
        }

        function tick() {
            setInterval(() => {
                if(ok && ytP && ytP.getCurrentTime) {
                    const curr = ytP.getCurrentTime();
                    const dur = ytP.getDuration();
                    if(dur > 0) {
                        document.getElementById('v-fill').style.width = (curr/dur*100) + '%';
                        document.getElementById('v-time').innerText = `${fmt(curr)} / ${fmt(dur)}`;
                    }
                }
            }, 1000);
        }

        function handleSeek(e) {
            if(myL !== 'admin' || !ok) return;
            const bar = document.getElementById('v-seek-bar');
            const pct = (e.pageX - bar.offsetLeft) / bar.offsetWidth;
            const target = pct * ytP.getDuration();
            ytP.seekTo(target);
            sc('play');
        }

        function handleTyping() {
            db.ref(`rooms/${myR}/typing/${myId}`).set(myN);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => db.ref(`rooms/${myR}/typing/${myId}`).remove(), 2000);
        }

        async function yt() {
            const q = document.getElementById('sq').value; if(!q) return;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${q}&type=video&key=${YK}`);
            const d = await r.json(); const b = document.getElementById('results'); b.innerHTML = "";
            d.items.forEach(i => {
                const c = document.createElement('div'); c.className = "res-card";
                c.innerHTML = `<img src="${i.snippet.thumbnails.medium.url}">`;
                c.onclick = () => db.ref('rooms/'+myR+'/sync').set({ v: i.id.videoId, a: 'play', t: 0 });
                b.appendChild(c);
            });
        }

        function seek(s) { if(myL === 'admin') { let nt = ytP.getCurrentTime() + s; ytP.seekTo(nt); sc('play'); } }
        function sc(a) { if(myL === 'admin') db.ref('rooms/'+myR+'/sync').update({ a: a, t: ytP.getCurrentTime() }); }

        function init() {
            // Theme sync
            db.ref(`rooms/${myR}/theme`).on('value', s => {
                const t = s.val();
                if(t) {
                    if(t.isImg) {
                        document.body.style.backgroundImage = `url(${t.val})`;
                    } else {
                        document.body.style.backgroundImage = 'none';
                        document.body.style.backgroundColor = t.val;
                    }
                }
            });

            db.ref('rooms/'+myR+'/sync').on('value', s => {
                const d = s.val(); if(d && ok) {
                    if(d.v && d.v !== ytP.getVideoData().video_id) ytP.loadVideoById(d.v);
                    d.a === 'play' ? ytP.playVideo() : ytP.pauseVideo();
                    if(Math.abs(ytP.getCurrentTime() - d.t) > 3) ytP.seekTo(d.t);
                }
            });

            db.ref('rooms/'+myR+'/chat').orderByChild('ts').startAt(startTime).on('child_added', s => {
                const m = s.val(); const b = document.getElementById('messages');
                const d = document.createElement('div'); d.className = `m-row ${m.n === myN ? 'me' : ''}`;
                d.innerHTML = `<img src="${m.p}" class="m-avatar"><div class="m-bubble"><b>${m.n}</b><div>${m.img ? `<img src="${m.img}" style="max-width:150px; border-radius:4px;">` : m.t}</div></div>`;
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            });

            db.ref(`rooms/${myR}/typing`).on('value', s => {
                const data = s.val();
                const ts = document.getElementById('typing-status');
                if(!data) { ts.style.display = 'none'; return; }
                const users = Object.values(data).filter(n => n !== myN);
                if(users.length > 0) {
                    ts.innerText = users.join(', ') + " yazır...";
                    ts.style.display = 'block';
                } else { ts.style.display = 'none'; }
            });

            // FIXED: User count and real-time user list rendering fixed
            db.ref(`rooms/${myR}/users`).on('value', s => {
                const data = s.val();
                document.getElementById('user-count').innerText = s.numChildren();
                
                const listCont = document.getElementById('users-list-content');
                listCont.innerHTML = '';
                if(data) {
                    Object.values(data).forEach(u => {
                        const uRow = document.createElement('div');
                        uRow.className = 'u-item';
                        uRow.innerHTML = `<img src="${u.p}"> <span>${u.n} (${u.role === 'admin' ? 'Qurucu' : 'İzləyici'})</span>`;
                        listCont.appendChild(uRow);
                    });
                }
            });
        }

        function sm() { 
            const i = document.getElementById('mi'); if(!i.value) return; 
            db.ref('rooms/'+myR+'/chat').push({ n: myN, t: i.value, p: myPic, ts: Date.now() }); 
            i.value = '';
            db.ref(`rooms/${myR}/typing/${myId}`).remove();
        }

        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!voiceStream) {
                try { voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true }); btn.innerText = "MİK: AÇIQ"; btn.classList.add('active-mic'); } catch (e) { showToast("İcazə yoxdur"); }
            } else {
                voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null;
                btn.innerText = "MİK: KAPALI"; btn.classList.remove('active-mic');
            }
        }

        function sendImg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => db.ref('rooms/'+myR+'/chat').push({ n: myN, img: e.target.result, p: myPic, ts: Date.now() }); r.readAsDataURL(input.files[0]); } }
        document.getElementById('mi').onkeyup = e => { if(e.key === "Enter") sm(); };
    </script>
</body>
</html>
