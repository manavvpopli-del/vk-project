<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live - Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --bg: #050505; --card: #121212; --border: #252525; --text: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 12px 24px; border-radius: 4px; font-size: 13px; font-weight: 600; z-index: 10001; display: none; }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 4px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--red); font-size: 3.5rem; letter-spacing: 4px; margin-bottom: 25px; }
        
        .avatar-upload { width: 90px; height: 90px; margin: 0 auto 20px; cursor: pointer; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; }

        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 4px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }

        #app { display: none; height: 100%; width: 100%; flex-direction: column; }
        
        .video-section { width: 100%; background: #000; position: relative; }
        #player-container { width: 100%; height: 211px; position: relative; }
        #player { width: 100%; height: 100%; pointer-events: none; }
        #video-chat-overlay { position: absolute; bottom: 20px; left: 10px; z-index: 100; pointer-events: none; color: #fff; text-shadow: 1px 1px 2px #000; font-size: 12px; }

        .controls-bar { background: #0a0a0a; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); }
        .main-btns { display: flex; gap: 5px; overflow-x: auto; }
        .main-btns button { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 10px; white-space: nowrap; font-weight: bold; }

        .chat-wrap { flex-grow: 1; display: flex; flex-direction: column; background: #050505; position: relative; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m-row { display: flex; gap: 8px; max-width: 90%; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .m-bubble { background: #1a1a1a; padding: 10px; border-radius: 8px; font-size: 13px; position: relative; }
        .me .m-bubble { background: var(--red); }
        .rep-btn { font-size: 10px; color: #888; cursor: pointer; margin-top: 3px; display: block; }
        .rep-text { font-size: 11px; opacity: 0.7; border-left: 2px solid #fff; padding-left: 5px; margin-bottom: 5px; }

        .input-bar { background: #111; padding: 10px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
        #reply-panel { display: none; background: #1a1a1a; padding: 5px 15px; font-size: 11px; color: var(--red); justify-content: space-between; }
        
        .full-screen-mode { position: fixed !important; inset: 0 !important; z-index: 99999 !important; width: 100vw !important; height: 100vh !important; background: #000; }
        .full-screen-mode #player-container { height: 100% !important; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">WATCH LIVE</div>
            <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://www.w3schools.com/howto/img_avatar.png">
                <input type="file" id="file-input" hidden accept="image/*" onchange="prevImg(this)">
            </div>
            <input type="text" id="nick" placeholder="Nickname">
            <input type="text" id="room" placeholder="Otaq Kodu">
            <button class="btn" onclick="start('admin')">Otaq Yarat</button>
            <button class="btn" style="background:#1a1a1a; margin-top:10px" onclick="start('member')">Otağa Qoşul</button>
        </div>
    </div>

    <div id="app">
        <div class="video-section" id="v-sec">
            <div id="player-container">
                <div id="player"></div>
                <div id="video-chat-overlay"></div>
            </div>
            <div class="controls-bar">
                <div class="main-btns">
                    <button onclick="toggleAudio()" id="aud-btn" style="background:#2e7d32">SƏSİ AÇ</button>
                    <button onclick="goFull()">TAM EKRAN (YAN)</button>
                    <button id="adm-p" onclick="toggleAdm()" style="display:none; background:var(--red)">VİDEO PANEL</button>
                </div>
                <div id="adm-box" style="display:none; margin-top:10px">
                    <input type="text" id="sq" placeholder="Axtar və ya Link..." style="margin:0">
                    <button class="btn" style="padding:10px; margin-top:5px" onclick="ySearch()">TAP</button>
                    <div id="res" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:5px"></div>
                </div>
            </div>
        </div>

        <div class="chat-wrap">
            <div id="messages"></div>
            <div id="reply-panel"><span id="rep-inf"></span><span onclick="cancelRep()">✕</span></div>
            <div class="input-bar">
                <input type="text" id="mi" placeholder="Mesaj yaz...">
                <button class="btn" style="width:70px; padding:0" onclick="send()">GÖNDƏR</button>
            </div>
        </div>
    </div>

    <script>
        const CF = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com", projectId: "sevgili-testi" };
        const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";
        firebase.initializeApp(CF);
        const db = firebase.database();
        
        let ytP, myN, myR, myL, myPic = null, myId = "u" + Date.now(), ok = false, activeRep = null, stream = null;

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function prevImg(i) { if(i.files[0]) { let r = new FileReader(); r.onload = e => { myPic = e.target.result; document.getElementById('avatar-preview').src = myPic; }; r.readAsDataURL(i.files[0]); } }
        function toggleAdm() { const b = document.getElementById('adm-box'); b.style.display = b.style.display === 'none' ? 'block' : 'none'; }

        function start(l) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR || !myPic) return showToast("Şəkil seçin və xanaları doldurun!");
            myL = l;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            if(l === 'admin') document.getElementById('adm-p').style.display = 'block';
            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic });
            init();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0 }, events: { 'onReady': () => ok = true } });
        }

        function init() {
            // Sinxronizasiya
            if(myL === 'admin') {
                setInterval(() => { if(ok) db.ref(`rooms/${myR}/sync`).set({ t: ytP.getCurrentTime(), s: ytP.getPlayerState(), v: ytP.getVideoData().video_id }); }, 1000);
            } else {
                db.ref(`rooms/${myR}/sync`).on('value', s => {
                    const d = s.val(); if(d && ok) {
                        if(d.v && d.v !== ytP.getVideoData().video_id) ytP.loadVideoById(d.v);
                        if(Math.abs(ytP.getCurrentTime() - d.t) > 2) ytP.seekTo(d.t);
                        d.s === 1 ? ytP.playVideo() : ytP.pauseVideo();
                    }
                });
            }

            db.ref(`rooms/${myR}/chat`).on('child_added', s => {
                const m = s.val();
                const b = document.getElementById('messages');
                const d = document.createElement('div'); d.className = `m-row ${m.n === myN ? 'me' : ''}`;
                let rQ = m.rep ? `<div class="rep-text"><b>${m.rep.n}:</b> ${m.rep.t}</div>` : "";
                d.innerHTML = `<img src="${m.p}" class="m-avatar"><div class="m-bubble">${rQ}<b>${m.n}</b><br>${m.t}<span class="rep-btn" onclick="setRep('${m.n}','${m.t}')">Yanıtla</span></div>`;
                b.appendChild(d); b.scrollTop = b.scrollHeight;
                // Tam ekranda video üstü mesaj
                const ov = document.getElementById('video-chat-overlay');
                ov.innerHTML = `<b>${m.n}:</b> ${m.t}`;
                setTimeout(() => ov.innerHTML = "", 3000);
            });
        }

        function setRep(n, t) { activeRep = {n, t: t.slice(0,20)}; document.getElementById('reply-panel').style.display='flex'; document.getElementById('rep-inf').innerText = `Yanıt: ${n}`; }
        function cancelRep() { activeRep = null; document.getElementById('reply-panel').style.display='none'; }

        function send() {
            const i = document.getElementById('mi'); if(!i.value) return;
            db.ref(`rooms/${myR}/chat`).push({ n: myN, t: i.value, p: myPic, rep: activeRep });
            i.value = ""; cancelRep();
        }

        async function ySearch() {
            const q = document.getElementById('sq').value;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=3&q=${q}&type=video&key=${YK}`);
            const d = await r.json(); const res = document.getElementById('res'); res.innerHTML = "";
            d.items.forEach(v => {
                const img = document.createElement('img'); img.src = v.snippet.thumbnails.medium.url; img.style.width="100%";
                img.onclick = () => { ytP.loadVideoById(v.id.videoId); toggleAdm(); };
                res.appendChild(img);
            });
        }

        async function toggleAudio() {
            const btn = document.getElementById('aud-btn');
            if(!stream) {
                try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); btn.innerText = "SƏSİ BAĞLA"; btn.style.background = "#c62828"; showToast("Səsli söhbət aktivdir."); } 
                catch(e) { showToast("Mikrofon tapılmadı."); }
            } else { stream.getTracks().forEach(t => t.stop()); stream = null; btn.innerText = "SƏSİ AÇ"; btn.style.background = "#2e7d32"; }
        }

        function goFull() {
            const v = document.getElementById('v-sec');
            if(!document.fullscreenElement) {
                if(v.requestFullscreen) v.requestFullscreen();
                v.classList.add('full-screen-mode');
                if(screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape");
            } else { document.exitFullscreen(); v.classList.remove('full-screen-mode'); }
        }

        document.getElementById('mi').onkeyup = e => { if(e.key === "Enter") send(); };
    </script>
</body>
</html>
