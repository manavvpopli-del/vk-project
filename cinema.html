<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Live - Cinematic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: #fff; }

        /* Cinematic Background */
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -1; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 12px 25px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 10001; display: none; box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4); }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
        .auth-card { background: var(--glass); padding: 40px; border-radius: 24px; width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .logo { font-family: 'Bebas Neue', sans-serif; color: var(--red); font-size: 4rem; letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
        .subtitle { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .avatar-section { margin-bottom: 25px; position: relative; display: inline-block; }
        .avatar-upload { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 3px solid var(--red); cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(229, 9, 20, 0.3); }
        .avatar-upload:hover { transform: scale(1.05); }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 10px; color: #666; font-weight: 700; margin-left: 15px; text-transform: uppercase; }
        input { width: 100%; padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; outline: none; transition: 0.3s; margin-top: 5px; }
        input:focus { border-color: var(--red); background: rgba(0,0,0,0.5); }

        .btn { width: 100%; padding: 18px; background: var(--red); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); transform: translateY(-2px); }
        .btn-sec { background: transparent; border: 1px solid var(--border); margin-top: 12px; }
        .btn-sec:hover { background: var(--glass); }

        /* App Layout */
        #app { display: none; height: 100%; width: 100%; flex-direction: column; }
        .video-section { background: #000; border-bottom: 1px solid var(--border); }
        #player-container { width: 100%; height: 220px; position: relative; }
        #player { width: 100%; height: 100%; }

        /* Room Info Bar (KOD BURADA GORSENIR) */
        .room-header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .room-code-tag { background: var(--glass); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); font-family: monospace; color: var(--red); font-weight: bold; font-size: 16px; cursor: pointer; }

        .controls-bar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .main-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .main-btns button { background: var(--glass); border: 1px solid var(--border); color: #ccc; padding: 12px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .share-special { grid-column: span 3; background: var(--red) !important; color: white !important; border: none !important; margin-top: 5px; }

        /* Chat */
        .chat-wrap { flex: 1; display: flex; flex-direction: column; position: relative; background: #080808; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .m-row { display: flex; gap: 12px; max-width: 85%; }
        .m-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .m-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); }
        .m-bubble { background: var(--glass); padding: 12px; border-radius: 15px 15px 15px 4px; font-size: 14px; border: 1px solid var(--border); }
        .m-row.me .m-bubble { background: var(--red); border-radius: 15px 15px 4px 15px; border: none; }
        
        .input-bar { position: absolute; bottom: 0; width: 100%; background: #0f0f0f; padding: 15px; display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); }
        .chat-icon { width: 28px; height: 28px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .chat-icon:hover { opacity: 1; }
        #mi { margin: 0; background: #000; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="auth-box" class="auth-overlay">
        <div class="auth-card">
            <div class="logo">WATCH LIVE</div>
            <div class="subtitle">Birlikdə İzləməyin Cinematic Həzzi</div>
            
            <div class="avatar-section">
                <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                    <img id="avatar-preview" src="https://www.w3schools.com/howto/img_avatar.png">
                </div>
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
            </div>

            <div class="input-group">
                <label>Sənin Ləqəbin</label>
                <input type="text" id="nick" placeholder="Məs: Veliyev">
            </div>

            <div class="input-group" id="room-input-group">
                <label>Otaq Kodu</label>
                <input type="text" id="room" placeholder="6 rəqəmli kod">
            </div>

            <button class="btn" onclick="start('admin')">Otaq Yarat</button>
            <button class="btn btn-sec" onclick="start('member')">Otağa Qoşul</button>
        </div>
    </div>

    <div id="app">
        <div class="room-header">
            <span style="font-size: 12px; color: #666;">OTAQ KODU:</span>
            <div class="room-code-tag" id="display-code" onclick="copyCode()">000000</div>
        </div>

        <div class="video-section">
            <div id="player-container"><div id="player"></div></div>
            <div class="controls-bar">
                <div class="main-btns">
                    <button id="voice-btn" onclick="toggleVoice()">MİKROFON</button>
                    <button onclick="toggleFS()">TAM EKRAN</button>
                    <button onclick="toggleUsers()">ÜZVLƏR (<span id="user-count">0</span>)</button>
                    <button class="share-special" onclick="shareRoom()">PAYLAŞ (WhatsApp / Link)</button>
                </div>
            </div>
        </div>

        <div class="chat-wrap">
            <div id="messages"></div>
            <div class="input-bar">
                <img src="galery.png" class="chat-icon" onclick="document.getElementById('chat-img').click()">
                <input type="file" id="chat-img" hidden accept="image/*" onchange="sendImg(this)">
                <input type="text" id="mi" placeholder="Mesaj yazın...">
                <img src="send.png" class="chat-icon" onclick="sm()">
            </div>
        </div>
    </div>

    <script>
        const CF = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com", projectId: "sevgili-testi" };
        firebase.initializeApp(CF);
        const db = firebase.database();
        let ytP, myN, myR, myL, myPic = "https://www.w3schools.com/howto/img_avatar.png", ok = false, myId = Math.random().toString(36).substr(2, 9), voiceStream = null;

        // Otaq kodu default olaraq random yaranır
        const autoCode = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('room').value = autoCode;

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function copyCode() {
            navigator.clipboard.writeText(myR);
            showToast("Kod kopyalandı!");
        }

        function previewImage(input) { 
            if (input.files && input.files[0]) { 
                let r = new FileReader(); 
                r.onload = e => { myPic = e.target.result; document.getElementById('avatar-preview').src = myPic; }; 
                r.readAsDataURL(input.files[0]); 
            } 
        }

        function shareRoom() {
            const text = `Mənimlə video izlə! Otaq kodu: ${myR}`;
            if (navigator.share) {
                navigator.share({ title: 'Watch Live', text: text, url: window.location.href });
            } else {
                copyCode();
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
            }
        }

        function start(l) {
            myN = document.getElementById('nick').value.trim();
            myR = document.getElementById('room').value.trim();
            if(!myN || !myR) return showToast("Bütün xanaları doldur!");
            myL = l;
            document.getElementById('display-code').innerText = myR;
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            db.ref(`rooms/${myR}/users/${myId}`).set({ n: myN, p: myPic, role: l });
            db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();
            init();
        }

        function onYouTubeIframeAPIReady() {
            ytP = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'autoplay': 0, 'controls': 1, 'playsinline': 1 }, events: { 'onReady': () => ok = true } });
        }

        function init() {
            db.ref('rooms/'+myR+'/sync').on('value', s => {
                const d = s.val(); if(d && ok) {
                    if(d.v && d.v !== ytP.getVideoData().video_id) ytP.loadVideoById(d.v);
                    d.a === 'play' ? ytP.playVideo() : ytP.pauseVideo();
                    if(Math.abs(ytP.getCurrentTime() - d.t) > 3) ytP.seekTo(d.t);
                }
            });

            db.ref('rooms/'+myR+'/chat').limitToLast(1).on('child_added', s => {
                const m = s.val(); if(m.ts < Date.now() - 5000) return;
                const b = document.getElementById('messages');
                const d = document.createElement('div'); d.className = `m-row ${m.n === myN ? 'me' : ''}`;
                let content = m.img ? `<img src="${m.img}" style="max-width:180px; border-radius:10px;">` : m.t;
                d.innerHTML = `<img src="${m.p}" class="m-avatar"><div class="m-bubble"><b>${m.n}</b><div style="margin-top:5px">${content}</div></div>`;
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            });

            db.ref(`rooms/${myR}/users`).on('value', s => {
                document.getElementById('user-count').innerText = s.numChildren();
            });
        }

        function sm() { 
            const i = document.getElementById('mi'); if(!i.value) return; 
            db.ref('rooms/'+myR+'/chat').push({ n: myN, t: i.value, p: myPic, ts: Date.now() }); 
            i.value = '';
        }

        function toggleFS() { const v = document.getElementById('player-container'); if (!document.fullscreenElement) v.requestFullscreen(); else document.exitFullscreen(); }
        
        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!voiceStream) {
                try { voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true }); btn.style.color = "var(--red)"; btn.innerText = "MİK: AÇIQ"; } catch(e) { showToast("Mikrofon xətası!"); }
            } else {
                voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null;
                btn.style.color = "#ccc"; btn.innerText = "MİKROFON";
            }
        }

        function sendImg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => db.ref('rooms/'+myR+'/chat').push({ n: myN, img: e.target.result, p: myPic, ts: Date.now() }); r.readAsDataURL(input.files[0]); } }
        document.getElementById('mi').onkeyup = e => { if(e.key === "Enter") sm(); };
    </script>
</body>
</html>
