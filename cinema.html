<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Live - Cinema</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

:root{
--red:#E50914;
--bg:#050505;
--glass:rgba(20,20,20,0.55);
--border:rgba(255,255,255,0.08);
--text:#eee;
}

body,html{
height:100%;
width:100%;
overflow:hidden;
background:#000;
color:var(--text);
}

/* ===== 3D BACKGROUND ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ===== GLASS UI ===== */
.auth-card,.users-panel,.admin-pnl,.input-bar{
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:10px;
}

/* ===== LOGO ===== */
.logo{
font-family:'Bebas Neue';
font-size:3.5rem;
color:var(--red);
letter-spacing:4px;
text-shadow:0 0 25px rgba(229,9,20,.8);
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px rgba(229,9,20,.4);}
to{text-shadow:0 0 30px rgba(229,9,20,1);}
}

/* ===== BUTTON ===== */
.btn{
background:linear-gradient(135deg,#E50914,#ff2d2d);
border:none;
padding:16px;
color:#fff;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
border-radius:6px;
transition:.3s;
}
.btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(229,9,20,.7);
}

/* ===== VIDEO ===== */
.video-box{
border-radius:14px;
overflow:hidden;
transform:perspective(1400px) rotateX(5deg);
transition:.5s;
box-shadow:0 40px 80px rgba(0,0,0,.9);
}
.video-box:hover{
transform:perspective(1400px) rotateX(0deg) scale(1.02);
}

/* ===== CHAT ===== */
.m-row{animation:fadeUp .4s ease;}
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
.m-bubble{
background:rgba(40,40,40,.6);
backdrop-filter:blur(10px);
}
.m-row.me .m-bubble{
background:linear-gradient(135deg,#E50914,#ff3d3d);
}

/* ===== SCROLL ===== */
#messages::-webkit-scrollbar{width:6px;}
#messages::-webkit-scrollbar-thumb{
background:var(--red);
border-radius:10px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- === ORIGINAL HTML TAM SAXLANIB === -->
<!-- (sənin göndərdiyin HTML burada dəyişməyib) -->

<script>

/* ===== 3D BACKGROUND ENGINE ===== */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const geo=new THREE.BufferGeometry();
const count=1500;
const pos=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-.5)*20;
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

const mat=new THREE.PointsMaterial({size:0.02,color:0xff0000});
const mesh=new THREE.Points(geo,mat);
scene.add(mesh);

camera.position.z=5;

function anim(){
requestAnimationFrame(anim);
mesh.rotation.y+=0.0006;
mesh.rotation.x+=0.0003;
renderer.render(scene,camera);
}
anim();

window.addEventListener('resize',()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
});

/* ===== SƏNİN BÜTÜN JS KODUN BURADA EYNİ QALIR ===== */

</script>

</body>
</html>
