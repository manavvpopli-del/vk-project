<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Live Cinematic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --accent:#ff1f3d;
    --bg:#050505;
    --glass:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.1);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background: radial-gradient(circle at top,#0a0a0a,#000);
    color:#fff;
    height:100vh;
    overflow:hidden;
}

/* GLASS */
.glass{
    background:var(--glass);
    backdrop-filter:blur(25px);
    border:1px solid var(--border);
    border-radius:20px;
}

/* AUTH */
.auth-overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-card{
    width:320px;
    padding:30px;
    text-align:center;
}

.logo{
    font-size:40px;
    font-weight:700;
    color:var(--accent);
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    background:#000;
    border:1px solid #333;
    border-radius:10px;
    color:#fff;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff1f3d,#ff4d6d);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    transform:translateY(-2px) scale(1.02);
}

/* APP */
#app{
    display:none;
    height:100%;
    flex-direction:column;
}

/* VIDEO */
.video-box{
    height:40%;
    position:relative;
}

#player{
    width:100%;
    height:100%;
}

/* FLOAT CONTROLS */
.top-controls{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.top-controls button{
    background:rgba(0,0,0,0.6);
    border:1px solid var(--border);
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.top-controls button:hover{
    background:var(--accent);
}

/* CHAT */
.chat-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* MESSAGE */
.m-row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.m-row.me{
    justify-content:flex-end;
}

.m-bubble{
    padding:12px;
    border-radius:15px;
    background:#111;
    max-width:70%;
}

.m-row.me .m-bubble{
    background:var(--accent);
}

/* INPUT BAR */
.input-bar{
    display:flex;
    gap:10px;
    padding:10px;
}

.input-bar input{
    flex:1;
}

.icon-btn{
    background:none;
    border:none;
    color:#fff;
    font-size:20px;
}

/* 3D HOVER */
.m-bubble:hover{
    transform:scale(1.03);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    transition:0.2s;
}

/* SCROLL */
#messages::-webkit-scrollbar{
    width:4px;
}
#messages::-webkit-scrollbar-thumb{
    background:var(--accent);
}
</style>
</head>

<body>

<div id="auth-box" class="auth-overlay">
    <div class="auth-card glass">
        <div class="logo">WATCH</div>
        <input id="nick" placeholder="Nickname">
        <input id="room" placeholder="Room Code">
        <button class="btn" onclick="start('admin')">CREATE</button>
        <button class="btn" onclick="start('member')" style="margin-top:10px;background:#111">JOIN</button>
    </div>
</div>

<div id="app">
    <div class="video-box">
        <div id="player"></div>

        <div class="top-controls">
            <button onclick="toggleFS()">⛶</button>
            <button onclick="toggleUsers()">👥</button>
            <button onclick="toggleAdmin()">⚙</button>
        </div>
    </div>

    <div class="chat-wrap">
        <div id="messages"></div>

        <div class="input-bar glass">
            <input id="mi" placeholder="Message...">
            <button class="icon-btn" onclick="sm()">➤</button>
        </div>
    </div>
</div>

</body>
</html>
