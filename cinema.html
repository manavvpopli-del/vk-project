<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>WATCH LIVE • CINEMATIC</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050505;
    --card:rgba(20,20,20,.72);
    --border:rgba(255,255,255,.08);
    --red:#ff1e38;
    --text:#ffffff;
    --muted:#8b8b8b;
    --blur:blur(25px);
    --shadow:0 10px 40px rgba(0,0,0,.55);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:white;
    position:fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(255,0,76,.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,119,255,.12), transparent 35%),
    linear-gradient(to bottom,#050505,#000);
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(2px);
    z-index:-1;
}

#toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:14px 26px;
    border-radius:18px;
    background:rgba(255,30,56,.9);
    backdrop-filter:blur(20px);
    color:white;
    font-weight:700;
    letter-spacing:1px;
    font-size:12px;
    display:none;
    z-index:99999;
    box-shadow:0 10px 40px rgba(255,0,76,.35);
}

.auth-overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.auth-card{
    width:100%;
    max-width:430px;
    padding:35px;
    border-radius:35px;
    background:rgba(15,15,15,.72);
    border:1px solid rgba(255,255,255,.07);
    backdrop-filter:blur(35px);
    box-shadow:
    0 0 0 1px rgba(255,255,255,.03),
    0 30px 80px rgba(0,0,0,.7);
}

.logo{
    text-align:center;
    font-size:3rem;
    font-weight:900;
    letter-spacing:4px;
    margin-bottom:28px;
    background:linear-gradient(to right,#fff,#ff3556);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.avatar-upload{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.1);
    position:relative;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 10px 35px rgba(255,0,76,.2);
}

.avatar-upload:hover{
    transform:scale(1.05);
}

#avatar-preview{
    width:100%;
    height:100%;
    object-fit:cover;
}

input{
    width:100%;
    height:56px;
    margin-top:16px;
    border:none;
    outline:none;
    border-radius:18px;
    padding:0 18px;
    background:rgba(255,255,255,.05);
    color:white;
    font-size:14px;
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(15px);
}

input::placeholder{
    color:#7f7f7f;
}

input[readonly]{
    color:#ff4f69;
    font-weight:700;
}

.btn{
    width:100%;
    height:56px;
    margin-top:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#ff1744,#ff4d6d);
    color:white;
    font-weight:800;
    letter-spacing:1px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 15px 40px rgba(255,23,68,.25);
}

.btn:hover{
    transform:translateY(-2px);
}

#app{
    display:none;
    flex-direction:column;
    width:100%;
    height:100%;
}

.video-section{
    width:100%;
    padding:12px;
}

#player-container{
    width:100%;
    height:230px;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 25px 60px rgba(0,0,0,.7);
}

#player{
    width:100%;
    height:100%;
}

.controls-bar{
    margin-top:12px;
    background:rgba(15,15,15,.65);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(30px);
    border-radius:25px;
    padding:12px;
}

.main-btns{
    display:flex;
    gap:10px;
}

.main-btns button{
    flex:1;
    height:48px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.05);
    color:white;
    font-size:11px;
    font-weight:800;
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.05);
}

.main-btns button:active{
    transform:scale(.97);
}

.active-mic{
    background:linear-gradient(135deg,#00c853,#2e7d32)!important;
}

.admin-tools{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.search-box{
    display:flex;
    gap:8px;
}

.search-box input{
    margin:0;
}

.search-box button{
    width:85px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#ff1744,#ff5c74);
    color:white;
    font-weight:800;
}

.search-results{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.res-card{
    overflow:hidden;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
}

.res-card img{
    width:100%;
    display:block;
}

.users-panel{
    position:absolute;
    top:85px;
    right:14px;
    width:220px;
    background:rgba(15,15,15,.82);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,.06);
    border-radius:22px;
    overflow:hidden;
    display:none;
    z-index:100;
}

.panel-header{
    padding:15px;
    font-size:12px;
    font-weight:800;
    border-bottom:1px solid rgba(255,255,255,.06);
    color:#a1a1a1;
}

.user-item{
    padding:12px 15px;
    font-size:13px;
}

.chat-wrap{
    flex:1;
    position:relative;
    overflow:hidden;
    padding:0 12px 12px;
}

#messages{
    width:100%;
    height:100%;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:16px;
    padding-bottom:90px;
}

#messages::-webkit-scrollbar{
    display:none;
}

.m-row{
    display:flex;
    gap:10px;
    max-width:85%;
    animation:fade .25s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.m-row.me{
    align-self:flex-end;
    flex-direction:row-reverse;
}

.m-avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.08);
}

.m-bubble{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(25px);
    padding:12px;
    border-radius:18px;
    color:white;
    font-size:13px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.m-row.me .m-bubble{
    background:linear-gradient(135deg,#ff1744,#ff4d6d);
}

.input-bar{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    padding:12px;
    display:flex;
    gap:10px;
    align-items:center;
    background:linear-gradient(to top,#000,transparent);
}

.input-bar input{
    margin:0;
    flex:1;
    height:52px;
    border-radius:18px;
}

.chat-icon{
    width:44px;
    height:44px;
    padding:10px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    object-fit:contain;
}

#reply-indicator{
    display:none;
    padding:12px;
    background:rgba(255,255,255,.05);
    border-radius:16px;
    margin-bottom:8px;
    font-size:12px;
}

</style>
</head>

<body>

<div id="toast"></div>

<div id="auth-box" class="auth-overlay">

    <div class="auth-card">

        <div class="logo">WATCH LIVE</div>

        <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
            <img id="avatar-preview" src="https://www.w3schools.com/howto/img_avatar.png">
            <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
        </div>

        <input type="text" id="nick" placeholder="LƏQƏB">
        <input type="text" id="room" placeholder="OTAQ KODU" readonly>

        <button class="btn" onclick="start('admin')">OTAQ YARAT</button>

        <button class="btn"
        style="background:rgba(255,255,255,.05); box-shadow:none;"
        onclick="start('member')">
        OTAĞA QOŞUL
        </button>

    </div>

</div>

<div id="app">

    <div class="video-section">

        <div id="player-container">
            <div id="player"></div>
        </div>

        <div class="controls-bar">

            <div class="main-btns">

                <button id="voice-btn" onclick="toggleVoice()">MİK</button>

                <button onclick="toggleFS()">FULL</button>

                <button onclick="toggleUsers()">ÜZVLƏR (<span id="user-count">0</span>)</button>

                <button id="admin-toggle-btn"
                onclick="toggleAdminPanel()"
                style="display:none;">
                PANEL
                </button>

            </div>

            <div id="admin-panel" class="admin-tools" style="display:none;">

                <div style="display:flex; gap:8px;">

                    <button class="btn" style="height:45px; background:#1b1b1b;" onclick="seek(-10)">-10s</button>

                    <button class="btn" style="height:45px;" onclick="sc('play')">PLAY</button>

                    <button class="btn" style="height:45px; background:#222;" onclick="sc('pause')">PAUSE</button>

                    <button class="btn" style="height:45px; background:#1b1b1b;" onclick="seek(10)">+10s</button>

                </div>

                <div class="search-box">

                    <input type="text" id="sq" placeholder="Video axtar...">

                    <button onclick="yt()">TAP</button>

                </div>

                <div id="results" class="search-results"></div>

            </div>

        </div>

    </div>

    <div id="users-box" class="users-panel">

        <div class="panel-header">AKTİV İSTİFADƏÇİLƏR</div>

        <div id="users-list-content"></div>

    </div>

    <div class="chat-wrap">

        <div id="messages"></div>

        <div id="reply-indicator">
            <span id="reply-text"></span>
            <span onclick="cancelReply()">✕</span>
        </div>

        <div class="input-bar">

            <img src="galery.png"
            class="chat-icon"
            onclick="document.getElementById('chat-img').click()">

            <input type="file"
            id="chat-img"
            hidden
            accept="image/*"
            onchange="sendImg(this)">

            <input type="text"
            id="mi"
            placeholder="Mesaj yaz...">

            <img src="send.png"
            class="chat-icon"
            onclick="sm()">

        </div>

    </div>

</div>

<script>

const generatedCode = Math.floor(100000 + Math.random() * 900000);
document.getElementById('room').value = generatedCode;

const CF = {
apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
projectId: "sevgili-testi"
};

const YK = "AIzaSyAYacoXmlRcQBTsAsa23GanByLzUkLOwOk";

firebase.initializeApp(CF);

const db = firebase.database();

let ytP,myN,myR,myL,
myPic="https://www.w3schools.com/howto/img_avatar.png",
ok=false,
startTime=Date.now(),
myId=Math.random().toString(36).substr(2,9);

let voiceStream=null;

function showToast(msg){
const t=document.getElementById('toast');
t.innerText=msg;
t.style.display='block';
setTimeout(()=>t.style.display='none',3000);
}

function previewImage(input){
if(input.files && input.files[0]){
let r=new FileReader();
r.onload=e=>{
myPic=e.target.result;
document.getElementById('avatar-preview').src=myPic;
};
r.readAsDataURL(input.files[0]);
}
}

function toggleAdminPanel(){
const p=document.getElementById('admin-panel');
p.style.display=(p.style.display==='none')?'flex':'none';
}

function toggleUsers(){
const b=document.getElementById('users-box');
b.style.display=(b.style.display==='block')?'none':'block';
}

function toggleFS(){
const v=document.getElementById('player-container');
if(!document.fullscreenElement){
v.requestFullscreen();
}else{
document.exitFullscreen();
}
}

function start(l){

myN=document.getElementById('nick').value.trim();
myR=document.getElementById('room').value.trim();

if(!myN || !myR) return showToast("Məlumatları doldurun!");

myL=l;

document.getElementById('auth-box').style.display='none';
document.getElementById('app').style.display='flex';

if(l==='admin')
document.getElementById('admin-toggle-btn').style.display='block';

db.ref(`rooms/${myR}/users/${myId}`).set({
n:myN,
p:myPic,
role:l
});

db.ref(`rooms/${myR}/users/${myId}`).onDisconnect().remove();

init();
}

function onYouTubeIframeAPIReady(){

ytP=new YT.Player('player',{

height:'100%',
width:'100%',
videoId:'',

playerVars:{
'autoplay':0,
'controls':0,
'playsinline':1
},

events:{
'onReady':()=>ok=true
}

});

}

async function yt(){

const q=document.getElementById('sq').value;

if(!q) return;

const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${q}&type=video&key=${YK}`);

const d=await r.json();

const b=document.getElementById('results');

b.innerHTML="";

d.items.forEach(i=>{

const c=document.createElement('div');

c.className='res-card';

c.innerHTML=`<img src="${i.snippet.thumbnails.medium.url}">`;

c.onclick=()=>db.ref('rooms/'+myR+'/sync').set({
v:i.id.videoId,
a:'play',
t:0,
f:Date.now()
});

b.appendChild(c);

});

}

function seek(s){

if(myL==='admin'){

let nt=ytP.getCurrentTime()+s;

ytP.seekTo(nt);

sc('play');

}

}

function sc(a){

if(myL==='admin')

db.ref('rooms/'+myR+'/sync').update({
a:a,
t:ytP.getCurrentTime()
});

}

function init(){

db.ref('rooms/'+myR+'/sync').on('value',s=>{

const d=s.val();

if(d && ok){

if(d.v && d.v!==ytP.getVideoData().video_id){
ytP.loadVideoById(d.v);
}

d.a==='play'
? ytP.playVideo()
: ytP.pauseVideo();

if(Math.abs(ytP.getCurrentTime()-d.t)>3)
ytP.seekTo(d.t);

}

});

db.ref('rooms/'+myR+'/chat')
.orderByChild('ts')
.startAt(startTime)
.on('child_added',s=>{

const m=s.val();

const b=document.getElementById('messages');

const d=document.createElement('div');

d.className=`m-row ${m.n===myN ? 'me' : ''}`;

let content=m.img
? `<img src="${m.img}" style="max-width:180px;border-radius:16px;">`
: m.t;

d.innerHTML=`
<img src="${m.p}" class="m-avatar">
<div class="m-bubble">
<b>${m.n}</b>
<div style="margin-top:4px;">${content}</div>
</div>
`;

b.appendChild(d);

b.scrollTop=b.scrollHeight;

});

db.ref(`rooms/${myR}/users`).on('value',s=>{
document.getElementById('user-count').innerText=s.numChildren();
});

}

function sm(){

const i=document.getElementById('mi');

if(!i.value) return;

db.ref('rooms/'+myR+'/chat').push({
n:myN,
t:i.value,
p:myPic,
ts:Date.now()
});

i.value='';

}

async function toggleVoice(){

const btn=document.getElementById('voice-btn');

if(!voiceStream){

try{

voiceStream=await navigator.mediaDevices.getUserMedia({
audio:true
});

btn.innerText="MİK AÇIQ";

btn.classList.add('active-mic');

}catch(e){

showToast("İcazə yoxdur");

}

}else{

voiceStream.getTracks().forEach(t=>t.stop());

voiceStream=null;

btn.innerText="MİK";

btn.classList.remove('active-mic');

}

}

function sendImg(input){

if(input.files[0]){

let r=new FileReader();

r.onload=e=>

db.ref('rooms/'+myR+'/chat').push({
n:myN,
img:e.target.result,
p:myPic,
ts:Date.now()
});

r.readAsDataURL(input.files[0]);

}

}

document.getElementById('mi').onkeyup=e=>{
if(e.key==="Enter") sm();
};

</script>

</body>
</html>
