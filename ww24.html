<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW24 - Master Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #08080a; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; }
        .panel { max-width: 800px; margin: 0 auto; }
        h1 { font-family: 'Orbitron'; color: #00b9ff; text-align: center; letter-spacing: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #111; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: #00b9ff; font-size: 0.8rem; text-transform: uppercase; }
        
        .input-edit { background: #000; border: 1px solid #333; color: #fff; padding: 5px; width: 80px; border-radius: 5px; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #3f9c35; color: white; margin-right: 5px; }
        .btn-block { background: #ff3344; color: white; }
        .btn-unblock { background: #555; color: white; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .bg-active { background: rgba(63, 156, 53, 0.2); color: #3f9c35; }
        .bg-blocked { background: rgba(255, 51, 68, 0.2); color: #ff3344; }
    </style>
</head>
<body>

<div class="panel">
    <h1>WW24 ADMIN</h1>
    
    <table id="user-table">
        <thead>
            <tr>
                <th>İstifadəçi</th>
                <th>Balans ($)</th>
                <th>Status</th>
                <th>Əməliyyatlar</th>
            </tr>
        </thead>
        <tbody id="user-list">
            </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Siyahını Yüklə
    db.ref('mining').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        const data = snap.val();

        for(let user in data) {
            const d = data[user];
            const isBlocked = d.status === "blocked";
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: bold;">${user}</td>
                <td><input type="number" id="bal-${user}" class="input-edit" value="${d.balance}"></td>
                <td><span class="status-badge ${isBlocked ? 'bg-blocked' : 'bg-active'}">${isBlocked ? 'BLOK' : 'AKTİV'}</span></td>
                <td>
                    <button class="btn btn-save" onclick="saveBal('${user}')"><i class="fas fa-save"></i></button>
                    <button class="btn ${isBlocked ? 'btn-unblock' : 'btn-block'}" onclick="toggleBlock('${user}', ${isBlocked})">
                        <i class="fas ${isBlocked ? 'fa-user-check' : 'fa-user-slash'}"></i>
                    </button>
                </td>
            `;
            list.appendChild(tr);
        }
    });

    function saveBal(user) {
        const newBal = document.getElementById('bal-' + user).value;
        db.ref('mining/' + user).update({ balance: parseFloat(newBal) });
        alert(user + " balansı yeniləndi!");
    }

    function toggleBlock(user, isBlocked) {
        const newStatus = isBlocked ? "active" : "blocked";
        db.ref('mining/' + user).update({ status: newStatus });
    }
</script>
</body>
</html>
