<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | Payment Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root {
            --bg: #05050a;
            --card: #0c0c14;
            --accent: #ffd700;
            --success: #00ff00;
            --error: #ff3333;
            --border: rgba(255,255,255,0.05);
        }

        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            padding: 40px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { font-family: 'Syncopate'; font-size: 1rem; letter-spacing: 3px; color: var(--accent); }

        .request-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .req-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 25px; position: relative; animation: fadeIn 0.5s ease;
        }

        .status-badge { 
            position: absolute; top: 15px; right: 15px; font-size: 0.6rem; 
            padding: 4px 10px; border-radius: 5px; background: #222; font-weight: 900;
        }

        .user-info { margin-bottom: 20px; }
        .user-info b { color: var(--accent); font-size: 1.2rem; }
        
        .pts-amount { font-size: 1.5rem; font-weight: 900; margin: 15px 0; color: #fff; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-approve { background: var(--success); color: black; }
        .btn-reject { background: var(--error); color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        .no-data { text-align: center; opacity: 0.3; margin-top: 100px; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>ELITE ADMIN PORTAL</h1>
    <div id="admin-status">Connected to Firebase <i class="fas fa-circle" style="color:var(--success); font-size:0.7rem;"></i></div>
</div>

<div id="requests-container" class="request-grid">
    <div class="no-data">Gözləyən ödəniş yoxdur...</div>
</div>

<script>
    // SƏNİN FİREBASE KONFİQURASİYAN
    const firebaseConfig = { 
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", 
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ÖDƏNİŞLƏRİ DİNLƏMƏK
    db.ref('pending_payments').on('value', (snapshot) => {
        const container = document.getElementById('requests-container');
        container.innerHTML = "";
        
        if (!snapshot.exists()) {
            container.innerHTML = '<div class="no-data">Gözləyən ödəniş yoxdur...</div>';
            return;
        }

        snapshot.forEach((child) => {
            const data = child.val();
            const key = child.key;

            if (data.status === "pending") {
                container.innerHTML += `
                    <div class="req-card" id="card-${key}">
                        <div class="status-badge">PENDING APPROVAL</div>
                        <div class="user-info">
                            <small>İstifadəçi:</small><br>
                            <b>${data.user.toUpperCase()}</b>
                        </div>
                        <div class="pts-amount">
                            <i class="fas fa-gem" style="color:var(--accent)"></i> ${data.pts} PTS
                        </div>
                        <div style="font-size:0.7rem; opacity:0.5;">
                            Tarix: ${new Date(data.timestamp).toLocaleString()}
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="approvePayment('${key}', '${data.user}', ${data.pts})">TƏSDİQLƏ</button>
                            <button class="btn btn-reject" onclick="rejectPayment('${key}')">İMTİNA</button>
                        </div>
                    </div>
                `;
            }
        });
    });

    // TƏSDİQLƏMƏ FUNKSİYASI
    async function approvePayment(key, userId, ptsToAdd) {
        if (!confirm(`${userId} üçün ${ptsToAdd} PTS təsdiqlənsin?`)) return;

        try {
            // 1. İstifadəçinin cari xalını al
            const userRef = db.ref('users/' + userId + '/points');
            const snap = await userRef.get();
            const currentPoints = snap.val() || 0;

            // 2. Yeni xalı hesabla və yenilə
            await userRef.set(currentPoints + parseInt(ptsToAdd));

            // 3. Ödənişin statusunu dəyiş (və ya sil)
            await db.ref('pending_payments/' + key).update({
                status: "approved",
                approvedAt: new Date().getTime()
            });

            alert("UĞURLU: PTS balansına köçürüldü!");
        } catch (e) {
            alert("XƏTA: " + e.message);
        }
    }

    // İMTİNA FUNKSİYASI
    async function rejectPayment(key) {
        if (!confirm("Bu ödəniş istəyi silinsin?")) return;
        await db.ref('pending_payments/' + key).remove();
    }
</script>

</body>
</html>
