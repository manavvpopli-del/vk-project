<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackatron | Master Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        
        :root { --bg: #050508; --accent: #00dfff; --warn: #ffd700; --danger: #ff0055; --card: rgba(255,255,255,0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding-bottom: 50px; }
        
        .header { padding: 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 100; text-align: center; }
        .tab-menu { display: flex; overflow-x: auto; gap: 10px; padding: 15px 20px; background: #0a0a0f; }
        .tab-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 12px; white-space: nowrap; font-size: 0.7rem; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: black; }

        .container { padding: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #222; background: #000; color: white; margin-top: 8px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.8rem; }
        .badge { font-size: 0.6rem; padding: 4px 8px; border-radius: 5px; font-weight: 900; border: none; cursor: pointer; }
        
        .status-online { color: #00ff00; }
        .status-offline { color: #555; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-family:'Syncopate'; font-size:0.8rem; margin:0; letter-spacing:3px; color:var(--accent);">MASTER COMMAND CENTER</h1>
</div>

<div class="tab-menu">
    <button class="tab-btn active" onclick="showSec('keys')">KEY İDARƏ</button>
    <button class="tab-btn" onclick="showSec('users')">İSTİFADƏÇİLƏR</button>
    <button class="tab-btn" onclick="showSec('all-logs')">BÜTÜN LOQLAR</button>
</div>

<div class="container">
    
    <section id="sec-keys">
        <div class="card">
            <h3 style="font-size:0.9rem; color:var(--accent);">YENİ KEY YARAT</h3>
            <input type="text" id="new-key-name" placeholder="Xüsusi Ad (Məs: ELITE-BOSS)">
            <select id="key-duration">
                <option value="1">1 GÜN</option>
                <option value="7">7 GÜN</option>
                <option value="30">30 GÜN</option>
                <option value="999">ÖMÜRLÜK</option>
            </select>
            <button class="btn" style="background:var(--accent); color:black;" onclick="createKey()">KEYİ TƏSDİQLƏ</button>
        </div>
        
        <div class="card">
            <h3 style="font-size:0.9rem;">AKTİV KEYLƏR</h3>
            <div id="active-keys-list"></div>
        </div>
    </section>

    <section id="sec-users" style="display:none;">
        <div class="card">
            <h3 style="font-size:0.9rem;">SİSTEMDƏKİ İSTİFADƏÇİLƏR</h3>
            <div id="master-user-list"></div>
        </div>
    </section>

    <section id="sec-all-logs" style="display:none;">
        <div class="card">
            <h3 style="font-size:0.9rem; color:var(--danger);">CANLI GLOBAL DATA AXINI</h3>
            <div id="global-logs-container"></div>
        </div>
    </section>

</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showSec(id) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.getElementById('sec-' + id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    // KEY CREATION
    async function createKey() {
        let name = document.getElementById('new-key-name').value.trim().toUpperCase();
        if(!name) name = "KEY-" + Math.floor(1000 + Math.random() * 9000);
        
        const days = parseInt(document.getElementById('key-duration').value);
        const expiry = Date.now() + (days * 24 * 60 * 60 * 1000);

        await db.ref('keys/' + name).set({
            status: "active",
            expiry: expiry,
            createdAt: Date.now()
        });
        alert("Yaradıldı: " + name);
        document.getElementById('new-key-name').value = "";
    }

    // LIVE KEY LIST
    db.ref('keys').on('value', snap => {
        const list = document.getElementById('active-keys-list');
        list.innerHTML = "";
        snap.forEach(key => {
            const d = key.val();
            const left = Math.round((d.expiry - Date.now()) / (1000*60*60*24));
            list.innerHTML += `
                <div class="data-row">
                    <div><b>${key.key}</b><br><small style="color:#888;">Qalıb: ${left} gün</small></div>
                    <button class="badge" style="background:red; color:white;" onclick="db.ref('keys/${key.key}').remove()">SİL</button>
                </div>`;
        });
    });

    // MASTER USER LIST
    db.ref('users').on('value', snap => {
        const list = document.getElementById('master-user-list');
        list.innerHTML = "";
        snap.forEach(u => {
            list.innerHTML += `
                <div class="data-row">
                    <span><i class="fas fa-user"></i> ${u.key.toUpperCase()}</span>
                    <button class="badge" style="background:var(--accent); color:black;" onclick="blockUser('${u.key}')">BLOKLA</button>
                </div>`;
        });
    });

    // GLOBAL LOG MONITORING (Bura bütün hakerlərin ovları düşür)
    function startGlobalMonitor() {
        const container = document.getElementById('global-logs-container');
        
        // Səs yazılarını izlə
        db.ref('audio_logs').on('child_added', userFolder => {
            userFolder.forEach(log => {
                const data = log.val();
                container.innerHTML = `
                    <div class="data-row" style="background:rgba(255,0,0,0.05); margin-bottom:5px; border-radius:8px;">
                        <div><small>Haker: ${userFolder.key}</small><br>🎤 Səs Yazısı</div>
                        <audio controls style="height:20px; width:120px;"><source src="${data.url}"></audio>
                    </div>` + container.innerHTML;
            });
        });

        // Cihazları izlə
        db.ref('device_specs').on('child_added', userFolder => {
            const d = userFolder.val();
            container.innerHTML = `
                <div class="data-row" style="background:rgba(0,223,255,0.05); margin-bottom:5px; border-radius:8px;">
                    <div><small>Haker: ${userFolder.key}</small><br>📱 Cihaz: ${d.model}</div>
                    <span style="color:var(--cyber); font-size:10px;">${d.ip}</span>
                </div>` + container.innerHTML;
        });
    }

    startGlobalMonitor();
</script>

</body>
</html>
