<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>HACKATRON ADMIN | MASTER CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New'; padding: 20px; }
        .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        section { border: 1px solid #222; padding: 20px; background: #0a0a0a; border-radius: 15px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; background: #111; border: 1px solid #333; color: white; }
        button { background: #00ff00; color: black; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 0.8rem; }
    </style>
</head>
<body>

<h1 style="text-align:center;">HACKATRON ADMIN PANEL</h1>

<div class="panel">
    <section>
        <h2>KEY GENERATOR</h2>
        <input type="number" id="key-days" placeholder="Müddət (Günlə)">
        <button onclick="generateKey()">KEY YARAT</button>
        <div id="keyList" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
    </section>

    <section>
        <h2>İSTİFADƏÇİLƏR</h2>
        <div id="userList" style="max-height: 400px; overflow-y: auto;"></div>
    </section>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // KEY YARATMA (VAXTLI)
    function generateKey() {
        const days = document.getElementById('key-days').value || 1;
        const key = "HK-" + Math.random().toString(36).substr(2, 8).toUpperCase();
        const expiry = Date.now() + (days * 24 * 60 * 60 * 1000);

        db.ref('keys/' + key).set({
            status: "active",
            expiry: expiry,
            days: days
        }).then(() => alert("Yeni Key: " + key));
    }

    // KEY DONDURMA / SİLMƏ
    function toggleKey(key, currentStatus) {
        const newStatus = currentStatus === 'active' ? 'frozen' : 'active';
        db.ref('keys/' + key).update({ status: newStatus });
    }

    // İSTİFADƏÇİ BLOKLAMA
    function toggleBlock(user, currentStatus) {
        db.ref('users/' + user).update({ isBlocked: !currentStatus });
    }

    // REAL-TIME LİSTƏLƏR
    db.ref('keys').on('value', s => {
        const div = document.getElementById('keyList'); div.innerHTML = "";
        s.forEach(k => {
            div.innerHTML += `<div class="list-item">
                <span>${k.key} (${k.val().status})</span>
                <button onclick="toggleKey('${k.key}', '${k.val().status}')" style="width:auto;">DONDUR/AÇ</button>
            </div>`;
        });
    });

    db.ref('users').on('value', s => {
        const div = document.getElementById('userList'); div.innerHTML = "";
        s.forEach(u => {
            div.innerHTML += `<div class="list-item">
                <span style="color:${u.val().isBlocked?'red':'white'}">${u.key}</span>
                <button onclick="toggleBlock('${u.key}', ${u.val().isBlocked})" style="width:auto;">${u.val().isBlocked?'AÇ':'BLOKLA'}</button>
            </div>`;
        });
    });
</script>
</body>
</html>
