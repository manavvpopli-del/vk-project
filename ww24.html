<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | Full Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap');
        :root { --bg: #05050a; --card: #0c0c14; --accent: #ffd700; --success: #00ff00; --error: #ff3333; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 30px; }
        
        .req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .req-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; position: relative; }
        
        .pts-badge { font-size: 1.5rem; font-weight: 900; color: var(--accent); margin: 15px 0; }
        
        /* Şəkil Baxış Düyməsi */
        .view-img-btn { width: 100%; background: #1a1a2e; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: 600; }
        .view-img-btn:hover { background: #252545; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .btn-approve { background: var(--success); color: #000; }
        .btn-reject { background: var(--error); color: #fff; }

        /* IMAGE MODAL (Şəkil Böyüdücü) */
        #img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        #img-modal img { max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<h1 style="font-family:'Syncopate'; font-size:1rem; letter-spacing:3px; color:var(--accent); margin-bottom:30px;">ELITE PAYMENTS ADMIN</h1>

<div id="requests-container" class="req-grid"></div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-img" src="">
    <p style="position:absolute; bottom:20px; opacity:0.5;">Bağlamaq üçün hər hansı yerə vurun</p>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU", databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('pending_payments').on('value', (snapshot) => {
        const container = document.getElementById('requests-container');
        container.innerHTML = "";
        if (!snapshot.exists()) { container.innerHTML = "Gözləyən ödəniş yoxdur."; return; }

        snapshot.forEach((child) => {
            const data = child.val();
            const key = child.key;
            if (data.status === "pending") {
                container.innerHTML += `
                    <div class="req-card">
                        <div style="font-size:0.7rem; opacity:0.5;">USER:</div>
                        <b style="font-size:1.1rem; color:var(--accent);">${data.user.toUpperCase()}</b>
                        <div class="pts-badge">${data.pts} PTS</div>
                        
                        <button class="view-img-btn" onclick="showImage('${data.screenshot}')">
                            <i class="fas fa-image"></i> ŞƏKLİ GÖR (SCREENSHOT)
                        </button>

                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="approvePayment('${key}', '${data.user}', ${data.pts})">TƏSDİQLƏ</button>
                            <button class="btn btn-reject" onclick="rejectPayment('${key}')">SİL</button>
                        </div>
                    </div>
                `;
            }
        });
    });

    function showImage(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('img-modal').style.display = 'flex';
    }

    async function approvePayment(key, userId, pts) {
        if(!confirm("Təsdiqlənsin?")) return;
        const userRef = db.ref('users/' + userId + '/points');
        const snap = await userRef.get();
        await userRef.set((snap.val() || 0) + parseInt(pts));
        await db.ref('pending_payments/' + key).remove();
        alert("PTS yükləndi!");
    }

    async function rejectPayment(key) {
        if(confirm("Silinsin?")) await db.ref('pending_payments/' + key).remove();
    }
</script>
</body>
</html>
