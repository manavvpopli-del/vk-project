<div id="real-osint" style="color: #00ff00; font-family: 'Outfit', sans-serif; padding: 20px; background: #050505; border: 1px solid #00ff00; border-radius: 25px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-search-plus" style="font-size: 2.5rem; color: #00ff00;"></i>
        <h2 style="font-family: 'Syncopate'; font-size: 0.7rem; margin-top: 10px;">DEEP WEB OSINT</h2>
        <p style="font-size: 0.5rem; color: #555;">GOOGLE DORKING & SOCIAL INDEXING ACTIVE</p>
    </div>

    <div style="background: rgba(0,255,0,0.02); padding: 15px; border-radius: 20px; border: 1px solid #111;">
        <input type="text" id="target-username" placeholder="Hədəf Username (məs: ismail_99)" 
            style="width: 100%; padding: 15px; background: #000; border: 1px solid #00ff00; color: white; border-radius: 12px; text-align: center; font-weight: 900; outline: none; margin-bottom: 10px;">
        
        <button onclick="googleHunt()" id="hunt-btn" 
            style="width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%;">
            SİSTEMİ TETİKLƏ (HUNT)
        </button>
    </div>

    <div id="hunt-results" style="margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 10px;">
        </div>
</div>

<script>
    function googleHunt() {
        const user = document.getElementById('target-username').value.trim();
        if(!user) return alert("Username yazın!");

        const grid = document.getElementById('hunt-results');
        grid.innerHTML = `<div style="color:#888; font-size:0.7rem; text-align:center;">Hədəf üçün xüsusi dorking linkləri yaradıldı. Klikləyərək canlı nəticələrə baxın:</div>`;

        // Ən güclü OSINT dorkları
        const dorks = [
            { n: "Instagram Profili", q: `site:instagram.com "${user}"` },
            { n: "TikTok & Video İzləri", q: `site:tiktok.com "@${user}"` },
            { n: "Bütün Sosial Media (Global)", q: `"${user}" site:facebook.com OR site:twitter.com OR site:linkedin.com` },
            { n: "Sızmış Parol və Fayllar", q: `"${user}" filetype:txt OR filetype:pdf OR site:pastebin.com` },
            { n: "GitHub & Kod Bazaları", q: `site:github.com "${user}"` }
        ];

        dorks.forEach(d => {
            const link = `https://www.google.com/search?q=${encodeURIComponent(d.q)}`;
            const card = document.createElement('div');
            card.style = "background:#111; padding:15px; border-radius:12px; border:1px solid #222; display:flex; justify-content:space-between; align-items:center;";
            card.innerHTML = `
                <div style="font-size:0.7rem; color:#fff; font-weight:bold;">${d.n}</div>
                <a href="${link}" target="_blank" style="background:#00ff00; color:#000; text-decoration:none; padding:5px 10px; border-radius:5px; font-size:0.6rem; font-weight:900;">SCAN</a>
            `;
            grid.appendChild(card);
        });

        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
</script>
