<div id="user-osint-module" style="color: #00dfff; font-family: 'Outfit', sans-serif; padding: 20px; background: #05050a; border: 1px solid #00dfff; border-radius: 20px; box-shadow: 0 0 20px rgba(0, 223, 255, 0.15);">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-fingerprint" style="font-size: 3rem; color: #00dfff; text-shadow: 0 0 15px #00dfff;"></i>
        <h3 style="font-family: 'Syncopate'; margin-top: 15px; font-size: 0.8rem; letter-spacing: 2px;">DIGITAL FOOTPRINT SCANNER</h3>
    </div>

    <div style="background: rgba(0, 223, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid #003355; margin-bottom: 15px;">
        <input type="text" id="osint-username" placeholder="Hədəf istifadəçi adı (məs: ismail_001)" 
            style="width: 100%; padding: 15px; background: #000; border: 1px solid #00dfff; color: white; border-radius: 10px; outline: none; font-weight: bold; text-align: center;">
    </div>

    <button onclick="huntUsername()" id="hunt-btn" 
        style="width: 100%; padding: 18px; background: #00dfff; color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">
        <i class="fas fa-search-location"></i> İZLƏRİ TAPA
    </button>

    <div id="osint-progress" style="margin-top: 15px; font-size: 0.65rem; color: #00dfff; display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>SKANER PROSESİ...</span>
            <span id="scan-percent">0%</span>
        </div>
        <div style="width: 100%; height: 4px; background: #111; border-radius: 2px;">
            <div id="scan-bar" style="width: 0%; height: 100%; background: #00dfff; transition: 0.3s;"></div>
        </div>
    </div>

    <div id="osint-results-grid" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 300px; overflow-y: auto; padding-right: 5px;">
        </div>
</div>

<style>
    .res-card { background: rgba(0, 223, 255, 0.03); border: 1px solid #003355; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; animation: popIn 0.3s ease; }
    .res-card i { font-size: 1.2rem; }
    .res-card a { color: #00ff00; text-decoration: none; font-size: 0.6rem; font-weight: 900; border: 1px solid #00ff00; padding: 2px 5px; border-radius: 4px; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #osint-results-grid::-webkit-scrollbar { width: 3px; }
    #osint-results-grid::-webkit-scrollbar-thumb { background: #00dfff; border-radius: 10px; }
</style>

<script>
    async function huntUsername() {
        const username = document.getElementById('osint-username').value.trim();
        if(!username) return alert("İstifadəçi adını daxil edin!");

        const btn = document.getElementById('hunt-btn');
        const grid = document.getElementById('osint-results-grid');
        const progress = document.getElementById('osint-progress');
        const bar = document.getElementById('scan-bar');
        const percent = document.getElementById('scan-percent');

        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-satellite fa-spin'></i> HUNTING...";
        grid.innerHTML = "";
        progress.style.display = "block";

        // Real yoxlanılacaq saytlar siyahısı
        const platforms = [
            { name: "Instagram", url: "https://www.instagram.com/", icon: "fab fa-instagram", color: "#e1306c" },
            { name: "TikTok", url: "https://www.tiktok.com/@", icon: "fab fa-tiktok", color: "#fff" },
            { name: "GitHub", url: "https://github.com/", icon: "fab fa-github", color: "#fff" },
            { name: "Pinterest", url: "https://www.pinterest.com/", icon: "fab fa-pinterest", color: "#bd081c" },
            { name: "Twitter", url: "https://twitter.com/", icon: "fab fa-twitter", color: "#1da1f2" },
            { name: "Spotify", url: "https://open.spotify.com/user/", icon: "fab fa-spotify", color: "#1db954" },
            { name: "Chess.com", url: "https://www.chess.com/member/", icon: "fas fa-chess", color: "#769656" },
            { name: "Roblox", url: "https://www.roblox.com/user.aspx?username=", icon: "fas fa-gamepad", color: "#ff0000" }
        ];

        let foundCount = 0;
        for(let i = 0; i < platforms.length; i++) {
            const p = platforms[i];
            const targetUrl = p.url + username;
            
            // Real vaxtda CORS bypass vasitəsilə profilin varlığını yoxlayırıq
            try {
                const proxy = "https://api.allorigins.win/get?url=";
                const response = await fetch(proxy + encodeURIComponent(targetUrl));
                
                // Status 200 (OK) olarsa, deməli profil mövcuddur
                if(response.ok) {
                    const card = document.createElement('div');
                    card.className = 'res-card';
                    card.innerHTML = `
                        <i class="${p.icon}" style="color:${p.color}"></i>
                        <div style="flex:1;">
                            <div style="font-size:0.65rem; font-weight:900;">${p.name}</div>
                            <a href="${targetUrl}" target="_blank">PROFİLİ AÇ</a>
                        </div>
                    `;
                    grid.prepend(card);
                    foundCount++;
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            } catch (e) {}

            // Proqres yeniləmə
            const pCent = Math.round(((i + 1) / platforms.length) * 100);
            bar.style.width = pCent + "%";
            percent.innerText = pCent + "%";
        }

        btn.disabled = false;
        btn.innerHTML = "<i class='fas fa-search-location'></i> YENİDƏN SKAN ET";
        if(foundCount === 0) grid.innerHTML = "<div style='grid-column:1/3; text-align:center; opacity:0.5; margin-top:50px;'>Heç bir açıq profil tapılmadı.</div>";
    }
</script>
