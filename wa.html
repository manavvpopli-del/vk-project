<div style="font-family:'Outfit'; color:white; padding:15px; animation: fadeIn 0.5s;">
    <div style="text-align:center; margin-bottom:20px;">
        <i class="fab fa-whatsapp" style="color:#25d366; font-size:3rem; text-shadow: 0 0 20px rgba(37, 211, 102, 0.4);"></i>
        <h2 style="font-family:'Syncopate'; font-size:0.9rem; margin-top:15px; letter-spacing:2px;">WA CLONE & INTERCEPTOR</h2>
        <p style="font-size:0.6rem; color:gray;">SİSTEM: BAĞLI | PORT: 8080 | SSL: AKTİV</p>
    </div>

    <div id="wa-input-zone" style="background:rgba(37, 211, 102, 0.03); border:1px solid rgba(37, 211, 102, 0.2); padding:25px; border-radius:25px;">
        <div style="margin-bottom:15px;">
            <label style="font-size:0.7rem; color:#25d366; font-weight:900;">HƏDƏF TELEFON NÖMRƏSİ:</label>
            <input type="text" id="target-num" placeholder="+994 -- --- -- --" 
                   style="width:100%; padding:15px; background:#000; border:1px solid #222; border-radius:12px; color:white; margin-top:10px; text-align:left;">
        </div>
        
        <div style="margin-bottom:20px;">
            <label style="font-size:0.7rem; color:#25d366; font-weight:900;">EXTRACTION METODU:</label>
            <select id="wa-method" style="width:100%; padding:12px; background:#000; color:white; border:1px solid #222; border-radius:10px; margin-top:10px;">
                <option value="cloud">Cloud Backup Bypass (Fast)</option>
                <option value="brute">End-to-End Encryption Brute</option>
                <option value="sim">Sim-Swap Simulation (Advanced)</option>
            </select>
        </div>

        <button class="btn-main" onclick="initiateExploit()" style="background:#25d366; color:black; font-weight:900; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);">
            HACK PROSESİNİ BAŞLAT
        </button>
    </div>

    <div id="wa-terminal" style="display:none; margin-top:20px; background:#000; border:1px solid #25d366; border-radius:15px; padding:20px; font-family:'Courier New', monospace; font-size:0.7rem; line-height:1.6; position:relative; overflow:hidden;">
        <div id="log-output" style="color:#25d366; height:220px; overflow-y:hidden;"></div>
        <div id="progress-bar-container" style="width:100%; height:2px; background:#111; margin-top:15px;">
            <div id="progress-bar" style="width:0%; height:100%; background:#25d366; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="wa-error-screen" style="display:none; text-align:center; padding:30px; animation: slideUp 0.5s;">
        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ff4444; margin-bottom:20px;"></i>
        <h3 style="color:white; font-size:1rem;">PROSES DAYANDIRILDI</h3>
        <p id="error-msg" style="color:gray; font-size:0.75rem; line-height:1.5; margin-bottom:25px;"></p>
        <button class="btn-main" onclick="location.reload()" style="background:transparent; border:1px solid #444; color:white; width:auto; padding:10px 30px;">TƏKRAR YOXLA</button>
    </div>
</div>

<script>
    const logs = [
        "> WA_Protocol: Bağlantı qurulur...",
        "> IP_Socket: 185.124.X.XX vasitəsilə daxil olundu.",
        "> Intercepting SMS Gateway...",
        "> Cloud_Backup tapıldı: msgstore.db.crypt15",
        "> End-to-End şifrələmə aşkarlandı.",
        "> Brute-Force başladılır: [Az-Az-001]",
        "> 10% Bazaya giriş əldə olundu...",
        "> 35% Media faylları (JPG/MP4) indekslənir...",
        "> 55% Son söhbətlər yüklənir...",
        "> 78% Kontakt siyahısı kopyalanır...",
        "> 92% Şifrələr deşifrə edilir...",
        "> KRİTİK XƏTA!"
    ];

    async function initiateExploit() {
        const num = document.getElementById('target-num').value;
        if(num.length < 9) return alert("Hədəf nömrə düzgün daxil edilməyib!");

        document.getElementById('wa-input-zone').style.display = 'none';
        document.getElementById('wa-terminal').style.display = 'block';

        const output = document.getElementById('log-output');
        const bar = document.getElementById('progress-bar');

        for(let i = 0; i < logs.length; i++) {
            let p = Math.floor(((i + 1) / logs.length) * 100);
            bar.style.width = p + "%";
            
            let div = document.createElement('div');
            div.innerHTML = logs[i];
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
            
            // Sonuncu logdan qabaq daha çox gözlət ki, inandırıcı olsun
            let wait = (i === logs.length - 1) ? 3000 : Math.random() * 1200 + 500;
            await new Promise(r => setTimeout(r, wait));
        }

        showFinalError();
    }

    function showFinalError() {
        document.getElementById('wa-terminal').style.display = 'none';
        const errorScreen = document.getElementById('wa-error-screen');
        const msg = document.getElementById('error-msg');
        
        errorScreen.style.display = 'block';
        // İstifadəçini günahkar çıxaran mesaj:
        msg.innerHTML = "<b>XƏTA KODU: AUTH_FAILED_USER_ACTION</b><br><br>Hədəf cihazla sinxronizasiya 92%-də kəsildi. Səbəb: İstifadəçi tərəfindən 'İzləməni Təsdiqlə' (Background Verification) sorğusu vaxtında qəbul edilməyib və ya hədəf nömrənin daxil edilməsində operator formatı (məs: +994 əvəzinə 050) yanlış seçilib. Sistemi yenidən başladın.";
    }
</script>
