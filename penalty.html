<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vur Qazan!</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Sənin mövcud CSS kodların bura gəlir */
        body { margin: 0; background: #020617; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        .game-header { padding: 20px; display: flex; justify-content: space-between; font-family: 'Space Grotesk'; }
        .pitch { position: relative; height: 60vh; background: linear-gradient(to bottom, #064e3b, #065f46); margin: 20px; border-radius: 20px; border: 4px solid #059669; }
        .goal { width: 150px; height: 80px; border: 4px solid #fff; border-bottom: none; margin: 0 auto; position: relative; }
        .ball { width: 45px; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); }
        
        .btn-claim { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); 
            color: #fff; border: none; padding: 18px 35px; border-radius: 18px; 
            font-weight: 800; display: none; margin: 20px auto; cursor: pointer;
            font-family: 'Space Grotesk'; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        /* VİP MODAL CSS - YENİ ƏLAVƏ */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 6, 23, 0.95); display: none; align-items: center; 
            justify-content: center; z-index: 10000; backdrop-filter: blur(8px);
        }
        .modal-card { 
            background: #0f172a; padding: 30px; border-radius: 32px; width: 88%; 
            max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .vip-icon { font-size: 4rem; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="game-header">
        <div>TOP: <span id="ball-count">0</span> / 5</div>
        <div style="color: #22c55e;">QAZANC: <span id="temp-win">0.00</span> AZN</div>
    </div>

    <div class="pitch" id="pitch">
        <div class="goal"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/33/33736.png" class="ball" id="ball" onclick="shoot()">
    </div>

    <button id="claim-btn" class="btn-claim" onclick="checkVipToClaim()">BALANSA KÖÇÜR</button>

    <div id="vip-modal" class="modal">
        <div class="modal-card">
            <i class="fas fa-crown vip-icon"></i>
            <h2 style="font-family: 'Space Grotesk'; margin-bottom: 10px;">VİP Statusu Lazımdır</h2>
            <p style="color: #94a3b8; font-size: 0.9rem; line-height: 1.5;">Oyunlardan qazandığınız məbləği (<b><span id="modal-amount">0.00</span> AZN</b>) əsas balansa köçürmək üçün VİP abunəlik aktiv olmalıdır.</p>
            
            <div style="background: rgba(34, 197, 94, 0.1); padding: 15px; border-radius: 16px; margin: 20px 0;">
                <span style="color: #22c55e; font-weight: 800; font-size: 1.4rem; font-family: 'Space Grotesk';">Qiymət: 9 AZN</span>
            </div>
            
            <button onclick="location.href='pay.html?package=VIP&amount=9.00'" style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color:#fff; border:none; padding:18px; width:100%; border-radius:18px; font-weight:800; cursor:pointer; font-family: 'Space Grotesk';">VİP-İ AKTİV ET</button>
            
            <div onclick="location.href='games.html'" style="margin-top: 20px; color: #64748b; font-size: 0.85rem; cursor: pointer; text-decoration: underline;">İmtina et və qazancı sil</div>
        </div>
    </div>

    <script>
        // FİREBASE KONFİQURASİYAN
        const firebaseConfig = {
            apiKey: "AIzaSyCM5WdZNSj9oFipNI-J3csHpOIvK8PjoLU",
            authDomain: "sevgili-testi.firebaseapp.com",
            databaseURL: "https://sevgili-testi-default-rtdb.firebaseio.com",
            projectId: "sevgili-testi",
            storageBucket: "sevgili-testi.firebasestorage.app",
            messagingSenderId: "399260477557",
            appId: "1:399260477557:web:584204a698d7bf145bb03c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('zerowallet_session');

        let balls = 0;
        let totalWin = 0;
        let isUserVip = false;

        // VİP STATUSUNU YOXLAYIRIQ
        if(user) {
            db.ref('zerowallet_users/' + user + '/isVip').on('value', snap => {
                isUserVip = (snap.val() === true);
            });
        }

        function shoot() {
            if(balls >= 5) return;

            const ball = document.getElementById('ball');
            // 1 ilə 9 arasında təsadüfi qazanc (Sənin istəyinlə)
            let gain = (Math.random() * (9 - 1) + 1).toFixed(2);
            
            // Topun hərəkəti (Sadə animasiya)
            const randomX = Math.floor(Math.random() * 120) - 60;
            ball.style.transform = `translate(calc(-50% + ${randomX}px), -350px) scale(0.6)`;
            
            setTimeout(() => {
                balls++;
                totalWin += parseFloat(gain);
                
                document.getElementById('ball-count').innerText = balls;
                document.getElementById('temp-win').innerText = totalWin.toFixed(2);
                
                if(balls < 5) {
                    ball.style.transform = `translateX(-50%) scale(1)`;
                } else {
                    ball.style.display = 'none';
                    document.getElementById('claim-btn').style.display = 'block';
                }
            }, 500);
        }

        function checkVipToClaim() {
            if(isUserVip) {
                // Əgər VİP-dirsə birbaşa balansa əlavə et
                db.ref('zerowallet_users/' + user + '/balance').transaction(currentBalance => {
                    return (currentBalance || 0) + totalWin;
                }).then(() => {
                    alert("Təbriklər! " + totalWin.toFixed(2) + " AZN balansa əlavə edildi.");
                    location.href = 'main.html';
                });
            } else {
                // VİP deyilse modalı aç və qazancı göstər
                document.getElementById('modal-amount').innerText = totalWin.toFixed(2);
                document.getElementById('vip-modal').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
