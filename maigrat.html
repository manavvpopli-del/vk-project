<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.K Project - Maigrat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #05070a;
            --surface: #0f1218;
            --accent: #00f2ff;
            --success: #00ff88;
            --error: #ff4d4d;
            --text: #e0e6ed;
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains+Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-window {
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .glow {
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--accent), transparent, var(--success), transparent);
            border-radius: 24px;
            z-index: -1;
            opacity: 0.15;
            filter: blur(10px);
        }

        .header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .search-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .input-box {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        #startBtn {
            background: var(--accent);
            color: #000;
        }

        #stopBtn {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            display: none;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .results-list::-webkit-scrollbar { width: 4px; }
        .results-list::-webkit-scrollbar-thumb { background: var(--accent); }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
            animation: slideIn 0.3s ease-out;
            text-decoration: none;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .card.found {
            border-color: var(--success);
            background: rgba(0, 255, 136, 0.05);
        }

        .card.not-found {
            border-color: rgba(255, 77, 77, 0.2);
            opacity: 0.6;
        }

        .site-name { font-weight: bold; font-size: 14px; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 4px; }
        .tag-success { background: var(--success); color: #000; }
        .tag-error { color: var(--error); border: 1px solid var(--error); }

    </style>
</head>
<body>

    <div class="app-window">
        <div class="glow"></div>
        <div class="header">
            <h1>V.K PROJECT - MAIGRAT</h1>
        </div>

        <div class="search-area">
            <input type="text" id="username" class="input-box" placeholder="USERNAME YAZIN..." spellcheck="false">
            <div class="btn-group">
                <button id="startBtn">ANALİZİ BAŞLAT</button>
                <button id="stopBtn">DAYANDIR</button>
            </div>
        </div>

        <div class="results-list" id="results">
            </div>
    </div>

    <script>
        let isRunning = false;
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultsDiv = document.getElementById('results');
        const input = document.getElementById('username');

        async function analyze() {
            const user = input.value.trim();
            if(!user) return;

            isRunning = true;
            resultsDiv.innerHTML = '';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const sites = Object.entries(data);

                for (const [site, info] of sites) {
                    if(!isRunning) break;

                    const card = document.createElement('a');
                    card.className = 'card';
                    
                    // Simulyasiya: 30% ehtimalla tapıldı
                    const isFound = Math.random() > 0.7; 
                    const targetUrl = info.urlMain.replace('{}', user) || (info.urlMain + user);

                    if(isFound) {
                        card.classList.add('found');
                        card.href = targetUrl;
                        card.target = "_blank";
                        card.innerHTML = `
                            <span class="site-name">${site.toUpperCase()}</span>
                            <span class="status-tag tag-success">TAPILDI</span>
                        `;
                    } else {
                        card.classList.add('not-found');
                        card.innerHTML = `
                            <span class="site-name">${site.toUpperCase()}</span>
                            <span class="status-tag tag-error">YOXDUR</span>
                        `;
                    }

                    resultsDiv.prepend(card);
                    await new Promise(r => setTimeout(r, 200));
                }
            } catch (e) {
                resultsDiv.innerHTML = `<p style="color:red">Xəta: data.json tapılmadı!</p>`;
            }
            resetUI();
        }

        function resetUI() {
            isRunning = false;
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        }

        startBtn.onclick = analyze;
        stopBtn.onclick = resetUI;
    </script>
</body>
</html>
